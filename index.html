 arthralgia; chloroquine for chronic joint symptoms (evidence limited)."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Dengue","symptoms":"High fever, severe headache, pain behind eyes, rash, muscle/joint aches","goal":"Supportive hydration, antipyresis, monitor for severe dengue","soc":"No approved antiviral. Supportive: acetaminophen (avoid NSAIDs/aspirin — platelet effects); IV fluids for severe dengue. Dengvaxia (CYD-TDV, Sanofi) licensed for seropositive individuals ≥9 years in endemic areas."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Marburg and Ebola Virus Infections","symptoms":"Sudden fever, muscle aches, diarrhea, vomiting, hemorrhagic bleeding, shock","goal":"Reduce viral replication, prevent hemorrhagic shock and death","soc":"Ebola (EBOV): Atoltivimab/maftivimab/odesivimab-ebgn (Inmazeb, triple mAb cocktail, FDA-approved 2020) IV; or ansuvimab-zykl (Ebanga, mAb, FDA-approved 2020). Marburg: no FDA-approved treatment; remdesivir (Veklury, nucleoside prodrug) and MR191 mAb used investigationally."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Other Arbovirus Infections","symptoms":"Fever, rash, joint pain, encephalitis, hemorrhagic fever (varies by arbovirus)","goal":"Supportive care; manage encephalitis and hemorrhagic fever complications","soc":"No FDA-approved antiviral for most arboviruses. Supportive care (IV fluids, antipyretics, analgesics, ICU care). Ribavirin used off-label for some hemorrhagic fever arboviruses. Immunotherapy for severe encephalitis."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"West Nile Virus","symptoms":"Most asymptomatic; fever, headache, myalgias; severe: encephalitis, flaccid paralysis","goal":"Supportive care, reduce neuroinvasive disease mortality, neuroprotection","soc":"No FDA-approved antiviral for West Nile Virus. Treatment is entirely supportive (IV fluids, antipyretics, mechanical ventilation for encephalitis). IVIG and interferon-alpha have been used off-label with limited evidence."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Hantavirus Infection","symptoms":"Fever, muscle aches, respiratory failure, low platelets, shock","goal":"Supportive ICU care; prevent cardiopulmonary collapse and death","soc":"No FDA-approved antiviral for hantavirus (HPS or HFRS). Ribavirin (Virazole, nucleoside analog) used IV off-label for HFRS (Old World hantaviruses); NOT proven effective for HPS. Supportive care including mechanical ventilation and ECMO."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Zika Virus (ZV) Infections","symptoms":"Mild fever, rash, joint pain, conjunctivitis; severe: microcephaly in fetus, Guillain-Barré","goal":"Supportive care; prevent fetal microcephaly in pregnant women","soc":"No FDA-approved antiviral for Zika. Treatment is supportive (acetaminophen, fluids, rest). Aspirin and NSAIDs avoided (dengue co-infection risk). Prevention: mosquito control, barrier contraception for sexual transmission."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Dengue Hemorrhagic Fever/Dengue Shock Syndrome","symptoms":"Severe bleeding, plasma leakage, shock, multiorgan failure","goal":"Restore plasma volume, prevent shock, control hemorrhage","soc":"No approved pharmacologic treatment; strict fluid management per WHO protocol; platelet transfusion for severe thrombocytopenia with bleeding."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Lassa Fever","symptoms":"Fever, weakness, headache, sore throat, chest pain, hemorrhagic manifestations","goal":"Reduce viral replication, prevent hemorrhagic shock and death","soc":"Ribavirin (Virazole, nucleoside analog) IV/oral if given within 6 days of onset — reduces mortality from ~50% to ~5% in high-risk patients (per WHO data). IV ribavirin 2g loading, then 1g q6h × 4 days, then 0.5g q8h × 6 days."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Yellow Fever","symptoms":"Fever, jaundice, hemorrhage, renal failure, black vomit (severe/toxic phase)","goal":"Supportive care, organ support; vaccination is definitive prevention","soc":"No specific antiviral treatment exists. Treatment is entirely supportive: IV fluids, vasopressors, renal replacement therapy, fresh frozen plasma for coagulopathy. No antivirals with proven benefit. Vaccination (17D live-attenuated vaccine) is highly effective prevention."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Other","indication":"Herpes Zoster","symptoms":"Painful dermatomal rash, vesicular blisters, burning pain, postherpetic neuralgia","goal":"Reduce viral replication, accelerate healing, prevent postherpetic neuralgia","soc":"Valacyclovir (Valtrex, nucleoside analog prodrug) 1g TID × 7 days or famciclovir 500 mg TID × 7 days; both superior to acyclovir due to pharmacokinetics. Prevention: Shingrix (recombinant zoster vaccine, adjuvanted, GSK) >90% efficacy."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Other","indication":"Smallpox","symptoms":"Prodrome fever, then pustular rash covering entire body including palms/soles","goal":"Antiviral treatment, supportive care, ring vaccination to halt outbreak","soc":"Tecovirimat (TPOXX/ST-246, viral egress inhibitor) 600 mg BID × 14 days — FDA-approved under animal rule for smallpox; first-line per CDC Strategic National Stockpile protocol."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Other","indication":"Mpox (Monkeypox)","symptoms":"Painful rash/vesicles on genitals/skin, fever, lymphadenopathy, myalgia","goal":"Accelerate lesion healing, reduce severe disease, prevent transmission","soc":"Tecovirimat (TPOXX, Orthopoxvirus CDC-506 inhibitor, SIGA Technologies) — FDA-approved for smallpox, used under EUA/IND for mpox; 600 mg BID × 14 days (adult, oral). Brincidofovir (Tembexa) or cidofovir as alternatives for severe disease."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Other","indication":"Chickenpox","symptoms":"Itchy blistering rash, fever, headache, generalized malaise","goal":"Reduce severity, shorten duration, prevent complications","soc":"Acyclovir (Zovirax, nucleoside analog) 800 mg 5× daily × 5–7 days for adolescents/adults and high-risk children; valacyclovir (Valtrex) 1g TID × 5–7 days preferred for better bioavailability."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"COVID-19","symptoms":"Fever, cough, shortness of breath, fatigue, loss of smell/taste","goal":"Prevent severe disease, hospitalization, and death","soc":"Nirmatrelvir-ritonavir (Paxlovid, 3CL protease inhibitor) 300/100 mg BID × 5 days for high-risk outpatients within 5 days of symptom onset; remdesivir (Veklury, nucleoside analog) IV × 3–5 days for hospitalized patients."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"Common Cold","symptoms":"Runny nose, sore throat, sneezing, mild cough, congestion","goal":"Symptom relief; reduce duration (no cure)","soc":"None pharmacologically curative. Symptomatic: antihistamines (loratadine), decongestants (pseudoephedrine), NSAIDs/acetaminophen, zinc lozenges (modest evidence for duration reduction)."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"Influenza","symptoms":"Sudden fever, body aches, cough, fatigue, headache, chills","goal":"Reduce severity and duration, prevent complications, limit transmission","soc":"Oseltamivir (Tamiflu, neuraminidase inhibitor) 75 mg BID × 5 days within 48 hrs of symptom onset; or baloxavir marboxil (Xofluza, cap-dependent endonuclease inhibitor) 40–80 mg single dose for uncomplicated influenza."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"Avian Influenza","symptoms":"High fever, severe respiratory distress, cough, conjunctivitis","goal":"Reduce viral load, prevent respiratory failure, prevent death","soc":"Oseltamivir (Tamiflu, neuraminidase inhibitor) 75 mg BID × 5 days (double-dose 150 mg BID sometimes used for H5N1); start within 48 hrs. IV peramivir or inhaled zanamivir alternatives."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"Viral Respiratory Infections","symptoms":"Runny nose, sore throat, cough, fever, shortness of breath","goal":"Reduce viral replication, shorten illness, prevent hospitalization","soc":"Influenza: oseltamivir (Tamiflu, neuraminidase inhibitor) 75 mg BID × 5 days. RSV (in infants/elderly): nirsevimab (Beyfortus, mAb prophylaxis) or palivizumab for high-risk infants; abrysvo/mResvia vaccines for adults. COVID-19: nirmatrelvir/ritonavir (Paxlovid) × 5 days. Most other viral URIs (rhinovirus, parainfluenza): supportive care only."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"Parainfluenza Virus Infections","symptoms":"Croup, hoarse voice, barking cough, stridor, bronchiolitis, pneumonia in children","goal":"Supportive airway management; prevent respiratory failure in immunocompromised","soc":"No FDA-approved antiviral for parainfluenza virus (PIV). Supportive care: dexamethasone (steroid) 0.6 mg/kg IM/oral × 1 dose for croup reduces edema; nebulized epinephrine for severe stridor."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"Adenovirus Infections","symptoms":"Fever, sore throat, conjunctivitis, respiratory illness, diarrhea","goal":"Supportive care; prevent dissemination in immunocompromised","soc":"No FDA-approved antiviral for adenovirus. Cidofovir (Vistide, nucleotide analog) used off-label for severe/disseminated disease in immunocompromised patients."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Respiratory","indication":"Coronaviruses and Acute Respiratory Syndromes (MERS and SARS)","symptoms":"High fever, severe pneumonia, respiratory failure, multiorgan dysfunction","goal":"Reduce viral replication, prevent respiratory failure and death","soc":"No FDA-approved specific treatment for MERS-CoV or SARS-CoV-1. Supportive ICU care; remdesivir (Veklury) used off-label for MERS based on in vitro/primate data; ribavirin + interferon used historically for MERS with limited benefit."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Human Immunodeficiency Virus (HIV) Infection","symptoms":"Fatigue, weight loss, recurrent infections, lymphadenopathy, immunodeficiency","goal":"Suppress HIV viral load to undetectable, restore CD4 count, prevent AIDS","soc":"Bictegravir/tenofovir alafenamide/emtricitabine (Biktarvy, INSTI + NRTI backbone) single-tablet regimen once daily; or dolutegravir/abacavir/lamivudine (Triumeq) as alternative."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Herpes Simplex Virus (HSV) Infections","symptoms":"Oral/genital blisters, painful ulcers, fever, encephalitis in severe cases","goal":"Suppress HSV replication, heal lesions, prevent severe complications","soc":"Acyclovir (Zovirax, nucleoside analog) or valacyclovir (Valtrex, prodrug) for primary and recurrent episodes; IV acyclovir 10 mg/kg q8h for HSV encephalitis and neonatal herpes."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Herpesvirus Infections","symptoms":"Varies by virus: fever, rash, lymphadenopathy, encephalitis, organ involvement","goal":"Suppress herpesvirus replication, prevent end-organ damage and death","soc":"Class-dependent: acyclovir/valacyclovir (HSV-1/2, VZV); ganciclovir/valganciclovir (CMV); foscarnet (resistant CMV/HSV). EBV, HHV-6/7/8: no approved targeted antiviral; ganciclovir/foscarnet used off-label."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Cancers Common in Patients With HIV Infection","symptoms":"Lymphoma, Kaposi sarcoma lesions, cervical cancer, weight loss","goal":"Treat AIDS-defining malignancy, optimize antiretroviral therapy","soc":"Antiretroviral therapy (ART) optimization is foundational. AIDS-defining cancers: KS — liposomal doxorubicin (Doxil) ± paclitaxel; NHL — R-CHOP (rituximab-cyclophosphamide-doxorubicin-vincristine-prednisone); cervical cancer — standard oncology SoC (surgery, radiation, cisplatin)."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Hand-Foot-and-Mouth Disease (HFMD)","symptoms":"Oral ulcers, rash on hands/feet, fever, sore throat in children","goal":"Supportive care; prevent severe neurological complications in EV-A71","soc":"No antiviral pharmacologic SoC; supportive care (hydration, antipyretics, topical analgesics) is standard. No FDA-approved antiviral for HFMD."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Postpoliomyelitis Syndrome","symptoms":"Progressive muscle weakness, fatigue, pain, years after initial polio infection","goal":"Manage symptoms, maintain function, slow decline; no curative pharmacologic treatment","soc":"No pharmacologic SoC. Symptomatic management: physical/occupational therapy, energy conservation, non-fatiguing exercise, assistive devices. NSAIDs/acetaminophen for pain. Pyridostigmine investigated but no proven benefit in RCTs."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Cytomegalovirus (CMV) Infection","symptoms":"Fever, fatigue, retinitis, colitis, pneumonitis (in immunocompromised)","goal":"Suppress CMV replication, preserve vision, prevent graft failure","soc":"Valganciclovir (Valcyte, nucleoside analog, ganciclovir prodrug) 900 mg BID × 3 weeks (induction) then 900 mg daily (maintenance); IV ganciclovir for severe disease."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Enterovirus Infections","symptoms":"Hand-foot-mouth sores, meningitis, conjunctivitis, flaccid paralysis, myocarditis","goal":"Supportive care; prevent severe complications (myocarditis, paralysis)","soc":"No approved antiviral for enteroviruses. Supportive care. IVIG used for neonatal/immunocompromised severe enteroviral disease."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Infectious Mononucleosis","symptoms":"Extreme fatigue, sore throat, swollen lymph nodes, fever, enlarged spleen","goal":"Supportive care; prevent splenic rupture, manage complications","soc":"No pharmacologic SoC; supportive care with rest, hydration, NSAIDs/acetaminophen for fever/pain. Corticosteroids (prednisone) reserved for severe complications (airway compromise, thrombocytopenia, hemolytic anemia)."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Herpangina","symptoms":"Sudden fever, painful oral blisters, sore throat, difficulty swallowing in children","goal":"Supportive care; maintain hydration, relieve oral pain","soc":"No pharmacologic SoC; supportive care with analgesics (acetaminophen/ibuprofen), topical anesthetics (viscous lidocaine off-label), and hydration."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Epidemic Pleurodynia","symptoms":"Sudden severe chest/abdominal muscle pain, fever, brief spasms (Bornholm disease)","goal":"Symptomatic relief; self-limiting illness (NSAIDs, rest)","soc":"None — supportive only. NSAIDs and analgesics for pain relief; self-limiting."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Lymphocytic Choriomeningitis","symptoms":"Fever, headache, stiff neck, photophobia, nausea, aseptic meningitis","goal":"Supportive care; manage meningitis symptoms, prevent complications in immunocompromised","soc":"No FDA-approved antiviral for LCMV. Supportive care (analgesics, corticosteroids for severe meningitis). Ribavirin used off-label in severe/transplant-associated cases."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Systemic","indication":"Poliomyelitis","symptoms":"Fever, limb weakness, paralysis, respiratory failure (bulbar/spinal polio), meningitis","goal":"Supportive care; prevent respiratory failure; no antiviral curative treatment","soc":"No antiviral pharmacologic SoC. Supportive care: respiratory support (mechanical ventilation), physiotherapy, pain management. Prevention: IPV (inactivated poliovirus vaccine) or OPV."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Bone Disorders","indication":"Osteoporosis","symptoms":"Silent bone loss; fragility fractures (hip, vertebral, wrist); low T-score on DXA scan","goal":"Increase bone mineral density; prevent fragility fractures; reduce fracture-related mortality","soc":"Bisphosphonates — alendronate (Fosamax) 70 mg/week PO or zoledronate (Reclast) 5 mg IV annually — are first-line pharmacologic therapy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Bone Disorders","indication":"Paget Disease of Bone","symptoms":"Bone pain, deformity (bowing of tibia), fractures; elevated alkaline phosphatase; focal bone overgrowth","goal":"Suppress osteoclast activity; normalize ALP; relieve pain; prevent deformity","soc":"Zoledronate (Reclast) 5 mg IV single infusion is the most effective bisphosphonate first-line agent; alendronate oral as alternative."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Bone Disorders","indication":"Osteonecrosis (ON)","symptoms":"Deep joint pain (femoral head most common), collapse of bone, progressive articular destruction","goal":"Preserve femoral head; prevent collapse; relieve pain","soc":"Core decompression (surgical) for pre-collapse stage. Bisphosphonates (alendronate, zoledronate) reduce osteoclast activity and may prevent progression."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Bursa, Muscle, and Tendon Disorders","indication":"Fibromyalgia","symptoms":"Widespread musculoskeletal pain, fatigue, sleep disturbance, cognitive dysfunction ('fibro fog')","goal":"Reduce pain; improve sleep; restore function and quality of life","soc":"Duloxetine (Cymbalta) SNRI — FDA-approved; or pregabalin (Lyrica) — FDA-approved; or milnacipran (Savella) — FDA-approved. Aerobic exercise combined with pharmacotherapy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Bursa, Muscle, and Tendon Disorders","indication":"Tendinitis and Tenosynovitis","symptoms":"Localized tendon pain, swelling, stiffness; worsened with activity; common at shoulder, Achilles, wrist","goal":"Reduce inflammation; relieve pain; restore tendon function","soc":"Rest, ice, NSAIDs (ibuprofen or naproxen). Eccentric exercises. Corticosteroid injection for persistent cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Bursa, Muscle, and Tendon Disorders","indication":"Baker Cysts","symptoms":"Posterior knee swelling, stiffness, pain; fluid-filled popliteal cyst","goal":"Reduce cyst size; treat underlying joint pathology; relieve pain","soc":"Treat underlying cause (OA, RA, meniscal tear). NSAIDs (ibuprofen, naproxen) for pain/inflammation. Intra-articular corticosteroid injection for rapid relief."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Bursa, Muscle, and Tendon Disorders","indication":"Bursitis","symptoms":"Localized joint pain, tenderness, swelling over bursae; worsened with movement","goal":"Reduce inflammation; relieve pain; restore range of motion","soc":"Rest, ice, NSAIDs (ibuprofen 400–600 mg TID). Corticosteroid injection for refractory cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Plantar Fasciitis","symptoms":"Inferior heel pain worst with first morning steps; tenderness at calcaneal insertion","goal":"Reduce plantar fascial inflammation; restore pain-free ambulation","soc":"Stretching exercises (Achilles/plantar fascia), heel cup, NSAIDs. Corticosteroid injection for persistent cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Achilles Tendinopathy","symptoms":"Posterior heel and mid-Achilles pain, morning stiffness, tenderness on palpation","goal":"Restore tendon loading capacity; reduce pain; prevent rupture","soc":"Eccentric heel drop exercises (Alfredson protocol) are first-line. NSAIDs for acute pain phase."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Tibialis Posterior Tendinosis","symptoms":"Medial ankle/arch pain, progressive flat foot deformity, difficulty standing on tiptoe","goal":"Halt tendon degeneration; restore arch support; prevent flatfoot progression","soc":"Custom orthotics (medial arch support), NSAIDs, physical therapy with eccentric strengthening."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Bunion","symptoms":"Bony prominence at first MTP joint, pain with footwear, hallux valgus deformity","goal":"Relieve pain; correct alignment; prevent deformity progression","soc":"Wide toe-box shoes, bunion pads, orthotics. NSAIDs for pain. No pharmacologic disease-modifying therapy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Achilles Tendon Enthesopathy","symptoms":"Insertional Achilles pain at calcaneus, bone spurs, morning stiffness, pain with first steps","goal":"Reduce entheseal inflammation; restore pain-free ambulation","soc":"NSAIDs, heel wedge insoles, stretching, ESWT. Corticosteroid injection avoided at insertion site (rupture risk)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Metatarsophalangeal Joint Pain","symptoms":"Pain and swelling at ball of foot; stiffness in toe joints; hallux rigidus or synovitis","goal":"Reduce synovitis; preserve joint function; relieve pain","soc":"NSAIDs (ibuprofen, naproxen). Intra-articular corticosteroid injection for synovitis."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Metatarsalgia","symptoms":"Forefoot pain under metatarsal heads; worsened with walking and standing","goal":"Redistribute forefoot pressure; reduce metatarsal head pain; maintain activity","soc":"Metatarsal pad/orthotic, wide-toe shoes, NSAIDs for pain."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Hammer Toe Deformity","symptoms":"Curled/bent toe deformity, corns, pain with footwear, reduced toe extension","goal":"Relieve pain; prevent fixed deformity; correct toe alignment","soc":"Wide toe-box shoes, toe pads, metatarsal insoles, NSAIDs for associated pain. Corticosteroid injection for MTP synovitis."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Tarsal Tunnel Syndrome","symptoms":"Medial ankle pain, plantar foot numbness/tingling; positive Tinel sign at tarsal tunnel","goal":"Decompress posterior tibial nerve; relieve neuropathic pain; restore function","soc":"Orthotics (medial arch support), NSAIDs, corticosteroid injection at tarsal tunnel. Gabapentin/pregabalin for neuropathic pain."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Tibialis Posterior Tenosynovitis","symptoms":"Medial ankle swelling, pain along tibialis posterior tendon sheath, crepitus with movement","goal":"Reduce tenosynovial inflammation; prevent tendon rupture; restore function","soc":"Immobilization (boot/cast), NSAIDs, peritendinous corticosteroid injection."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Plantar Fibromatosis","symptoms":"Firm, painless plantar nodule(s); slowly enlarging fibrotic lesions on plantar fascia","goal":"Reduce nodule size; prevent functional impairment; relieve pain","soc":"Orthotics/offloading pads. Corticosteroid injections (temporary benefit). Verapamil topical/injection — off-label. No FDA-approved pharmacologic therapy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Interdigital Neuroma","symptoms":"Burning forefoot pain between 3rd-4th toes (Morton neuroma); worsened with tight shoes","goal":"Reduce perineural fibrosis pain; decompress nerve; prevent recurrence","soc":"Wide toe-box shoes, metatarsal pad, NSAIDs. Corticosteroid injection is highly effective first-line injection therapy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Medial and Lateral Plantar Nerve Entrapment","symptoms":"Heel and plantar foot pain with numbness; nerve entrapment at tarsal tunnel or arch","goal":"Decompress nerve; relieve pain and paresthesias; restore nerve conduction","soc":"Rest, orthotics (arch support), NSAIDs. Corticosteroid injection near entrapment site."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Posterior Achilles Tendon Bursitis","symptoms":"Posterior heel swelling and pain at superior calcaneal prominence; associated with Haglund deformity","goal":"Reduce retrocalcaneal bursal inflammation; relieve Haglund-related pain","soc":"Heel lift, open-back shoes, NSAIDs. Ultrasound-guided corticosteroid injection into retrocalcaneal bursa."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Freiberg Disease","symptoms":"Forefoot pain and swelling at 2nd or 3rd metatarsal head; osteonecrosis of metatarsal epiphysis","goal":"Relieve pain; prevent metatarsal head collapse; preserve joint function","soc":"Activity modification, metatarsal pad, NSAIDs, walking boot. No disease-modifying pharmacotherapy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Apophysitis of the Calcaneus","symptoms":"Heel pain in active children aged 8–14 during growth spurts; Sever disease; bilateral in 60%","goal":"Relieve pain; reduce apophyseal inflammation; maintain activity","soc":"Activity modification, heel cup insoles, calf stretching, NSAIDs (ibuprofen) for pain relief."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Anterior Achilles Tendon Bursitis","symptoms":"Deep anterior heel pain, swelling at Achilles insertion, Haglund deformity association","goal":"Reduce bursal inflammation; relieve pain; prevent recurrence","soc":"Heel pad, shoe modification, NSAIDs, ice. Corticosteroid injection into retrocalcaneal bursa."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Inferior Calcaneal Bursitis","symptoms":"Heel pad pain beneath calcaneus, especially with standing and walking; subcalcaneal bursitis","goal":"Reduce bursal inflammation; relieve heel pain; restore ambulation","soc":"Heel cup/cushion, NSAIDs, corticosteroid injection into inferior calcaneal bursa."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Foot and Ankle Disorders","indication":"Sesamoiditis","symptoms":"Pain beneath first metatarsal head at ball of foot; tender sesamoid bones; worse with push-off","goal":"Reduce sesamoid bone inflammation; offload pressure; prevent osteonecrosis","soc":"Sesamoid pad/dancer's pad, activity reduction, NSAIDs. Stiff-soled shoe or walking boot for severe cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Osteoarthritis of the Hand","symptoms":"Joint pain, stiffness, Heberden/Bouchard nodes at DIP/PIP joints; grip weakness; morning stiffness","goal":"Reduce pain; maintain hand function; slow cartilage loss","soc":"Topical NSAIDs (diclofenac gel 1% — Voltaren Arthritis Pain) are first-line pharmacologic therapy. Oral NSAIDs for additional pain control."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Carpal Tunnel Syndrome","symptoms":"Hand numbness, tingling (median nerve distribution), nocturnal symptoms, thenar wasting in severe cases","goal":"Decompress median nerve; relieve symptoms; prevent permanent nerve damage","soc":"Wrist splint (neutral position) at night. Oral NSAIDs or corticosteroids for short-term relief. Corticosteroid injection provides medium-term benefit."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Boutonnière Deformity","symptoms":"PIP joint flexion contracture with DIP hyperextension; follows extensor tendon injury or RA","goal":"Restore extensor mechanism; prevent fixed deformity; maintain grip function","soc":"PIP extension splinting. Physical therapy. Treat underlying RA (DMARDs/biologics) to prevent progression."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Swan-Neck Deformity","symptoms":"PIP hyperextension with DIP flexion; characteristic 'S-shape' deformity; seen in RA and connective tissue disease","goal":"Restore normal PIP/DIP motion balance; maintain grip; treat underlying RA","soc":"Silver ring splint to limit PIP hyperextension. Treat underlying RA with DMARDs/biologics."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Ganglia","symptoms":"Smooth cystic swelling arising from wrist/finger joint or tendon sheath; may cause pain or weakness","goal":"Relieve pain; eliminate cyst; prevent recurrence","soc":"Observation (many resolve spontaneously). Aspiration (cyst decompression). No pharmacologic SoC."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Trigger Finger (Stenosing Flexor Tenosynovitis)","symptoms":"Catching, clicking, or locking of finger during flexion/extension; A1 pulley inflammation","goal":"Free tendon gliding; eliminate triggering; reduce A1 pulley inflammation","soc":"Corticosteroid injection into A1 pulley/tendon sheath: ~60–70% success rate. Splinting as adjunct."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Cubital Tunnel Syndrome","symptoms":"Elbow/medial forearm pain, hand numbness (ring/little fingers), ulnar nerve compression","goal":"Decompress ulnar nerve; relieve neuropathic pain; preserve intrinsic hand strength","soc":"Elbow extension splint at night, activity modification (avoid elbow flexion >90°). NSAIDs. Corticosteroid injection around cubital tunnel for mild cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"De Quervain Syndrome","symptoms":"Radial wrist pain, tenderness at first dorsal compartment; positive Finkelstein test","goal":"Reduce tenosynovitis; relieve pain; restore thumb and wrist function","soc":"Corticosteroid injection into first dorsal compartment tendon sheath is the most effective first-line treatment. Thumb spica splint + NSAIDs."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Dupuytren Contracture","symptoms":"Progressive fibrous cord formation in palm; finger flexion contracture; inability to extend fingers","goal":"Restore finger extension; break down fibrous cords; prevent recurrence","soc":"Collagenase clostridium histolyticum (Xiaflex/Qwo) — FDA-approved 2010 for Dupuytren with palpable cord; enzymatic fasciotomy by injection."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Kienböck Disease","symptoms":"Wrist pain, stiffness, swelling; osteonecrosis of lunate bone; may progress to carpal collapse","goal":"Preserve or restore lunate vascularity; prevent carpal collapse; maintain wrist function","soc":"Stage I–IIIa: wrist immobilization + unloading (radial shortening osteotomy or external fixator). NSAIDs for pain. No pharmacologic disease-modifying therapy established."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Radial Tunnel Syndrome","symptoms":"Lateral elbow/proximal forearm pain; no motor weakness; compressive radial nerve neuropathy","goal":"Decompress radial nerve; relieve pain; restore forearm function","soc":"Rest, activity modification, NSAIDs. Corticosteroid injection near radial tunnel. Physical therapy with forearm stretching."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Infectious Flexor Tenosynovitis","symptoms":"Kanavel's four signs: finger held in flexion, symmetric swelling, tenderness along sheath, pain with passive extension","goal":"Urgent drainage of tendon sheath; eradicate bacteria; preserve flexor function","soc":"Urgent surgical drainage + irrigation of flexor tendon sheath. IV antibiotics: vancomycin + ceftriaxone empirically covering Staph, Strep, gram-negatives."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Infected Bite Wounds of the Hand","symptoms":"Painful, swollen hand wound after human/animal bite; progressive cellulitis, abscess, or septic arthritis risk","goal":"Eradicate infection; prevent septic arthritis and osteomyelitis; wound healing","soc":"Amoxicillin-clavulanate (Augmentin) 875/125 mg BID × 5–7 days for outpatient bite wound infection. IV ampicillin-sulbactam for severe infections."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Felon","symptoms":"Tense, throbbing fingertip pain; abscess in distal finger pulp space; purulent collection","goal":"Drain abscess; eradicate infection; preserve fingertip sensation and function","soc":"Surgical incision and drainage (I&D) is the cornerstone. Antibiotics (dicloxacillin or cephalexin for MSSA; TMP-SMX for MRSA coverage) post-I&D."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Palm Abscess","symptoms":"Fluctuant swelling with pain in midpalmar or thenar space; limited finger motion","goal":"Drain abscess; eradicate infection; preserve hand function","soc":"Surgical incision and drainage (I&D) is essential. Antibiotics: dicloxacillin/cephalexin (outpatient) or vancomycin + piperacillin-tazobactam (inpatient, severe cases)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Hand Disorders","indication":"Herpetic Whitlow","symptoms":"Painful vesicular eruption on finger; HSV-1 or HSV-2 infection of the fingertip","goal":"Shorten episode duration; relieve pain; prevent transmission and recurrence","soc":"Oral acyclovir 400 mg 5×/day × 7–10 days (or valacyclovir 1 g BID × 7 days) for primary episode."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Infections of Joints and Bones","indication":"Prosthetic Joint Infectious Arthritis","symptoms":"Periprosthetic joint pain, swelling, loosening; fever; elevated ESR/CRP after arthroplasty","goal":"Eradicate biofilm infection; preserve or salvage prosthesis; prevent systemic sepsis","soc":"Two-stage exchange arthroplasty (prosthesis removal + interval antibiotic spacer + reimplantation) + prolonged antibiotics. Rifampin-based oral regimens for biofilm-active therapy post-débridement."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Infections of Joints and Bones","indication":"Osteomyelitis","symptoms":"Bone pain, tenderness, fever; elevated CRP/ESR; MRI shows bone marrow edema","goal":"Eradicate bone infection; preserve bone integrity; prevent chronic osteomyelitis","soc":"IV antibiotics: nafcillin/cefazolin for MSSA; vancomycin for MRSA; ceftriaxone for gram-negatives. Surgical debridement for chronic or hardware-associated osteomyelitis."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Infections of Joints and Bones","indication":"Acute Infectious Arthritis","symptoms":"Sudden hot, swollen monoarthritis; fever; elevated WBC/ESR; joint aspirate shows bacteria","goal":"Eradicate joint infection; preserve joint function; prevent systemic sepsis","soc":"Urgent joint aspiration + IV antibiotics: nafcillin/oxacillin for MSSA; vancomycin for MRSA; ceftriaxone for N. gonorrhoeae; gram-negative coverage with cefepime or piperacillin-tazobactam."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Infections of Joints and Bones","indication":"Chronic Infectious Arthritis","symptoms":"Persistent joint pain, swelling, and restriction >6 weeks; mycobacterial, fungal, or Lyme etiology","goal":"Eradicate chronic pathogen; preserve joint integrity; prevent recurrence","soc":"Pathogen-specific regimen: rifampin-based for TB arthritis (RIPE × 6–9 months); doxycycline for Lyme arthritis; antifungals for fungal arthritis (fluconazole, itraconazole, voriconazole)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Joint Disorders","indication":"Osteoarthritis (OA)","symptoms":"Joint pain, stiffness, crepitus, reduced range of motion; worse with activity; commonly knee, hip, hand","goal":"Reduce pain; improve function; slow structural progression","soc":"Topical NSAIDs (diclofenac gel) for hand/knee OA; oral NSAIDs (naproxen, ibuprofen, celecoxib) for moderate-severe pain. Exercise + weight loss as cornerstone."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Joint Disorders","indication":"Neuropathic Arthropathy","symptoms":"Painless or relatively painless joint destruction; massive joint swelling; associated with DM, syphilis, or syringomyelia (Charcot joint)","goal":"Offload joint; prevent further destruction; manage underlying neuropathy","soc":"Total contact casting (TCC) for Charcot foot neuropathy. Bisphosphonates (IV pamidronate or zoledronate) to reduce osteoclast activity. Treat underlying diabetes aggressively."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Lumbar Disc Herniation","symptoms":"Lower back and leg pain (sciatica), dermatomal numbness/weakness; worse with sitting/Valsalva","goal":"Relieve radicular pain; reduce disc herniation; restore lumbar function","soc":"NSAIDs (naproxen, ibuprofen, diclofenac) + muscle relaxants. Lumbar epidural steroid injection for moderate-severe radiculopathy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Spondylolisthesis","symptoms":"Low back pain, neurogenic claudication, radiculopathy; one vertebra slipped forward on another","goal":"Stabilize slippage; relieve nerve compression; reduce pain","soc":"NSAIDs + physical therapy (core stabilization, extension exercises). Epidural steroid injection for radiculopathy. Surgery (spinal fusion) for high-grade or refractory cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Lumbosacral Radiculopathy","symptoms":"Shooting leg pain, numbness in dermatomal pattern, weakness; positive straight leg raise; L4-S1 most common","goal":"Relieve radicular pain; restore neurological function; prevent chronification","soc":"NSAIDs + short course oral steroids. Lumbar transforaminal epidural steroid injection for persistent (>6 weeks) radiculopathy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Cervical Disc Herniation","symptoms":"Neck/arm pain (radiculopathy), numbness/weakness in dermatomal distribution; worsened with neck movement","goal":"Relieve radicular pain; decompress nerve root; restore cervical function","soc":"NSAIDs (naproxen, ibuprofen) + muscle relaxants (cyclobenzaprine). Oral corticosteroid taper (medrol dose pack) for acute radiculopathy. Cervical epidural steroid injection for persistent radiculopathy."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Lumbar Spinal Stenosis","symptoms":"Neurogenic claudication (leg pain/weakness with walking); relieved by sitting or forward flexion","goal":"Relieve neurogenic claudication; increase walking distance; prevent surgical escalation","soc":"NSAIDs + physical therapy (flexion-based exercises). Epidural steroid injections for short-term claudication relief."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Cervical Spinal Stenosis","symptoms":"Bilateral hand numbness, gait disturbance, bladder dysfunction; cervical myelopathy in severe cases","goal":"Decompress spinal cord; prevent myelopathic progression; relieve radicular symptoms","soc":"For myelopathy: surgical decompression (ACDF or laminoplasty) is first-line. For symptomatic radiculopathy without myelopathy: NSAIDs + cervical epidural steroid injections."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Coccyx Disorders","symptoms":"Pain, instability, or deformity of the coccyx; worse with sitting or standing transitions","goal":"Eliminate pain; restore mobility; prevent chronic pain syndrome","soc":"Conservative: NSAIDs, coccyx cushion, corticosteroid injections. Same as coccygeal pain management."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Atlantoaxial Subluxation","symptoms":"Neck pain, headache, C2 neurological symptoms; upper cervical instability; risk of spinal cord compression","goal":"Stabilize C1-C2 articulation; prevent cord compression; relieve pain","soc":"Cervical collar immobilization. Treat underlying RA/Down syndrome aggressively with DMARDs. Surgical fusion (C1-C2 arthrodesis) for significant instability or neurologic compromise."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Neck and Back Pain","indication":"Coccygeal Area Pain","symptoms":"Tailbone pain worsened by sitting; localized tenderness at coccyx","goal":"Relieve pain; restore sitting tolerance; prevent chronification","soc":"Donut/coccyx cushion, NSAIDs (ibuprofen), local corticosteroid injection."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Crystal Arthropathies","indication":"Gout","symptoms":"Sudden severe joint pain and swelling (big toe, ankle, knee); tophi; hyperuricemia","goal":"Terminate acute flares; lower serum uric acid; prevent tophi and joint damage","soc":"Acute flare: colchicine (0.6 mg BID); NSAIDs (indomethacin); corticosteroids. Urate-lowering therapy (ULT): allopurinol is first-line ULT (target sUA <6 mg/dL)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Crystal Arthropathies","indication":"Basic Calcium Phosphate Crystal Deposition Disease","symptoms":"Acute periarticular pain, swelling at shoulder (calcific tendinitis); can mimic gout","goal":"Relieve acute pain; dissolve calcium deposits; prevent recurrence","soc":"NSAIDs (indomethacin, naproxen) for acute flares. Corticosteroid injection for rapid relief. Colchicine as alternative."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Crystal Arthropathies","indication":"Calcium Pyrophosphate Deposition Disease","symptoms":"Acute pseudogout (knee, wrist swelling), chondrocalcinosis on X-ray, chronic arthropathy","goal":"Terminate acute flares; prevent recurrence; manage underlying metabolic cause","soc":"NSAIDs (indomethacin, naproxen) or colchicine for acute pseudogout. Intra-articular corticosteroid injection for monoarticular flares."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Crystal Arthropathies","indication":"Calcium Oxalate Crystal Deposition Disease","symptoms":"Acute arthritis, chondrocalcinosis in patients with renal failure or primary hyperoxaluria","goal":"Manage acute arthritis; reduce oxalate burden; treat underlying cause","soc":"NSAIDs or colchicine for acute attacks. Treat underlying cause: dialysis optimization, vitamin C restriction, pyridoxine for hyperoxaluria."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"IgG4-Related Disease","indication":"IgG4-Related Disease","symptoms":"Multi-organ fibrosis and inflammation; pancreatic swelling (autoimmune pancreatitis), salivary gland enlargement, orbital disease","goal":"Induce remission; prevent fibrosis progression; reduce mass lesions","soc":"Prednisone (0.6–1 mg/kg/day) is first-line induction; rituximab (anti-CD20) increasingly used upfront for relapsing-remitting or steroid-refractory cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Inflammatory Arthritis","indication":"Psoriatic Arthritis","symptoms":"Inflammatory joint pain, skin psoriasis, dactylitis, enthesitis, nail pitting; axial involvement","goal":"Inhibit joint inflammation and structural damage; clear skin; restore function","soc":"TNF inhibitors (adalimumab, etanercept, golimumab, infliximab, certolizumab) are most established first-line for moderate-severe PsA. Methotrexate for peripheral arthritis."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Inflammatory Arthritis","indication":"Rheumatoid Arthritis (RA)","symptoms":"Symmetric small joint swelling/stiffness, morning stiffness >1 hour, RF/anti-CCP positive, extra-articular manifestations","goal":"Achieve remission or low disease activity; prevent joint erosion and disability","soc":"Methotrexate 15–25 mg/week is the anchor DMARD. Add biologic (TNF inhibitor or JAK inhibitor) for inadequate MTX response."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Inflammatory Arthritis","indication":"Seronegative Spondyloarthropathies","symptoms":"Inflammatory back pain, peripheral arthritis, enthesitis, uveitis; RF negative; HLA-B27 positive","goal":"Control inflammation; prevent ankylosis; maintain spinal mobility","soc":"NSAIDs (continuous use for axial disease) + physical therapy. TNF inhibitors or IL-17A inhibitors for NSAID-refractory."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Inflammatory Arthritis","indication":"Ankylosing Spondylitis","symptoms":"Chronic inflammatory back pain, morning stiffness >1 hour, sacroiliitis; improves with exercise","goal":"Reduce spinal inflammation; prevent ankylosis; improve mobility and function","soc":"NSAIDs (indomethacin, naproxen, diclofenac, celecoxib) are first-line: anti-inflammatory + may slow radiographic progression. TNF inhibitors (adalimumab, etanercept, certolizumab) for NSAID-inadequate response."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Inflammatory Arthritis","indication":"Reactive Arthritis","symptoms":"Asymmetric oligoarthritis following GI or urogenital infection; urethritis, conjunctivitis triad (Reiter syndrome)","goal":"Control inflammation; eliminate triggering pathogen; prevent chronification","soc":"NSAIDs (indomethacin, naproxen) are first-line for acute arthritis. Antibiotics for active C. trachomatis or enteric infection (doxycycline × 3 months for chlamydial reactive arthritis)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Systemic Rheumatic Diseases","indication":"Sjögren Syndrome","symptoms":"Dry eyes (keratoconjunctivitis sicca), dry mouth (xerostomia), fatigue, arthralgia; anti-SSA/SSB antibodies","goal":"Relieve sicca symptoms; prevent systemic complications; manage fatigue","soc":"Artificial tears + pilocarpine (Salagen) or cevimeline (Evoxac) for dry eye/mouth. Hydroxychloroquine for systemic/articular manifestations."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Systemic Rheumatic Diseases","indication":"Systemic Lupus Erythematosus (SLE)","symptoms":"Multi-organ inflammation; malar rash, arthritis, nephritis, serositis; ANA + ds-DNA antibodies","goal":"Induce remission; prevent flares and organ damage; protect kidneys","soc":"Hydroxychloroquine (Plaquenil) 200–400 mg/day is foundational. Oral corticosteroids for flares. Belimumab (Benlysta, anti-BLyS) FDA-approved for active SLE."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Systemic Rheumatic Diseases","indication":"Idiopathic Inflammatory Myopathies","symptoms":"Proximal muscle weakness, elevated CK, skin rash (dermatomyositis), interstitial lung disease risk","goal":"Restore muscle strength; prevent ILD progression; induce remission","soc":"High-dose corticosteroids (prednisone 1 mg/kg/day) + methotrexate or azathioprine as steroid-sparing agents. IVIG for refractory dermatomyositis."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Systemic Rheumatic Diseases","indication":"Mixed Connective Tissue Disease (MCTD)","symptoms":"Overlapping features of SLE, SSc, and myositis; Raynaud's, swollen hands, U1-RNP antibodies positive","goal":"Control inflammation; treat dominant organ manifestation; prevent vascular/pulmonary complications","soc":"Hydroxychloroquine (Plaquenil) as baseline therapy + low-dose corticosteroids. Treatment of dominant phenotype: SLE-like → immunosuppressants; SSc-like → vasodilators; myositis → steroids/MTX."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Systemic Rheumatic Diseases","indication":"Systemic Sclerosis","symptoms":"Raynaud's phenomenon, skin thickening (fibrosis), ILD, pulmonary hypertension, GI dysmotility","goal":"Control Raynaud's; slow skin/lung fibrosis; prevent vascular crises","soc":"Raynaud's: dihydropyridine CCBs (nifedipine). ILD: mycophenolate mofetil (SLS II trial) or nintedanib (Ofev, FDA-approved 2019 for SSc-ILD). Scleroderma renal crisis: ACE inhibitors (captopril)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Systemic Rheumatic Diseases","indication":"Relapsing Polychondritis","symptoms":"Recurrent inflammation of cartilage (ears, nose, trachea); auricular chondritis, saddle nose, airway involvement","goal":"Suppress cartilaginous inflammation; prevent structural collapse; manage airway risk","soc":"NSAIDs for mild auricular chondritis. Oral corticosteroids (prednisone 1 mg/kg/day) for systemic or severe cases. Dapsone as steroid-sparing agent."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Systemic Rheumatic Diseases","indication":"Eosinophilic Fasciitis","symptoms":"Woody skin induration, peau d'orange texture, eosinophilia, limb swelling sparing skin over digits","goal":"Suppress eosinophilic inflammation; prevent fascial fibrosis; restore limb mobility","soc":"High-dose corticosteroids (prednisone 1 mg/kg/day) are the cornerstone of therapy; most patients respond well."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Polymyalgia Rheumatica","symptoms":"Bilateral shoulder and pelvic girdle pain and stiffness, morning stiffness >45 min, elevated ESR/CRP; age >50","goal":"Rapid symptom relief; prevent GCA co-occurrence; minimize steroid toxicity","soc":"Low-dose prednisone (15–20 mg/day) provides dramatic, rapid improvement (diagnostic response) — first-line treatment."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Giant Cell Arteritis","symptoms":"Temporal headache, jaw claudication, visual loss risk, elevated ESR/CRP; age >50","goal":"Prevent blindness and aortic complications; suppress granulomatous inflammation; taper steroids","soc":"High-dose oral corticosteroids (prednisone 40–60 mg/day; IV pulse for visual symptoms). Tocilizumab (Actemra) — IL-6R inhibitor — FDA-approved 2017 as steroid-sparing adjunct (GiACTA trial)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Granulomatosis with Polyangiitis (GPA)","symptoms":"Sinusitis, pulmonary infiltrates/nodules, rapidly progressive glomerulonephritis; ANCA-PR3 positive","goal":"Induce ANCA-associated vasculitis remission; preserve renal function; prevent relapse","soc":"Rituximab (Rituxan, anti-CD20) + high-dose methylprednisolone for induction (RAVE trial superiority over cyclophosphamide). Avacopan (Tavneos) replaces high-dose corticosteroids (FDA-approved 2021)."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Microscopic Polyangiitis (MPA)","symptoms":"Rapidly progressive glomerulonephritis, pulmonary hemorrhage, mononeuritis multiplex; ANCA-MPO positive","goal":"Induce remission; preserve renal function; prevent relapse","soc":"Rituximab + high-dose methylprednisolone (RAVE/RITUXVAS) or cyclophosphamide + methylprednisolone. Avacopan (Tavneos) as steroid-sparing agent in induction."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Behçet Disease","symptoms":"Recurrent oral aphthous ulcers, genital ulcers, uveitis, skin lesions; pathergy positive","goal":"Prevent recurrent ulcers and ocular damage; control systemic inflammation","soc":"Colchicine (0.5–2 mg/day) for mucocutaneous manifestations. Azathioprine + corticosteroids for ocular involvement. Apremilast (Otezla) FDA-approved in 2023 for Behçet oral ulcers."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Immunoglobulin A–Associated Vasculitis (IgAV)","symptoms":"Palpable purpura (lower extremities), arthritis, abdominal pain, renal involvement (IgA nephropathy); Henoch-Schönlein Purpura","goal":"Control skin/GI/joint symptoms; prevent nephritis progression; maintain renal function","soc":"Corticosteroids (prednisone 1 mg/kg/day) for significant GI or renal involvement. NSAIDs for arthritis. Supportive care for mild cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Cutaneous Vasculitis","symptoms":"Palpable purpura on lower extremities; possible arthralgias; skin biopsy shows leukocytoclastic vasculitis","goal":"Control skin inflammation; identify and remove triggering cause; prevent systemic extension","soc":"Remove trigger (drug, infection). For persistent cases: oral corticosteroids (prednisone 20–40 mg/day). Colchicine or dapsone for chronic limited cutaneous vasculitis."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Eosinophilic Granulomatosis with Polyangiitis (EGPA)","symptoms":"Asthma, peripheral eosinophilia, sinusitis, granulomatous vasculitis; peripheral neuropathy; cardiac involvement","goal":"Induce remission; control eosinophilic inflammation; preserve cardiac/nerve function","soc":"High-dose corticosteroids (prednisone 1 mg/kg/day) ± cyclophosphamide for organ-threatening disease. Mepolizumab (Nucala, anti-IL-5) FDA-approved 2017 for EGPA — reduces eosinophilia and relapse rate."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Takayasu Arteritis","symptoms":"Upper extremity claudication, pulselessness, hypertension, carotid/aortic bruits; young women; large-vessel vasculitis","goal":"Suppress aortic wall inflammation; prevent ischemic complications; enable revascularization","soc":"High-dose corticosteroids (prednisone 1 mg/kg/day). Methotrexate or azathioprine as steroid-sparing agents. Tocilizumab increasingly used for refractory cases."},{"ta":"Musculoskeletal and Rheumatology","subcategory":"Vasculitis","indication":"Polyarteritis Nodosa (PAN)","symptoms":"Fever, weight loss, renal involvement, peripheral neuropathy, abdominal pain, hypertension; medium-vessel vasculitis","goal":"Suppress medium-vessel inflammation; prevent organ damage; achieve remission","soc":"High-dose prednisone (1 mg/kg/day) is first-line. Cyclophosphamide added for severe/renal involvement (FFS ≥1)."},{"ta":"Neurosciences","subcategory":"Autonomic Nervous System","indication":"Autonomic Neuropathies","symptoms":"Orthostatic hypotension, bowel/bladder dysfunction, anhidrosis, tachycardia","goal":"Manage orthostatic hypotension, improve autonomic symptoms","soc":"Midodrine (ProAmatine) — alpha-1 agonist — or fludrocortisone (Florinef) — mineralocorticoid — for orthostatic hypotension."},{"ta":"Neurosciences","subcategory":"Autonomic Nervous System","indication":"Multiple System Atrophy","symptoms":"Parkinsonism, cerebellar ataxia, autonomic failure, rapid progression","goal":"Manage autonomic symptoms, maintain function, slow progression","soc":"No disease-modifying therapy — symptomatic: midodrine or fludrocortisone for orthostatic hypotension; levodopa (limited benefit)."},{"ta":"Neurosciences","subcategory":"Autonomic Nervous System","indication":"Pure Autonomic Failure","symptoms":"Orthostatic hypotension, syncope, bladder dysfunction, constipation, without somatic neuropathy","goal":"Prevent syncopal falls, manage orthostatic hypotension","soc":"Midodrine (2.5–10 mg TID) — alpha-1 agonist — or droxidopa (Northera 100–600 mg TID) for neurogenic orthostatic hypotension."},{"ta":"Neurosciences","subcategory":"Autonomic Nervous System","indication":"Horner Syndrome","symptoms":"Ptosis, miosis, anhidrosis (ipsilateral), with underlying cause symptoms","goal":"Identify and treat underlying cause (e.g., carotid dissection, lung tumor)","soc":"None pharmacologic for Horner itself — treatment targets underlying etiology (e.g., anticoagulation for carotid dissection, tumor treatment)."},{"ta":"Neurosciences","subcategory":"Brain Infections","indication":"Encephalitis","symptoms":"Fever, headache, altered mental status, seizures, focal deficits","goal":"Eradicate causative pathogen, reduce inflammation, prevent death","soc":"Acyclovir 10 mg/kg IV q8h — empiric for HSV encephalitis (most common treatable viral cause); started empirically while awaiting CSF results."},{"ta":"Neurosciences","subcategory":"Brain Infections","indication":"Progressive Multifocal Leukoencephalopathy (PML)","symptoms":"Progressive cognitive decline, motor weakness, vision loss, ataxia","goal":"Restore immune function, suppress JC virus replication","soc":"No approved antiviral — primary strategy is immune reconstitution: discontinue immunosuppressant (natalizumab, fingolimod); use plasma exchange (PLEX) to clear natalizumab."},{"ta":"Neurosciences","subcategory":"Brain Infections","indication":"Brain Abscess","symptoms":"Headache, fever, focal deficits, seizures, altered consciousness","goal":"Eradicate infection, reduce mass effect, prevent rupture","soc":"Metronidazole 500 mg IV q8h + ceftriaxone 2g IV q12h (empiric) — broad-spectrum antibiotic combination covering anaerobes, streptococci, gram-negatives."},{"ta":"Neurosciences","subcategory":"Brain Infections","indication":"Intracranial Epidural Abscess and Subdural Empyema","symptoms":"Severe headache, fever, focal deficits, altered consciousness, rapid deterioration","goal":"Urgent surgical drainage, eradicate infection, prevent death","soc":"Neurosurgical drainage (craniotomy or burr hole) + empiric IV antibiotics: vancomycin + ceftriaxone + metronidazole."},{"ta":"Neurosciences","subcategory":"Brain Infections","indication":"Rabies","symptoms":"Encephalitis, hydrophobia, aerophobia, agitation, progresses to coma","goal":"Prevent disease with PEP; no cure once encephalitic phase begins","soc":"Post-exposure prophylaxis (PEP): rabies immune globulin (RIG, Imogam Rabies-HT) + rabies vaccine series (days 0, 3, 7, 14) — essentially 100% effective if given promptly."},{"ta":"Neurosciences","subcategory":"Brain Infections","indication":"Helminthic Brain Infections","symptoms":"Seizures, headache, focal deficits, hydrocephalus (neurocysticercosis most common)","goal":"Kill parasites, reduce inflammation, control seizures","soc":"Albendazole 15 mg/kg/day (max 1200 mg/day) × 10–28 days — antiparasitic agent, first-line for neurocysticercosis."},{"ta":"Neurosciences","subcategory":"Coma and Impaired Consciousness","indication":"Coma","symptoms":"Unresponsive, eyes closed, no purposeful movement, absent sleep-wake cycle","goal":"Identify and treat underlying cause, support vital functions, promote recovery","soc":"Thiamine 100 mg IV (Wernicke's prevention) + dextrose 50% + naloxone 0.4–2 mg IV — empiric 'coma cocktail'; treat specific identified etiology."},{"ta":"Neurosciences","subcategory":"Coma and Impaired Consciousness","indication":"Vegetative State and Minimally Conscious State","symptoms":"No conscious awareness (VS) or minimal signs of awareness (MCS), preserved sleep-wake cycles","goal":"Facilitate recovery of consciousness and functional communication","soc":"Amantadine 100–200 mg BID — FDA-recognized treatment (NEJM 2012 trial showed improved DOC recovery) for post-traumatic VS/MCS."},{"ta":"Neurosciences","subcategory":"Coma and Impaired Consciousness","indication":"Brain Herniation","symptoms":"Deteriorating consciousness, Cushing's triad, posturing, fixed dilated pupil","goal":"Reduce ICP urgently, prevent brainstem compression, save life","soc":"Mannitol 20% 1 g/kg IV bolus or hypertonic saline 23.4% 30 mL IV — for emergent ICP reduction. Dexamethasone for vasogenic edema (tumor-related)."},{"ta":"Neurosciences","subcategory":"Coma and Impaired Consciousness","indication":"Locked-In Syndrome","symptoms":"Quadriplegia, anarthria, preserved consciousness, only vertical eye movements","goal":"Communication support, prevent complications, improve functional outcomes","soc":"None pharmacologic — communication aids (eye-tracking, BCI); prevention of complications (DVT prophylaxis, nutrition)."},{"ta":"Neurosciences","subcategory":"Coma and Impaired Consciousness","indication":"Brain Death","symptoms":"Absence of all brain function, fixed/dilated pupils, no brainstem reflexes, apnea","goal":"Organ donor management; no treatment for brain death itself","soc":"None — brain death is irreversible; management focuses on organ preservation for donation."},{"ta":"Neurosciences","subcategory":"Craniocervical Junction Abnormalities","indication":"Craniocervical Junction Abnormalities","symptoms":"Neck pain, myelopathy, ataxia, lower cranial nerve deficits, respiratory failure","goal":"Decompress neural structures, stabilize craniocervical junction","soc":"None pharmacologic — surgical decompression (foramen magnum decompression) ± occipitocervical fusion for instability."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Dementia","symptoms":"Memory loss, cognitive decline, personality changes, functional impairment","goal":"Slow cognitive decline, manage behavioral symptoms, maintain independence","soc":"Donepezil (Aricept) — acetylcholinesterase inhibitor — all stages; memantine (Namenda) for moderate-severe AD."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Alzheimer Disease","symptoms":"Memory loss, confusion, language problems, behavioral changes, inability to care for self","goal":"Slow amyloid accumulation, preserve cognitive function","soc":"Lecanemab (Leqembi, Eisai/Biogen, FDA-approved 2023) — anti-amyloid monoclonal antibody — for early AD; acetylcholinesterase inhibitors (donepezil, rivastigmine) for symptomatic management."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Dementia with Lewy Bodies and Parkinson Disease Dementia","symptoms":"Fluctuating cognition, visual hallucinations, Parkinsonism, REM sleep disorder","goal":"Manage cognitive symptoms, control hallucinations, treat motor features","soc":"Rivastigmine (Exelon) — AChEI — only FDA-approved drug for Parkinson's disease dementia; used off-label for DLB."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Behavioral and Psychologic Symptoms of Dementia","symptoms":"Agitation, aggression, psychosis, depression, wandering in dementia patients","goal":"Reduce agitation and psychosis, improve caregiver burden","soc":"Non-pharmacologic first; brexpiprazole (Rexulti, FDA-approved 2023) — atypical antipsychotic — first FDA-approved drug specifically for Alzheimer's-related agitation."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Vascular Cognitive Impairment and Dementia","symptoms":"Stepwise cognitive decline, memory impairment, executive dysfunction, focal deficits","goal":"Prevent further strokes, manage risk factors, slow cognitive decline","soc":"Antiplatelet therapy (aspirin 81 mg or clopidogrel) + aggressive vascular risk factor management (antihypertensives, statins); no approved cognitive-specific pharmacotherapy."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Delirium","symptoms":"Acute confusion, fluctuating consciousness, inattention, disorganized thinking","goal":"Identify and treat precipitating cause, restore orientation, prevent complications","soc":"Non-pharmacologic reorientation, sleep hygiene, sensory correction; haloperidol 0.25–0.5 mg IV/PO for hyperactive delirium symptoms — widely used though evidence base is limited."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Normal Pressure Hydrocephalus","symptoms":"Gait instability, urinary incontinence, cognitive decline (Hakim's triad)","goal":"Restore CSF flow, improve gait and cognition","soc":"None pharmacologic — ventriculoperitoneal (VP) shunt or lumboperitoneal shunt for symptomatic NPH."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Frontotemporal Dementia (FTD)","symptoms":"Personality changes, disinhibition, apathy, language difficulties, poor judgment","goal":"Manage behavioral symptoms; no disease-modifying treatments available","soc":"No FDA-approved drug for FTD — SSRIs (sertraline 50–200 mg/day) for behavioral/emotional symptoms (best-studied off-label agent)."},{"ta":"Neurosciences","subcategory":"Delirium and Dementia","indication":"Chronic Traumatic Encephalopathy (CTE)","symptoms":"Cognitive decline, mood changes, aggression, depression, progressive dementia","goal":"No disease-modifying treatment; manage behavioral and cognitive symptoms","soc":"None — no FDA-approved treatment; symptomatic management: SSRIs for depression, AChEI for cognitive symptoms (off-label), antipsychotics for aggression."},{"ta":"Neurosciences","subcategory":"Demyelinating Disorders","indication":"Multiple Sclerosis (MS)","symptoms":"Fatigue, visual disturbance, numbness, weakness, balance problems, cognitive fog","goal":"Reduce relapse rate, slow disability progression, manage symptoms","soc":"High-efficacy DMTs recommended early: ocrelizumab (Ocrevus, Roche) or natalizumab (Tysabri) for high-disease-activity RRMS; interferons/glatiramer acetate for mild-moderate."},{"ta":"Neurosciences","subcategory":"Demyelinating Disorders","indication":"Neuromyelitis Optica Spectrum Disorder (NMOSD)","symptoms":"Optic neuritis, transverse myelitis, severe attacks, area postrema syndrome","goal":"Prevent attacks, reduce disability accumulation","soc":"Inebilizumab (Uplizna, CD19 mAb, FDA-approved 2020) or satralizumab (Enspryng, IL-6R mAb, FDA-approved 2020); eculizumab (Soliris, FDA-approved 2019) for AQP4+ NMOSD."},{"ta":"Neurosciences","subcategory":"Function and Dysfunction of the Cerebral Lobes","indication":"COVID-Related Neuropsychiatric Manifestations","symptoms":"Brain fog, fatigue, depression, anxiety, memory problems, headache","goal":"Reduce neuroinflammation, restore cognitive and psychiatric function","soc":"No FDA-approved treatment for neuro-COVID/Long COVID — symptomatic: SSRIs for depression/anxiety, low-dose naltrexone for fatigue (investigational), antihistamines for mast cell activation."},{"ta":"Neurosciences","subcategory":"Function and Dysfunction of the Cerebral Lobes","indication":"Aphasia","symptoms":"Impaired speaking, comprehension, reading, writing after brain injury","goal":"Restore communication through speech therapy, improve quality of life","soc":"Speech-language therapy (SLT) — intensive aphasia therapy is the cornerstone of management; no pharmacologic first-line SoC."},{"ta":"Neurosciences","subcategory":"Function and Dysfunction of the Cerebral Lobes","indication":"Amnesias","symptoms":"Memory impairment (anterograde or retrograde), confabulation, disorientation","goal":"Identify and treat underlying cause; cognitive rehabilitation","soc":"Thiamine 100 mg IV/IM for Wernicke-Korsakoff syndrome. No pharmacologic treatment for other amnesias."},{"ta":"Neurosciences","subcategory":"Function and Dysfunction of the Cerebral Lobes","indication":"Agnosia","symptoms":"Inability to recognize objects, faces, or sounds despite intact senses","goal":"Compensatory strategies, treat underlying cause, cognitive rehabilitation","soc":"None pharmacologic — cognitive rehabilitation and compensatory strategy training."},{"ta":"Neurosciences","subcategory":"Function and Dysfunction of the Cerebral Lobes","indication":"Apraxia","symptoms":"Unable to perform skilled movements on command despite intact motor/sensory function","goal":"Restore functional motor planning through rehabilitation","soc":"None pharmacologic — occupational and speech therapy for limb and speech apraxia."},{"ta":"Neurosciences","subcategory":"Function and Dysfunction of the Cerebral Lobes","indication":"Transient Global Amnesia","symptoms":"Sudden onset anterograde amnesia, repetitive questioning, confusion, resolves in 24h","goal":"Reassurance, rule out TIA/stroke, observe for resolution","soc":"None pharmacologic — supportive care; observation for 24 hours. No treatment required."},{"ta":"Neurosciences","subcategory":"Headache","indication":"Migraine","symptoms":"Severe unilateral throbbing headache, nausea, photo/phonophobia, aura in some","goal":"Abort attacks, prevent monthly migraine days, restore function","soc":"Acute: sumatriptan (Imitrex) or ubrogepant (Ubrelvy, CGRP receptor antagonist) or rimegepant (Nurtec). Preventive: erenumab (Aimovig), fremanezumab (Ajovy), galcanezumab (Emgality), or eptinezumab (Vyepti) — anti-CGRP mAbs."},{"ta":"Neurosciences","subcategory":"Headache","indication":"Tension-Type Headache","symptoms":"Bilateral pressing/tightening mild-moderate headache, no nausea, no photo/phonophobia","goal":"Relieve acute headache, prevent frequent episodic/chronic TTH","soc":"Aspirin 500–1000 mg or ibuprofen 200–400 mg or acetaminophen 1000 mg — for acute TTH. Amitriptyline 10–75 mg/day for chronic TTH prevention."},{"ta":"Neurosciences","subcategory":"Headache","indication":"Medication Overuse Headache","symptoms":"Daily or near-daily headache, worsening with frequent analgesic use, rebound pattern","goal":"Detoxify from overused medication, prevent transformation to chronic migraine","soc":"Medication withdrawal (first-line); bridge therapy with NSAIDs, naratriptan, or prednisone during withdrawal; preventive migraine therapy (topiramate, amitriptyline)."},{"ta":"Neurosciences","subcategory":"Headache","indication":"Cluster Headache","symptoms":"Unilateral periorbital excruciating pain, lacrimation, rhinorrhea, autonomic symptoms, clustered attacks","goal":"Abort attacks quickly, prevent cluster periods","soc":"Sumatriptan 6 mg SC (triptan) for acute attack abort + high-flow O2 (100% via NRB) — both first-line for acute attacks."},{"ta":"Neurosciences","subcategory":"Headache","indication":"Idiopathic Intracranial Hypertension","symptoms":"Headache, pulsatile tinnitus, transient visual obscurations, papilledema, visual loss","goal":"Reduce CSF pressure, preserve vision, resolve headache","soc":"Acetazolamide (Diamox) — carbonic anhydrase inhibitor — 250–2000 mg/day; weight loss for obese patients."},{"ta":"Neurosciences","subcategory":"Headache","indication":"Postlumbar Puncture and Other Low–Pressure Headaches","symptoms":"Positional headache (worse upright, better supine), neck stiffness, nausea after LP","goal":"Seal CSF leak, relieve headache, restore CSF pressure","soc":"Conservative: caffeine 300 mg oral/IV, bedrest, IV fluids. Epidural blood patch (EBP) — 15–20 mL autologous blood — for refractory cases (most effective definitive treatment)."},{"ta":"Neurosciences","subcategory":"Headache","indication":"Short-Lasting Unilateral Neuralgiform Headache With Conjunctival Injection and Tearing (SUNCT)","symptoms":"Brief stabbing periorbital pain attacks, conjunctival injection, tearing, hundreds of attacks/day","goal":"Prevent attacks, abort individual attacks","soc":"Lamotrigine 25–400 mg/day — first-line preventive for SUNCT (only agent with meaningful evidence)."},{"ta":"Neurosciences","subcategory":"Meningitis","indication":"Viral Meningitis","symptoms":"Headache, fever, stiff neck, photophobia; benign, self-limited course","goal":"Supportive symptom management; acyclovir for HSV","soc":"Acyclovir 10 mg/kg IV q8h empirically until HSV confirmed or excluded — most viral causes (enteroviruses) are self-limited ing cause urgently, relieve ptosis/diplopia","soc":"None pharmacologic — surgical emergency if pupil-involving (rule out posterior communicating artery aneurysm); treat underlying vascular/inflammatory cause."},{"ta":"Neurosciences","subcategory":"Pain","indication":"Chronic Widespread (Centralized) Pain","symptoms":"Diffuse muscle and joint pain, fatigue, sleep disturbance, cognitive fog","goal":"Reduce pain, improve function, restore sleep and quality of life","soc":"Duloxetine (Cymbalta) — SNRI — or pregabalin (Lyrica) — alpha-2-delta ligand — both FDA-approved for fibromyalgia, the prototypical centralized pain syndrome."},{"ta":"Neurosciences","subcategory":"Pain","indication":"Neuropathic Pain","symptoms":"Burning, shooting, electric pain; allodynia; numbness in nerve distribution","goal":"Reduce pain intensity, improve function and sleep","soc":"Gabapentin (Neurontin) or pregabalin (Lyrica) — alpha-2-delta calcium channel ligands — and/or duloxetine (Cymbalta) — SNRI — as first-line per NeuPSIG guidelines."},{"ta":"Neurosciences","subcategory":"Pain","indication":"Complex Regional Pain Syndrome (CRPS)","symptoms":"Severe burning pain, skin color/temperature changes, swelling, hypersensitivity after injury","goal":"Relieve pain, restore function, prevent disease spread","soc":"None FDA-approved specifically. NSAIDs and corticosteroids (for early inflammatory phase) combined with physical therapy — clinical guideline first-line."},{"ta":"Neurosciences","subcategory":"Peripheral Nervous System and Motor Unit Disorders","indication":"Peripheral Neuropathy","symptoms":"Distal numbness, tingling, burning pain, weakness, loss of reflexes","goal":"Treat underlying cause, relieve neuropathic pain, prevent falls","soc":"Treat underlying cause (glucose control for diabetic neuropathy; B12 replacement; chemotherapy dose modification). Duloxetine (Cymbalta) — FDA-approved for diabetic peripheral neuropathic pain."},{"ta":"Neurosciences","subcategory":"Peripheral Nervous S e neurologic function, treat underlying cause","soc":"High-dose dexamethasone (10 mg IV loading, then 4 mg q6h) — corticosteroid — for metastatic spinal cord compression; surgical decompression for structural causes."},{"ta":"Neurosciences","subcategory":"Spinal Cord Disorders","indication":"HTLV-1–Associated Myelopathy/Tropical Spastic Paraparesis (HAM/TSP)","symptoms":"Slowly progressive spastic paraparesis, bladder dysfunction, back pain, sensory changes","goal":"Slow progression of spastic paraparesis, manage spasticity and bladder","soc":"None disease-modifying approved. Corticosteroids (prednisolone) — empirically used for active inflammatory phase; modest short-term benefit."},{"ta":"Neurosciences","subcategory":"Spinal Cord Disorders","indication":"Syrinx of the Spinal Cord or Brain Stem","symptoms":"Cape-like dissociated sensory loss, arm weakness, spasticity, pain — cavitation within cord","goal":"Treat underlying cause (Chiari, tumor), drain syrinx, halt expansion","soc":"None pharmacologic — surgical treatment of underlying cause (Chiari decompression, tumor resection) is definitive."},{"ta":"Neurosciences","subcategory":"Spinal Cord Disorders","indication":"Spinal Cord Autonomic Dysreflexia","symptoms":"Sudden severe hypertension, sweating, bradycardia, headache in spinal cord injury patients","goal":"Rapidly lower blood pressure, identify and remove triggering stimulus","soc":"Nitroglycerine paste or nifedipine (immediate-release) — vasodilators — for acute BP reduction; first-line emergency management per SCIRE guidelines."},{"ta":"Neurosciences","subcategory":"Spinal Cord Disorders","indication":"Spinal Cord Arteriovenous Malformations (AVMs)","symptoms":"Progressive myelopathy, back/leg pain, acute hemorrhage, bladder dysfunction","goal":"Prevent hemorrhage, eliminate AVM, preserve neurologic function","soc":"None pharmacologic — definitive treatment is endovascular embolization or surgical resection/radiosurgery."},{"ta":"Neurosciences","subcategor one proven pharmacologic. Supportive: optimize mean arterial pressure (MAP ≥85 mmHg), aspirin for atherothrombotic cause."},{"ta":"Neurosciences","subcategory":"Spinal Cord Disorders","indication":"Spinal Subdural or Epidural Hematoma","symptoms":"Sudden severe back pain, rapidly progressive myelopathy, bladder/bowel dysfunction","goal":"Emergency surgical evacuation to prevent permanent paralysis","soc":"None pharmacologic — emergency surgical evacuation (laminectomy/decompression) is the primary and urgent treatment."},{"ta":"Neurosciences","subcategory":"Stroke","indication":"Ischemic Stroke","symptoms":"Sudden facial drooping, arm weakness, speech difficulty, dizziness, vision loss (FAST)","goal":"Restore blood flow rapidly, limit infarct, prevent recurrence","soc":"IV alteplase (tPA, Activase) — thrombolytic — within 4.5 hours of onset, per AHA/ASA guidelines; tenecteplase (TNKase) now preferred over alteplase in many centers; mechanical thrombectomy for large vessel occlusion within 24 hours."},{"ta":"Neurosciences","subcategory":"Stroke","indication":"Brain Aneurysms","symptoms":"Usually silent until rupture; rupture: thunderclap headache, loss of consciousness, vomiting","goal":"Prevent rupture, eliminate aneurysm, prevent rebleeding","soc":"None pharmacologic — definitive treatment is endovascular coiling or surgical clipping."},{"ta":"Neurosciences","subcategory":"Stroke","indication":"Cerebral Arteriovenous Malformations (AVMs)","symptoms":"Intracerebral hemorrhage, seizures, headache, neurologic deficit — vascular malformation","goal":"Eliminate AVM to prevent hemorrhage, control seizures","soc":"None pharmacologic — definitive treatment is surgical resection, stereotactic radiosurgery (Gamma Knife), or endovascular embolization (often combined)."},{"ta":"Neurosciences","subcategory":"Stroke","indication":"Intracerebral Hemorrhage","symptoms":"Sudden focal neurologic deficit, severe headache, vomiting, altered consciousness — bleeding in brain parenchyma","goal":"Limit hematoma expansion, reduce ICP, prevent rebleeding, early rehabilitation","soc":"Blood pressure lowering to SBP <140 mmHg (intensive; labetalol, nicardipine IV) and reversal of anticoagulation — first-line pharmacologic management per AHA/ASA guidelines."},{"ta":"Neurosciences","subcategory":"Stroke","indication":"Transient Ischemic Attack","symptoms":"Sudden brief focal neurologic symptoms (weakness, speech, vision) resolving within 24 hours — no infarction","goal":"Prevent early stroke, identify high-risk patients, initiate antithrombotic therapy","soc":"Aspirin 81–325 mg + clopidogrel 75 mg (DAPT) for 21–90 days — dual antiplatelet therapy per AHA/ASA TIA guidelines (POINT trial); ticagrelor + aspirin alternative."},{"ta":"Neurosciences","subcategory":"Stroke","indication":"Subarachnoid Hemorrhage","symptoms":"Thunderclap headache ('worst of my life'), neck stiffness, photophobia, LOC","goal":"Prevent rebleeding, prevent cerebral vasospasm, manage hydrocephalus","soc":"Nimodipine (Nimotop) — calcium channel blocker — oral 60 mg q4h × 21 days — FDA-approved to prevent vasospasm-related ischemic deficits following aneurysmal SAH."},{"ta":"Neurosciences","subcategory":"Anxiety Disorders","indication":"Social Anxiety Disorder","symptoms":"Intense fear of social situations, embarrassment, avoidance","goal":"Reduce social fear; expand engagement in work and social life","soc":"Paroxetine, sertraline (SSRIs — FDA-approved for social anxiety disorder), and venlafaxine ER (SNRI — FDA-approved) are first-line. CBT is equally effective."},{"ta":"Neurosciences","subcategory":"Anxiety Disorders","indication":"Generalized Anxiety Disorder","symptoms":"Persistent excessive worry, tension, fatigue, difficulty concentrating","goal":"Reduce anxiety to manageable levels; restore daily functioning","soc":"SSRIs (escitalopram, paroxetine) and SNRIs (venlafaxine, duloxetine) are first-line. Buspirone is an alternative first-line agent."},{"ta":"Neurosciences","subcateg
