gel (off-label) for small superficial lesions."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Infantile Hemangiomas","symptoms":"Rapidly growing bright red skin tumor in infants, ulceration risk","goal":"Accelerate involution, prevent functional impairment or scarring","soc":"Oral propranolol 1–3 mg/kg/day (Hemangeol – FDA-approved 2014 for infantile hemangioma) is first-line for high-risk IH."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Epidermolysis Bullosa","symptoms":"Severe skin blistering from minor trauma, wounds, scarring, pain","goal":"Reduce blister formation, promote wound healing, prevent complications","soc":"Wound care management (non-pharmacologic); systemic retinoids (acitretin) for palmoplantar EB simplex; no pharmacologic cure for underlying genetic defect."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Bullous Pemphigoid","symptoms":"Large tense blisters on skin, intense itching, redness, elderly patients","goal":"Suppress blister formation, achieve disease control","soc":"Topical clobetasol propionate 0.05% applied to entire body surface (Joly 2002 regimen) for localized disease; systemic prednisone 0.5–1 mg/kg/day for widespread disease."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Pemphigus Vulgaris","symptoms":"Painful oral blisters progressing to skin erosions, flaccid blisters","goal":"Achieve complete remission, minimize corticosteroid exposure","soc":"Rituximab (Rituxan – FDA-approved 2018 for moderate-severe PV) 1000 mg IV x 2 doses (Days 1 and 15) as first-line biologic; prednisone 1–1.5 mg/kg/day as initial bridging therapy."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Dermatitis Herpetiformis","symptoms":"Intensely itchy blistering rash on elbows/knees/buttocks, celiac disease-associated","goal":"Suppress rash, maintain gluten-free diet adherence","soc":"Dapsone 25–100 mg/day (first-line pharmacologic) + strict gluten-free diet (GFD); GFD is the only disease-modifying treatment."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Mucous Membrane Pemphigoid","symptoms":"Blistering of oral/conjunctival/genital mucosa, scarring, potential blindness","goal":"Prevent scarring and blindness, suppress mucosal blistering","soc":"Dapsone 50–200 mg/day for mild disease; systemic prednisone 1 mg/kg/day for moderate-severe or ocular involvement."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Pemphigus Foliaceus","symptoms":"Crusted superficial blisters on face/scalp/chest, burning sensation","goal":"Achieve blister-free remission off systemic corticosteroids","soc":"Prednisone 1 mg/kg/day as initial treatment; rituximab (Rituxan) as steroid-sparing agent (off-label but evidence-supported)."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Epidermolysis Bullosa Acquisita","symptoms":"Trauma-induced blisters, scarring, mucosal involvement, nail loss","goal":"Suppress anti-COL7 autoimmunity, achieve blister-free state","soc":"Dapsone 1–2 mg/kg/day as first-line for the inflammatory variant; colchicine 0.5–1.5 mg/day as alternative."},{"ta":"Dermatology","subcategory":"Bullous Diseases","indication":"Linear Immunoglobulin A (IgA) Disease","symptoms":"Clustered blisters with IgA deposit at dermo-epidermal junction, mucosal lesions","goal":"Suppress IgA-mediated blister formation, achieve remission","soc":"Dapsone 50–200 mg/day (first-line); sulphamethoxypyridazine as alternative."},{"ta":"Dermatology","subcategory":"Cornification Disorders","indication":"Keratosis Pilaris","symptoms":"Small rough bumps on upper arms/thighs/cheeks, skin redness, sandpaper texture","goal":"Smooth skin texture, reduce redness, cosmetic improvement","soc":"Topical keratolytics: ammonium lactate 12% (Lac-Hydrin) or urea 20–40% lotion; topical retinoids (tretinoin 0.025–0.05%) for textural improvement."},{"ta":"Dermatology","subcategory":"Cornification Disorders","indication":"Xeroderma","symptoms":"Dry rough scaly skin, itching, tightness, cracking","goal":"Restore skin barrier, reduce dryness, relieve itching","soc":"Emollients (petroleum jelly, ceramide-containing moisturizers such as CeraVe) and urea-containing lotions (10–20%); ammonium lactate 12% cream (Lac-Hydrin)."},{"ta":"Dermatology","subcategory":"Cornification Disorders","indication":"Calluses and Corns","symptoms":"Thickened hard skin on feet/hands, pain on pressure, tenderness","goal":"Reduce hyperkeratosis, relieve pain, prevent recurrence","soc":"Salicylic acid 17–40% (topical keratolytic) applied to lesion; mechanical paring/debridement (non-pharmacologic)."},{"ta":"Dermatology","subcategory":"Cornification Disorders","indication":"Ichthyosis","symptoms":"Dry fish-scale skin, itching, skin cracking, painful fissures","goal":"Improve skin hydration, reduce scaling, prevent complications","soc":"Emollients (ammonium lactate 12% cream, Lac-Hydrin) and keratolytics (urea 10–40% cream, salicylic acid) for most forms; retinoids (acitretin 25–50 mg/day) for severe congenital ichthyoses."},{"ta":"Dermatology","subcategory":"Cornification Disorders","indication":"Palmoplantar Keratodermas","symptoms":"Thick hard skin on palms/soles, fissuring, pain, disability","goal":"Reduce hyperkeratosis, relieve pain, improve hand/foot function","soc":"Emollients (urea 20–40% cream), mechanical debridement; systemic retinoids (acitretin 10–25 mg/day) for severe hereditary PPK."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Atopic Dermatitis (Eczema)","symptoms":"Intense itching, dry inflamed red patches, skin thickening, sleep disturbance","goal":"Achieve clear/almost clear skin, control itch, prevent flares","soc":"Topical corticosteroids (e.g., triamcinolone 0.1% for moderate AD) as first-line for flares; topical calcineurin inhibitors (tacrolimus 0.03–0.1%, pimecrolimus 1%) as steroid-sparing agents."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Definition of Dermatitis","symptoms":"Skin inflammation: redness, itching, swelling, oozing or scaling","goal":"Classify dermatitis type, apply appropriate targeted therapy","soc":"Topical corticosteroids as general first-line across dermatitis subtypes; treatment is subtype-specific."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Hand and Foot Dermatitis","symptoms":"Blistering, scaling, cracking, itching of hands and feet","goal":"Clear skin, prevent fissuring, maintain hand function","soc":"Potent topical corticosteroids (clobetasol 0.05% ointment BID) for acute flares; Alitretinoin 10–30 mg/day (Toctino – oral retinoid, approved in Europe/Canada for chronic hand eczema, not FDA-approved in US)."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Lichen Simplex Chronicus","symptoms":"Thick leathery itchy skin patches from chronic scratching, intense pruritus","goal":"Break itch-scratch cycle, restore normal skin texture","soc":"High-potency topical corticosteroids (clobetasol 0.05% BID under occlusion) + topical tacrolimus 0.1% for maintenance; sedating antihistamines (hydroxyzine 25 mg QHS) for nocturnal itch."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Contact Dermatitis","symptoms":"Itchy red rash at site of allergen/irritant exposure, blistering, weeping","goal":"Identify and avoid trigger, suppress allergic inflammation","soc":"Topical corticosteroids (mid-potency: triamcinolone 0.1% for body; high-potency: clobetasol 0.05% for hands/feet) for acute flare; systemic prednisone 40–60 mg/day taper for severe/widespread contact dermatitis."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Seborrheic Dermatitis","symptoms":"Greasy yellow-white scales on scalp/face, redness, itching","goal":"Control flaking and inflammation, maintain remission","soc":"Ketoconazole 2% shampoo/cream (Nizoral) or zinc pyrithione shampoos for scalp; ketoconazole 2% cream for face/body."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Stasis Dermatitis","symptoms":"Leg swelling, itchy brown discoloration, weeping skin, varicose veins","goal":"Reduce venous hypertension, heal skin, prevent ulceration","soc":"Compression therapy (30–40 mmHg stockings) is cornerstone; topical corticosteroids (triamcinolone 0.1% or betamethasone) for acute dermatitis component."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Nummular Dermatitis","symptoms":"Coin-shaped itchy skin plaques, oozing, crusting, widespread distribution","goal":"Clear coin-shaped lesions, reduce itch, prevent recurrence","soc":"Mid-to-high potency topical corticosteroids (betamethasone valerate 0.1% or triamcinolone 0.1%) BID + emollients."},{"ta":"Dermatology","subcategory":"Dermatitis","indication":"Erythroderma","symptoms":"Widespread red scaling skin, intense itching, fever, chills","goal":"Identify cause, control inflammation, prevent complications","soc":"Hospitalization with supportive care; treat underlying cause (psoriasis, eczema, drug reaction, lymphoma); topical emollients and mild corticosteroids; systemic retinoids (acitretin) for psoriatic erythroderma."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Candidiasis (Mucocutaneous)","symptoms":"White oral patches, red skin rash in body folds, burning","goal":"Eradicate Candida infection, prevent recurrence","soc":"Topical nystatin suspension 100,000 units/mL QID x 7–14 days or clotrimazole troches 10 mg 5×/day for oral candidiasis; topical miconazole/clotrimazole for cutaneous candidiasis."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Intertrigo","symptoms":"Redness and rawness in skin folds, burning, itching, moisture","goal":"Eliminate fungal/bacterial colonization, restore skin barrier","soc":"Topical miconazole 2% or clotrimazole 1% for Candida-predominant intertrigo; absorptive powder (zinc oxide or talc) and moisture control."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Tinea Pedis (Athlete's Foot)","symptoms":"Itchy, scaly, cracked skin between toes and on soles","goal":"Eradicate foot dermatophyte, prevent recurrence","soc":"Topical terbinafine 1% cream or spray (Lamisil AT) BID x 1–2 weeks; or topical azoles (clotrimazole, miconazole) BID x 4 weeks."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Tinea Cruris (Jock Itch)","symptoms":"Itchy red ring-shaped rash in groin and inner thighs","goal":"Eradicate dermatophyte, resolve groin rash","soc":"Topical terbinafine 1% cream (Lamisil AT) or clotrimazole 1% BID x 2–4 weeks; keep area dry."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Tinea Corporis (Body Ringworm)","symptoms":"Ring-shaped scaly red skin patches, central clearing, itching","goal":"Clear dermatophyte infection, eliminate itching","soc":"Topical terbinafine 1% cream (Lamisil AT) or topical azoles (clotrimazole 1%, miconazole 2%) BID x 2–4 weeks."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Tinea Versicolor","symptoms":"Discolored scaly patches on trunk, shoulders; itch in heat","goal":"Eradicate Malassezia overgrowth, restore even skin tone","soc":"Topical selenium sulfide 2.5% shampoo or ketoconazole 2% shampoo applied as body wash x 5–10 days; or topical azoles (clotrimazole, miconazole) BID x 2–4 weeks."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Dermatophytid Reaction","symptoms":"Itchy vesicular rash distant from primary fungal infection site","goal":"Treat primary dermatophyte infection; id reaction resolves spontaneously","soc":"Treat the primary fungal infection (oral terbinafine or itraconazole); antihistamines for pruritic id reaction."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Tinea Capitis (Scalp Ringworm)","symptoms":"Patchy scalp hair loss, scaly dandruff-like patches, inflamed boggy kerion","goal":"Eradicate scalp dermatophyte, prevent permanent alopecia","soc":"Oral griseofulvin (microsize 20–25 mg/kg/day x 6–12 weeks) or terbinafine 250 mg/day x 2–4 weeks (preferred for Trichophyton infections); adjunct: selenium sulfide or ketoconazole shampoo to reduce shedding."},{"ta":"Dermatology","subcategory":"Fungal Skin Infections","indication":"Tinea Barbae (Barber's Itch)","symptoms":"Fungal infection of beard area, pustular folliculitis, inflammation, crust","goal":"Eradicate dermatophyte, resolve follicular infection","soc":"Oral terbinafine 250 mg/day x 4 weeks (systemic therapy required for deep fungal folliculitis)."},{"ta":"Dermatology","subcategory":"Hair Disorders","indication":"Alopecia","symptoms":"Diffuse or patterned hair loss, scalp visibility, thinning","goal":"Halt hair loss progression, stimulate regrowth","soc":"Minoxidil 2% or 5% topical solution/foam (OTC; Rogaine) applied daily; for androgenetic alopecia in men: finasteride 1 mg/day oral (Propecia)."},{"ta":"Dermatology","subcategory":"Hair Disorders","indication":"Alopecia Areata","symptoms":"Sudden patchy coin-sized hair loss on scalp or body","goal":"Restore hair growth, prevent new patches","soc":"Intralesional corticosteroids (triamcinolone acetonide 5–10 mg/mL) injected into affected patches every 4–6 weeks; topical corticosteroids for children or extensive disease."},{"ta":"Dermatology","subcategory":"Hair Disorders","indication":"Hirsutism and Hypertrichosis","symptoms":"Excess coarse facial and body hair in women, male-pattern distribution","goal":"Reduce unwanted hair, treat androgen excess if present","soc":"Eflornithine 13.9% cream (Vaniqa) topical BID to face; combined with hormonal therapy – oral contraceptives (estrogen-progestin) for PCOS-related hirsutism."},{"ta":"Dermatology","subcategory":"Hair Disorders","indication":"Pseudofolliculitis Barbae","symptoms":"Ingrown beard hairs, papules, pustules, dark spots on shaved skin","goal":"Prevent ingrown hairs, clear papules, reduce scarring","soc":"Topical retinoids (tretinoin 0.025–0.05% cream) and/or topical glycolic acid; low-potency topical corticosteroids for inflammation."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Drug Eruptions and Reactions","symptoms":"Itchy widespread rash, urticaria, or blistering after medication exposure","goal":"Identify offending drug, suppress immune reaction, prevent recurrence","soc":"Discontinue causative drug; systemic antihistamines (cetirizine, diphenhydramine) for urticarial reactions; oral corticosteroids (prednisone 0.5–1 mg/kg) for severe morbilliform eruptions."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Granuloma Annulare","symptoms":"Ring-shaped smooth bumps on hands, feet, elbows; usually painless","goal":"Resolve skin lesions, address cosmetic concern","soc":"Potent topical corticosteroids (clobetasol 0.05%) under occlusion; intralesional triamcinolone acetonide injections (5–10 mg/mL) for localized disease."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Pyoderma Gangrenosum","symptoms":"Rapidly expanding painful ulcer with purple undermined borders","goal":"Halt ulcer progression, promote wound healing, prevent recurrence","soc":"Systemic corticosteroids (prednisone 0.5–1 mg/kg/day) for moderate-severe; topical superpotent corticosteroids or tacrolimus 0.1% ointment for peristomal/limited disease."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Panniculitis","symptoms":"Painful red nodules deep in skin fat, mostly lower legs","goal":"Reduce inflammation, treat underlying cause","soc":"NSAIDs (ibuprofen, indomethacin) for symptomatic relief; systemic corticosteroids (prednisone 0.5–1 mg/kg) for moderate-severe cases."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Erythema Multiforme","symptoms":"Target-shaped skin lesions, mainly palms, soles, and mucous membranes","goal":"Suppress immune reaction, treat underlying trigger (HSV)","soc":"Acyclovir 400 mg BID (for HSV-associated EM) as prophylaxis to prevent recurrence; symptomatic: topical corticosteroids and antihistamines."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Acute Febrile Neutrophilic Dermatosis","symptoms":"Sudden painful red skin plaques, fever, raised neutrophil count","goal":"Rapidly suppress neutrophilic inflammation, prevent recurrence","soc":"Systemic corticosteroids: prednisone 0.5–1 mg/kg/day orally for 4–6 weeks with gradual taper."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Stevens-Johnson Syndrome (SJS) and Toxic Epidermal Necrolysis (TEN)","symptoms":"Widespread blistering, skin peeling, painful mucous membrane erosions, fever","goal":"Halt skin detachment, prevent sepsis, support wound healing","soc":"Immediate discontinuation of causative drug; intensive supportive care in ICU/burn unit; IVIG (1 g/kg/day x 3 days) or cyclosporine 3 mg/kg/day to halt progression."},{"ta":"Dermatology","subcategory":"Hypersensitivity and Reactive Skin Disorders","indication":"Erythema Nodosum","symptoms":"Tender red nodules on shins, fever, joint aches","goal":"Reduce painful nodules, identify and treat underlying cause","soc":"NSAIDs (ibuprofen 400–800 mg TID or indomethacin 50 mg TID) for symptomatic relief; rest and leg elevation."},{"ta":"Dermatology","subcategory":"Nail Disorders","indication":"Onychomycosis","symptoms":"Thickened, yellow-brown, crumbly toenails; nail separation","goal":"Eradicate nail fungus, restore clear healthy nails","soc":"Oral terbinafine 250 mg/day x 12 weeks (fingernails) or 12–16 weeks (toenails) – most effective systemic; topical efinaconazole 10% solution (Jublia) or tavaborole 5% solution (Kerydin) for mild-moderate disease."},{"ta":"Dermatology","subcategory":"Nail Disorders","indication":"Nail Dystrophies","symptoms":"Thickened, discolored, brittle, misshapen nails affecting multiple digits","goal":"Restore nail appearance and integrity, identify systemic cause","soc":"Treat underlying cause (psoriasis: topical calcipotriol/corticosteroid; lichen planus: intralesional/systemic corticosteroids); topical tazarotene for nail psoriasis; biotin supplements (weak evidence)."},{"ta":"Dermatology","subcategory":"Nail Disorders","indication":"Ingrown Toenail","symptoms":"Painful nail edge piercing skin, redness, swelling, drainage","goal":"Relieve pain, prevent infection, correct nail growth","soc":"Warm water soaks, cotton or waxed dental floss under nail edge; topical antibiotics (neomycin/polymyxin B) if infected; definitive: partial nail avulsion with phenol ablation of matrix."},{"ta":"Dermatology","subcategory":"Nail Disorders","indication":"Chronic Paronychia","symptoms":"Persistent swollen nail fold, nail discoloration, recurrent flares","goal":"Restore nail fold integrity, eradicate yeast colonization","soc":"Topical antifungals (clotrimazole, miconazole) with or without topical corticosteroids (combined nystatin-triamcinolone or clotrimazole-betamethasone); keep hands dry."},{"ta":"Dermatology","subcategory":"Nail Disorders","indication":"Nail Trauma","symptoms":"Subungual hematoma, nail avulsion, nail bed laceration, pain","goal":"Relieve pain, prevent infection, allow nail regrowth","soc":"None (primarily procedural: trephination for subungual hematoma, wound closure for nail bed laceration); topical antibiotics post-procedure if infection risk."},{"ta":"Dermatology","subcategory":"Nail Disorders","indication":"Acute Paronychia","symptoms":"Swollen, red, pus-filled nail fold, pain around fingernail","goal":"Drain infection, eradicate bacteria, reduce inflammation","soc":"Warm soaks 3–4x/day; oral antibiotics (amoxicillin-clavulanate 875 mg BID or cephalexin 500 mg QID x 5–7 days) if cellulitis present; incision and drainage for fluctuant abscess."},{"ta":"Dermatology","subcategory":"Nail Disorders","indication":"Retronychia","symptoms":"Ingrowth of nail back into proximal nail fold, painful swelling","goal":"Remove embedded nail plate, allow healthy regrowth","soc":"None (surgical proximal nail avulsion is the definitive treatment; no pharmacologic SoC)."},{"ta":"Dermatology","subcategory":"Parasitic Skin Infections","indication":"Lice","symptoms":"Intense scalp itch, visible nits on hair, skin excoriations","goal":"Eradicate lice and nits, prevent reinfestation","soc":"Topical permethrin 1% cream rinse (Nix) for head lice – first-line OTC; spinosad 0.9% suspension (Natroba) or ivermectin 0.5% lotion (Sklice) for permethrin-resistant lice."},{"ta":"Dermatology","subcategory":"Parasitic Skin Infections","indication":"Scabies","symptoms":"Intensely itchy burrows between fingers, wrists, genitalia; worse at night","goal":"Eradicate Sarcoptes scabiei mite, relieve pruritus","soc":"Topical permethrin 5% cream (Elimite) applied head-to-toe x 8–14 hours, repeated in 1 week; oral ivermectin 200 mcg/kg x 2 doses 1–2 weeks apart as equally effective alternative."},{"ta":"Dermatology","subcategory":"Parasitic Skin Infections","indication":"Bedbugs","symptoms":"Itchy linear or grouped bites, red papules, sleep disturbance","goal":"Relieve itch, treat secondary infection, eliminate infestation","soc":"Topical corticosteroids (hydrocortisone 1%) for itch; oral antihistamines (diphenhydramine, cetirizine) for severe pruritus; topical/oral antibiotics for secondary infection. Environmental pest control is the primary intervention."},{"ta":"Dermatology","subcategory":"Parasitic Skin Infections","indication":"Delusional Parasitosis","symptoms":"False belief of parasite infestation, skin picking, excoriations","goal":"Treat psychosis, improve skin and quality of life","soc":"Low-dose antipsychotic: risperidone 0.5–2 mg/day or olanzapine 2.5–5 mg/day; or pimozide 1–2 mg/day (historically used but QTc concerns)."},{"ta":"Dermatology","subcategory":"Parasitic Skin Infections","indication":"Cutaneous Larva Migrans","symptoms":"Intensely itchy red serpentine creeping track on skin","goal":"Kill hookworm larvae, relieve severe itching","soc":"Oral ivermectin 200 mcg/kg single dose (drug of choice) or oral albendazole 400 mg/day x 3–7 days."},{"ta":"Dermatology","subcategory":"Parasitic Skin Infections","indication":"Cutaneous Myiasis","symptoms":"Painful boil-like skin lesion, sensation of movement underneath","goal":"Remove larvae safely, prevent secondary infection","soc":"None (mechanical extraction of larvae under occlusion or surgically; topical ivermectin or oral ivermectin 200 mcg/kg used adjunctively for some species)."},{"ta":"Dermatology","subcategory":"Pigmentation Disorders","indication":"Vitiligo","symptoms":"White depigmented patches on skin, progressive loss of skin color","goal":"Repigment lesions, halt disease progression","soc":"Topical calcineurin inhibitors (tacrolimus 0.1% ointment or pimecrolimus 1% cream) for face/sensitive areas; topical potent corticosteroids for body lesions."},{"ta":"Dermatology","subcategory":"Pigmentation Disorders","indication":"Hyperpigmentation","symptoms":"Dark patches or spots on skin; melasma, post-inflammatory, solar lentigines","goal":"Lighten hyperpigmented areas, even skin tone","soc":"Topical hydroquinone 2–4% (Tri-Luma, EpiQuin Micro) ± tretinoin 0.05–0.1% ± topical corticosteroid (Kligman's formula); broad-spectrum SPF 50+ sunscreen."},{"ta":"Dermatology","subcategory":"Pigmentation Disorders","indication":"Albinism","symptoms":"Absent or reduced skin/hair/eye pigment, photosensitivity, vision impairment","goal":"Protect from UV damage, prevent skin cancer, support vision","soc":"None (no pharmacologic treatment changes underlying pigmentation); sun protection (broad-spectrum SPF ≥50 sunscreen daily), UV-protective clothing, regular dermatology and ophthalmology follow-up."},{"ta":"Dermatology","subcategory":"Pressure Injury","indication":"Pressure Injuries","symptoms":"Skin and tissue breakdown over bony prominences, pain, open sores","goal":"Promote wound healing, prevent infection, relieve pressure","soc":"Pressure offloading (repositioning, specialized mattresses); wound debridement; moisture-retentive dressings (hydrocolloid, foam); topical antimicrobials (silver-based dressings) for infected wounds."},{"ta":"Dermatology","subcategory":"Psoriasis and Other Papulosquamous Disorders","indication":"Psoriasis","symptoms":"Red scaly plaques on elbows, knees, scalp; itch, joint pain","goal":"Achieve clear/near-clear skin (PASI 90/100), sustain remission","soc":"Topical: calcipotriene-betamethasone dipropionate foam (Enstilar, Wynzora cream – 2024) or gel (Taclonex) for mild-moderate; for moderate-severe: escalate to systemic therapy."},{"ta":"Dermatology","subcategory":"Psoriasis and Other Papulosquamous Disorders","indication":"Lichen Planus","symptoms":"Itchy purple flat-topped papules on wrists, ankles, mucous membranes","goal":"Reduce itch, clear skin and mucosal lesions","soc":"Topical superpotent corticosteroids (clobetasol 0.05%) for skin lesions; topical tacrolimus 0.1% for oral lichen planus; systemic corticosteroids (prednisone 30–60 mg/day) for widespread/severe."},{"ta":"Dermatology","subcategory":"Psoriasis and Other Papulosquamous Disorders","indication":"Lichen Sclerosus","symptoms":"White atrophic itchy patches on genitalia, scarring, sexual pain","goal":"Relieve itch, prevent scarring and squamous cell carcinoma risk","soc":"Topical ultrapotent corticosteroids: clobetasol propionate 0.05% ointment applied daily x 3 months, then maintenance."},{"ta":"Dermatology","subcategory":"Psoriasis and Other Papulosquamous Disorders","indication":"Pityriasis Rubra Pilaris","symptoms":"Orange-red scaling plaques, follicular keratosis, palmoplantar keratoderma","goal":"Achieve remission of extensive erythrokeratoderma","soc":"Oral retinoids: acitretin 25–50 mg/day or isotretinoin 0.5–1 mg/kg/day; these are most effective systemic agents."},{"ta":"Dermatology","subcategory":"Psoriasis and Other Papulosquamous Disorders","indication":"Parapsoriasis","symptoms":"Chronic scaly pink-tan patches, mostly asymptomatic, possible lymphoma risk","goal":"Clear skin lesions, monitor for cutaneous T-cell lymphoma","soc":"Topical corticosteroids (moderate-potent) and/or phototherapy (NB-UVB 2–3x/week) for symptomatic or large-plaque parapsoriasis."},{"ta":"Dermatology","subcategory":"Psoriasis and Other Papulosquamous Disorders","indication":"Pityriasis Lichenoides","symptoms":"Recurrent crops of papules that ulcerate, crust, and scar","goal":"Suppress disease activity, prevent scarring","soc":"Topical corticosteroids for mild disease; oral erythromycin 250 mg QID or tetracycline for anti-inflammatory effects; phototherapy (NB-UVB) for widespread."},{"ta":"Dermatology","subcategory":"Psoriasis and Other Papulosquamous Disorders","indication":"Pityriasis Rosea","symptoms":"Herald patch followed by Christmas tree-pattern oval pink scaly rash","goal":"Relieve itch, accelerate rash resolution","soc":"Self-limiting (resolves in 6–8 weeks); symptomatic: oral antihistamines and topical corticosteroids; oral acyclovir 800 mg 5x/day x 1 week may accelerate resolution."},{"ta":"Dermatology","subcategory":"Reactions to Sunlight","indication":"Actinic Keratoses","symptoms":"Rough scaly pink-red patches on sun-exposed skin, pre-cancerous","goal":"Eradicate AKs to prevent progression to squamous cell carcinoma","soc":"Field therapy: 5-fluorouracil (5-FU) 0.5–5% cream (Carac, Efudex) x 2–4 weeks; or imiquimod 5% cream (Aldara) 3x/week x 4–16 weeks; or photodynamic therapy (PDT) with aminolevulinic acid (ALA/Levulan) single treatment."},{"ta":"Dermatology","subcategory":"Reactions to Sunlight","indication":"Chronic Effects of Sunlight","symptoms":"Leathery wrinkled skin, solar lentigines, deep wrinkles, telangiectasias","goal":"Reverse photoaging, improve skin texture and tone","soc":"Topical tretinoin 0.05–0.1% cream (Retin-A, Renova – FDA approved for photoaging); broad-spectrum SPF 50+ sunscreen."},{"ta":"Dermatology","subcategory":"Reactions to Sunlight","indication":"Photosensitivity","symptoms":"Abnormal skin rash after sun exposure: urticaria, blistering, eczema","goal":"Prevent sun-induced reactions, reduce photosensitivity","soc":"Strict sun avoidance; broad-spectrum SPF 50+ sunscreen; topical corticosteroids for acute reactions; oral antihistamines for polymorphous light eruption (PMLE)."},{"ta":"Dermatology","subcategory":"Reactions to Sunlight","indication":"Sunburn","symptoms":"Red painful hot skin after UV exposure, blistering if severe","goal":"Relieve pain, reduce inflammation, promote healing","soc":"Cool compresses, topical aloe vera; oral NSAIDs (ibuprofen 400 mg TID) for pain and inflammation; avoid further UV exposure."},{"ta":"Dermatology","subcategory":"Sweating Disorders","indication":"Hyperhidrosis","symptoms":"Excessive sweating of palms, armpits, feet beyond thermoregulatory need","goal":"Reduce sweating to normal levels, improve quality of life","soc":"Topical aluminum chloride hexahydrate 10–20% (Drysol, Certain Dri) applied to affected area at bedtime; or topical glycopyrronium tosylate 2.4% cloth (Qbrexza – FDA approved 2018 for primary axillary hyperhidrosis)."},{"ta":"Dermatology","subcategory":"Sweating Disorders","indication":"Bromhidrosis","symptoms":"Excessive unpleasant body odor from apocrine or eccrine sweat","goal":"Eliminate offensive body odor, reduce bacterial colonization","soc":"Topical aluminum chloride hexahydrate 20% (Drysol) antiperspirant; regular hygiene; topical antibacterial agents (clindamycin, erythromycin)."},{"ta":"Dermatology","subcategory":"Sweating Disorders","indication":"Hypohidrosis","symptoms":"Reduced sweating, heat intolerance, overheating, dry skin","goal":"Prevent heat-related illness, identify and treat underlying cause","soc":"None pharmacologic (no approved drug restores sweat gland function); cooling strategies and heat avoidance are cornerstone."},{"ta":"Dermatology","subcategory":"Sweating Disorders","indication":"Miliaria","symptoms":"Tiny itchy heat-rash bumps after sweating; prickly heat sensation","goal":"Relieve itch, open blocked sweat ducts, prevent recurrence","soc":"None pharmacologic; cool environment and light clothing (primary); topical calamine lotion or mild topical corticosteroids (hydrocortisone 1%) for itch."},{"ta":"Dermatology","subcategory":"Viral Skin Diseases","indication":"Warts","symptoms":"Rough skin-colored growths on hands, feet, genitalia; HPV-caused","goal":"Eradicate warts, prevent recurrence and spread","soc":"Topical salicylic acid 17–40% (Compound W, Duofilm) daily for common/plantar warts; cryotherapy (liquid nitrogen) every 2–3 weeks for persistent or genital warts."},{"ta":"Dermatology","subcategory":"Viral Skin Diseases","indication":"Molluscum Contagiosum","symptoms":"Small flesh-colored umbilicated skin bumps; itchy if inflamed","goal":"Eradicate viral lesions, prevent autoinoculation and spread","soc":"Topical cantharidin (Ycanth – FDA approved July 2023, first FDA-approved treatment for molluscum in children and adults) applied by clinician every 3 weeks."},{"ta":"Dermatology","subcategory":"Viral Skin Diseases","indication":"Zoonotic Skin Diseases","symptoms":"Variable: rash, nodules, ulcers, or vesicles from animal-transmitted pathogens","goal":"Eradicate zoonotic pathogen, prevent complications","soc":"Depends on pathogen: Ringworm (tinea): topical/oral antifungals; Orf virus: self-limiting (no treatment); Cowpox/monkeypox: supportive ± tecovirimat (TPOXX) for severe mpox; Cat-scratch disease: azithromycin 500 mg x 1 then 250 mg x 4 days."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Secondary Aldosteronism","symptoms":"High blood pressure, leg swelling, low potassium, renin-driven aldosterone excess","goal":"Treat underlying cause (heart failure, cirrhosis, renovascular HTN)","soc":"Treat underlying cause; ACE inhibitors/ARBs for renovascular/heart failure etiology; mineralocorticoid receptor antagonists (spironolactone, eplerenone) for symptom control."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Primary Aldosteronism","symptoms":"Hypertension resistant to treatment, low potassium, muscle weakness, fatigue","goal":"Normalize aldosterone excess, control blood pressure and potassium","soc":"Unilateral adenoma: laparoscopic adrenalectomy (curative). Bilateral hyperplasia: mineralocorticoid receptor antagonist (MRA): spironolactone 25–400 mg/day or eplerenone 50–200 mg/day."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Adrenal Virilism","symptoms":"Excess body/facial hair, acne, clitoral enlargement, deepened voice in women","goal":"Suppress excess androgen production, normalize virilization","soc":"Glucocorticoid replacement: hydrocortisone 10–20 mg/day (in divided doses) to suppress ACTH and adrenal androgen excess in congenital adrenal hyperplasia (most common cause)."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Cushing Syndrome","symptoms":"Central obesity, moon face, purple striae, easy bruising, hypertension","goal":"Normalize cortisol levels, reverse metabolic complications","soc":"Surgical: transsphenoidal surgery (pituitary adenoma – Cushing disease) is definitive first-line. Pharmacologic bridging: metyrapone 500 mg–6 g/day or ketoconazole 400–1200 mg/day (adrenal steroidogenesis inhibitors)."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Secondary Adrenal Insufficiency","symptoms":"Fatigue, nausea, low blood pressure, weight loss, no hyperpigmentation","goal":"Replace cortisol physiologically, prevent adrenal crisis","soc":"Hydrocortisone 15–25 mg/day in divided doses (same as primary AI); no mineralocorticoid needed (RAAS preserved). Identify and treat underlying pituitary/hypothalamic cause."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Nonfunctional Adrenal Masses","symptoms":"Usually asymptomatic; incidentally found on imaging; mild back discomfort","goal":"Rule out malignancy and hormonal hypersecretion; monitor stable lesions","soc":"None pharmacologic (surveillance with repeat imaging at 6–12 months; biochemical testing to exclude pheochromocytoma and subclinical Cushing's); surgical adrenalectomy for masses >4 cm or growing."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Primary Adrenal Insufficiency (Addison Disease)","symptoms":"Fatigue, weight loss, salt craving, hyperpigmentation, low blood pressure, vomiting","goal":"Replace cortisol and aldosterone lifelong, prevent adrenal crises","soc":"Glucocorticoid: hydrocortisone 15–25 mg/day in divided doses (most physiologic); fludrocortisone 0.05–0.2 mg/day for mineralocorticoid replacement."},{"ta":"Endocrine and Metabolic","subcategory":"Adrenal Disorders","indication":"Pheochromocytoma","symptoms":"Episodic hypertensive crises, palpitations, sweating, severe headache, pallor","goal":"Control hypertension, surgically remove tumor safely","soc":"Alpha-blockade: phenoxybenzamine (Dibenzyline) 10–40 mg/day or selective alpha-1 blocker (doxazosin 8–16 mg/day) for 10–14 days pre-operatively; then beta-blocker added after alpha-blockade established."},{"ta":"Endocrine and Metabolic","subcategory":"Autoimmune Endocrine Disorders","indication":"Polyglandular Deficiency Syndromes","symptoms":"Multiple endocrine gland failures (thyroid, adrenal, pancreas, gonads), autoimmune","goal":"Replace all deficient hormones, treat autoimmune complications","soc":"Hormone replacement for each deficient axis: hydrocortisone (Addison's), levothyroxine (hypothyroidism), insulin (T1DM), testosterone/estrogen (gonadal failure)."},{"ta":"Endocrine and Metabolic","subcategory":"Autoimmune Endocrine Disorders","indication":"Drug-Induced Autoimmunity","symptoms":"Drug-triggered lupus-like illness: joint pain, rash, fever, positive ANA","goal":"Identify and discontinue offending drug, suppress autoimmune manifestations","soc":"Discontinue causative drug; NSAIDs for mild symptoms; hydroxychloroquine 200–400 mg/day for persistent features."},{"ta":"Endocrine and Metabolic","subcategory":"Autoimmune Endocrine Disorders","indication":"IPEX Syndrome","symptoms":"Severe immune dysregulation, enteropathy, neonatal Type 1 diabetes, eczema","goal":"Achieve curative hematopoietic stem cell transplant, immunosuppression as bridge","soc":"Immunosuppression as bridge to HSCT: sirolimus (rapamycin) 0.3–6 mg/m²/day (most effective medical therapy); tacrolimus for refractory."},{"ta":"Endocrine and Metabolic","subcategory":"Diabetes Mellitus","indication":"Long-Term Complications of Diabetes Mellitus","symptoms":"Peripheral neuropathy, retinopathy, nephropathy, foot ulcers, cardiovascular disease","goal":"Prevent progression of organ damage, protect kidneys and heart","soc":"Optimal glycemic control (A1C <7%) with standard diabetes agents; ACE inhibitor/ARB for diabetic nephropathy; statin for dyslipidemia; aggressive BP control."},{"ta":"Endocrine and Metabolic","subcategory":"Diabetes Mellitus","indication":"Type 1 Diabetes Mellitus","symptoms":"Excessive thirst, frequent urination, weight loss, fatigue, blurred vision","goal":"Maintain near-normal glucose, prevent DKA and long-term complications","soc":"Insulin replacement therapy (basal-bolus regimen): long-acting insulin (glargine U-100/U-300 [Lantus/Toujeo], detemir [Levemir], degludec [Tresiba]) plus rapid-acting insulin (lispro [Humalog], aspart [NovoLog/Fiasp], glulisine [Apidra]) with continuous glucose monitoring (CGM)."},{"ta":"Endocrine and Metabolic","subcategory":"Diabetes Mellitus","indication":"Type 2 Diabetes Mellitus","symptoms":"Increased thirst and urination, fatigue, blurred vision, slow wound healing","goal":"Lower HbA1c, prevent cardiovascular and renal complications","soc":"Metformin (biguanide) 500–2000 mg/day as foundational first-line therapy combined with lifestyle modification (weight loss, diet, exercise); updated 2022–2024 ADA/EASD guidelines now recommend GLP-1 receptor agonists or SGLT-2 inhibitors as first-line or early add-on in patients with established ASCVD, heart failure, or CKD regardless of HbA1c."},{"ta":"Endocrine and Metabolic","subcategory":"Diabetes Mellitus","indication":"Hypoglycemia","symptoms":"Shakiness, sweating, confusion, palpitations, seizure from low blood sugar","goal":"Rapidly correct blood glucose, prevent recurrence","soc":"Conscious patients: 15–20 g fast-acting carbohydrate (glucose tablets, juice) – '15-15 rule'; Unconscious/severe: glucagon injection (Glucagon Emergency Kit), intranasal glucagon (Baqsimi – FDA approved 2019), or IV dextrose 50% (D50)."},{"ta":"Endocrine and Metabolic","subcategory":"Diabetes Mellitus","indication":"Acute Complications of Diabetes Mellitus","symptoms":"Extreme thirst, confusion, rapid breathing, high/low blood sugar emergencies","goal":"Correct hyperglycemia/ketoacidosis, restore metabolic balance","soc":"IV insulin (regular insulin infusion) for DKA; 0.9% saline IV rehydration; potassium replacement; glucose for hypoglycemia: IV dextrose 50% or oral glucose."},{"ta":"Endocrine and Metabolic","subcategory":"Gonadal and Reproductive Endocrinology","indication":"Male Hypogonadism","symptoms":"Low libido, erectile dysfunction, fatigue, muscle loss, infertility, low testosterone","goal":"Restore normal testosterone levels, improve sexual function and QoL","soc":"Testosterone replacement therapy (TRT): testosterone gel 1% (AndroGel), transdermal patch (Androderm), IM injection (testosterone cypionate or enanthate 100–200 mg q2 weeks)."},{"ta":"Endocrine and Metabolic","subcategory":"Gonadal and Reproductive Endocrinology","indication":"Gynecomastia","symptoms":"Enlarged glandular breast tissue in males, tenderness, embarrassment","goal":"Reduce breast tissue, identify hormonal cause","soc":"Tamoxifen 10–20 mg/day (SERM – most evidence) for symptomatic gynecomastia; or raloxifene 60 mg/day as alternative; treat underlying cause."},{"ta":"Endocrine and Metabolic","subcategory":"Gonadal and Reproductive Endocrinology","indication":"Anabolic Androgenic Steroids use disorder","symptoms":"Muscle dysmorphia, dependency, withdrawal fatigue, hypogonadism, aggression","goal":"Restore HPG axis, treat withdrawal, prevent relapse","soc":"Testosterone replacement during withdrawal phase; clomiphene citrate 25–50 mg/day or hCG to restart HPG axis; supportive counseling."},{"ta":"Endocrine and Metabolic","subcategory":"Lipid Disorders","indication":"Dyslipidemia","symptoms":"Elevated LDL/triglycerides or low HDL; usually asymptomatic until ASCVD events","goal":"Reduce LDL-C to target, lower ASCVD event risk","soc":"High-intensity statins: atorvastatin 40–80 mg/day or rosuvastatin 20–40 mg/day for high-risk patients."},{"ta":"Endocrine and Metabolic","subcategory":"Lipid Disorders","indication":"Isolated Elevated High-Density Lipoprotein Cholesterol (HDL-C) Levels","symptoms":"Asymptomatic; incidentally high HDL on lipid panel","goal":"Evaluate for secondary cause; no drug treatment needed","soc":"None (isolated elevated HDL-C generally considered favorable or non-pathological; no pharmacologic intervention recommended)."},{"ta":"Endocrine and Metabolic","subcategory":"Lipid Disorders","indication":"Hypolipidemia","symptoms":"Abnormally low cholesterol/triglycerides; often asymptomatic; fat malabsorption, neuropathy","goal":"Identify cause, supplement fat-soluble vitamins, prevent neurological complications","soc":"Fat-soluble vitamin supplementation (vitamins A, D, E, K) for hypobetalipoproteinemia or abetalipoproteinemia; high-fat diet restriction."},{"ta":"Endocrine and Metabolic","subcategory":"Metabolic Disorders","indication":"Obesity","symptoms":"Excess body fat (BMI ≥30), dyspnea, joint pain, metabolic comorbidities","goal":"Achieve ≥15% body weight reduction, sustain weight loss long-term","soc":"Lifestyle modification plus pharmacotherapy: semaglutide SC 2.4 mg/week (Wegovy – FDA approved 2021, ~15% weight loss) or tirzepatide SC 15 mg/week (Zepbound – FDA approved 2023, ~22% weight loss) as leading first-line agents."},{"ta":"Endocrine and Metabolic","subcategory":"Metabolic Disorders","indication":"Metabolic Syndrome","symptoms":"Central obesity, high blood pressure, high blood sugar, abnormal cholesterol","goal":"Reduce ASCVD and T2DM risk through metabolic parameter improvement","soc":"Lifestyle: intensive diet and exercise (first-line); pharmacologic: treat individual components (statins for LDL, ACE/ARB for BP, metformin if pre-diabetes); GLP-1 RAs or SGLT2i increasingly used."},{"ta":"Endocrine and Metabolic","subcategory":"Metabolic Disorders","indication":"POEMS Syndrome","symptoms":"Peripheral neuropathy, enlarged organs, endocrine dysfunction, M-protein, skin changes","goal":"Suppress underlying plasma cell dyscrasia, improve neurological function","soc":"High-dose melphalan + autologous stem cell transplant (ASCT) for eligible patients; for non-eligible: lenalidomide (Revlimid) 10–25 mg/day cyclically + dexamethasone."},{"ta":"Endocrine and Metabolic","subcategory":"Parathyroid and Calcium Metabolism","indication":"Hyperparathyroidism","symptoms":"Bones pain, kidney stones, fatigue, nausea, confusion, high calcium","goal":"Normalize calcium and PTH, prevent organ damage","soc":"Surgical: parathyroidectomy is curative and first-line for primary HPT. Medical: cinacalcet (Sensipar/calcimimetic) 30–180 mg/day for patients not surgical candidates."},{"ta":"Endocrine and Metabolic","subcategory":"Parathyroid and Calcium Metabolism","indication":"Hypoparathyroidism","symptoms":"Muscle cramps, tingling around mouth, seizures from low calcium","goal":"Maintain safe calcium levels, prevent hypocalcemic crises","soc":"Calcium carbonate 1–3 g elemental calcium/day + active vitamin D (calcitriol 0.25–2 mcg/day) orally."},{"ta":"Endocrine and Metabolic","subcategory":"Parathyroid and Calcium Metabolism","indication":"Parathyroid Tumors","symptoms":"Elevated calcium, bone pain, kidney stones, muscle weakness, fatigue","goal":"Resect parathyroid adenoma/carcinoma, normalize PTH and calcium","soc":"Surgical parathyroidectomy is the definitive treatment. Medical management for inoperable: cinacalcet (Sensipar) 30–180 mg/day to lower serum calcium."},{"ta":"Endocrine and Metabolic","subcategory":"Pituitary Disorders","indication":"Generalized Hypopituitarism","symptoms":"Fatigue, cold intolerance, low libido, short stature, adrenal crisis risk","goal":"Replace all deficient pituitary hormones lifelong","soc":"Hormone replacement therapy: hydrocortisone 15–25 mg/day (cortisol replacement – most critical); levothyroxine for TSH deficiency; testosterone/estrogen for gonadal axis."},{"ta":"Endocrine and Metabolic","subcategory":"Pituitary Disorders","indication":"Pituitary Lesions","symptoms":"Headache, visual field defects (bitemporal hemianopsia), hormone excess or deficiency","goal":"Decompress optic chiasm, correct hormone dysfunction","soc":"Depends on lesion type: non-functioning adenoma: surgical resection (transsphenoidal); prolactinoma: dopamine agonist (see Prolactinoma). Medical: cabergoline for prolactinoma, octreotide for TSH-oma."},{"ta":"Endocrine and Metabolic","subcategory":"Pituitary Disorders","indication":"Selective Pituitary Hormone Deficiencies","symptoms":"Symptoms depend on missing hormone: GH, LH/FSH, TSH, ACTH deficiency","goal":"Replace the specific deficient hormone, monitor for evolution to panhypopituitarism","soc":"Isolated GH deficiency: somatropin SC daily (or once-weekly: lonapegsomatropin/Skytrofa 2021, somatrogon/Ngenla 2022); Isolated hypogonadotropic hypogonadism: pulsatile GnRH or gonadotropins; Isolated ACTH: hydrocortisone; Isolated TSH: levothyroxine; Isolated ADH: desmopressin."},{"ta":"Endocrine and Metabolic","subcategory":"Pituitary Disorders","indication":"Gigantism and Acromegaly","symptoms":"Enlarged hands, feet, jaw; headache, joint pain, soft tissue swelling","goal":"Normalize IGF-1 and GH, reduce tumor size, relieve symptoms","soc":"Surgical: transsphenoidal adenomectomy is definitive first-line. Medical: somatostatin receptor ligands (SRLs): octreotide LAR (Sandostatin LAR) 20–30 mg IM q4 weeks, or lanreotide (Somatuline Depot) 90–120 mg SC q4 weeks – first-line medical therapy."},{"ta":"Endocrine and Metabolic","subcategory":"Pituitary Disorders","indication":"Arginine Vasopressin Deficiency (Central Diabetes Insipidus)","symptoms":"Extreme thirst, massive urine output (>3L/day), nocturia, dehydration","goal":"Replace ADH/AVP, normalize urine output and osmolality","soc":"Desmopressin acetate (DDAVP/dDAVP – ADH analog): intranasal, oral, or subcutaneous; standard dose 0.1–0.4 mg/day orally in divided doses."},{"ta":"Endocrine and Metabolic","subcategory":"Pituitary Disorders","indication":"Prolactinoma","symptoms":"Milky nipple discharge, irregular periods, infertility, reduced libido, headache","goal":"Normalize prolactin levels, shrink tumor, restore gonadal function","soc":"Dopamine agonists: cabergoline (Dostinex) 0.25–2 mg twice weekly (preferred – higher efficacy and tolerability) or bromocriptine 2.5–10 mg/day."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Hypothyroidism","symptoms":"Fatigue, weight gain, cold intolerance, constipation, dry skin","goal":"Normalize TSH and T4, relieve all hypothyroid symptoms","soc":"Levothyroxine (synthetic T4): Synthroid, Levoxyl, Tirosint; dosed at 1.6–1.8 mcg/kg/day; target TSH 0.5–4.5 mIU/L."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Hyperthyroidism","symptoms":"Palpitations, weight loss, heat intolerance, tremor, anxiety, exophthalmos","goal":"Achieve euthyroid state, prevent cardiac and bone complications","soc":"Thionamides: methimazole 10–40 mg/day (preferred) or propylthiouracil 100–300 mg TID (preferred in first trimester, thyroid storm); beta-blockers (propranolol 40–120 mg/day) for symptom control."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Hashimoto Thyroiditis","symptoms":"Fatigue, weight gain, cold intolerance, depression, constipation","goal":"Restore euthyroid state, normalize TSH","soc":"Levothyroxine (T4 replacement – Synthroid, Levoxyl, Tirosint) dosed to maintain TSH 0.5–2.5 mIU/L; initiated when TSH >10 mIU/L or symptomatic hypothyroidism."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Thyroid Nodule","symptoms":"Usually asymptomatic; neck lump, rare dysphagia or hoarseness","goal":"Exclude malignancy, manage symptomatic or toxic nodules","soc":"Watchful waiting with ultrasound surveillance for benign nodules; fine-needle aspiration (FNA) for suspicious nodules. TSH suppression with levothyroxine rarely used. Radioactive iodine (RAI) or surgery for autonomous/toxic nodules."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Thyroid Cancers","symptoms":"Painless neck mass, enlarged lymph nodes, hoarseness, dysphagia","goal":"Achieve complete remission or durable disease control with minimized recurrence","soc":"Surgical: total thyroidectomy ± neck dissection; then radioiodine (RAI/I-131) for differentiated thyroid cancer (DTC); levothyroxine TSH suppression therapy post-surgery."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Simple Nontoxic Goiter","symptoms":"Visible neck swelling, pressure in throat, mostly asymptomatic","goal":"Reduce goiter size, relieve compressive symptoms","soc":"Levothyroxine (TSH suppression therapy) – controversial; observation for small goiters. Iodine supplementation where deficient (not relevant in iodine-sufficient US)."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Silent Lymphocytic Thyroiditis","symptoms":"Brief hyperthyroid phase then hypothyroidism; painless; postpartum form common","goal":"Manage transient thyroid phases, prevent permanent hypothyroidism","soc":"Beta-blockers (propranolol 10–40 mg TID) for symptomatic hyperthyroid phase (not anti-thyroid drugs – thyroiditis, not overproduction); levothyroxine for hypothyroid phase if symptomatic or TSH >10."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Subacute Thyroiditis","symptoms":"Painful tender thyroid, fever, jaw pain, transient hyperthyroid then hypothyroid","goal":"Relieve thyroid pain, manage thyroid dysfunction phases","soc":"NSAIDs (aspirin 2–4 g/day or ibuprofen 1600–3200 mg/day) for mild cases; prednisone 30–40 mg/day for severe pain/inflammation."},{"ta":"Endocrine and Metabolic","subcategory":"Thyroid Disorders","indication":"Euthyroid Sick Syndrome","symptoms":"Abnormal thyroid labs during severe illness, no true thyroid disease","goal":"Treat underlying illness; thyroid replacement generally not needed","soc":"None (treat underlying critical illness – surgery, infection, trauma); thyroid hormone replacement is not indicated and may be harmful; supportive care."},{"ta":"Endocrine and Metabolic","subcategory":"Macronutrient Disorders","indication":"Protein-Energy Undernutrition (PEU)","symptoms":"Severe weight loss, muscle wasting, edema, impaired immunity","goal":"Restore weight and muscle mass; correct immune deficiency","soc":"Oral nutritional supplements (ONS) such as Ensure, Boost providing 300–600 kcal/day with 15–25g protein. Medical nutrition therapy with registered dietitian. Enteral tube feeding for severe cases."},{"ta":"Endocrine and Metabolic","subcategory":"Macronutrient Disorders","indication":"Essential Fatty Acid Deficiency","symptoms":"Scaly dermatitis, hair loss, impaired wound healing, growth failure","goal":"Restore omega-3/omega-6 balance; resolve dermatologic symptoms","soc":"IV lipid emulsion (e.g., Intralipid 20%, providing linoleic and linolenic acid) for TPN patients; oral fish oil or vegetable oil supplementation for dietary deficiency."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Iron Deficiency","symptoms":"Fatigue, pallor, shortness of breath, pica, weakness","goal":"Replenish iron stores; resolve anemia and symptoms","soc":"Oral ferrous sulfate/ferrous gluconate 150–200 mg elemental iron/day in divided doses. IV iron (ferric carboxymaltose, ferumoxytol, low-molecular-weight iron dextran) for intolerance, malabsorption, or severe IDA."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Zinc Deficiency","symptoms":"Dermatitis, diarrhea, impaired immunity, poor wound healing, hypogonadism","goal":"Restore zinc; improve immunity and skin health","soc":"Oral zinc sulfate or zinc gluconate 25–50 mg elemental zinc/day (25–50 mg 3× daily for severe deficiency). IV zinc chloride for TPN patients."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Fluorine Deficiency","symptoms":"Dental caries, weakened tooth enamel, increased fracture risk","goal":"Restore fluoride; prevent dental caries and bone loss","soc":"Sodium fluoride supplements (0.25–1 mg/day orally, age-appropriate) or fluoride-containing toothpaste/mouthwash. Prescription fluoride for high-risk dental caries."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Iodine Deficiency","symptoms":"Goiter, hypothyroidism, fatigue, cretinism in infants","goal":"Restore iodine; normalize thyroid function; prevent goiter","soc":"Iodine supplementation (potassium iodide, iodized salt) for deficiency; levothyroxine if hypothyroidism established. Potassium iodide 150–300 mcg/day orally."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Copper Deficiency","symptoms":"Anemia, neutropenia, neurologic deficits, bone abnormalities","goal":"Restore copper; reverse hematologic and neurologic deficits","soc":"Oral copper supplementation (copper gluconate or copper sulfate, 2–8 mg/day). IV copper for malabsorption. Copper chloride added to TPN."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Molybdenum Deficiency","symptoms":"Neurologic deterioration, seizures, lens dislocation, sulfite sensitivity","goal":"Restore molybdenum cofactor; prevent neurologic damage","soc":"Cyclic pyranopterin monophosphate (cPMP; fosdenopterin [Nulibry]) for molybdenum cofactor deficiency type A — FDA-approved in 2021 as first Rx for this condition. IV fosdenopterin 0.9 mg/kg/day."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Selenium Deficiency","symptoms":"Cardiomyopathy (Keshan disease), hypothyroidism, muscle weakness, cognitive impairment","goal":"Restore selenium; prevent cardiac and thyroid complications","soc":"Oral selenium supplementation (sodium selenite or selenomethionine, 50–200 mcg/day). IV selenium chloride for TPN patients."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Chromium Deficiency","symptoms":"Impaired glucose tolerance, weight loss, peripheral neuropathy","goal":"Restore chromium levels; normalize glucose metabolism","soc":"Chromium supplementation (chromium picolinate or chromium chloride, 200–1000 mcg/day orally). Typically OTC; IV chromium for TPN patients."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Deficiencies","indication":"Manganese Deficiency","symptoms":"Growth retardation, skeletal abnormalities, impaired glucose tolerance, dermatitis","goal":"Replenish manganese; correct metabolic abnormalities","soc":"Manganese supplementation (manganese chloride or manganese sulfate, 2–5 mg/day orally). Added to TPN for deficient patients. No FDA-approved Rx product."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Iron Toxicity","symptoms":"Vomiting, abdominal pain, GI bleeding, liver failure, shock","goal":"Remove excess iron; prevent multi-organ failure","soc":"Deferoxamine (IV/IM chelation) for serum iron >500 mcg/dL or symptomatic toxicity. Oral deferiprone or deferasirox for chronic iron overload (thalassemia, hemochromatosis)."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Wilson Disease","symptoms":"Liver disease, Kayser-Fleischer rings, neuropsychiatric symptoms, hemolysis","goal":"Reduce copper accumulation; prevent hepatic and neurologic damage","soc":"D-penicillamine (500–1500 mg/day) or trientine (750–1500 mg/day) as first-line chelation. Zinc acetate (150 mg/day) as maintenance or first-line in pre-symptomatic patients."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Iodine Toxicity","symptoms":"Thyroid dysfunction, hyperthyroidism or hypothyroidism, goiter, metallic taste","goal":"Reduce iodine load; normalize thyroid function","soc":"Discontinue iodine source. Antithyroid drugs (methimazole) if hyperthyroidism develops; levothyroxine if hypothyroidism. Supportive care."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Copper Toxicity","symptoms":"Nausea, liver failure, hemolytic anemia, neuropsychiatric symptoms","goal":"Remove excess copper; prevent organ damage","soc":"D-penicillamine (copper chelator, 750–1500 mg/day orally) or trientine (triethylenetetramine, 750–1250 mg/day) as first-line for Wilson disease-related copper overload; tetrathiomolybdate investigational."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Manganese Toxicity","symptoms":"Manganism: Parkinson-like tremor, psychiatric disturbances, cognitive decline","goal":"Remove manganese; manage neurological symptoms","soc":"Remove manganese exposure. Chelation with CaNa2EDTA or para-aminosalicylic acid (PAS) has some evidence. Levodopa for Parkinson-like symptoms (partial response)."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Chromium Toxicity","symptoms":"Liver/kidney damage, dermatitis, lung cancer risk (hexavalent Cr)","goal":"Remove chromium exposure; support organ function","soc":"None (no FDA-approved pharmacologic antidote). Supportive care: remove exposure, dialysis for renal failure, N-acetylcysteine for oxidative stress. Chelation therapy has limited evidence."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Fluorine Toxicity","symptoms":"Dental/skeletal fluorosis, joint pain, mottled teeth, bone fragility","goal":"Remove fluoride source; manage skeletal complications","soc":"None (no approved pharmacologic antidote). Remove fluoride exposure. Calcium and magnesium supplementation may reduce GI absorption. Supportive care for skeletal fluorosis."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Zinc Toxicity","symptoms":"Nausea, vomiting, abdominal pain, copper deficiency, anemia","goal":"Reduce zinc; manage copper deficiency and GI symptoms","soc":"None (no antidote). Stop zinc source. Copper supplementation for secondary copper deficiency. Supportive GI care."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Selenium Toxicity","symptoms":"Selenosis: hair/nail loss, garlic breath, GI distress, neuropathy","goal":"Remove selenium source; manage toxicity symptoms","soc":"None (no antidote). Remove selenium source. Supportive care. No FDA-approved treatment."},{"ta":"Endocrine and Metabolic","subcategory":"Mineral Toxicities","indication":"Molybdenum Toxicity","symptoms":"Gout-like syndrome, joint pain, elevated uric acid","goal":"Reduce molybdenum intake; manage uric acid/gout symptoms","soc":"None specific. Discontinue excess molybdenum source. Treat gout symptoms with NSAIDs, colchicine, or allopurinol."},{"ta":"Endocrine and Metabolic","subcategory":"Nutritional Support","indication":"Enteral Nutrition","symptoms":"Inability to eat, malnutrition, weight loss, impaired healing","goal":"Deliver nutrients enterally; maintain nutritional status","soc":"Standard polymeric enteral formulas (e.g., Jevity, Osmolite) via nasogastric/nasojejunal tube or gastrostomy (PEG/PEJ). Disease-specific formulas for renal, hepatic, diabetic patients."},{"ta":"Endocrine and Metabolic","subcategory":"Nutritional Support","indication":"Parenteral Nutrition (PN)","symptoms":"Inability to absorb nutrients enterally; malnutrition; weight loss","goal":"Deliver complete nutrition IV; maintain nitrogen balance","soc":"Central or peripheral parenteral nutrition providing dextrose, amino acids, lipid emulsion, electrolytes, vitamins, trace elements. Standardized 3-in-1 admixtures (e.g., KABIVEN, Clinimix) or custom compounded PN."},{"ta":"Endocrine and Metabolic","subcategory":"Nutritional Support","indication":"Nutritional Support for Patients Who Are Dying or Have Severe Dementia","symptoms":"Inability to eat, weight loss, aspiration risk, progressive cognitive decline","goal":"Comfort feeding; prevent aspiration; maintain dignity","soc":"Careful hand feeding (oral assisted feeding) is preferred over tube feeding for patients with severe dementia or at end of life. No pharmacologic SoC for nutritional support in this context."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Vitamin D Deficiency and Dependency","symptoms":"Bone pain, muscle weakness, rickets in children, osteomalacia in adults","goal":"Restore vitamin D; normalize calcium, PTH; improve bone density","soc":"Oral cholecalciferol (vitamin D3) 50,000 IU/week × 8–12 weeks, then 1,500–2,000 IU/day maintenance. Ergocalciferol (D2) is alternative. Calcitriol for renal failure. Paricalcitol for secondary hyperparathyroidism in CKD."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Vitamin B12 Deficiency","symptoms":"Macrocytic anemia, peripheral neuropathy, glossitis, cognitive impairment","goal":"Replenish B12; reverse anemia and neurologic damage","soc":"IM cyanocobalamin 1000 mcg/day × 7 days, then weekly × 4 weeks, then monthly (for pernicious anemia/malabsorption). High-dose oral cyanocobalamin 1000–2000 mcg/day for dietary deficiency."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Vitamin K Deficiency","symptoms":"Easy bruising, prolonged bleeding, elevated PT/INR, newborn hemorrhage","goal":"Restore vitamin K; normalize coagulation factors","soc":"Oral or IV phytonadione (vitamin K1, Mephyton) 2.5–25 mg. IV/IM vitamin K for severe bleeding or INR >10. Vitamin K1 injection for newborns."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Vitamin B6 Deficiency and Dependency","symptoms":"Peripheral neuropathy, seborrheic dermatitis, glossitis, depression, seizures","goal":"Replenish pyridoxine; control seizures in B6-dependent epilepsy","soc":"Oral pyridoxine (vitamin B6) 50–200 mg/day for deficiency. High-dose pyridoxine 10–30 mg/kg/day for pyridoxine-dependent epilepsy (PDE). IV pyridoxine for acute seizures."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Folate Deficiency","symptoms":"Megaloblastic anemia, fatigue, neural tube defects in pregnancy","goal":"Restore folate; prevent anemia and neural tube defects","soc":"Oral folic acid 1–5 mg/day. Folinic acid (leucovorin) for methotrexate-induced deficiency or malabsorption. IV/IM folate for severe cases."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Biotin and Pantothenic Acid","symptoms":"Hair loss, dermatitis, fatigue, neurologic symptoms","goal":"Replenish biotin/B5; resolve deficiency symptoms","soc":"Oral biotin supplementation (5–20 mg/day) for biotin deficiency; oral pantothenic acid (calcium pantothenate, 5–10 mg/day) for B5 deficiency. Both are over-the-counter vitamins."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Thiamin Deficiency","symptoms":"Beriberi: peripheral neuropathy, cardiac failure; Wernicke encephalopathy: confusion, ataxia","goal":"Replenish thiamin urgently; reverse encephalopathy and neuropathy","soc":"IV/IM thiamine (vitamin B1) 100–500 mg/day for Wernicke encephalopathy (high-dose IV thiamine before any glucose). Oral thiamine 100 mg TID for beriberi or chronic deficiency."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Vitamin E Deficiency","symptoms":"Peripheral neuropathy, ataxia, muscle weakness, hemolytic anemia","goal":"Replenish vitamin E; halt neurologic deterioration","soc":"Oral vitamin E (alpha-tocopherol) 400–1200 IU/day. Water-soluble vitamin E (TPGS) for fat malabsorption. High-dose 100 mg/kg/day for abetalipoproteinemia."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Riboflavin Deficiency","symptoms":"Cheilosis, glossitis, corneal vascularization, seborrheic dermatitis, photophobia","goal":"Replenish riboflavin; resolve mucocutaneous symptoms","soc":"Oral riboflavin (vitamin B2) 5–30 mg/day for deficiency. OTC riboflavin 400 mg/day for migraine prophylaxis (separate indication)."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Vitamin C Deficiency","symptoms":"Scurvy: bleeding gums, petechiae, joint pain, impaired wound healing","goal":"Replenish vitamin C; reverse scurvy symptoms quickly","soc":"Oral ascorbic acid (vitamin C) 300–1000 mg/day × 1 month. Resolution of clinical symptoms expected within days–weeks."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Vitamin A Deficiency","symptoms":"Night blindness, xerophthalmia, increased infection risk, dry skin","goal":"Restore vitamin A; prevent blindness and immune impairment","soc":"Oral vitamin A (retinol) 200,000 IU × 2 days then 200,000 IU at day 14 for xerophthalmia (WHO protocol). Vitamin A palmitate IM for malabsorption."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Deficiencies","indication":"Niacin Deficiency","symptoms":"Pellagra: dermatitis, diarrhea, dementia (3 Ds), mouth sores","goal":"Replenish niacin; resolve pellagra symptoms rapidly","soc":"Oral niacinamide (nicotinamide) 100–300 mg/day in divided doses (preferred over nicotinic acid to avoid flushing). Or niacin 100 mg TID for 2–4 weeks."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Toxicities","indication":"Niacin Toxicity","symptoms":"Flushing, hepatotoxicity, hyperglycemia, hyperuricemia, GI upset","goal":"Manage niacin-related adverse effects; discontinue excess niacin","soc":"None (stop niacin use). Symptomatic: aspirin 325 mg 30 min before dose reduces flushing; antihistamines. Hepatotoxicity: discontinue niacin, supportive care."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Toxicities","indication":"Vitamin B6 Toxicity","symptoms":"Sensory neuropathy, ataxia, dermatologic lesions, photosensitivity","goal":"Discontinue excess B6; allow neuropathy to recover","soc":"None (no antidote). Discontinue pyridoxine supplements >200 mg/day. Supportive care for neuropathy."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Toxicities","indication":"Vitamin D Toxicity","symptoms":"Hypercalcemia, nausea, polyuria, kidney stones, soft tissue calcification","goal":"Reduce vitamin D; normalize calcium; prevent renal damage","soc":"Stop vitamin D supplementation. IV fluids (normal saline) for hypercalcemia. Furosemide diuresis. Corticosteroids (prednisone 20–60 mg/day) to reduce intestinal calcium absorption."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Toxicities","indication":"Vitamin C Toxicity","symptoms":"GI upset, diarrhea, kidney stones (oxalate), hemolysis in G6PD deficiency","goal":"Reduce vitamin C intake; prevent nephrolithiasis","soc":"None (no antidote). Reduce vitamin C intake. Hydration for oxalate nephrolithiasis. Treat kidney stones per urologic guidelines."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Toxicities","indication":"Vitamin A Toxicity","symptoms":"Headache, dizziness, nausea, liver damage, teratogenicity, bone pain","goal":"Discontinue vitamin A; manage liver injury and ICP","soc":"None specific. Discontinue vitamin A supplementation. Treat intracranial hypertension with acetazolamide or CSF drainage if pseudotumor cerebri."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Toxicities","indication":"Vitamin E Toxicity","symptoms":"Bleeding tendency, impaired wound healing, fatigue, GI upset","goal":"Reduce vitamin E; manage anticoagulant interactions","soc":"None (no antidote). Discontinue vitamin E supplements. Manage anticoagulation carefully (vitamin E inhibits vitamin K metabolism). No FDA-approved treatment."},{"ta":"Endocrine and Metabolic","subcategory":"Vitamin Toxicities","indication":"Vitamin K Toxicity","symptoms":"Vitamin K3 (menadione) toxicity: hemolytic anemia, jaundice, hyperbilirubinemia","goal":"Remove vitamin K3 exposure; manage hemolysis","soc":"None (no antidote). Discontinue vitamin K3 (menadione). Supportive care. Note: K1 and K2 are essentially non-toxic at physiologic doses."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Acute Abdominal Pain","symptoms":"Sudden severe abdominal pain, nausea, vomiting, tenderness","goal":"Identify cause, relieve pain, prevent complications","soc":"IV opioid analgesics (morphine, hydromorphone) for pain control; NSAIDs as adjuncts. Antiemetics (ondansetron) for nausea."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Hernias of the Abdominal Wall","symptoms":"Visible bulge, local pain, discomfort with exertion, nausea if incarcerated","goal":"Repair defect, prevent incarceration and strangulation","soc":"None (surgical repair is definitive; no pharmacologic SoC for the hernia itself). Pain management with NSAIDs/acetaminophen post-operatively."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Inguinal Hernia","symptoms":"Groin bulge, pain with lifting, dragging sensation, may incarcerate","goal":"Repair defect, prevent incarceration, relieve pain","soc":"None (surgical repair—open Lichtenstein mesh or laparoscopic TEP/TAPP—is definitive SoC). Post-op NSAIDs/acetaminophen for pain."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Intestinal Obstruction","symptoms":"Severe abdominal pain, vomiting, distension, inability to pass stool or gas","goal":"Relieve obstruction, restore bowel function, prevent ischemia","soc":"For small bowel obstruction (adhesive): IV fluids, NG decompression, bowel rest; water-soluble contrast (Gastrografin) both diagnostic and therapeutic. Surgical intervention for complete or strangulated obstruction."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Intra-Abdominal Abscesses","symptoms":"Fever, localized abdominal pain, tenderness, leukocytosis","goal":"Drain abscess, eradicate infection, prevent sepsis","soc":"Percutaneous CT-guided drainage plus IV antibiotics: piperacillin-tazobactam (Zosyn) or cefoxitin + metronidazole (Flagyl) covering gram-negative and anaerobic bacteria."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Acute Mesenteric Ischemia","symptoms":"Sudden severe abdominal pain, nausea, vomiting, bloody stool","goal":"Restore mesenteric blood flow, prevent bowel necrosis","soc":"IV heparin (anticoagulant) immediately upon diagnosis; papaverine (vasodilator) via intra-arterial catheter for arterial occlusion. Surgical embolectomy or bowel resection is definitive."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Ileus","symptoms":"Absent bowel sounds, abdominal distension, nausea, inability to pass gas","goal":"Restore bowel motility, relieve distension, prevent complications","soc":"Supportive care (NPO, IV fluids, nasogastric decompression); alvimopan (Entereg; peripherally acting mu-opioid receptor antagonist) for post-operative ileus."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Ischemic Colitis","symptoms":"Sudden left-sided abdominal cramping, bloody diarrhea, urgency","goal":"Restore colonic blood flow, prevent necrosis and perforation","soc":"Supportive: bowel rest, IV fluids, and broad-spectrum antibiotics (ciprofloxacin + metronidazole or piperacillin-tazobactam) to prevent bacterial translocation."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Appendicitis","symptoms":"Right lower abdominal pain, nausea, vomiting, fever, rebound tenderness","goal":"Eliminate infection, prevent perforation or recurrence","soc":"Surgical appendectomy (standard); IV antibiotics (cefoxitin or piperacillin-tazobactam) perioperatively. Non-operative antibiotic management (amoxicillin-clavulanate or IV ertapenem) increasingly used for uncomplicated cases."},{"ta":"Gastrointestinal","subcategory":"Acute Abdomen and Surgical Gastroenterology","indication":"Acute Perforation of the Gastrointestinal Tract","symptoms":"Sudden severe abdominal pain, board-like rigidity, fever, shock","goal":"Control peritoneal contamination, prevent sepsis, restore GI integrity","soc":"Broad-spectrum IV antibiotics (piperacillin-tazobactam or imipenem; carbapenems for severe cases) plus emergent surgical repair."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Fecal Incontinence","symptoms":"Inability to control bowel movements, leakage of stool, urgency","goal":"Restore continence, improve quality of life, reduce leakage episodes","soc":"Dietary fiber supplementation + anti-diarrheal agents (loperamide; opioid receptor agonist) to firm stool consistency; pelvic floor physical therapy."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Levator Syndrome","symptoms":"Chronic deep rectal/pelvic pain, pressure, spasm in sitting position","goal":"Relieve pelvic floor muscle spasm, reduce chronic pain","soc":"Pelvic floor physical therapy (biofeedback) is first-line; cyclobenzaprine or diazepam (muscle relaxants) as adjuncts."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Proctitis","symptoms":"Rectal pain, urgency, tenesmus, rectal bleeding, mucus discharge","goal":"Achieve mucosal healing, eliminate infection, relieve symptoms","soc":"For inflammatory (ulcerative proctitis): topical mesalamine suppositories 1g/day (5-ASA; anti-inflammatory). For infectious: pathogen-specific antibiotics (e.g., ceftriaxone + doxycycline for gonococcal; acyclovir for herpetic)."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Anorectal Fistula","symptoms":"Chronic perianal discharge, pain, perianal skin irritation, recurrent abscesses","goal":"Close fistula tract, preserve continence, prevent recurrence","soc":"Surgical fistulotomy for simple low fistulas. Seton placement for complex fistulas. Infliximab (Remicade; anti-TNF biologic) for fistulizing Crohn's disease-associated fistulas."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Pruritus Ani (Anal Itching)","symptoms":"Intense anal itching, burning, perianal skin irritation, excoriation","goal":"Eliminate causative factor, relieve itch, restore skin barrier","soc":"Topical low-potency corticosteroid (hydrocortisone 1% cream) + skin barrier protection; elimination of irritants (soaps, foods). Capsaicin 0.006% cream for idiopathic pruritus ani."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Hemorrhoids","symptoms":"Rectal bleeding, anal itching, pain, prolapsing tissue, discomfort","goal":"Reduce symptoms, shrink hemorrhoids, prevent prolapse","soc":"Dietary fiber (psyllium; bulking agent) + sitz baths + topical hydrocortisone/lidocaine (corticosteroid/anesthetic) for symptom relief."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Anal Fissure","symptoms":"Sharp anal pain during/after bowel movements, bright red rectal bleeding, skin tear","goal":"Heal fissure, reduce internal sphincter spasm, prevent recurrence","soc":"Topical nitroglycerin 0.2% (nitrate; relaxes internal anal sphincter) or topical diltiazem 2% (calcium channel blocker) applied to anus; sitz baths, fiber, stool softeners."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Rectal Prolapse and Procidentia","symptoms":"Protrusion of rectal tissue through anus, mucus discharge, incontinence","goal":"Restore anatomy, preserve continence, prevent recurrence","soc":"None pharmacologic—surgical repair (rectopexy or Altemeier procedure) is definitive. Manual reduction with osmotic agents (sugar/hypertonic solution) for acute prolapse reduction."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Anorectal Abscess","symptoms":"Severe anal pain, swelling, erythema, fever, fluctuant perianal mass","goal":"Drain abscess, eradicate infection, prevent fistula formation","soc":"Surgical incision and drainage (I&D) is the definitive treatment. Antibiotics (amoxicillin-clavulanate, ciprofloxacin + metronidazole) indicated for cellulitis, immunocompromised patients, or systemic infection."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Pilonidal Disease","symptoms":"Painful cyst/abscess at tailbone, chronic drainage, recurrent infection","goal":"Drain acute abscess, heal chronically, prevent recurrence","soc":"Surgical drainage for acute abscess; wide excision or Karydakis flap for chronic disease. Antibiotics (amoxicillin-clavulanate) only as adjunct in acute infection with cellulitis."},{"ta":"Gastrointestinal","subcategory":"Anorectal Disorders","indication":"Solitary Rectal Ulcer Syndrome","symptoms":"Rectal bleeding, straining, mucus discharge, incomplete evacuation, rectal pain","goal":"Heal ulcer, reduce straining, improve defecation, prevent progression","soc":"Behavioral therapy (defecation retraining) + fiber supplementation; topical sucralfate enemas (mucosal protectant) or mesalamine enemas (5-ASA) as first-line pharmacologic."},{"ta":"Gastrointestinal","subcategory":"Bezoars and Foreign Bodies","indication":"Esophageal Foreign Bodies","symptoms":"Dysphagia, drooling, chest pain, sensation of something stuck in throat","goal":"Remove foreign body safely, prevent esophageal injury","soc":"Endoscopic removal (flexible esophagoscopy) is standard. Glucagon IV (relaxes lower esophageal sphincter; smooth muscle relaxant) used as first-line for food impaction to facilitate spontaneous passage."},{"ta":"Gastrointestinal","subcategory":"Bezoars and Foreign Bodies","indication":"Gastric and Intestinal Foreign Bodies","symptoms":"Usually asymptomatic; may cause abdominal pain, obstruction, perforation","goal":"Monitor for natural passage or retrieve to prevent complications","soc":"Watchful waiting with serial X-rays for blunt objects in stomach. Endoscopic or surgical retrieval for sharp objects, large objects, or disk batteries."},{"ta":"Gastrointestinal","subcategory":"Bezoars and Foreign Bodies","indication":"Bezoars","symptoms":"Nausea, vomiting, abdominal pain, early satiety, palpable mass","goal":"Dissolve or remove bezoar, prevent recurrence","soc":"Coca-Cola lavage (phytobezoars) or cellulase/acetylcysteine as enzymatic dissolving agents; endoscopic fragmentation for large bezoars."},{"ta":"Gastrointestinal","subcategory":"Bezoars and Foreign Bodies","indication":"Rectal Foreign Bodies","symptoms":"Rectal pain, fullness, inability to defecate, perianal discomfort","goal":"Remove foreign body safely, prevent rectal injury or perforation","soc":"None pharmacologic
