ory":"Anxiety Disorders","indication":"Panic Attacks and Panic Disorder","symptoms":"Sudden intense fear episodes, heart racing, breathlessness, terror","goal":"Eliminate panic attacks; reduce anticipatory anxiety","soc":"SSRIs (paroxetine, sertraline — FDA-approved) and SNRIs (venlafaxine) are first-line. Combined with CBT/panic-focused exposure therapy."},{"ta":"Neurosciences","subcategory":"Anxiety Disorders","indication":"Specific Phobias","symptoms":"Intense fear of specific object or situation; immediate anxiety and avoidance","goal":"Eliminate phobic response; restore ability to face feared situations","soc":"Exposure therapy (CBT) is first-line and most effective. Pharmacotherapy is adjunctive: D-cycloserine (memory consolidation augment) or SSRIs for comorbid anxiety."},{"ta":"Neurosciences","subcategory":"Anxiety Disorders","indication":"Agoraphobia","symptoms":"Fear and avoidance of open spaces, crowds, public transport","goal":"Expand mobility, reduce avoidance, achieve independence","soc":"SSRIs (sertraline, paroxetine) or SNRIs (venlafaxine) are first-line pharmacotherapy, combined with CBT/exposure therapy."},{"ta":"Neurosciences","subcategory":"Dissociative Disorders","indication":"Depersonalization/Derealization Disorder","symptoms":"Feeling detached from one's body or surroundings; emotional numbness","goal":"Reduce dissociative episodes; restore sense of reality","soc":"CBT (specifically tailored for DPDR) is first-line. No FDA-approved pharmacotherapy. SSRIs (fluoxetine, sertraline) and lamotrigine used off-label."},{"ta":"Neurosciences","subcategory":"Dissociative Disorders","indication":"Dissociative Identity Disorder","symptoms":"Multiple distinct identity states, memory gaps, dissociative episodes","goal":"Integrate identity states; reduce dissociation and trauma symptoms","soc":"Psychotherapy (trauma-focused, phase-oriented treatment, ISSTD guidelines) is sole primary treatment. No FDA-approved pharmacotherapy. SSRIs/antipsychotics treat comorbid symptoms."},{"ta":"Neurosciences","subcategory":"Dissociative Disorders","indication":"Dissociative Amnesia","symptoms":"Inability to recall important personal information, usually trauma-related","goal":"Recover memory continuity; process underlying trauma","soc":"Psychotherapy (trauma-focused CBT, EMDR, hypnotherapy) is primary. No FDA-approved pharmacotherapy; sodium amytal (amobarbital) historically used as abreactive interview agent."},{"ta":"Neurosciences","subcategory":"Eating Disorders","indication":"Binge-Eating Disorder","symptoms":"Recurrent uncontrolled overeating, shame, distress without purging","goal":"Reduce binge frequency, improve psychological distress","soc":"Vyvanse (lisdexamfetamine, AMPHETAMINE) — the only FDA-approved drug for BED (2015). Indicated for moderate-to-severe BED in adults."},{"ta":"Neurosciences","subcategory":"Eating Disorders","indication":"Bulimia Nervosa","symptoms":"Recurrent binge-purge cycles, shame, dental erosion, electrolyte imbalance","goal":"Eliminate binge-purge cycle; restore healthy eating patterns","soc":"Fluoxetine (Prozac) 60 mg/day is the only FDA-approved drug for bulimia nervosa. Combined with CBT for optimal outcomes."},{"ta":"Neurosciences","subcategory":"Eating Disorders","indication":"Avoidant/Restrictive Food Intake Disorder (ARFID)","symptoms":"Extreme food selectivity, fear of eating, weight loss, nutritional deficiency","goal":"Expand food variety, restore nutrition, reduce distress","soc":"No FDA-approved pharmacotherapy. Behavioral/CBT-based exposure therapy (ARFID-specific CBT) and nutritional counseling are standard. Cyproheptadine and SSRIs used off-label."},{"ta":"Neurosciences","subcategory":"Eating Disorders","indication":"Anorexia Nervosa","symptoms":"Extreme food restriction, distorted body image, severe underweight","goal":"Restore healthy weight, normalize eating, prevent relapse","soc":"No FDA-approved pharmacotherapy. Nutritional rehabilitation and psychotherapy (CBT, FBT for adolescents) are standard. Olanzapine used off-label for weight gain and anxiolysis."},{"ta":"Neurosciences","subcategory":"Eating Disorders","indication":"Pica","symptoms":"Compulsive eating of non-nutritive, non-food substances (dirt, chalk, clay)","goal":"Eliminate pica behavior; address nutritional deficiencies; ensure safety","soc":"Behavioral interventions (ABA, habit reversal) are primary. Iron/zinc supplementation if deficient. No FDA-approved pharmacotherapy."},{"ta":"Neurosciences","subcategory":"Eating Disorders","indication":"Rumination Disorder","symptoms":"Repeated regurgitation and re-chewing of food without nausea or disgust","goal":"Eliminate regurgitation; restore normal eating and weight","soc":"Behavioral intervention (diaphragmatic breathing, HRT) is first-line. No FDA-approved pharmacotherapy."},{"ta":"Neurosciences","subcategory":"Mood Disorders","indication":"Depressive Disorders","symptoms":"Persistent sadness, loss of interest, fatigue, suicidal thoughts","goal":"Achieve and maintain remission; restore daily functioning","soc":"SSRIs (escitalopram, sertraline) are first-line pharmacotherapy. SNRIs (venlafaxine, duloxetine) are also first-line alternatives."},{"ta":"Neurosciences","subcategory":"Mood Disorders","indication":"Bipolar Disorders","symptoms":"Alternating mania/depression, mood instability, impaired judgment","goal":"Stabilize mood, prevent relapse, restore functioning","soc":"Lithium (mood stabilizer) for maintenance; valproate/quetiapine for acute mania; quetiapine or lurasidone for bipolar depression."},{"ta":"Neurosciences","subcategory":"Mood Disorders","indication":"Suicidal Behavior","symptoms":"Suicidal ideation, planning, or attempts; self-harm with intent to die","goal":"Eliminate suicidal ideation; ensure safety; address root psychiatric disorders","soc":"Lithium (reduces suicide risk — most robust evidence); clozapine (FDA-approved for reducing suicidal behavior in schizophrenia/schizoaffective). Esketamine (Spravato) has rapid antisuicidal effects."},{"ta":"Neurosciences","subcategory":"Mood Disorders","indication":"Cyclothymic Disorder","symptoms":"Mild mood swings between hypomania and mild depression for ≥2 years","goal":"Stabilize mood; prevent progression to bipolar disorder","soc":"Psychotherapy (CBT) is typically first-line. Lithium and valproate are used off-label for mood stabilization; no FDA-approved drug specific to cyclothymia."},{"ta":"Neurosciences","subcategory":"Obsessive-Compulsive and Related Disorders","indication":"Obsessive-Compulsive Disorder (OCD)","symptoms":"Intrusive obsessive thoughts, repetitive compulsions, severe functional impairment","goal":"Reduce obsession/compulsion severity; restore functioning","soc":"SSRIs (fluoxetine, sertraline, fluvoxamine, paroxetine — all FDA-approved) plus ERP (exposure and response prevention) therapy are first-line."},{"ta":"Neurosciences","subcategory":"Obsessive-Compulsive and Related Disorders","indication":"Body Dysmorphic Disorder (BDD)","symptoms":"Obsessive preoccupation with perceived physical flaw, ritualistic checking","goal":"Reduce obsessive thinking, improve functioning and quality of life","soc":"High-dose SSRIs (fluoxetine, fluvoxamine, escitalopram) are first-line pharmacotherapy. Clomipramine (TCA) is second-line."},{"ta":"Neurosciences","subcategory":"Obsessive-Compulsive and Related Disorders","indication":"Body-Focused Repetitive Behavior Disorder","symptoms":"Compulsive hair pulling, skin picking, or nail biting causing distress","goal":"Reduce repetitive behaviors; improve self-control and quality of life","soc":"Habit Reversal Training (HRT) behavioral therapy is first-line. N-acetylcysteine (OTC supplement) has best pharmacologic evidence; no FDA-approved drug."},{"ta":"Neurosciences","subcategory":"Obsessive-Compulsive and Related Disorders","indication":"Excoriation (Skin-Picking) Disorder","symptoms":"Recurrent skin picking causing lesions, distress, and functional impairment","goal":"Reduce picking frequency; heal skin; restore quality of life","soc":"Habit Reversal Training (HRT) behavioral therapy is first-line. N-acetylcysteine is most evidence-based pharmacologic option (off-label); no FDA-approved drug."},{"ta":"Neurosciences","subcategory":"Obsessive-Compulsive and Related Disorders","indication":"Trichotillomania","symptoms":"Recurrent compulsive hair pulling, hair loss, distress or functional impairment","goal":"Reduce hair pulling; restore hair and self-image; improve quality of life","soc":"Habit Reversal Training (HRT) is first-line behavioral treatment. N-acetylcysteine (1,200–2,400 mg/day) is most evidence-based pharmacologic option (off-label); no FDA-approved drug."},{"ta":"Neurosciences","subcategory":"Obsessive-Compulsive and Related Disorders","indication":"Hoarding Disorder","symptoms":"Difficulty discarding possessions, extreme clutter, distress at discarding","goal":"Reduce acquisition and improve discard ability; improve functioning","soc":"Cognitive behavioral therapy for hoarding (CBT-HD) is first-line. SSRIs/venlafaxine used off-label; no FDA-approved drug."},{"ta":"Neurosciences","subcategory":"Obsessive-Compulsive and Related Disorders","indication":"Olfactory Reference Disorder","symptoms":"Preoccupation with emitting a bad odor others find offensive; shame and avoidance","goal":"Reduce olfactory preoccupation; improve social functioning","soc":"CBT (OCD/BDD-adapted with ERP) is primary. SSRIs at high dose (OCD dosing) are pharmacologic first-line (off-label)."},{"ta":"Neurosciences","subcategory":"Other Psychiatric Disorders","indication":"Gender Incongruence and Gender Dysphoria","symptoms":"Distress from mismatch between gender identity and assigned sex at birth","goal":"Reduce dysphoria; align physical presentation with gender identity","soc":"Gender-affirming hormone therapy (testosterone for trans males; estradiol + antiandrogens for trans females) is first-line medical treatment. Psychotherapy supportive."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Exhibitionistic Disorder","symptoms":"Recurrent urge to expose genitals to non-consenting persons causing distress","goal":"Reduce paraphilic urges; prevent harmful behaviors","soc":"CBT and relapse prevention therapy are first-line. Antiandrogens (medroxyprogesterone acetate, leuprolide) and SSRIs used off-label for urge reduction."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Pedophilic Disorder","symptoms":"Recurrent sexual attraction to prepubescent children causing distress or offending behavior","goal":"Prevent offending; reduce pedophilic urges and recidivism","soc":"Antiandrogens (medroxyprogesterone acetate, leuprolide) for high-risk/acting-out individuals; SSRIs for non-offending pedophilia with distress. Combined with psychotherapy."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Frotteuristic Disorder","symptoms":"Recurrent urge to touch/rub against non-consenting persons causing distress","goal":"Reduce paraphilic urges; prevent offending behavior","soc":"CBT and relapse prevention therapy first-line. SSRIs and antiandrogens used off-label."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Voyeuristic Disorder","symptoms":"Recurrent arousal from watching unsuspecting persons undress/engage in sexual activity; distress or offending","goal":"Prevent offending; reduce voyeuristic urges and recidivism","soc":"CBT and relapse prevention therapy (often mandatory for offenders). SSRIs for compulsive dimension; antiandrogens for high-risk offenders."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Fetishistic Disorder","symptoms":"Recurrent sexual arousal to non-living objects or body parts causing distress","goal":"Reduce distress; manage paraphilic urges if problematic","soc":"Psychotherapy (CBT) when distress or impairment present. SSRIs for obsessive-compulsive dimension; antiandrogens for severe cases (off-label)."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Sexual Sadism Disorder","symptoms":"Recurrent arousal from inflicting pain/humiliation on others; may lead to offending","goal":"Prevent harm; reduce sadistic urges; prevent recidivism","soc":"Antiandrogens (leuprolide, MPA) for acting-out/dangerous cases. SSRIs for non-offending distress. CBT mandatory."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Sexual Masochism Disorder","symptoms":"Recurrent distress or impairment from sexual arousal to receiving pain/humiliation","goal":"Reduce paraphilic distress and impairment; improve safety","soc":"Psychotherapy (CBT, acceptance-based) when distress/impairment present. SSRIs for obsessive sexual thoughts; antiandrogens if behaviors are dangerous."},{"ta":"Neurosciences","subcategory":"Paraphilic Disorders","indication":"Transvestic Disorder","symptoms":"Distress or impairment from arousal to cross-dressing","goal":"Reduce distress; improve quality of life if impairment present","soc":"Psychotherapy (CBT) for distress/impairment cases. No FDA-approved pharmacotherapy. SSRIs for OCD dimension."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Borderline Personality Disorder (BPD)","symptoms":"Emotional instability, impulsivity, self-harm, unstable relationships, identity issues","goal":"Reduce self-harm, stabilize emotions, improve relationships","soc":"No FDA-approved pharmacotherapy. Dialectical Behavior Therapy (DBT) is first-line psychological treatment. Atypical antipsychotics and mood stabilizers used off-label."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Avoidant Personality Disorder (AVPD)","symptoms":"Social inhibition, feelings of inadequacy, extreme rejection sensitivity","goal":"Reduce avoidance; improve social engagement and self-esteem","soc":"Psychotherapy (CBT, schema therapy) is primary. SSRIs/SNRIs used off-label for social anxiety dimension (paroxetine, venlafaxine have best evidence)."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Antisocial Personality Disorder (ASPD)","symptoms":"Disregard for rules, aggression, deceitfulness, lack of remorse","goal":"Reduce aggression, impulsivity; improve social functioning","soc":"No FDA-approved pharmacotherapy. Psychotherapy (DBT-adapted, MBT, CBT for offenders) is standard. Mood stabilizers (lithium, valproate) and atypical antipsychotics used off-label for aggression/impulsivity."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Schizotypal Personality Disorder (STPD)","symptoms":"Odd beliefs, magical thinking, social isolation, perceptual distortions","goal":"Reduce psychotic-like symptoms; improve social functioning","soc":"Low-dose atypical antipsychotics (risperidone, olanzapine — off-label) are most commonly used. SSRIs for anxiety/depression components."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Obsessive-Compulsive Personality Disorder (OCPD)","symptoms":"Perfectionism, rigidity, preoccupation with order and control, inflexibility","goal":"Reduce rigidity; improve flexibility and interpersonal relationships","soc":"Psychotherapy (CBT) is primary. No FDA-approved drug. SSRIs helpful for OCD-dimensional overlap."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Paranoid Personality Disorder (PPD)","symptoms":"Pervasive distrust and suspiciousness of others without psychosis","goal":"Reduce suspiciousness; improve social functioning and relationships","soc":"Psychotherapy (CBT) is first-line. No FDA-approved pharmacotherapy. Low-dose antipsychotics for severe paranoia."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Histrionic Personality Disorder (HPD)","symptoms":"Excessive emotionality, attention-seeking, shallow affect, seductiveness","goal":"Improve self-awareness; build healthier relationships and coping skills","soc":"Psychotherapy (psychodynamic therapy, CBT) is primary. No FDA-approved pharmacotherapy. SSRIs for comorbid anxiety/depression; antipsychotics for brief psychotic episodes."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Dependent Personality Disorder (DPD)","symptoms":"Excessive need for others' care, submissiveness, fear of abandonment","goal":"Build autonomy; reduce dependent behavior and separation anxiety","soc":"Psychotherapy (CBT, psychodynamic therapy) is primary. No FDA-approved pharmacotherapy. SSRIs may address comorbid anxiety/depression."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Narcissistic Personality Disorder (NPD)","symptoms":"Grandiosity, lack of empathy, entitlement, need for admiration","goal":"Improve empathy, reduce interpersonal dysfunction and comorbid depression","soc":"Psychotherapy (psychodynamic, CBT) is primary. No FDA-approved pharmacotherapy. SSRIs for comorbid depression; low-dose antipsychotics for anger/agitation."},{"ta":"Neurosciences","subcategory":"Personality Disorders","indication":"Schizoid Personality Disorder (ScPD)","symptoms":"Detachment from social relationships, restricted emotional expression, preference for solitude","goal":"Improve social engagement if desired; reduce comorbid distress","soc":"Individual psychotherapy (CBT, supportive) is primary when treatment sought. No FDA-approved pharmacotherapy."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Schizophrenia","symptoms":"Hallucinations, delusions, disorganized thinking, negative symptoms, cognitive deficits","goal":"Achieve symptom control; prevent relapse; improve functioning","soc":"Atypical antipsychotics (risperidone, olanzapine, aripiprazole, quetiapine) are first-line. Long-acting injectable (LAI) formulations improve adherence."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Schizoaffective Disorder","symptoms":"Psychosis plus concurrent mood disorder (depression or mania/hypomania)","goal":"Control psychosis and stabilize mood; maximize functioning","soc":"Paliperidone (Invega — FDA-approved for schizoaffective disorder) is the primary approved agent. Combined antipsychotic + mood stabilizer/antidepressant for respective subtypes."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Other Schizophrenia Spectrum and Psychotic Disorders","symptoms":"Psychotic features (hallucinations, delusions, disorganization) not meeting full criteria","goal":"Control psychotic symptoms; prevent functional decline","soc":"Atypical antipsychotics (risperidone, olanzapine, aripiprazole, quetiapine) are first-line."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Substance- or Medication-Induced Psychotic Disorder","symptoms":"Hallucinations/delusions during or after substance use or withdrawal","goal":"Resolve acute psychosis; prevent substance use recurrence","soc":"Short-term atypical antipsychotics (quetiapine, risperidone, olanzapine) for psychosis management. Treat underlying SUD."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Delusional Disorder","symptoms":"Fixed false beliefs without hallucinations; daily functioning relatively preserved","goal":"Reduce delusional conviction; improve social functioning","soc":"Antipsychotics (pimozide historically, now atypical antipsychotics — risperidone, olanzapine) are first-line. No FDA-approved drug specifically for delusional disorder."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Psychotic Disorder Due to Another Medical Condition","symptoms":"Hallucinations/delusions directly caused by a medical illness","goal":"Treat underlying condition; manage acute psychosis","soc":"Treat underlying medical cause first. Atypical antipsychotics (quetiapine, risperidone, olanzapine) for acute psychosis management."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Schizophreniform Disorder","symptoms":"Schizophrenia-like psychosis lasting 1–6 months; may resolve completely","goal":"Resolve psychosis; prevent conversion to schizophrenia","soc":"Atypical antipsychotics (risperidone, olanzapine, quetiapine) are first-line for symptom control."},{"ta":"Neurosciences","subcategory":"Psychotic Disorders","indication":"Brief Psychotic Disorder","symptoms":"Sudden hallucinations, delusions, disorganized speech lasting <1 month","goal":"Resolve psychosis rapidly; prevent recurrence","soc":"Atypical antipsychotics (risperidone, olanzapine, quetiapine) are first-line. Short-course benzodiazepines for acute agitation."},{"ta":"Neurosciences","subcategory":"Somatic Symptom and Related Disorders","indication":"Psychological Factors Affecting Other Medical Conditions","symptoms":"Psychological/behavioral factors worsen an existing medical condition","goal":"Reduce psychological impact on medical illness; improve health outcomes","soc":"Integrated psychotherapy (CBT, mindfulness-based CBT) addressing medical illness. Pharmacotherapy targets comorbid depression/anxiety — SSRIs/SNRIs."},{"ta":"Neurosciences","subcategory":"Somatic Symptom and Related Disorders","indication":"Somatic Symptom Disorder","symptoms":"Excessive distress over physical symptoms; disproportionate health anxiety","goal":"Reduce somatic distress; improve functioning and reduce over-medicalization","soc":"CBT for somatic symptoms is first-line. SSRIs/SNRIs (off-label) used for comorbid anxiety/depression."},{"ta":"Neurosciences","subcategory":"Somatic Symptom and Related Disorders","indication":"Illness Anxiety Disorder","symptoms":"Excessive preoccupation with having a serious illness without physical cause","goal":"Reduce health-related anxiety; decrease medical utilization","soc":"CBT for health anxiety is first-line. SSRIs (paroxetine, fluoxetine) are most commonly used pharmacologically (off-label)."},{"ta":"Neurosciences","subcategory":"Somatic Symptom and Related Disorders","indication":"Functional Neurological Symptom Disorder","symptoms":"Neurological symptoms (weakness, seizures, blindness) without structural cause","goal":"Restore neurological function; address psychological triggers","soc":"Physiotherapy/occupational therapy and psychotherapy (CBT) are first-line. SSRIs used for comorbid depression/anxiety (off-label for core symptoms)."},{"ta":"Neurosciences","subcategory":"Somatic Symptom and Related Disorders","indication":"Factitious Disorder Imposed on Self","symptoms":"Deliberate feigning or inducing illness in oneself for sick role; no external gain","goal":"Address underlying psychiatric comorbidities; prevent self-harm","soc":"No FDA-approved pharmacotherapy. Psychotherapy (CBT, motivational interviewing) is recommended. Treat underlying depression, trauma, or personality disorder with SSRIs/antipsychotics."},{"ta":"Neurosciences","subcategory":"Somatic Symptom and Related Disorders","indication":"Factitious Disorder Imposed on Another","symptoms":"Caregiver fabricates/induces illness in another (usually child) for attention","goal":"Protect victim; address caregiver's psychological disorder","soc":"No pharmacotherapy for the perpetrator. Child protection and psychiatric assessment are primary. Psychotherapy for perpetrator if they accept treatment."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Substance Use Disorders","symptoms":"Loss of control over substance use, craving, withdrawal, continued use despite harm","goal":"Achieve abstinence or harm reduction; prevent relapse","soc":"Varies by substance: naltrexone (opioid/alcohol — FDA-approved), buprenorphine/naloxone (Suboxone — opioid), methadone (opioid), acamprosate (alcohol), varenicline (nicotine), bupropion (nicotine)."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Substance-Related Psychiatric Disorders","symptoms":"Psychiatric symptoms (depression, anxiety, psychosis) caused or worsened by substance use","goal":"Treat psychiatric symptoms; achieve sobriety; prevent recurrence","soc":"Treat underlying SUD first; allow 4-week washout before diagnosing independent psychiatric disorder. SSRIs for persistent depression/anxiety post-sobriety."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Opioid Toxicity and Withdrawal","symptoms":"Overdose: coma, miosis, respiratory depression; withdrawal: pain, diarrhea, vomiting","goal":"Reverse overdose immediately; manage withdrawal for detoxification","soc":"Naloxone (opioid antagonist, Narcan) intranasal or IV is first-line emergency antidote for opioid overdose. Opioid withdrawal: methadone or buprenorphine taper; clonidine (alpha-2 agonist) for autonomic symptoms."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Opioid Use Disorder and Rehabilitation","symptoms":"Compulsive opioid use, craving, withdrawal, overdose risk, functional decline","goal":"Achieve remission, prevent overdose death, restore social function","soc":"Buprenorphine/naloxone (Suboxone, partial mu-agonist/antagonist, sublingual or buccal film) is first-line outpatient MOUD; methadone in opioid treatment program (OTP) is first-line for severe/high-risk cases."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Alcohol Use Disorder and Rehabilitation","symptoms":"Compulsive drinking, craving, impaired control, withdrawal on cessation","goal":"Achieve and maintain abstinence or reduced drinking, prevent relapse","soc":"Naltrexone (opioid antagonist, oral or monthly injectable) is the most widely used FDA-approved first-line agent; reduces craving and reward. Acamprosate (GABA/glutamate modulator) is preferred for patients with abstinence as goal."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Marijuana (Cannabis)","symptoms":"Intoxication, anxiety, psychosis, withdrawal with chronic use, impaired memory","goal":"Achieve cessation, manage withdrawal, address cannabis use disorder","soc":"No FDA-approved pharmacotherapy for cannabis use disorder. Behavioral therapies (CBT, motivational enhancement) are standard of care. Acute anxiety/panic: benzodiazepines if needed."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Amphetamines","symptoms":"Euphoria, tachycardia, hypertension, paranoia, psychosis, crash on cessation","goal":"Manage acute toxicity, reduce use, prevent cardiovascular harm","soc":"No FDA-approved pharmacotherapy for amphetamine use disorder. Acute toxicity: benzodiazepines (lorazepam) for agitation, seizures; antihypertensives for hypertension; supportive care."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Cocaine","symptoms":"Euphoria, chest pain, cardiovascular toxicity, paranoia, crash/depression","goal":"Manage cardiovascular toxicity, achieve sustained abstinence","soc":"No FDA-approved pharmacotherapy for cocaine use disorder. Acute intoxication: benzodiazepines for cardiovascular effects and agitation; nitrates/phentolamine for coronary vasospasm/hypertensive crisis."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Alcohol Toxicity and Withdrawal","symptoms":"Tremor, seizures, hallucinations, autonomic instability on alcohol cessation","goal":"Prevent seizures and delirium tremens, ensure safe detoxification","soc":"Benzodiazepines (e.g., chlordiazepoxide or lorazepam, GABA-A agonists) are first-line for alcohol withdrawal symptom management and seizure prevention."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Sedatives","symptoms":"CNS/respiratory depression, overdose coma, severe withdrawal (seizures, delirium)","goal":"Reverse acute toxicity, manage life-threatening withdrawal safely","soc":"Benzodiazepine overdose: flumazenil (benzodiazepine antagonist) is the reversal agent; use cautiously (seizure risk in chronic users). Barbiturate/sedative withdrawal: benzodiazepine taper or phenobarbital substitution taper."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Korsakoff Psychosis","symptoms":"Severe memory impairment, confabulation, inability to form new memories","goal":"Stabilize thiamine levels, limit further memory deterioration, rehabilitate","soc":"High-dose thiamine (vitamin B1, water-soluble vitamin) IV or IM is the primary treatment: 500 mg IV TID × 3–5 days (Pabrinex/parenteral thiamine), then oral thiamine 100 mg TID ongoing."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Ketamine and Phencyclidine (PCP)","symptoms":"Dissociation, agitation, hypertension, hallucinations, anesthesia (K-hole)","goal":"Manage acute agitation and cardiovascular toxicity; treat use disorder","soc":"No FDA-approved agent for ketamine/PCP use disorder. Acute intoxication: benzodiazepines (lorazepam or diazepam) are first-line for agitation and neurotoxicity; low-stimulation environment."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Methylenedioxymethamphetamine (MDMA)","symptoms":"Euphoria, hyperthermia, hyponatremia, serotonin syndrome, neurotoxicity","goal":"Manage acute toxicity (hyperthermia, serotonin syndrome, hyponatremia)","soc":"No FDA-approved pharmacotherapy for MDMA use disorder. Acute toxicity: active cooling and supportive care for hyperthermia; cyproheptadine (serotonin antagonist) and benzodiazepines for serotonin syndrome."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Volatile Solvents","symptoms":"Euphoria, arrhythmia, CNS depression, hepatotoxicity, neurotoxicity","goal":"Prevent sudden sniffing death, manage arrhythmia and organ toxicity","soc":"No specific antidote or approved pharmacologic treatment. Acute toxicity: avoid catecholamine stimulation (risk of 'sudden sniffing death' via sensitized myocardium); supportive care; cardiac monitoring and anti-arrhythmics as needed."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Cannabinoids, Synthetic","symptoms":"Tachycardia, agitation, psychosis, vomiting, seizures, unpredictable toxicity","goal":"Manage acute toxicity, treat psychosis, support cessation","soc":"No FDA-approved antidote or pharmacologic treatment for synthetic cannabinoid use disorder. Acute toxicity: benzodiazepines for agitation/seizures; antipsychotics (haloperidol, olanzapine) for psychosis."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Hallucinogens","symptoms":"Perceptual distortions, panic, dissociation, HPPD; rarely severe toxicity","goal":"Manage acute panic/psychosis, treat persistent perception disorder","soc":"No FDA-approved pharmacotherapy for hallucinogen use disorder or acute intoxication beyond supportive care. Benzodiazepines (lorazepam) for acute agitation/panic ('bad trip') is the clinical standard."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Volatile Nitrites","symptoms":"Methemoglobinemia, hypotension, headache, eye damage, immunosuppression","goal":"Treat methemoglobinemia; prevent ongoing use complications","soc":"Methylene blue (methylthioninium chloride) 1–2 mg/kg IV is first-line antidote for significant methemoglobinemia (MetHb >30% or symptomatic). Supportive oxygen for mild cases."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Cathinones","symptoms":"Agitation, psychosis, hyperthermia, tachycardia, violent behavior","goal":"Manage acute toxicity, prevent cardiovascular and neurological complications","soc":"No FDA-approved pharmacologic treatment. Acute toxicity: benzodiazepines (lorazepam) first-line for agitation, seizure control, and cardiovascular stabilization."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Gamma Hydroxybutyrate","symptoms":"CNS depression, respiratory depression, amnesia, coma at high doses","goal":"Manage airway/respiratory failure, treat withdrawal safely","soc":"No antidote exists. Supportive care is standard: airway protection (intubation if needed), monitoring, and hemodynamic support. GHB withdrawal treated with benzodiazepines ± barbiturates in ICU."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Wernicke Encephalopathy","symptoms":"Ataxia, ophthalmoplegia, confusion — classic triad; often incomplete","goal":"Rapidly restore thiamine to prevent Korsakoff psychosis and death","soc":"High-dose intravenous thiamine (vitamin B1) 500 mg IV TID × 3–5 days (Royal College of Physicians / European guidelines) is the established first-line treatment; prevents progression to Korsakoff syndrome."},{"ta":"Neurosciences","subcategory":"Substance Use Disorders","indication":"Marchiafava-Bignami Disease","symptoms":"Dementia, dysarthria, gait ataxia, corpus callosum demyelination from alcohol","goal":"Limit demyelination progression with thiamine and nutritional support","soc":"High-dose parenteral thiamine (1,500 mg/day IV × 7 days) based on case reports and expert consensus; oral B-complex vitamins and folate concurrently. No randomized controlled trial data exists."},{"ta":"Neurosciences","subcategory":"Trauma and Stress-Related Disorders","indication":"Posttraumatic Stress Disorder (PTSD)","symptoms":"Flashbacks, nightmares, hypervigilance, avoidance after trauma exposure","goal":"Reduce PTSD symptoms; achieve functional remission","soc":"Sertraline (Zoloft) and paroxetine (Paxil) are the only FDA-approved drugs for PTSD. Trauma-focused CBT (CPT, PE) and EMDR are first-line psychotherapies."},{"ta":"Neurosciences","subcategory":"Trauma and Stress-Related Disorders","indication":"Dissociative Subtype of Posttraumatic Stress Disorder","symptoms":"PTSD with depersonalization/derealization; emotional numbing, detachment","goal":"Reduce dissociative symptoms; process trauma safely","soc":"SSRIs (sertraline, paroxetine — FDA-approved for PTSD) are first-line; trauma-focused CBT with dissociation-adapted protocols (phase-based treatment) is recommended."},{"ta":"Neurosciences","subcategory":"Trauma and Stress-Related Disorders","indication":"Adjustment Disorders","symptoms":"Emotional distress, anxiety, or depression after identifiable stressor","goal":"Restore baseline functioning; prevent mood disorder progression","soc":"Psychotherapy (CBT, supportive therapy) is first-line. No FDA-approved pharmacotherapy exists; SSRIs/SNRIs used off-label for anxiety/depressive subtypes."},{"ta":"Neurosciences","subcategory":"Trauma and Stress-Related Disorders","indication":"Domestic Violence","symptoms":"Physical injury, fear, psychological trauma, isolation","goal":"Ensure safety, treat trauma and comorbid PTSD/depression","soc":"No pharmacologic SoC for domestic violence itself. For resultant PTSD: sertraline or paroxetine (SSRIs) are FDA-approved first-line agents."},{"ta":"Neurosciences","subcategory":"Trauma and Stress-Related Disorders","indication":"Acute Stress Disorder (ASD)","symptoms":"Intense fear, flashbacks, dissociation after trauma","goal":"Prevent PTSD, restore daily functioning quickly","soc":"Trauma-focused cognitive behavioral therapy (TF-CBT) is first-line; no FDA-approved pharmacotherapy specifically for ASD, though SSRIs (sertraline, paroxetine) are used off-label."},{"ta":"Oncology","subcategory":"Breast Cancer","indication":"Breast Cancer","symptoms":"Breast lump, skin changes, nipple discharge, axillary swelling","goal":"Achieve pathologic complete response; prevent metastasis; extend survival","soc":"Early HR+/HER2- breast cancer: chemotherapy (AC-T or TC) + CDK4/6 inhibitor (abemaciclib) for high-risk; then endocrine therapy (tamoxifen or aromatase inhibitor). HER2+: pertuzumab + trastuzumab + docetaxel (TCHP). TNBC: neoadjuvant chemotherapy ± pembrolizumab. Metastatic HR+: CDK4/6 inhibitor (palbociclib/ribociclib/abemaciclib) + aromatase inhibitor as first-line."},{"ta":"Oncology","subcategory":"Breast Cancer","indication":"Phyllodes Tumor","symptoms":"Large rapidly growing breast mass, skin stretching, asymmetry","goal":"Achieve R0 resection; prevent local recurrence in malignant type","soc":"Surgery (wide local excision with 1–2 cm margins) is the primary treatment. No standard systemic pharmacologic SoC for non-metastatic phyllodes. For metastatic malignant phyllodes: ifosfamide-based chemotherapy (similar to sarcoma protocols) or doxorubicin + dacarbazine."},{"ta":"Oncology","subcategory":"Cancer Complications and Paraneoplastic Syndromes","indication":"Cachexia in Cancer","symptoms":"Severe unintentional weight loss, muscle wasting, fatigue, anorexia","goal":"Stabilize weight, preserve muscle mass, improve functional status","soc":"None established pharmacologically. Nutritional support + appetite stimulants (megestrol acetate, dronabinol) used off-label."},{"ta":"Oncology","subcategory":"Cancer Complications and Paraneoplastic Syndromes","indication":"Paraneoplastic Syndromes","symptoms":"Neurological deficits, Cushing's, SIADH, hypercalcemia, DIC","goal":"Treat underlying cancer; suppress paraneoplastic immune response","soc":"Treat underlying malignancy (tumor-directed therapy is cornerstone). Immunosuppression (corticosteroids, IVIG, plasmapheresis) for neurological syndromes. Octreotide for carcinoid/ectopic ACTH."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Melanoma","symptoms":"Changing mole (ABCDE), ulceration, nodal swelling, constitutional symptoms in advanced disease","goal":"Complete resection of early disease; durable response in metastatic disease","soc":"Stage III/IV BRAF-mutant: BRAF + MEK inhibitor (dabrafenib + trametinib, or vemurafenib + cobimetinib, or encorafenib + binimetinib). BRAF-wild type: anti-PD-1 (pembrolizumab or nivolumab) ± anti-CTLA-4 (ipilimumab). Adjuvant: pembrolizumab or nivolumab for resected stage III."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Squamous Cell Carcinoma","symptoms":"Irregular firm lesion, ulceration, crusting on sun-exposed skin or mucosa","goal":"Complete excision; prevent nodal spread and distant metastasis","soc":"Localized: Mohs surgery or standard excision. Advanced/metastatic: cemiplimab (Libtayo, anti-PD-1) — FDA-approved 2018 as first-line. Pembrolizumab (Keytruda) — FDA-approved 2020 for locally advanced/metastatic cSCC."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Keratoacanthoma","symptoms":"Rapidly growing keratin-filled nodule on sun-exposed skin, spontaneous regression","goal":"Complete excision; distinguish from SCC; prevent local tissue destruction","soc":"Surgical excision or Mohs surgery (first-line for diagnosis and treatment). No FDA-approved systemic pharmacologic SoC; classified on spectrum with SCC."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Basal Cell Carcinoma","symptoms":"Pearly skin nodule, central ulceration, telangiectasia on sun-exposed areas","goal":"Achieve complete tumor removal; prevent recurrence in high-risk/advanced disease","soc":"Surgery (Mohs or excision) or radiation for localized disease. Advanced/metastatic BCC: hedgehog pathway inhibitor vismodegib (Erivedge, 150 mg/day) or sonidegib (Odomzo, 200 mg/day)."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Squamous Cell Carcinoma in Situ","symptoms":"Erythematous scaly patch (Bowen's disease), persistent on sun-exposed skin","goal":"Eradicate in-situ lesion; prevent progression to invasive SCC","soc":"Topical 5-fluorouracil (5-FU) cream 5% applied BID × 2–4 weeks, or topical imiquimod 5% cream 3–5× weekly × 16 weeks. Cryotherapy or curettage + electrodesiccation also standard."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Paget Disease of the Breast","symptoms":"Eczema-like nipple changes, erosion, discharge, underlying breast mass","goal":"Complete surgical excision; treat underlying breast cancer","soc":"Surgery (mastectomy or breast-conserving surgery + radiation) depending on underlying DCIS/invasive cancer. Systemic therapy per underlying breast cancer (HR+: endocrine therapy; HER2+: trastuzumab-based). No pharmacologic SoC specific to Paget disease itself."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Kaposi Sarcoma","symptoms":"Violaceous skin lesions, lymphedema, GI/pulmonary involvement in advanced disease","goal":"Control lesions; preserve immune function; treat underlying HIV","soc":"AIDS-KS: antiretroviral therapy (ART) as cornerstone; liposomal doxorubicin (Doxil/Caelyx, 20 mg/m² q3w) for symptomatic/advanced disease. Non-AIDS KS: observation or local therapy for indolent; systemic chemotherapy for aggressive."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Merkel Cell Carcinoma","symptoms":"Rapidly growing painless flesh-colored nodule, lymphadenopathy","goal":"Achieve complete remission; prevent rapid spread; long-term response","soc":"Localized: surgery + adjuvant radiation. Advanced/metastatic: avelumab (Bavencio, PD-L1 inhibitor) — FDA-approved 2017 — or pembrolizumab (FDA-approved 2018) as first-line."},{"ta":"Oncology","subcategory":"Cancers of the Skin","indication":"Atypical Fibroxanthoma","symptoms":"Rapidly growing ulcerating nodule on sun-damaged skin of elderly","goal":"Complete surgical excision; prevent local recurrence","soc":"Mohs micrographic surgery or wide local excision with clear margins. No systemic pharmacologic SoC. No FDA-approved drug specifically for AFX."},{"ta":"Oncology","subcategory":"Gastrointestinal and Pancreatic Neuroendocrine Tumors (NETs)","indication":"Gastrointestinal Neuroendocrine Tumors and Carcinoid Syndrome","symptoms":"Flushing, diarrhea, wheezing, carcinoid heart disease (serotonin-mediated)","goal":"Control carcinoid syndrome symptoms; reduce tumor burden; prevent cardiac damage","soc":"Octreotide LAR (somatostatin analogue, 20–30 mg IM q28d) for symptom control and antiproliferative effect (PROMID trial). Lanreotide (Somatuline Depot, 90–120 mg SC q28d) — FDA-approved for control of GI NETs."},{"ta":"Oncology","subcategory":"Gastrointestinal and Pancreatic Neuroendocrine Tumors (NETs)","indication":"Gastrinoma","symptoms":"Severe peptic ulcers, diarrhea, abdominal pain (Zollinger-Ellison syndrome)","goal":"Control gastric acid hypersecretion; control tumor growth; achieve surgical cure","soc":"High-dose proton pump inhibitor (omeprazole 40–60 mg BID or lansoprazole 30–90 mg BID) for acid control. Surgical resection for localized sporadic gastrinoma. Somatostatin analogues (octreotide LAR or lanreotide) for metastatic disease."},{"ta":"Oncology","subcategory":"Gastrointestinal and Pancreatic Neuroendocrine Tumors (NETs)","indication":"Glucagonoma","symptoms":"Necrolytic migratory erythema, diabetes, weight loss, DVT, anemia","goal":"Reduce glucagon levels; control skin lesions; achieve surgical cure","soc":"Somatostatin analogues (octreotide LAR or lanreotide) for symptom control and glucagon suppression. Surgical resection for localized disease. Zinc supplementation for skin lesions."},{"ta":"Oncology","subcategory":"Gastrointestinal and Pancreatic Neuroendocrine Tumors (NETs)","indication":"Vipoma","symptoms":"Profuse watery diarrhea, hypokalemia, achlorhydria (WDHA/Verner-Morrison syndrome)","goal":"Control diarrhea; correct electrolyte imbalance; resect tumor","soc":"IV fluid and electrolyte replacement urgently. Octreotide (subcutaneous or LAR) or lanreotide for immediate VIP suppression and diarrhea control. Surgical resection for localized disease."},{"ta":"Oncology","subcategory":"Gastrointestinal and Pancreatic Neuroendocrine Tumors (NETs)","indication":"Insulinoma","symptoms":"Recurrent hypoglycemia, confusion, sweating, palpitations, seizures","goal":"Normalize blood glucose; achieve curative surgical resection","soc":"Surgery (enucleation or distal pancreatectomy) is curative in >90% of benign insulinomas. Medical: diazoxide (opens K-ATP channel, 50–300 mg/day) for inoperable cases. Octreotide/lanreotide as adjunct."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Prostate Cancer","symptoms":"Urinary frequency, weak stream, hematuria, bone pain in advanced disease","goal":"Achieve PSA undetectability; delay castration resistance; extend OS","soc":"Localized: active surveillance, radiation (EBRT/brachytherapy), or radical prostatectomy. Metastatic hormone-sensitive (mHSPC): ADT + novel AR-pathway inhibitor (enzalutamide, apalutamide, darolutamide). Metastatic castration-resistant (mCRPC): enzalutamide or abiraterone (first-line); docetaxel for high-volume/aggressive."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Bladder Cancer","symptoms":"Painless hematuria, frequency, dysuria, pelvic pain in advanced disease","goal":"Achieve complete response/preserve bladder; prevent muscle invasion; extend OS in advanced","soc":"Non-muscle-invasive (NMIBC): TURBT + intravesical BCG (Bacillus Calmette-Guérin, 81 mg/dose induction + maintenance). Muscle-invasive (MIBC): neoadjuvant cisplatin-based chemotherapy (MVAC or gemcitabine/cisplatin) + radical cystectomy. Metastatic: gemcitabine + cisplatin (GC) or MVAC. PD-L1-high: pembrolizumab or atezolizumab."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Renal Cell Carcinoma","symptoms":"Flank pain, hematuria, palpable mass, fatigue, weight loss","goal":"Achieve complete/partial response; extend PFS and OS; maintain QoL","soc":"Localized: partial or radical nephrectomy. Metastatic/advanced: nivolumab + ipilimumab (intermediate/poor risk) or pembrolizumab + axitinib (or lenvatinib + pembrolizumab) as first-line."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Renal Pelvic and Ureteral Cancers","symptoms":"Hematuria, flank pain, hydronephrosis, palpable mass","goal":"Achieve radical nephroureterectomy; prevent local/distant recurrence","soc":"Surgery (radical nephroureterectomy with bladder cuff). Adjuvant nivolumab (CheckMate-274, FDA 2021) for high-risk resected upper-tract urothelial carcinoma. Metastatic: same as urothelial bladder cancer — GC chemotherapy, then enfortumab vedotin + pembrolizumab."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Penile Cancer","symptoms":"Penile lesion or ulcer, inguinal lymphadenopathy, pain, bleeding","goal":"Achieve complete surgical resection; preserve penile function; control nodal disease","soc":"Surgery (penile-sparing techniques or partial/total penectomy) for localized disease. Adjuvant chemotherapy for high-risk nodal disease: cisplatin + 5-FU or TIP (paclitaxel/ifosfamide/cisplatin)."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Urethral Cancer","symptoms":"Hematuria, urethral discharge, urethral obstruction, palpable mass","goal":"Achieve complete excision; control locoregional spread","soc":"Surgery (urethrectomy ± pelvic exenteration) for localized disease. Concurrent chemoradiation (cisplatin + radiation) for locally advanced. Systemic chemotherapy per urothelial or SCC histology."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Testicular Cancer","symptoms":"Painless testicular mass, scrotal heaviness, gynecomastia, back pain","goal":"Achieve complete remission; cure; preserve fertility","soc":"Orchiectomy (diagnostic and therapeutic). Stage I: active surveillance or adjuvant chemotherapy (1× BEP). Metastatic seminoma/NSGCT: BEP (bleomycin/etoposide/cisplatin) × 3–4 cycles (gold-standard cure rate >80% even in advanced)."},{"ta":"Oncology","subcategory":"Genitourinary Cancers","indication":"Renal Metastases","symptoms":"Hematuria, flank pain; symptoms vary by primary tumor type","goal":"Control systemic disease; preserve renal function","soc":"Treatment of the primary cancer per origin (lung, breast, colon, etc.) drives systemic therapy. Nephrectomy for solitary symptomatic renal metastasis. Local ablation (RFA, cryoablation) for selected cases."},{"ta":"Oncology","subcategory":"Gynecologic Tumors","indication":"Ovarian, Fallopian Tube, and Peritoneal Cancer","symptoms":"Abdominal bloating, pelvic pain, early satiety, urinary frequency","goal":"Achieve complete surgical cytoreduction; prolong PFS and OS","soc":"Optimal debulking surgery + carboplatin + paclitaxel × 6 cycles. BRCA1/2-mutant: add olaparib (PARP inhibitor) as maintenance (SOLO-1). HRD+: niraparib or olaparib maintenance after first-line. Bevacizumab for high-risk stage III/IV (GOG-218)."},{"ta":"Oncology","subcategory":"Gynecologic Tumors","indication":"Endometrial Cancer","symptoms":"Abnormal uterine bleeding, postmenopausal bleeding, pelvic pain, mass","goal":"Achieve surgical cure; prevent recurrence; extend OS in advanced disease","soc":"Surgery (total hysterectomy + bilateral salpingo-oophorectomy ± staging). Adjuvant: based on stage — observation, brachytherapy, EBRT, or chemotherapy (carboplatin + paclitaxel). Advanced/recurrent: carboplatin + paclitaxel + pembrolizumab (KEYNOTE-868); or lenvatinib + pembrolizumab."},{"ta":"Oncology","subcategory":"Gynecologic Tumors","indication":"Cervical Cancer","symptoms":"Vaginal bleeding, discharge, pelvic pain, back pain in advanced disease","goal":"Achieve cure with radiation/surgery; extend OS in metastatic disease","soc":"Localized: concurrent cisplatin + radiation (chemoradiation) is definitive SoC for stages IB2–IVA. Early stage (IA–IB1): conization or radical hysterectomy. Persistent/recurrent: cisplatin + paclitaxel + bevacizumab. Pembrolizumab for PD-L1+ recurrent/metastatic (KEYNOTE-826)."},{"ta":"Oncology","subcategory":"Gynecologic Tumors","indication":"Uterine Sarcomas","symptoms":"Abnormal uterine bleeding, pelvic pain, rapidly growing uterine mass","goal":"Achieve complete surgical resection; control metastatic disease","soc":"Surgery (hysterectomy ± BSO ± lymphadenectomy). Adjuvant gemcitabine + docetaxel for high-risk uterine leiomyosarcoma. Metastatic: doxorubicin alone or gemcitabine + docetaxel."},{"ta":"Oncology","subcategory":"Gynecologic Tumors","indication":"Vulvar Cancer","symptoms":"Vulvar pruritus, lesion, bleeding, inguinal lymphadenopathy","goal":"Achieve wide local excision with sentinel node assessment; prevent recurrence","soc":"Surgery (wide local excision ± sentinel lymph node biopsy; radical vulvectomy for advanced disease). Adjuvant concurrent cisplatin + radiation for positive margins or nodes. Unresectable: chemoradiation as primary."},{"ta":"Oncology","subcategory":"Gynecologic Tumors","indication":"Vaginal Cancer","symptoms":"Vaginal bleeding, discharge, pelvic pain, dyspareunia","goal":"Achieve local tumor control; cure with radiation in early stage","soc":"Radiation therapy (brachytherapy ± EBRT ± concurrent cisplatin) is the primary treatment. Surgery for early-stage disease (Stage I). No FDA-approved drug specifically for vaginal cancer."},{"ta":"Oncology","subcategory":"Gynecologic Tumors","indication":"Gestational Trophoblastic Disease","symptoms":"Abnormal vaginal bleeding, elevated hCG, pelvic mass, hyperemesis","goal":"Achieve hCG normalization (cure); preserve fertility","soc":"Low-risk GTN: single-agent methotrexate (MTX 30–50 mg/m² IM weekly) or actinomycin D. High-risk GTN: EMA-CO (etoposide/methotrexate/actinomycin-D/cyclophosphamide/vincristine) — >90% cure rate."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Gliomas","symptoms":"Headache, seizures, cognitive changes, neurologic deficits, fatigue","goal":"Maximize safe resection; extend PFS and OS; preserve neurologic function","soc":"Glioblastoma (GBM): surgery + temozolomide (TMZ, 75 mg/m² concurrent with RT) + adjuvant TMZ × 6 cycles (Stupp regimen). IDH-mutant glioma (grade 2–3): vorasidenib (Voranigo, IDH1/2 inhibitor, FDA 2024) for grade 2 IDH-mutant glioma. TTFields (Optune device) as add-on for GBM."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Astrocytomas","symptoms":"Headaches, seizures, weakness, personality changes, vision problems","goal":"Maximize tumor control, preserve neurologic function, extend survival","soc":"Surgery (maximal safe resection) + radiation + temozolomide (Temodar) for high-grade (Grade 3–4); IDH-mutant low-grade: watch-and-wait or RT ± PCV chemotherapy."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Pituitary Tumors","symptoms":"Headache, visual field defects, hormonal excess (acromegaly, Cushing's), hormonal deficiency","goal":"Normalize hormone levels; decompress optic apparatus; prevent recurrence","soc":"Prolactinoma: cabergoline (dopamine agonist, 0.25–1 mg twice weekly) — first-line medical therapy. Acromegaly: surgery first; then somatostatin analogues (octreotide LAR or lanreotide) or pegvisomant. Cushing's disease: transsphenoidal surgery; then pasireotide or mifepristone or osilodrostat."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"CNS Tumors in Children","symptoms":"Headache, vomiting, gait problems, vision changes, seizures","goal":"Achieve long-term remission, preserve neurocognitive function","soc":"Surgery (maximal resection) + radiation (age-dependent) + chemotherapy (carboplatin/vincristine for LGG; craniospinal RT for medulloblastoma)."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Meningiomas","symptoms":"Headache, seizures, focal neurologic deficits, visual changes, hearing loss","goal":"Control tumor growth; preserve neurologic function; reduce recurrence","soc":"Surgery (Simpson grade I–II resection) for symptomatic/growing meningiomas. Stereotactic radiosurgery (SRS/Gamma Knife) for small/residual tumors. No FDA-approved systemic pharmacologic SoC for meningioma."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Spinal Tumors","symptoms":"Back pain, radiculopathy, weakness, sensory loss, bowel/bladder dysfunction","goal":"Decompress spinal cord; preserve/restore neurologic function","soc":"Surgical decompression ± radiation. Metastatic spinal cord compression: dexamethasone 10 mg IV bolus, then 4 mg q6h (emergency) + radiation. Intramedullary tumors (ependymoma, astrocytoma): surgery ± radiation."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Ependymomas","symptoms":"Headaches, nausea, gait instability, neck pain, hydrocephalus","goal":"Maximal safe resection plus radiation; prevent recurrence","soc":"Surgery + radiation. No established first-line pharmacologic SoC for upfront treatment."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Primary Brain Lymphomas","symptoms":"Cognitive decline, focal neurologic deficits, personality changes, elevated ICP","goal":"Achieve complete response with chemotherapy; maintain neurologic function","soc":"High-dose methotrexate (MTX, 3.5 g/m² q14d × 6–8 cycles) ± rituximab ± cytarabine (R-MPV or R-MATRix regimen). Followed by consolidation (autologous SCT or reduced-dose WBRT)."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Medulloblastomas","symptoms":"Headache, vomiting, ataxia, diplopia (posterior fossa syndrome), cerebellar signs","goal":"Achieve CR; prevent leptomeningeal spread; limit radiation-related neurotoxicity","soc":"Surgery (maximal safe resection) + craniospinal radiation (CSI, 23.4–36 Gy) + chemotherapy (cisplatin, vincristine, cyclophosphamide; or carboplatin/vincristine/lomustine). Regimen varies by risk group and molecular subtype."},{"ta":"Oncology","subcategory":"Intracranial and Spinal Tumors","indication":"Pineal Region Tumors","symptoms":"Hydrocephalus symptoms, Parinaud syndrome (upgaze palsy), precocious puberty","goal":"Achieve CSF diversion; complete resection or radiation cure; control germ cell tumors","soc":"CSF diversion (ventriculoperitoneal shunt or ETV) for hydrocephalus. Germinomas: highly chemosensitive/radiosensitive — carboplatin + etoposide + CSI; or carboplatin-based chemo followed by reduced-dose RT. Non-germinomatous GCTs: platinum-based chemo + RT."},{"ta":"Oncology","subcategory":"Leukemias","indication":"Chronic Lymphocytic Leukemia (CLL)","symptoms":"Painless lymphadenopathy, fatigue, recurrent infections, splenomegaly, cytopenias","goal":"Achieve deep MRD-negative CR; extend PFS; potentially cure via venetoclax combos","soc":"Ibrutinib + venetoclax (CAPTIVATE/GLOW) or acalabrutinib ± obinutuzumab; or venetoclax + obinutuzumab (CLL14 regimen, time-limited). BTK inhibitor monotherapy acceptable for del17p/TP53 mutation."},{"ta":"Oncology","subcategory":"Leukemias","indication":"Myelodysplastic Syndromes (MDS)","symptoms":"Anemia, fatigue, infections, bleeding, cytopenias, bone marrow failure","goal":"Reduce transfusion dependence; delay AML progression; achieve hematologic improvement","soc":"Lower-risk MDS: erythropoiesis-stimulating agents (ESAs, e.g., darbepoetin alfa); luspatercept (Reblozyl, FDA 2023 for first-line lower-risk MDS with ring sideroblasts/SF3B1 mutation). Del5q: lenalidomide. Higher-risk MDS: hypomethylating agents (azacitidine or decitabine) as first-line."},{"ta":"Oncology","subcategory":"Leukemias","indication":"Chronic Myeloid Leukemia (CML)","symptoms":"Fatigue, splenomegaly, weight loss, night sweats, leukocytosis","goal":"Achieve deep molecular remission (MR4.5); enable treatment-free remission","soc":"BCR-ABL1 tyrosine kinase inhibitor: imatinib (Gleevec, 400 mg/day) as original SoC; or nilotinib, dasatinib, or bosutinib as second-generation TKIs with deeper/faster responses. Ponatinib or asciminib (STAMP inhibitor) for T315I mutation."},{"ta":"Oncology","subcategory":"Leukemias","indication":"Acute Myeloid Leukemia (AML)","symptoms":"Fatigue, infections, bleeding/bruising, bone pain, gum hypertrophy","goal":"Achieve MRD-negative CR; bridge to allogeneic SCT; extend OS in unfit patients","soc":"Fit patients: '7+3' (cytarabine 100 mg/m² × 7d + daunorubicin/idarubicin × 3d) ± midostaurin (FLT3-mutant, FDA 2017) ± gemtuzumab ozogamicin (CD33+, FDA 2017). Elderly/unfit: venetoclax + azacitidine (FDA 2020, VIALE-A trial, standard-of-care)."},{"ta":"Oncology","subcategory":"Leukemias","indication":"Acute Lymphoblastic Leukemia (ALL)","symptoms":"Fatigue, pallor, bruising, infections, bone pain, lymphadenopathy","goal":"Achieve MRD-negative complete remission; cure; prevent CNS relapse","soc":"Pediatric ALL: multi-agent induction (vincristine/dexamethasone/asparaginase/daunorubicin), consolidation, maintenance (6-mercaptopurine + methotrexate × 2–3 years) — >90% cure. Philadelphia chromosome+: add imatinib/dasatinib to chemotherapy. Adult ALL: pediatric-inspired regimens (CALGB-10403); Ph+: ponatinib or dasatinib + reduced chemo."},{"ta":"Oncology","subcategory":"Liver Cancers","indication":"Hepatocellular Carcinoma","symptoms":"Right upper quadrant pain, hepatomegaly, jaundice, ascites, weight loss","goal":"Achieve curative resection/ablation in early stage; extend OS in advanced HCC","soc":"Advanced HCC: atezolizumab + bevacizumab (IMbrave150, FDA 2020) — preferred first-line. Durvalumab + tremelimumab (HIMALAYA, FDA 2022) or sorafenib/lenvatinib as alternatives. Early HCC: resection, ablation, liver transplant (Milan criteria)."},{"ta":"Oncology","subcategory":"Liver Cancers","indication":"Other Primary Liver Cancers","symptoms":"Abdominal pain, jaundice, weight loss, hepatomegaly (intrahepatic cholangiocarcinoma, angiosarcoma)","goal":"Achieve curative resection; control biliary obstruction; extend OS in unresectable","soc":"Intrahepatic cholangiocarcinoma (iCCA): gemcitabine + cisplatin + durvalumab (TOPAZ-1, FDA 2022) as 1L. IDH1-mutant iCCA: ivosidenib 2L (FDA 2021). FGFR2-fusion: pemigatinib (FDA 2020) or futibatinib (FDA 2023)."},{"ta":"Oncology","subcategory":"Liver Cancers","indication":"Metastatic Liver Cancer","symptoms":"Right upper quadrant pain, jaundice, hepatomegaly, weight loss, elevated liver enzymes","goal":"Control systemic disease; reduce liver tumor burden; maintain liver function","soc":"Systemic therapy per primary tumor origin (colorectal: FOLFOX + bevacizumab; breast: systemic breast cancer SoC; etc.). Locoregional therapy (TACE, SIRT/Y-90, ablation) for liver-dominant disease in selected patients."},{"ta":"Oncology","subcategory":"Lymphomas","indication":"Non-Hodgkin Lymphomas","symptoms":"Lymphadenopathy, fatigue, fever, night sweats, abdominal pain, cytopenias","goal":"Achieve CR; cure aggressive NHL; extend PFS in indolent NHL; improve OS","soc":"DLBCL (most common NHL): R-CHOP (rituximab/cyclophosphamide/doxorubicin/vincristine/prednisone) × 6 cycles. Follicular lymphoma: R-CHOP or bendamustine + rituximab (BR); obinutuzumab + chemo. CNS NHL: MTX-based (see Primary Brain Lymphoma)."},{"ta":"Oncology","subcategory":"Lymphomas","indication":"Cutaneous T-cell Lymphomas (CTCL)","symptoms":"Itchy erythematous patches/plaques/tumors on skin, Sézary syndrome (erythroderma, blood involvement)","goal":"Achieve skin clearance; reduce pruritus; prevent progression to large-cell transformation","soc":"Skin-directed therapy: topical corticosteroids, topical mechlorethamine (Valchlor), topical bexarotene, phototherapy (PUVA, NB-UVB) for early stage. Systemic 1L: bexarotene (Targretin, retinoid, FDA 1999) + interferon-alpha or HDAC inhibitor (vorinostat [FDA 2006] or romidepsin [FDA 2009])."},{"ta":"Oncology","subcategory":"Lymphomas","indication":"Hodgkin Lymphoma","symptoms":"Painless lymphadenopathy, B symptoms (fever, night sweats, weight loss), pruritus","goal":"Achieve complete metabolic remission; minimize long-term toxicity; cure","soc":"Early favorable: ABVD (doxorubicin/bleomycin/vinblastine/dacarbazine) × 2–4 cycles + involved-field RT. Advanced stage: BV-AVD (brentuximab vedotin + doxorubicin/vinblastine/dacarbazine, FDA 2018, ECHELON-1) for stage III–IV as preferred first-line."},{"ta":"Oncology","subcategory":"Lymphomas","indication":"Burkitt Lymphoma","symptoms":"Rapidly growing jaw/abdominal mass, tumor lysis syndrome, CNS involvement","goal":"Achieve complete remission with intensive chemotherapy; prevent CNS relapse; cure","soc":"Intensive short-duration regimens: DA-EPOCH-R (dose-adjusted EPOCH + rituximab) for pediatric-like high-intensity; or modified Magrath regimen (CODOX-M/IVAC + rituximab). CR rates 70–90% with cure."},{"ta":"Oncology","subcategory":"Multiple Endocrine Neoplasia (MEN) Syndromes","indication":"Multiple Endocrine Neoplasia, Type 1 (MEN 1)","symptoms":"Parathyroid, pituitary, and pancreatic tumors; hypercalcemia, peptic ulcers, hypoglycemia","goal":"Control hypercalcemia; suppress hormone excess; prevent tumor complications","soc":"Surgery for primary hyperparathyroidism (parathyroidectomy). Gastrinomas: high-dose PPI + surgery if localized. Insulinoma: surgery. Pituitary adenomas: per lesion type (see Pituitary Tumors). Surveillance for non-functioning pNETs."},{"ta":"Oncology","subcategory":"Multiple Endocrine Neoplasia (MEN) Syndromes","indication":"Multiple Endocrine Neoplasia, Type 2A (MEN 2A)","symptoms":"Medullary thyroid carcinoma, pheochromocytoma, primary hyperparathyroidism","goal":"Prophylactic thyroidectomy; control pheochromocytoma; cure MTC","soc":"Prophylactic/therapeutic total thyroidectomy. Pheochromocytoma: surgical adrenalectomy after alpha-blockade. Metastatic MTC: vandetanib (FDA 2011) or cabozantinib (FDA 2012) — RET kinase inhibitors as first-line systemic therapy."},{"ta":"Oncology","subcategory":"Multiple Endocrine Neoplasia (MEN) Syndromes","indication":"Multiple Endocrine Neoplasia, Type 2B (MEN 2B)","symptoms":"Medullary thyroid carcinoma, pheochromocytoma, mucosal neuromas, marfanoid habitus","goal":"Early prophylactic thyroidectomy; control MTC; manage pheochromocytoma","soc":"Total thyroidectomy in infancy (within months of birth for M918T carriers). Advanced MTC: selpercatinib or pralsetinib (RET inhibitors, FDA 2020). Pheochromocytoma: adrenalectomy after alpha-blockade."},{"ta":"Oncology","subcategory":"Multiple Endocrine Neoplasia (MEN) Syndromes","indication":"Multiple Endocrine Neoplasia, Type 4 (MEN 4)","symptoms":"Similar to MEN1: parathyroid tumors, pituitary tumors, pancreatic NETs (CDKN1B mutation)","goal":"Manage hyperparathyroidism; control pituitary and pancreatic hormone excess","soc":"Same as MEN1: parathyroidectomy, surgery for pNETs, SSA for metastatic NETs. Pituitary adenoma treatment per lesion type."},{"ta":"Oncology","subcategory":"Myeloproliferative Neoplasms","indication":"Polycythemia Vera","symptoms":"Headache, itching after bathing, redness of face, thrombosis risk, splenomegaly","goal":"Maintain hematocrit <45%; prevent thrombotic events","soc":"Phlebotomy + low-dose aspirin (81 mg/day) for low-risk. Hydroxyurea (cytoreduction) for high-risk patients (age >60 or prior thrombosis)."},{"ta":"Oncology","subcategory":"Myeloproliferative Neoplasms","indication":"Essential Thrombocythemia","symptoms":"Headaches, tingling, thrombosis risk, splenomegaly, bleeding","goal":"Reduce thrombosis risk, normalize platelet count, prevent transformation","soc":"Low-risk: aspirin alone. High-risk: hydroxyurea (cytoreduction); anagrelide (Agrylin) alternative."},{"ta":"Oncology","subcategory":"Myeloproliferative Neoplasms","indication":"Primary Myelofibrosis (PMF)","symptoms":"Fatigue, splenomegaly, night sweats, bone pain, weight loss, anemia","goal":"Reduce spleen volume, improve symptoms, slow progression, enable transplant","soc":"Ruxolitinib (Jakafi, JAK1/2 inhibitor) 15 mg BID (spleen ≥5 cm) as first-line for intermediate-2/high-risk PMF."},{"ta":"Oncology","subcategory":"Other Cancers","indication":"Hemophagocytic Lymphohistiocytosis (HLH)","symptoms":"Prolonged fever, splenomegaly, cytopenias, hyperferritinemia, neurologic symptoms","goal":"Suppress uncontrolled immune activation, achieve remission, enable SCT","soc":"HLH-94/2004 protocol: dexamethasone + etoposide; cyclosporine added. Allo-SCT for familial/primary HLH."},{"ta":"Oncology","subcategory":"Other Cancers","indication":"Langerhans Cell Histiocytosis","symptoms":"Bone lesions, skin rash, diabetes insipidus, lung infiltrates, lymphadenopathy","goal":"Achieve complete response, prevent diabetes insipidus, halt progression","soc":"Single-system LCH (bone): local steroids or curettage. Multi-system: vinblastine + prednisone (LCH-III protocol)."},{"ta":"Oncology","subcategory":"Other Cancers","indication":"Juvenile Xanthogranuloma","symptoms":"Yellow-orange skin papules/nodules, rare eye involvement, usually asymptomatic","goal":"Observation for skin JXG; systemic therapy for symptomatic/extracutaneous disease","soc":"Observation for most cutaneous JXG (self-resolving). Systemic (rare): BRAF inhibitors if BRAF-mutant histiocytosis or cladribine."},{"ta":"Oncology","subcategory":"Other Cancers","indication":"Heavy Chain Diseases Splenomegaly","symptoms":"Lymphadenopathy, splenomegaly, recurrent infections, diarrhea (alpha-HCD)","goal":"Eradicate abnormal B-cell clone, achieve remission","soc":"Alpha-HCD (most common): antibiotics (tetracycline/ampicillin) if H. pylori or IPSID-related; CHOP-based chemotherapy for aggressive cases."},{"ta":"Oncology","subcategory":"Other Cancers","indication":"Rosai-Dorfman Disease","symptoms":"Massive painless lymphadenopathy, fever, weight loss, skin lesions","goal":"Control symptoms; reduce lymphadenopathy; prevent compressive complications","soc":"Most self-limiting; no pharmacologic SoC for idiopathic RDD. Corticosteroids for symptomatic disease or critical organ involvement."},{"ta":"Oncology","subcategory":"Pediatric Cancers","indication":"Pediatric Cancer","symptoms":"Fatigue, unexplained fever, weight loss, bone pain, lymph node swelling","goal":"Achieve cure with risk-adapted therapy; minimize long-term toxicity","soc":"Disease-specific: ALL (most common) — multi-agent chemotherapy per COG protocols. Medulloblastoma — craniospinal radiation + vincristine/cisplatin/lomustine."},{"ta":"Oncology","subcategory":"Pediatric Cancers","indication":"Neuroblastoma","symptoms":"Abdominal mass, bone pain, fever, weight loss, raccoon eyes","goal":"Achieve remission; consolidate with high-dose chemo and immunotherapy","soc":"Risk-stratified: low-risk: surgery alone. High-risk: induction chemotherapy (ANBL12P1: cyclophosphamide, doxorubicin, vincristine, cisplatin, etoposide) → consolidation → dinutuximab (Unituxin) + cytokines maintenance."},{"ta":"Oncology","subcategory":"Pediatric Cancers","indication":"Rhabdomyosarcoma","symptoms":"Mass in extremity, orbit, head/neck, or genitourinary tract; pain; functional impairment","goal":"Achieve cure with surgery + chemo ± radiation; prevent relapse","soc":"VAC regimen (vincristine + actinomycin D + cyclophosphamide) per COG risk stratification. Low-risk: VA (no cyclophosphamide)."},{"ta":"Oncology","subcategory":"Pediatric Cancers","indication":"Wilms Tumor","symptoms":"Palpable abdominal mass, hematuria, hypertension, fever, abdominal pain","goal":"Achieve cure with surgery + chemotherapy; avoid late effects","soc":"Nephrectomy followed by adjuvant chemotherapy: vincristine + actinomycin D (favorable histology stage I/II). Stage III/IV or anaplastic: vincristine + actinomycin D + doxorubicin ± radiation."},{"ta":"Oncology","subcategory":"Pediatric Cancers","indication":"Retinoblastoma","symptoms":"White pupillary reflex (leukocoria), strabismus, vision loss, eye redness","goal":"Preserve life (cure); preserve eye and vision when possible","soc":"Intra-arterial chemotherapy (IAC: ophthalmic artery melphalan) or systemic chemotherapy (vincristine + carboplatin + etoposide/VCE) for advanced intraocular. Enucleation for unilateral group E."},{"ta":"Oncology","subcategory":"Plasma Cell Neoplasms","indication":"Multiple Myeloma","symptoms":"Bone pain, fatigue, anemia, kidney failure, recurrent infections","goal":"Achieve deep MRD-negative response, prolong PFS and OS","soc":"VRd (bortezomib + lenalidomide + dexamethasone) for transplant-eligible and ineligible patients; daratumumab + VRd (Dara-VRd) as emerging standard since PERSEUS trial 2024."},{"ta":"Oncology","subcategory":"Plasma Cell Neoplasms","indication":"Monoclonal Gammopathy of Undetermined Significance (MGUS)","symptoms":"Asymptomatic; incidentally found elevated M-protein; risk of progression to myeloma","goal":"Monitor for progression; chemoprevention to prevent myeloma (investigational)","soc":"Observation with periodic monitoring (M-protein, CBC, kidney function). No standard pharmacologic treatment for MGUS."},{"ta":"Oncology","subcategory":"Plasma Cell Neoplasms","indication":"Macroglobulinemia","symptoms":"Fatigue, hyperviscosity symptoms, neuropathy, lymphadenopathy, cold sensitivity","goal":"Reduce IgM, control hyperviscosity, achieve treatment response","soc":"BTK inhibitor: ibrutinib (Imbruvica) or zanubrutinib (Brukinsa, FDA 2021 for WM); DRC (dexamethasone+rituximab+cyclophosphamide) or bendamustine+rituximab for transplant-eligible."},{"ta":"Oncology","subcategory":"Tumors of Bones and Joints","indication":"Metastatic Bone Tumors","symptoms":"Bone pain, pathologic fracture, spinal cord compression, hypercalcemia","goal":"Reduce skeletal-related events; control pain; extend mobility and OS","soc":"Bone-modifying agents: denosumab (Xgeva 120 mg SC q4w, FDA-approved for SRE prevention) or zoledronic acid (4 mg IV q3–4w). Plus systemic antineoplastic therapy per primary tumor."},{"ta":"Oncology","subcategory":"Tumors of Bones and Joints","indication":"Bone Tumors and Cysts","symptoms":"Bone pain, swelling, pathologic fracture, limited mobility","goal":"Prevent fracture, relieve pain, preserve function","soc":"Benign: observation or intralesional curettage/bone graft. No universal pharmacologic first-line for benign lesions."},{"ta":"Oncology","subcategory":"Tumors of Bones and Joints","indication":"Joint Tumors","symptoms":"Joint pain, swelling, limited range of motion, hemarthrosis (pigmented villonodular synovitis)","goal":"Achieve synovial disease control; prevent joint destruction; reduce pain","soc":"PVNS/TGCT (tenosynovial giant cell tumor): surgery (synovectomy) as first-line. Pexidartinib (PLX3397, CSF1R inhibitor, Turalio, FDA 2019) — only FDA-approved drug for TGCT."},{"ta":"Oncology","subcategory":"Tumors of Bones and Joints","indication":"Primary Malignant Bone Tumors","symptoms":"Deep bone pain, swelling, pathologic fracture, Codman triangle on X-ray","goal":"Achieve wide surgical resection; prevent metastasis; cure with neoadjuvant chemo","soc":"Osteosarcoma: neoadjuvant MAP (methotrexate/doxorubicin/cisplatin) × 3 cycles → limb-salvage surgery → adjuvant MAP × 3 cycles. Ewing sarcoma: VAIA/VDC-IE (vincristine/doxorubicin/cyclophosphamide/ifosfamide/etoposide) ± RT. Chondrosarcoma: surgery (chemotherapy-resistant); conventional type."},{"ta":"Oncology","subcategory":"Tumors of Bones and Joints","indication":"Benign Bone Tumors and Cysts","symptoms":"Localized bone pain, pathologic fracture risk, swelling, incidental radiologic finding","goal":"Prevent pathologic fracture; relieve pain; ensure normal bone development","soc":"Observation for asymptomatic/stable lesions. Surgical curettage ± bone grafting for symptomatic unicameral bone cysts. Denosumab (RANKL inhibitor) for giant cell tumors of bone (GCTB, FDA 2013) — pharmacologic SoC for unresectable GCTB."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Colorectal Cancer","symptoms":"Rectal bleeding, change in bowel habits, abdominal pain, unexplained weight loss, anemia","goal":"Achieve curative resection; eliminate micrometastatic disease; extend OS in metastatic","soc":"Adjuvant stage III colon: FOLFOX (oxaliplatin/leucovorin/5-FU) × 6 months. Metastatic 1L: FOLFOX + bevacizumab; FOLFIRI + cetuximab/panitumumab for RAS wild-type; FOLFOXIRI + bevacizumab for high-risk. BRAFV600E: encorafenib + cetuximab (Beraftovi + Erbitux, FDA 2020, BEACON CRC)."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Polyps of the Colon and Rectum","symptoms":"Usually asymptomatic; rectal bleeding, change in bowel habits in large polyps","goal":"Remove polyps endoscopically; prevent malignant transformation; reduce CRC risk","soc":"Endoscopic polypectomy (colonoscopy with snare polypectomy) is the standard treatment. No pharmacologic SoC for common sporadic polyps."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Pancreatic Cancer","symptoms":"Painless jaundice, back pain, weight loss, new-onset diabetes, pale stools","goal":"Achieve R0 resection in resectable; extend OS in metastatic; convert borderline to resectable","soc":"Resectable: Whipple procedure → adjuvant FOLFIRINOX or gemcitabine + capecitabine. Metastatic 1L: FOLFIRINOX (5-FU/leucovorin/irinotecan/oxaliplatin) for fit patients; gemcitabine + nab-paclitaxel (Abraxane) for less fit."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Stomach Cancer","symptoms":"Epigastric pain, weight loss, dysphagia, vomiting, early satiety, GI bleeding","goal":"Achieve curative D2 gastrectomy; eliminate micrometastases; extend OS in metastatic","soc":"Localized resectable: perioperative FLOT (5-FU/leucovorin/oxaliplatin/docetaxel) + D2 gastrectomy + adjuvant FLOT. Metastatic 1L: nivolumab + FOLFOX/CAPOX (CHECKMATE-649) for CPS≥5; pembrolizumab + FP + trastuzumab for HER2+ (KEYNOTE-811)."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Gastrointestinal Stromal Tumors (GISTs)","symptoms":"GI bleeding, abdominal pain, palpable mass, early satiety, perforation","goal":"Achieve R0 resection; prevent recurrence with adjuvant imatinib; control metastatic disease","soc":"Surgery (R0 resection) for localized. Adjuvant imatinib (Gleevec, 400 mg/day × 3 years for high-risk, FDA-approved 2012). Metastatic/unresectable 1L: imatinib 400 mg/day (FDA 2002). KIT exon 9 mutation: imatinib 800 mg/day."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Esophageal Cancer","symptoms":"Progressive dysphagia, weight loss, odynophagia, chest pain, regurgitation","goal":"Achieve complete pathologic response with neoadjuvant chemo; extend OS in advanced","soc":"Localized/resectable: neoadjuvant FLOT (5-FU/leucovorin/oxaliplatin/docetaxel) for adenocarcinoma, or carboplatin + paclitaxel + RT (CROSS protocol) for squamous. Metastatic 1L: nivolumab + chemotherapy (CHECKMATE-649); pembrolizumab + FP for squamous/adenocarcinoma."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Lynch Syndrome","symptoms":"Colorectal cancer at early age, endometrial/ovarian cancer, sebaceous tumors, cancer family history","goal":"Prevent CRC and extracolonic cancers; early surveillance and risk reduction","soc":"Colonoscopy surveillance every 1–2 years starting age 20–25. Aspirin (600 mg/day, CAPP2 trial) to reduce CRC risk — only pharmacologic intervention with trial evidence. Prophylactic surgery for high-risk organ sites (hysterectomy/BSO after completion of childbearing)."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Small-Bowel Tumors","symptoms":"Abdominal pain, GI bleeding, obstruction, weight loss, intussusception","goal":"Achieve complete surgical resection; prevent recurrence; control metastatic disease","soc":"Surgery (resection with margins) for localized. Metastatic adenocarcinoma: FOLFOX ± bevacizumab (extrapolated from CRC). Carcinoid/NET: SSA. GIST: imatinib (per GIST guidelines). B-cell lymphoma: R-CHOP."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Anal Cancer","symptoms":"Anal bleeding, pain, mass, pruritus, change in bowel habits","goal":"Achieve complete response with chemoradiation; preserve sphincter function","soc":"Definitive concurrent chemoradiation: mitomycin-C + 5-FU + pelvic RT (Nigro protocol, >80% cure for localized). Metastatic: carboplatin + paclitaxel (first-line) + nivolumab."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Familial Adenomatous Polyposis","symptoms":"Hundreds of colorectal polyps, rectal bleeding, bowel changes, desmoid tumors","goal":"Prevent colorectal cancer; manage desmoid tumors; reduce polyp burden","soc":"Prophylactic colectomy (proctocolectomy with IPAA) is definitive. Sulindac (NSAID) 150 mg BID to reduce polyp number in retained rectum. Celecoxib (FDA-approved for FAP polyp reduction). For desmoid tumors: sulindac ± imatinib; sorafenib."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"MUTYH Polyposis Syndrome","symptoms":"Multiple colorectal polyps (10–100), CRC risk, extracolonic neoplasms","goal":"Reduce polyp burden; prevent colorectal cancer; surveillance for extracolonic cancers","soc":"Endoscopic polypectomy surveillance. Colectomy for unmanageable polyp burden or CRC. No FDA-approved pharmacologic SoC specifically for MAP."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Peutz-Jeghers Syndrome","symptoms":"Mucocutaneous pigmentation, GI hamartomatous polyps, intussusception, cancer risk","goal":"Prevent GI complications; reduce cancer risk through surveillance","soc":"Surveillance colonoscopy/EGD every 2–3 years. Endoscopic polypectomy for large polyps. Rapamycin (sirolimus, mTOR inhibitor) has shown in vitro activity but no established clinical SoC."},{"ta":"Oncology","subcategory":"Tumors of the Gastrointestinal Tract","indication":"Benign Esophageal Tumors","symptoms":"Dysphagia, regurgitation, chest discomfort, incidental endoscopic finding","goal":"Relieve symptoms; confirm benign diagnosis; prevent dysphagia progression","soc":"Endoscopic resection (EMR/ESD) or surgical resection for symptomatic leiomyomas or other benign esophageal tumors. No pharmacologic SoC."},{"
