NI)","symptoms":"Recurrent ear, sinus, and lung infections with normal IgG/IgA/IgM levels","goal":"Prevent recurrent infections, normalize polysaccharide antibody response","soc":"Prophylactic antibiotics (amoxicillin, azithromycin) first-line. Pneumococcal vaccination (Prevnar 20, Pneumovax 23) with post-vaccination titer assessment to confirm diagnosis/guide treatment."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"X-linked Agammaglobulinemia","symptoms":"Absent antibodies, recurrent bacterial infections, absent B cells, enteroviral risk","goal":"Replace absent IgG, prevent bacterial infections and enteroviral encephalitis","soc":"Lifelong IVIG or SCIG replacement therapy to maintain IgG trough ≥500–800 mg/dL."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Transient Hypogammaglobulinemia of Infancy","symptoms":"Low antibody levels in infants, recurrent mild respiratory infections, usually self-resolving","goal":"Monitor for resolution; support with prophylactic antibiotics if symptomatic","soc":"Watchful waiting is the primary approach; prophylactic antibiotics (amoxicillin) for infants with recurrent infections. IVIG reserved for severe symptomatic cases."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Hyper-IgM Syndrome","symptoms":"Recurrent bacterial/opportunistic infections, elevated IgM, absent IgG/IgA/IgE","goal":"Replace deficient immunoglobulins, prevent Pneumocystis and cryptosporidial infections","soc":"IVIG replacement (to supply IgG) + TMP-SMX prophylaxis for Pneumocystis jirovecii are first-line standards for CD40L-deficient (HIGM1) patients."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Ataxia-Telangiectasia","symptoms":"Progressive loss of coordination, dilated blood vessels, recurrent infections, cancer risk","goal":"Manage infections, delay neurodegeneration, prevent cancer","soc":"No disease-modifying pharmacologic SoC. Supportive care: IVIG for humoral immunodeficiency component; prophylactic antibiotics for recurrent infections; physical/occupational therapy."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"DiGeorge Syndrome","symptoms":"Cardiac defects, low calcium, immune deficiency, developmental delay","goal":"Correct thymic deficiency, manage hypocalcemia and cardiac defects","soc":"Calcium and vitamin D supplementation for hypocalcemia. For complete DiGeorge (absent T cells): thymus transplant (RVT-802/Lantidra approach) — only FDA-approved treatment for complete DiGeorge."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"X-linked Lymphoproliferative Syndrome","symptoms":"Fulminant EBV-induced hemophagocytic lymphohistiocytosis (HLH), lymphoma, low immunoglobulins","goal":"Prevent EBV-triggered HLH, achieve immune reconstitution via HSCT","soc":"Allogeneic HSCT before EBV exposure is the only curative approach. IVIG to prevent/manage hypogammaglobulinemia. HLH protocol (dexamethasone + etoposide) for acute EBV-HLH."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Chronic Granulomatous Disease (CGD)","symptoms":"Recurrent severe bacterial/fungal infections, abscesses, granuloma formation","goal":"Prevent life-threatening infections, reduce inflammation","soc":"Prophylactic trimethoprim-sulfamethoxazole (TMP-SMX) and itraconazole are standard first-line antimicrobial prophylaxis. Interferon-gamma (Actimmune) reduces infection frequency."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Hyper-IgE Syndrome","symptoms":"Recurrent skin abscesses, pneumonia, eczema, elevated IgE, skeletal abnormalities","goal":"Prevent infections, manage eczema, reduce IgE-mediated complications","soc":"Prophylactic TMP-SMX for bacterial infections; prophylactic antifungals (itraconazole) for fungal infections. Skin care/antibiotics for eczema management."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Wiskott-Aldrich Syndrome","symptoms":"Bleeding (thrombocytopenia), eczema, recurrent infections, autoimmunity, cancer risk","goal":"Curative HSCT or gene therapy; prevent infections, bleeding, malignancy","soc":"Allogeneic HSCT is curative first-line treatment. IVIG for humoral immunodeficiency; prophylactic TMP-SMX; platelet transfusions for severe bleeding."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Chédiak-Higashi Syndrome","symptoms":"Recurrent infections, partial albinism, bruising, neurological deterioration","goal":"Prevent accelerated phase (HLH), curative HSCT","soc":"Prophylactic antibiotics and antifungals. The only curative treatment is allogeneic HSCT, performed early before accelerated phase. No approved pharmacologic disease-modifying agent."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Chronic Mucocutaneous Candidiasis","symptoms":"Persistent Candida infections of skin, nails, mucous membranes","goal":"Control Candida infections, manage autoimmune complications","soc":"Long-term oral antifungal azoles (fluconazole, itraconazole, voriconazole) are first-line maintenance therapy."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Leukocyte Adhesion Deficiency","symptoms":"Recurrent severe bacterial infections, delayed wound healing, absent pus formation","goal":"Prevent life-threatening infections; curative HSCT","soc":"Prophylactic TMP-SMX + antifungals as first-line antimicrobial prophylaxis. Definitive: allogeneic HSCT."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Severe Combined Immunodeficiency (SCID)","symptoms":"Life-threatening infections from birth, failure to thrive, absent T/B/NK cells","goal":"Curative immune reconstitution via HSCT or gene therapy","soc":"Allogeneic hematopoietic stem cell transplant (HSCT) — definitive first-line curative treatment. Gene therapy is approved for ADA-SCID (Strimvelis in EU; OTL-101/Orchard Therapeutics in US trials). Immediate supportive: IVIG, prophylactic antimicrobials, reverse isolation."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"ZAP-70 Deficiency","symptoms":"Selective CD8+ T cell deficiency, recurrent infections, autoimmunity","goal":"Restore CD8 T cell function, prevent infections, curative HSCT","soc":"Prophylactic antibiotics and antifungals. Allogeneic HSCT — curative for this rare combined immunodeficiency."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Clostridial Intra-Abdominal and Pelvic Infections","symptoms":"Abdominal pain, fever, gas in tissues, peritonitis, septic shock","goal":"Source control, eradicate anaerobes, prevent peritonitis spread","soc":"Surgical/interventional source control + IV metronidazole (Flagyl, nitroimidazole) combined with a cephalosporin (e.g., cefazolin) or piperacillin-tazobactam for mixed aerobic-anaerobic coverage."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Clostridioides difficile Infection","symptoms":"Watery diarrhea (≥3/day), cramping, fever, pseudomembranous colitis","goal":"Eradicate C. difficile, prevent recurrence, restore gut microbiome","soc":"Fidaxomicin (Dificid, macrocyclic antibiotic) 200 mg BID × 10 days preferred over vancomycin (glycopeptide) 125 mg QID × 10 days for initial and recurrent CDI per IDSA/SHEA 2021 guidelines."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Mixed Anaerobic Infections","symptoms":"Foul-smelling abscess, necrotizing tissue, fever, abdominal pain, septic shock","goal":"Eradicate polymicrobial anaerobic bacteria, source control, prevent sepsis","soc":"Metronidazole (Flagyl, nitroimidazole) 500 mg IV q8h combined with beta-lactam (ampicillin or piperacillin-tazobactam Zosyn) for coverage of aerobes + anaerobes. Or meropenem/ertapenem as monotherapy."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Botulism","symptoms":"Double vision, difficulty swallowing, descending paralysis, respiratory failure","goal":"Neutralize toxin, support respiration, prevent respiratory death","soc":"Heptavalent botulinum antitoxin (HBAT, BAT — equine-derived) IV as early as possible; mechanical ventilation for respiratory failure. No antibiotic (toxin-mediated); antibiotics contraindicated in wound botulism except penicillin for wound debridement."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Clostridial Soft-Tissue Infections","symptoms":"Rapidly spreading tissue necrosis, intense pain, gas in tissue, shock","goal":"Debride necrotic tissue, kill Clostridium, prevent fatal toxemia","soc":"Emergent surgical debridement + IV penicillin G + clindamycin (dual antibiotic therapy to both kill bacteria and inhibit toxin production)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Clostridial Infections","symptoms":"Gas gangrene, severe tissue pain, crepitus, systemic toxemia","goal":"Debride infected tissue, kill Clostridium, prevent toxin spread","soc":"Surgical debridement/amputation + high-dose IV penicillin G (10–24 million units/day) + clindamycin (protein synthesis inhibitor to halt toxin production); hyperbaric oxygen as adjunct."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Infant Botulism","symptoms":"Constipation, weak cry, floppy muscle tone, feeding difficulty, respiratory failure in infants","goal":"Neutralize botulinum toxin, support respiration, restore muscle function","soc":"BabyBIG (Botulism Immune Globulin Intravenous [Human], BIG-IV) — the FDA-approved heptavalent treatment for infant botulism; single IV dose administered early."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Clostridial Necrotizing Enteritis","symptoms":"Severe abdominal pain, bloody diarrhea, small bowel necrosis","goal":"Resect necrotic bowel, eradicate C. perfringens, prevent toxemia death","soc":"Surgical resection of necrotic bowel + IV penicillin G + metronidazole; supportive ICU care."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Clostridium perfringens Food Poisoning","symptoms":"Crampy abdominal pain, watery diarrhea (no fever, no vomiting)","goal":"Supportive hydration; self-limiting illness (no antibiotics needed)","soc":"None — self-limiting gastroenteritis; supportive care (oral hydration) only. Antibiotics not indicated."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Anaerobic","indication":"Tetanus","symptoms":"Muscle stiffness and spasms, lockjaw, rigid abdomen, autonomic instability","goal":"Neutralize tetanus toxin, control spasms, support airway, eradicate Clostridium tetani","soc":"Human tetanus immune globulin (TIG, HTIG — Hypertet S/D) 3,000–6,000 units IM (to neutralize unbound toxin); metronidazole 500 mg IV q8h × 10 days (antibiotic to eliminate C. tetani); benzodiazepines (diazepam IV) for spasm control."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Moraxella catarrhalis Infection","symptoms":"Ear infection, sinus congestion, cough, purulent sputum, COPD exacerbation","goal":"Eradicate Moraxella catarrhalis, resolve respiratory infection, prevent COPD worsening","soc":"Amoxicillin-clavulanate (Augmentin, aminopenicillin + BLI) orally; or TMP-SMX, azithromycin, or 2nd/3rd-gen cephalosporins. M. catarrhalis produces beta-lactamase in >90% of strains — amoxicillin monotherapy ineffective."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Acinetobacter Infections","symptoms":"Pneumonia, wound infection, fever, sepsis, organ failure","goal":"Eliminate carbapenem-resistant pathogen, prevent mortality","soc":"Colistin (polymyxin E) or polymyxin B combined with a carbapenem or sulbactam; for carbapenem-susceptible strains, imipenem or meropenem alone. Sulbactam-durlobactam (Xacduro, FDA-approved 2023) is now preferred for carbapenem-resistant Acinetobacter baumannii (CRAB) pneumonia."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Pseudomonas and Related Infections","symptoms":"Pneumonia, wound infection, UTI, sepsis, ear infection","goal":"Eradicate MDR Pseudomonas, prevent septic death, preserve lung function","soc":"Piperacillin-tazobactam (Zosyn, antipseudomonal beta-lactam/BLI) 4.5g IV q6h extended infusion for susceptible strains; ceftolozane-tazobactam (Zerbaxa) or ceftazidime-avibactam (Avycaz) for MDR Pseudomonas aeruginosa."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Klebsiella, Enterobacter, and Serratia Infections","symptoms":"Pneumonia, UTI, sepsis, wound infection, fever, multi-organ failure","goal":"Eradicate carbapenem-resistant gram-negative pathogen, prevent septic death","soc":"Carbapenem-susceptible: meropenem or imipenem-cilastatin (beta-lactam carbapenems). KPC-producing CRKP: ceftazidime-avibactam (Avycaz, cephalosporin + BLI) or meropenem-vaborbactam (Vabomere) or imipenem-cilastatin-relebactam (Recarbrio)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Escherichia coli Infections","symptoms":"Diarrhea (watery or bloody), UTI, bacteremia, hemolytic uremic syndrome","goal":"Eradicate E. coli, prevent HUS, treat sepsis","soc":"Varies by infection type. UTI: TMP-SMX or nitrofurantoin (see Bacterial UTI). Bacteremia: piperacillin-tazobactam or cefepime; ESBL: ertapenem/meropenem. EHEC (O157:H7): supportive — avoid antibiotics (may trigger HUS toxin release per AAP guidelines)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Haemophilus Infections","symptoms":"Meningitis, epiglottitis, pneumonia, otitis media, bacteremia, fever","goal":"Eradicate H. influenzae, prevent meningitis complications, cure pneumonia","soc":"Ceftriaxone (3rd-gen cephalosporin) 2g IV daily for serious infections (meningitis, pneumonia, bacteremia); amoxicillin-clavulanate (Augmentin) for otitis media and mild respiratory infections."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Meningococcal Diseases","symptoms":"Sudden fever, stiff neck, petechial/purpuric rash, severe headache, photophobia","goal":"Eradicate Neisseria meningitidis, prevent septic shock and death within hours","soc":"IV penicillin G 4 million units q4h × 7 days; or ceftriaxone (3rd-gen cephalosporin) 2g IV q12h × 7 days (preferred for empiric therapy). Dexamethasone 0.15 mg/kg q6h × 4 days adjunct."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Proteeae Infections","symptoms":"UTI, wound infection, pneumonia, bacteremia, fever, foul-smelling urine","goal":"Eradicate Proteus/Providencia/Morganella, treat UTI/bacteremia, clear ESBL/MDR strains","soc":"TMP-SMX DS BID × 7 days or ciprofloxacin 500 mg BID × 7 days for uncomplicated UTI. IV ceftriaxone or cefepime for bacteremia. ESBL-producing Proteus: meropenem or ertapenem (carbapenem)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Salmonella Infections","symptoms":"Nausea, vomiting, diarrhea, abdominal cramps, fever","goal":"Reduce severity and duration, prevent bacteremia in high-risk patients","soc":"Most non-typhoidal Salmonella gastroenteritis is self-limiting — antibiotics not routinely recommended for immunocompetent patients. For severe disease, bacteremia, or high-risk hosts: azithromycin (macrolide) or ciprofloxacin (fluoroquinolone); resistance rising, so susceptibility testing essential."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Shigellosis","symptoms":"Bloody diarrhea, tenesmus, fever, abdominal cramps","goal":"Shorten illness, prevent HUS, reduce transmission especially in high-risk settings","soc":"Azithromycin 500 mg daily × 3 days (preferred in US due to fluoroquinolone resistance) or ciprofloxacin 500 mg BID × 3 days (if susceptible). Ceftriaxone 1g IV daily × 3–5 days for severe disease or XDR strains."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"H7 and Other Enterohemorrhagic E. coli (EHEC)","symptoms":"Bloody diarrhea, severe abdominal cramps, hemolytic uremic syndrome (HUS)","goal":"Supportive care; prevent HUS progression, manage renal failure","soc":"No antibiotics recommended — antibiotics increase Shiga toxin release and HUS risk. Treatment is supportive: IV fluid resuscitation, avoid antidiarrheal agents, monitor for HUS (platelets, creatinine, CBC). For established HUS: dialysis if needed."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Campylobacter Infections","symptoms":"Bloody diarrhea, cramping, fever, nausea after poultry exposure","goal":"Eradicate pathogen, prevent bacteremia, shorten illness","soc":"Most cases self-limiting; for moderate-severe disease: azithromycin (macrolide) 500 mg/day × 3–5 days first-line. Fluoroquinolones (ciprofloxacin) widely used but resistance >25% globally; ciprofloxacin still acceptable if susceptible."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Nontyphoidal Salmonella Infections","symptoms":"Diarrhea, fever, abdominal cramps, nausea, vomiting, bloody stool","goal":"Supportive care; antibiotics for high-risk/severe cases; prevent bacteremia","soc":"Most uncomplicated cases: supportive care only (self-limiting 4–7 days). Antibiotics for severe/invasive/high-risk patients: ciprofloxacin (fluoroquinolone) 500 mg BID × 5–7 days or azithromycin 500 mg/day × 3 days; IV ceftriaxone for bacteremia."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Pertussis","symptoms":"Severe uncontrollable coughing fits, whooping sound on inspiration, post-cough vomiting","goal":"Eradicate Bordetella pertussis, reduce cough duration, prevent transmission and infant death","soc":"Azithromycin (macrolide) 500 mg × 1 dose then 250 mg/day × 4 days (adults); or erythromycin × 14 days; or clarithromycin × 7 days. TMP-SMX for macrolide-allergic patients."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Cholera","symptoms":"Profuse watery diarrhea (rice-water stools), vomiting, severe dehydration","goal":"Restore fluid/electrolytes, shorten illness with antibiotics","soc":"Oral rehydration solution (ORS) is primary; doxycycline 300 mg single dose (adults) or azithromycin 1g single dose (children, pregnant women) for moderate-severe disease."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Noncholera Vibrio Infections","symptoms":"Wound infection, necrotizing fasciitis, septicemia, gastroenteritis after raw seafood","goal":"Eradicate Vibrio vulnificus/parahaemolyticus, prevent necrotizing wound infection, prevent death","soc":"Doxycycline 100 mg BID + ceftriaxone 2g IV q12h (combination for V. vulnificus septicemia/wound infection, IDSA guidelines); doxycycline monotherapy for mild gastroenteritis."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Legionella Infections","symptoms":"Severe pneumonia, high fever, cough, shortness of breath, confusion","goal":"Eradicate Legionella pneumophila, prevent respiratory failure, reduce mortality","soc":"Azithromycin (Zithromax, macrolide) IV/oral 500 mg/day × 7–10 days; or levofloxacin (Levaquin, fluoroquinolone) 750 mg/day × 7–10 days — both equivalent and preferred over older tetracyclines."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"HACEK Infections","symptoms":"Subacute endocarditis, fever, malaise, heart murmur, embolic events","goal":"Eradicate HACEK organisms, cure endocarditis, prevent emboli","soc":"Ceftriaxone (3rd-gen cephalosporin) 2g IV daily × 4 weeks for endocarditis (AHA/IDSA endocarditis guidelines 2023)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Kingella Infections","symptoms":"Septic arthritis, osteomyelitis, endocarditis in children, fever, joint swelling","goal":"Eradicate Kingella kingae, cure septic arthritis/osteomyelitis/endocarditis","soc":"Penicillin G or ampicillin (aminopenicillin) IV; amoxicillin-clavulanate for oral step-down. Kingella is highly susceptible to most beta-lactams."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Typhoid Fever","symptoms":"Prolonged fever, headache, rose spots rash, splenomegaly, relative bradycardia","goal":"Eradicate Salmonella Typhi, prevent intestinal perforation and relapse","soc":"Azithromycin 1g on Day 1 then 500 mg × 6 days (preferred oral agent for uncomplicated typhoid in most regions); ceftriaxone 2g IV daily × 7–14 days for severe/hospitalized or MDR S. Typhi."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Melioidosis","symptoms":"Pneumonia, septicemia, fever, skin abscesses, disseminated infection","goal":"Eradicate Burkholderia pseudomallei, prevent septic death, prevent relapse","soc":"Intensive phase: IV ceftazidime (3rd-gen cephalosporin) 50 mg/kg q6h × 10–14 days OR IV meropenem 1g q8h × 10–14 days. Eradication phase: TMP-SMX DS BID × 3–6 months."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Negative","indication":"Oligella Infections","symptoms":"Urinary tract infection, bacteremia, peritonitis (usually in catheterized/compromised patients)","goal":"Eradicate Oligella ureolytica/urethralis, clear UTI/bacteremia","soc":"Beta-lactams (ampicillin, amoxicillin-clavulanate) or fluoroquinolones (ciprofloxacin) for susceptible strains. Susceptibility testing essential (limited data)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Staphylococcal Infections","symptoms":"Skin infections, boils, wound infections, pneumonia, sepsis, toxic shock","goal":"Eradicate MSSA/MRSA, prevent bacteremia, endocarditis, and metastatic spread","soc":"MSSA: nafcillin or oxacillin (antistaphylococcal penicillins) IV, or cefazolin for surgical prophylaxis. MRSA skin/soft tissue: TMP-SMX or clindamycin. MRSA bacteremia/endocarditis: vancomycin (glycopeptide) IV with AUC/MIC monitoring, or daptomycin (Cubicin, lipopeptide) 6–10 mg/kg IV."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Streptococcal Infections","symptoms":"Sore throat, skin infections, fever, scarlet fever rash, necrotizing fasciitis","goal":"Eradicate Group A/B Streptococcus, prevent rheumatic fever, sepsis, and GBS neonatal disease","soc":"Penicillin V (beta-lactam) 500 mg BID-TID × 10 days for Group A Strep pharyngitis; amoxicillin 1g daily × 10 days (equivalent, better compliance). For GAS bacteremia/severe invasive: IV penicillin G + clindamycin (to suppress toxin production)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Pneumococcal Infections","symptoms":"Pneumonia, meningitis, ear infection, septicemia, fever, chest pain","goal":"Eradicate Streptococcus pneumoniae, prevent meningitis/sepsis, treat resistant strains","soc":"Community-acquired pneumonia (outpatient): amoxicillin (aminopenicillin) 1g TID × 5 days or amoxicillin-clavulanate. Inpatient: ceftriaxone 1–2g IV daily. Meningitis: ceftriaxone 2g IV q12h + vancomycin (until susceptibility known) + dexamethasone. High-level PCN resistance: vancomycin or linezolid."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Enterococcal Infections","symptoms":"UTI, wound infection, bacteremia, endocarditis (hospital-acquired)","goal":"Eradicate VRE/ampicillin-resistant Enterococcus, prevent endocarditis","soc":"Ampicillin-susceptible Enterococcus: ampicillin (beta-lactam) ± gentamicin synergy for endocarditis. Vancomycin-resistant Enterococcus (VRE): linezolid (Zyvox, oxazolidinone) or daptomycin (Cubicin, lipopeptide)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Toxic Shock Syndrome (TSS)","symptoms":"High fever, diffuse rash, hypotension, multi-organ failure","goal":"Eliminate toxin-producing bacteria, reverse shock, suppress toxin production","soc":"For staphylococcal TSS: IV antistaphylococcal agent (nafcillin for MSSA, vancomycin for MRSA) + clindamycin (to suppress toxin synthesis). For streptococcal TSS: IV penicillin G + clindamycin + IVIG."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Listeriosis","symptoms":"Fever, muscle aches, nausea, stiff neck, confusion, miscarriage in pregnancy","goal":"Eradicate Listeria monocytogenes, prevent neonatal/CNS death","soc":"IV ampicillin (aminopenicillin) 2g q4h × 14–21 days; addition of gentamicin synergistic for severe disease. CNS/neonatal listeriosis: IV ampicillin + gentamicin; meningitis requires 21–42 days."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Diphtheria","symptoms":"Sore throat, gray pseudomembrane on tonsils, hoarseness, neck swelling","goal":"Neutralize diphtheria toxin, eradicate Corynebacterium, clear membrane","soc":"Diphtheria antitoxin (equine, DAT) IV/IM as soon as suspected (CDC Strategic National Stockpile); plus penicillin G IV or erythromycin × 14 days to eliminate organism."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Gram-Positive","indication":"Erysipeloid","symptoms":"Skin redness, painful swollen fingers (fisherman's/butcher's disease)","goal":"Eradicate Erysipelothrix rhusiopathiae, heal skin lesions","soc":"Penicillin G (beta-lactam) 500 mg PO QID × 5–7 days (benzylpenicillin); amoxicillin alternative. Or ampicillin for systemic forms."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Mycobacterial","indication":"Nontuberculous Mycobacterial Infections","symptoms":"Chronic cough, fatigue, weight loss, cavitary lung disease, lymphadenopathy, skin lesions","goal":"Eradicate NTM, halt lung disease progression, achieve culture conversion","soc":"MAC (Mycobacterium avium complex, most common US NTM): azithromycin or clarithromycin (macrolide) + ethambutol (Myambutol) + rifampin (Rifadin) 3-drug regimen × 12 months post-culture conversion (IDSA/ATS 2020 guidelines)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Mycobacterial","indication":"Tuberculosis (TB)","symptoms":"Persistent cough, night sweats, weight loss, hemoptysis, fatigue","goal":"Sterilize Mycobacterium tuberculosis, prevent relapse and drug resistance","soc":"RIPE regimen: rifampin + isoniazid + pyrazinamide + ethambutol × 2 months (intensive), then rifampin + isoniazid × 4 months (continuation) — 6-month total for drug-susceptible TB."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Mycobacterial","indication":"Extrapulmonary Tuberculosis (TB)","symptoms":"Lymph node swelling, back pain (spinal TB), meningitis, kidney involvement","goal":"Sterilize M. tuberculosis foci, prevent disability and relapse","soc":"2HRZE/4HR: Isoniazid (H) + rifampin (R) + pyrazinamide (Z) + ethambutol (E) × 2 months, then INH + rifampin × 4–7 months (total 6–9 months; TB meningitis 9–12 months)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Mycobacterial","indication":"Leprosy","symptoms":"Skin patches, numbness, muscle weakness, nerve damage, disfigurement","goal":"Eliminate Mycobacterium leprae, prevent nerve damage and disability","soc":"WHO multidrug therapy (MDT): rifampin (rifampicin) + dapsone + clofazimine (Lamprene). PB leprosy (1–5 lesions): rifampin + dapsone × 6 months. MB leprosy (>5 lesions): rifampin + dapsone + clofazimine × 12 months."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Chlamydiae","symptoms":"Urethral discharge, pelvic pain, eye inflammation, pneumonia","goal":"Eradicate Chlamydia, prevent PID, infertility, and transmission","soc":"Doxycycline 100 mg BID × 7 days (first-line for urogenital chlamydia per 2021 CDC STI guidelines, replacing azithromycin single dose due to cure rate superiority in rectal chlamydia)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Mycoplasmas","symptoms":"Walking pneumonia, dry cough, fever, headache, sore throat, ear pain","goal":"Eradicate Mycoplasma pneumoniae/genitalium, cure atypical pneumonia, clear STI","soc":"M. pneumoniae (CAP): azithromycin (macrolide) 500 mg/day × 5 days or doxycycline 100 mg BID × 5–7 days. M. genitalium (STI): doxycycline 100 mg BID × 7 days followed by azithromycin 1g or moxifloxacin (fluoroquinolone) × 7–14 days."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Anthrax","symptoms":"Skin ulcer with black eschar, chest pain, shock, meningitis","goal":"Kill Bacillus anthracis, neutralize toxin, prevent death","soc":"Ciprofloxacin (fluoroquinolone) 500 mg PO BID × 60 days (post-exposure prophylaxis and cutaneous); IV ciprofloxacin or doxycycline + antitoxin (raxibacumab/obiltoxaximab) for inhalation anthrax."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Tularemia","symptoms":"Sudden fever, skin ulcer at bite site, swollen lymph nodes, pneumonia (inhalational)","goal":"Eradicate Francisella tularensis, prevent pneumonic tularemia mortality","soc":"Streptomycin (aminoglycoside) 1g IM BID × 10 days is historical gold standard; gentamicin 5 mg/kg/day IV × 10 days is practical first-line (less toxic, more available); doxycycline 100 mg BID × 14–21 days for mild/moderate disease."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Bartonella Infections","symptoms":"Cat-scratch swelling, fever, lymphadenopathy, bacteremia in homeless","goal":"Eliminate Bartonella species, prevent relapse","soc":"Azithromycin (macrolide) for cat-scratch disease; doxycycline ± rifampin for severe/systemic disease (B. henselae, B. quintana, B. bacilliformis); erythromycin for bacillary angiomatosis."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Nocardiosis","symptoms":"Lung abscess, cavitary pneumonia, brain abscess, skin nodules, chronic cough","goal":"Eradicate Nocardia species, drain abscesses, prevent CNS dissemination","soc":"TMP-SMX (Bactrim, sulfonamide) DS BID–QID × 6–12 months (mild/moderate pulmonary); higher doses + IV for CNS/disseminated. For severe/CNS: imipenem + amikacin + TMP-SMX triple therapy initially."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Cat-Scratch Disease","symptoms":"Swollen lymph nodes, skin papule at scratch site, fever, fatigue","goal":"Accelerate lymph node resolution, prevent systemic spread","soc":"Most self-limiting; azithromycin (macrolide) 500 mg × 1 day then 250 mg/day × 4 days for symptomatic lymphadenopathy (accelerates resolution per RCT data)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Actinomycosis","symptoms":"Slow-growing abscess, sinus tracts, jaw/chest/abdomen swelling","goal":"Eradicate Actinomyces, drain foci, prevent recurrence","soc":"High-dose IV penicillin G (beta-lactam) for 2–6 weeks followed by oral amoxicillin (or penicillin V) for 6–12 months."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Plague and Other Yersinia Infections","symptoms":"Sudden fever, painful swollen lymph nodes (buboes), pneumonia, septic shock, black skin necrosis","goal":"Rapidly eradicate Yersinia pestis, prevent pneumonic spread, prevent death","soc":"Streptomycin (aminoglycoside) IM 15 mg/kg q12h × 10 days (historical first-line) or gentamicin IV 5 mg/kg/day × 10 days. Alternatives: doxycycline 200 mg IV/oral × 10 days; ciprofloxacin × 10 days. Pneumonic plague: doxycycline or fluoroquinolone prophylaxis for contacts."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Rat-Bite Fever","symptoms":"Fever, rash, joint pain after rat bite or contact","goal":"Eradicate Streptobacillus moniliformis or Spirillum minus, prevent endocarditis","soc":"Penicillin G IV 1.2 million units q6h × 7–10 days for severe/systemic disease; oral penicillin V or amoxicillin × 14 days for mild disease."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Trench Fever","symptoms":"Recurrent fever, severe shin bone pain (tibia), headache, rash","goal":"Eradicate Bartonella quintana, prevent bacteremia recurrence in homeless/immunocompromised","soc":"Doxycycline 200 mg daily × 4 weeks + gentamicin 3 mg/kg/day IV × 2 weeks for bacteremia/severe cases; doxycycline monotherapy × 4 weeks for mild disease."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Bacillary Angiomatosis","symptoms":"Vascular skin lesions, fever, lymphadenopathy in HIV patients","goal":"Eliminate Bartonella, prevent dissemination in immunocompromised","soc":"Erythromycin (macrolide) 500 mg QID × 3 months OR doxycycline 100 mg BID × 3 months; both equally effective for Bartonella henselae/quintana."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Brucellosis","symptoms":"Undulant fever, night sweats, joint pain, fatigue, hepatosplenomegaly","goal":"Eradicate Brucella, prevent relapse and focal complications","soc":"Doxycycline 100 mg BID × 6 weeks + gentamicin 5 mg/kg/day × 7–14 days (WHO-preferred); or doxycycline + rifampin 600–900 mg/day × 6 weeks (alternative)."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Other","indication":"Oroya Fever and Verruga Peruana","symptoms":"Oroya: high fever, severe hemolytic anemia; Verruga Peruana: chronic bleeding skin nodules","goal":"Eradicate Bartonella bacilliformis, prevent fatal hemolytic anemia, resolve skin lesions","soc":"Ciprofloxacin (fluoroquinolone) 500 mg BID × 14 days for Oroya fever (first-line per PAHO/WHO). Azithromycin or rifampin alternatives. Verruga Peruana: azithromycin or rifampin × 14–21 days."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Spirochetal","indication":"Lyme Disease","symptoms":"Bull's-eye rash (EM), fever, joint pain, fatigue, cardiac conduction abnormalities","goal":"Eradicate Borrelia burgdorferi, prevent Lyme arthritis, cardiac, neurological complications","soc":"Doxycycline (tetracycline) 100 mg BID × 10–21 days (first-line for early Lyme disease, early disseminated, Lyme carditis); amoxicillin or cefuroxime as alternatives for those who cannot take doxycycline."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Spirochetal","indication":"Relapsing Fever","symptoms":"Recurrent high fever episodes, chills, headache, myalgias, rash","goal":"Eradicate Borrelia spp., prevent Jarisch-Herxheimer reaction complications","soc":"Doxycycline (tetracycline) 100 mg BID × 7–10 days for louse-borne relapsing fever (single dose 200 mg also effective); doxycycline × 14 days for tick-borne relapsing fever."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Spirochetal","indication":"Bejel, Pinta, and Yaws","symptoms":"Skin ulcers, bone pain, joint swelling, skin discoloration","goal":"Eliminate Treponema species, heal lesions, prevent bone destruction","soc":"Benzathine penicillin G 1.2 million units IM single dose (gold standard for all three endemic treponematoses); azithromycin single oral dose (30 mg/kg, max 2g) as alternative per WHO."},{"ta":"Infectious Disease","subcategory":"Bacterial Infections — Spirochetal","indication":"Leptospirosis","symptoms":"Fever, severe muscle aches, jaundice, red eyes, rash, meningitis signs","goal":"Eradicate Leptospira, prevent Weil disease (renal/hepatic failure), prevent death","soc":"Mild disease: doxycycline (tetracycline) 100 mg BID × 7 days. Severe disease: IV penicillin G 1.5 million U q6h × 7 days or ceftriaxone 1g/day × 7 days."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Fungal Infections","symptoms":"Skin rash, nail discoloration, oral thrush, respiratory symptoms, bloodstream infection","goal":"Eradicate fungal pathogen, prevent dissemination, restore immunity","soc":"Depends on species/site. Superficial: topical azoles (clotrimazole, miconazole) or terbinafine. Invasive: systemic azoles (fluconazole, voriconazole, isavuconazole), echinocandins (caspofungin, micafungin), or amphotericin B for severe cases."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Candidiasis","symptoms":"White oral patches, vaginal discharge/itching, esophageal pain, bloodstream infection","goal":"Eliminate Candida, prevent dissemination, restore mucosal integrity","soc":"Mucocutaneous: fluconazole (Diflucan, azole) 150–400 mg × 1–7 days. Invasive candidiasis/candidemia: echinocandin (caspofungin/Cancidas, micafungin/Mycamine, anidulafungin/Eraxis) as first-line per IDSA 2016/2024 updated guidance."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Aspergillosis","symptoms":"Cough, fever, chest pain, hemoptysis, breathlessness in immunocompromised","goal":"Eliminate Aspergillus, preserve lung function, prevent spread","soc":"Voriconazole (Vfend, triazole antifungal) oral/IV is standard first-line for invasive aspergillosis (IA); isavuconazonium sulfate (Cresemba) is non-inferior alternative."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Miscellaneous Opportunistic Fungi","symptoms":"Sinusitis, pneumonia, skin/nail lesions, disseminated infection in immunocompromised","goal":"Eradicate rare mold/yeast pathogen, restore immune function, prevent death","soc":"Voriconazole (Vfend, 2nd-gen triazole) or isavuconazole (Cresemba) for most rare molds; liposomal amphotericin B for highly resistant fungi. Tailored to specific genus/species susceptibility."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Histoplasmosis","symptoms":"Fever, cough, fatigue, shortness of breath, weight loss, lymphadenopathy","goal":"Eradicate Histoplasma capsulatum, prevent dissemination and relapse","soc":"Itraconazole (Sporanox, triazole) 200 mg TID × 3 days then 200 mg BID × 6–12 months for moderate disease. Amphotericin B (liposomal, AmBisome) for severe/disseminated histoplasmosis (induction), then step-down to itraconazole."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Coccidioidomycosis","symptoms":"Fever, cough, fatigue, chest pain, endemic valley region (Arizona/California)","goal":"Eradicate Coccidioides, prevent dissemination, clear lung infiltrates","soc":"Mild-moderate: fluconazole (Diflucan, azole) 400–800 mg/day × 3–6 months; itraconazole equivalent. Severe/disseminated: liposomal amphotericin B × 2–4 weeks then fluconazole step-down."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Mucormycosis","symptoms":"Black nasal discharge, facial swelling, visual loss, orbital cellulitis, rapidly spreading necrosis","goal":"Eradicate Mucor/Rhizopus, prevent fatal tissue invasion, reverse immunosuppression","soc":"Liposomal amphotericin B (AmBisome) 5–10 mg/kg/day IV combined with urgent surgical debridement. Isavuconazole (Cresemba) 200 mg TID × 2 days loading then 200 mg/day oral/IV as step-down or alternative."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Cryptococcosis","symptoms":"Headache, fever, neck stiffness (meningitis), altered mental status","goal":"Eradicate Cryptococcus from CSF and blood, prevent intracranial hypertension","soc":"Induction: amphotericin B deoxycholate (or liposomal AmB, 3–4 mg/kg/day) + flucytosine (5-FC) × 2 weeks. Consolidation: fluconazole 400 mg/day × 8 weeks. Maintenance: fluconazole 200 mg/day × ≥12 months or lifelong if HIV+ with low CD4."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Blastomycosis","symptoms":"Pneumonia, skin lesions, bone pain, fever in endemic regions","goal":"Eradicate Blastomyces, prevent dissemination, preserve lung function","soc":"Mild–moderate: itraconazole (Sporanox, triazole) 200 mg TID × 3 days load then 200 mg BID × 6–12 months. Severe/CNS/immunocompromised: liposomal amphotericin B (AmBisome) × 1–2 weeks, then itraconazole step-down."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Paracoccidioidomycosis","symptoms":"Oral ulcers, hoarseness, skin lesions, respiratory symptoms, lymphadenopathy","goal":"Eradicate Paracoccidioides, prevent dissemination and sequelae","soc":"Itraconazole (Sporanox, triazole) 200 mg/day × 6–12 months (mild-moderate). Severe/disseminated: IV amphotericin B (AmBisome) induction × 2–4 weeks, then itraconazole step-down × 12–18 months."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Phaeohyphomycosis","symptoms":"Subcutaneous cyst, skin abscess, sinusitis, CNS infection (rare), fatigue in immunocompromised","goal":"Eradicate dematiaceous (dark) mold, surgically remove cyst, prevent dissemination","soc":"Voriconazole (Vfend, triazole) with surgical excision for CNS/disseminated disease. Itraconazole for superficial/subcutaneous infection. Posaconazole as alternative."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Mycetoma","symptoms":"Chronic skin/subcutaneous nodules, sinus tracts, bone destruction, foot/limb swelling","goal":"Eliminate eumycetoma or actinomycetoma, prevent limb amputation","soc":"Actinomycetoma (bacterial): TMP-SMX DS BID + amikacin × 6 months as initial intensive phase, then TMP-SMX alone × months–years. Eumycetoma (fungal, e.g., Madurella): itraconazole 400 mg/day × years; very poor response without surgery."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Sporotrichosis","symptoms":"Skin nodules progressing up lymph channels, lung nodules, joint pain","goal":"Eradicate Sporothrix schenckii, prevent dissemination in immunocompromised","soc":"Itraconazole (Sporanox, azole antifungal) 200 mg daily × 3–6 months for lymphocutaneous sporotrichosis. Amphotericin B IV for disseminated or CNS disease."},{"ta":"Infectious Disease","subcategory":"Fungal Infections","indication":"Chromoblastomycosis","symptoms":"Slow-growing warty skin lesions, tissue fibrosis, painful nodules","goal":"Eradicate dematiaceous fungi, achieve skin lesion clearance","soc":"Itraconazole (Sporanox, triazole) 200–400 mg/day × 6–24 months; combination with terbinafine (Lamisil, allylamine) 250–500 mg/day used for refractory disease."},{"ta":"Infectious Disease","subcategory":"General Infectious Disease Concepts","indication":"Bacteremia","symptoms":"High fever or hypothermia, rapid heart rate, chills, shock","goal":"Eradicate bloodstream pathogen, prevent septic shock, organ failure","soc":"Empiric broad-spectrum antibiotics within 1 hour of sepsis recognition: piperacillin-tazobactam (Zosyn, beta-lactam/beta-lactamase inhibitor) or cefepime + vancomycin; de-escalate once culture/susceptibility results available."},{"ta":"Infectious Disease","subcategory":"General Infectious Disease Concepts","indication":"Abscesses","symptoms":"Painful swollen lump, warmth, redness, pus","goal":"Drain abscess, eradicate bacterial infection","soc":"Incision and drainage (I&D) is first-line; trimethoprim-sulfamethoxazole (TMP-SMX, Bactrim) or clindamycin added for MRSA-associated or systemic abscesses."},{"ta":"Infectious Disease","subcategory":"General Infectious Disease Concepts","indication":"Fever","symptoms":"Elevated body temperature, chills, sweating, malaise","goal":"Identify and treat underlying cause; reduce fever discomfort","soc":"Symptomatic: acetaminophen (Tylenol) 500–1000 mg q4–6h or ibuprofen (Advil, NSAID) 400 mg q6–8h. Underlying cause determines specific antimicrobial/antiviral treatment."},{"ta":"Infectious Disease","subcategory":"General Infectious Disease Concepts","indication":"Fever of Unknown Origin (FUO)","symptoms":"Fever >38.3°C ×3 weeks, no identified cause after 1 week of investigation","goal":"Identify underlying cause; targeted treatment when etiology found","soc":"Empirical treatment not recommended until etiology found (risk of obscuring diagnosis). Exception: high suspicion for infection in ill patients may warrant empiric antibiotics or anti-TB therapy pending workup."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Pinworm Infestation","symptoms":"Perianal itching (especially at night), disturbed sleep, irritability in children","goal":"Eradicate Enterobius vermicularis, relieve symptoms, prevent household reinfestation","soc":"Mebendazole (Emverm, benzimidazole anthelmintic) 100 mg single dose, repeated at 2 weeks; or albendazole (Albenza) 400 mg single dose, repeated at 2 weeks; or pyrantel pamoate (OTC, Pin-X) 11 mg/kg single dose × 2 doses 2 weeks apart."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Schistosomiasis","symptoms":"Skin rash, fever, abdominal pain, bloody stool or urine, liver enlargement","goal":"Eliminate Schistosoma worms, prevent fibrosis and organ damage","soc":"Praziquantel (Biltricide, isoquinoline anthelmintic) 40–60 mg/kg/day in 2–3 divided doses × 1 day — single-day treatment for all Schistosoma species."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Ascariasis","symptoms":"Abdominal pain, malnutrition, intestinal obstruction, cough","goal":"Eliminate Ascaris worms, restore nutrition, clear airways","soc":"Albendazole (Albenza, benzimidazole anthelmintic) 400 mg single dose OR mebendazole 100 mg BID × 3 days."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Trichuriasis","symptoms":"Abdominal pain, diarrhea, rectal prolapse (heavy infection), anemia, malnutrition","goal":"Eliminate Trichuris trichiura whipworm, reverse malnutrition","soc":"Albendazole 400 mg daily × 3 days OR mebendazole 500 mg single dose; ivermectin combination improves cure rates for heavy infection."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Strongyloidiasis","symptoms":"Skin rash, abdominal pain, diarrhea, cough; hyperinfection in immunocompromised","goal":"Eradicate Strongyloides larvae, prevent fatal hyperinfection syndrome","soc":"Ivermectin (Stromectol, macrocyclic lactone) 200 mcg/kg/day × 2 days — superior to albendazole for strongyloidiasis."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Onchocerciasis (River Blindness)","symptoms":"Severe itching, skin depigmentation, eye lesions, progressive vision loss, blindness","goal":"Kill microfilariae, reduce ocular inflammation, prevent blindness","soc":"Ivermectin (Stromectol, macrocyclic lactone) 150 mcg/kg single oral dose annually or semi-annually (kills microfilariae, not adult worms); mass drug administration (MDA) program. Doxycycline 200 mg/day × 6 weeks (anti-Wolbachia) kills adult worms — more complete cure but difficult to implement."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Hookworm Infection","symptoms":"Itchy skin rash, anemia, fatigue, abdominal pain, iron deficiency","goal":"Eradicate hookworm, reverse anemia, replete iron stores","soc":"Albendazole (Albenza, benzimidazole anthelmintic) 400 mg single oral dose; or mebendazole 500 mg single dose. Iron supplementation adjunct."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Tapeworm Infections","symptoms":"Mild abdominal discomfort, proglottids in stool, weight loss, vitamin B12 deficiency","goal":"Eliminate adult tapeworm, prevent cystic complications","soc":"Praziquantel (Biltricide, isoquinoline) 5–25 mg/kg single dose for most Taenia species; niclosamide 2g single dose for intestinal tapeworms."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Toxocariasis","symptoms":"Fever, wheezing, enlarged liver, eye pain/vision loss (ocular larva migrans)","goal":"Kill Toxocara larvae, prevent permanent vision loss and organ damage","soc":"Albendazole (benzimidazole) 400 mg BID × 5 days for visceral/covert toxocariasis; corticosteroids added for severe organ involvement. Ocular toxocariasis: periocular corticosteroids ± laser photocoagulation; albendazole debated."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Taenia Solium (Pork Tapeworm) Infection and Cysticercosis","symptoms":"Intestinal: mild GI symptoms; Neurocysticercosis: seizures, headache, hydrocephalus","goal":"Eliminate Taenia solium, resolve CNS cysts, control seizures","soc":"Intestinal tapeworm: praziquantel (isoquinoline) 5–10 mg/kg single dose or niclosamide. Neurocysticercosis: albendazole 7.5 mg/kg BID × 8–30 days + dexamethasone (to manage inflammation); praziquantel 50 mg/kg/day × 15 days alternative."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Echinococcosis","symptoms":"Liver/lung cysts, abdominal fullness, allergic reactions, cyst rupture","goal":"Kill Echinococcus, remove/collapse cysts, prevent anaphylaxis","soc":"Albendazole (benzimidazole) 400 mg BID × cycles (e.g., 28 days on/14 days off) alone or with PAIR procedure (Puncture-Aspiration-Injection-Re-aspiration); surgery for large/complicated cysts."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Filarial Nematode Infections","symptoms":"Lymphedema, swelling, nodules, vision loss, pruritis (varies by species)","goal":"Kill microfilariae and adult worms, reduce lymphedema and blindness","soc":"Depends on species: ivermectin (Stromectol) for onchocerciasis/loiasis; DEC for Bancroftian/Brugian filariasis; albendazole adjunct for all; doxycycline (anti-Wolbachia) for macrofilaricidal activity."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Loiasis","symptoms":"Eye worm (Loa loa migration across eye), skin swellings (Calabar swellings), itching","goal":"Eradicate Loa loa microfilariae and adult worms, prevent encephalopathy","soc":"Diethylcarbamazine (DEC, Hetrazan, antiparasitic) 6–8 mg/kg/day × 21 days; for very high microfilaremia (>8,000 mf/mL), albendazole or apheresis first to reduce load before DEC (prevents encephalopathy)."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Mansonellosis","symptoms":"Itching, skin rash, joint pain, headache, fever (often asymptomatic)","goal":"Eradicate Mansonella filariae, relieve symptoms","soc":"Diethylcarbamazine (DEC) 6 mg/kg/day × 21 days for Mansonella ozzardi; no highly effective drug for Mansonella perstans. Doxycycline 200 mg/day × 6 weeks (anti-Wolbachia strategy) shows efficacy for M. perstans."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Fascioliasis","symptoms":"Right upper quadrant pain, fever, eosinophilia, jaundice, biliary obstruction","goal":"Eliminate Fasciola hepatica/gigantica flukes, restore biliary function","soc":"Triclabendazole (Egaten, halogenated benzimidazole, FDA-approved 2019) 10 mg/kg single or two doses 12 hours apart with food."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Taenia saginata (Beef Tapeworm) Infection","symptoms":"Mild abdominal discomfort, weight loss, visible proglottids in stool","goal":"Eliminate Taenia saginata from intestine, confirm scolex passage","soc":"Praziquantel 5–10 mg/kg single dose; niclosamide 2g single dose as alternative."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Angiostrongyliasis","symptoms":"Severe headache, neck stiffness, eosinophilic meningitis","goal":"Reduce inflammation, manage eosinophilic meningitis symptoms","soc":"Supportive care (analgesics, corticosteroids for inflammation); no proven anthelmintic benefit — albendazole (Albenza) sometimes used but evidence limited."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Anisakiasis","symptoms":"Severe abdominal pain, nausea, vomiting after raw fish ingestion","goal":"Remove Anisakis larvae, relieve gastrointestinal symptoms","soc":"Endoscopic removal of larvae (definitive treatment); pharmacologic therapy has limited evidence. Albendazole sometimes used but efficacy unproven."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Bancroftian Lymphatic Filariasis and Brugian Lymphatic Filariasis","symptoms":"Lymphedema, elephantiasis, genital swelling, recurrent fever","goal":"Kill microfilariae, reduce lymphedema, prevent progression","soc":"Diethylcarbamazine (DEC, antifilarial) 6 mg/kg/day × 12 days OR single-dose DEC + albendazole (MDA regimen); ivermectin + albendazole used in areas co-endemic with onchocerciasis."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Baylisascariasis","symptoms":"Neurological damage, eye inflammation, encephalitis (larvae in CNS)","goal":"Kill Baylisascaris larvae, prevent CNS/ocular damage","soc":"Albendazole (benzimidazole) 25–50 mg/kg/day × 10–20 days (no approved regimen; empirical); corticosteroids adjunctive to reduce inflammation."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Clonorchiasis","symptoms":"Right upper quadrant pain, jaundice, biliary obstruction, fever","goal":"Eliminate liver fluke, prevent cholangitis and cholangiocarcinoma","soc":"Praziquantel (Biltricide, anthelmintic) 75 mg/kg/day divided in 3 doses × 1–2 days."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Coenurosis (Taenia multiceps, Taenia serialis, or Taenia brauni Infection)","symptoms":"Neurological deficits, seizures, headache, visual impairment (CNS cysts)","goal":"Remove or shrink coenurus cysts, prevent fatal neurological damage","soc":"Surgical excision of coenurus cysts is primary treatment; albendazole (benzimidazole) + praziquantel adjunctive with limited evidence."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Diphyllobothriasis (Fish Tapeworm Infection)","symptoms":"Abdominal discomfort, weakness, diarrhea, B12 deficiency (rare)","goal":"Expel fish tapeworm, correct B12 deficiency","soc":"Praziquantel (Biltricide) 10–25 mg/kg single oral dose — cure rate >95%."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Dipylidium caninum Infection","symptoms":"Mild GI discomfort, itching around anus, visible proglottids in stool","goal":"Expel dog/cat tapeworm with single oral dose","soc":"Praziquantel 10 mg/kg single oral dose — highly effective."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Dirofilariasis","symptoms":"Pulmonary nodule, chest pain, cough, subcutaneous nodule (dog heartworm in humans)","goal":"Surgical removal of Dirofilaria worm; prevent misdiagnosis as malignancy","soc":"Surgical excision of pulmonary/subcutaneous nodule (definitive). No pharmacologic treatment of proven benefit in humans."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Dracunculiasis","symptoms":"Slow extraction of guinea worm from skin, intense burning pain, skin ulcer","goal":"Extract guinea worm, prevent secondary bacterial infection","soc":"No pharmacologic treatment. Mechanical: slow manual extraction over days–weeks; wound care. Metronidazole used to reduce inflammation (not kills worm); mebendazole ineffective."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Fasciolopsiasis","symptoms":"Abdominal pain, diarrhea, nausea, edema, allergic reactions","goal":"Eliminate Fasciolopsis buski intestinal fluke","soc":"Praziquantel (Biltricide) 25 mg/kg TID × 1 day (75 mg/kg/day × 1 day); cure rate >95%."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Heterophyiasis and Related Trematode Infections","symptoms":"Diarrhea, abdominal cramps, mucus in stool, cardiac symptoms in heavy infection","goal":"Eradicate intestinal/tissue trematode parasites, prevent cardiac complications","soc":"Praziquantel (Biltricide, isoquinoline anthelmintic) 25 mg/kg TID × 1 day for Heterophyes and related flukes."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Hymenolepis diminuta Infection","symptoms":"Usually asymptomatic; mild diarrhea, abdominal discomfort, nausea","goal":"Eradicate rat tapeworm, resolve GI symptoms","soc":"Praziquantel (Biltricide) 25 mg/kg single oral dose; niclosamide as alternative (not commercially available in US)."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Hymenolepis nana (Dwarf Tapeworm) Infection","symptoms":"Often asymptomatic; diarrhea, abdominal pain, irritability, weight loss in children","goal":"Eradicate dwarf tapeworm, prevent autoinfection cycle","soc":"Praziquantel (Biltricide) 25 mg/kg single oral dose; repeat at 10 days (autoinfection risk requires higher cure rates)."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Opisthorchiasis","symptoms":"Biliary symptoms, jaundice, abdominal pain, cholangitis, liver fluke-related cholangiocarcinoma risk","goal":"Eradicate Opisthorchis liver flukes, prevent biliary complications and cholangiocarcinoma","soc":"Praziquantel (Biltricide) 25 mg/kg TID × 1 day (3 doses over 1 day; same as clonorchiasis)."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Paragonimiasis","symptoms":"Chronic cough, hemoptysis, chest pain, pleural effusion (mimics TB), brain lesions","goal":"Eradicate Paragonimus lung/brain flukes, heal pulmonary/CNS lesions","soc":"Praziquantel (Biltricide) 25 mg/kg TID × 2 days (total 6 doses); or triclabendazole 10 mg/kg × 1–2 doses."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Sparganosis","symptoms":"Migratory painful subcutaneous swelling, eye swelling, nodules","goal":"Surgical removal of Spirometra larvae, prevent CNS invasion","soc":"Surgical excision of the sparganum larva is the primary treatment. Praziquantel has limited efficacy against spargana (unlike adult tapeworms); ethanol injection into lesion used in some cases."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Taenia asiatica (Asian Tapeworm) Infection","symptoms":"Mild abdominal discomfort, visible proglottids in stool, nausea","goal":"Eliminate adult Taenia asiatica tapeworm from intestine","soc":"Praziquantel 5–10 mg/kg single dose; niclosamide 2g single dose as alternative."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Helminthic","indication":"Trichinosis","symptoms":"Muscle pain, periorbital edema, fever, eosinophilia after eating undercooked pork","goal":"Kill Trichinella larvae, relieve muscle inflammation","soc":"Albendazole (benzimidazole) 400 mg BID × 8–14 days — most effective against early (intestinal) stages; corticosteroids (prednisone) for severe myositis and allergic reactions."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Chagas Disease","symptoms":"Acute: fever, swollen eye (Romaña sign). Chronic: heart failure, megacolon","goal":"Eliminate Trypanosoma cruzi, prevent cardiac/GI complications","soc":"Benznidazole (Rochagan, nitroimidazole derivative) 5–7 mg/kg/day PO × 60 days (FDA-approved 2017 for children 2–12; used off-label in adults); nifurtimox (Lampit) 8–10 mg/kg/day × 60 days as alternative."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Intestinal Protozoan and Microsporidia Infections","symptoms":"Diarrhea, weight loss, abdominal cramps, malabsorption, dehydration","goal":"Eradicate protozoa/microsporidia, restore GI absorption, manage in immunocompromised","soc":"Varies by pathogen. Giardia: tinidazole/metronidazole. Cryptosporidium: nitazoxanide (Alinia) 500 mg BID × 3 days (immunocompetent). Microsporidia (Enterocytozoon): albendazole 400 mg BID × 3+ weeks; fumagillin (outside US) for E. bieneusi. Cystoisospora: TMP-SMX. Cyclospora: TMP-SMX DS BID × 7 days."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Giardiasis","symptoms":"Watery diarrhea, bloating, gas, nausea, weight loss","goal":"Eradicate Giardia, resolve diarrhea, prevent reinfection","soc":"Metronidazole (Flagyl, nitroimidazole) 250 mg TID × 5–7 days; tinidazole (Tindamax) 2g single dose is preferred for simplicity."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Toxoplasmosis","symptoms":"Flu-like illness (immunocompetent), encephalitis, chorioretinitis (immunocompromised/congenital)","goal":"Eliminate Toxoplasma gondii, prevent CNS disease reactivation, protect fetal brain","soc":"Pyrimethamine (Daraprim, antifolate) + sulfadiazine + leucovorin (folinic acid) × 6 weeks for toxoplasmic encephalitis in HIV/immunocompromised; TMP-SMX is equivalent per recent data."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Cryptosporidiosis","symptoms":"Watery diarrhea (profuse), stomach cramps, nausea, low-grade fever","goal":"Clear parasite, restore hydration, prevent wasting in immunocompromised","soc":"Nitazoxanide (Alinia, thiazolide) 500 mg BID × 3 days for immunocompetent adults. In HIV/immunocompromised: ART optimization is key; nitazoxanide has limited efficacy in severe immunosuppression."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Microsporidiosis","symptoms":"Chronic diarrhea, wasting, sinusitis, keratitis, muscle inflammation in immunocompromised","goal":"Eradicate microsporidian parasite, restore immunity in HIV/transplant patients","soc":"Albendazole (Albenza, benzimidazole) 400 mg BID × 3+ weeks for Encephalitozoon species. ART initiation (immune reconstitution) is key for HIV patients. Fumagillin (not US-approved) for E. bieneusi intestinal microsporidiosis."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Babesiosis","symptoms":"Hemolytic anemia, fever, fatigue, dark urine, chills","goal":"Clear Babesia parasitemia, prevent severe hemolysis/death","soc":"Atovaquone 750 mg BID + azithromycin 500 mg × 1 then 250 mg/day × 7–10 days for mild–moderate disease; clindamycin + quinine for severe disease."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Leishmaniasis","symptoms":"Skin ulcers (cutaneous), fever, weight loss, spleen/liver enlargement (visceral), mucosal lesions","goal":"Eradicate Leishmania parasite, heal lesions, prevent relapse and death","soc":"Visceral leishmaniasis (VL): liposomal amphotericin B (AmBisome) 3–5 mg/kg IV × 5 days (FDA-approved for VL). Cutaneous (CL): miltefosine (Impavido, alkylphospholipid) oral × 28 days or pentamidine/meglumine antimoniate (Glucantime) IM."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Free-Living Ameba Infections","symptoms":"Granulomatous encephalitis, skin lesions, sinusitis (Acanthamoeba, Balamuthia, Naegleria)","goal":"Kill free-living ameba, preserve neurological function","soc":"No well-established SoC. Naegleria fowleri (PAM): amphotericin B IV + miltefosine + rifampin combination. Balamuthia: combination of pentamidine + sulfadiazine + fluconazole + azithromycin + flucytosine + miltefosine."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Malaria","symptoms":"Cyclical fever/chills, sweating, headache, vomiting, anemia, splenomegaly","goal":"Rapidly clear parasitemia, prevent severe malaria and death, prevent relapse","soc":"Uncomplicated P. falciparum: artemisinin-based combination therapy (ACT) — artemether-lumefantrine (Coartem, CDC recommended in US) or atovaquone-proguanil (Malarone). P. vivax/ovale: chloroquine + primaquine (to clear hypnozoites) or tafenoquine (Arakoda) single dose."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Amebiasis","symptoms":"Bloody diarrhea, abdominal cramps, fever, liver pain","goal":"Eliminate Entamoeba histolytica, prevent liver abscess","soc":"Metronidazole (Flagyl, nitroimidazole) 500–750 mg TID × 7–10 days followed by luminal agent paromomycin (Humatin, aminoglycoside) or iodoquinol to eliminate cysts."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Amebic Keratitis","symptoms":"Severe eye pain, photophobia, blurred vision, red eye","goal":"Eliminate Acanthamoeba from cornea, preserve vision","soc":"Topical polyhexamethylene biguanide (PHMB 0.02%) and/or chlorhexidine 0.02% combined with topical propamidine isethionate (Brolene) — antiseptic/biguanide combination."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Cyclosporiasis","symptoms":"Watery diarrhea, fatigue, nausea, loss of appetite, cramping","goal":"Eradicate Cyclospora, resolve diarrheal illness","soc":"TMP-SMX DS (trimethoprim/sulfamethoxazole, antifolate) 160/800 mg BID × 7 days."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Cystoisosporiasis","symptoms":"Watery non-bloody diarrhea, cramping, weight loss (especially HIV patients)","goal":"Eradicate Cystoisospora belli, restore bowel function","soc":"TMP-SMX DS 160/800 mg QID × 10 days (loading), then BID × 3 weeks; alternatives: pyrimethamine + folinic acid."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"African Trypanosomiasis","symptoms":"Fever, headache, sleep disturbances, neuropsychiatric symptoms","goal":"Eliminate parasite from blood and CNS, prevent coma/death","soc":"Stage 1 (hemolymphatic): pentamidine (Pentam, for T.b. gambiense) or suramin (T.b. rhodesiense). Stage 2 (CNS): eflornithine + nifurtimox combination (NECT) for gambiense; melarsoprol for rhodesiense."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Granulomatous Amebic Encephalitis","symptoms":"Headache, confusion, seizures, focal neurological deficits, altered mental status","goal":"Eliminate Acanthamoeba/Balamuthia from CNS, prevent death","soc":"No FDA-approved standard; combination regimens used empirically: miltefosine (Impavido) + fluconazole + albendazole ± azithromycin for Balamuthia; miltefosine + voriconazole + azithromycin for Acanthamoeba."},{"ta":"Infectious Disease","subcategory":"Parasitic Infections — Protozoan","indication":"Primary Amebic Meningoencephalitis","symptoms":"Sudden severe headache, fever, neck stiffness, confusion, seizures, rapid death","goal":"Immediate CNS ameba eradication; prevent fulminant death (>97% fatal without treatment)","soc":"Miltefosine (Impavido) + amphotericin B (AmBisome) IV + azithromycin + fluconazole (CDC-recommended combination for Naegleria fowleri PAM); all available via CDC Emergency Operations."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Ehrlichiosis and Anaplasmosis","symptoms":"Fever, headache, muscle aches, low white blood cell count, tick bite","goal":"Eradicate Ehrlichia/Anaplasma, prevent severe disease and death","soc":"Doxycycline (tetracycline) 100 mg BID × 5–10 days — first-line for all ages including children (benefits outweigh dental risk in severe illness per AAP/CDC)."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Rocky Mountain Spotted Fever (RMSF)","symptoms":"Fever, petechial rash starting wrists/ankles, headache, tick bite","goal":"Rapidly eliminate Rickettsia rickettsii, prevent vasculitis-related mortality","soc":"Doxycycline (tetracycline) 100 mg BID × 7–14 days, initiated empirically within 5 days of symptom onset; delayed treatment dramatically increases mortality."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Q Fever","symptoms":"High fever, severe headache, fatigue, pneumonia, hepatitis","goal":"Eradicate Coxiella burnetii, prevent chronic Q fever/endocarditis","soc":"Doxycycline (tetracycline class) 100 mg BID × 14 days for acute Q fever; chronic Q fever/endocarditis: doxycycline + hydroxychloroquine × 18 months (valvular) or 12 months (non-valvular)."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Rickettsial and Related Infections","symptoms":"Fever, headache, rash, myalgias, tick or mite exposure history","goal":"Eradicate obligate intracellular bacteria, prevent organ failure","soc":"Doxycycline (tetracycline) 100 mg BID × 5–7 days is first-line for all rickettsial infections across all age groups including children (per CDC/IDSA)."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Other Spotted Fever Rickettsioses","symptoms":"Fever, headache, rash (petechial or maculopapular), tick bite eschar, myalgia","goal":"Eradicate Rickettsia species, prevent severe vasculitis and organ failure","soc":"Doxycycline (tetracycline) 100 mg BID × 5–7 days (until afebrile × 3 days) — first-line for all spotted fever group rickettsiae (SFG), including R. africae, R. conorii (Mediterranean), R. akari, etc."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Epidemic Typhus","symptoms":"High fever, severe headache, body louse-associated rash, confusion","goal":"Eradicate Rickettsia prowazekii, reduce mortality","soc":"Doxycycline (tetracycline) 200 mg single dose OR 100 mg BID × 7 days; chloramphenicol alternative for children/pregnant women."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Murine (Endemic) Typhus","symptoms":"Fever, headache, rash, muscle aches, nausea (milder than epidemic typhus)","goal":"Eradicate Rickettsia typhi, resolve fever, prevent complications","soc":"Doxycycline (tetracycline) 100 mg BID × 7–10 days (first-line for all rickettsial infections including murine typhus)."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Rickettsialpox","symptoms":"Eschar at bite site, fever, papulovesicular rash, headache","goal":"Eradicate Rickettsia akari, resolve rash and fever","soc":"Doxycycline 100 mg BID × 5–7 days (self-limiting disease, short course sufficient)."},{"ta":"Infectious Disease","subcategory":"Rickettsial and Related Infections","indication":"Scrub Typhus","symptoms":"Fever, eschar, headache, rash, lymphadenopathy after mite exposure","goal":"Eradicate Orientia tsutsugamushi, prevent multi-organ failure","soc":"Doxycycline 100 mg BID × 7 days; azithromycin 500 mg daily × 3–5 days is equally effective and preferred in pregnancy and children."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Genital Herpes","symptoms":"Painful genital blisters, ulcers, burning, recurrent outbreaks","goal":"Suppress HSV replication, reduce outbreak frequency, prevent transmission","soc":"Valacyclovir (Valtrex, nucleoside analog prodrug) 1g BID × 7–10 days (first episode) or 500 mg BID × 3–5 days (recurrence); 500 mg daily suppressive therapy to reduce recurrences."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Sexually Transmitted Infections (STIs)","symptoms":"Genital ulcers, discharge, dysuria, rash, pelvic pain","goal":"Eradicate causative pathogen, prevent transmission and long-term complications","soc":"Pathogen-specific: gonorrhea (ceftriaxone 500 mg IM single dose); chlamydia (doxycycline 100 mg BID × 7 days); syphilis (benzathine penicillin G 2.4 million units IM); herpes (valacyclovir); trichomoniasis (metronidazole 2g single dose)."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Urogenital Chlamydial Infections","symptoms":"Dysuria, urethral/vaginal discharge, often asymptomatic, pelvic pain","goal":"Eradicate Chlamydia trachomatis, prevent PID, infertility, and neonatal infection","soc":"Doxycycline 100 mg BID × 7 days — preferred over azithromycin 1g single dose per 2021 CDC STI guidelines (lower treatment failure for urogenital chlamydia)."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Urogenital Mycoplasmal Infections","symptoms":"Urethritis, vaginal discharge, pelvic pain, infertility, often asymptomatic","goal":"Eradicate Mycoplasma genitalium, prevent treatment failure and antibiotic resistance","soc":"Azithromycin 1g single dose (historically); 2020–2024 CDC shift to doxycycline 100 mg BID × 7 days (reduces azithromycin resistance selection) followed by azithromycin 500 mg Day 1 then 250 mg × 4 days if M. genitalium confirmed. Moxifloxacin 400 mg × 7–14 days for macrolide-resistant strains."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Human Papillomavirus (HPV) Infection","symptoms":"Genital warts, abnormal Pap smear, cervical/oropharyngeal/anal dysplasia","goal":"Remove warts, prevent cancer progression, eradicate persistent infection","soc":"No antiviral pharmacologic cure for HPV infection itself. Genital warts: patient-applied imiquimod (Aldara, immune response modifier) 5% cream 3×/wk × 16 weeks or podofilox 0.5% solution BID × 3 days/wk × 4 weeks; provider-applied trichloroacetic acid or cryotherapy. Prevention: Gardasil 9 (9vHPV vaccine, Merck) for 9–45 years."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Trichomoniasis","symptoms":"Vaginal itching, yellow-green discharge, dysuria, asymptomatic in many men","goal":"Eradicate Trichomonas vaginalis, prevent recurrence, reduce HIV risk","soc":"Metronidazole (nitroimidazole) 2g oral single dose OR 500 mg BID × 7 days (preferred for women per 2021 CDC STI guidelines — lower recurrence); tinidazole 2g single dose as alternative."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Gonorrhea","symptoms":"Urethral/vaginal discharge, dysuria, pelvic pain, rectal discharge","goal":"Eradicate Neisseria gonorrhoeae, prevent PID, prevent transmission","soc":"Ceftriaxone (Rocephin, 3rd-gen cephalosporin) 500 mg IM single dose (if weight ≥150 kg: 1g); if chlamydia not excluded, add doxycycline 100 mg BID × 7 days."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Syphilis","symptoms":"Painless genital ulcer (primary), body rash including palms/soles (secondary), neurological/cardiac damage (tertiary)","goal":"Eradicate Treponema pallidum, prevent neurosyphilis, cardiovascular syphilis, and congenital transmission","soc":"Benzathine penicillin G (Bicillin L-A) 2.4 million units IM single dose for primary, secondary, and early latent syphilis — the only proven treatment; benzathine penicillin G 2.4 million units IM weekly × 3 doses for late latent/tertiary."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Sexually Transmitted Enteric Infections","symptoms":"Diarrhea, proctitis, rectal pain, rectal discharge, nausea","goal":"Eradicate enteric STI pathogens, prevent complications and transmission","soc":"Depends on causative organism: Shigella (azithromycin 1g single dose for susceptible strains, or ceftriaxone 1g IM for MDR); LGV/chlamydial proctitis (doxycycline 100 mg BID × 21 days); Campylobacter (azithromycin 500 mg × 3 days); Giardia (metronidazole 500 mg TID × 7 days)."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Lymphogranuloma Venereum (LGV)","symptoms":"Painless genital ulcer, inguinal lymphadenopathy (buboes), rectal pain, fever","goal":"Eradicate Chlamydia trachomatis L1-L3, resolve adenopathy, prevent rectal strictures","soc":"Doxycycline (tetracycline) 100 mg BID × 21 days (CDC STI guidelines 2021)."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Chancroid","symptoms":"Painful genital ulcer, inguinal lymphadenopathy, suppurative bubo","goal":"Eradicate Haemophilus ducreyi, heal ulcer, prevent HIV co-transmission","soc":"Azithromycin (macrolide) 1g single oral dose OR ceftriaxone 250 mg IM single dose (both equivalent per CDC 2021 STI guidelines)."},{"ta":"Infectious Disease","subcategory":"Sexually Transmitted Infections","indication":"Granuloma Inguinale","symptoms":"Painless genital ulcers, beefy-red lesions, progressive tissue destruction","goal":"Eradicate Klebsiella granulomatis, heal genital ulcers","soc":"Azithromycin (macrolide) 1g oral weekly × 3 weeks or 500 mg/day × 3 weeks; or doxycycline 100 mg BID × 3 weeks."},{"ta":"Infectious Disease","subcategory":"Urinary Tract Infections","indication":"Bacterial Urinary Tract Infections","symptoms":"Burning urination, frequency, urgency, pelvic pain, fever","goal":"Eradicate uropathogen, relieve symptoms, prevent pyelonephritis","soc":"Uncomplicated UTI: nitrofurantoin macrocrystals (Macrobid, nitrofuran) 100 mg BID × 5 days OR TMP-SMX DS × 3 days. Complicated/pyelonephritis: oral ciprofloxacin 500 mg BID × 7 days or IV ceftriaxone."},{"ta":"Infectious Disease","subcategory":"Urinary Tract Infections","indication":"Fungal Urinary Tract Infections","symptoms":"Pyuria with yeast, UTI symptoms, asymptomatic funguria in catheterized patients","goal":"Eradicate Candida from urinary tract, remove predisposing factors","soc":"Fluconazole (azole) 200–400 mg/day × 7–14 days for symptomatic candiduria (IDSA 2016 guidelines). Amphotericin B bladder irrigation for fluconazole-resistant Candida. Remove catheter if present."},{"ta":"Infectious Disease","subcategory":"Urinary Tract Infections","indication":"Reflux Nephropathy (Chronic Pyelonephritis)","symptoms":"Recurrent UTI, flank pain, hypertension, progressive kidney scarring","goal":"Prevent recurrent UTI, halt renal scarring, control hypertension","soc":"Long-term low-dose antibiotic prophylaxis with TMP-SMX (co-trimoxazole) or nitrofurantoin; acute pyelonephritis episodes treated with fluoroquinolones (ciprofloxacin, levofloxacin) or TMP-SMX × 7–14 days."},{"ta":"Infectious Disease","subcategory":"Urinary Tract Infections","indication":"Catheter-Associated Urinary Tract Infections","symptoms":"Fever, dysuria, pyuria, cloudy urine with urinary catheter in place","goal":"Eradicate uropathogen, remove catheter, prevent urosepsis","soc":"Catheter removal/exchange + antibiotic based on culture/susceptibility: ciprofloxacin, TMP-SMX, or nitrofurantoin (ESBL-negative); carbapenems for ESBL-producing organisms. 7-day regimen for women, 14 days for men."},{"ta":"Infectious Disease","subcategory":"Viral Infections — Hemorrhagic and Tropical","indication":"Chikungunya Disease","symptoms":"Sudden fever, severe joint pain/swelling, rash, myalgia","goal":"Relieve joint pain, reduce fever, prevent chronic arthralgia","soc":"No approved antiviral. Supportive: NSAIDs (ibuprofen, naproxen) for fever and
