<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Therapeutic Areas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ─────────────────────────────────── */
:root,[data-theme="light"]{
  --bg:#f5f4f0;--surface:#fafaf7;--surface-2:#ffffff;
  --border:oklch(0.25 0.01 80/0.1);--divider:oklch(0.25 0.01 80/0.07);
  --text:#1a1916;--muted:#6b6a67;--faint:#b0afab;
  --accent:#01696f;--accent-h:#0c4e54;--accent-hl:#d4e8e6;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.09);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.13);
  --font-body:'Inter','Helvetica Neue',sans-serif;
  --font-display:'Instrument Serif',Georgia,serif;
  --ease:180ms cubic-bezier(0.16,1,0.3,1);
  --text-xs:clamp(0.75rem,0.7rem+0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem+0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem+0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem+0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem+1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem+2.5vw,3.5rem);
}
[data-theme="dark"]{
  --bg:#141312;--surface:#1a1917;--surface-2:#1f1e1c;
  --border:oklch(0.9 0 0/0.08);--divider:oklch(0.9 0 0/0.05);
  --text:#d0cfc8;--muted:#787670;--faint:#4a4946;
  --accent:#4f98a3;--accent-h:#3a818c;--accent-hl:#1f3436;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.25);
  --shadow-md:0 4px 12px oklch(0 0 0/0.35);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.45);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --bg:#141312;--surface:#1a1917;--surface-2:#1f1e1c;
  --border:oklch(0.9 0 0/0.08);--divider:oklch(0.9 0 0/0.05);
  --text:#d0cfc8;--muted:#787670;--faint:#4a4946;
  --accent:#4f98a3;--accent-h:#3a818c;--accent-hl:#1f3436;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.25);
  --shadow-md:0 4px 12px oklch(0 0 0/0.35);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.45);
}}

/* ── Reset ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth;scroll-padding-top:5rem}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--text);background:var(--bg);line-height:1.6}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
table{border-collapse:collapse;width:100%}
p,li{max-width:72ch;text-wrap:pretty}
h1,h2,h3,h4{text-wrap:balance;line-height:1.2}
::selection{background:oklch(from var(--accent) l c h/0.2);color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── Layout ────────────────────────────────────────── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:oklch(from var(--bg) l c h/0.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--divider);
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:3.5rem;
  max-width:100%;
}
.logo{
  display:flex;align-items:center;gap:0.625rem;
  font-family:var(--font-display);font-size:1.25rem;letter-spacing:-0.01em;
  cursor:pointer;
}
.logo svg{flex-shrink:0;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:0.5rem}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:0.625rem;color:var(--muted);pointer-events:none;flex-shrink:0}
#search{
  padding:0.4rem 0.75rem 0.4rem 2rem;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-full,9999px);
  font-size:var(--text-sm);color:var(--text);
  width:220px;transition:border-color var(--ease),width var(--ease);
}
#search:focus{outline:none;border-color:var(--accent);width:280px}
#search::placeholder{color:var(--faint)}
.theme-btn{
  display:flex;align-items:center;justify-content:center;
  width:2.25rem;height:2.25rem;border-radius:var(--radius-md);
  color:var(--muted);transition:background var(--ease),color var(--ease);
}
.theme-btn:hover{background:var(--surface-2);color:var(--text)}

/* ── Home view ─────────────────────────────────────── */
#home{padding:1.5rem 2rem 2rem}
.home-hero{margin-bottom:1.1rem}
.home-hero h1{font-family:var(--font-display);font-size:var(--text-xl);letter-spacing:-0.02em;margin-bottom:0.25rem}
.home-hero p{color:var(--muted);font-size:var(--text-xs);max-width:70ch}
.stats-row{display:flex;gap:1.75rem;margin-top:0.6rem}
.stat{display:flex;flex-direction:column}
.stat-num{font-size:1.05rem;font-weight:700;color:var(--accent);line-height:1}
.stat-label{font-size:var(--text-xs);color:var(--muted);margin-top:0.2rem}

.ta-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(260px,100%),1fr));
  gap:1px;
  background:var(--divider);
  border:1px solid var(--divider);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.ta-card{
  background:var(--surface);padding:1.25rem 1.5rem;
  cursor:pointer;
  transition:background var(--ease);
  display:flex;align-items:flex-start;gap:1rem;
}
.ta-card:hover{background:var(--surface-2)}
.ta-card:active{background:var(--accent-hl)}
.ta-icon{
  width:2.25rem;height:2.25rem;border-radius:var(--radius-md);
  background:var(--accent-hl);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--accent);font-size:1rem;margin-top:0.1rem;
}
.ta-info{flex:1;min-width:0}
.ta-name{font-size:var(--text-sm);font-weight:600;color:var(--text);line-height:1.3}
.ta-meta{font-size:var(--text-xs);color:var(--muted);margin-top:0.25rem}

/* ── TA Detail view ─────────────────────────────────── */
#detail{display:none;padding:1rem 2rem 3rem}
#search-results{display:none;padding:1rem 2rem 3rem}
.sr-row{cursor:pointer}
.sr-row .sr-ta-link{display:inline-flex;align-items:center;gap:0.25rem;color:var(--accent);font-weight:600}
.sr-row .sr-ta-link svg{opacity:0.7}
.sr-row:hover .sr-ta-link{text-decoration:underline}
.sr-row .sr-sub{color:var(--muted)}
.disease-table.combined.sr-table td{vertical-align:middle}
.back-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-size:var(--text-sm);color:var(--muted);margin-bottom:0.75rem;
  transition:color var(--ease);padding:0.25rem 0;
}
.back-btn:hover{color:var(--accent)}
.detail-hero{margin-bottom:0.75rem;padding-bottom:0.6rem;border-bottom:1px solid var(--divider)}
.detail-hero h1{font-family:var(--font-display);font-size:var(--text-lg);letter-spacing:-0.02em}
.detail-meta{font-size:var(--text-xs);color:var(--muted);margin-top:0.25rem;display:flex;gap:1.25rem}

/* search bar on detail */
.detail-controls{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap}
.detail-search-wrap{position:relative;flex:1;min-width:180px;max-width:380px}
.detail-search-wrap svg{position:absolute;left:0.625rem;top:50%;transform:translateY(-50%);color:var(--muted)}
#detail-search{
  width:100%;padding:0.45rem 0.75rem 0.45rem 2rem;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-full,9999px);font-size:var(--text-sm);color:var(--text);
  transition:border-color var(--ease);
}
#detail-search:focus{outline:none;border-color:var(--accent)}
#detail-search::placeholder{color:var(--faint)}
.result-count{font-size:var(--text-xs);color:var(--muted);white-space:nowrap}
.billion-btn{
  font-size:var(--text-xs);color:var(--muted);padding:0.3rem 0.75rem;
  border:1px solid var(--border);border-radius:var(--radius-full,9999px);
  transition:background var(--ease),color var(--ease),border-color var(--ease);cursor:pointer;
}
.billion-btn:hover{border-color:var(--accent);color:var(--accent-h)}
.billion-btn.active{background:#ffe838;border-color:#e6cc00;color:#3a3000;font-weight:600}
[data-theme="dark"] .billion-btn.active{background:#a89200;border-color:#c2a900;color:#1a1500}
/* Realistic-TAM filter uses the teal accent so it reads as a different lens than the yellow US-TAM filter */
.realtam-btn.active{background:var(--accent);border-color:var(--accent-h);color:#fff}
[data-theme="dark"] .realtam-btn.active{background:var(--accent);border-color:var(--accent);color:#0c1413}

/* Realistic TAM column + commercial-note tooltip */
.td-realtam{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--accent-h);font-weight:600}
[data-theme="dark"] .td-realtam{color:var(--accent)}
.td-realtam.has-note{position:relative;cursor:help}
.td-realtam.has-note .rt-val{text-decoration:underline dotted;text-underline-offset:3px;text-decoration-color:var(--border)}
.td-realtam.has-note:hover .rt-val,.td-realtam.has-note:focus .rt-val{text-decoration-color:var(--accent)}
.note-tip{
  position:absolute;bottom:calc(100% + 6px);right:0;z-index:50;
  width:max-content;max-width:340px;white-space:normal;text-align:left;
  background:var(--surface-2);color:var(--text);font-weight:400;
  font-size:var(--text-xs);line-height:1.45;padding:0.6rem 0.75rem;
  border:1px solid var(--divider);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);
  opacity:0;visibility:hidden;transform:translateY(3px);
  transition:opacity var(--ease),transform var(--ease),visibility var(--ease);
  pointer-events:none;
}
.note-tip::after{
  content:"";position:absolute;top:100%;right:18px;
  border:6px solid transparent;border-top-color:var(--surface-2);
}
.td-realtam.has-note:hover .note-tip,.td-realtam.has-note:focus .note-tip{opacity:1;visibility:visible;transform:translateY(0)}

/* ── Subcategory accordion ───────────────────────────── */
.sub-group{border:1px solid var(--divider);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:0.75rem;box-shadow:var(--shadow-sm)}
.sub-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.875rem 1.25rem;background:var(--surface);
  cursor:pointer;user-select:none;gap:1rem;
  transition:background var(--ease);
}
.sub-header:hover{background:var(--surface-2)}
.sub-header-left{display:flex;align-items:center;gap:0.75rem;min-width:0}
.sub-name{font-size:var(--text-sm);font-weight:600;color:var(--text)}
.sub-badge{
  font-size:var(--text-xs);color:var(--accent);background:var(--accent-hl);
  padding:0.15rem 0.5rem;border-radius:var(--radius-full,9999px);
  white-space:nowrap;flex-shrink:0;font-weight:500;
}
.chevron{
  color:var(--muted);flex-shrink:0;
  transition:transform var(--ease),color var(--ease);
}
.sub-group.open .chevron{transform:rotate(180deg);color:var(--accent)}
.sub-body{
  display:none;overflow:auto;
  border-top:1px solid var(--divider);
}
.sub-group.open .sub-body{display:block}

/* ── Disease table ──────────────────────────────────── */
.disease-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.disease-table thead th{
  background:var(--surface);padding:0.625rem 1rem;
  text-align:left;font-size:var(--text-xs);font-weight:600;
  color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;
  border-bottom:1px solid var(--divider);
  position:sticky;top:0;white-space:nowrap;
}
.disease-table tbody tr{
  border-bottom:1px solid var(--divider);
  transition:background var(--ease);
}
.disease-table tbody tr:last-child{border-bottom:none}
.disease-table tbody tr:hover{background:oklch(from var(--accent) l c h/0.04)}
.disease-table td{padding:0.75rem 1rem;vertical-align:top;line-height:1.5}
.td-indication{
  font-weight:500;color:var(--text);min-width:180px;max-width:220px;
}
.td-symptoms{color:var(--text);max-width:280px}
.td-goal{color:var(--muted);max-width:220px}
.td-soc{color:var(--muted);max-width:340px}
.disease-table td.td-symptoms,
.disease-table td.td-goal,
.disease-table td.td-soc{font-size:var(--text-xs)}

/* truncate long cells */
.cell-truncate{
  display:-webkit-box;-webkit-line-clamp:3;
  -webkit-box-orient:vertical;overflow:hidden;
}

/* ── No results ─────────────────────────────────────── */
.no-results{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4rem 2rem;color:var(--muted);text-align:center;gap:1rem;
}
.no-results svg{color:var(--faint)}
.no-results strong{color:var(--text);font-size:var(--text-sm)}

/* ── Highlight ──────────────────────────────────────── */
mark{background:oklch(from var(--accent) l c h/0.2);color:inherit;border-radius:2px;padding:0 2px}

/* ── TA icon emoji map ─────────────────────────────── */
/* handled in JS */

/* ── Responsive ─────────────────────────────────────── */
@media(max-width:640px){
  .header-inner{padding:0 1rem}
  #search{width:140px}.#search:focus{width:180px}
  #home,#detail,#search-results{padding:1.5rem 1rem 3rem}
  .stats-row{gap:1.25rem}
  .detail-table-scroll{overflow-x:auto}
}

/* ══ Body-map home (added) ══════════════════════════ */
:root,[data-theme="light"]{ --map-bg:#fbfbf8; }
[data-theme="dark"]{ --map-bg:#16201f; }
@media(prefers-color-scheme:dark){:root:not([data-theme]){ --map-bg:#16201f; }}

/* Subcategory header: dark fill in light mode, white fill in dark mode */
:root,[data-theme="light"]{ --subhead-bg:#1a2b2a; --subhead-fg:#ffffff; --subhead-muted:#b9c9c6; --subhead-chip:rgba(255,255,255,0.16); }
[data-theme="dark"]{ --subhead-bg:#ffffff; --subhead-fg:#16201f; --subhead-muted:#5a6b68; --subhead-chip:rgba(0,0,0,0.10); }
@media(prefers-color-scheme:dark){:root:not([data-theme]){ --subhead-bg:#ffffff; --subhead-fg:#16201f; --subhead-muted:#5a6b68; --subhead-chip:rgba(0,0,0,0.10); }}

.home-layout{
  display:grid; grid-template-columns:1fr 1fr;
  gap:1.5rem; align-items:start;
}
@media(max-width:900px){ .home-layout{grid-template-columns:1fr} }

.bodymap-card{
  background:var(--map-bg); border:1px solid var(--divider);
  border-radius:var(--radius-xl); box-shadow:var(--shadow-sm);
  padding:0.75rem 0.5rem 0.5rem; position:relative; overflow:hidden;
}
.bodymap-card::before{
  content:""; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(120% 90% at 50% 0%,oklch(from var(--accent) l c h/0.05),transparent 60%);
}
.bodymap-title{
  font-family:var(--font-display); font-size:var(--text-base);
  letter-spacing:-0.01em; padding:0.1rem 1rem 0; color:var(--text);
}
.bodymap-sub{font-size:var(--text-xs);color:var(--muted);padding:0.05rem 1rem 0.35rem}
#bodymap-svg{width:100%;max-height:640px;height:auto;display:block;margin:0 auto}
.anatomy-img{filter:saturate(1.02)}
[data-theme="dark"] .anatomy-img{filter:saturate(0.92) brightness(0.92)}

/* anchor dots + connectors */
.anchor-dot{fill:var(--map-bg);stroke:var(--accent);stroke-width:2}
.connector{fill:none;stroke:var(--accent);stroke-width:3;opacity:1;stroke-linecap:round}
.arrow-head{fill:var(--accent)}

/* svg TA buttons */
.svg-ta{cursor:pointer}
.svg-ta .btn-bg{
  fill:var(--surface-2); stroke:var(--border); stroke-width:1;
  transition:fill var(--ease),stroke var(--ease);
}
.svg-ta .btn-icon{font-size:16px;pointer-events:none}
.svg-ta .btn-label{
  fill:var(--text); font-family:var(--font-body); font-weight:600;
  font-size:14px; pointer-events:none;
}
.svg-ta .btn-sub{
  fill:var(--muted); font-family:var(--font-body); font-weight:500;
  font-size:11.5px; pointer-events:none; letter-spacing:0.01em;
}
.svg-ta .btn-sub .v{fill:var(--accent-h);font-weight:600}
.svg-ta:hover .btn-bg{fill:var(--accent-hl);stroke:var(--accent)}
.svg-ta:hover .btn-label{fill:var(--accent-h)}
.svg-ta:focus-visible{outline:none}
.svg-ta:focus-visible .btn-bg{stroke:var(--accent);stroke-width:2}

/* systemic panel */
.systemic-panel{
  background:var(--surface); border:1px solid var(--divider);
  border-radius:var(--radius-xl); box-shadow:var(--shadow-sm);
  padding:1.25rem 1.25rem 1.5rem;
}
.systemic-head{display:flex;align-items:baseline;justify-content:space-between;gap:0.5rem;margin-bottom:0.35rem}
.systemic-head h2{font-family:var(--font-display);font-size:var(--text-lg);letter-spacing:-0.01em}
.systemic-panel>p{font-size:var(--text-xs);color:var(--muted);margin-bottom:1rem;max-width:none}
.systemic-list{display:flex;flex-direction:column;gap:1px;background:var(--divider);border:1px solid var(--divider);border-radius:var(--radius-lg);overflow:hidden}
.sys-card{
  display:flex;align-items:center;gap:0.7rem;background:var(--surface-2);
  padding:0.6rem 0.9rem;cursor:pointer;transition:background var(--ease);text-align:left;width:100%;
}
.sys-card:hover{background:var(--accent-hl)}
.sys-card:active{background:var(--accent-hl)}
.sys-icon{
  width:1.7rem;height:1.7rem;border-radius:var(--radius-md);background:var(--accent-hl);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.85rem;
}
.sys-info{min-width:0;flex:1}
.sys-name{font-size:0.82rem;font-weight:600;color:var(--text);line-height:1.2}
.sys-meta{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;display:block}
.sys-meta b{color:var(--accent-h);font-weight:600}
.map-legend{font-size:var(--text-xs);color:var(--faint);padding:0.5rem 1rem 0.25rem;text-align:center}

/* ══ Combined collapsible table (added) ════════════ */
.combined-wrap{
  border:1px solid var(--divider);border-radius:var(--radius-lg);
  overflow:hidden;box-shadow:var(--shadow-sm);background:var(--surface-2);
}
.combined-scroll{overflow-x:auto}
.disease-table.combined thead th{position:sticky;top:0;z-index:3}
.disease-table.combined .group-row td{padding:0}
.group-toggle{
  display:flex;align-items:center;gap:0.75rem;width:100%;
  padding:0.8rem 1.25rem;
  background:var(--subhead-bg);color:var(--subhead-fg);
  cursor:pointer;user-select:none;
  transition:background var(--ease),filter var(--ease);text-align:left;
}
.disease-table.combined tbody tr.group-row:first-child .group-toggle{border-top:none}
.group-toggle:hover{filter:brightness(1.12)}
.group-toggle .sub-name{font-size:var(--text-base);font-weight:700;color:var(--subhead-fg)}
.group-toggle .sub-badge{
  font-size:var(--text-xs);color:var(--subhead-fg);background:var(--subhead-chip);
  padding:0.15rem 0.5rem;border-radius:var(--radius-full,9999px);font-weight:600;
}
.group-toggle .sub-tam{font-size:var(--text-xs);color:var(--subhead-muted);margin-left:0.1rem}
.group-toggle .sub-tam b{color:var(--subhead-fg);font-weight:700}
.group-toggle .sub-realtam{margin-left:0.75rem;padding-left:0.75rem;border-left:1px solid var(--subhead-muted)}
.detail-meta .meta-real{padding-left:1.25rem;border-left:1px solid var(--divider);color:var(--accent-h);font-weight:600}
[data-theme="dark"] .detail-meta .meta-real{color:var(--accent)}
.group-toggle .chevron{margin-left:auto;color:var(--subhead-fg);opacity:0.8;transition:transform var(--ease)}
.group-row.collapsed .chevron{transform:rotate(-90deg)}
.group-row.collapsed + tr,
.disease-row.is-hidden{display:none}
.disease-row.is-hidden{display:none}

/* numeric metric columns */
.td-num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--text)}
.td-rownum{text-align:right;color:var(--faint);font-variant-numeric:tabular-nums;font-size:0.72rem;width:34px;padding-right:0.5rem !important}
.th-rownum{text-align:right;color:var(--muted)}
.disease-table th.th-num{text-align:right}
.td-tam{font-weight:600;color:var(--accent-h)}
[data-theme="dark"] .td-tam{color:var(--accent)}

/* compact rows for subpage tables — read more at a time */
.disease-table.combined{font-size:0.78rem}
.disease-table.combined thead th{padding:0.4rem 0.85rem;font-size:0.66rem}
.disease-table.combined td{padding:0.3rem 0.85rem;line-height:1.3}
.disease-table.combined .disease-row td{background:var(--surface)}
.disease-table.combined .td-indication{font-weight:500;min-width:170px}
.disease-table.combined .group-toggle{padding:0.6rem 1rem}
.disease-table.combined .group-toggle .sub-name{font-size:0.98rem}
.disease-table.combined .group-toggle .sub-badge{font-size:0.66rem;padding:0.1rem 0.4rem}
.disease-table.combined .group-toggle .sub-tam{font-size:0.72rem}

/* new content columns */
.td-age{white-space:nowrap;color:var(--text);text-align:center;font-variant-numeric:tabular-nums}
.td-text{color:var(--text);min-width:260px}
.td-flag{text-align:center;white-space:nowrap}
.dash{color:var(--faint)}
.flag{display:inline-block;font-size:0.62rem;font-weight:700;letter-spacing:0.04em;padding:0.12rem 0.4rem;border-radius:9999px}
.flag-yes{background:var(--accent);color:#fff}
.flag-no{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
[data-theme="dark"] .flag-yes{background:var(--accent);color:#0c1413}

/* TAM ≥ $1B highlight — applied ONLY to the TAM and >$1B cells */
.disease-table.combined .disease-row.hi-no  .hl-cell{background:#fdf3c4;color:#4a3f00}   /* TAM≥$1B, flagged NO  — soft yellow */
.disease-table.combined .disease-row.hi-yes .hl-cell{background:#ffe838;color:#3a3000}   /* TAM≥$1B, flagged YES — bright yellow */
.disease-table.combined .disease-row.hi-no:hover  .hl-cell{background:#f7e9a8}
.disease-table.combined .disease-row.hi-yes:hover .hl-cell{background:#ffe204}
.disease-table.combined .disease-row.hi-no  .hl-cell.td-tam,.disease-table.combined .disease-row.hi-yes .hl-cell.td-tam{font-weight:700}
[data-theme="dark"] .disease-table.combined .disease-row.hi-no  .hl-cell{background:#5a4f17;color:#f0e6b0}
[data-theme="dark"] .disease-table.combined .disease-row.hi-yes .hl-cell{background:#a89200;color:#1a1500}
[data-theme="dark"] .disease-table.combined .disease-row.hi-no:hover  .hl-cell{background:#6a5d1c}
[data-theme="dark"] .disease-table.combined .disease-row.hi-yes:hover .hl-cell{background:#c2a900}

/* clickable blockbuster rows */
.disease-table.combined .disease-row.clickable{cursor:pointer}
.disease-table.combined .disease-row.clickable .td-indication{color:var(--accent-h);font-weight:600}
[data-theme="dark"] .disease-table.combined .disease-row.clickable .td-indication{color:var(--accent)}
.disease-table.combined .disease-row.clickable:hover td{background:var(--accent-hl)}
.disease-table.combined .disease-row.clickable:hover .hl-cell{filter:brightness(0.97)}
.row-more{vertical-align:-2px;margin-left:4px;color:var(--accent);opacity:0.65}
.disease-row.clickable:hover .row-more{opacity:1}
.disease-table.combined .disease-row.clickable:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* detail modal */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  padding:1.25rem;background:oklch(0.2 0.02 220/0.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  animation:modal-fade 140ms ease;
}
.modal-overlay[hidden]{display:none}
@keyframes modal-fade{from{opacity:0}to{opacity:1}}
.modal-card{
  position:relative;background:var(--surface-2);color:var(--text);
  width:min(720px,100%);max-height:88vh;overflow:auto;
  border:1px solid var(--divider);border-radius:var(--radius-xl);
  box-shadow:var(--shadow-lg);animation:modal-pop 160ms cubic-bezier(0.16,1,0.3,1);
}
@keyframes modal-pop{from{transform:translateY(8px) scale(0.98);opacity:0}to{transform:none;opacity:1}}
.modal-close{
  position:absolute;top:0.85rem;right:0.85rem;display:flex;align-items:center;justify-content:center;
  width:2rem;height:2rem;border-radius:var(--radius-md);color:var(--muted);
  background:var(--surface);border:1px solid var(--divider);transition:background var(--ease),color var(--ease);
}
.modal-close:hover{background:var(--accent-hl);color:var(--accent-h)}
.modal-head{padding:1.4rem 1.6rem 1rem;border-bottom:1px solid var(--divider);padding-right:3.2rem}
.modal-eyebrow{font-size:var(--text-xs);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--accent)}
.modal-head h2{font-family:var(--font-display);font-size:var(--text-xl);letter-spacing:-0.02em;margin:0.2rem 0 0.35rem;line-height:1.15}
.modal-tam{display:inline-block;font-size:var(--text-xs);font-weight:600;color:#3a3000;background:#ffe838;padding:0.2rem 0.55rem;border-radius:var(--radius-full,9999px)}
[data-theme="dark"] .modal-tam{background:#a89200;color:#1a1500}
.modal-body{padding:0.5rem 1.6rem 0.5rem}
.modal-row{padding:1rem 0;border-bottom:1px solid var(--divider)}
.modal-row:last-child{border-bottom:none}
.modal-row h3{font-size:var(--text-sm);font-weight:700;color:var(--accent-h);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.03em}
[data-theme="dark"] .modal-row h3{color:var(--accent)}
.modal-rowbody p{font-size:var(--text-sm);line-height:1.55;color:var(--text)}
.modal-empty{color:var(--faint);font-style:italic}
.modal-bullets{list-style:none;display:flex;flex-direction:column;gap:0.5rem;margin:0;padding:0}
.modal-bullets li{
  position:relative;padding-left:1.25rem;font-size:var(--text-sm);line-height:1.5;color:var(--text);
}
.modal-bullets li::before{
  content:"";position:absolute;left:0.15rem;top:0.5em;width:0.4rem;height:0.4rem;
  border-radius:50%;background:var(--accent);
}
.modal-foot{padding:0.9rem 1.6rem 1.3rem;display:flex;justify-content:flex-end}
.modal-close-btn{
  font-size:var(--text-sm);font-weight:600;color:#fff;background:var(--accent);
  padding:0.5rem 1.25rem;border-radius:var(--radius-md);transition:background var(--ease);
}
.modal-close-btn:hover{background:var(--accent-h)}
[data-theme="dark"] .modal-close-btn{color:#0c1413}
</style>
</head>
<body>

<a href="#main-content" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden">Skip to content</a>

<header class="site-header">
  <div class="header-inner">
    <div class="logo" onclick="showHome()" tabindex="0" role="button" aria-label="Go to homepage">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Therapeutic Areas
    </div>
    <div class="header-right">
      <div class="search-wrap" id="home-search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search" placeholder="Search diseases…" aria-label="Search all diseases">
      </div>
      <button class="theme-btn" data-theme-toggle aria-label="Toggle dark mode">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </div>
</header>

<main id="main-content">

<!-- HOME VIEW -->
<section id="home">
  <div class="home-hero">
    <h1>Therapeutic Areas</h1>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <div class="home-layout">
    <div class="bodymap-card">
      <div class="bodymap-title">Organ-specific</div>
      <div class="bodymap-sub">Areas tied to a specific organ — select one to explore its indications.</div>
      <svg id="bodymap-svg" viewBox="0 0 646 740" role="group" aria-label="Body map of organ-specific therapeutic areas"></svg>
      <div class="map-legend">Illustrative anatomy · positions are approximate</div>
    </div>

    <aside class="systemic-panel" aria-label="Cross-cutting therapeutic areas">
      <div class="systemic-head"><h2>Cross-cutting</h2></div>
      <p>Areas that span the whole body or aren't tied to a single organ.</p>
      <div class="systemic-list" id="systemic-list" role="list"></div>
    </aside>
  </div>
</section>

<!-- SEARCH RESULTS VIEW -->
<section id="search-results" aria-live="polite">
  <button class="back-btn" onclick="showHome()" aria-label="Back to therapeutic areas">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    All Therapeutic Areas
  </button>
  <div class="detail-hero">
    <h1 id="sr-title"></h1>
    <div class="detail-meta" id="sr-meta"></div>
  </div>
  <div id="sr-body"></div>
</section>

<!-- DETAIL VIEW -->
<section id="detail" aria-live="polite">
  <button class="back-btn" onclick="showHome()" aria-label="Back to therapeutic areas">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    All Therapeutic Areas
  </button>
  <div class="detail-hero">
    <h1 id="detail-title"></h1>
    <div class="detail-meta" id="detail-meta"></div>
  </div>
  <div class="detail-controls">
    <div class="detail-search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="detail-search" placeholder="Filter within this area…" aria-label="Filter diseases">
    </div>
    <span class="result-count" id="result-count"></span>
    <button id="expand-all-btn" onclick="expandAll()" style="font-size:var(--text-xs);color:var(--muted);padding:0.3rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius-full,9999px)">Expand all</button>
    <button id="collapse-all-btn" onclick="collapseAll()" style="font-size:var(--text-xs);color:var(--muted);padding:0.3rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius-full,9999px)">Collapse all</button>
    <button id="billion-btn" class="billion-btn" onclick="toggleBillion()" aria-pressed="false">US TAM &ge; $1B</button>
    <button id="realtam-btn" class="billion-btn realtam-btn" onclick="toggleRealtam()" aria-pressed="false">Realistic TAM &ge; $1B</button>
  </div>
  <div id="sub-groups"></div>
</section>

</main>

<!-- DETAIL POPUP (blockbuster indications) -->
<div id="detail-modal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-card" role="document">
    <button class="modal-close" onclick="closeDetail()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-head">
      <span class="modal-eyebrow" id="modal-eyebrow"></span>
      <h2 id="modal-title"></h2>
      <span class="modal-tam" id="modal-tam"></span>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="modal-close-btn" onclick="closeDetail()">Close</button>
    </div>
  </div>
</div>

// ── Helpers ────────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return String(s==null?'':s).replace(/'/g,'&#39;').replace(/"/g,'&quot;')}
function highlight(html,q){
  if(!q) return html;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return html.replace(re,'<mark>$1</mark>');
}
function wrapLabel(name,max){
  const words=name.split(' '); const lines=[]; let cur='';
  for(const w of words){ if((cur+' '+w).trim().length>max && cur){lines.push(cur);cur=w;} else cur=(cur+' '+w).trim(); }
  if(cur)lines.push(cur);
  return lines.slice(0,3);
}
// number formatting
function fmtCount(n){ // US prevalence patient counts
  if(n==null||n==='') return '—';
  if(n>=1e9) return (n/1e9).toFixed(n%1e9?1:0).replace(/\.0$/,'')+'B';
  if(n>=1e6) return (n/1e6).toFixed(n%1e6?1:0).replace(/\.0$/,'')+'M';
  if(n>=1e3) return (n/1e3).toFixed(n%1e3?1:0).replace(/\.0$/,'')+'K';
  return n.toLocaleString();
}
function fmtPct(n){ if(n==null||n==='') return '—'; return Math.round(n*100)+'%'; }
function fmtPrice(n){
  if(n==null||n==='') return '—';
  if(n>=1e6) return '$'+(n/1e6).toFixed(n%1e6?1:0).replace(/\.0$/,'')+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(n%1e3?1:0).replace(/\.0$/,'')+'K';
  return '$'+n.toLocaleString();
}
function fmtTAM(m){ // m is in $ millions
  if(m==null||m==='') return '—';
  if(m>=1e6) return '$'+(m/1e6).toFixed(m>=1e7?0:1).replace(/\.0$/,'')+'T';
  if(m>=1000) return '$'+(m/1000).toFixed(m>=10000?0:1).replace(/\.0$/,'')+'B';
  if(m>=1) return '$'+Math.round(m)+'M';
  return '$'+m.toFixed(1)+'M';
}

// ── Data state ─────────────────────────────────────────
let DATA=[], taMap={}, taList=[], currentTA='';

function buildMap(){
  taMap={};
  DATA.forEach((r,i)=>{ r._id=i; });
  for(const r of DATA){
    if(!taMap[r.ta]) taMap[r.ta]={subs:{}};
    if(!taMap[r.ta].subs[r.subcategory]) taMap[r.ta].subs[r.subcategory]=[];
    taMap[r.ta].subs[r.subcategory].push(r);
  }
  taList=Object.keys(taMap).sort();
}
function taStats(ta){
  const subs=taMap[ta]?taMap[ta].subs:{};
  let inds=0, tam=0, realtam=0;
  for(const k in subs){ for(const r of subs[k]){ inds++; tam+=(r.tam||0); realtam+=(r.realtam||0); } }
  return {subs:Object.keys(subs).length, inds, tam, realtam};
}
function subTAM(rows){ let t=0; for(const r of rows) t+=(r.tam||0); return t; }
function subRealTAM(rows){ let t=0; for(const r of rows) t+=(r.realtam||0); return t; }

function renderBodyMap(){
  const svg=document.getElementById('bodymap-svg');
  const VBH=640, IMG_H=620, IMG_TOP=10;
  const s=IMG_H/IMGH;                 // scale from native image space
  const IMG_W=IMGW*s;
  const BW=190, SIDE_GAP=14, EDGE=14; // wider buttons
  const VBW=Math.round(IMG_W + 2*(BW+SIDE_GAP) + 2*EDGE);
  const imgLeft=(VBW-IMG_W)/2;
  const LX=EDGE, RX=VBW-EDGE-BW;

  const left=ORGAN_TAS.filter(o=>o.side==='L' && taMap[o.ta]);
  const right=ORGAN_TAS.filter(o=>o.side==='R' && taMap[o.ta]);
  function centers(n){
    if(n<=1) return [VBH/2];
    const top=42, bot=VBH-42, arr=[];
    for(let i=0;i<n;i++) arr.push(top + i*(bot-top)/(n-1));
    return arr;
  }
  const lc=centers(left.length), rc=centers(right.length);

  let buttons='', connectors='', dots='';
  function emit(o, cyc, side){
    const st=taStats(o.ta);
    const lines=wrapLabel(o.ta,24);
    const h=Math.round(30 + lines.length*15 + 16);
    const x=side==='L'?LX:RX, cx=x+BW/2;
    const y=cyc-h/2;
    const innerX=side==='L'?x+BW:x;
    const icon=TA_ICONS[o.ta]||'💊';
    const nameStart=y+34;
    const nameTspans=lines.map((ln,i)=>`<tspan x="${cx}" y="${nameStart+i*15}">${esc(ln)}</tspan>`).join('');
    const subY=y+h-11;
    buttons+=`<g class="svg-ta" role="listitem" tabindex="0" aria-label="${escAttr(o.ta)}: ${st.inds} indications, ${st.subs} subcategories, ${fmtTAM(st.tam)} TAM"
        onclick="showTA('${escAttr(o.ta)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showTA('${escAttr(o.ta)}')}">
      <rect class="btn-bg" x="${x}" y="${y}" width="${BW}" height="${h}" rx="10"/>
      <text class="btn-icon" text-anchor="middle" x="${cx}" y="${y+19}">${icon}</text>
      <text class="btn-label" text-anchor="middle">${nameTspans}</text>
      <text class="btn-sub" text-anchor="middle" x="${cx}" y="${subY}"><tspan class="v">${st.inds}</tspan> ind&#160;·&#160;<tspan class="v">${st.subs}</tspan> sub&#160;·&#160;<tspan class="v">${fmtTAM(st.tam)}</tspan></text>
    </g>`;
    const ax=imgLeft+o.ax*s, ay=IMG_TOP+o.ay*s;
    // start a little inside the button edge; curve into the organ anchor with an arrowhead
    const sx=side==='L'?innerX+4:innerX-4;
    const c1x=side==='L'?sx+46:sx-46;
    connectors+=`<path class="connector" marker-end="url(#bm-arrow)" d="M${sx} ${cyc} C ${c1x} ${cyc}, ${ax} ${ay}, ${ax} ${ay}"/>`;
    dots+=`<circle class="anchor-dot" cx="${ax}" cy="${ay}" r="4"/>`;
  }
  left.forEach((o,i)=>emit(o,lc[i],'L'));
  right.forEach((o,i)=>emit(o,rc[i],'R'));

  svg.setAttribute('viewBox',`0 0 ${VBW} ${VBH}`);
  const defs=`<defs><marker id="bm-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" class="arrow-head"/></marker></defs>`;
  const img=`<image class="anatomy-img" href="${ANATOMY_IMG}" x="${imgLeft}" y="${IMG_TOP}" width="${IMG_W}" height="${IMG_H}" preserveAspectRatio="xMidYMid meet"/>`;
  // order: image (bottom) → arrows + dots ON TOP of image → buttons (topmost)
  svg.innerHTML=defs+img+connectors+dots+buttons;
}

function renderSystemic(){
  const list=document.getElementById('systemic-list');
  let ordered=SYSTEMIC_TAS.filter(t=>taMap[t]).sort((a,b)=>taStats(b).tam-taStats(a).tam);
  // Keep "Oncology (blood)" pinned directly below "Oncology" regardless of its TAM rank.
  const blood='Oncology (blood)';
  if(ordered.includes(blood) && ordered.includes('Oncology')){
    ordered=ordered.filter(t=>t!==blood);
    ordered.splice(ordered.indexOf('Oncology')+1,0,blood);

  list.innerHTML=ordered.map(ta=>{
    const st=taStats(ta);
    const icon=TA_ICONS[ta]||'💊';
    return `<button class="sys-card" role="listitem" aria-label="${escAttr(ta)}: ${st.inds} indications, ${st.subs} subcategories, total TAM ${fmtTAM(st.tam)}"

}

// Render a cross-TA table of all indications matching the query.
function renderSearchResults(q){
  const ql=q.toLowerCase();
  const matches=[];
  for(const ta of taList){
    for(const sub of Object.keys(taMap[ta].subs)){
      for(const r of taMap[ta].subs[sub]){
        if(r.indication.toLowerCase().includes(ql)||
           (r.symptoms||'').toLowerCase().includes(ql)||
           (r.txgoal||'').toLowerCase().includes(ql)||
           (r.efficacy||'').toLowerCase().includes(ql)||
           (r.age||'').toLowerCase().includes(ql)){
          matches.push(r);
        }
      }
    }
  }
  matches.sort((a,b)=>(b.tam||0)-(a.tam||0));

  hideAllViews();
  document.getElementById('home-search-wrap').style.visibility='';
  document.getElementById('search-results').style.display='block';
  document.getElementById('sr-title').textContent=`Search results`;
  const taCount=new Set(matches.map(m=>m.ta)).size;
  document.getElementById('sr-meta').innerHTML=`<span>${matches.length} indication${matches.length===1?'':'s'} matching “${esc(q)}”</span><span>across ${taCount} therapeutic area${taCount===1?'':'s'}</span>`;

  const body=document.getElementById('sr-body');
  if(!matches.length){
    body.innerHTML='<div class="no-results"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><strong>No results found</strong><span>Try a different search term.</span></div>';
    return;
  }
  const rowsHtml=matches.map(r=>{
    const o=r.over1b==='YES'?'<span class="flag flag-yes">YES</span>':r.over1b==='NO'?'<span class="flag flag-no">NO</span>':'<span class="dash">—</span>';
    const dash=v=>v?highlight(esc(v),ql):'<span class="dash">—</span>';
    return `<tr class="disease-row sr-row${r.hi?' '+r.hi:''}" tabindex="0" role="link"
      onclick="showTA('${escAttr(r.ta)}','${escAttr(q)}')"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showTA('${escAttr(r.ta)}','${escAttr(q)}')}">

      <td class="sr-ta"><span class="sr-ta-link">${esc(r.ta)}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M7 17 17 7M9 7h8v8"/></svg></span></td>
      <td class="sr-sub">${esc(r.subcategory)}</td>
      <td class="td-age">${dash(r.age)}</td>
      <td class="td-text">${dash(r.symptoms)}</td>
      <td class="td-text">${dash(r.txgoal)}</td>
      <td class="td-flag hl-cell">${o}</td>
    </tr>`;}).join('');
  body.innerHTML=`<div class="combined-wrap"><div class="combined-scroll">
    <table class="disease-table combined sr-table" aria-label="Search results for ${escAttr(q)}">
      <thead><tr>
        <th style="min-width:180px">Indication</th>
        <th style="min-width:140px">Therapeutic Area</th>
        <th style="min-width:150px">Subcategory</th>
        <th style="min-width:90px">Age of Onset/Dx</th>
        <th style="min-width:280px">Symptoms</th>
        <th style="min-width:280px">Treatment Goal</th>
        <th style="min-width:60px">&gt;$1B</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div></div>`;
  window.scrollTo(0,0);

function renderTable(ta, q){
  const subs=taMap[ta].subs;
  const ql=(q||'').toLowerCase();
  const container=document.getElementById('sub-groups');
  let totalVisible=0, gi=0, bodyRows='';

  const subKeys=Object.keys(subs).slice().sort((a,b)=>subTAM(subs[b])-subTAM(subs[a]));
  subKeys.forEach((sub)=>{
    let rows=subs[sub].slice().sort((x,y)=>(y.tam||0)-(x.tam||0));
    if(billionOnly) rows=rows.filter(r=>(r.tam||0)>=1000);
    if(realtamOnly) rows=rows.filter(r=>(r.realtam||0)>=1000);
    if(ql) rows=rows.filter(r=>
      r.indication.toLowerCase().includes(ql)||
      (r.symptoms||'').toLowerCase().includes(ql)||
      (r.txgoal||'').toLowerCase().includes(ql)||
      (r.efficacy||'').toLowerCase().includes(ql)||
      (r.age||'').toLowerCase().includes(ql));
    if((ql||billionOnly||realtamOnly) && rows.length===0) return;
    totalVisible+=rows.length;
    const isOpen = ql || billionOnly || realtamOnly || gi<3;
    const groupId=gi;
    bodyRows+=`<tr class="group-row${isOpen?'':' collapsed'}" data-group="${groupId}">
      <td colspan="12">

        </div>
      </td>
    </tr>`;
    let rowNum=0;
    bodyRows+=rows.map(r=>{
      rowNum++;
      const o=r.over1b==='YES'?'<span class="flag flag-yes">YES</span>':r.over1b==='NO'?'<span class="flag flag-no">NO</span>':'<span class="dash">—</span>';
      const dash=v=>v?(ql?highlight(esc(v),ql):esc(v)):'<span class="dash">—</span>';
      const cls='disease-row'+(isOpen?'':' is-hidden')+(r.hi?' '+r.hi:'')+(r.clickable?' clickable':'');
      const clickAttrs=r.clickable
        ? ` data-id="${r._id}" role="button" tabindex="0" title="View cause, treatment algorithm &amp; ideas" onclick="openDetail(${r._id})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openDetail(${r._id})}"`

      // Realistic TAM cell: shows the commercial note on hover when present.
      const rt=r.realtam!=null?fmtTAM(r.realtam):'<span class="dash">—</span>';

        ? `<td class="td-num td-realtam has-note" tabindex="0" aria-label="${escAttr(r.note)}"><span class="rt-val">${rt}</span><span class="note-tip" role="tooltip">${esc(r.note)}</span></td>`

      <td class="td-rownum">${rowNum}</td>
      <td class="td-indication">${ql?highlight(esc(r.indication),ql):esc(r.indication)}${more}</td>
      <td class="td-num">${fmtCount(r.usvol)}</td>
      <td class="td-num">${fmtPct(r.innov)}</td>
      <td class="td-num">${fmtPrice(r.price)}</td>
      <td class="td-num td-tam hl-cell">${fmtTAM(r.tam)}</td>
      ${rtCell}
      <td class="td-age">${dash(r.age)}</td>
      <td class="td-text">${dash(r.symptoms)}</td>
      <td class="td-text">${dash(r.txgoal)}</td>
      <td class="td-text">${dash(r.efficacy)}</td>
      <td class="td-flag hl-cell">${o}</td>
    </tr>`;}).join('');
    gi++;
  });

  if(gi===0){
    let msg='Try a different search term.';
    if(realtamOnly) msg='No indications with realistic TAM ≥ $1B'+(ql?' match your search.':' in this area.');
    else if(billionOnly) msg='No indications with TAM ≥ $1B'+(ql?' match your search.':' in this area.');
    container.innerHTML='<div class="no-results"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><strong>No results found</strong><span>'+msg+'</span></div>';
  } else {
    container.innerHTML=`<div class="combined-wrap"><div class="combined-scroll">
      <table class="disease-table combined" aria-label="${escAttr(ta)} diseases">
        <thead><tr>
          <th class="th-rownum" style="min-width:34px">#</th>
          <th style="min-width:170px">Indication</th>
          <th class="th-num" style="min-width:100px">US Prevalence</th>
          <th class="th-num" style="min-width:95px">% Innovative Tx</th>
          <th class="th-num" style="min-width:95px">Price</th>
          <th class="th-num" style="min-width:85px">US TAM</th>
          <th class="th-num" style="min-width:95px">Realistic TAM</th>
          <th style="min-width:90px">Age of Onset/Dx</th>
          <th style="min-width:280px">Symptoms</th>
          <th style="min-width:280px">Treatment Goal</th>

  document.getElementById('result-count').textContent=ql?`${totalVisible} results for "${q}"${suffix}`:`${totalVisible} indications${suffix}`;
}

// ── Detail popup (Cause / Tx algorithm / Ideas) ────────
// Robustly split the algorithm/ideas text into individual bullets. The source uses several
// formats: "#L1: … #L2: …" treatment lines, explicit "- item - item" dashes, and run-on
// "Title: body. <citation> NextTitle: body." prose with no visible delimiter.
function splitBullets(text){
  let t=String(text||'').trim();
  if(!t) return [];
  // 1) Treatment-algorithm: explicit #L1/#L2/... markers
  if(/#L\d/.test(t)){
    return t.split(/\s*(?:-\s*)?(?=#L\d)/).map(p=>p.replace(/^[\s\-]+/,'').trim()).filter(Boolean);
  }
  // 2) Explicit dash bullets
  if(/^\s*-/.test(t) || /\s-\s/.test(t)){
    if(!t.startsWith('-')) t='- '+t;
    return (' '+t).split(/\s-\s(?=[A-Za-z(0-9])/).map(p=>p.replace(/^[\s\-]+/,'').trim()).filter(Boolean);
  }
  // 3) Run-on "Title: body. <citation> NextTitle: body." — split before each new Title.
  //    A Title reaches a ':' with no sentence-ending '. ' before it; lowercase citation tokens
  //    between the period and the Title are kept with the PREVIOUS item.
  const SEP='\u0001';
  const LCITE='(?:[a-z][a-z0-9\\u2010\\u2011.\\-]*(?:\\+\\d+)?\\s+)*';
  const TSTART='(?:[A-Z(0-9]|mRNA|siRNA|miRNA|tRNA|dsRNA|norUDCA|nor[A-Z]|pH)';
  const titleBody='(?:[^.:]|\\.(?!\\s))*?:';
  const boundary=new RegExp('([.!?])\\s+('+LCITE+')(?='+TSTART+titleBody+')','g');
  const marked=t.replace(boundary,(m,punct,glue)=>punct+(glue?' '+glue.trim():'')+' '+SEP);
  const parts=marked.split(SEP).map(p=>p.trim()).filter(Boolean);
  return parts.length?parts:[t];
}
function bulletList(text){
  const items=splitBullets(text);
  if(!items.length) return '<p class="modal-empty">No data available.</p>';
  return '<ul class="modal-bullets">'+items.map(i=>`<li>${esc(i)}</li>`).join('')+'</ul>';
}
let lastFocus=null;
function openDetail(id){
  const r=DATA[id];
  if(!r) return;
  lastFocus=document.activeElement;
  document.getElementById('modal-eyebrow').textContent=`${r.ta} · ${r.subcategory}`;
  document.getElementById('modal-title').textContent=r.indication;
  document.getElementById('modal-tam').textContent=`${fmtTAM(r.tam)} TAM · >$1B`;
  document.getElementById('modal-body').innerHTML=`
    <section class="modal-row">
      <h3>Cause</h3>
      <div class="modal-rowbody">${r.cause?`<p>${esc(r.cause)}</p>`:'<p class="modal-empty">No data available.</p>'}</div>
    </section>
    <section class="modal-row">
      <h3>Treatment Algorithm</h3>
      <div class="modal-rowbody">${bulletList(r.txalg)}</div>
    </section>
    <section class="modal-row">
      <h3>Ideas</h3>
      <div class="modal-rowbody">${bulletList(r.ideas)}</div>
    </section>`;
  const m=document.getElementById('detail-modal');
  m.hidden=false;
  document.body.style.overflow='hidden';
  m.querySelector('.modal-close').focus();
}
function closeDetail(){
  const m=document.getElementById('detail-modal');
  m.hidden=true;
  document.body.style.overflow='';
  if(lastFocus && lastFocus.focus) lastFocus.focus();
}
// close on overlay click or Escape
document.getElementById('detail-modal').addEventListener('click',function(e){
  if(e.target===this) closeDetail();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape' && !document.getElementById('detail-modal').hidden) closeDetail();
});

// ── Detail search ──────────────────────────────────────
let detTimer;
document.getElementById('detail-search').addEventListener('input',function(){
  clearTimeout(detTimer);
  detTimer=setTimeout(()=>renderTable(currentTA,this.value.trim()),200);
});
document.getElementById('detail-search').addEventListener('keydown',function(e){
  if(e.key==='Escape'){this.value='';renderTable(currentTA,'')}
});

// ── Load data from diseases.xlsx ───────────────────────
async function loadData(){
  const res=await fetch('diseases.xlsx');
  if(!res.ok) throw new Error('HTTP '+res.status);
  const buf=await res.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
  if(!rows.length) return [];

  // Flexible header matching: normalize to lowercase alphanumerics, then
  // pick the first column whose normalized name matches any candidate.
  const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9]/g,'');
  const headers=Object.keys(rows[0]);
  const normMap=headers.map(h=>({h,n:norm(h)}));
  function pick(cands){
    for(const c of cands){ const m=normMap.find(x=>x.n===c); if(m) return m.h; }      // exact
    for(const c of cands){ const m=normMap.find(x=>x.n.includes(c)); if(m) return m.h; } // contains
    return null;
  }
  const COL={
    ta:        pick(['therapeuticarea','ta']),
    sub:       pick(['subcategory','subta','sub']),
    ind:       pick(['indication']),
    usvol:     pick(['usprevalencepatients','usprevalence','usvolume','usvol','prevalence','volume']),
    innov:     pick(['innovativetx','innovativepatient','innovativeshare','innovative']),
    price:     pick(['innovativedrugprice','innovativeprice','drugprice','price']),
    tam:       pick(['ustamm','ustam','tamm','tam']),
    realtam:   pick(['realistictamm','realistictam','realtam']),
    note:      pick(['commercialnote','commercialnotes','note','notes']),
    age:       pick(['ageofonsetdx','ageofonset','ageofdx','ageonset','age']),
    symptoms:  pick(['symptoms','symptom']),
    goal:      pick(['treatmentgoal','txgoal','goal']),
    efficacy:  pick(['efficacybenchmark','efficacy','benchmark']),
    over1b:    pick(['1b','over1b','gt1b','greaterthan1b','blockbuster']),
    cause:     pick(['cause','pathophysiology','pathophys','etiology']),
    txalg:     pick(['txalgorithm','treatmentalgorithm','linebyline','algorithm']),
    ideas:     pick(['ideas','novelideas','breakthroughideas','novelbreakthrough'])
  };
  // 'innovative' alone could match the price column too — make sure innov ≠ price.
  if(COL.innov && COL.innov===COL.price){
    const alt=normMap.find(x=>/innovative/.test(x.n) && /(tx|patient|share|%|percent)/.test(x.n) && x.h!==COL.price);
    COL.innov=alt?alt.h:null;
  }
  const get=(r,k)=>COL[k]!=null?r[COL[k]]:'';
  const numify=v=>{ if(v===''||v==null) return null; const n=typeof v==='number'?v:parseFloat(String(v).replace(/[$,%\s]/g,'')); return isNaN(n)?null:n; };

  return rows.map(r=>{
    let usvol=numify(get(r,'usvol')), innov=numify(get(r,'innov')), price=numify(get(r,'price')), tam=numify(get(r,'tam'));
    // Percentages stored as 0–100 instead of 0–1 → normalize to a fraction.
    if(innov!=null && innov>1.5) innov=innov/100;
    // TAM ($M) = prevalence × innovative% × price ÷ 1e6. Compute when missing or zero.
    if((tam==null||tam===0) && usvol!=null && innov!=null && price!=null){
      tam=usvol*innov*price/1e6;
    }
    // >$1B flag (column T): classify by leading YES / NO.
    const overRaw=String(get(r,'over1b')||'').trim();
    const up=overRaw.toUpperCase();
    let over1b = up.startsWith('YES') ? 'YES' : up.startsWith('NO') ? 'NO' : '';
    // Highlight tier: TAM ≥ $1B (M ≥ 1000) split by the YES/NO flag.
    let hi='';
    if(tam!=null && tam>=1000){
      if(over1b==='YES') hi='hi-yes';
      else if(over1b==='NO') hi='hi-no';
    }
    const cause=String(get(r,'cause')||'').trim();
    const txalg=String(get(r,'txalg')||'').trim();
    const ideas=String(get(r,'ideas')||'').trim();
    let realtam=numify(get(r,'realtam'));
    const note=String(get(r,'note')||'').trim();
    // Rows that are TAM ≥ $1B AND flagged YES get a clickable detail popup.
    const clickable = (tam!=null && tam>=1000 && over1b==='YES' && (cause||txalg||ideas));
    return {
      ta:String(get(r,'ta')||'').trim(),
      subcategory:String(get(r,'sub')||'').trim(),
      indication:String(get(r,'ind')||'').trim(),
      usvol, innov, price, tam, realtam, note, over1b, hi, clickable,
      age:String(get(r,'age')||'').trim(),
      symptoms:String(get(r,'symptoms')||'').trim(),
      txgoal:String(get(r,'goal')||'').trim(),
      efficacy:String(get(r,'efficacy')||'').trim(),
      cause, txalg, ideas
    };
  }).filter(r=>r.ta && r.indication);
}

function showLoadError(msg){
  document.getElementById('home').innerHTML=
    '<div class="no-results" style="padding:5rem 2rem">'+
    '<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>'+
    '<strong>Couldn\u2019t load diseases.xlsx</strong>'+
    '<span style="max-width:46ch">The dashboard reads its data from <code>diseases.xlsx</code> in the same folder. '+
    'Make sure the file is present and the page is served over <code>http://</code> (browsers block local file reads when opened directly).<br><br>'+
    'Quick local server: run <code>python3 -m http.server</code> in this folder, then open the shown address.</span>'+
    '<span style="color:var(--faint);font-size:var(--text-xs)">Details: '+esc(msg)+'</span></div>';
}

// ── Init ───────────────────────────────────────────────
(async function init(){
  try{
    DATA=await loadData();
    if(!DATA.length) throw new Error('no rows parsed');
    buildMap();
    renderHome();
  }catch(e){
    showLoadError(e.message||String(e));
  }
})();

</script>
