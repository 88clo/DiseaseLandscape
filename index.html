—manual extraction under sedation (IV benzodiazepines, propofol) or endoscopic/surgical removal is standard."},{"ta":"Gastrointestinal","subcategory":"Diverticular Disease","indication":"Colonic Diverticulosis","symptoms":"Usually asymptomatic; may cause bloating, cramping, altered bowel habits","goal":"Prevent progression to diverticulitis, relieve symptoms","soc":"High-fiber diet (bulk-forming agent: psyllium/Metamucil); avoidance of seeds/nuts (limited evidence). No pharmacologic SoC for asymptomatic diverticulosis."},{"ta":"Gastrointestinal","subcategory":"Diverticular Disease","indication":"Colonic Diverticulitis","symptoms":"Left lower abdominal pain, fever, nausea, altered bowel habits, tenderness","goal":"Resolve acute infection, prevent perforation and recurrence","soc":"Uncomplicated: Oral antibiotics—ciprofloxacin (fluoroquinolone) + metronidazole (nitroimidazole) for 7–10 days (recent guidelines question need for antibiotics in mild uncomplicated cases). Complicated: IV antibiotics (piperacillin-tazobactam or cefoxitin + metronidazole)."},{"ta":"Gastrointestinal","subcategory":"Diverticular Disease","indication":"Diverticular Disease of the Stomach and Small Bowel","symptoms":"Abdominal pain, bloating, nausea; may cause bleeding or perforation","goal":"Manage complications (bleeding, perforation, infection); prevent recurrence","soc":"For duodenal diverticular complications: antibiotics (amoxicillin-clavulanate); endoscopic or surgical management for bleeding/perforation. No pharmacologic SoC for uncomplicated disease."},{"ta":"Gastrointestinal","subcategory":"Diverticular Disease","indication":"Meckel Diverticulum","symptoms":"Painless rectal bleeding (children), abdominal pain, intussusception, obstruction","goal":"Surgical resection of symptomatic diverticulum to prevent complications","soc":"None pharmacologic—surgical resection (laparoscopic Meckel's diverticulectomy) is the only effective treatment."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Gastroesophageal Reflux Disease (GERD)","symptoms":"Heartburn, acid regurgitation, chest pain, belching, dysphagia","goal":"Achieve symptom control, heal esophagitis, prevent complications","soc":"Proton pump inhibitors (PPIs): omeprazole (Prilosec), esomeprazole (Nexium), pantoprazole (Protonix) 20–40mg daily. PPIs are the most potent acid suppressors available."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Dysphagia","symptoms":"Difficulty swallowing solids and/or liquids, choking, coughing, regurgitation","goal":"Restore safe swallowing, prevent aspiration, maintain nutrition","soc":"Depends on etiology: structural (dilation), neurologic (speech therapy), GERD-related (PPIs), eosinophilic (steroids). No universal pharmacologic first-line. PPIs (omeprazole/pantoprazole) for GERD-related dysphagia."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Hiatus (Hiatal) Hernia","symptoms":"Heartburn, regurgitation, chest pain, dysphagia, belching","goal":"Control reflux symptoms, prevent complications, reduce hernia if symptomatic","soc":"PPIs (omeprazole, pantoprazole) for symptomatic management of associated GERD. Surgical repair (laparoscopic Nissen fundoplication) for large/symptomatic hernias."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Eosinophilic Esophagitis","symptoms":"Dysphagia, food impaction, chest pain, heartburn, abdominal pain","goal":"Achieve histologic remission, prevent stricture, relieve dysphagia","soc":"Swallowed topical corticosteroids: fluticasone propionate (MDI swallowed, not inhaled) or budesonide oral suspension (Eohilia; FDA-approved Feb 2024) or budesonide orally disintegrating tablets (Jorveza; EMA-approved). PPIs also used as initial therapy."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Achalasia","symptoms":"Dysphagia to solids and liquids, regurgitation, chest pain, weight loss","goal":"Reduce LES pressure, restore esophageal emptying, relieve dysphagia","soc":"Pneumatic balloon dilation (endoscopic) or laparoscopic Heller myotomy are first-line interventional options. Botulinum toxin A injection into LES (temporary bridge). Calcium channel blockers (nifedipine; diltiazem) or nitrates (isosorbide dinitrate) for pharmacologic palliation."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Esophageal Motility Disorders","symptoms":"Dysphagia, chest pain, regurgitation, heartburn, difficulty swallowing","goal":"Normalize esophageal motility, relieve dysphagia and chest pain","soc":"Depends on subtype: CCBs (diltiazem) or nitrates (isosorbide dinitrate) for hypercontractile disorders; PPIs for GERD overlap; TCAs for functional chest pain."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Obstructive Disorders of the Esophagus","symptoms":"Dysphagia, regurgitation, weight loss, food impaction, chest pain","goal":"Restore esophageal patency, relieve obstruction, treat underlying cause","soc":"Endoscopic dilation for benign strictures; PPIs for GERD-related strictures; endoscopic stenting or surgery for malignant/complex obstruction."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Distal Esophageal Spasm","symptoms":"Chest pain, dysphagia, non-cardiac chest pain, regurgitation","goal":"Relieve esophageal spasm, reduce chest pain, improve swallowing","soc":"Calcium channel blockers (diltiazem 60–90mg TID; nifedipine; CCBs reduce esophageal smooth muscle spasm) or nitrates (isosorbide dinitrate 5–10mg SL; smooth muscle relaxant)."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Lower Esophageal Ring","symptoms":"Intermittent dysphagia to solids, 'steakhouse syndrome', food impaction","goal":"Relieve dysphagia, prevent food impaction episodes","soc":"Endoscopic dilation (bougie or balloon dilation) is first-line. PPIs for associated GERD."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Esophageal Diverticula","symptoms":"Dysphagia, regurgitation of undigested food, halitosis, aspiration","goal":"Relieve obstruction, prevent aspiration, eliminate diverticulum","soc":"None pharmacologic—surgical or endoscopic myotomy/diverticulectomy is definitive for Zenker's or epiphrenic diverticula. PPIs for associated GERD."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Infectious Esophageal Disorders","symptoms":"Odynophagia, dysphagia, chest pain, fever, oral thrush (candidal)","goal":"Eradicate esophageal infection, relieve dysphagia","soc":"Candidal esophagitis: fluconazole (Diflucan; azole antifungal) 200–400mg/day × 14–21 days. Herpetic esophagitis: acyclovir (antiviral) 400mg 5×/day × 14–21 days. CMV esophagitis: ganciclovir or valganciclovir (antiviral)."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Dysphagia Lusoria","symptoms":"Dysphagia to solids, intermittent, pulsatile chest sensation from aberrant artery","goal":"Relieve vascular compression of esophagus; surgery if symptomatic","soc":"None pharmacologic—asymptomatic cases observed. Symptomatic: surgical correction (division of aberrant right subclavian artery + vascular reconstruction) is definitive."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Mallory-Weiss Syndrome","symptoms":"Bright red hematemesis after repeated vomiting, nausea, retching","goal":"Achieve hemostasis, prevent rebleeding","soc":"Supportive care (IV fluids, antiemetics) in most cases—~90% stop spontaneously. Proton pump inhibitors (IV esomeprazole or pantoprazole) to promote mucosal healing. Endoscopic hemostasis (epinephrine injection, cauterization) for active bleeding."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Esophageal Rupture","symptoms":"Severe chest/epigastric pain after vomiting, subcutaneous emphysema, shock","goal":"Urgent surgical or endoscopic repair, control mediastinal contamination","soc":"Broad-spectrum IV antibiotics (piperacillin-tazobactam or carbapenems + antifungals) + emergent surgical repair or covered esophageal stent placement."},{"ta":"Gastrointestinal","subcategory":"Esophageal and Swallowing Disorders","indication":"Esophageal Web","symptoms":"Dysphagia to solids, intermittent, cervical dysphagia, sometimes iron deficiency","goal":"Restore esophageal lumen patency, treat associated iron deficiency","soc":"Endoscopic dilation (bougie or balloon) is first-line. Iron supplementation for associated iron deficiency anemia (Plummer-Vinson syndrome)."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Gastritis","symptoms":"Epigastric pain, nausea, bloating, indigestion, early satiety","goal":"Relieve symptoms, heal gastric mucosa, treat underlying cause","soc":"PPIs (omeprazole, pantoprazole) for symptom relief and mucosal protection; H. pylori eradication therapy if H. pylori-positive."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Nonerosive Gastritis","symptoms":"Epigastric discomfort, nausea, early satiety, bloating without endoscopic erosions","goal":"Relieve dyspeptic symptoms, treat H. pylori if present","soc":"PPIs (omeprazole 20mg daily) or H2RAs (famotidine 20mg BID) for symptom control. H. pylori eradication if positive."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Erosive Gastritis","symptoms":"Epigastric pain, nausea, vomiting, GI bleeding, dyspepsia","goal":"Heal mucosal erosions, prevent GI bleeding, remove causative agent","soc":"PPIs (omeprazole 20–40mg daily; pantoprazole) for acid suppression + mucosal healing. Remove offending agent (NSAIDs, alcohol, steroids)."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Autoimmune Metaplastic Atrophic Gastritis","symptoms":"Often asymptomatic; pernicious anemia, B12 deficiency, neurologic symptoms","goal":"Correct B12 deficiency, monitor for gastric neoplasia","soc":"Vitamin B12 replacement (IM cyanocobalamin 1000mcg monthly or high-dose oral B12 1000–2000mcg daily). Iron supplementation if iron deficiency present."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Helicobacter pylori Infection","symptoms":"Asymptomatic or epigastric pain, nausea, bloating, ulcer symptoms","goal":"Eradicate H. pylori, heal mucosa, prevent ulcer and cancer complications","soc":"Clarithromycin-based triple therapy (PPI + clarithromycin + amoxicillin × 14 days) or bismuth quadruple therapy (PPI + bismuth subcitrate + tetracycline + metronidazole × 10–14 days) per ACG 2022 guidelines. Vonoprazan-based dual/triple therapy now first-line preferred in US."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Peptic Ulcer Disease","symptoms":"Epigastric burning/pain, hunger-like pain, nausea, vomiting, GI bleeding","goal":"Heal ulcer, eradicate H. pylori, prevent recurrence and bleeding","soc":"PPIs (omeprazole 20–40mg BID × 4–8 weeks) for gastric/duodenal ulcers + H. pylori eradication if positive. Misoprostol or PPI for NSAID-induced ulcers."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Uncommon Gastritis Syndromes","symptoms":"Abdominal pain, nausea, vomiting, diarrhea, weight loss (varies by type)","goal":"Treat underlying cause, relieve mucosal inflammation, prevent complications","soc":"Depends on subtype: Eosinophilic—budesonide (swallowed); Menetrier's—cetuximab (anti-EGFR biologic) or PPI; Collagenous—budesonide; Lymphocytic—stop offending drug + PPI."},{"ta":"Gastrointestinal","subcategory":"Gastritis and Peptic Ulcer Disease","indication":"Postgastrectomy Gastritis","symptoms":"Epigastric pain, nausea, bilious vomiting, early satiety, weight loss","goal":"Manage bile reflux, relieve symptoms, prevent mucosal injury","soc":"Cholestyramine (bile acid sequestrant) to bind refluxed bile; prokinetics (metoclopramide, domperidone where available) to improve gastric emptying; sucralfate (mucosal protectant) as barrier."},{"ta":"Gastrointestinal","subcategory":"Gastroenteritis","indication":"Norovirus Gastroenteritis","symptoms":"Sudden vomiting, watery diarrhea, cramping, low-grade fever, body aches","goal":"Maintain hydration, relieve symptoms, prevent outbreak spread","soc":"Supportive: Oral rehydration therapy (ORS) or IV fluids; antiemetics (ondansetron); zinc supplementation. No specific antiviral approved."},{"ta":"Gastrointestinal","subcategory":"Gastroenteritis","indication":"E. coli Gastroenteritis","symptoms":"Watery or bloody diarrhea, abdominal cramping, fever, nausea","goal":"Resolve infection, prevent complications (HUS in STEC), maintain hydration","soc":"Supportive: ORS/IV hydration. Antibiotics (azithromycin or ciprofloxacin) for ETEC traveler's diarrhea. STEC/EHEC (O157:H7): Supportive only—antibiotics contraindicated (increase HUS risk)."},{"ta":"Gastrointestinal","subcategory":"Gastroenteritis","indication":"Traveler’s Diarrhea","symptoms":"Sudden watery diarrhea, cramping, nausea, urgency while traveling","goal":"Shorten illness, restore normal stool, enable continued travel","soc":"Rifaximin (Xifaxan 200mg TID × 3 days; non-absorbable antibiotic) for non-dysenteric traveler's diarrhea. Azithromycin (1g single dose) for dysenteric or fluoroquinolone-resistant areas (South/SE Asia)."},{"ta":"Gastrointestinal","subcategory":"Gastroenteritis","indication":"Drug-Related Gastroenteritis and Chemical-Related Gastroenteritis","symptoms":"Nausea, vomiting, diarrhea, abdominal cramping after drug/chemical exposure","goal":"Stop offending agent, provide supportive care, prevent dehydration","soc":"Discontinue offending drug/chemical; oral rehydration therapy (ORS); antiemetics (ondansetron); antidiarrheals (loperamide) as appropriate."},{"ta":"Gastrointestinal","subcategory":"Gastroenteritis","indication":"Rotavirus Gastroenteritis","symptoms":"Watery diarrhea, vomiting, fever in children; severe dehydration risk","goal":"Prevent dehydration, shorten illness duration; vaccination for prevention","soc":"ORS (oral rehydration solution) for hydration. Rotavirus vaccines (RotaTeq, Rotarix) prevent ~85–95% of severe rotavirus disease in children—most important intervention."},{"ta":"Gastrointestinal","subcategory":"Gastroenteritis","indication":"Staphylococcal Food Poisoning","symptoms":"Rapid-onset vomiting, nausea, cramping within 1–6 hours of eating","goal":"Control vomiting, maintain hydration, prevent dehydration","soc":"Supportive only: ORS or IV fluids; antiemetics (ondansetron). Antibiotics not indicated (pre-formed toxin, not active infection)."},{"ta":"Gastrointestinal","subcategory":"Gastrointestinal Bleeding","indication":"Varices","symptoms":"Sudden large-volume hematemesis, melena, dizziness, hypotension in cirrhosis","goal":"Achieve hemostasis, prevent rebleeding, treat portal hypertension","soc":"Acute variceal hemorrhage: IV octreotide (somatostatin analog; reduces portal pressure) + emergency endoscopic band ligation (EVL). Non-selective beta-blockers (propranolol, nadolol, carvedilol) for primary and secondary prophylaxis."},{"ta":"Gastrointestinal","subcategory":"Gastrointestinal Bleeding","indication":"Vascular Gastrointestinal Lesions","symptoms":"Intermittent or chronic GI bleeding, iron deficiency anemia, melena or hematochezia","goal":"Achieve hemostasis, prevent recurrent bleeding, treat iron deficiency","soc":"Endoscopic thermal coagulation (APC—argon plasma coagulation) for angioectasias/AVMs; IV iron supplementation for associated iron deficiency anemia. Thalidomide (immunomodulator) or octreotide for refractory angiodysplasia bleeding."},{"ta":"Gastrointestinal","subcategory":"Inflammatory Bowel Disease (IBD)","indication":"Ulcerative Colitis","symptoms":"Bloody diarrhea, urgency, abdominal cramping, rectal bleeding, tenesmus","goal":"Achieve and maintain mucosal healing, eliminate rectal bleeding","soc":"Mild-moderate: Oral and/or rectal mesalamine (5-ASA; Asacol HD, Lialda, Apriso). Moderate-severe: Anti-TNF (infliximab, adalimumab) or vedolizumab (Entyvio)."},{"ta":"Gastrointestinal","subcategory":"Inflammatory Bowel Disease (IBD)","indication":"Crohn Disease","symptoms":"Chronic diarrhea, abdominal pain, weight loss, fatigue, rectal bleeding","goal":"Achieve and maintain deep remission, prevent complications and surgery","soc":"Moderate-severe: Induction with anti-TNF biologic—adalimumab (Humira; anti-TNF) or infliximab (Remicade; anti-TNF) ± immunomodulator (azathioprine/6-MP). Mild-moderate: Budesonide (topical steroid) for ileocolonic Crohn's."},{"ta":"Gastrointestinal","subcategory":"Irritable Bowel Syndrome (IBS)","indication":"Irritable Bowel Syndrome (IBS)","symptoms":"Abdominal pain/cramping, bloating, altered bowel habits (diarrhea/constipation)","goal":"Relieve abdominal pain, normalize stool, improve quality of life","soc":"IBS-D: Rifaximin (Xifaxan 550mg TID × 14 days; non-absorbable antibiotic) or alosetron (Lotronex; 5-HT3 antagonist; women with severe IBS-D). IBS-C: Linaclotide (Linzess; guanylate cyclase agonist) or lubiprostone (Amitiza; chloride channel activator)."},{"ta":"Gastrointestinal","subcategory":"Malabsorption Syndromes","indication":"Small Intestinal Bacterial Overgrowth (SIBO)","symptoms":"Bloating, gas, diarrhea, abdominal cramping, malabsorption, belching","goal":"Eradicate bacterial overgrowth, relieve symptoms, address underlying cause","soc":"Rifaximin (Xifaxan 550mg TID × 14 days; non-absorbable antibiotic)—most widely used and best-evidence antibiotic for SIBO. Alternatively, metronidazole or neomycin for methane-predominant SIBO."},{"ta":"Gastrointestinal","subcategory":"Malabsorption Syndromes","indication":"Celiac Disease","symptoms":"Chronic diarrhea, bloating, weight loss, fatigue, iron deficiency anemia","goal":"Achieve mucosal healing via strict gluten-free diet; manage complications","soc":"Strict gluten-free diet (GFD) is the only currently approved treatment. No pharmacologic first-line SoC exists."},{"ta":"Gastrointestinal","subcategory":"Malabsorption Syndromes","indication":"Short Bowel Syndrome","symptoms":"Chronic diarrhea, malabsorption, malnutrition, weight loss, parenteral nutrition dependence","goal":"Achieve intestinal autonomy, reduce parenteral nutrition dependence","soc":"Teduglutide (Gattex/Revestive; GLP-2 analog) SC injection—FDA-approved 2012; promotes intestinal adaptation, reduces PN requirements. Loperamide for diarrhea control."},{"ta":"Gastrointestinal","subcategory":"Malabsorption Syndromes","indication":"Carbohydrate Intolerance","symptoms":"Bloating, flatulence, diarrhea, abdominal cramping after carbohydrate ingestion","goal":"Eliminate symptoms, prevent malnutrition from dietary restriction","soc":"Lactase supplementation (Lactaid; exogenous lactase enzyme) for lactose intolerance. Dietary restriction of offending carbohydrate (lactose, fructose, sucrose)."},{"ta":"Gastrointestinal","subcategory":"Malabsorption Syndromes","indication":"Intestinal Lymphangiectasia","symptoms":"Protein-losing enteropathy, bilateral leg edema, diarrhea, low albumin","goal":"Reduce lymph pressure, replace lost proteins, prevent malnutrition","soc":"Low-fat diet with medium-chain triglyceride (MCT) supplementation (MCT oils bypass lymphatics); high-protein diet supplementation."},{"ta":"Gastrointestinal","subcategory":"Malabsorption Syndromes","indication":"Whipple Disease","symptoms":"Diarrhea, weight loss, arthralgias, lymphadenopathy, neurologic symptoms","goal":"Eradicate Tropheryma whipplei, achieve clinical and histologic remission","soc":"IV ceftriaxone 2g/day × 2 weeks (induction), then oral trimethoprim-sulfamethoxazole (TMP-SMX; Bactrim) 1 DS tablet BID × 1–2 years (maintenance)."},{"ta":"Gastrointestinal","subcategory":"Malabsorption Syndromes","indication":"Tropical Sprue","symptoms":"Chronic diarrhea, malabsorption, weight loss, megaloblastic anemia, nutritional deficiencies","goal":"Eradicate tropical sprue, restore mucosal function, correct nutritional deficiencies","soc":"Tetracycline (250mg QID × 3–6 months) + folic acid (5mg/day) supplementation—highly effective combination."},{"ta":"Gastrointestinal","subcategory":"Pancreatitis","indication":"Chronic Pancreatitis","symptoms":"Chronic epigastric pain, steatorrhea, weight loss, diabetes, malabsorption","goal":"Control pain, treat exocrine/endocrine insufficiency, prevent progression","soc":"Pancreatic enzyme replacement therapy (PERT: pancrelipase [Creon, Pancreaze, Zenpep]; serine protease cocktail) for exocrine pancreatic insufficiency. Analgesics (non-opioids preferred) for pain."},{"ta":"Gastrointestinal","subcategory":"Pancreatitis","indication":"Acute Pancreatitis","symptoms":"Severe epigastric pain radiating to back, nausea, vomiting, fever, elevated lipase","goal":"Resolve inflammation, prevent necrosis and systemic complications","soc":"Aggressive IV fluid resuscitation (lactated Ringer's solution preferred); early enteral nutrition; analgesics (opioids: hydromorphone, morphine IV). No specific anti-inflammatory drug approved."},{"ta":"Gastrointestinal","subcategory":"Benign Liver Tumors","indication":"Hepatic Cysts","symptoms":"Usually asymptomatic; large cysts cause abdominal fullness, pain, early satiety","goal":"Treat symptomatic or complicated cysts; rule out malignancy","soc":"Observation for asymptomatic simple cysts. Aspiration-sclerotherapy (ethanol injection) or fenestration for large symptomatic cysts. No pharmacologic SoC."},{"ta":"Gastrointestinal","subcategory":"Benign Liver Tumors","indication":"Benign Liver Tumors","symptoms":"Usually asymptomatic; RUQ discomfort, incidental finding on imaging","goal":"Monitor for growth/malignant transformation; treat if symptomatic or risk of rupture","soc":"Observation/imaging surveillance for most (hemangiomas, FNH). Cessation of OCP for hepatocellular adenoma. Surgery for symptomatic or large (>5 cm) adenomas."},{"ta":"Gastrointestinal","subcategory":"Benign Liver Tumors","indication":"Hemangiomas","symptoms":"Usually asymptomatic; rarely RUQ pain or Kasabach-Merritt syndrome (giant hemangioma)","goal":"Monitor; treat only symptomatic or giant (>10 cm) hemangiomas","soc":"Observation for most (<5 cm) hepatic hemangiomas. Surgical resection or ablation for giant symptomatic hemangiomas. Propranolol (beta-blocker) for infantile hepatic hemangiomas."},{"ta":"Gastrointestinal","subcategory":"Benign Liver Tumors","indication":"Hepatocellular Adenoma","symptoms":"Right upper quadrant pain, incidental liver mass, rarely bleeding/rupture","goal":"Prevent rupture/malignant transformation; regress or resect lesion","soc":"Cessation of oral contraceptives/anabolic steroids (leads to regression in >50%). Surgical resection for >5 cm lesions or men with adenoma (higher malignant risk)."},{"ta":"Gastrointestinal","subcategory":"Benign Liver Tumors","indication":"Focal Nodular Hyperplasia","symptoms":"Usually asymptomatic; rarely RUQ pain or palpable mass on imaging","goal":"Confirm benign diagnosis; reassure patient; no pharmacologic treatment","soc":"Observation with MRI surveillance. No pharmacologic treatment needed."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Chronic Cholecystitis","symptoms":"Recurrent biliary colic, nausea, RUQ pain after meals, dyspepsia","goal":"Relieve symptoms; prevent acute exacerbations; definitive surgical cure","soc":"Laparoscopic cholecystectomy. Symptomatic management pre-surgery: antispasmodics, NSAIDs, low-fat diet."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Sclerosing Cholangitis","symptoms":"Jaundice, pruritus, fatigue, cholangitis attacks, elevated ALP/GGT","goal":"Relieve biliary obstruction, prevent cholangiocarcinoma, delay transplant need","soc":"ERCP-guided balloon dilation and short-term stenting for dominant strictures. Antibiotics for cholangitis. UDCA controversial for PSC (avoid high-dose); used for IgG4-SC as 2nd-line after steroids."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Primary Biliary Cholangitis (PBC)","symptoms":"Pruritus, fatigue, jaundice, dry eyes/mouth (Sicca), elevated ALP","goal":"Normalize ALP, slow fibrosis progression, relieve pruritus","soc":"Ursodeoxycholic acid (UDCA) 13–15 mg/kg/day — normalizes ALP, delays fibrosis in ~50–60% biochemical responders."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Primary Sclerosing Cholangitis (PSC)","symptoms":"Pruritus, fatigue, jaundice, cholangitis episodes, IBD co-occurrence","goal":"Slow fibrosis, prevent cholangiocarcinoma, manage complications","soc":"No FDA-approved pharmacologic therapy for PSC fibrosis. UDCA no longer recommended at high dose (UDCA >28 mg/kg associated with harm in UCSF trial). Antibiotics for dominant stricture-associated cholangitis."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Choledocholithiasis and Cholangitis","symptoms":"RUQ pain, jaundice, fever/chills (Charcot's triad); Reynold's pentad in severe","goal":"Biliary drainage (ERCP stone removal); eradicate biliary infection; prevent recurrence","soc":"IV antibiotics (ceftriaxone + metronidazole or piperacillin-tazobactam) + urgent ERCP with sphincterotomy and stone extraction."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Acute Cholecystitis","symptoms":"Severe right upper quadrant pain, fever, nausea, Murphy's sign positive","goal":"Resolve acute inflammation; prevent complications; early cholecystectomy","soc":"IV antibiotics (cefazolin or ampicillin-sulbactam for mild-moderate; piperacillin-tazobactam for severe) + analgesics + early laparoscopic cholecystectomy (<72 hours)."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Cholelithiasis","symptoms":"Biliary colic (RUQ pain after fatty meals), nausea, bloating, intolerance of fatty food","goal":"Resolve symptoms; prevent complications (cholecystitis, pancreatitis, choledocholithiasis)","soc":"Laparoscopic cholecystectomy (definitive). Ursodiol (ursodeoxycholic acid) for non-surgical candidates with cholesterol stones (dissolves small stones slowly)."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Tumors of the Gallbladder and Bile Ducts","symptoms":"Obstructive jaundice, right upper quadrant pain, weight loss, pruritus","goal":"Achieve R0 resection if possible; palliate biliary obstruction; extend survival","soc":"Resectable: surgical resection (cholecystectomy ± liver resection for gallbladder cancer; hepatectomy with bile duct excision for hilar CCA). Unresectable/metastatic: gemcitabine + cisplatin (GEMCIS) chemotherapy — first-line since 2010."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Postcholecystectomy Syndrome","symptoms":"Persistent right upper quadrant pain, dyspepsia, bloating after gallbladder removal","goal":"Identify and treat residual/new biliary pathology; relieve symptoms","soc":"None specific. Symptomatic: antispasmodics (hyoscine/dicyclomine), PPIs for dyspepsia, cholestyramine for bile salt diarrhea. ERCP if biliary cause (retained stone, sphincter of Oddi dysfunction)."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Acalculous Biliary Pain","symptoms":"Right upper quadrant pain, nausea, fatty food intolerance, no gallstones","goal":"Relieve biliary pain; correct gallbladder dysmotility","soc":"Cholecystectomy (laparoscopic) for documented gallbladder dysfunction (low ejection fraction on HIDA scan). No pharmacologic SoC for acalculous biliary pain."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"IgG4-Related Sclerosing Cholangitis","symptoms":"Obstructive jaundice, weight loss, abdominal pain, elevated IgG4 levels","goal":"Achieve remission, reverse biliary strictures, prevent relapse and organ damage","soc":"Oral prednisone 30–40 mg/day × 4–8 weeks, then taper over 3–6 months; highly effective (>90% remission rate)."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"HIV-related Cholangiopathy","symptoms":"RUQ pain, cholestatic liver enzymes (ALP elevation), biliary strictures, cryptosporidium/CMV","goal":"Treat opportunistic biliary infection; optimize antiretroviral therapy","soc":"Combination antiretroviral therapy (cART) — restoring CD4 count resolves cholangiopathy in many. Treat specific opportunistic infection (nitazoxanide for cryptosporidium; ganciclovir/valganciclovir for CMV)."},{"ta":"Gastrointestinal","subcategory":"Biliary Disorders","indication":"Ischemic Cholangiopathy","symptoms":"Jaundice, biliary strictures, elevated LFTs, bile duct injury post-transplant/critical illness","goal":"Restore biliary drainage; prevent secondary biliary cirrhosis","soc":"None (procedural): ERCP with biliary stenting, percutaneous transhepatic cholangiography (PTC) for dominant strictures. Ursodeoxycholic acid (UDCA) to improve bile flow."},{"ta":"Gastrointestinal","subcategory":"Chronic Liver Disease","indication":"Chronic Hepatitis","symptoms":"Fatigue, right upper quadrant discomfort, elevated liver enzymes, jaundice (advanced)","goal":"Achieve viral suppression (HBV) or cure (HCV); prevent cirrhosis and HCC","soc":"Chronic HBV: tenofovir alafenamide (Vemlidy, TAF) or entecavir (Baraclude) — long-term therapy. Chronic HCV: pangenotypic DAA (sofosbuvir + velpatasvir/Epclusa, or glecaprevir + pibrentasvir/Mavyret)."},{"ta":"Gastrointestinal","subcategory":"Chronic Liver Disease","indication":"Metabolic Dysfunction–Associated Liver Disease (MASLD)","symptoms":"Often asymptomatic; fatigue, right upper quadrant discomfort, metabolic syndrome features","goal":"Reduce hepatic steatosis/inflammation, reverse fibrosis, prevent cirrhosis and HCC","soc":"Weight loss (7–10% body weight via diet/exercise) and metabolic risk factor optimization. Semaglutide (Ozempic/Wegovy, GLP-1 RA) now endorsed as first pharmacologic option (2024 guidelines); resmetirom (Rezdiffra) FDA-approved March 2024 for MASH with ≥F2 fibrosis."},{"ta":"Gastrointestinal","subcategory":"Chronic Liver Disease","indication":"Alcohol-Related Liver Disease","symptoms":"Jaundice, ascites, encephalopathy, hepatomegaly, spider angiomas, RUQ pain","goal":"Achieve and maintain alcohol abstinence; reduce hepatic inflammation; prevent progression","soc":"Abstinence (cornerstone). Corticosteroids (prednisolone 40 mg/day × 28 days) for severe alcoholic hepatitis (Maddrey DF ≥32). Nutritional support."},{"ta":"Gastrointestinal","subcategory":"Chronic Liver Disease","indication":"Cirrhosis","symptoms":"Fatigue, jaundice, ascites, spider angiomas, gynecomastia, esophageal varices bleeding","goal":"Prevent decompensation, manage complications, await transplant","soc":"Treat underlying cause (antivirals for HBV/HCV, abstinence for ARLD). Non-selective beta-blockers (propranolol/nadolol or carvedilol) for portal hypertension/variceal prevention."},{"ta":"Gastrointestinal","subcategory":"Chronic Liver Disease","indication":"Hepatic Fibrosis","symptoms":"Often asymptomatic early; fatigue, RUQ discomfort, signs of portal hypertension late","goal":"Halt or reverse fibrosis progression; prevent cirrhosis and HCC","soc":"Treat underlying cause (HBV/HCV antivirals, alcohol abstinence, weight loss for MASLD). No approved anti-fibrotic pharmacotherapy beyond addressing etiology."},{"ta":"Gastrointestinal","subcategory":"Liver Complications","indication":"Ascites","symptoms":"Abdominal distension, weight gain, dyspnea, umbilical hernia, peripheral edema","goal":"Remove fluid, prevent recurrence, prevent SBP, extend survival","soc":"Sodium restriction + diuretics: spironolactone 100 mg/day (first-line) + furosemide 40 mg/day, titrated. Therapeutic paracentesis for large-volume ascites with IV albumin."},{"ta":"Gastrointestinal","subcategory":"Liver Complications","indication":"Portal Hypertension","symptoms":"Variceal bleeding, ascites, splenomegaly, hepatic encephalopathy","goal":"Prevent variceal hemorrhage, manage ascites, slow progression","soc":"Non-selective beta-blockers (NSBBs): propranolol or carvedilol for primary prophylaxis of variceal bleeding. Acute variceal bleed: terlipressin (Lucassin, FDA-approved 2022) + endoscopic band ligation (EBL)."},{"ta":"Gastrointestinal","subcategory":"Liver Complications","indication":"Spontaneous Bacterial Peritonitis (SBP)","symptoms":"Abdominal pain/tenderness, fever, confusion (hepatic encephalopathy), new or worsening ascites","goal":"Eradicate peritoneal infection; prevent AKI, HE, and in-hospital mortality","soc":"IV cefotaxime 2g q8h × 5 days (or ceftriaxone 1g q24h). IV albumin 1.5 g/kg at diagnosis and 1.0 g/kg on day 3 — reduces AKI and improves 90-day survival."},{"ta":"Gastrointestinal","subcategory":"Liver Complications","indication":"Portosystemic Encephalopathy","symptoms":"Confusion, disorientation, asterixis (hand flap), altered consciousness, coma","goal":"Reverse acute episodes; prevent recurrence; preserve cognitive function","soc":"Lactulose (non-absorbable disaccharide) 30–60 mL BID–TID, titrated to 2–3 soft stools/day. Rifaximin (Xifaxan) 550 mg BID for secondary prophylaxis after ≥1 episode."},{"ta":"Gastrointestinal","subcategory":"Metabolic Liver Disorders","indication":"Jaundice","symptoms":"Yellow skin/eyes, dark urine, pale stools, itching, fatigue","goal":"Identify and treat underlying cause; relieve cholestasis","soc":"None (treat underlying cause). Cholestyramine or rifampicin for pruritus from cholestatic jaundice. UDCA for cholestatic liver disease."},{"ta":"Gastrointestinal","subcategory":"Metabolic Liver Disorders","indication":"Crigler-Najjar Syndrome","symptoms":"Severe neonatal jaundice, unconjugated hyperbilirubinemia, kernicterus risk (Type 1)","goal":"Prevent kernicterus; control bilirubin levels; enable curative transplant or gene therapy","soc":"Type 1: phototherapy 10–16 hours/day (lifelong without transplant). Liver transplant (curative). Type 2 (Arias): phenobarbital 60–180 mg/day (induces residual UGT1A1 activity)."},{"ta":"Gastrointestinal","subcategory":"Metabolic Liver Disorders","indication":"Primary Shunt Hyperbilirubinemia","symptoms":"Mild jaundice, splenomegaly, elevated unconjugated bilirubin, mild anemia","goal":"Monitor; no pharmacologic intervention typically needed","soc":"None (benign condition). Dietary management if related to ineffective erythropoiesis; no pharmacologic SoC."},{"ta":"Gastrointestinal","subcategory":"Metabolic Liver Disorders","indication":"Dubin-Johnson Syndrome and Rotor Syndrome","symptoms":"Mild chronic jaundice, conjugated hyperbilirubinemia; otherwise well","goal":"Reassurance; no pharmacologic treatment required","soc":"None. Benign conditions with excellent prognosis; no drug therapy indicated."},{"ta":"Gastrointestinal","subcategory":"Metabolic Liver Disorders","indication":"Gilbert Syndrome","symptoms":"Mild episodic jaundice (unconjugated), triggered by stress/fasting/illness; otherwise healthy","goal":"Reassure patient; no pharmacologic treatment required","soc":"None. Benign condition; patient education and reassurance."},{"ta":"Gastrointestinal","subcategory":"Other Hepatic Disorders","indication":"Liver Injury Caused by Drugs","symptoms":"Elevated LFTs, jaundice, fatigue, nausea, rarely fulminant liver failure","goal":"Identify and stop offending drug; prevent fulminant failure","soc":"Discontinue offending drug (primary intervention). N-acetylcysteine (NAC) for acetaminophen DILI. Oral corticosteroids for immune-allergic DILI (autoimmune features)."},{"ta":"Gastrointestinal","subcategory":"Other Hepatic Disorders","indication":"Hepatic Granulomas","symptoms":"Fever, fatigue, right upper quadrant discomfort, hepatomegaly","goal":"Treat underlying cause; prevent fibrosis progression","soc":"Treat underlying etiology: anti-TB therapy (isoniazid/rifampin/pyrazinamide/ethambutol) for TB granulomas; systemic corticosteroids for sarcoidosis-related hepatic granulomas."},{"ta":"Gastrointestinal","subcategory":"Other Hepatic Disorders","indication":"Postoperative Liver Dysfunction","symptoms":"Jaundice, elevated LFTs, coagulopathy post-surgery, confusion (HE)","goal":"Preserve liver function; prevent progression to acute liver failure","soc":"None (supportive). IV NAC for hepatoprotection post-hepatectomy. Avoid hepatotoxins; optimize hemodynamics."},{"ta":"Gastrointestinal","subcategory":"Other Hepatic Disorders","indication":"Acute Liver Failure","symptoms":"Jaundice, coagulopathy (INR >1.5), encephalopathy, rapid onset <26 weeks","goal":"Support liver function while awaiting recovery or transplant; treat etiology","soc":"N-acetylcysteine (NAC) IV for acetaminophen-induced ALF (and possibly non-APAP). Urgent liver transplant evaluation. ICU management."},{"ta":"Gastrointestinal","subcategory":"Other Hepatic Disorders","indication":"Fulminant Hepatitis","symptoms":"Rapid-onset jaundice, coagulopathy, hepatic encephalopathy within 8 weeks","goal":"Prevent death; support hepatic regeneration; evaluate for urgent liver transplant","soc":"NAC (N-acetylcysteine) for all causes of ALF (strongest evidence for APAP, benefit in non-APAP). Treat etiology. ICU management."},{"ta":"Gastrointestinal","subcategory":"Other Hepatic Disorders","indication":"Peliosis Hepatis","symptoms":"Hepatomegaly, right upper quadrant pain, abnormal LFTs, rare intraperitoneal hemorrhage","goal":"Remove causative agent; prevent life-threatening hemorrhage","soc":"Discontinue causative drug (anabolic steroids, OCP, tamoxifen) or treat underlying infection (Bartonella: doxycycline + rifampicin for bacillary peliosis in HIV)."},{"ta":"Gastrointestinal","subcategory":"Vascular Liver Disorders","indication":"Congestive Hepatopathy","symptoms":"Hepatomegaly, RUQ fullness/pain, jaundice, ascites (cardiac hepatomegaly), pulsatile liver","goal":"Treat underlying cardiac failure; decompress hepatic venous congestion","soc":"Optimize heart failure management (diuretics: furosemide, spironolactone; ACE inhibitors/ARBs; beta-blockers; SGLT2i). Anticoagulation for associated thromboembolic disease."},{"ta":"Gastrointestinal","subcategory":"Vascular Liver Disorders","indication":"Portal Vein Thrombosis","symptoms":"Abdominal pain, ascites, variceal bleeding, splenomegaly, portal hypertension","goal":"Recanalize portal vein, prevent extension, manage portal hypertension","soc":"Anticoagulation: low molecular weight heparin (LMWH) bridging to vitamin K antagonist (warfarin) or direct oral anticoagulants (DOACs — rivaroxaban or apixaban) in non-cirrhotic PVT."},{"ta":"Gastrointestinal","subcategory":"Vascular Liver Disorders","indication":"Sinusoidal Obstruction Syndrome","symptoms":"Painful hepatomegaly, ascites, jaundice, weight gain post-SCT or chemotherapy","goal":"Resolve sinusoidal obstruction; prevent multi-organ failure","soc":"Defibrotide (Defitelio) — oligonucleotide targeting endothelial protection; FDA-approved 2016 for severe/very severe hepatic VOD post-SCT. 6.25 mg/kg IV q6h × ≥21 days."},{"ta":"Gastrointestinal","subcategory":"Vascular Liver Disorders","indication":"Ischemic Hepatitis","symptoms":"Massive ALT/AST elevation (>10× ULN), jaundice, acute liver dysfunction following hypotension","goal":"Restore hemodynamic stability; prevent acute liver failure","soc":"None (treat underlying cause: cardiogenic shock, sepsis, respiratory failure). Vasopressors (norepinephrine) for hemodynamic support; IV NAC for liver protection."},{"ta":"Gastrointestinal","subcategory":"Vascular Liver Disorders","indication":"Budd-Chiari Syndrome","symptoms":"Ascites, hepatomegaly, abdominal pain, lower limb edema, hepatic vein occlusion","goal":"Restore hepatic venous drainage; prevent hepatic failure; anticoagulate","soc":"Anticoagulation (LMWH bridge to warfarin or DOAC). Treat underlying thrombophilia (myeloproliferative neoplasm: JAK2 V617F). TIPS for anticoagulation failure."},{"ta":"Gastrointestinal","subcategory":"Vascular Liver Disorders","indication":"Hepatic Artery Occlusion","symptoms":"RUQ pain, fever, jaundice, biliary ischemia; post-transplant hepatic artery thrombosis","goal":"Restore hepatic arterial flow; prevent biliary necrosis and graft loss (post-transplant)","soc":"Emergent surgical revascularization or endovascular thrombolysis/angioplasty. Anticoagulation (heparin) for thrombotic etiology."},{"ta":"Gastrointestinal","subcategory":"Vascular Liver Disorders","indication":"Hepatic Artery Aneurysms","symptoms":"Often asymptomatic; epigastric pain, hemobilia, rupture (life-threatening)","goal":"Prevent rupture; endovascular or surgical treatment; perioperative pharmacologic support","soc":"Endovascular therapy (coil embolization or stent-graft) for aneurysms >2 cm or symptomatic. Perioperative beta-blockers to reduce arterial wall stress."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Hepatitis C, Chronic","symptoms":"Fatigue, right upper quadrant discomfort, often asymptomatic; cirrhosis symptoms late","goal":"Achieve SVR12 (functional cure); prevent cirrhosis and HCC","soc":"Glecaprevir/pibrentasvir (Mavyret) 8 weeks OR sofosbuvir/velpatasvir (Epclusa) 12 weeks — pan-genotypic, >97% SVR12."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Hepatitis B, Chronic","symptoms":"Fatigue, right upper quadrant discomfort, often asymptomatic until cirrhosis","goal":"Achieve HBsAg loss, suppress HBV DNA, prevent cirrhosis/HCC","soc":"Tenofovir alafenamide (TAF/Vemlidy) or tenofovir disoproxil fumarate (TDF/Viread) — nucleotide analogs; entecavir (Baraclude) alternative. Peg-interferon alfa-2a for selected patients (HBeAg+, high ALT)."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Hepatitis C, Acute","symptoms":"Fatigue, jaundice, nausea, dark urine (often asymptomatic)","goal":"Achieve SVR12; prevent chronicity in >80% who would otherwise progress","soc":"Direct-acting antivirals (DAAs): sofosbuvir/velpatasvir (Epclusa) or glecaprevir/pibrentasvir (Mavyret) × 8 weeks; same as chronic HCV regimens."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Hepatitis D","symptoms":"Severe fatigue, jaundice, rapid liver disease progression in HBV co-infected","goal":"Achieve HDV RNA suppression; prevent cirrhosis progression","soc":"Bulevirtide (Hepcludex, EMA approved 2020, FDA investigational) — HBV/HDV entry inhibitor 2 mg SC QD. Peg-IFN alfa for 48–72 weeks (only option pre-bulevirtide)."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Acute Viral Hepatitis","symptoms":"Jaundice, fatigue, right upper quadrant pain, dark urine, nausea, fever","goal":"Support recovery; prevent progression to fulminant hepatitis or chronic infection","soc":"Supportive care (rest, hydration, avoid hepatotoxins). HAV/HEV: supportive. HBV acute: tenofovir or entecavir if severe/fulminant or immunosuppressed. HCV acute: monitor 12 weeks; treat with DAAs if spontaneous clearance doesn't occur."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Hepatitis E","symptoms":"Jaundice, nausea, fatigue, fever; severe in pregnant women","goal":"Supportive recovery; prevent fulminant failure in pregnant and immunosuppressed","soc":"None approved (supportive). Ribavirin used off-label for chronic HEV in immunocompromised."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Hepatitis A","symptoms":"Nausea, jaundice, fatigue, abdominal pain, dark urine","goal":"Supportive care; prevent dehydration and rare fulminant failure","soc":"None (supportive care only: IV fluids, anti-emetics). Vaccination for prevention."},{"ta":"Gastrointestinal","subcategory":"Viral Hepatitis","indication":"Hepatitis B, Acute","symptoms":"Jaundice, fatigue, nausea, vomiting, right upper quadrant pain","goal":"Prevent progression to chronicity or fulminant failure; support recovery","soc":"None for mild-moderate acute HBV (supportive). Tenofovir or entecavir for fulminant/severe acute HBV to prevent progression."},{"ta":"General Medicine","subcategory":"General Medicine","indication":"Involuntary Weight Loss","symptoms":"Unintended loss of ≥5% body weight, weakness, anorexia","goal":"Reverse nutritional deficits, preserve muscle mass, treat underlying cause","soc":"Treat underlying etiology. If anorexia/cachexia is the target: megestrol acetate (progestational agent, appetite stimulant) is the most evidence-backed pharmacologic option for cancer/HIV-related weight loss."},{"ta":"General Medicine","subcategory":"General Medicine","indication":"Fatigue","symptoms":"Persistent exhaustion unrelieved by rest, cognitive impairment, reduced function","goal":"Identify and treat underlying cause; improve energy and function","soc":"No universal pharmacologic first-line; treat underlying etiology. For ME/CFS (no approved drug): symptomatic management with low-dose tricyclics (amitriptyline) for sleep/pain. For cancer-related fatigue: methylphenidate or modafinil (off-label)."},{"ta":"General Medicine","subcategory":"General Medicine","indication":"Idiopathic Environmental Intolerance","symptoms":"Multi-system symptoms triggered by low-level chemical exposure","goal":"Reduce symptom burden, improve functional capacity and quality of life","soc":"None. No FDA-approved pharmacologic therapy exists; management is avoidance of triggers and symptomatic relief."},{"ta":"General Medicine","subcategory":"Geriatric Medicine","indication":"Frailty","symptoms":"Weakness, exhaustion, slow gait, low activity, unintentional weight loss","goal":"Reverse or slow frailty progression, improve muscle mass, restore function","soc":"Exercise (resistance training + aerobic) combined with protein/caloric supplementation is the most evidence-based intervention. No FDA-approved pharmacologic SoC for frailty."},{"ta":"General Medicine","subcategory":"Geriatric Medicine","indication":"Falls in Older Adults","symptoms":"Unexplained fall, unsteadiness, fear of falling, injury, reduced mobility","goal":"Prevent falls, reduce injury severity, identify modifiable risk factors","soc":"Multifactorial fall prevention: Deprescribing high-risk drugs (sedatives, antihypertensives) + vitamin D supplementation (1000–2000 IU/day; reduces fall risk in deficient patients) + exercise programs (balance/strength)."},{"ta":"General Medicine","subcategory":"Geriatric Medicine","indication":"Gait Disorders in Older Adults","symptoms":"Slow, shuffling, or unsteady walking; reduced stride length; increased fall risk","goal":"Identify underlying cause, improve gait stability, prevent falls","soc":"Treat underlying causes: Levodopa/carbidopa (Sinemet; dopamine precursor) for Parkinson's-related gait; baclofen (muscle relaxant) for spasticity; orthopedic or neurologic surgical referral for structural causes."},{"ta":"General Medicine","subcategory":"Geriatric Medicine","indication":"Injuries in Older Adults","symptoms":"Fractures, head injury, lacerations, burns from falls or accidents; delayed healing","goal":"Prevent injury, optimize healing, prevent functional decline post-injury","soc":"Fracture prevention: Bisphosphonates (alendronate, zoledronic acid; bone antiresorptives); denosumab (Prolia; anti-RANKL) for osteoporosis preventing fragility fractures. Acute fracture: Analgesia + vitamin D + calcium + early rehabilitation."},{"ta":"General Medicine","subcategory":"Geriatric Medicine","indication":"Iatrogenic Complications in Older Adults","symptoms":"Drug side effects, hospital-acquired delirium, falls, pressure ulcers from medical care","goal":"Prevent drug-related harm, reduce delirium, optimize medications in elderly","soc":"Deprescribing using Beers Criteria (AGS) and STOPP/START criteria. No pharmacologic SoC; best practice involves systematic medication review and reduction of inappropriate prescribing."},{"ta":"General Medicine","subcategory":"Geriatric Medicine","indication":"Medication-Related Problems in Older Adults","symptoms":"Adverse drug reactions, drug interactions, under-prescribing, non-adherence, falls","goal":"Optimize pharmacotherapy, eliminate harmful drugs, improve adherence","soc":"Systematic medication review using validated tools (Beers Criteria, STOPP/START); pharmacist-led medication reconciliation. No specific pharmacologic SoC—the intervention is about optimizing existing medications."},{"ta":"Hematology","subcategory":"Anemias","indication":"Anemia of Chronic Disease","symptoms":"Fatigue, pallor, weakness, shortness of breath on exertion","goal":"Raise hemoglobin to symptom-relief threshold, treat underlying disease","soc":"Treat underlying disease. ESA (epoetin alfa/darbepoetin alfa) if Hgb <10 g/dL with symptoms and non-cancer setting; IV iron if iron-restricted."},{"ta":"Hematology","subcategory":"Anemias","indication":"Anemia of Renal Disease","symptoms":"Fatigue, pallor, shortness of breath, poor exercise tolerance","goal":"Maintain Hgb 10–11.5 g/dL, reduce transfusion dependence","soc":"Erythropoiesis-stimulating agents (ESAs): darbepoetin alfa (Aranesp) or epoetin alfa (Epogen); supplemental IV iron."},{"ta":"Hematology","subcategory":"Anemias","indication":"Iron Deficiency Anemia","symptoms":"Fatigue, pallor, shortness of breath, pica, brittle nails","goal":"Correct iron deficiency, normalize hemoglobin, replenish iron stores","soc":"Oral iron supplementation: ferrous sulfate 325 mg (65 mg elemental Fe) TID. IV iron (ferric carboxymaltose, ferumoxytol, iron sucrose) when oral fails or not tolerated."},{"ta":"Hematology","subcategory":"Anemias","indication":"Megaloblastic Macrocytic Anemias","symptoms":"Fatigue, pallor, neurologic symptoms (B12 deficiency), glossitis, macrocytosis","goal":"Replace deficient vitamin, reverse anemia and neurologic damage","soc":"Vitamin B12 deficiency: cyanocobalamin IM injections or high-dose oral (1,000 mcg/day). Folate deficiency: folic acid 1–5 mg/day oral."},{"ta":"Hematology","subcategory":"Anemias","indication":"Autoimmune Hemolytic Anemia","symptoms":"Fatigue, jaundice, dark urine, pallor, rapid heart rate","goal":"Stop hemolysis, normalize hemoglobin, achieve durable remission","soc":"Corticosteroids: prednisone 1 mg/kg/day (warm AIHA, first-line)."},{"ta":"Hematology","subcategory":"Anemias","indication":"Myelodysplasia and Iron-Transport Deficiency Anemia","symptoms":"Fatigue, pallor, frequent infections, easy bruising","goal":"Correct anemia, reduce transfusion dependence","soc":"Supportive care (RBC transfusions, G-CSF). Luspatercept (Reblozyl) for transfusion-dependent lower-risk MDS-RS."},{"ta":"Hematology","subcategory":"Anemias","indication":"Sideroblastic Anemias","symptoms":"Fatigue, pallor, iron overload signs; ring sideroblasts on bone marrow biopsy","goal":"Reduce transfusion dependence; correct anemia; prevent iron overload","soc":"Pyridoxine (vitamin B6) 50–200 mg/day for pyridoxine-responsive (hereditary X-linked) sideroblastic anemia. Supportive transfusions + iron chelation for others."},{"ta":"Hematology","subcategory":"Anemias","indication":"Microangiopathic Hemolytic Anemia","symptoms":"Anemia with helmet cells (schistocytes), thrombocytopenia, end-organ damage","goal":"Treat underlying cause (TTP, HUS, DIC); stop microangiopathy","soc":"Plasma exchange (PEX) + caplacizumab (Cablivi, anti-vWF, FDA 2019) + corticosteroids + rituximab for TTP. Eculizumab for aHUS."},{"ta":"Hematology","subcategory":"Anemias","indication":"Aplastic Anemia","symptoms":"Severe fatigue, frequent infections, easy bruising, bleeding","goal":"Restore bone marrow function, achieve trilineage hematologic response","soc":"Allogeneic bone marrow transplant (BMT) for young patients with matched donor. Immunosuppression (IST): anti-thymocyte globulin (ATG, equine—Atgam) + cyclosporine + eltrombopag (Promacta) for transplant-ineligible."},{"ta":"Hematology","subcategory":"Anemias","indication":"Myelophthisic Anemia","symptoms":"Fatigue, pallor, weight loss, leukoerythroblastic blood smear","goal":"Treat underlying marrow-infiltrating disease","soc":"Treat underlying cause (malignancy, myelofibrosis, granulomatous disease). Transfusion support for symptomatic anemia."},{"ta":"Hematology","subcategory":"Anemias","indication":"Pure Red Blood Cell Aplasia","symptoms":"Severe anemia (fatigue, pallor, dyspnea); no reticulocytes; normal WBC/platelets","goal":"Restore erythropoiesis; achieve transfusion independence","soc":"Immunosuppression: cyclosporine A ± corticosteroids (first-line for idiopathic/autoimmune PRCA). Remove offending cause (parvovirus B19: IVIG; anti-EPO antibodies: stop EPO)."},{"ta":"Hematology","subcategory":"Anemias","indication":"Stomatocytosis and Anemia Caused by Hypophosphatemia","symptoms":"Hemolytic anemia, jaundice, splenomegaly; muscle weakness in hypophosphatemia","goal":"Correct underlying cause; treat hemolysis; normalize phosphate levels","soc":"Phosphate replacement for hypophosphatemia-induced anemia. Treat underlying stomatocytosis with folic acid and supportive care; avoid splenectomy (increased thrombotic risk in hereditary stomatocytosis)."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Von Willebrand Disease","symptoms":"Easy bruising, prolonged bleeding from cuts, heavy periods, nosebleeds","goal":"Control bleeding; prevent perioperative hemorrhage","soc":"Type 1 VWD: desmopressin (DDAVP, 0.3 mcg/kg IV/IN) for mild/moderate bleeding. Types 2/3: VWF concentrate (Humate-P, Wilate) or recombinant VWF (Vonvendi)."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Hemophilia","symptoms":"Spontaneous joint bleeds, muscle bleeds, prolonged bleeding after injury","goal":"Prevent bleeding, achieve zero-bleed status, preserve joint function","soc":"Hemophilia A: emicizumab (Hemlibra, bispecific FVIIIa-mimicking antibody) SC prophylaxis (first-line in many patients). Factor VIII concentrate (recombinant) for on-demand/perioperative. Hemophilia B: factor IX concentrate."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Vascular Bleeding Disorders","symptoms":"Easy bruising, petechiae, mucosal bleeding with normal platelet count and coagulation","goal":"Identify and treat underlying cause; minimize bleeding risk","soc":"Treat underlying cause (scurvy: vitamin C; Henoch-Schönlein: corticosteroids; senile purpura: vitamin C/tretinoin). Desmopressin for mild VWD-like vascular disorders."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Excessive Bleeding","symptoms":"Prolonged bleeding from cuts, heavy menstruation, bruising, nosebleeds","goal":"Identify underlying cause, stop bleeding, prevent recurrence","soc":"Treat underlying cause. Acute: apply pressure, topical thrombin (Recothrom), fibrin sealants. Tranexamic acid IV/oral for various bleeding disorders."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Uncommon Hereditary Coagulation Disorders","symptoms":"Varying bleeding: mucosal, joint, post-surgical; depends on specific factor deficiency","goal":"Prevent and treat bleeding with factor replacement","soc":"Factor replacement concentrates: factor VII concentrate (NovoSeven rFVIIa) for FVII deficiency; fibrinogen concentrate (RiaSTAP) for fibrinogenemia; factor XIII concentrate (Tretten) for FXIII deficiency."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Hereditary Hemorrhagic Telangiectasia","symptoms":"Recurrent nosebleeds, telangiectasias, GI bleeding, iron deficiency anemia","goal":"Reduce bleeding frequency, treat AVMs, maintain hemoglobin","soc":"Bevacizumab (Avastin, anti-VEGF) IV for severe epistaxis/GI bleeding (off-label, increasingly used). Systemic iron supplementation. Laser therapy for telangiectasias."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Disseminated Intravascular Coagulation (DIC)","symptoms":"Simultaneous bleeding and clotting, organ failure, petechiae, shock","goal":"Treat underlying cause, correct coagulopathy, support organ function","soc":"Treat underlying cause (antibiotics for sepsis, deliver fetus for obstetric DIC). Replace clotting factors: FFP, cryoprecipitate, platelets as clinically needed."},{"ta":"Hematology","subcategory":"Coagulation Disorders","indication":"Coagulation Disorders Caused by Circulating Anticoagulants","symptoms":"Unexplained severe bleeding, prolonged PTT, hemarthroses","goal":"Eliminate inhibitor, control bleeding, restore normal coagulation","soc":"Acquired hemophilia A (most common): immunosuppression (prednisone ± cyclophosphamide) to eradicate inhibitor; bypassing agents (aPCC/FEIBA or rFVIIa/NovoSeven) for acute bleeding."},{"ta":"Hematology","subcategory":"Erythrocytosis","indication":"Secondary Erythrocytosis","symptoms":"Headache, ruddy complexion, fatigue, blurred vision, thrombosis risk","goal":"Treat underlying cause; normalize hematocrit to reduce thrombosis risk","soc":"Treat underlying cause (hypoxia, EPO-secreting tumor, sleep apnea). Therapeutic phlebotomy to maintain Hct <50% in symptomatic cases."},{"ta":"Hematology","subcategory":"Hemoglobinopathies","indication":"Sickle Cell Disease","symptoms":"Painful vaso-occlusive crises, anemia, stroke, acute chest syndrome, organ damage","goal":"Reduce vaso-occlusive crises, prevent end-organ damage, increase fetal Hgb","soc":"Hydroxyurea (increases HbF, reduces VOC frequency) — first-line pharmacotherapy for all patients with moderate-severe SCD."},{"ta":"Hematology","subcategory":"Hemoglobinopathies","indication":"Thalassemias","symptoms":"Severe anemia, bone deformities, splenomegaly, growth retardation, iron overload","goal":"Achieve transfusion independence; prevent iron overload; enable curative transplant","soc":"Transfusion-dependent beta-thal major: regular RBC transfusions + iron chelation (deferasirox/Jadenu). Luspatercept (Reblozyl) for non-transfusion-dependent or reducing transfusion burden (FDA 2020)."},{"ta":"Hematology","subcategory":"Hemoglobinopathies","indication":"Hemoglobin S-C Disease","symptoms":"Intermittent pain crises, retinopathy, avascular necrosis, mild anemia","goal":"Prevent vaso-occlusive crises, retinopathy, and organ damage","soc":"Hydroxyurea to increase HbF (used off-label; less robust benefit vs. HbSS). Folic acid. Ophthalmologic surveillance for proliferative retinopathy."},{"ta":"Hematology","subcategory":"Hemoglobinopathies","indication":"Hemoglobin E Disease","symptoms":"Mild anemia, usually asymptomatic; thalassemia-like if compound heterozygous","goal":"Manage anemia in severe compound heterozygous (HbE/beta-thal); supportive for milder forms","soc":"HbE trait/HbEE: no pharmacologic treatment needed usually. HbE/beta-thal: hydroxyurea to increase HbF; transfusion for severe. Luspatercept (Reblozyl) for transfusion-dependent beta-thal including HbE/beta-thal."},{"ta":"Hematology","subcategory":"Hemoglobinopathies","indication":"Hemoglobin S–Beta-Thalassemia Disease","symptoms":"Sickle-like pain crises, anemia severity varies, splenomegaly","goal":"Reduce pain crises, transfusion burden, prevent organ damage","soc":"Hydroxyurea (HbF inducer); transfusion support for severe cases. Management largely as sickle cell disease."},{"ta":"Hematology","subcategory":"Hemoglobinopathies","indication":"Hemoglobin C Disease","symptoms":"Mild anemia, splenomegaly, fatigue (often mild/asymptomatic)","goal":"Manage anemia complications; no specific treatment usually needed","soc":"Supportive care (folic acid supplementation). No pharmacologic first-line for homozygous HbCC. Management similar to other hemoglobinopathies."},{"ta":"Hematology","subcategory":"Hemolytic Anemias","indication":"Hereditary Spherocytosis and Hereditary Elliptocytosis","symptoms":"Hemolytic anemia, jaundice, splenomegaly, gallstones, fatigue","goal":"Reduce hemolysis, manage anemia, prevent gallstone complications","soc":"Folic acid supplementation. Splenectomy for moderate-severe HS (definitive). No approved pharmacologic disease-modifying drug."},{"ta":"Hematology","subcategory":"Hemolytic Anemias","indication":"Paroxysmal Nocturnal Hemoglobinuria (PNH)","symptoms":"Dark morning urine, fatigue, thrombosis, abdominal pain, anemia","goal":"Prevent hemolysis and thrombosis; achieve transfusion independence","soc":"Eculizumab (Soliris, C5 complement inhibitor) or ravulizumab (Ultomiris, long-acting C5 inhibitor) — both FDA approved."},{"ta":"Hematology","subcategory":"Hemolytic Anemias","indication":"Glycolytic Pathway Defects","symptoms":"Chronic non-spherocytic hemolytic anemia, jaundice, gallstones, fatigue","goal":"Reduce hemolysis, manage anemia, prevent complications","soc":"Supportive: folic acid supplementation, red cell transfusion as needed. Splenectomy for severe PK deficiency. No first-line pharmacologic drug for most."},{"ta":"Hematology","subcategory":"Hemolytic Anemias","indication":"Glucose-6-Phosphate Dehydrogenase (G6PD) Deficiency","symptoms":"Episodic hemolytic anemia triggered by oxidant stress, jaundice, dark urine","goal":"Prevent hemolytic crises by avoiding triggers; support during crises","soc":"Avoid oxidant triggers (primaquine, dapsone, fava beans). Supportive: hydration, transfusion during severe hemolysis. No approved pharmacologic prevention."},{"ta":"Hematology","subcategory":"Iron Metabolism Disorders","indication":"Hemosiderosis","symptoms":"Depends on organ involvement: pulmonary (hemoptysis, dyspnea) or systemic iron deposition","goal":"Remove excess iron, prevent organ damage from iron overload","soc":"Iron chelation: deferoxamine (Desferal, IV/SC), deferasirox (Exjade/Jadenu, oral), or deferiprone (Ferriprox, oral) based on etiology."},{"ta":"Hematology","subcategory":"Iron Metabolism Disorders","indication":"Secondary Iron Overload","symptoms":"Liver disease, skin bronzing, joint pain, fatigue, cardiac arrhythmias","goal":"Reduce iron burden; prevent end-organ damage (liver, heart, endocrine)","soc":"Iron chelation: deferasirox (Exjade/Jadenu, oral) or deferoxamine (IV/SC). Deferiprone (Ferriprox) as alternative, especially for cardiac iron."},{"ta":"Hematology","subcategory":"Iron Metabolism Disorders","indication":"Hereditary Hemochromatosis","symptoms":"Fatigue, joint pain, liver disease, bronze skin, diabetes, heart failure","goal":"Normalize ferritin/transferrin saturation, prevent organ damage via iron removal","soc":"Therapeutic phlebotomy (weekly 450–500 mL until ferritin <50 ng/mL); maintenance phlebotomy 2–4× yearly. Iron chelation if phlebotomy contraindicated."},{"ta":"Hematology","subcategory":"Other Hematologic Disorders","indication":"Hypersplenism","symptoms":"Cytopenias, enlarged spleen, abdominal fullness, fatigue","goal":"Treat underlying cause, manage cytopenias, avoid life-threatening infections","soc":"Treat underlying cause (e.g., cirrhosis, hairy cell leukemia). Splenectomy for severe symptomatic hypersplenism. No universal pharmacologic first-line."},{"ta":"Hematology","subcategory":"Other Hematologic Disorders","indication":"Complications of Transfusion","symptoms":"Fever, chills, hemolysis, hypotension, respiratory distress after transfusion","goal":"Stop reaction, provide supportive care, prevent recurrence","soc":"Stop transfusion immediately; supportive care (IV fluids, antihistamines, corticosteroids for allergic; diuretics for TACO). No standard pharmacologic prevention beyond leukoreduction."},{"ta":"Hematology","subcategory":"Plasma Cell Disorders","indication":"Amyloidosis","symptoms":"Fatigue, edema, heart failure symptoms, neuropathy, enlarged tongue","goal":"Reduce amyloid production, reverse organ damage, improve survival","soc":"AL amyloidosis: bortezomib (Velcade) + cyclophosphamide + dexamethasone (VCd); daratumumab (Darzalex) added upfront. ATTR: tafamidis (Vyndamax/Vyndaqel) for ATTR-CM."},{"ta":"Hematology","subcategory":"Platelet Disorders","indication":"Immune Thrombocytopenia (ITP)","symptoms":"Easy bruising, petechiae, nosebleeds, gum bleeding, low platelet count","goal":"Maintain safe platelet count (>30K), prevent serious bleeding, achieve remission","soc":"Corticosteroids: prednisone 1 mg/kg/day or dexamethasone 40 mg/day ×4 days. IVIG for rapid response. Newly approved 1L: rilzabrutinib (BTKi, FDA 2024), fostamatinib (Tavalisse, SYK inhibitor)."},{"ta":"Hematology","subcategory":"Platelet Disorders","indication":"Thrombocytopenia Due to Splenic Sequestration","symptoms":"Low platelets, splenomegaly, mild bleeding tendency, fatigue","goal":"Treat underlying splenomegaly cause; splenectomy if severe/refractory","soc":"Treat underlying cause (portal hypertension, myelofibrosis, lymphoma). Splenectomy or splenic embolization for severe, symptom-causing thrombocytopenia. TPO-receptor agonists (eltrombopag/avatrombopag) in selected cases."},{"ta":"Hematology","subcategory":"Platelet Disorders","indication":"Acquired Platelet Dysfunction","symptoms":"Easy bruising, prolonged bleeding, nosebleeds, heavy periods","goal":"Correct underlying cause, stop bleeding episodes","soc":"None (treat underlying cause; avoid offending drugs). Desmopressin (DDAVP) or platelet transfusion for acute bleeding."},{"ta":"Hematology","subcategory":"Platelet Disorders","indication":"Thrombotic Thrombocytopenic Purpura (TTP)","symptoms":"Thrombocytopenia, microangiopathic hemolytic anemia, neurological symptoms, fever","goal":"Rapidly restore ADAMTS13 activity; prevent death and relapse","soc":"Therapeutic plasma exchange (TPE) + corticosteroids (prednisone). Caplacizumab (Cablivi, anti-VWF nanobody, FDA 2019) added to TPE + immunosuppression as standard."},{"ta":"Hematology","subcategory":"Platelet Disorders","indication":"Inherited Platelet Function Disorders","symptoms":"Severe bleeding from cuts, mucosal bleeding, heavy periods, bruising","goal":"Prevent and treat bleeding episodes, manage perioperative hemostasis","soc":"Desmopressin (DDAVP) for milder disorders. Platelet transfusion for severe bleeding (Glanzmann thrombasthenia). Antifibrinolytics (tranexamic acid)."},{"ta":"Hematology","subcategory":"Platelet Disorders","indication":"Hemolytic-Uremic Syndrome (HUS)","symptoms":"Microangiopathic anemia, thrombocytopenia, acute kidney injury, bloody diarrhea","goal":"Prevent end-stage renal disease; resolve thrombotic microangiopathy","soc":"Atypical HUS (aHUS): eculizumab (Soliris, C5 complement inhibitor) or ravulizumab (Ultomiris) first-line for aHUS. Typical STEC-HUS: supportive only (no antibiotics, no steroids)."},{"ta":"Hematology","subcategory":"Platelet Disorders","indication":"Reactive Thrombocytosis (Secondary Thrombocythemia)","symptoms":"Often asymptomatic; underlying condition symptoms (infection, inflammation, iron deficiency)","goal":"Treat underlying cause; no direct thrombocytosis treatment required","soc":"Treat underlying cause (infection, inflammation, iron deficiency). No cytoreductive therapy needed as thrombotic risk is low."},{"ta":"Hematology","subcategory":"Porphyrias","indication":"Erythropoietic Protoporphyria and X-linked Protoporphyria","symptoms":"Severe sunlight-induced skin burning, pain, swelling without blistering","goal":"Reduce phototoxic attacks, prevent liver disease progression","soc":"Afamelanotide (Scenesse, α-MSH analog, subcutaneous implant) 16 mg every 60 days; FDA approved 2019. Oral beta-carotene (partial, limited efficacy)."},{"ta":"Hematology","subcategory":"Porphyrias","indication":"Acute Porphyrias","symptoms":"Severe abdominal pain, nausea, confusion, weakness, dark urine","goal":"Abort acute attacks, prevent recurrent attacks","soc":"Hemin (Panhematin) IV infusion 3–4 mg/kg/day × 4 days for acute attacks; IV glucose loading for mild attacks."},{"ta":"Hematology","subcategory":"Porphyrias","indication":"Porphyria Cutanea Tarda","symptoms":"Skin blistering on sun-exposed areas, fragile skin, hyperpigmentation, hypertrichosis","goal":"Reduce porphyrin levels; heal skin lesions; achieve remission","soc":"Phlebotomy (repeated to reduce iron stores). Low-dose hydroxychloroquine or chloroquine (4-aminoquinolines) as alternative when phlebotomy not tolerated."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Prothrombin (Factor II) 20210 Gene Mutation","symptoms":"Venous thromboembolism (DVT, PE), recurrent miscarriage, cerebral sinus thrombosis","goal":"Prevent first/recurrent VTE; anticoagulate during high-risk periods","soc":"Long-term anticoagulation (rivaroxaban/apixaban or warfarin) after first VTE event. Prophylactic LMWH during high-risk periods (surgery, pregnancy, immobility) for known carriers."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Elevated Factor VIII, IX, and XI Levels","symptoms":"Recurrent DVT, pulmonary embolism (often asymptomatic until thrombosis)","goal":"Prevent thrombosis with anticoagulation in high-risk settings","soc":"Anticoagulation for acute thrombosis: LMWH bridging → warfarin or DOAC (rivaroxaban, apixaban) long-term."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Protein C Deficiency","symptoms":"Recurrent DVT, pulmonary embolism, purpura fulminans in newborns","goal":"Prevent thrombotic events; anticoagulate acutely; manage purpura fulminans","soc":"Long-term anticoagulation: warfarin or DOACs (rivaroxaban/apixaban). Acute thrombosis: LMWH bridge to warfarin. Purpura fulminans: fresh frozen plasma or Protein C concentrate (Ceprotin)."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Protein S Deficiency","symptoms":"Recurrent venous thromboembolism, DVT, pulmonary embolism","goal":"Prevent recurrent VTE with long-term anticoagulation","soc":"Long-term anticoagulation: warfarin (target INR 2–3) or DOACs. Acute VTE: LMWH or unfractionated heparin bridge."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Factor V Resistance to Activated Protein C (APC)","symptoms":"Recurrent DVT, pulmonary embolism, pregnancy complications (often asymptomatic)","goal":"Prevent thrombosis; anticoagulate during high-risk periods","soc":"Anticoagulation for thrombotic events: apixaban (Eliquis) or rivaroxaban (Xarelto) preferred; warfarin alternative."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Antiphospholipid Syndrome (APS)","symptoms":"Blood clots, recurrent pregnancy loss, livedo reticularis, headaches","goal":"Prevent recurrent thrombosis and pregnancy loss with anticoagulation","soc":"Warfarin (target INR 2–3 for venous; 3–4 for arterial thrombosis); low-molecular-weight heparin + low-dose aspirin for obstetric APS."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Antithrombin Deficiency","symptoms":"Recurrent DVT, pulmonary embolism, clotting in unusual sites","goal":"Prevent life-threatening thrombosis with anticoagulation","soc":"Long-term anticoagulation: warfarin (INR 2–3) or LMWH. Antithrombin concentrate (ATryn, recombinant; Thrombate III) for high-risk periods (surgery, childbirth)."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Hyperhomocysteinemia","symptoms":"Elevated homocysteine, thrombosis risk, cardiovascular events, neuropathy","goal":"Normalize homocysteine levels, reduce thrombosis and cardiovascular risk","soc":"B-vitamin supplementation: folic acid (0.4–5 mg/day) + B6 (pyridoxine) + B12 (cyanocobalamin)."},{"ta":"Hematology","subcategory":"Thrombophilias","indication":"Protein Z Deficiency","symptoms":"Increased thrombotic risk; associated with stroke and pregnancy complications","goal":"Prevent thrombotic events during high-risk periods; anticoagulate as needed","soc":"Anticoagulation (LMWH or warfarin) in symptomatic patients or during high-risk periods (surgery, pregnancy). No FDA-approved specific therapy."},{"ta":"Hematology","subcategory":"Vascular and Purpura Disorders","indication":"Senile Purpura","symptoms":"Easy bruising on forearms and hands in elderly, thin fragile skin, petechiae","goal":"Reassure; minimize trauma; no pharmacologic treatment typically needed","soc":"None. Benign cosmetic condition; sun protection, moisturizers, vitamin C."},{"ta":"Hematology","subcategory":"Vascular and Purpura Disorders","indication":"Dysproteinemias Causing Vascular Purpura","symptoms":"Palpable purpura, skin lesions, hyperviscosity symptoms, fatigue","goal":"Reduce abnormal protein levels, resolve vascular inflammation","soc":"Treat underlying plasma cell or lymphoid disorder (myeloma therapy, rituximab). Plasmapheresis for hyperviscosity."},{"ta":"Hematology","subcategory":"Vascular and Purpura Disorders","indication":"Purpura Simplex","symptoms":"Easy bruising, especially lower limbs; normal platelet count and coagulation tests","goal":"Reassure patient; no pharmacologic treatment needed in most cases","soc":"None. Benign condition; reassurance and avoidance of aspirin/NSAIDs sufficient."},{"ta":"Hematology","subcategory":"White Blood Cell Disorders","indication":"Lymphocytopenia","symptoms":"Recurrent infections, lymph node swelling (or absence), fatigue, oral ulcers","goal":"Treat underlying cause; restore immune function","soc":"Treat underlying etiology (stop offending drug, treat HIV with ART, treat malnutrition). Prophylactic antibiotics/antivirals for CD4 <200/μL. No general pharmacologic treatment for lymphocytopenia per se."},{"ta":"Hematology","subcategory":"White Blood Cell Disorders","indication":"Neutropenia","symptoms":"Recurrent bacterial infections, fever, mouth sores, fatigue","goal":"Raise neutrophil count; prevent life-threatening infections","soc":"G-CSF (filgrastim/Neupogen or pegfilgrastim/Neulasta) for severe/symptomatic neutropenia. Treat underlying cause."},{"ta":"Hematology","subcategory":"White Blood Cell Disorders","indication":"Eosinophilia","symptoms":"Varies by cause: asthma, skin rashes, GI symptoms, fatigue","goal":"Treat underlying cause, prevent end-organ damage from eosinophil infiltration","soc":"Treat underlying etiology (antiparasitics for parasitic; steroids for idiopathic or EGPA). Corticosteroids for symptomatic idiopathic eosinophilia."},{"ta":"Hematology","subcategory":"White Blood Cell Disorders","indication":"Hypereosinophilic Syndrome","symptoms":"Elevated eosinophils, organ damage (heart, lung, skin, nervous system)","goal":"Normalize eosinophil count, prevent end-organ damage","soc":"Corticosteroids (prednisone 1 mg/kg/day) for non-myeloid HES. FIP1L1-PDGFRA+: imatinib 100 mg/day (highly effective, FDA-recognized)."},{"ta":"Hematology","subcategory":"White Blood Cell Disorders","indication":"Monocytopenia","symptoms":"Susceptibility to infections (especially mycobacterial/fungal), fatigue","goal":"Treat underlying cause; prevent and treat opportunistic infections","soc":"Treat underlying cause (stop offending drug; treat malignancy). Prophylactic antibiotics/antifungals. No specific pharmacologic first-line for monocytopenia per se."},{"ta":"Immunology","subcategory":"Allergic Diseases","indication":"Allergic Rhinitis","symptoms":"Sneezing, runny nose, nasal congestion, itchy eyes","goal":"Control symptoms, improve quality of life","soc":"Intranasal corticosteroids (e.g., fluticasone, mometasone) are first-line for persistent allergic rhinitis; oral second-generation antihistamines (cetirizine, loratadine) for mild/intermittent symptoms."},{"ta":"Immunology","subcategory":"Allergic Diseases","indication":"Food Allergy","symptoms":"Hives, vomiting, throat swelling, anaphylaxis after food exposure","goal":"Prevent accidental reactions, achieve desensitization/tolerance","soc":"Strict allergen avoidance + epinephrine auto-injector (EpiPen) for emergency use. For peanut allergy (ages 4–17): Palforzia (AR101) OIT FDA-approved. Omalizumab (Xolair) FDA-approved Feb 2024 for multi-food IgE-mediated allergy ≥1 year."},{"ta":"Immunology","subcategory":"Allergic Diseases","indication":"Anaphylaxis","symptoms":"Sudden hives, throat swelling, low blood pressure, breathing difficulty","goal":"Prevent fatal reactions, reduce episode frequency and severity","soc":"Epinephrine auto-injector (EpiPen, Auvi-Q) is first-line acute treatment; given IM at onset of anaphylaxis."},{"ta":"Immunology","subcategory":"Allergic Diseases","indication":"Drug Hypersensitivity","symptoms":"Rashes, hives, fever, organ inflammation following drug exposure","goal":"Identify causative drug, prevent severe reactions, enable safe alternatives","soc":"Discontinuation of offending drug. Antihistamines (diphenhydramine) and corticosteroids for mild-moderate reactions. Epinephrine for anaphylaxis. No specific preventive pharmacologic SoC beyond avoidance."},{"ta":"Immunology","subcategory":"Angioedema and Complement Disorders","indication":"Hereditary and Acquired C1 Inhibitor Deficiency or Dysfunction","symptoms":"Recurrent swelling of face, limbs, abdomen, airway; abdominal pain","goal":"Prevent attacks, rapidly treat acute episodes, normalize C1-INH levels","soc":"For HAE type I/II (C1-INH deficiency): subcutaneous C1-INH (Haegarda) or lanadelumab (Takhzyro, anti-kallikrein MAb) for long-term prophylaxis. For acute attacks: plasma-derived C1-INH (Berinert), icatibant (Firazyr), or ecallantide (Kalbitor)."},{"ta":"Immunology","subcategory":"Angioedema and Complement Disorders","indication":"Angioedema","symptoms":"Deep skin/mucous membrane swelling, abdominal cramping, airway swelling","goal":"Prevent attacks, rapidly abort breakthrough episodes","soc":"Histaminergic angioedema (most common): high-dose non-sedating antihistamines (cetirizine 40mg/day) first-line. For HAE (C1-INH deficiency): C1 esterase inhibitor concentrates (Berinert, Haegarda) or icatibant (Firazyr) for acute attacks; C1-INH or lanadelumab (Takhzyro) for prophylaxis."},{"ta":"Immunology","subcategory":"Autoimmune Conditions","indication":"Autoimmune Disorders","symptoms":"Fatigue, joint pain, rashes, organ inflammation, variable by subtype","goal":"Achieve remission, prevent organ damage","soc":"Corticosteroids (prednisone) are first-line for acute flares across most autoimmune conditions. Disease-specific hydroxychloroquine for SLE; methotrexate for RA, dermatomyositis."},{"ta":"Immunology","subcategory":"Mast Cell Disorders","indication":"Mastocytosis and Mast Cell Activation Syndrome","symptoms":"Flushing, hives, anaphylaxis, bone pain, abdominal cramping","goal":"Control mast cell mediator symptoms, prevent organ damage in systemic disease","soc":"H1 antihistamines (cetirizine, loratadine) + H2 antihistamines (ranitidine/famotidine) + proton pump inhibitors are first-line for symptom control. Epinephrine auto-injector for anaphylaxis."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Selective IgA Deficiency","symptoms":"Often asymptomatic; recurrent sinopulmonary infections, GI infections, allergy risk","goal":"Manage recurrent infections; avoid IgA-containing blood products","soc":"Prophylactic antibiotics (amoxicillin, azithromycin) for patients with recurrent infections. IgA-deficient IVIG only if IgG subclass deficiency co-exists (avoid IgA-containing products due to anaphylaxis risk)."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Common Variable Immunodeficiency (CVID)","symptoms":"Recurrent respiratory infections, low antibody levels, fatigue, diarrhea","goal":"Prevent infections, normalize IgG levels, reduce complications","soc":"Immunoglobulin replacement therapy (IVIG or SCIG) — lifelong first-line treatment to maintain serum IgG ≥700–800 mg/dL."},{"ta":"Immunology","subcategory":"Primary Immunodeficiencies","indication":"Selective Antibody Deficiency With Normal Immunoglobulins (SAD
