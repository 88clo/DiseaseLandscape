isorders in Neonates","indication":"Neonatal Hypoglycemia","symptoms":"Jitteriness, lethargy, apnea, cyanosis, seizures; low blood glucose (<47 mg/dL) in neonate","goal":"Restore euglycemia promptly to prevent brain injury","soc":"Oral feeding (breast milk/formula); buccal dextrose gel (40% dextrose, 200 mg/kg) for mild-moderate neonatal hypoglycemia; IV dextrose for severe."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Prenatal Drug Exposure","symptoms":"Neonatal opioid withdrawal (NAS/NOWS): irritability, poor feeding, tremors, seizures; fetal alcohol spectrum; cocaine/cannabis exposure effects","goal":"Manage withdrawal symptoms, optimize neurodevelopmental outcomes","soc":"Neonatal opioid withdrawal syndrome (NOWS): non-pharmacologic (swaddling, low stimulation) first-line; oral morphine or methadone (0.05-0.2 mg/kg/dose Q3-4h) for severe NOWS; clonidine as adjunct."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Neonatal Hyperglycemia","symptoms":"Hyperglycemia, glucosuria, dehydration, weight loss, polyuria in VLBW preterm neonate","goal":"Normalize blood glucose without hypoglycemia risk","soc":"Reduce glucose infusion rate (GIR). If persistent: insulin infusion (regular insulin 0.01-0.1 U/kg/hour IV continuous) in VLBW neonates."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Neonatal Hypercalcemia","symptoms":"Irritability, hypotonia, poor feeding, polyuria, constipation, vomiting, lethargy in neonate","goal":"Reduce serum calcium to prevent nephrocalcinosis and cardiac arrhythmias","soc":"IV normal saline hydration + furosemide (calciuresis). Corticosteroids for hypervitaminosis D or sarcoid. Cinacalcet for neonatal severe hyperparathyroidism (off-label). Pamidronate for malignancy-related."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Neonatal Hypocalcemia","symptoms":"Jitteriness, seizures, apnea, prolonged QTc, carpopedal spasm in neonate","goal":"Normalize ionized calcium, prevent seizures and cardiac arrhythmias","soc":"IV calcium gluconate 10% (200 mg/kg/dose) for symptomatic hypocalcemia; oral calcium supplementation + vitamin D for maintenance."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Neonatal Hyponatremia","symptoms":"Seizures, lethargy, cerebral edema, apnea in neonate; serum Na <135 mEq/L","goal":"Correct hyponatremia to prevent cerebral edema and brain injury","soc":"IV 3% NaCl (3-5 mL/kg over 10-15 min) for symptomatic/severe hyponatremia; fluid restriction for dilutional hyponatremia."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Neonatal Hypernatremia","symptoms":"Fever, lethargy, irritability, poor feeding, seizures, intracranial hemorrhage risk in neonate","goal":"Correct serum sodium slowly (≤10-12 mEq/L/day) to prevent cerebral edema","soc":"None pharmacologic; treatment is controlled oral hydration (increased breastfeeding frequency or formula supplementation) or IV hypotonic saline for severe cases."},{"ta":"Pediatrics","subcategory":"Miscellaneous Bacterial Infections in Infants and Children","indication":"Urinary Tract Infection (UTI) in Children","symptoms":"Dysuria, frequency, fever, flank pain, poor feeding, foul-smelling urine in infants","goal":"Eradicate uropathogens, prevent pyelonephritis and renal scarring","soc":"Amoxicillin-clavulanate or trimethoprim-sulfamethoxazole (TMP-SMX) PO for uncomplicated UTI 7-14 days. Ceftriaxone IV/IM for febrile UTI in infants <2 months or vomiting."},{"ta":"Pediatrics","subcategory":"Miscellaneous Bacterial Infections in Infants and Children","indication":"Bacterial Meningitis in Infants Over 3 Months of Age","symptoms":"Fever, severe headache, neck stiffness, photophobia, altered consciousness, bulging fontanelle (infant)","goal":"Eradicate meningeal bacteria, prevent neurological sequelae","soc":"Ceftriaxone 100 mg/kg/day IV (or cefotaxime) + dexamethasone 0.15 mg/kg q6h x 4 days (for H. influenzae and S. pneumoniae). Add vancomycin for cephalosporin-resistant pneumococcus."},{"ta":"Pediatrics","subcategory":"Miscellaneous Bacterial Infections in Infants and Children","indication":"Rheumatic Fever","symptoms":"Migratory polyarthritis, carditis, Sydenham chorea, erythema marginatum, subcutaneous nodules post-strep throat","goal":"Eradicate GAS, prevent rheumatic heart disease recurrence","soc":"Penicillin V (or benzathine penicillin G IM single dose) for acute GAS eradication. Aspirin for arthritis/fever. Secondary prophylaxis: benzathine penicillin G IM q3-4 weeks for 5-10 years."},{"ta":"Pediatrics","subcategory":"Miscellaneous Bacterial Infections in Infants and Children","indication":"Occult Bacteremia and Fever Without Apparent Source in Infants and Young Children","symptoms":"High fever (>39°C), well-appearing, no localizing signs, typically 3-36 months age","goal":"Identify high-risk patients, prevent occult bacteremia complications","soc":"Risk stratification (Rochester/Philadelphia criteria for neonates; AUC score for older infants). High-risk: empiric ceftriaxone 50 mg/kg IM/IV. Low-risk: observation without antibiotics."},{"ta":"Pediatrics","subcategory":"Miscellaneous Ear, Nose, and Throat Disorders in Children","indication":"Hearing Impairment in Children","symptoms":"Delayed speech development, poor response to sound, academic difficulties","goal":"Restore hearing, optimize speech/language development","soc":"None pharmacologic (hearing aids or cochlear implantation are primary interventions). Early fitting of hearing aids or cochlear implant surgery."},{"ta":"Pediatrics","subcategory":"Miscellaneous Ear, Nose, and Throat Disorders in Children","indication":"Communication Disorders in Children","symptoms":"Delayed speech, articulation errors, stuttering, language comprehension/expression deficits","goal":"Improve speech intelligibility, language function, communication","soc":"None pharmacologic. Speech-language therapy (SLT) is the primary intervention; AAC devices for nonverbal children."},{"ta":"Pediatrics","subcategory":"Miscellaneous Ear, Nose, and Throat Disorders in Children","indication":"Recurrent Respiratory Papillomatosis","symptoms":"Hoarseness, stridor, airway obstruction, recurrent laryngeal papillomas from HPV 6/11","goal":"Maintain patent airway, reduce recurrence, achieve remission","soc":"Surgical debridement (microlaryngoscopy with microdebrider or laser) repeated as needed. Adjuvant: bevacizumab (Avastin) intralesional injection FDA-designated Breakthrough for RRP."},{"ta":"Pediatrics","subcategory":"Miscellaneous Ear, Nose, and Throat Disorders in Children","indication":"Juvenile Angiofibromas","symptoms":"Recurrent epistaxis, nasal obstruction, nasal mass in adolescent males","goal":"Achieve complete tumor control, prevent catastrophic hemorrhage","soc":"Surgical resection is primary SoC (endoscopic or open). Preoperative embolization to reduce bleeding. Radiotherapy for unresectable or recurrent disease."},{"ta":"Pediatrics","subcategory":"Neurocutaneous Syndromes","indication":"Neurofibromatosis","symptoms":"Multiple café-au-lait spots, neurofibromas, Lisch nodules, optic glioma, learning disabilities, plexiform neurofibromas","goal":"Reduce plexiform neurofibroma volume, prevent malignant transformation","soc":"Selumetinib (Koselugo) MEK inhibitor 25 mg/m2 BID - FDA-approved 2020 for symptomatic, inoperable plexiform neurofibromas in NF1 patients ≥2 years."},{"ta":"Pediatrics","subcategory":"Neurocutaneous Syndromes","indication":"Tuberous Sclerosis Complex (TSC)","symptoms":"Epilepsy (infantile spasms, multiple seizure types), brain tubers, SEGA, AML kidney tumors, skin findings, autism","goal":"Control seizures, reduce tumor burden, preserve kidney function","soc":"Everolimus (Afinitor) mTOR inhibitor for SEGA, renal AML, and pulmonary LAM. Vigabatrin for TSC-associated infantile spasms. Cannabidiol (Epidiolex) for TSC-associated seizures FDA-approved 2020."},{"ta":"Pediatrics","subcategory":"Neurocutaneous Syndromes","indication":"Von Hippel-Lindau Disease (VHL)","symptoms":"Hemangioblastomas (CNS/retina), clear cell RCC, pheochromocytoma, pancreatic NETs, polycythemia","goal":"Prevent/treat hemangioblastomas and RCC, manage polycythemia","soc":"Belzutifan (Welireg) HIF-2α inhibitor 120 mg/day - FDA-approved 2021 for VHL-related RCC, CNS hemangioblastomas, and pancreatic NETs. Surgical resection for isolated lesions."},{"ta":"Pediatrics","subcategory":"Neurocutaneous Syndromes","indication":"Sturge-Weber Syndrome","symptoms":"Port-wine birthmark (trigeminal distribution), seizures, glaucoma, hemiparesis, intellectual disability","goal":"Control seizures, prevent glaucoma damage, manage neurological decline","soc":"Anticonvulsants: levetiracetam or oxcarbazepine for seizure control. Low-dose aspirin (3-5 mg/kg/day) to prevent stroke-like episodes. Topical/systemic therapy for glaucoma."},{"ta":"Pediatrics","subcategory":"Neurologic Disorders in Children","indication":"Cerebral Palsy (CP)","symptoms":"Non-progressive motor disorder: spasticity, dyskinesia, ataxia, developmental motor delays, associated cognitive/sensory impairments","goal":"Reduce spasticity, improve motor function, maximize independence","soc":"Oral baclofen (2.5-10 mg TID) for spasticity; diazepam for acute spasm relief; intrathecal baclofen (ITB) pump for severe spasticity; botulinum toxin injections (onabotulinumtoxinA/Botox) for focal spasticity."},{"ta":"Pediatrics","subcategory":"Neurologic Disorders in Children","indication":"Tic Disorders and Tourette Syndrome in Children and Adolescents","symptoms":"Multiple motor and vocal tics (Tourette), single motor tics, waxing/waning course, ADHD/OCD comorbidities","goal":"Reduce tic severity/frequency, improve functional impairment","soc":"Comprehensive Behavioral Intervention for Tics (CBIT - habit reversal therapy) first-line. Pharmacologic: alpha-2 agonists (guanfacine/clonidine) for mild-moderate tics; haloperidol, fluphenazine, or pimozide for severe tics."},{"ta":"Pediatrics","subcategory":"Neurologic Disorders in Children","indication":"Neonatal Seizure Disorders","symptoms":"Subtle (eye deviation, lip smacking), tonic, clonic, myoclonic, and spasms in neonate","goal":"Terminate acute seizures, prevent status epilepticus, address underlying cause","soc":"Phenobarbital IV 20 mg/kg loading dose (first-line for most neonatal seizures). If refractory: levetiracetam IV 40-60 mg/kg or fosphenytoin/phenytoin IV 20 mg/kg PE."},{"ta":"Pediatrics","subcategory":"Neurologic Disorders in Children","indication":"Infantile Spasms","symptoms":"Clusters of brief flexion-extension spasms, hypsarrhythmia on EEG, developmental regression in infants","goal":"Achieve clinical and EEG remission (resolution of hypsarrhythmia)","soc":"ACTH (tetracosactide/H.P. Acthar Gel) or vigabatrin (Sabril) for infantile spasms. ACTH 150 IU/m2/day x 2 weeks is first-line per AAP/ILAE guidelines. TSC-related: vigabatrin first-line."},{"ta":"Pediatrics","subcategory":"Neurologic Disorders in Children","indication":"Febrile Seizures","symptoms":"Convulsion (generalized tonic-clonic) triggered by fever in child 6 months-5 years","goal":"Terminate acute seizure, manage fever, reduce recurrence anxiety","soc":"Acute treatment: rectal diazepam (Diastat 0.5 mg/kg) or intranasal/buccal midazolam for prolonged febrile seizure (>5 min). Routine antipyretics not proven to prevent recurrence."},{"ta":"Pediatrics","subcategory":"Neurologic Disorders in Children","indication":"Reye Syndrome","symptoms":"Acute non-inflammatory encephalopathy + hepatopathy post-viral illness in child; associated with aspirin use","goal":"Reduce intracranial pressure, correct metabolic derangements, prevent death","soc":"Supportive ICU care: IV glucose (10-20% dextrose) for hypoglycemia; mannitol or 3% saline for cerebral edema; avoid aspirin in children with viral illness."},{"ta":"Pediatrics","subcategory":"Perinatal Hematologic Disorders","indication":"Perinatal Anemia","symptoms":"Pallor, tachycardia, poor feeding, hyperbilirubinemia, lethargy in neonate/preterm infant","goal":"Correct anemia, maintain tissue oxygenation, reduce transfusion burden","soc":"Erythropoietin (EPO) + iron (ferrous sulfate + elemental iron) for anemia of prematurity in VLBW infants. Packed red blood cell transfusion for symptomatic severe anemia."},{"ta":"Pediatrics","subcategory":"Perinatal Hematologic Disorders","indication":"Perinatal Polycythemia and Hyperviscosity Syndrome","symptoms":"Plethora, poor feeding, jitteriness, hypoglycemia, respiratory distress, jaundice from hematocrit >65%","goal":"Reduce blood viscosity to prevent thrombotic complications","soc":"Partial exchange transfusion (isovolemic hemodilution) with normal saline to reduce hematocrit to <55-60% for symptomatic neonates. No proven pharmacologic therapy."},{"ta":"Pediatrics","subcategory":"Perinatal Hematologic Disorders","indication":"Perinatal Physiology","symptoms":"Not a disease (physiological topic: transition from fetal to neonatal circulation, respiratory adaptation)","goal":"N/A (educational/physiology topic, not a treatable disease per se)","soc":"None."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Preterm Infants","symptoms":"Respiratory distress, apnea, hypothermia, feeding difficulties, NEC, IVH, retinopathy of prematurity","goal":"Prevent and treat preterm complications, support organ maturation","soc":"Antenatal corticosteroids (betamethasone 12 mg IM q24h x2) for lung maturation <34 weeks. Postnatal: surfactant (calfactant, poractant alfa) for RDS; caffeine citrate for apnea of prematurity."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Small-for-Gestational-Age (SGA) Infant","symptoms":"Low birth weight for GA, hypoglycemia, polycythemia, poor thermal regulation, catch-up growth failure","goal":"Prevent hypoglycemia, support catch-up growth, optimize nutrition","soc":"Nutritional optimization (early enteral feeding, fortified breast milk, high-calorie formula). Growth hormone (Genotropin, Norditropin) approved for persistent short stature in SGA children (not catching up by age 2-4 years) 0.067 mg/kg/day SC."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Hypothermia in Neonates","symptoms":"Low core temperature (<36.5°C), peripheral vasoconstriction, lethargy, poor feeding, coagulopathy, metabolic acidosis","goal":"Restore normothermia gradually, prevent hypoxic-ischemic injury (therapeutic hypothermia exception)","soc":"Rewarming: kangaroo care, warming blanket, radiant warmer (non-HIE). Therapeutic hypothermia (33-34°C x 72 hours) is deliberate treatment for HIE, not accidental hypothermia."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Birth Injuries","symptoms":"Varies: clavicle fracture, brachial plexus injury (Erb's palsy), cephalohematoma, subdural hematoma, facial nerve palsy","goal":"Prevent permanent disability; early intervention for nerve injuries","soc":"Mostly non-pharmacologic (immobilization, physiotherapy). Analgesics (acetaminophen, ibuprofen) for pain. No specific pharmacologic treatment for most birth injuries."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Neonatal Resuscitation","symptoms":"Not a disease (clinical procedure for neonates requiring resuscitation at birth: apnea, bradycardia, cyanosis)","goal":"Establish breathing and circulation in asphyxiated neonate within first minutes of life","soc":"NRP (Neonatal Resuscitation Program): dry, stimulate, warm → PPV (positive pressure ventilation) → chest compressions → epinephrine IV/IO (0.1-0.3 mL/kg of 1:10,000)."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Large-for-Gestational-Age (LGA) Infant","symptoms":"High birth weight, shoulder dystocia risk, neonatal hypoglycemia, polycythemia, birth injuries","goal":"Prevent and treat neonatal hypoglycemia; minimize birth trauma","soc":"Neonatal hypoglycemia management: early oral feeding, buccal dextrose gel, IV dextrose if needed. No pharmacologic treatment for LGA status itself."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Postterm Infants","symptoms":"Macrosomia or dysmaturity, meconium aspiration risk, hypoglycemia, polycythemia, cord compression, perinatal distress","goal":"Prevent fetal/neonatal morbidity from prolonged gestation","soc":"Labor induction at 41-42 weeks gestation (obstetric, not neonatal pharmacology). Neonatal: glucose monitoring, meconium aspiration management, polycythemia treatment."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Gestational Age","symptoms":"Not a disease (classification of newborns by gestational age: preterm, term, post-term)","goal":"N/A (category/diagnostic classification, not a treatable disease per se)","soc":"None."},{"ta":"Pediatrics","subcategory":"Perinatal Problems","indication":"Growth Parameters in Neonates","symptoms":"Not a disease (measurements: birth weight, length, head circumference for GA-based growth assessment)","goal":"N/A (clinical monitoring topic, not a treatable disease)","soc":"None."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Depressive Disorders in Children and Adolescents","symptoms":"Persistent sadness, irritability, loss of interest, sleep/appetite changes, poor concentration","goal":"Achieve and maintain remission, prevent recurrence","soc":"Fluoxetine (SSRI) — only FDA-approved antidepressant for children ≥8 years with MDD; escitalopram FDA-approved for adolescents ≥12."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Suicidal Behavior in Children and Adolescents","symptoms":"Suicidal ideation, self-harm attempts, hopelessness, depression, impulsivity","goal":"Prevent suicidal attempts, achieve psychiatric stability","soc":"Crisis intervention + intensive psychiatric care; pharmacotherapy of underlying disorder (depression → fluoxetine; bipolar → lithium). Lithium has anti-suicidal evidence in adults."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Generalized Anxiety Disorder in Children and Adolescents","symptoms":"Excessive worry, restlessness, fatigue, concentration difficulty, muscle tension","goal":"Reduce anxiety severity, restore daily functioning","soc":"CBT is first-line; SSRIs (sertraline, fluoxetine) or SNRIs (venlafaxine, duloxetine) for moderate-severe GAD — used off-label in pediatrics."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Bipolar Disorders in Children and Adolescents","symptoms":"Mood swings, mania/hypomania, depression, irritability, impulsivity","goal":"Stabilize mood, prevent episodes, maintain function","soc":"Lithium (mood stabilizer) or atypical antipsychotics (aripiprazole, quetiapine, risperidone) FDA-approved for pediatric bipolar I."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Social Anxiety Disorder in Children and Adolescents","symptoms":"Intense fear of social situations, embarrassment, avoidance, somatic symptoms","goal":"Reduce social fear, increase social participation","soc":"CBT plus SSRIs (sertraline or fluoxetine, off-label); combined treatment most effective."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Acute and Posttraumatic Stress Disorders (ASD and PTSD) in Children and Adolescents","symptoms":"Intrusive memories, hypervigilance, nightmares, avoidance, emotional dysregulation post-trauma","goal":"Reduce PTSD symptoms, restore adaptive functioning","soc":"Trauma-Focused Cognitive Behavioral Therapy (TF-CBT) is gold standard. Pharmacologic: sertraline (Zoloft) off-label (FDA-approved for OCD in children, evidence in pediatric PTSD)."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Separation Anxiety Disorder","symptoms":"Excessive fear of separation from caregivers, school refusal, nightmares, somatic complaints","goal":"Reduce separation distress, restore school attendance","soc":"CBT (with family involvement) is first-line; SSRIs (sertraline, fluoxetine) for moderate-severe or CBT-refractory cases."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Conduct Disorder","symptoms":"Aggression, rule-breaking, destruction, deceitfulness, serious violations of norms","goal":"Reduce aggression, improve prosocial behavior","soc":"None (pharmacologic); behavioral therapy (parent management training, MST) is primary. Risperidone is used off-label for severe aggression."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Obsessive-Compulsive Disorder and Related Disorders in Children and Adolescents","symptoms":"Intrusive obsessions, compulsive rituals, significant time loss, impaired function","goal":"Reduce OCD severity, restore daily functioning","soc":"Sertraline or fluvoxamine (FDA-approved for pediatric OCD) + ERP (Exposure and Response Prevention therapy)."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Nonsuicidal Self-Injury (NSSI) in Children and Adolescents","symptoms":"Deliberate self-cutting, burning, hitting without suicidal intent; emotional dysregulation","goal":"Stop self-injurious behavior, develop coping skills","soc":"None (pharmacologic); DBT-A (Dialectical Behavior Therapy for Adolescents) is evidence-based first-line."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Panic Disorder in Children and Adolescents","symptoms":"Recurrent unexpected panic attacks, palpitations, chest pain, intense fear, avoidance","goal":"Reduce panic frequency, eliminate anticipatory anxiety","soc":"SSRIs (sertraline, fluoxetine — off-label) combined with CBT (panic-focused); SSRIs are first-line pharmacotherapy."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Somatic Symptom and Related Disorders in Children","symptoms":"Physical symptoms (pain, fatigue, nausea) without medical explanation; excessive health worry","goal":"Reduce symptom burden, improve daily functioning","soc":"None (pharmacologic); CBT and family-based therapy are primary. Treat underlying anxiety/depression with SSRIs if present."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Agoraphobia in Children and Adolescents","symptoms":"Intense fear of open or crowded spaces, avoidance, often co-occurring with panic disorder, school refusal","goal":"Reduce avoidance, restore normal daily activities including school attendance","soc":"CBT with gradual exposure is gold standard. SSRIs (sertraline, fluoxetine) as pharmacotherapy adjunct for moderate-severe cases."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Oppositional Defiant Disorder (ODD)","symptoms":"Angry/irritable mood, argumentative, defiant, vindictive behavior toward authority","goal":"Reduce oppositional behavior, improve family/school function","soc":"None (pharmacologic); behavioral interventions (Parent Management Training) are first-line. Pharmacotherapy targets comorbidities (ADHD, anxiety)."},{"ta":"Pediatrics","subcategory":"Psychiatric Disorders in Children and Adolescents","indication":"Schizophrenia in Children and Adolescents","symptoms":"Hallucinations, delusions, disorganized thinking, flat affect, social withdrawal","goal":"Reduce psychosis, prevent relapse, maintain function","soc":"Atypical antipsychotics: aripiprazole (FDA-approved ≥13 years), risperidone (FDA-approved ≥13 years), quetiapine, olanzapine for early-onset schizophrenia."},{"ta":"Pediatrics","subcategory":"Respiratory Disorders in Young Children","indication":"Wheezing and Asthma in Infants and Young Children","symptoms":"Recurrent wheezing, cough, breathlessness, chest tightness in children <5","goal":"Prevent wheeze episodes, reduce ER visits and hospitalizations","soc":"Inhaled albuterol (SABA) for acute episodes; low-dose ICS (fluticasone or budesonide nebulized) for persistent asthma. Montelukast (leukotriene receptor antagonist) as alternative/adjunct."},{"ta":"Pediatrics","subcategory":"Respiratory Disorders in Young Children","indication":"Respiratory Syncytial Virus (RSV) and Human Metapneumovirus Infections","symptoms":"Rhinorrhea, cough, wheeze, fever, respiratory distress, hypoxia in infants/elderly","goal":"Prevent severe disease, reduce hospitalizations","soc":"Nirsevimab (Beyfortus) — FDA-approved monoclonal antibody for RSV prevention in all infants <8 months and high-risk infants up to 24 months (2023). Palivizumab: monthly IM prophylaxis for high-risk infants."},{"ta":"Pediatrics","subcategory":"Respiratory Disorders in Young Children","indication":"Bronchiolitis","symptoms":"Wheezing, tachypnea, chest retractions, nasal congestion, fever in infants","goal":"Support oxygenation, prevent respiratory failure","soc":"Supportive care only (hydration, supplemental O2); no proven pharmacologic benefit from bronchodilators, steroids, or antibiotics per AAP guidelines."},{"ta":"Pediatrics","subcategory":"Respiratory Disorders in Young Children","indication":"Croup","symptoms":"Barking cough, inspiratory stridor, hoarseness, low-grade fever in toddlers","goal":"Relieve airway obstruction, reduce hospitalizations","soc":"Oral dexamethasone (single dose 0.15–0.6 mg/kg) for moderate-severe croup; nebulized epinephrine for severe/impending respiratory failure."},{"ta":"Pediatrics","subcategory":"Respiratory Disorders in Young Children","indication":"Bacterial Tracheitis","symptoms":"Severe inspiratory stridor, high fever, toxic appearance, respiratory distress, croup-like bark","goal":"Secure airway, eradicate bacterial infection","soc":"Airway management (intubation often required) + IV antibiotics: ampicillin-sulbactam or cefuroxime; add antistaphylococcal coverage (vancomycin if MRSA suspected)."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Bronchopulmonary Dysplasia (BPD)","symptoms":"Chronic oxygen dependence, recurrent wheeze, poor growth, pulmonary hypertension in ex-premature infants","goal":"Wean from oxygen/respiratory support, prevent pulmonary hypertension","soc":"Diuretics (furosemide, chlorothiazide + spironolactone) for pulmonary edema; postnatal corticosteroids (dexamethasone) for ventilator-dependent BPD; caffeine; inhaled bronchodilators."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Persistent Pulmonary Hypertension of the Newborn (PPHN)","symptoms":"Severe hypoxemia after birth, cyanosis, respiratory distress, high PVR, right-to-left shunting","goal":"Reduce pulmonary vascular resistance, achieve adequate oxygenation","soc":"Inhaled nitric oxide (iNO, INOmax) — FDA-approved for term/near-term neonates with PPHN; vasodilates pulmonary vasculature selectively."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Respiratory Distress Syndrome in Neonates","symptoms":"Grunting, nasal flaring, tachypnea, retractions, cyanosis in premature infants; surfactant deficiency","goal":"Restore surfactant, achieve adequate oxygenation and ventilation","soc":"Surfactant replacement therapy (beractant/Survanta, calfactant/Infasurf, poractant alfa/Curosurf) — gold standard for premature infants <30 weeks with RDS."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Meconium Aspiration Syndrome","symptoms":"Respiratory distress at birth, meconium-stained amniotic fluid, hypoxia, tachypnea, air-trapping","goal":"Support oxygenation, prevent PPHN and respiratory failure","soc":"Supportive care: supplemental O2, CPAP, mechanical ventilation; surfactant therapy for severe MAS; inhaled nitric oxide (iNO) for PPHN."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Apnea of Prematurity","symptoms":"Cessation of breathing >20 seconds, bradycardia, oxygen desaturation in premature infants","goal":"Prevent apnea episodes, enable safe discharge","soc":"Caffeine citrate (methylxanthine) — FDA-approved, standard of care for AOP in premature infants; reduces apnea episodes and improves neurodevelopment."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Pulmonary Air-Leak Syndromes","symptoms":"Pneumothorax, pneumomediastinum; sudden respiratory deterioration, decreased breath sounds, hypoxia in neonates","goal":"Evacuate air, re-expand lung, prevent recurrence","soc":"None (pharmacologic); treatment is procedural (needle aspiration, chest tube) for tension pneumothorax. Supplemental O2 for small pneumothorax (nitrogen washout accelerates reabsorption)."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Respiratory Support in Neonates and Infants","symptoms":"Various respiratory failure causes requiring O2 supplementation, CPAP, or mechanical ventilation","goal":"Maintain adequate gas exchange, wean from respiratory support","soc":"Not a disease per se; supportive/procedural. Pharmacologic adjuncts: caffeine for AOP, surfactant for RDS, iNO for PPHN, steroids for BPD, diuretics."},{"ta":"Pediatrics","subcategory":"Respiratory Problems in Neonates","indication":"Transient Tachypnea of the Newborn","symptoms":"Rapid breathing, mild respiratory distress at birth, self-resolving within 24–72 hours","goal":"Supportive oxygenation; prevent progression to respiratory failure","soc":"Supportive care: supplemental O2, CPAP if needed; spontaneously resolves within 24–72 hours. No pharmacologic first-line treatment."},{"ta":"Pediatrics","subcategory":"Rheumatologic Disorders in Children","indication":"Juvenile Idiopathic Arthritis (JIA)","symptoms":"Joint swelling, stiffness, pain, limited motion, morning stiffness, uveitis risk","goal":"Achieve clinical remission, prevent joint damage and blindness","soc":"NSAIDs (naproxen, ibuprofen) for mild; methotrexate (10–15 mg/m²/week SC/PO) for oligoarticular/polyarticular JIA; intraarticular corticosteroids."},{"ta":"Pediatrics","subcategory":"Rheumatologic Disorders in Children","indication":"Macrophage Activation Syndrome","symptoms":"High unremitting fever, cytopenias, hyperferritinemia, splenomegaly, coagulopathy, CNS involvement","goal":"Suppress cytokine storm, prevent multi-organ failure","soc":"High-dose corticosteroids (methylprednisolone 30 mg/kg/day × 3 days pulse); cyclosporine for refractory. Anakinra (IL-1 blocker) increasingly used as first-line for MAS/sJIA."},{"ta":"Pediatrics","subcategory":"Rheumatologic Disorders in Children","indication":"Kawasaki Disease","symptoms":"Prolonged fever, rash, conjunctivitis, red lips, swollen lymph node","goal":"Prevent coronary artery aneurysms (CAA), reduce inflammation","soc":"IVIG (2 g/kg IV single infusion) + high-dose aspirin (80–100 mg/kg/day) within first 10 days — reduces CAA from ~25% to ~4%."},{"ta":"Pediatrics","subcategory":"Sudden Unexpected Infant Death and Brief, Resolved, Unexplained Events","indication":"Urinary Incontinence in Children","symptoms":"Daytime wetting, urgency, nocturia, bed-wetting; impaired bladder control","goal":"Achieve continence, prevent secondary psychological harm","soc":"Behavioral interventions (bladder training, scheduled voiding) first. Desmopressin (DDAVP) FDA-approved for nocturnal enuresis ≥6 years; oxybutynin for overactive bladder."},{"ta":"Pediatrics","subcategory":"Sudden Unexpected Infant Death and Brief, Resolved, Unexplained Events","indication":"Stool Incontinence in Children","symptoms":"Involuntary fecal soiling (encopresis), constipation, overflow incontinence, social embarrassment","goal":"Achieve regular bowel control, prevent constipation, improve quality of life","soc":"Osmotic laxatives (PEG 3350, MiraLax) for constipation/fecal impaction; dietary fiber; behavioral bowel training."},{"ta":"Pediatrics","subcategory":"Sudden Unexpected Infant Death and Brief, Resolved, Unexplained Events","indication":"Brief, Resolved, Unexplained Events (BRUE)","symptoms":"Brief unexpected episode of color change, tone change, unresponsiveness, or abnormal breathing in infant","goal":"Identify serious underlying cause, reassure and educate caregivers","soc":"None (pharmacologic); BRUE is a diagnosis of exclusion requiring investigation. Low-risk BRUE: reassurance and education per AAP. Higher-risk: hospitalization for monitoring."},{"ta":"Pediatrics","subcategory":"Sudden Unexpected Infant Death and Brief, Resolved, Unexplained Events","indication":"Sudden Unexpected Infant Death (SUID) and Sudden Infant Death Syndrome (SIDS)","symptoms":"Sudden unexplained death in infant <1 year during sleep; no identifiable cause at autopsy","goal":"Identify at-risk infants, implement safe sleep to prevent SIDS","soc":"None (pharmacologic); prevention through safe sleep practices (back sleeping, firm mattress, no co-sleeping per AAP). No pharmacologic intervention proven to prevent SIDS."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Rash in Infants and Young Children","symptoms":"Skin eruption; varied morphology (macular, papular, vesicular); may signal viral, bacterial, allergic, or inflammatory cause","goal":"Identify cause, relieve itch/discomfort, treat infection if present","soc":"Treat underlying cause: topical corticosteroids (hydrocortisone 1%) for eczema/contact dermatitis; antihistamines (diphenhydramine, cetirizine) for urticaria; antibiotics for bacterial. Emollients for dry skin."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Constipation in Children","symptoms":"Infrequent hard stools, straining, abdominal pain, withholding behavior, fecal soiling","goal":"Restore regular soft bowel movements, prevent recurrence","soc":"PEG 3350 (polyethylene glycol, MiraLax) — osmotic laxative; first-line per NASPGHAN guidelines. Dose: 0.4–0.8 g/kg/day. Generic and OTC; highly effective."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Cough in Children","symptoms":"Acute or chronic cough; productive or dry; disrupts sleep and daily activities","goal":"Identify and treat underlying cause, relieve cough","soc":"Treat underlying cause: antibiotics for bacterial infection; bronchodilators/ICS for asthma; nasal corticosteroids for upper airway cough. Honey (≥1 year) for acute cough has evidence. Codeine/DXM OTC cough suppressants not recommended in children."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Fever in Infants and Children","symptoms":"Elevated body temperature ≥38°C (100.4°F), irritability, poor feeding, flushing, febrile seizure risk","goal":"Provide comfort, identify serious bacterial infection, prevent febrile seizure recurrence","soc":"Acetaminophen (10–15 mg/kg q4–6h) or ibuprofen (≥6 months; 5–10 mg/kg q6–8h) for fever ≥38.5–39°C causing discomfort."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Nausea and Vomiting in Infants and Children","symptoms":"Vomiting, nausea, poor feeding, dehydration risk; multiple etiologies","goal":"Control vomiting, prevent dehydration, identify serious cause","soc":"Ondansetron (0.15 mg/kg PO/IV) — most effective antiemetic in children ≥1 month for AGE; reduces hospitalization rates. ORS co-administration."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Diarrhea in Children","symptoms":"Loose/watery frequent stools, dehydration, fever, abdominal cramps, nausea","goal":"Prevent dehydration, resolve infection, restore normal bowel function","soc":"Oral rehydration therapy (ORS) — WHO/UNICEF gold standard for dehydration prevention/treatment. Zinc supplementation reduces diarrhea severity in children <5 in developing countries."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Colic","symptoms":"Inconsolable crying ≥3 hours/day ≥3 days/week in healthy infant <3 months","goal":"Reduce crying episodes, support caregiver","soc":"None proven; soothing techniques (swaddling, white noise). Simethicone (gas drops) widely used but evidence weak. Probiotics (Lactobacillus reuteri DSM17938) modestly effective in breastfed infants."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Crying in Children","symptoms":"Excessive or prolonged crying beyond normal developmental patterns; symptom of underlying distress","goal":"Identify cause, address underlying condition, support family","soc":"None (pharmacologic); identify and treat underlying cause (pain, hunger, colic, illness). Behavioral support for caregivers."},{"ta":"Pediatrics","subcategory":"Symptoms in Infants and Children","indication":"Separation Anxiety and Stranger Anxiety","symptoms":"Normal developmental distress with parent separation or unfamiliar people (peak 6–24 months)","goal":"Support normal developmental progression; differentiate from pathologic SAD","soc":"None (pharmacologic); developmentally normal behavior managed with parental reassurance, consistent routines, and gradual separation."},{"ta":"Pulmonary and Critical Care","subcategory":"ICU Management","indication":"Agitation, Confusion, and Neuromuscular Blockade in Critically Ill Patients","symptoms":"Restlessness, delirium, combativeness, confusion, inability to tolerate ventilator","goal":"Achieve analgesia-first sedation; prevent delirium; facilitate ventilator tolerance","soc":"Propofol (short-term light sedation) or dexmedetomidine (Precedex) as preferred sedative agents per PADIS guidelines; analgesic-first approach (fentanyl, morphine for pain). Haloperidol or quetiapine for delirium treatment (not prevention per MIND trial)."},{"ta":"Pulmonary and Critical Care","subcategory":"Respiratory Emergencies","indication":"Acute Hypoxemic Respiratory Failure (AHRF, ARDS)","symptoms":"Severe shortness of breath, low oxygen levels, bilateral lung infiltrates, rapid deterioration","goal":"Restore adequate oxygenation; prevent VILI; reduce mortality","soc":"Lung-protective mechanical ventilation (low tidal volume 6 mL/kg IBW, PEEP titration, plateau pressure ≤30 cmH₂O — ARDSNet protocol) is the cornerstone of care. Prone positioning for moderate-severe ARDS (PaO₂/FiO₂ <150, ≥16h/day — PROSEVA trial: 28-day mortality reduced 16% absolute)."},{"ta":"Pulmonary and Critical Care","subcategory":"Respiratory Emergencies","indication":"Respiratory Failure","symptoms":"Inability to maintain adequate O₂ or CO₂ levels; dyspnea, cyanosis, altered mental status","goal":"Restore gas exchange; treat underlying etiology; avoid ventilator-induced injury","soc":"Supplemental oxygen and/or non-invasive ventilation (NIV/BiPAP) as initial intervention. Invasive mechanical ventilation for refractory cases. Treat underlying cause (bronchodilators, diuretics, antibiotics, anticoagulation as appropriate)."},{"ta":"Pulmonary and Critical Care","subcategory":"Respiratory Emergencies","indication":"Hypoxia in Hospitalized Patients","symptoms":"Low oxygen saturation, confusion, cyanosis, tachycardia, shortness of breath","goal":"Identify and correct underlying cause; restore adequate oxygenation (SpO₂ ≥92%)","soc":"Supplemental oxygen (nasal cannula, Venturi mask, HFNC, or NIV) is first-line supportive care. Treat underlying cause: bronchodilators for bronchospasm, diuretics for pulmonary edema, antibiotics for pneumonia."},{"ta":"Pulmonary and Critical Care","subcategory":"Respiratory Emergencies","indication":"Other Types of Respiratory Failure","symptoms":"Inability to maintain ventilation/oxygenation; varied by type (pump failure, V/Q mismatch, shunt)","goal":"Correct underlying cause; provide ventilatory support; prevent end-organ damage","soc":"Supportive: NIV (BiPAP) for type II (hypercapnic) respiratory failure from COPD exacerbation; invasive mechanical ventilation for refractory cases. Treat underlying etiology (bronchodilators, diuretics, antibiotics as appropriate)."},{"ta":"Pulmonary and Critical Care","subcategory":"Respiratory Emergencies","indication":"Ventilatory Failure","symptoms":"Rising CO₂ (hypercapnia), respiratory acidosis, drowsiness, inability to breathe adequately","goal":"Restore adequate ventilation; correct respiratory acidosis; treat underlying cause","soc":"Non-invasive ventilation (NIV/BiPAP) is first-line for hypercapnic ventilatory failure (COPD exacerbation, OHS, NMD) — reduces intubation and mortality. Invasive mechanical ventilation for NIV failure or contraindication."},{"ta":"Pulmonary and Critical Care","subcategory":"Respiratory Emergencies","indication":"Respiratory Arrest","symptoms":"Complete cessation of breathing; often preceded by severe respiratory distress; leads to cardiac arrest if untreated","goal":"Immediate restoration of ventilation; prevent hypoxic brain injury and cardiac arrest","soc":"Immediate bag-valve-mask (BVM) ventilation and emergency intubation/airway establishment. Reversal agents if drug-induced: naloxone (opioid overdose, 0.4–2 mg IV/IM/IN) or flumazenil (benzodiazepine reversal — use cautiously)."},{"ta":"Pulmonary and Critical Care","subcategory":"Respiratory Emergencies","indication":"Choking","symptoms":"Sudden inability to speak/breathe, clutching throat, cyanosis; foreign body airway obstruction","goal":"Immediate clearance of airway obstruction; restore ventilation","soc":"Heimlich maneuver (abdominal thrusts) for conscious adult with complete airway obstruction. Back blows + chest thrusts for infants. Emergency cricothyrotomy for failed clearance. No pharmacologic SoC."},{"ta":"Pulmonary and Critical Care","subcategory":"Shock and Hemodynamic Emergencies","indication":"Sepsis and Septic Shock","symptoms":"Fever or hypothermia, rapid heart rate, low blood pressure, organ dysfunction, confusion","goal":"Control infection; restore hemodynamics; prevent multi-organ failure and death","soc":"Early broad-spectrum IV antibiotics (within 1 hour of recognition) + IV crystalloid resuscitation (30 mL/kg in first 3 hours) per Surviving Sepsis Campaign Hour-1 Bundle. Norepinephrine as first-line vasopressor for septic shock."},{"ta":"Pulmonary and Critical Care","subcategory":"Shock and Hemodynamic Emergencies","indication":"Cardiac Arrest","symptoms":"Sudden loss of consciousness, absent pulse, absent respirations; without CPR universally fatal","goal":"Restore spontaneous circulation; preserve neurological function; prevent recurrence","soc":"CPR + defibrillation (AED) is the only life-saving intervention. Epinephrine 1 mg IV q3–5 min (ACLS standard) during resuscitation to restore circulation."},{"ta":"Pulmonary and Critical Care","subcategory":"Shock and Hemodynamic Emergencies","indication":"Shock","symptoms":"Low blood pressure, cold/clammy skin, rapid pulse, confusion, reduced urine output","goal":"Restore tissue perfusion and organ function; treat underlying cause","soc":"IV crystalloid resuscitation (30 mL/kg balanced crystalloids) and vasopressors (norepinephrine first-line for vasodilatory/septic shock; epinephrine for anaphylactic shock) per shock type."},{"ta":"Pulmonary and Critical Care","subcategory":"Shock and Hemodynamic Emergencies","indication":"Oliguria","symptoms":"Reduced urine output (<0.5 mL/kg/h), fluid retention, rising creatinine, edema","goal":"Identify cause; restore renal perfusion; prevent progression to AKI/renal failure","soc":"IV fluid resuscitation (0.9% NaCl or balanced crystalloids) for prerenal oliguria/hypovolemia. Furosemide for fluid overload oliguria. Correct underlying hemodynamic cause (vasopressors for shock)."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Idiopathic Pulmonary Fibrosis (IPF)","symptoms":"Progressive dyspnea, dry cough, bilateral basal crackles, honeycombing on CT","goal":"Slow FVC decline; reduce acute exacerbations; preserve function","soc":"Nintedanib (Ofev — FDA 2014) and pirfenidone (Esbriet — FDA 2014) are both first-line FDA-approved anti-fibrotic agents."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Allergic Bronchopulmonary Aspergillosis (ABPA)","symptoms":"Wheezing, brown mucus plugs, recurrent lung infiltrates in asthmatics","goal":"Suppress allergic response to Aspergillus; prevent lung damage","soc":"Oral corticosteroids (prednisolone) are first-line for acute exacerbations. Itraconazole (antifungal) added as steroid-sparing agent."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Hypersensitivity Pneumonitis","symptoms":"Cough, dyspnea, fever after antigen exposure; diffuse lung infiltrates","goal":"Remove antigen; reduce inflammation; prevent fibrotic progression","soc":"Remove causative antigen (mandatory). Systemic corticosteroids (prednisone) for significant acute/chronic cases."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Sarcoidosis","symptoms":"Fatigue, cough, skin lesions, lymphadenopathy, multiorgan granulomas; often self-limited","goal":"Suppress granuloma formation; preserve organ function; reduce fatigue","soc":"Oral corticosteroids (prednisone 20–40 mg/day) for symptomatic or progressive pulmonary, cardiac, or neurologic sarcoidosis."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Nonspecific Interstitial Pneumonia (NSIP)","symptoms":"Progressive breathlessness, dry cough, bibasilar ground-glass opacities on CT","goal":"Halt fibrotic progression; preserve lung function","soc":"Immunosuppression: corticosteroids + azathioprine or mycophenolate mofetil; treat underlying CTD (connective tissue disease) if present."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Pulmonary Alveolar Proteinosis","symptoms":"Progressive dyspnea, productive cough with gelatinous sputum; alveoli filled with surfactant-like material","goal":"Remove proteinaceous material; restore alveolar gas exchange","soc":"Whole lung lavage (WLL) is the gold-standard treatment. For autoimmune PAP: inhaled or subcutaneous GM-CSF (molgramostim; FDA Breakthrough designation)."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Chronic Eosinophilic Pneumonia","symptoms":"Progressive cough, dyspnea, bilateral peripheral infiltrates, blood eosinophilia","goal":"Resolve eosinophilic infiltrates; prevent relapse; minimize steroid use","soc":"Oral corticosteroids (prednisone 40–60 mg/day) are highly effective first-line treatment."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Cryptogenic Organizing Pneumonia (COP)","symptoms":"Flu-like illness, bilateral infiltrates, non-resolving pneumonia, steroid-responsive","goal":"Resolve organizing pneumonia; prevent relapse","soc":"Oral corticosteroids (prednisone 0.75–1 mg/kg/day) are highly effective first-line treatment."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Lymphangioleiomyomatosis","symptoms":"Progressive breathlessness, recurrent pneumothorax, chylous effusions in women","goal":"Slow lung function decline; prevent pneumothorax recurrence","soc":"Sirolimus (rapamycin) — mTOR inhibitor — FDA-approved 2015 for LAM; 2 mg/day orally."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Respiratory Bronchiolitis–Associated Interstitial Lung Disease (RBILD)","symptoms":"Cough, dyspnea, ground-glass opacities on CT; strongly linked to cigarette smoking","goal":"Smoking cessation; reduce inflammation; improve lung function","soc":"Smoking cessation is the cornerstone treatment. Corticosteroids (prednisone) for symptomatic or progressive cases."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Pulmonary Langerhans Cell Histiocytosis","symptoms":"Dyspnea, cough, recurrent pneumothorax; cystic and nodular lung lesions; smoking-associated","goal":"Smoking cessation (primary); slow cystic progression; prevent pneumothorax","soc":"Smoking cessation is the most critical intervention. BRAF-targeted therapy (vemurafenib, dabrafenib-trametinib) for BRAF V600E-mutant PLCH is emerging first-line for progressive disease."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Lymphoid Interstitial Pneumonia (LIP)","symptoms":"Progressive cough, dyspnea, bilateral lung infiltrates; associated with autoimmune disease or HIV","goal":"Reduce lymphocytic infiltration; improve oxygenation","soc":"Corticosteroids (prednisone 1 mg/kg/day) are first-line; treat underlying disease (e.g., antiretrovirals for HIV-associated LIP)."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Desquamative Interstitial Pneumonia (DIP)","symptoms":"Dyspnea, cough in smokers; ground-glass opacities on HRCT","goal":"Halt progression; improve lung function; stop smoking","soc":"Smoking cessation is the most effective intervention. Corticosteroids (prednisone) for moderate-severe disease."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Acute Eosinophilic Pneumonia","symptoms":"Acute respiratory failure, cough, fever, bilateral infiltrates, marked eosinophilia","goal":"Resolve eosinophilic inflammation; restore lung function","soc":"High-dose systemic corticosteroids (prednisone 40–60 mg/day or IV methylprednisolone) are first-line and highly effective."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Idiopathic Pleuroparenchymal Fibroelastosis","symptoms":"Progressive upper lobe fibrosis, flattened chest, restrictive lung disease","goal":"Slow progression; manage respiratory failure","soc":"No proven pharmacotherapy. Corticosteroids tried with limited benefit. Anti-fibrotics (nintedanib, pirfenidone) used off-label."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Idiopathic Pulmonary Hemosiderosis","symptoms":"Recurrent hemoptysis, anemia, diffuse alveolar infiltrates in children/young adults","goal":"Control alveolar hemorrhage; prevent pulmonary fibrosis","soc":"Systemic corticosteroids (prednisone) are first-line. Hydroxychloroquine is commonly used as steroid-sparing maintenance."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Acute Interstitial Pneumonia (AIP)","symptoms":"Rapidly progressive respiratory failure; bilateral lung infiltrates; no identifiable cause","goal":"Support ventilation; reduce lung inflammation; improve survival","soc":"High-dose systemic corticosteroids (methylprednisolone pulse therapy) plus mechanical ventilation support. No proven pharmacotherapy; empiric corticosteroids standard."},{"ta":"Pulmonary and Critical Care","subcategory":"Interstitial Lung Diseases","indication":"Löffler Syndrome","symptoms":"Transient migratory pulmonary infiltrates, blood eosinophilia, mild cough, fever","goal":"Eliminate parasitic trigger; resolve eosinophilic infiltrates","soc":"Albendazole or ivermectin for helminth-associated Löffler syndrome; corticosteroids for idiopathic or severe cases."},{"ta":"Pulmonary and Critical Care","subcategory":"Obstructive Airway Diseases","indication":"Chronic Obstructive Pulmonary Disease (COPD)","symptoms":"Persistent breathlessness, chronic cough, sputum, progressive airflow limitation","goal":"Reduce symptoms; prevent exacerbations; slow decline; improve exercise tolerance","soc":"Long-acting bronchodilators (LABAs and/or LAMAs) are first-line maintenance therapy. LAMA (tiotropium/Spiriva) is standard for moderate-severe COPD."},{"ta":"Pulmonary and Critical Care","subcategory":"Obstructive Airway Diseases","indication":"Asthma","symptoms":"Episodic wheezing, shortness of breath, chest tightness, cough","goal":"Achieve asthma control; minimize exacerbations; normalize lung function","soc":"Inhaled corticosteroids (ICS) are first-line controller therapy; short-acting beta-agonists (SABAs, albuterol) for rescue. ICS+LABA for moderate-severe asthma."},{"ta":"Pulmonary and Critical Care","subcategory":"Obstructive Airway Diseases","indication":"Bronchiectasis","symptoms":"Chronic productive cough, recurrent lung infections, airway dilation","goal":"Reduce exacerbations; manage secretions; prevent progression","soc":"Airway clearance techniques (physiotherapy, oscillating devices) plus antibiotics for exacerbations (amoxicillin-clavulanate, ciprofloxacin) are standard. Inhaled azithromycin or tobramycin for chronic Pseudomonas suppression."},{"ta":"Pulmonary and Critical Care","subcategory":"Obstructive Airway Diseases","indication":"Alpha-1 Antitrypsin Deficiency","symptoms":"Early-onset emphysema, chronic cough, dyspnea, sometimes liver disease","goal":"Slow lung destruction; augment deficient protein level","soc":"Alpha-1 proteinase inhibitor (A1PI) augmentation therapy (Prolastin-C, Aralast NP, Zemaira — IV infusions weekly) is the only FDA-approved disease-modifying therapy for lung disease in AATD."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Work-Related Asthma","symptoms":"Asthma symptoms (wheeze, cough, dyspnea) triggered by or worsened by workplace exposures","goal":"Remove from occupational trigger; control inflammation; prevent lung function loss","soc":"Remove from causative workplace exposure. ICS-LABA (same as occupational asthma SoC: budesonide-formoterol or fluticasone-salmeterol). Short-acting SABA rescue."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Air Pollution–Related Illness","symptoms":"Exacerbated asthma, COPD, reduced lung function, cardiovascular stress","goal":"Control exacerbations; improve lung protection; reduce systemic inflammation","soc":"No specific pharmacotherapy for air pollution-related illness per se. Standard treatment of triggered conditions (bronchodilators for asthma/COPD exacerbations). Avoidance is primary prevention."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Asbestosis","symptoms":"Progressive dyspnea, bilateral basal crackles, restrictive lung disease from asbestos fibers","goal":"Slow progression; reduce symptoms; prevent complications","soc":"No disease-modifying pharmacotherapy proven for asbestosis. Symptomatic management, pulmonary rehabilitation, oxygen for hypoxemia. Anti-fibrotics (nintedanib, pirfenidone) used off-label by analogy with IPF."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Coal Worker Pneumoconiosis","symptoms":"Occupational dust-induced progressive lung fibrosis; cough, dyspnea","goal":"Slow progression; relieve symptoms; prevent complications","soc":"No disease-modifying pharmacotherapy approved. Remove from coal dust exposure. Symptomatic: bronchodilators for obstruction; oxygen for hypoxemia."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Building-Related Illnesses","symptoms":"Respiratory/mucous membrane symptoms, fatigue tied to specific building exposure","goal":"Remove patient from exposure; treat specific triggered conditions","soc":"Identification and remediation of building exposure is primary. Treat underlying triggered conditions (asthma, hypersensitivity pneumonitis) per standard protocols."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Asbestos-Related Pleural Disease","symptoms":"Pleural plaques, thickening, effusion; breathlessness; no malignancy","goal":"Symptomatic relief; monitor for progression to mesothelioma","soc":"No specific pharmacotherapy. Symptomatic management (analgesics for pain). Regular surveillance imaging. Smoking cessation."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Silicosis","symptoms":"Progressive dyspnea, chronic cough, nodular lung opacities; occupational silica dust exposure","goal":"Slow progression; prevent complications (TB, lung cancer, respiratory failure)","soc":"No pharmacologic disease-modifying therapy. Silica exposure cessation mandatory. Supportive: bronchodilators, supplemental oxygen, TB prophylaxis (silicosis triples TB risk)."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Irritant Gas Inhalation Injury","symptoms":"Acute cough, bronchospasm, mucosal irritation; potentially ARDS","goal":"Support airway; reduce inflammation; treat bronchospasm","soc":"Remove from exposure. Bronchodilators (albuterol nebulized) for bronchospasm. Systemic corticosteroids for severe cases."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Beryllium Disease","symptoms":"Occupational granulomatous lung disease mimicking sarcoidosis; beryllium sensitization","goal":"Reduce granulomatous inflammation; preserve lung function","soc":"Corticosteroids (prednisone 40–60 mg/day) when symptomatic. Remove from beryllium exposure."},{"ta":"Pulmonary and Critical Care","subcategory":"Occupational and Environmental Lung Diseases","indication":"Byssinosis","symptoms":"Chest tightness and Monday breathing difficulty in textile workers (cotton dust)","goal":"Relieve airflow obstruction; prevent progression to chronic lung disease","soc":"Remove from cotton dust exposure. Bronchodilators (SABAs, LABAs) and ICS for symptomatic obstruction."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Solitary Pulmonary Nodule","symptoms":"Usually asymptomatic; incidental finding on CT; may represent malignancy or benign granuloma","goal":"Risk-stratify; diagnose malignancy; guide watchful waiting vs. biopsy/resection","soc":"No pharmacologic SoC; management is diagnostic (CT surveillance, PET, biopsy) per Fleischner Society guidelines."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Vocal Fold Dysfunction","symptoms":"Episodic stridor, throat tightness, dyspnea during exercise or stress; normal spirometry at rest","goal":"Abort acute episodes; prevent recurrences through behavioral therapy","soc":"Speech therapy (breathing retraining) is first-line. No pharmacologic SoC; heliox for acute episodes."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Drug-Induced Pulmonary Disease","symptoms":"Cough, dyspnea, infiltrates temporally linked to drug exposure","goal":"Stop offending drug; manage pulmonary inflammation","soc":"Discontinue offending drug (most important intervention). Systemic corticosteroids (prednisone) for significant inflammation/fibrosis."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Mediastinal Masses","symptoms":"Chest pain, dyspnea, superior vena cava syndrome, incidental finding on imaging","goal":"Diagnose and treat underlying etiology (lymphoma, thymoma, germ cell tumor)","soc":"Treatment depends on etiology: chemotherapy (e.g., ABVD for lymphoma), surgical resection for thymoma, cisplatin-based regimens for germ cell tumors."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Mesothelioma","symptoms":"Pleural effusion, chest pain, dyspnea; linked to asbestos; poor prognosis","goal":"Extend survival; control effusions; palliate symptoms","soc":"Nivolumab + ipilimumab (FDA-approved 2020, CheckMate 743) for unresectable malignant pleural mesothelioma (MPM)."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Atelectasis","symptoms":"Lung collapse, reduced breath sounds, hypoxemia, post-operative complication","goal":"Re-expand collapsed lung; restore oxygenation","soc":"Pulmonary toilet (physiotherapy, incentive spirometry) is first-line. Bronchoscopy for mucus plugging. No specific pharmacotherapy for atelectasis itself."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Mediastinitis","symptoms":"Severe chest pain, fever, dysphagia; post-surgical or descending infection from neck","goal":"Control infection; drain mediastinum; prevent septic death","soc":"Broad-spectrum IV antibiotics (vancomycin + piperacillin-tazobactam or carbapenem) plus urgent surgical drainage."},{"ta":"Pulmonary and Critical Care","subcategory":"Other Pulmonary Disorders","indication":"Pneumomediastinum","symptoms":"Sudden chest pain, subcutaneous neck crepitus, dyspnea; air in mediastinum","goal":"Resolve air; treat underlying cause; prevent tension pneumomediastinum","soc":"Supportive care: bed rest, supplemental oxygen (accelerates air reabsorption), analgesics. No pharmacologic SoC."},{"ta":"Pulmonary and Critical Care","subcategory":"Pleural Diseases","indication":"Pleural Effusion","symptoms":"Dyspnea, pleuritic chest pain, dullness to percussion, reduced breath sounds","goal":"Drain effusion; treat underlying cause; prevent recurrence","soc":"Thoracentesis for diagnosis and symptom relief. Treat underlying cause: diuretics (furosemide + spironolactone) for heart failure; antibiotics for parapneumonic; chemotherapy for malignant effusion."},{"ta":"Pulmonary and Critical Care","subcategory":"Pleural Diseases","indication":"Pleural Fibrosis and Calcification","symptoms":"Progressive dyspnea, restrictive lung defect, thickened pleura on imaging; often asbestos-linked","goal":"Manage symptoms; prevent progression; treat underlying cause","soc":"No pharmacologic therapy approved. Treat underlying cause (remove asbestos exposure). Supportive care: pulmonary rehabilitation, supplemental oxygen."},{"ta":"Pulmonary and Critical Care","subcategory":"Pleural Diseases","indication":"Viral Pleuritis","symptoms":"Sharp pleuritic chest pain worsening with breathing; friction rub; mild fever; self-limiting","goal":"Pain relief; anti-inflammatory therapy; reassurance","soc":"NSAIDs (ibuprofen 400–600 mg TID) are first-line for pain and inflammation; colchicine added for recurrent cases."},{"ta":"Pulmonary and Critical Care","subcategory":"Pleural Diseases","indication":"Pneumothorax","symptoms":"Sudden pleuritic chest pain, dyspnea, absent breath sounds on one side","goal":"Re-expand lung; prevent recurrence; remove air from pleural space","soc":"Small primary spontaneous pneumothorax: observation or needle aspiration. Large/secondary: chest tube drainage. Recurrent: video-assisted thoracoscopic surgery (VATS) pleurodesis."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Community-Acquired Pneumonia","symptoms":"Fever, productive cough, pleuritic chest pain, lobar infiltrate","goal":"Eradicate causative pathogen; resolve inflammation; prevent complications","soc":"For outpatient CAP: amoxicillin (first-line) or doxycycline; azithromycin for atypical pathogens. For hospitalized non-ICU: beta-lactam + macrolide or respiratory fluoroquinolone."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Hospital-Acquired Pneumonia","symptoms":"New lung infiltrate ≥48 hours after hospital admission; fever, purulent sputum, leukocytosis","goal":"Eradicate causative bacteria; reduce ICU stay and mortality","soc":"Empiric broad-spectrum antibiotics covering MDR organisms: piperacillin-tazobactam or carbapenems ± vancomycin/linezolid for MRSA coverage."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Pneumonia in Immunocompromised Patients","symptoms":"Fever, productive cough, dyspnea in patients with HIV, transplant, or chemotherapy","goal":"Broad pathogen coverage; restore immune function; prevent respiratory failure","soc":"Empiric broad-spectrum antibiotics: piperacillin-tazobactam or carbapenem + vancomycin ± antifungal (voriconazole) based on risk profile."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Ventilator-Associated Pneumonia","symptoms":"New pulmonary infiltrate + fever/leukocytosis/purulent secretions >48h after mechanical ventilation","goal":"Eradicate pathogens; wean from ventilator; minimize antibiotic resistance","soc":"Empiric antibiotics based on local antibiogram: piperacillin-tazobactam or cefepime + vancomycin (for MRSA risk) ± aminoglycoside or polymyxin for MDR gram-negatives."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Acute Bronchitis","symptoms":"Cough with/without sputum, low-grade fever, chest discomfort","goal":"Symptom relief; avoid unnecessary antibiotics","soc":"Supportive care (rest, fluids, analgesics) is first-line. Cough suppressants (dextromethorphan) and bronchodilators (albuterol) for significant bronchospasm. Antibiotics not indicated for viral etiology."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Aspiration Pneumonitis and Pneumonia","symptoms":"Cough, fever, hypoxia after aspiration; segmental consolidation on imaging","goal":"Treat/prevent infection; reduce lung inflammation","soc":"For aspiration pneumonia: antibiotics covering anaerobes and gram-negatives (ampicillin-sulbactam, or clindamycin + cephalosporin). For chemical pneumonitis: supportive care, no antibiotics initially."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Pneumocystis jirovecii Pneumonia","symptoms":"Subacute dyspnea, dry cough, fever, hypoxia in immunocompromised patients","goal":"Eradicate Pneumocystis; restore oxygenation; prevent recurrence","soc":"Trimethoprim-sulfamethoxazole (TMP-SMX) 15–20 mg/kg/day (trimethoprim component) for 21 days is first-line treatment."},{"ta":"Pulmonary and Critical Care","subcategory":"Pneumonias and Pulmonary Infections","indication":"Lung Abscess","symptoms":"Cough with putrid sputum, fever, weight loss, cavitary lung lesion","goal":"Eradicate infection; drain abscess; restore lung parenchyma","soc":"Prolonged antibiotics (6–8 weeks): amoxicillin-clavulanate or clindamycin + metronidazole for anaerobic coverage."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Symptoms","indication":"Cough in Adults","symptoms":"Persistent cough (>8 weeks); multiple potential etiologies","goal":"Identify and treat underlying cause; reduce cough severity and frequency","soc":"Treat underlying cause first (ICS for asthma, PPI for GERD, ACEI switch for drug-induced). Gefapixant (P2X3 antagonist) FDA-approved 2023 for refractory/unexplained chronic cough (first in class)."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Symptoms","indication":"Wheezing","symptoms":"High-pitched expiratory sound; bronchospasm; associated with asthma, COPD, cardiac wheeze","goal":"Relieve bronchospasm; identify and treat underlying cause","soc":"Short-acting β2 agonist (SABA; albuterol/salbutamol) inhaler is first-line for acute wheeze."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Symptoms","indication":"Dyspnea","symptoms":"Subjective breathlessness; distressing sensation of difficulty breathing","goal":"Reduce dyspnea symptom burden; improve exercise tolerance and quality of life","soc":"Treat underlying cause (COPD, HF, asthma). Low-dose oral/parenteral opioids (morphine, hydromorphone) most evidence-based for refractory dyspnea in palliative/advanced disease."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Symptoms","indication":"Hyperventilation Syndrome","symptoms":"Dizziness, tingling, chest pain from over-breathing; anxiety-driven","goal":"Normalize breathing pattern; treat underlying anxiety","soc":"Breathing retraining (physiotherapy/CBT-based breathing exercises) is first-line. Treat comorbid anxiety with SSRIs if present."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Symptoms","indication":"Stridor","symptoms":"High-pitched inspiratory noise from upper airway obstruction; may signal life-threatening cause","goal":"Identify and relieve obstruction; ensure airway patency","soc":"Emergent: nebulized racemic epinephrine + systemic corticosteroids (dexamethasone) for croup/post-extubation stridor. Treat underlying cause."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Symptoms","indication":"Hemoptysis","symptoms":"Coughing up blood; ranges from blood-streaked sputum to massive hemorrhage","goal":"Stop bleeding; identify and treat cause; prevent recurrence","soc":"Bronchoscopy (diagnostic and therapeutic) for massive hemoptysis. Treat underlying cause (TB: rifampin-based; CF: inhaled tobramycin; bronchiectasis: antibiotics). Tranexamic acid (antifibrinolytic) for non-massive hemoptysis."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Pulmonary Hypertension","symptoms":"Progressive dyspnea on exertion, fatigue, syncope, right heart failure","goal":"Lower pulmonary vascular resistance; improve exercise capacity; prevent RV failure","soc":"For PAH (Group 1): combination oral therapy — endothelin receptor antagonist (ambrisentan or macitentan) + PDE5 inhibitor (tadalafil or sildenafil). AMBITION trial established this as standard."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Pulmonary Embolism (PE)","symptoms":"Acute dyspnea, pleuritic chest pain, hemoptysis, tachycardia, hypoxia","goal":"Anticoagulate; prevent clot extension; reduce PE-related mortality","soc":"Anticoagulation: DOACs (rivaroxaban or apixaban) are first-line for most patients; unfractionated or LMWH heparin for high-risk/massive PE followed by DOAC."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Hepatopulmonary Syndrome","symptoms":"Hypoxemia due to intrapulmonary vascular dilation in liver disease; platypnea-orthodeoxia","goal":"Improve oxygenation; definitive cure with liver transplant","soc":"No effective pharmacotherapy proven. Liver transplant is the only definitive treatment. Supplemental oxygen for hypoxemia."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Pulmonary-Renal Syndrome","symptoms":"Alveolar hemorrhage plus rapidly progressive glomerulonephritis; hemoptysis, hematuria, dyspnea","goal":"Suppress autoimmune process; preserve renal and pulmonary function; prevent death","soc":"High-dose IV methylprednisolone + cyclophosphamide (or rituximab for ANCA-associated) + plasmapheresis for anti-GBM disease."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Diffuse Alveolar Hemorrhage","symptoms":"Hemoptysis, anemia, diffuse pulmonary infiltrates, respiratory failure","goal":"Stop bleeding; treat underlying cause; preserve lung function","soc":"High-dose IV corticosteroids (methylprednisolone 1 g/day × 3 days) plus immunosuppression for immune-mediated causes. Plasma exchange for anti-GBM or ANCA vasculitis."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Portopulmonary Hypertension","symptoms":"Progressive dyspnea, fatigue, right heart failure in cirrhosis/portal hypertension patients","goal":"Lower pulmonary artery pressure; enable liver transplant candidacy","soc":"Pulmonary arterial hypertension (PAH)-specific therapy: endothelin receptor antagonists (macitentan, ambrisentan), PDE5 inhibitors (sildenafil, tadalafil), or prostacyclin analogs (IV epoprostenol)."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Nonthrombotic Pulmonary Embolism","symptoms":"Acute dyspnea, hypoxia, chest pain following fat/air/tumor/amniotic fluid emboli","goal":"Supportive care; remove or neutralize embolic material; prevent recurrence","soc":"Supportive: supplemental oxygen, vasopressors for hemodynamic instability. Fat embolism: corticosteroids (controversial). Air embolism: Trendelenburg positioning, 100% O2, needle aspiration. No FDA-approved specific pharmacologic therapy."},{"ta":"Pulmonary and Critical Care","subcategory":"Pulmonary Vascular Diseases","indication":"Anti-Glomerular Basement Membrane (Anti-GBM) Disease","symptoms":"Rapidly progressive kidney failure, pulmonary hemorrhage, hemoptysis","goal":"Stop autoimmune attack; preserve kidney function and lung","soc":"Plasma exchange (plasmapheresis) + cyclophosphamide + high-dose corticosteroids is the standard regimen."},{"ta":"Pulmonary and Critical Care","subcategory":"Sleep-Disordered Breathing","indication":"Obstructive Sleep Apnea (OSA)","symptoms":"Loud snoring, witnessed apneas, daytime sleepiness, morning headaches","goal":"Eliminate apneas; improve sleep quality; reduce cardiovascular risk","soc":"CPAP (continuous positive airway pressure) is first-line device therapy. For pharmacotherapy: tirzepatide/GLP-1 agonists showed significant AHI reduction (2024 SURMOUNT-OSA trial); solriamfetol (Sunosi) and armodafinil for residual daytime sleepiness."},{"ta":"Pulmonary and Critical Care","subcategory":"Sleep-Disordered Breathing","indication":"Central Sleep Apnea","symptoms":"Breathing pauses during sleep without airway obstruction; fatigue, insomnia","goal":"Normalize breathing pattern; improve sleep quality and daytime function","soc":"Adaptive servo-ventilation (ASV) or positive airway pressure therapy for most forms. Acetazolamide (carbonic anhydrase inhibitor) used for high-altitude CSA and some idiopathic forms."},{"ta":"Pulmonary and Critical Care","subcategory":"Sleep-Disordered Breathing","indication":"Obstructive Sleep Apnea (OSA) in Children","symptoms":"Snoring, mouth breathing, bedwetting, behavioral problems, poor growth","goal":"Normalize breathing; improve neurobehavioral outcomes; promote growth","soc":"Adenotonsillectomy (surgical) is first-line. Montelukast (leukotriene receptor antagonist) + intranasal corticosteroids for mild pediatric OSA as pharmacologic option."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Chemical-Warfare Agent exposure","symptoms":"Varies by agent: blistering, respiratory distress, seizures, miosis","goal":"Decontaminate, reverse toxidrome, prevent death","soc":"Agent-specific antidotes: nerve agents — atropine + pralidoxime; vesicants — no antidote (supportive); pulmonary agents — supportive O2; cyanide — hydroxocobalamin or amyl nitrite kit."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Biological Agents (Mass-Casualty Weapon exposure)","symptoms":"Fever, respiratory failure, rash, hemorrhage (agent-specific)","goal":"Neutralize agent, prevent systemic spread, support vital functions","soc":"Agent-specific: anthrax — ciprofloxacin/doxycycline + raxibacumab or obiltoxaximab (antitoxin). Smallpox — tecovirimat (Tpoxx). Plague — streptomycin or doxycycline. Botulinum toxin — heptavalent antitoxin (HBAT)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Radiological Weapon exposure","symptoms":"Acute radiation syndrome, localized burns, systemic toxicity","goal":"Decontaminate, support hematopoiesis, treat radiation injury","soc":"G-CSF (filgrastim/Neupogen) and romiplostim (Nplate) — FDA-approved under Animal Rule for H-ARS. Prussian blue (Radiogardase) for cesium-137 and thallium decorporation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Toxins as Mass-Casualty Weapons exposure","symptoms":"Toxin-dependent: paralysis (botulinum), hemorrhage (ricin), neurotoxicity; rapid onset","goal":"Antidote administration, supportive care, mass casualty management","soc":"Heptavalent botulinum antitoxin (HBAT, FDA-approved 2013) for botulinum toxin exposure; no antidote for ricin."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Nerve Chemical-Warfare Agent exposure","symptoms":"Miosis, hypersalivation, bronchospasm, seizures, paralysis, death","goal":"Reverse cholinergic excess, prevent seizure-induced brain injury","soc":"Atropine + pralidoxime (2-PAM) + diazepam — triple-drug antidote: atropine counters muscarinic excess; pralidoxime reactivates AChE; diazepam prevents seizures."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Vesicant Chemical-Warfare Agent exposure","symptoms":"Severe skin blistering, eye damage, airway burns, bone marrow suppression","goal":"Decontaminate, treat blisters, prevent infection, support hematopoiesis","soc":"None specific antidote — decontamination (water + soap), wound care; British Anti-Lewisite (BAL/dimercaprol) for lewisite only."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Systemic Asphyxiant Chemical-Warfare Agent exposure","symptoms":"Dyspnea, seizures, cardiovascular collapse, tissue hypoxia (cyanide-like)","goal":"Restore cellular oxygen utilization, prevent cardiovascular collapse","soc":"Hydroxocobalamin (Cyanokit 5g IV) and/or sodium thiosulfate + sodium nitrite (Nithiodote) for cyanide-based agents; high-flow O2."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Anticholinergic Chemical-Warfare Compound exposure","symptoms":"Confusion, hallucinations, dry skin, tachycardia, urinary retention","goal":"Reverse anticholinergic toxidrome, restore CNS function","soc":"Physostigmine (acetylcholinesterase inhibitor) — IV/IM — antidote for central anticholinergic syndrome; used in mass casualty/military settings."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Incendiary Chemical-Warfare Agent and Hydrogen Fluoride (HF) exposure","symptoms":"Severe burns, hypocalcemia (HF), deep tissue destruction, systemic toxicity","goal":"Replace calcium (HF), wound care, prevent cardiac arrest","soc":"Calcium gluconate (topical gel, SC injection, or IV) — specific antidote for HF poisoning to chelate fluoride ions and prevent hypocalcemia/cardiac toxicity."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Riot-Control Chemical Agent exposure","symptoms":"Eye pain, tearing, burning skin, cough, nasal discharge","goal":"Decontaminate, relieve irritation, manage airway symptoms","soc":"None pharmacologic — decontamination with water/saline irrigation; topical ophthalmologic anesthetics for eye pain; bronchodilators for respiratory symptoms."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Chemical and Radiological Warfare Agents","indication":"Pulmonary Chemical-Warfare Agent exposure","symptoms":"Cough, dyspnea, pulmonary edema, c
