<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Therapeutic Areas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ─────────────────────────────────── */
:root,[data-theme="light"]{
  --bg:#f5f4f0;--surface:#fafaf7;--surface-2:#ffffff;
  --border:oklch(0.25 0.01 80/0.1);--divider:oklch(0.25 0.01 80/0.07);
  --text:#1a1916;--muted:#6b6a67;--faint:#b0afab;
  --accent:#01696f;--accent-h:#0c4e54;--accent-hl:#d4e8e6;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.09);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.13);
  --font-body:'Inter','Helvetica Neue',sans-serif;
  --font-display:'Instrument Serif',Georgia,serif;
  --ease:180ms cubic-bezier(0.16,1,0.3,1);
  --text-xs:clamp(0.75rem,0.7rem+0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem+0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem+0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem+0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem+1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem+2.5vw,3.5rem);
}
[data-theme="dark"]{
  --bg:#141312;--surface:#1a1917;--surface-2:#1f1e1c;
  --border:oklch(0.9 0 0/0.08);--divider:oklch(0.9 0 0/0.05);
  --text:#d0cfc8;--muted:#787670;--faint:#4a4946;
  --accent:#4f98a3;--accent-h:#3a818c;--accent-hl:#1f3436;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.25);
  --shadow-md:0 4px 12px oklch(0 0 0/0.35);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.45);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --bg:#141312;--surface:#1a1917;--surface-2:#1f1e1c;
  --border:oklch(0.9 0 0/0.08);--divider:oklch(0.9 0 0/0.05);
  --text:#d0cfc8;--muted:#787670;--faint:#4a4946;
  --accent:#4f98a3;--accent-h:#3a818c;--accent-hl:#1f3436;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.25);
  --shadow-md:0 4px 12px oklch(0 0 0/0.35);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.45);
}}

/* ── Reset ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth;scroll-padding-top:5rem}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--text);background:var(--bg);line-height:1.6}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
table{border-collapse:collapse;width:100%}
p,li{max-width:72ch;text-wrap:pretty}
h1,h2,h3,h4{text-wrap:balance;line-height:1.2}
::selection{background:oklch(from var(--accent) l c h/0.2);color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── Layout ────────────────────────────────────────── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:oklch(from var(--bg) l c h/0.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--divider);
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:3.5rem;
  max-width:100%;
}
.logo{
  display:flex;align-items:center;gap:0.625rem;
  font-family:var(--font-display);font-size:1.25rem;letter-spacing:-0.01em;
  cursor:pointer;
}
.logo svg{flex-shrink:0;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:0.5rem}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:0.625rem;color:var(--muted);pointer-events:none;flex-shrink:0}
#search{
  padding:0.4rem 0.75rem 0.4rem 2rem;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-full,9999px);
  font-size:var(--text-sm);color:var(--text);
  width:220px;transition:border-color var(--ease),width var(--ease);
}
#search:focus{outline:none;border-color:var(--accent);width:280px}
#search::placeholder{color:var(--faint)}
.theme-btn{
  display:flex;align-items:center;justify-content:center;
  width:2.25rem;height:2.25rem;border-radius:var(--radius-md);
  color:var(--muted);transition:background var(--ease),color var(--ease);
}
.theme-btn:hover{background:var(--surface-2);color:var(--text)}

/* ── Home view ─────────────────────────────────────── */
#home{padding:3rem 2rem 4rem}
.home-hero{margin-bottom:2.5rem}
.home-hero h1{font-family:var(--font-display);font-size:var(--text-2xl);letter-spacing:-0.02em;margin-bottom:0.5rem}
.home-hero p{color:var(--muted);font-size:var(--text-sm);max-width:60ch}
.stats-row{display:flex;gap:2rem;margin-top:1rem}
.stat{display:flex;flex-direction:column}
.stat-num{font-size:1.25rem;font-weight:700;color:var(--accent);line-height:1}
.stat-label{font-size:var(--text-xs);color:var(--muted);margin-top:0.2rem}

.ta-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(260px,100%),1fr));
  gap:1px;
  background:var(--divider);
  border:1px solid var(--divider);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.ta-card{
  background:var(--surface);padding:1.25rem 1.5rem;
  cursor:pointer;
  transition:background var(--ease);
  display:flex;align-items:flex-start;gap:1rem;
}
.ta-card:hover{background:var(--surface-2)}
.ta-card:active{background:var(--accent-hl)}
.ta-icon{
  width:2.25rem;height:2.25rem;border-radius:var(--radius-md);
  background:var(--accent-hl);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--accent);font-size:1rem;margin-top:0.1rem;
}
.ta-info{flex:1;min-width:0}
.ta-name{font-size:var(--text-sm);font-weight:600;color:var(--text);line-height:1.3}
.ta-meta{font-size:var(--text-xs);color:var(--muted);margin-top:0.25rem}

/* ── TA Detail view ─────────────────────────────────── */
#detail{display:none;padding:2rem 2rem 4rem}
.back-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-size:var(--text-sm);color:var(--muted);margin-bottom:1.5rem;
  transition:color var(--ease);padding:0.25rem 0;
}
.back-btn:hover{color:var(--accent)}
.detail-hero{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--divider)}
.detail-hero h1{font-family:var(--font-display);font-size:var(--text-xl);letter-spacing:-0.02em}
.detail-meta{font-size:var(--text-xs);color:var(--muted);margin-top:0.4rem;display:flex;gap:1.5rem}

/* search bar on detail */
.detail-controls{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.detail-search-wrap{position:relative;flex:1;min-width:180px;max-width:380px}
.detail-search-wrap svg{position:absolute;left:0.625rem;top:50%;transform:translateY(-50%);color:var(--muted)}
#detail-search{
  width:100%;padding:0.45rem 0.75rem 0.45rem 2rem;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-full,9999px);font-size:var(--text-sm);color:var(--text);
  transition:border-color var(--ease);
}
#detail-search:focus{outline:none;border-color:var(--accent)}
#detail-search::placeholder{color:var(--faint)}
.result-count{font-size:var(--text-xs);color:var(--muted);white-space:nowrap}

/* ── Subcategory accordion ───────────────────────────── */
.sub-group{border:1px solid var(--divider);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:0.75rem;box-shadow:var(--shadow-sm)}
.sub-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.875rem 1.25rem;background:var(--surface);
  cursor:pointer;user-select:none;gap:1rem;
  transition:background var(--ease);
}
.sub-header:hover{background:var(--surface-2)}
.sub-header-left{display:flex;align-items:center;gap:0.75rem;min-width:0}
.sub-name{font-size:var(--text-sm);font-weight:600;color:var(--text)}
.sub-badge{
  font-size:var(--text-xs);color:var(--accent);background:var(--accent-hl);
  padding:0.15rem 0.5rem;border-radius:var(--radius-full,9999px);
  white-space:nowrap;flex-shrink:0;font-weight:500;
}
.chevron{
  color:var(--muted);flex-shrink:0;
  transition:transform var(--ease),color var(--ease);
}
.sub-group.open .chevron{transform:rotate(180deg);color:var(--accent)}
.sub-body{
  display:none;overflow:auto;
  border-top:1px solid var(--divider);
}
.sub-group.open .sub-body{display:block}

/* ── Disease table ──────────────────────────────────── */
.disease-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.disease-table thead th{
  background:var(--surface);padding:0.625rem 1rem;
  text-align:left;font-size:var(--text-xs);font-weight:600;
  color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;
  border-bottom:1px solid var(--divider);
  position:sticky;top:0;white-space:nowrap;
}
.disease-table tbody tr{
  border-bottom:1px solid var(--divider);
  transition:background var(--ease);
}
.disease-table tbody tr:last-child{border-bottom:none}
.disease-table tbody tr:hover{background:oklch(from var(--accent) l c h/0.04)}
.disease-table td{padding:0.75rem 1rem;vertical-align:top;line-height:1.5}
.td-indication{
  font-weight:500;color:var(--text);min-width:180px;max-width:220px;
}
.td-symptoms{color:var(--text);max-width:280px}
.td-goal{color:var(--muted);max-width:220px}
.td-soc{color:var(--muted);max-width:340px}
.disease-table td.td-symptoms,
.disease-table td.td-goal,
.disease-table td.td-soc{font-size:var(--text-xs)}

/* truncate long cells */
.cell-truncate{
  display:-webkit-box;-webkit-line-clamp:3;
  -webkit-box-orient:vertical;overflow:hidden;
}

/* ── No results ─────────────────────────────────────── */
.no-results{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4rem 2rem;color:var(--muted);text-align:center;gap:1rem;
}
.no-results svg{color:var(--faint)}
.no-results strong{color:var(--text);font-size:var(--text-sm)}

/* ── Highlight ──────────────────────────────────────── */
mark{background:oklch(from var(--accent) l c h/0.2);color:inherit;border-radius:2px;padding:0 2px}

/* ── TA icon emoji map ─────────────────────────────── */
/* handled in JS */

/* ── Responsive ─────────────────────────────────────── */
@media(max-width:640px){
  .header-inner{padding:0 1rem}
  #search{width:140px}.#search:focus{width:180px}
  #home,#detail{padding:1.5rem 1rem 3rem}
  .stats-row{gap:1.25rem}
  .detail-table-scroll{overflow-x:auto}
}
</style>
</head>
<body>

<a href="#main-content" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;focus:{left:0;width:auto;height:auto}">Skip to content</a>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo" onclick="showHome()" tabindex="0" role="button" aria-label="Go to homepage">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Therapeutic Areas
    </div>
    <div class="header-right">
      <div class="search-wrap" id="home-search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search" placeholder="Search diseases…" aria-label="Search all diseases">
      </div>
      <button class="theme-btn" data-theme-toggle aria-label="Toggle dark mode">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </div>
</header>

<main id="main-content">

<!-- HOME VIEW -->
<section id="home">
  <div class="home-hero">
    <h1>Therapeutic Areas</h1>
    <p>Select a therapeutic area to explore diseases by subcategory, with symptoms, treatment goals, and standard of care.</p>
    <div class="stats-row" id="stats-row"></div>
  </div>
  <div class="ta-grid" id="ta-grid" role="list"></div>
</section>

<!-- DETAIL VIEW -->
<section id="detail" aria-live="polite">
  <button class="back-btn" onclick="showHome()" aria-label="Back to therapeutic areas">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    All Therapeutic Areas
  </button>
  <div class="detail-hero">
    <h1 id="detail-title"></h1>
    <div class="detail-meta" id="detail-meta"></div>
  </div>
  <div class="detail-controls">
    <div class="detail-search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="detail-search" placeholder="Filter within this area…" aria-label="Filter diseases">
    </div>
    <span class="result-count" id="result-count"></span>
    <button id="expand-all-btn" onclick="expandAll()" style="font-size:var(--text-xs);color:var(--muted);padding:0.3rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius-full,9999px);transition:background var(--ease),color var(--ease)">Expand all</button>
    <button id="collapse-all-btn" onclick="collapseAll()" style="font-size:var(--text-xs);color:var(--muted);padding:0.3rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius-full,9999px);transition:background var(--ease),color var(--ease)">Collapse all</button>
  </div>
  <div id="sub-groups"></div>
</section>

</main>

<script>
// ── Theme toggle ───────────────────────────────────────
(function(){
  const btn=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const sun='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const moon='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  if(btn) btn.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);btn.innerHTML=d==='dark'?sun:moon;btn.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode')});
})();

// ── TA icon map ────────────────────────────────────────
const TA_ICONS = {
  'Cardiovascular':'🫀','Dental and Oral Health':'🦷','Dermatology':'🧬',
  'Endocrine and Metabolic':'⚗️','Gastrointestinal':'🫃','General Medicine':'🏥',
  'Hematology':'🩸','Immunology':'🛡️','Infectious Disease':'🦠',
  'Musculoskeletal and Rheumatology':'🦴','Neurosciences':'🧠','Oncology':'🔬',
  'Ophthalmology':'👁️','Otolaryngology':'👂','Pediatrics':'👶',
  'Pulmonary and Critical Care':'🫁','Trauma, Toxicology, and Emergency Medicine':'🚑',
  'Urology and Nephrology':'💊',"Women's Health":'⚕️'
};

// ── Data ───────────────────────────────────────────────
const DATA = [{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Hypertrophic Cardiomyopathy Arrhythmias","symptoms":"Palpitations, syncope, AF, ventricular arrhythmias, SCD risk","goal":"Reduce arrhythmia burden, prevent SCD and AF-related stroke","soc":"Beta-blockers or verapamil for symptom control. Amiodarone or disopyramide for AF/VT. Anticoagulation (DOACs) for AF. ICD for high SCD risk."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Long QT Interval Syndromes","symptoms":"Prolonged QTc on ECG, syncope, torsades de pointes, sudden cardiac death","goal":"Shorten QTc, prevent torsades de pointes and sudden cardiac death","soc":"Beta-blockers (nadolol or propranolol) are first-line for LQT1 and LQT2. Mexiletine is first-line adjunct for LQT3. Avoid QT-prolonging drugs."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Isolated Progressive Cardiac Conduction Disease","symptoms":"Progressive heart block, bradycardia, syncope, pacemaker dependency","goal":"Restore conduction, prevent complete heart block and sudden death","soc":"Pacemaker implantation is the definitive treatment for symptomatic high-degree AV block. No approved pharmacologic SoC for the underlying progressive conduction disease."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Brugada Syndrome","symptoms":"Syncope, sudden cardiac death (often nocturnal), abnormal ECG (Type 1 pattern)","goal":"Prevent VF and sudden cardiac death","soc":"ICD implantation is first-line for patients with prior VF or spontaneous Type 1 ECG with symptoms. For fever-triggered events: antipyretics. Quinidine (class IA) or isoproterenol for electrical storm."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Cardiac Sarcoidosis","symptoms":"Heart block, ventricular arrhythmias, heart failure, sudden cardiac death","goal":"Suppress inflammation, prevent arrhythmias and heart block progression","soc":"Corticosteroids (prednisone 30–40 mg/day tapered) are first-line to suppress granulomatous inflammation and improve conduction."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Arrhythmogenic Right Ventricular Cardiomyopathy","symptoms":"Palpitations, syncope, ventricular arrhythmias, right ventricular failure","goal":"Prevent sudden cardiac death, control arrhythmias, slow progression","soc":"ICD implantation for SCD prevention in high-risk patients. Beta-blockers (sotalol, metoprolol) as first-line antiarrhythmic therapy."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Non-Compaction Cardiomyopathy","symptoms":"Heart failure, arrhythmias, thromboemboli, prominent trabeculations on echo","goal":"Prevent HF progression, arrhythmias, and thromboembolic events","soc":"Standard HFrEF therapy (ACEi/ARB/ARNI + beta-blocker + MRA + SGLT2i) for those with reduced ejection fraction. Anticoagulation for LV thrombus or severe dysfunction."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Lamin A/C Cardiomyopathies (Cardiolaminopathies)","symptoms":"Arrhythmias, heart block, dilated cardiomyopathy, skeletal muscle weakness","goal":"Prevent sudden cardiac death, manage HF, slow cardiomyopathy progression","soc":"ICD implantation is strongly recommended for LMNA mutation carriers with arrhythmias or EF <45%. Beta-blockers and ACE inhibitors/ARBs for HF management."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Catecholaminergic Polymorphic Ventricular Tachycardia","symptoms":"Exercise/emotion-triggered syncope, bidirectional VT, sudden cardiac death","goal":"Prevent exercise-induced VT/VF and sudden cardiac death","soc":"Beta-blockers (nadolol preferred over metoprolol for RyR2 mutation carriers) are first-line pharmacologic therapy; flecainide as add-on for breakthrough VT."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Early Repolarization Syndrome","symptoms":"Often asymptomatic; VF, sudden cardiac death in young, idiopathic","goal":"Prevent VF and sudden cardiac death in high-risk patients","soc":"ICD implantation for survivors of VF. Quinidine for recurrent VF or ICD shocks. No approved drug-specific SoC beyond ICD."},{"ta":"Cardiovascular","subcategory":"Arrhythmogenic Cardiac Disorders","indication":"Short QT Interval Syndromes","symptoms":"Shortened QTc on ECG, palpitations, AF, sudden cardiac death","goal":"Prevent VF and sudden cardiac death; lengthen QT interval","soc":"ICD implantation for survivors of VF or high-risk patients. Quinidine (increases QT interval) is the primary pharmacologic option for SQT1."},{"ta":"Cardiovascular","subcategory":"Arteriosclerosis","indication":"Atherosclerosis","symptoms":"Chest pain, leg pain with walking, stroke, heart attack, silent arterial narrowing","goal":"Reduce LDL, prevent MACE (MI, stroke, CV death)","soc":"High-intensity statins (atorvastatin 40–80mg, rosuvastatin 20–40mg) are first-line for LDL reduction and CV risk reduction."},{"ta":"Cardiovascular","subcategory":"Arteriosclerosis","indication":"Nonatheromatous Arteriosclerosis","symptoms":"Stiff arteries, elevated pulse pressure, heart failure with preserved EF, kidney disease","goal":"Reduce arterial stiffness, control hypertension, prevent organ damage","soc":"Antihypertensive therapy (ACEi/ARB, dihydropyridine CCBs) to control blood pressure and reduce arterial wall stress."},{"ta":"Cardiovascular","subcategory":"Cardiac Tumors","indication":"Cardiac Tumors","symptoms":"Emboli, obstruction, arrhythmias, dyspnea, constitutional symptoms (variable by type)","goal":"Remove tumor surgically; prevent embolic complications; palliative control for malignant","soc":"Surgical resection is first-line for benign primary cardiac tumors (myxoma, fibroelastoma). No pharmacologic SoC for primary cardiac tumors. Systemic chemotherapy (anthracycline-based) for primary cardiac sarcomas."},{"ta":"Cardiovascular","subcategory":"Cardiomyopathies","indication":"Restrictive Cardiomyopathy","symptoms":"Severe dyspnea, edema, ascites, elevated JVP, HF with preserved EF","goal":"Manage fluid overload, treat underlying cause, bridge to transplant","soc":"Diuretics (loop diuretics: furosemide, torsemide) for fluid management. Treatment of underlying cause (amyloidosis, sarcoidosis, hemochromatosis) is paramount."},{"ta":"Cardiovascular","subcategory":"Cardiomyopathies","indication":"Hypertrophic Cardiomyopathy","symptoms":"Exertional dyspnea, chest pain, syncope, palpitations, heart failure","goal":"Reduce LVOT obstruction, improve symptoms, prevent SCD","soc":"Beta-blockers (metoprolol, atenolol) or non-dihydropyridine CCBs (verapamil) for obstructive symptoms. Mavacamten (Camzyos, cardiac myosin inhibitor) FDA-approved 2022 for obstructive HCM (oHCM) — now first-line option per 2024 AHA/ACC guidelines."},{"ta":"Cardiovascular","subcategory":"Cardiomyopathies","indication":"Dilated Cardiomyopathy","symptoms":"Progressive breathlessness, edema, fatigue, reduced exercise tolerance","goal":"Improve EF, reduce hospitalizations and mortality, prevent SCD","soc":"RAAS inhibitors (ACEi or ARNI: sacubitril/valsartan/Entresto) + beta-blockers (carvedilol, metoprolol succinate) as cornerstone first-line therapy."},{"ta":"Cardiovascular","subcategory":"Coronary Artery Disease","indication":"Angina Pectoris","symptoms":"Chest tightness, pressure, or burning with exertion, relieved by rest/nitroglycerin","goal":"Eliminate angina, improve exercise tolerance, prevent MI","soc":"Short-acting nitroglycerin for acute relief + beta-blockers as first-line for chronic stable angina prevention. CCBs (amlodipine, diltiazem) as alternatives."},{"ta":"Cardiovascular","subcategory":"Coronary Artery Disease","indication":"Acute Coronary Syndromes (ACS)","symptoms":"Chest pain at rest or minimal exertion, diaphoresis, dyspnea, ST changes","goal":"Restore coronary perfusion, prevent reinfarction, reduce mortality","soc":"Dual antiplatelet therapy (aspirin + P2Y12 inhibitor: ticagrelor/Brilinta or prasugrel/Effient preferred over clopidogrel) + anticoagulation (heparin/enoxaparin) + high-intensity statin initiated immediately."},{"ta":"Cardiovascular","subcategory":"Coronary Artery Disease","indication":"Acute Myocardial Infarction (MI)","symptoms":"Severe chest pain, diaphoresis, nausea, ST elevation, troponin rise","goal":"Restore perfusion, limit infarct size, prevent HF and recurrent events","soc":"Primary PCI + aspirin + P2Y12 inhibitor (ticagrelor/prasugrel) + anticoagulation + high-intensity statin. Beta-blockers and ACEi initiated post-MI."},{"ta":"Cardiovascular","subcategory":"Coronary Artery Disease","indication":"Microvascular Angina","symptoms":"Chest pain without obstructive CAD, exertional/rest symptoms, abnormal perfusion","goal":"Reduce ischemia, relieve chest pain, improve quality of life","soc":"Beta-blockers and long-acting nitrates are typically first-line. ACEi/ARB for endothelial dysfunction. Ranolazine for refractory symptoms."},{"ta":"Cardiovascular","subcategory":"Coronary Artery Disease","indication":"Unstable Angina","symptoms":"New or worsening chest pain at rest or minimal activity, without troponin rise","goal":"Prevent MI, stabilize plaque, relieve ischemia","soc":"Aspirin + P2Y12 inhibitor (clopidogrel or ticagrelor) + anticoagulation (heparin/enoxaparin) + high-intensity statin + nitrates for symptom relief."},{"ta":"Cardiovascular","subcategory":"Coronary Artery Disease","indication":"Vasospastic Angina","symptoms":"Chest pain at rest (often nocturnal), ST elevation with normal coronaries","goal":"Prevent coronary artery spasm, relieve angina, prevent MI and sudden death","soc":"Calcium channel blockers (diltiazem or amlodipine) are first-line for vasospastic/Prinzmetal angina. Long-acting nitrates as add-on."},{"ta":"Cardiovascular","subcategory":"Diseases of the Aorta and Its Branches","indication":"Aortic Aneurysms","symptoms":"Usually asymptomatic; back/chest/abdominal pain; risk of rupture","goal":"Prevent rupture through size monitoring and surgery; reduce growth rate","soc":"Statins + antihypertensive therapy (ACEi/ARB or beta-blockers) + smoking cessation for medical management. Surgical/endovascular repair based on size criteria."},{"ta":"Cardiovascular","subcategory":"Diseases of the Aorta and Its Branches","indication":"Abdominal Aortic Aneurysms (AAA)","symptoms":"Usually asymptomatic; pulsatile abdominal mass, back/abdominal pain (symptomatic)","goal":"Prevent rupture; reduce AAA growth rate; lower operative mortality","soc":"Surveillance ultrasound for small AAA (<5.5 cm). Risk factor modification: smoking cessation, statin therapy, antihypertensive agents (beta-blockers, ACEi). Surgical/endovascular repair for AAA ≥5.5 cm or rapid growth."},{"ta":"Cardiovascular","subcategory":"Diseases of the Aorta and Its Branches","indication":"Thoracic Aortic Aneurysms","symptoms":"Usually asymptomatic; hoarseness, dysphagia (compression symptoms); rupture risk","goal":"Prevent rupture; control growth with BP/HR management; timely surgery","soc":"Beta-blockers to reduce aortic wall stress (HR target <60). ACEi/ARB for additional RAAS blockade. Statins for co-existing atherosclerosis. Surgical repair for ≥5.5 cm (bicuspid AV: ≥5.0 cm)."},{"ta":"Cardiovascular","subcategory":"Diseases of the Aorta and Its Branches","indication":"Aortic Branch Aneurysms","symptoms":"Usually asymptomatic; localized pulsatile mass; rupture risk varies by location","goal":"Prevent rupture; preserve branch vessel perfusion","soc":"Statin + antihypertensive therapy for risk reduction. Surveillance imaging. Endovascular or surgical repair for large or symptomatic aneurysms."},{"ta":"Cardiovascular","subcategory":"Diseases of the Aorta and Its Branches","indication":"Aortic Dissection","symptoms":"Sudden severe 'tearing' chest/back pain radiating to abdomen, BP differential between arms","goal":"Control BP/heart rate acutely; prevent propagation and aortic rupture","soc":"IV beta-blocker (esmolol, labetalol) to target HR <60 and SBP 100–120 mmHg is first-line acute pharmacologic treatment. Type A: emergency surgery. Type B: medical management ± TEVAR."},{"ta":"Cardiovascular","subcategory":"Diseases of the Aorta and Its Branches","indication":"Aortitis","symptoms":"Fever, weight loss, elevated ESR/CRP, aortic wall thickening/enhancement on imaging","goal":"Suppress vascular inflammation, prevent aortic complications","soc":"High-dose corticosteroids (prednisone 40–60 mg/day) are first-line for inflammatory aortitis (Takayasu, giant cell). Antibiotics (for infectious syphilitic/bacterial aortitis)."},{"ta":"Cardiovascular","subcategory":"Diseases of the Aorta and Its Branches","indication":"Abdominal Aortic Branch Occlusion","symptoms":"Leg weakness, buttock/hip pain, erectile dysfunction (Leriche syndrome), absent femoral pulses","goal":"Restore perfusion, prevent limb loss and ischemic complications","soc":"Antiplatelet therapy (aspirin ± clopidogrel), statins, and antihypertensives for risk factor modification. Revascularization (aortobifemoral bypass or endovascular stenting) for symptomatic complete occlusion."},{"ta":"Cardiovascular","subcategory":"Endocarditis","indication":"Infective Endocarditis","symptoms":"Fever, new heart murmur, emboli, fatigue, positive blood cultures","goal":"Eradicate infection, prevent emboli and valve destruction, repair valves","soc":"High-dose bactericidal IV antibiotics guided by organism and susceptibility (penicillin/nafcillin/vancomycin for streptococcal/staphylococcal IE); typically 4–6 weeks of IV therapy."},{"ta":"Cardiovascular","subcategory":"Endocarditis","indication":"Noninfective Endocarditis","symptoms":"Embolic stroke/TIA, fever absent, sterile vegetations, associated with malignancy or autoimmune disease","goal":"Prevent emboli, treat underlying cause (malignancy/SLE/APS)","soc":"Anticoagulation (UFH or LMWH — warfarin less effective for NBTE) to prevent emboli. Treat underlying cause (cancer, SLE, APS)."},{"ta":"Cardiovascular","subcategory":"Heart Failure","indication":"Chronic Heart Failure","symptoms":"Persistent dyspnea, fatigue, ankle swelling, reduced exercise tolerance","goal":"Reduce mortality and hospitalizations, improve symptoms and QoL","soc":"Guideline-directed quadruple medical therapy: ARNI (sacubitril/valsartan/Entresto) + beta-blocker (carvedilol/metoprolol succinate) + MRA (spironolactone/eplerenone) + SGLT2 inhibitor (dapagliflozin or empagliflozin)."},{"ta":"Cardiovascular","subcategory":"Heart Failure","indication":"Acute Heart Failure","symptoms":"Sudden severe dyspnea, orthopnea, frothy sputum, diaphoresis, low saturation","goal":"Rapidly relieve congestion, restore hemodynamic stability, prevent end-organ damage","soc":"IV loop diuretics (furosemide/bumetanide) are first-line for decongestive acute HF. IV vasodilators (nitroglycerin, nesiritide) for hypertensive acute HF. Inotropes (dobutamine, milrinone) for cardiogenic shock."},{"ta":"Cardiovascular","subcategory":"Heart Failure","indication":"Right Heart Failure and Cor Pulmonale","symptoms":"Leg edema, ascites, raised JVP, dyspnea, reduced exercise tolerance","goal":"Reduce pulmonary vascular resistance, relieve RV pressure overload, treat underlying cause","soc":"Treat underlying cause (pulmonary hypertension, COPD, PE). Diuretics for fluid overload. PAH-specific drugs for Group 1 PH: PDE5 inhibitors (sildenafil, tadalafil) or endothelin receptor antagonists (ambrisentan, macitentan) as first-line combination."},{"ta":"Cardiovascular","subcategory":"Heart Failure","indication":"Pulmonary Edema","symptoms":"Acute severe dyspnea, frothy pink sputum, crackles, desaturation, orthopnea","goal":"Rapidly reduce pulmonary venous pressure, restore oxygenation","soc":"IV furosemide (immediate diuresis) + oxygen/NIV (CPAP/BiPAP) + IV nitroglycerin (vasodilation, reduces preload) are the acute first-line triad."},{"ta":"Cardiovascular","subcategory":"Hypertension","indication":"Hypertension","symptoms":"Usually asymptomatic; headache, blurred vision in severe cases; end-organ damage","goal":"Lower BP to <130/80 mmHg, prevent MACE and end-organ damage","soc":"Thiazide diuretics, dihydropyridine CCBs (amlodipine), or ACEi/ARBs are each acceptable first-line agents; combination recommended for most patients with BP ≥20/10 mmHg above goal."},{"ta":"Cardiovascular","subcategory":"Hypertension","indication":"Renovascular Hypertension","symptoms":"Refractory hypertension, flash pulmonary edema, acute renal failure on ACEi, bruits","goal":"Control BP, preserve renal function, revascularize if functionally significant stenosis","soc":"ACEi/ARBs (caution: monitor renal function) + other antihypertensives. Percutaneous renal angioplasty/stenting for FMD; medical management preferred for atherosclerotic RAS per CORAL trial."},{"ta":"Cardiovascular","subcategory":"Hypertension","indication":"Hypertensive Emergencies","symptoms":"Severe BP elevation (>180/120) with acute end-organ damage: encephalopathy, MI, aortic dissection, acute HF","goal":"Rapidly lower BP by 20–25% in first hour, prevent further end-organ damage","soc":"IV labetalol or nicardipine are first-line IV antihypertensives for most hypertensive emergencies. IV nitroprusside for aortic dissection. IV nitroglycerin for ACS-associated HTN."},{"ta":"Cardiovascular","subcategory":"Lymphatic Disorders","indication":"Lymphedema","symptoms":"Persistent limb swelling, heaviness, skin changes, recurrent cellulitis","goal":"Reduce limb volume, prevent fibrosis, improve function and QoL","soc":"Complete decongestive therapy (CDT): manual lymphatic drainage + multilayer compression bandaging + exercise + skin care. No FDA-approved pharmacologic disease-modifying treatment as of 2025."},{"ta":"Cardiovascular","subcategory":"Lymphatic Disorders","indication":"Lymphadenopathy","symptoms":"Enlarged lymph nodes (localized or generalized), tenderness, fever, night sweats (depending on cause)","goal":"Identify and treat underlying cause; reduce node enlargement if malignant or infectious","soc":"Treat underlying cause: antibiotics for infectious (bacterial lymphadenitis); antiviral for viral; chemotherapy/immunotherapy for malignant causes. No specific pharmacologic SoC for reactive lymphadenopathy."},{"ta":"Cardiovascular","subcategory":"Myocarditis and Pericarditis","indication":"Myocarditis","symptoms":"Chest pain, dyspnea, palpitations, fever, acute heart failure, arrhythmias","goal":"Reduce cardiac inflammation, preserve LV function, prevent arrhythmic death","soc":"Supportive care with HF therapy (ACEi, beta-blockers) for LV dysfunction. NSAIDs/colchicine for pericarditic chest pain component. Antiviral therapy if specific virus identified (rarely applicable)."},{"ta":"Cardiovascular","subcategory":"Myocarditis and Pericarditis","indication":"Pericarditis","symptoms":"Sharp pleuritic chest pain relieved by sitting forward, pericardial rub, ST elevation","goal":"Resolve inflammation, prevent recurrence and constrictive pericarditis","soc":"Aspirin + colchicine (anti-IL-1β mechanism) is first-line combination for acute and recurrent pericarditis."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Peripheral Artery Disease","symptoms":"Calf or thigh pain with walking (claudication), leg wounds, rest pain, limb loss","goal":"Improve walking distance, prevent limb loss and cardiovascular events","soc":"Supervised exercise therapy + antiplatelet therapy (aspirin ± clopidogrel; or rivaroxaban 2.5mg BID + aspirin per COMPASS for high-risk PAD) + statin + ACEi/ARB."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Raynaud Phenomenon","symptoms":"Color changes in fingers/toes with cold exposure (white→blue→red), pain, numbness","goal":"Reduce frequency and severity of vasospastic attacks, prevent digital ulcers","soc":"Dihydropyridine calcium channel blockers (nifedipine ER, amlodipine) are first-line pharmacologic treatment."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Erythromelalgia","symptoms":"Burning pain, redness and warmth in extremities, triggered by heat or exercise","goal":"Reduce frequency and severity of flares, improve pain control","soc":"Aspirin is first-line for secondary erythromelalgia associated with myeloproliferative disorders. For primary/genetic (SCN9A mutation): cooling measures and sodium channel blockers (mexiletine)."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Fibromuscular Dysplasia","symptoms":"Hypertension (renal FMD), headache, pulsatile tinnitus, cervical bruit, spontaneous arterial dissection","goal":"Control hypertension, prevent arterial dissection and stroke","soc":"Antiplatelet therapy (aspirin 100mg/day) for FMD with cerebrovascular involvement. Antihypertensives (ACEi/ARB or CCB) for renal FMD. Percutaneous transluminal angioplasty (PTA) for symptomatic stenoses."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Thromboangiitis Obliterans","symptoms":"Foot/hand pain, digital ulcers, rest pain, claudication in young smokers","goal":"Complete smoking cessation, preserve limbs, prevent amputations","soc":"Complete tobacco cessation is the only proven treatment to halt disease progression. Pharmacologic: prostanoids (IV iloprost or oral beraprost) for digital ischemia."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Acute Limb Ischemia","symptoms":"Sudden severe limb pain, pallor, pulselessness, paresthesias, paralysis (6 Ps)","goal":"Urgent restoration of arterial flow to prevent amputation and death","soc":"IV unfractionated heparin immediately upon diagnosis. Emergent revascularization: catheter-directed thrombolysis (CDT) or surgical embolectomy/thrombectomy."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Peripheral Artery Aneurysms","symptoms":"Pulsatile mass (popliteal), distal ischemia from thromboembolism, leg pain","goal":"Prevent thrombotic/embolic complications, preserve limb perfusion","soc":"Anticoagulation (antiplatelet or systemic anticoagulation) for thromboembolism risk reduction. Surgical or endovascular repair for large/symptomatic peripheral aneurysms."},{"ta":"Cardiovascular","subcategory":"Peripheral Artery Disorders","indication":"Acrocyanosis","symptoms":"Persistent bluish discoloration of hands/feet, cold extremities, non-painful","goal":"Identify secondary cause; reassure; manage vasospasm if symptomatic","soc":"Primarily lifestyle measures (warmth, avoidance of cold). No specific pharmacologic first-line SoC for primary acrocyanosis. CCBs for symptomatic secondary causes."},{"ta":"Cardiovascular","subcategory":"Peripheral Venous Disorders","indication":"Chronic Venous Insufficiency and Post-Thrombotic Syndrome","symptoms":"Leg swelling, varicose veins, skin discoloration, venous ulcers, heaviness","goal":"Reduce edema, heal venous ulcers, prevent recurrence and progression","soc":"Compression therapy (graduated compression stockings or wraps) is first-line. Wound care for venous ulcers. Pharmacologic: rutosides or micronized purified flavonoid fraction (MPFF/Daflon) — widely used in Europe."},{"ta":"Cardiovascular","subcategory":"Peripheral Venous Disorders","indication":"Deep Venous Thrombosis (DVT)","symptoms":"Unilateral leg swelling, pain, redness, warmth; PE risk if propagates","goal":"Prevent PE, resolve thrombus, prevent post-thrombotic syndrome, avoid recurrence","soc":"Direct oral anticoagulants (DOACs) — rivaroxaban (Xarelto) or apixaban (Eliquis) are first-line anticoagulants for acute DVT treatment (preferred over LMWH/warfarin)."},{"ta":"Cardiovascular","subcategory":"Peripheral Venous Disorders","indication":"Varicose Veins","symptoms":"Twisted, bulging leg veins; aching, heaviness, swelling, itching","goal":"Relieve symptoms, prevent chronic venous insufficiency progression","soc":"Compression stockings (20–30 mmHg) are first-line conservative management. Sclerotherapy (foam or liquid) or endovenous ablation (laser, radiofrequency) for symptomatic disease requiring intervention."},{"ta":"Cardiovascular","subcategory":"Peripheral Venous Disorders","indication":"Idiopathic Telangiectasias","symptoms":"Small dilated blood vessels on skin/mucous membranes; usually cosmetic; bleeding if mucosal","goal":"Cosmetic improvement; prevent recurrent bleeding in HHT-associated telangiectasias","soc":"Laser therapy or sclerotherapy for cosmetic skin telangiectasias. For hereditary hemorrhagic telangiectasia (HHT)-related: bevacizumab (anti-VEGF) is emerging standard; iron supplementation for chronic bleeding-related anemia."},{"ta":"Cardiovascular","subcategory":"Peripheral Venous Disorders","indication":"Arteriovenous Fistula","symptoms":"Pulsatile swelling, bruit/thrill over lesion, high-output heart failure (if large)","goal":"Eliminate AV shunting, prevent high-output HF and ischemia","soc":"Endovascular embolization or surgical ligation is first-line treatment. No pharmacologic SoC for the AV fistula itself."},{"ta":"Cardiovascular","subcategory":"Peripheral Venous Disorders","indication":"Superficial Venous Thrombosis","symptoms":"Painful, red, cord-like vein on skin; local warmth, tenderness","goal":"Relieve pain, prevent DVT/PE extension","soc":"Fondaparinux 2.5 mg SC once daily for 45 days for large/proximal SVT (CALISTO trial). Topical or oral NSAIDs for symptomatic relief of small distal SVT."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Atrial Fibrillation","symptoms":"Palpitations, fatigue, shortness of breath, irregular heartbeat, dizziness","goal":"Prevent stroke, control rate/rhythm, improve quality of life","soc":"Anticoagulation (direct oral anticoagulants — apixaban, rivaroxaban preferred over warfarin) for stroke prevention in CHA₂DS₂-VASc ≥2. Rate control: beta-blockers or non-dihydropyridine CCBs (diltiazem, verapamil) as first-line."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Ventricular Premature Beats (VPB)","symptoms":"Extra heartbeats, palpitations, thumping sensation; usually benign; may cause cardiomyopathy if frequent","goal":"Reduce symptom burden; prevent VPB-induced cardiomyopathy if high burden (>10%)","soc":"Beta-blockers (metoprolol, bisoprolol) or CCBs (verapamil) are first-line for symptomatic VPBs. Reassurance for asymptomatic/low-burden VPBs."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Bundle Branch Block and Fascicular Block","symptoms":"Usually asymptomatic; may cause dizziness, syncope, or heart failure if complete","goal":"Identify and treat underlying cause; prevent progression to complete AV block","soc":"No specific pharmacologic SoC for isolated BBB/fascicular block. Underlying disease treatment (ischemia, HF) is primary. CRT (cardiac resynchronization therapy) pacemaker for LBBB with heart failure and reduced EF (≤35%)."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Sick Sinus Syndrome","symptoms":"Slow heartbeat, dizziness, syncope, fatigue, alternating fast/slow rate (tachy-brady)","goal":"Maintain adequate heart rate; manage tachy-brady syndrome; prevent syncope","soc":"Permanent pacemaker implantation is definitive therapy for symptomatic SSS. No pharmacologic agent reliably and safely corrects the underlying SA node dysfunction."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Ectopic Supraventricular Arrhythmias","symptoms":"Extra heartbeats, palpitations, irregular pulse; usually benign but distressing","goal":"Reduce symptom burden; treat only if causing cardiomyopathy or severe symptoms","soc":"Beta-blockers (metoprolol, atenolol) or non-dihydropyridine CCBs (diltiazem, verapamil) as first-line for symptomatic PACs/ectopic SVT. Reassurance and lifestyle modification for asymptomatic/mildly symptomatic patients."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Syndrome of Inappropriate Sinus Tachycardia","symptoms":"Persistent elevated resting HR (>100 bpm), palpitations, fatigue, exercise intolerance","goal":"Lower resting heart rate; reduce palpitations and fatigue","soc":"Ivabradine (Corlanor) — selective If current inhibitor — is first-line pharmacologic therapy for IST when sinus rate reduction is needed without AV node blockade. Beta-blockers also used first-line."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Ventricular Tachycardia (VT)","symptoms":"Rapid pounding heartbeat (≥100 bpm), dizziness, syncope; structural heart disease common","goal":"Terminate acute VT; prevent recurrence; reduce ICD shocks and sudden death","soc":"Hemodynamically unstable VT: synchronized DC cardioversion immediately. Stable sustained VT: IV amiodarone (150 mg over 10 min then 1 mg/min infusion) or procainamide IV as first-line."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Atrioventricular Block","symptoms":"Bradycardia, dizziness, syncope, fatigue; complete block causes very slow pulse","goal":"Restore adequate heart rate; prevent sudden death, syncope","soc":"Permanent pacemaker implantation is definitive treatment for symptomatic high-degree (Mobitz II, complete) AV block. Acute: IV atropine or temporary pacing for hemodynamically compromised patients."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Reentrant (Paroxysmal) Supraventricular Tachycardias (PSVT)","symptoms":"Sudden rapid palpitations (150–250 bpm), dizziness, chest tightness, abrupt onset/offset","goal":"Terminate acute episodes; prevent recurrence","soc":"Acute termination: vagal maneuvers first; if unsuccessful, IV adenosine (Adenocard, 6–12 mg rapid push) is first-line pharmacologic treatment with ~90% success."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Atrial Flutter","symptoms":"Regular rapid palpitations (~150 bpm), fatigue, shortness of breath, chest flutter","goal":"Restore sinus rhythm, control ventricular rate, prevent thromboembolism","soc":"Rate control: IV beta-blockers or diltiazem for acute rate control. Rhythm conversion: electrical cardioversion (highly effective, ~95%) or ibutilide IV. Anticoagulation: same stroke risk stratification as AF (DOACs)."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Wolff-Parkinson-White Syndrome (WPW Syndrome)","symptoms":"Palpitations, delta wave on ECG; risk of rapid AF and sudden cardiac death","goal":"Eliminate accessory pathway; prevent dangerous arrhythmias and sudden death","soc":"Catheter ablation (radiofrequency) of accessory pathway is definitive first-line treatment in symptomatic patients or asymptomatic high-risk patients (~95% cure rate). Pharmacologically: flecainide or propafenone for symptom suppression in those awaiting ablation."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Atrial Fibrillation and Wolff-Parkinson-White Syndrome (WPW Syndrome)","symptoms":"Rapid irregular palpitations, pre-excitation on ECG, risk of sudden death","goal":"Prevent life-threatening rapid ventricular response; eliminate accessory pathway","soc":"Catheter ablation of accessory pathway is definitive treatment. Acute AF with WPW: IV procainamide or ibutilide preferred; avoid AV nodal blockers (digoxin, verapamil, adenosine — may accelerate conduction via accessory pathway)."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Torsades de Pointes Ventricular Tachycardia","symptoms":"Syncope, palpitations, sudden twisting QRS pattern on ECG; risk of VF and sudden death","goal":"Terminate TdP, correct QTc, prevent recurrence and VF","soc":"IV magnesium sulfate (1–2 g IV over 5–15 min) is first-line for acute TdP, effective even without documented hypomagnesemia. Remove offending QT-prolonging drugs. Correct electrolyte imbalances (K+, Mg2+)."},{"ta":"Cardiovascular","subcategory":"Specific Cardiac Arrhythmias","indication":"Ventricular Fibrillation (VF)","symptoms":"Sudden cardiac arrest, loss of consciousness, absent pulse; fatal without immediate defibrillation","goal":"Immediate defibrillation; prevent recurrence with ICD; treat underlying cause","soc":"Immediate unsynchronized DC defibrillation (200–360 J biphasic) is the only effective acute treatment. For VF refractory to defibrillation: IV amiodarone (300 mg) or lidocaine (1.5 mg/kg) plus continued CPR."},{"ta":"Cardiovascular","subcategory":"Sports and the Heart","indication":"Sudden Cardiac Death in Athletes","symptoms":"Sudden cardiac arrest during or after exercise; typically in young athlete; often first symptom is collapse","goal":"Identify high-risk athletes; prevent SCD via screening and targeted treatment","soc":"Immediate treatment: CPR + AED defibrillation. Prevention: treat underlying cause (HCM — mavacamten; ARVC — antiarrhythmics + ICD; CPVT — nadolol + flecainide). Beta-blockers are first-line for CPVT/LQTS-related SCD risk."},{"ta":"Cardiovascular","subcategory":"Sports and the Heart","indication":"Athlete’s Heart","symptoms":"Enlarged heart, low resting heart rate, benign ECG changes; asymptomatic physiologic adaptation","goal":"Distinguish from pathologic cardiomyopathy; no treatment needed for true athlete's heart","soc":"None — athlete's heart is a normal physiologic adaptation. Management is diagnostic: cardiac MRI to distinguish from HCM/ARVC; genetic testing if unclear. No pharmacologic SoC."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Mitral Regurgitation","symptoms":"Dyspnea on exertion, fatigue, palpitations, heart murmur, reduced exercise capacity","goal":"Preserve LV function; prevent heart failure; timely repair or replacement","soc":"Primary MR: surgical mitral valve repair (preferred) or replacement is definitive. Secondary MR (due to HF): GDMT for HF (ACEi/ARB, beta-blocker, SGLT2i, MRA) plus transcatheter MitraClip (TEER) for eligible high-surgical-risk patients. No drug reverses MR."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Aortic Stenosis","symptoms":"Exertional dyspnea, angina, syncope, systolic murmur, exercise intolerance","goal":"Prevent heart failure, syncope, sudden death; timely valve replacement","soc":"No proven pharmacologic SoC to reverse or halt AS progression. Transcatheter aortic valve implantation (TAVI/TAVR) or surgical AVR is definitive treatment. Medical: treat comorbidities (hypertension, HF). Statins do not halt AS progression (SEAS, SALTIRE trials failed)."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Aortic Regurgitation","symptoms":"Breathlessness, fatigue, water-hammer pulse, heart murmur, exercise intolerance","goal":"Prevent LV dysfunction and heart failure; timely surgical intervention","soc":"Vasodilators (ACE inhibitors or ARBs — nifedipine historically used) to reduce afterload in chronic severe AR with LV enlargement in patients not yet meeting surgical criteria. Definitive: surgical aortic valve replacement (SAVR) or TAVI."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Tricuspid Regurgitation","symptoms":"Leg edema, abdominal distension, fatigue, jugular venous distension, pulsatile liver","goal":"Reduce RV volume overload, prevent progressive RV failure","soc":"Diuretics (furosemide, spironolactone) to manage systemic congestion in symptomatic TR. Treat underlying cause (AF: rate control + anticoagulation; pulmonary hypertension: specific therapies). Tricuspid TEER (TriClip, CLASP TR) emerging as transcatheter option."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Mitral Valve Prolapse (MVP)","symptoms":"Usually asymptomatic; may cause palpitations, atypical chest pain, anxiety, click on exam","goal":"Monitor for MR progression; prevent arrhythmias; treat symptoms","soc":"Beta-blockers (atenolol, metoprolol) for palpitations, chest pain, and anxiety in MVP with arrhythmias. Most patients require no pharmacologic treatment."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Pulmonary Regurgitation","symptoms":"RV volume overload, exercise intolerance, palpitations; often post-tetralogy repair","goal":"Prevent RV failure; optimal timing of pulmonary valve replacement","soc":"Medical management of RV failure: diuretics (furosemide), ACE inhibitors/ARBs for symptom relief. No pharmacologic agent reverses PR. Pulmonary valve replacement (surgical or transcatheter — Melody, Sapien) is definitive."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Mitral Stenosis","symptoms":"Dyspnea, fatigue, atrial fibrillation, hemoptysis, diastolic murmur","goal":"Control heart rate, prevent AF complications, relieve obstruction via intervention","soc":"Rate control with beta-blockers or diltiazem for AF/tachycardia in MS. Anticoagulation (warfarin or DOAC) for AF comorbidity. Diuretics for pulmonary congestion."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Pulmonary Stenosis","symptoms":"Dyspnea on exertion, fatigue, RV hypertrophy, systolic murmur; often congenital","goal":"Relieve RV outflow obstruction; prevent RV failure","soc":"Balloon pulmonary valvuloplasty (BPV) is first-line for moderate-severe valvular PS (gradient ≥40 mmHg). No pharmacologic SoC modifies PS. Symptom management: diuretics for RV failure."},{"ta":"Cardiovascular","subcategory":"Valvular Disorders","indication":"Tricuspid Stenosis","symptoms":"Fatigue, peripheral edema, ascites, diastolic murmur; almost always rheumatic etiology","goal":"Relieve RA-to-RV obstruction; manage systemic venous congestion","soc":"Diuretics for systemic congestion. Definitive: balloon valvuloplasty or surgical repair/replacement for severe TS (gradient >5 mmHg). No pharmacologic SoC modifies TS."},{"ta":"Dental and Oral Health","subcategory":"Dental Caries and Pulpal Disorders","indication":"Toothache and Infection","symptoms":"Tooth pain, sensitivity, swelling, possible fever or abscess","goal":"Relieve pain, eliminate infection, preserve tooth","soc":"NSAIDs (ibuprofen 400–600 mg QID) ± acetaminophen for pain; antibiotics (amoxicillin 500 mg TID) only if infection with systemic signs present."},{"ta":"Dental and Oral Health","subcategory":"Dental Caries and Pulpal Disorders","indication":"Pulpitis","symptoms":"Severe toothache, prolonged pain to temperature, spontaneous pain","goal":"Relieve pulp pain, preserve or remove affected pulp","soc":"NSAIDs (ibuprofen 600 mg QID) for pain relief; definitive treatment is root canal therapy (irreversible pulpitis) or indirect pulp cap with calcium hydroxide/MTA (reversible pulpitis)."},{"ta":"Dental and Oral Health","subcategory":"Dental Caries and Pulpal Disorders","indication":"Caries","symptoms":"Tooth pain, visible cavities, sensitivity to hot/cold/sweet","goal":"Halt decay, prevent progression, remineralize enamel","soc":"Fluoride (topical fluoride varnish 5%, sodium fluoride toothpaste 5,000 ppm for high-risk patients); silver diamine fluoride (SDF 38%) for arrest of active caries."},{"ta":"Dental and Oral Health","subcategory":"Dental Caries and Pulpal Disorders","indication":"Tooth Abscess","symptoms":"Severe throbbing toothache, swelling, fever, pus, bad taste","goal":"Drain abscess, eliminate infection, relieve pain","soc":"Incision and drainage (I&D) or root canal therapy for source control; amoxicillin 500 mg TID x 5–7 days (or amoxicillin-clavulanate for spreading infection) for bacteremia prevention."},{"ta":"Dental and Oral Health","subcategory":"Dental Trauma and Complications","indication":"Fractured and Avulsed Teeth","symptoms":"Acute tooth pain, bleeding, visible fracture or missing tooth","goal":"Preserve tooth, prevent infection, restore function","soc":"None (surgical/dental procedure is primary treatment); NSAIDs for pain, antibiotics (amoxicillin) if infection present post-trauma."},{"ta":"Dental and Oral Health","subcategory":"Dental Trauma and Complications","indication":"Medication-Related Osteonecrosis of the Jaw (MRONJ)","symptoms":"Exposed jaw bone, pain, infection, non-healing oral wound","goal":"Promote bone healing, prevent infection, preserve jaw function","soc":"Antibiotics (amoxicillin-clavulanate or penicillin + metronidazole) for infection; chlorhexidine 0.12% rinse; conservative debridement. Drug holiday from bisphosphonate/denosumab if oncologically feasible."},{"ta":"Dental and Oral Health","subcategory":"Dental Trauma and Complications","indication":"Postextraction Problems","symptoms":"Dry socket pain, bleeding, infection, delayed healing after tooth removal","goal":"Relieve pain, prevent and treat infection, promote healing","soc":"Dry socket: zinc oxide-eugenol dressing (Alvogyl) placed in socket; NSAIDs for pain; antibiotics (amoxicillin) only if infection confirmed."},{"ta":"Dental and Oral Health","subcategory":"Lip and Tongue Disorders","indication":"Lip Ulcers and Inflammation","symptoms":"Painful lip ulcers, cracking, redness, burning sensation","goal":"Heal ulcers, reduce inflammation, prevent recurrence","soc":"Topical corticosteroids (triamcinolone acetonide 0.1% dental paste) for inflammatory lesions; antiviral (acyclovir/valacyclovir) for HSV-related labial ulcers."},{"ta":"Dental and Oral Health","subcategory":"Lip and Tongue Disorders","indication":"Tongue Discomfort","symptoms":"Burning, pain, soreness, or tingling of tongue","goal":"Relieve tongue pain and address underlying etiology","soc":"Identify and treat underlying cause (nutritional deficiency, candidiasis, BMS, geographic tongue); topical analgesics (viscous lidocaine) for symptom relief."},{"ta":"Dental and Oral Health","subcategory":"Lip and Tongue Disorders","indication":"Lip Swelling","symptoms":"Swollen lips, discomfort, possible itching or warmth","goal":"Reduce swelling, identify and treat underlying cause","soc":"Antihistamines (cetirizine, diphenhydramine) for allergic etiology; corticosteroids (prednisone) for angioedema; epinephrine IM for anaphylaxis."},{"ta":"Dental and Oral Health","subcategory":"Lip and Tongue Disorders","indication":"Tongue Discoloration and Other Changes","symptoms":"Black/white/discolored tongue, altered surface texture","goal":"Identify and treat underlying cause, restore normal tongue appearance","soc":"None (address underlying cause: discontinue causative medications, antifungals for candida, antibiotics if bacterial). Oral hygiene measures."},{"ta":"Dental and Oral Health","subcategory":"Lip and Tongue Disorders","indication":"Tongue Trauma","symptoms":"Pain, swelling, bleeding, laceration of tongue after injury","goal":"Control bleeding, promote healing, prevent infection","soc":"None (wound care and observation primary; suturing for lacerations >1 cm); NSAIDs for pain; antibiotics only if infected."},{"ta":"Dental and Oral Health","subcategory":"Oral Growths and Tumors","indication":"Oral Growths","symptoms":"Painless or painful oral mass, ulceration, bleeding, difficulty eating","goal":"Remove or reduce growth, rule out malignancy","soc":"None (surgical excision is definitive; biopsy required); no pharmacologic first-line SoC for benign oral growths."},{"ta":"Dental and Oral Health","subcategory":"Oral Mucosal Disorders","indication":"Systemic Disorders and the Mouth","symptoms":"Oral manifestations of systemic disease: ulcers, dryness, pigmentation, infections","goal":"Manage underlying systemic disease to resolve oral manifestations","soc":"Treat the underlying systemic condition (e.g., immunosuppressants for autoimmune disease, antiretrovirals for HIV); topical supportive care for oral lesions."},{"ta":"Dental and Oral Health","subcategory":"Oral Mucosal Disorders","indication":"Stomatitis","symptoms":"Widespread oral pain, ulcers, redness, swallowing difficulty","goal":"Reduce mucosal inflammation, treat underlying cause, relieve pain","soc":"Magic mouthwash (compounded lidocaine/diphenhydramine/antacid) for symptomatic relief; treat underlying cause (antifungals for thrush, antivirals for HSV)."},{"ta":"Dental and Oral Health","subcategory":"Oral Mucosal Disorders","indication":"Recurrent Aphthous Stomatitis","symptoms":"Painful recurring mouth ulcers, eating difficulty, oral discomfort","goal":"Shorten ulcer duration, reduce pain, decrease recurrence","soc":"Topical corticosteroids (triamcinolone acetonide 0.1% dental paste; clobetasol gel) or amlexanox 5% paste (Aphthasol) for pain and healing; colchicine or thalidomide for severe recurrent cases."},{"ta":"Dental and Oral Health","subcategory":"Oral Mucosal Disorders","indication":"Burning Mouth Syndrome","symptoms":"Chronic oral burning, altered taste, dry mouth sensation","goal":"Reduce pain intensity, improve quality of life","soc":"Clonazepam 0.5–1 mg (topical oral rinse or systemic), low-dose tricyclic antidepressants (amitriptyline 10–25 mg QHS), or alpha-lipoic acid 600 mg/day (off-label)."},{"ta":"Dental and Oral Health","subcategory":"Other Dental Disorders","indication":"Xerostomia","symptoms":"Dry mouth, difficulty swallowing/speaking, increased cavities, burning","goal":"Increase salivary flow, relieve dryness, prevent dental complications","soc":"Pilocarpine 5 mg TID (cholinergic agonist) or cevimeline 30 mg TID (Evoxac, FDA-approved for Sjögren's); saliva substitutes (Biotène, OralBalance) for symptom relief."},{"ta":"Dental and Oral Health","subcategory":"Other Dental Disorders","indication":"Halitosis","symptoms":"Persistent bad breath, unpleasant oral taste","goal":"Eliminate malodor, address underlying oral/systemic cause","soc":"Zinc-containing mouthwash/toothpaste; chlorhexidine 0.2% rinse; tongue scraping (non-pharmacologic); treat underlying periodontal disease or GERD."},{"ta":"Dental and Oral Health","subcategory":"Other Dental Disorders","indication":"Malocclusion","symptoms":"Misaligned bite, crowded or protruding teeth, jaw pain","goal":"Correct bite alignment, prevent dental and joint complications","soc":"None (orthodontic/surgical treatment; no pharmacologic SoC)."},{"ta":"Dental and Oral Health","subcategory":"Other Dental Disorders","indication":"Dental Appliances","symptoms":"Device-related discomfort, ulcers, irritation, fit problems","goal":"Relieve appliance-related tissue irritation and inflammation","soc":"None (primarily mechanical adjustment); topical analgesics (benzocaine 20% gel) and chlorhexidine rinse for mucosal inflammation."},{"ta":"Dental and Oral Health","subcategory":"Periodontal Diseases","indication":"Periodontitis","symptoms":"Bleeding gums, loose teeth, bone loss, bad breath, gum recession","goal":"Halt bone loss, resolve infection, prevent tooth loss","soc":"Scaling and root planing (SRP) + local drug delivery: minocycline microspheres (Arestin) or doxycycline gel (Atridox) as adjuncts to SRP."},{"ta":"Dental and Oral Health","subcategory":"Periodontal Diseases","indication":"Gingivitis","symptoms":"Red swollen bleeding gums, bad breath, gum tenderness","goal":"Resolve gingival inflammation, prevent progression to periodontitis","soc":"Professional scaling and polishing + improved oral hygiene; chlorhexidine 0.12% rinse BID as adjunct pharmacologic agent."},{"ta":"Dental and Oral Health","subcategory":"Periodontal Diseases","indication":"Peri-Implant Diseases and Conditions","symptoms":"Gum inflammation around implant, bone loss, implant mobility","goal":"Halt bone loss, resolve infection, preserve implant","soc":"Mechanical debridement of implant surface (professional cleaning) + local antiseptic (chlorhexidine chip or gel); systemic antibiotics (azithromycin or metronidazole) for peri-implantitis."},{"ta":"Dental and Oral Health","subcategory":"Periodontal Diseases","indication":"Gingival Hyperplasia","symptoms":"Overgrown swollen gums, difficulty chewing, cosmetic concern","goal":"Reduce gingival overgrowth, restore normal gum architecture","soc":"None for pharmacologic; primary management is removal of causative drug (if drug-induced: phenytoin, cyclosporine, calcium channel blockers) + professional oral hygiene."},{"ta":"Dental and Oral Health","subcategory":"Periodontal Diseases","indication":"Acute Necrotizing Ulcerative Gingivitis (ANUG)","symptoms":"Painful bleeding gums, gray pseudomembrane, fever, foul breath","goal":"Eradicate infection, restore healthy gingival tissue","soc":"Metronidazole (nitroimidazole antibiotic) 250–500 mg TID x 7 days, combined with professional debridement and oral rinse (chlorhexidine 0.12%)."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Temporomandibular Disorders (TMDs)","symptoms":"Jaw pain, clicking, headache, limited mouth opening, muscle tenderness","goal":"Reduce pain, restore jaw function, prevent chronification","soc":"NSAIDs (ibuprofen 400–800 mg TID) or naproxen + occlusal splint (non-pharmacologic); muscle relaxants (cyclobenzaprine 5–10 mg QHS) for myofascial component."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Temporomandibular Myofascial Pain Syndrome","symptoms":"Jaw muscle pain, trigger points, referred headache, stiffness","goal":"Reduce muscle pain and spasm, restore normal jaw function","soc":"Cyclobenzaprine 5–10 mg QHS (muscle relaxant) + NSAIDs; trigger point injections with lidocaine 1% or bupivacaine 0.5%."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Internal Temporomandibular Joint (TMJ) Derangement","symptoms":"Jaw clicking, locking, pain with opening, limited jaw movement","goal":"Restore disc position, relieve pain, improve jaw opening","soc":"NSAIDs (ibuprofen, naproxen) for pain/inflammation + occlusal splint therapy (non-pharmacologic)."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Bruxism","symptoms":"Teeth grinding or clenching, jaw pain, headache, worn teeth","goal":"Reduce grinding frequency, protect teeth, relieve pain","soc":"Occlusal splint/night guard (non-pharmacologic); for pharmacologic adjunct: botulinum toxin A (Botox) injections into masseter/temporalis muscles for severe sleep bruxism."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Arthritis of the Temporomandibular Joint (TMJ)","symptoms":"Jaw joint pain, clicking, limited mouth opening, facial pain","goal":"Reduce inflammation, restore pain-free jaw function","soc":"NSAIDs (e.g., ibuprofen 400–800 mg TID or naproxen 500 mg BID) combined with splint therapy; short-course corticosteroid intra-articular injection for flares."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Mandibular Condylar Hyperplasia","symptoms":"Progressive facial asymmetry, bite abnormality, jaw pain","goal":"Arrest condylar growth, correct facial deformity","soc":"None (condylectomy is primary treatment when active growth confirmed by bone scan; no pharmacologic SoC)."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Mandibular Condylar Hypoplasia","symptoms":"Facial asymmetry, small jaw, bite problems, limited mouth opening","goal":"Restore jaw symmetry and function through surgical/device intervention","soc":"None (surgical/prosthetic correction; no pharmacologic SoC)."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Ankylosis of the Temporomandibular Joint (TMJ)","symptoms":"Inability to open mouth, jaw stiffness, facial asymmetry, chewing difficulty","goal":"Restore jaw mobility and function surgically","soc":"None (surgical release is definitive treatment; no pharmacologic first-line SoC)."},{"ta":"Dental and Oral Health","subcategory":"Temporomandibular Disorders","indication":"Mandibular Dislocation","symptoms":"Jaw locked open, inability to close mouth, pain, facial deformity","goal":"Manual reduction of dislocated jaw, prevent recurrence","soc":"None (manual closed reduction is primary treatment); muscle relaxants (diazepam 5–10 mg IV) to facilitate reduction for acute dislocation."},{"ta":"Dermatology","subcategory":"Acne and Related Disorders","indication":"Acne Vulgaris","symptoms":"Pimples, blackheads, whiteheads, cysts, oily skin, scarring","goal":"Clear lesions, prevent scarring, maintain remission","soc":"Topical retinoids (tretinoin 0.025–0.1%, adapalene 0.1–0.3%) + topical benzoyl peroxide (BPO 2.5–5%) for mild-moderate acne; oral doxycycline 100 mg BID for moderate-severe inflammatory acne."},{"ta":"Dermatology","subcategory":"Acne and Related Disorders","indication":"Rosacea","symptoms":"Facial redness, visible blood vessels, pimples, flushing, eye irritation","goal":"Control flushing and papulopustules, prevent progression","soc":"Metronidazole 0.75–1% cream/gel BID (MetroGel, MetroCream) or azelaic acid 15% gel (Finacea) for papulopustular rosacea; brimonidine 0.33% gel (Mirvaso) for erythematotelangiectatic rosacea."},{"ta":"Dermatology","subcategory":"Acne and Related Disorders","indication":"Hidradenitis Suppurativa","symptoms":"Painful nodules, abscesses, tunnels in armpits/groin, scarring","goal":"Reduce flares, heal nodules, prevent tunneling and scarring","soc":"Topical clindamycin 1% lotion for mild HS (Hurley Stage I); oral doxycycline 100 mg BID for moderate HS (Hurley Stage II–III combination therapy)."},{"ta":"Dermatology","subcategory":"Acne and Related Disorders","indication":"Perioral Dermatitis","symptoms":"Small red bumps around mouth and nose, mild burning, flaking","goal":"Resolve perioral eruption, prevent steroid rebound","soc":"Discontinue topical corticosteroids (key step); topical metronidazole 0.75–1% gel BID or azelaic acid 15% gel BID as first-line pharmacologic therapy."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Cellulitis","symptoms":"Red, warm, swollen, tender spreading skin area, possible fever","goal":"Eradicate bacterial infection, prevent spread and complications","soc":"Cephalexin 500 mg QID x 5–7 days for non-purulent cellulitis (streptococcal); TMP-SMX DS BID or doxycycline 100 mg BID if MRSA suspected (purulent)."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Folliculitis","symptoms":"Red pus-filled hair follicle bumps, itching, tenderness","goal":"Eliminate causative organism, prevent recurrence","soc":"Topical clindamycin 1% or mupirocin 2% for limited bacterial folliculitis; antifungal (ketoconazole 2% shampoo) for Malassezia folliculitis."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Furuncles and Carbuncles","symptoms":"Painful pus-filled boils, swelling, surrounding redness, fever","goal":"Drain and eradicate S. aureus infection, prevent spread","soc":"I&D is definitive for furuncles/carbuncles; TMP-SMX DS BID x 5–7 days as adjunct for large lesions, carbuncles, or immunocompromised patients."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Impetigo and Ecthyma","symptoms":"Honey-crusted sores, blisters, shallow skin ulcers, itching","goal":"Eradicate bacterial infection, prevent spread and complications","soc":"Mupirocin 2% ointment (Bactroban) TID x 5 days for localized impetigo; topical retapamulin (Altabax) 1% BID x 5 days as alternative."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Cutaneous Abscess","symptoms":"Painful swollen skin lump with pus, warmth, redness, fever","goal":"Drain abscess, eradicate infection, prevent recurrence","soc":"Incision and drainage (I&D) is primary treatment; TMP-SMX DS BID x 5–7 days as adjunct to I&D for moderate-severe abscesses (per NEJM 2017 RCT)."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Lymphadenitis","symptoms":"Enlarged tender lymph nodes, fever, skin warmth, pain","goal":"Eradicate infection, reduce lymph node swelling","soc":"Antibiotics targeting likely pathogen: amoxicillin-clavulanate 875 mg BID x 10–14 days for acute bacterial lymphadenitis; directed therapy for atypical mycobacteria or specific pathogens."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Erythrasma","symptoms":"Reddish-brown scaly patches in skin folds, mild itching","goal":"Clear Corynebacterium minutissimum infection","soc":"Topical erythromycin 2% solution or topical clindamycin 1%; oral erythromycin 250 mg QID x 14 days for extensive disease."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Erysipelas","symptoms":"Sharply demarcated red raised skin plaque, fever, pain, warmth","goal":"Eradicate streptococcal infection, prevent recurrence and complications","soc":"Penicillin V 500 mg QID x 5–10 days (or IV penicillin G for severe cases); amoxicillin 500 mg TID x 10 days is an alternative."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Lymphangitis","symptoms":"Red streaks from wound toward lymph nodes, fever, pain","goal":"Eradicate bacterial infection, prevent systemic spread","soc":"Penicillinase-resistant penicillin (dicloxacillin 500 mg QID x 10 days) or cephalexin 500 mg QID; IV cefazolin for severe cases."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Necrotizing Soft-Tissue Infection","symptoms":"Rapidly spreading pain, skin necrosis, systemic toxicity, crepitus","goal":"Emergency surgical debridement, broad-spectrum antibiotics, survival","soc":"Broad-spectrum IV antibiotics: vancomycin + piperacillin-tazobactam + clindamycin (to suppress toxin production); emergency surgical debridement is mandatory."},{"ta":"Dermatology","subcategory":"Bacterial Skin Infections","indication":"Staphylococcal Scalded Skin Syndrome","symptoms":"Widespread blistering, skin peeling, fever, in neonates/infants","goal":"Eradicate S. aureus infection, manage fluid loss, prevent sepsis","soc":"IV nafcillin or oxacillin (adults/older children); IV cloxacillin; MRSA: IV vancomycin; supportive care with wound management and fluid replacement."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Vascular Lesions of the Skin","symptoms":"Visible blood vessels, redness, purple or red skin discoloration","goal":"Reduce vascular visibility, prevent complications","soc":"Pulsed dye laser (PDL) for most superficial vascular lesions (standard of care, non-pharmacologic); topical timolol or brimonidine for certain vascular conditions."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Keloids","symptoms":"Raised itchy painful scar overgrowth beyond wound margin","goal":"Flatten keloid, reduce symptoms, prevent recurrence","soc":"Intralesional triamcinolone acetonide 10–40 mg/mL injections monthly (corticosteroid) as first-line; compression therapy as adjunct."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Seborrheic Keratoses","symptoms":"Rough waxy stuck-on tan-brown skin growths, itching, cosmetic concern","goal":"Remove cosmetically bothersome or symptomatic lesions","soc":"Cryotherapy (liquid nitrogen) or electrodessication for removal; topical hydrogen peroxide 40% solution (Eskata – FDA-approved 2017 for seborrheic keratoses) is only FDA-approved pharmacologic option."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Nevi (Moles)","symptoms":"Benign pigmented skin spots, variable size, may be raised","goal":"Monitor for change; remove cosmetically bothersome or suspicious lesions","soc":"None (observation and periodic dermoscopic monitoring; excision for suspicious lesions); no pharmacologic SoC."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Cutaneous Cysts","symptoms":"Painless skin lump, slow growth, possible infection/rupture","goal":"Remove cyst, treat infection if present, prevent recurrence","soc":"None (surgical excision is definitive); antibiotics (cephalexin or TMP-SMX) only if secondarily infected."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Lipomas","symptoms":"Soft painless fat-filled lump under skin, slow growing","goal":"Remove cosmetically unacceptable or symptomatic lipomas","soc":"None (surgical excision or liposuction is definitive; no pharmacologic SoC); deoxycholic acid (Kybella – FDA-approved for submental fat) used off-label for lipomas by some practitioners."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Lymphatic Malformations","symptoms":"Soft tissue swelling, cysts, recurrent infection, functional impairment","goal":"Reduce lesion size, prevent infection, restore function","soc":"Sirolimus (mTOR inhibitor) – off-label for macrocystic/microcystic LM; sclerotherapy (doxycycline, bleomycin, OK-432) for macrocystic lesions."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Cherry Angiomas","symptoms":"Small bright red benign skin dots, mostly cosmetic, occasionally bleed","goal":"Remove cosmetically bothersome lesions; monitoring only","soc":"None (electrodessication, laser, or cryotherapy for removal; purely procedural); no pharmacologic SoC."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Skin Tags","symptoms":"Small flesh-colored soft outgrowths on skin, may catch on clothing","goal":"Cosmetic removal; no medical treatment required","soc":"None (snip excision, electrodessication, cryotherapy, ligation for removal; no pharmacologic SoC)."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Capillary Malformations","symptoms":"Permanent pink-red skin stain (port-wine stain), cosmetic concern, possible thickening","goal":"Reduce vascular lesion visibility, prevent progressive thickening","soc":"Pulsed dye laser (PDL) is standard treatment (non-pharmacologic); topical rapamycin (sirolimus) 1% under investigation."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Nevus Araneus","symptoms":"Red spider-like vascular mark with central dot on skin","goal":"Cosmetic removal; address underlying cause if present","soc":"None (electrodessication or laser for cosmetic removal; treat underlying liver disease or estrogen excess if present); no pharmacologic SoC."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Dermatofibromas","symptoms":"Firm brown skin bump, dimpling on pinch, mild tenderness, itching","goal":"Relieve symptoms; cosmetic removal if desired","soc":"None (observation or surgical excision if symptomatic/cosmetically bothersome); no pharmacologic SoC."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Atypical Nevi (Moles)","symptoms":"Irregular large moles, asymmetry, variable color, raised surface","goal":"Monitor for malignant transformation, excise suspicious lesions","soc":"None (surgical excision for suspicious lesions; close monitoring protocol); no pharmacologic SoC."},{"ta":"Dermatology","subcategory":"Benign Skin Tumors, Growths, and Vascular Lesions","indication":"Pyogenic Granulomas","symptoms":"Rapidly growing red vascular bump, bleeds easily on contact","goal":"Remove lesion, prevent bleeding and recurrence","soc":"Surgical shave excision + electrodessication of base; topical timolol 0.5%
