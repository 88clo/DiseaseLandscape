<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Therapeutic Area Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Art direction: Medical reference tool → clinical, authoritative
   Palette: Cool-neutral, deep teal accent
   Typography: Instrument Serif display + Work Sans body
   Density: balanced
   ============================================================ */
:root, [data-theme="light"] {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem; --space-16: 4rem;

  --color-bg: #f6f6f3;
  --color-surface: #fafaf8;
  --color-surface-2: #ffffff;
  --color-surface-offset: #ededea;
  --color-divider: #ddddd9;
  --color-border: #d0d0cc;
  --color-text: #1e1e1c;
  --color-text-muted: #6b6b68;
  --color-text-faint: #b0b0ac;
  --color-text-inverse: #f9f9f7;
  --color-primary: #016470;
  --color-primary-hover: #014f59;
  --color-primary-active: #023d45;
  --color-primary-highlight: #cfdfe1;

  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 200 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 200 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 200 / 0.12);
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --content-default: 1100px;
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Work Sans', 'Helvetica Neue', sans-serif;
}

[data-theme="dark"] {
  --color-bg: #141413;
  --color-surface: #1a1a19;
  --color-surface-2: #1f1f1e;
  --color-surface-offset: #1c1c1b;
  --color-divider: #252524;
  --color-border: #323230;
  --color-text: #ccccc9;
  --color-text-muted: #78786f;
  --color-text-faint: #555550;
  --color-text-inverse: #1a1a19;
  --color-primary: #4c96a0;
  --color-primary-hover: #3d7d87;
  --color-primary-active: #2e656e;
  --color-primary-highlight: #2a3d40;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.45);
}

@media (prefers-color-scheme: dark) { :root:not([data-theme]) {
  --color-bg: #141413; --color-surface: #1a1a19; --color-surface-2: #1f1f1e;
  --color-surface-offset: #1c1c1b; --color-divider: #252524; --color-border: #323230;
  --color-text: #ccccc9; --color-text-muted: #78786f; --color-text-faint: #555550;
  --color-text-inverse: #1a1a19; --color-primary: #4c96a0;
  --color-primary-hover: #3d7d87; --color-primary-active: #2e656e;
  --color-primary-highlight: #2a3d40;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.45);
}}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; scroll-padding-top: var(--space-16); }
body { min-height: 100dvh; line-height: 1.6; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-bg); }
img, picture, svg { display: block; max-width: 100%; }
ul[role="list"] { list-style: none; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
table { border-collapse: collapse; width: 100%; }
h1, h2, h3 { text-wrap: balance; line-height: 1.15; }
p, li { text-wrap: pretty; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
a, button { transition: color var(--transition), background var(--transition), box-shadow var(--transition); }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }

/* ── Layout ─────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-4) var(--space-6);
}
.header-inner {
  max-width: var(--content-default);
  margin-inline: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
}
.logo {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-family: var(--font-display);
  font-size: var(--text-lg);
  color: var(--color-text);
  flex-shrink: 0;
}
.logo svg { color: var(--color-primary); }

.header-controls { display: flex; align-items: center; gap: var(--space-3); flex: 1; justify-content: flex-end; }

.search-wrap {
  position: relative;
  max-width: 280px;
  width: 100%;
}
.search-wrap svg {
  position: absolute;
  left: var(--space-3);
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-muted);
  pointer-events: none;
}
#search-input {
  width: 100%;
  padding: var(--space-2) var(--space-3) var(--space-2) calc(var(--space-3) + 20px + var(--space-2));
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  color: var(--color-text);
  transition: border-color var(--transition), box-shadow var(--transition);
}
#search-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.12); }
#search-input::placeholder { color: var(--color-text-faint); }

.theme-toggle {
  width: 36px; height: 36px;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
}
.theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

main { max-width: var(--content-default); margin-inline: auto; padding: var(--space-8) var(--space-6) var(--space-16); }

/* ── Views ───────────────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

/* ── Home ────────────────────────────────────────────────── */
.home-hero {
  padding-block: var(--space-10) var(--space-8);
  border-bottom: 1px solid var(--color-divider);
  margin-bottom: var(--space-10);
}
.home-hero h1 {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  color: var(--color-text);
  margin-bottom: var(--space-3);
}
.home-hero p {
  font-size: var(--text-base);
  color: var(--color-text-muted);
  max-width: 56ch;
}

/* Supercategory sections */
.supra-section { margin-bottom: var(--space-10); }
.supra-label {
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-text-faint);
  padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--color-divider);
  margin-bottom: var(--space-4);
}

.ta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
  gap: var(--space-3);
}

.ta-card {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  padding: var(--space-5) var(--space-5);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
  text-align: left;
}
.ta-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--color-primary);
  transform: translateY(-1px);
}
.ta-card:active { transform: translateY(0); }
.ta-card-name {
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--color-text);
  line-height: 1.3;
}
.ta-card-meta {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}
.ta-card-count {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-xs);
  color: var(--color-primary);
  font-weight: 500;
  margin-top: auto;
  padding-top: var(--space-2);
}

/* ── TA Detail view ─────────────────────────────────────── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin-bottom: var(--space-6);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  transition: background var(--transition), color var(--transition);
}
.back-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }

.detail-header {
  margin-bottom: var(--space-8);
  padding-bottom: var(--space-6);
  border-bottom: 1px solid var(--color-divider);
}
.detail-header .supra-crumb {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-2);
}
.detail-header h2 {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  margin-bottom: var(--space-2);
}
.detail-header p {
  color: var(--color-text-muted);
  font-size: var(--text-sm);
}

/* Sub-TA section */
.subta-section { margin-bottom: var(--space-10); }
.subta-heading {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text-muted);
  margin-bottom: var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.subta-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-divider);
}
.subta-count-badge {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  font-weight: 400;
}

/* Disease table */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.disease-table {
  width: 100%;
  font-size: var(--text-sm);
}
.disease-table thead { background: var(--color-surface-offset); }
.disease-table th {
  padding: var(--space-3) var(--space-4);
  text-align: left;
  font-weight: 600;
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-text-muted);
  white-space: nowrap;
  border-bottom: 1px solid var(--color-border);
}
.disease-table td {
  padding: var(--space-3) var(--space-4);
  vertical-align: top;
  border-bottom: 1px solid var(--color-divider);
  color: var(--color-text);
  line-height: 1.5;
}
.disease-table tr:last-child td { border-bottom: none; }
.disease-table tbody tr { transition: background var(--transition); }
.disease-table tbody tr:hover { background: var(--color-surface-offset); }
.disease-name {
  font-weight: 600;
  color: var(--color-text);
  min-width: 160px;
}
.cell-muted { color: var(--color-text-muted); min-width: 140px; max-width: 280px; }
.cell-empty { color: var(--color-text-faint); font-style: italic; }

/* ── Search results ─────────────────────────────────────── */
.search-results-label {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin-bottom: var(--space-6);
}
.search-results-label strong { color: var(--color-text); }

/* ── Footer ─────────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--color-divider);
  padding: var(--space-6);
  text-align: center;
  font-size: var(--text-xs);
  color: var(--color-text-faint);
}

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 640px) {
  main { padding: var(--space-6) var(--space-4) var(--space-12); }
  .home-hero h1 { font-size: var(--text-xl); }
  .ta-grid { grid-template-columns: 1fr; }
  .header-inner { flex-wrap: wrap; }
  .search-wrap { max-width: 100%; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo" role="img" aria-label="Therapeutic Area Explorer">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <rect x="16" y="2" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <rect x="2" y="16" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <rect x="16" y="16" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <line x1="7" y1="12" x2="7" y2="16" stroke="currentColor" stroke-width="1.6"/>
        <line x1="21" y1="12" x2="21" y2="16" stroke="currentColor" stroke-width="1.6"/>
        <line x1="12" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.6"/>
        <line x1="12" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      TA Explorer
    </div>
    <div class="header-controls">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search diseases…" autocomplete="off" aria-label="Search diseases">
      </div>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main>
  <!-- HOME VIEW -->
  <div id="view-home" class="view active">
    <div class="home-hero">
      <h1>Therapeutic Area Explorer</h1>
      <p>Browse 286 diseases across 27 therapeutic areas and 8 supercategories. Click any therapeutic area to view its disease landscape.</p>
    </div>
    <div id="ta-list-container"></div>
  </div>

  <!-- TA DETAIL VIEW -->
  <div id="view-detail" class="view">
    <button class="back-btn" id="back-btn" onclick="showHome()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      All therapeutic areas
    </button>
    <div class="detail-header">
      <div class="supra-crumb" id="detail-supra"></div>
      <h2 id="detail-ta-name"></h2>
      <p id="detail-ta-meta"></p>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- SEARCH VIEW -->
  <div id="view-search" class="view">
    <div class="search-results-label" id="search-label"></div>
    <div id="search-content"></div>
  </div>
</main>

<footer>
  <p>Source: Merck Manuals — All Indications · 286 diseases · 27 therapeutic areas</p>
</footer>

<script>
(function(){
  const r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const t=document.querySelector('[data-theme-toggle]');
  if(t) t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.innerHTML=d==='dark'
      ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

// ── Data ──────────────────────────────────────────────────
let DATA = [];

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of l) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function groupBy(arr, key) {
  return arr.reduce((acc, row) => {
    (acc[row[key]] = acc[row[key]] || []).push(row);
    return acc;
  }, {});
}

// ── Render home ──────────────────────────────────────────
function renderHome() {
  const supras = groupBy(DATA, 'supercategory');
  const container = document.getElementById('ta-list-container');
  container.innerHTML = '';
  for (const [supra, rows] of Object.entries(supras)) {
    const tas = groupBy(rows, 'therapeutic_area');
    const section = document.createElement('section');
    section.className = 'supra-section';
    section.innerHTML = `<div class="supra-label">${supra}</div>`;
    const grid = document.createElement('div');
    grid.className = 'ta-grid';
    for (const [ta, taRows] of Object.entries(tas)) {
      const subtas = [...new Set(taRows.map(r => r.sub_ta).filter(Boolean))];
      const card = document.createElement('button');
      card.className = 'ta-card';
      card.setAttribute('aria-label', `View ${ta}`);
      card.innerHTML = `
        <div class="ta-card-name">${ta}</div>
        <div class="ta-card-meta">${subtas.length} sub-categories</div>
        <div class="ta-card-count">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
          ${taRows.length} disease${taRows.length !== 1 ? 's' : ''}
        </div>
      `;
      card.addEventListener('click', () => showTA(supra, ta));
      grid.appendChild(card);
    }
    section.appendChild(grid);
    container.appendChild(section);
  }
}

// ── Render TA detail ─────────────────────────────────────
function showTA(supra, taName) {
  const rows = DATA.filter(r => r.therapeutic_area === taName);
  const subtas = groupBy(rows, 'sub_ta');

  document.getElementById('detail-supra').textContent = supra;
  document.getElementById('detail-ta-name').textContent = taName;
  document.getElementById('detail-ta-meta').textContent =
    `${rows.length} diseases across ${Object.keys(subtas).length} sub-categories`;

  const content = document.getElementById('detail-content');
  content.innerHTML = '';

  for (const [subta, diseases] of Object.entries(subtas)) {
    const section = document.createElement('div');
    section.className = 'subta-section';
    const heading = document.createElement('h3');
    heading.className = 'subta-heading';
    heading.innerHTML = `${subta} <span class="subta-count-badge">${diseases.length} disease${diseases.length !== 1 ? 's' : ''}</span>`;
    section.appendChild(heading);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    const table = document.createElement('table');
    table.className = 'disease-table';

    // Determine which columns to show
    const cols = ['disease', 'tam', 'score', 'prevalence', 'cause', 'presentation', 'treatment', 'soc_summary', 'unmet_need', 'pipeline_highlights'];
    const colLabels = {
      disease: 'Disease', tam: 'TAM', score: 'Score',
      prevalence: 'Prevalence', cause: 'Etiology', presentation: 'Presentation',
      treatment: 'Treatment', soc_summary: 'SOC Summary', unmet_need: 'Unmet Need',
      pipeline_highlights: 'Pipeline Highlights'
    };
    const activeCols = cols.filter(c => diseases.some(d => d[c] && d[c].trim()));
    // Always show disease name
    if (!activeCols.includes('disease')) activeCols.unshift('disease');

    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    activeCols.forEach(c => {
      const th = document.createElement('th');
      th.textContent = colLabels[c] || c;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    diseases.forEach(d => {
      const tr = document.createElement('tr');
      activeCols.forEach(c => {
        const td = document.createElement('td');
        const val = d[c] ? d[c].trim() : '';
        if (c === 'disease') {
          td.className = 'disease-name';
          td.textContent = val || '—';
        } else if (val) {
          td.className = 'cell-muted';
          td.textContent = val;
        } else {
          td.className = 'cell-empty';
          td.textContent = '—';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    section.appendChild(wrap);
    content.appendChild(section);
  }

  showView('detail');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ── Search ────────────────────────────────────────────────
let searchTimeout;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (!q) { showView('home'); return; }
  searchTimeout = setTimeout(() => runSearch(q), 150);
});

function runSearch(q) {
  const lower = q.toLowerCase();
  const matches = DATA.filter(r =>
    r.disease.toLowerCase().includes(lower) ||
    r.sub_ta.toLowerCase().includes(lower) ||
    r.therapeutic_area.toLowerCase().includes(lower) ||
    r.supercategory.toLowerCase().includes(lower)
  );

  const label = document.getElementById('search-label');
  label.innerHTML = `<strong>${matches.length}</strong> result${matches.length !== 1 ? 's' : ''} for "<strong>${q}</strong>"`;

  const content = document.getElementById('search-content');
  content.innerHTML = '';

  if (matches.length === 0) {
    content.innerHTML = '<p style="color:var(--color-text-muted);padding:var(--space-8) 0;">No matching diseases found.</p>';
  } else {
    const grouped = groupBy(matches, 'therapeutic_area');
    for (const [ta, rows] of Object.entries(grouped)) {
      const section = document.createElement('div');
      section.className = 'subta-section';
      const heading = document.createElement('h3');
      heading.className = 'subta-heading';
      heading.innerHTML = `${ta} <span class="subta-count-badge">${rows.length} match${rows.length !== 1 ? 'es' : ''}</span>`;
      section.appendChild(heading);
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      const table = document.createElement('table');
      table.className = 'disease-table';
      table.innerHTML = '<thead><tr><th>Disease</th><th>Sub-TA</th><th>TAM</th><th>Score</th></tr></thead>';
      const tbody = document.createElement('tbody');
      rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.innerHTML = `
          <td class="disease-name">${r.disease}</td>
          <td class="cell-muted">${r.sub_ta || '—'}</td>
          <td class="cell-muted">${r.tam || '—'}</td>
          <td class="cell-muted">${r.score || '—'}</td>
        `;
        tr.addEventListener('click', () => {
          document.getElementById('search-input').value = '';
          showTA(r.supercategory, r.therapeutic_area);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      wrap.appendChild(table);
      section.appendChild(wrap);
      content.appendChild(section);
    }
  }
  showView('search');
}

// ── Navigation ────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}
function showHome() {
  document.getElementById('search-input').value = '';
  showView('home');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ── Init ──────────────────────────────────────────────────
fetch('./diseases.csv')
  .then(r => r.text())
  .then(text => {
    DATA = parseCSV(text);
    renderHome();
  })
  .catch(() => {
    document.getElementById('ta-list-container').innerHTML =
      '<p style="color:var(--color-text-muted)">Could not load diseases.csv. Make sure it is in the same folder as this HTML file.</p>';
  });
</script>
</body>
</html>
