ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Oral Squamous Cell Carcinoma","symptoms":"Non-healing oral ulcer, pain, dysphagia, bleeding, neck mass","goal":"Achieve negative surgical margins; prevent locoregional recurrence; extend OS","soc":"Surgery for resectable early-stage (wide local excision ± neck dissection). Post-op: cisplatin + RT for high-risk features. Recurrent/metastatic: pembrolizumab (1L, KEYNOTE-048) or cetuximab + platin + 5-FU (EXTREME)."},{"ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Oropharyngeal Squamous Cell Carcinoma","symptoms":"Sore throat, dysphagia, neck mass, otalgia, voice changes (HPV-associated)","goal":"Achieve remission with de-intensified chemoradiation (HPV+); extend OS in metastatic","soc":"HPV+ (p16+) stage I–II: concurrent cisplatin + IMRT (or de-intensified chemoradiation per ECOG-3311). Stage III–IV: standard cisplatin + RT 70 Gy. Metastatic: pembrolizumab ± platin + 5-FU (KEYNOTE-048)."},{"ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Laryngeal Cancer","symptoms":"Hoarseness, dysphagia, sore throat, neck mass, stridor, hemoptysis","goal":"Achieve larynx preservation; cure with chemoradiation; extend OS in advanced","soc":"Larynx preservation: concurrent cisplatin (100 mg/m² q3w) + radiation (larynx-preservation approach) for stage III–IV. Surgery (total laryngectomy) for selected cases. Metastatic/recurrent: cetuximab + platin + 5-FU (EXTREME regimen); or pembrolizumab ± chemo."},{"ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Salivary Gland Tumors","symptoms":"Painless parotid/submandibular swelling, facial nerve palsy, hard mass, rapid growth","goal":"Achieve complete surgical resection; preserve facial nerve; control metastatic ACC","soc":"Surgery (parotidectomy/submandibulectomy with appropriate margins) ± adjuvant RT for high-grade. Metastatic salivary gland carcinoma: lenvatinib (ORR ~16%); no clear SoC; androgen receptor (AR)-targeted therapy for salivary duct carcinoma (AR+)."},{"ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Paranasal Sinus Cancer","symptoms":"Nasal obstruction, epistaxis, facial pain, proptosis, diplopia, cheek swelling","goal":"Achieve complete surgical resection with RT; control advanced disease","soc":"Surgery + postoperative RT ± concurrent cisplatin for resectable disease. Unresectable: definitive concurrent cisplatin + RT. Metastatic: EXTREME regimen (cetuximab + platin + 5-FU) or pembrolizumab (KEYNOTE-048 for HNSCC)."},{"ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Jaw Tumors","symptoms":"Jaw swelling, loose teeth, facial asymmetry, pain, trismus (ameloblastoma, odontogenic tumors)","goal":"Achieve complete surgical resection; preserve jaw function; prevent recurrence","soc":"Surgery (marginal or segmental resection) for most jaw tumors. Ameloblastoma: surgical resection with 1–2 cm margins. No standard pharmacologic SoC for most benign jaw tumors."},{"ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Nasopharyngeal Cancer","symptoms":"Epistaxis, hearing loss, diplopia, neck mass, headache, nasal obstruction","goal":"Achieve complete remission with chemoradiation; prevent locoregional and distant relapse","soc":"Concurrent cisplatin + radiation (definitive, >80% cure for stage I–III). Advanced (stage IVB): induction gemcitabine + cisplatin → concurrent chemoRT → adjuvant capecitabine (ADDX-NPC regimen). Metastatic: gemcitabine + cisplatin (GP regimen); camrelizumab + GP (Asian approvals)."},{"ta":"Oncology","subcategory":"Tumors of the Head and Neck","indication":"Otic Tumors","symptoms":"Hearing loss, ear pain, facial nerve paralysis, otorrhea, tinnitus","goal":"Complete surgical removal; preserve facial nerve; control locoregional disease","soc":"Surgery (lateral temporal bone resection or total temporal bone resection) for primary ear malignancies. Adjuvant RT for high-risk features. No pharmacologic SoC specifically for otic tumors."},{"ta":"Oncology","subcategory":"Tumors of the Lungs","indication":"Lung Carcinoma","symptoms":"Cough, hemoptysis, dyspnea, weight loss, chest pain","goal":"Achieve cure in early stage; exploit driver mutations; extend OS","soc":"NSCLC with driver mutation: osimertinib (EGFR), alectinib/lorlatinib (ALK+), selpercatinib (RET), sotorasib/adagrasib (KRAS G12C). NSCLC no driver/high PD-L1: pembrolizumab ± chemotherapy. SCLC extensive: etoposide + carboplatin + atezolizumab (IMpower133)."},{"ta":"Oncology","subcategory":"Tumors of the Lungs","indication":"Neuroendocrine Tumors of the Lungs","symptoms":"Cough, hemoptysis, carcinoid syndrome (flushing, diarrhea), Cushing syndrome","goal":"Control tumor growth; manage hormonal symptoms; prolong survival","soc":"Typical/atypical carcinoid: surgery (lobectomy/segmentectomy) for resectable disease; octreotide LAR (somatostatin analogue) for functional tumors or unresectable. Large-cell NEC and SCLC-like: platinum-etoposide chemotherapy."},{"ta":"Oncology","subcategory":"Tumors of the Lungs","indication":"Chest Wall Tumors","symptoms":"Chest wall pain, palpable mass, restricted breathing, rib tenderness","goal":"Achieve complete surgical resection; reconstruct chest wall; control metastatic disease","soc":"Surgery (wide local excision with chest wall reconstruction) for primary chest wall tumors. Systemic therapy per histology: sarcoma protocols for soft tissue/bone sarcomas; lung cancer protocols for direct lung invasion."},{"ta":"Oncology","subcategory":"Tumors of the Lungs","indication":"Tracheal Tumors","symptoms":"Dyspnea, stridor, cough, hemoptysis, voice changes","goal":"Achieve complete resection; restore airway patency; control disease","soc":"Surgery (tracheal resection with end-to-end anastomosis) for resectable primary tracheal tumors. Radiation therapy (60–66 Gy) for unresectable squamous cell carcinoma or adenoid cystic carcinoma."},{"ta":"Ophthalmology","subcategory":"Cataract","indication":"Cataract","symptoms":"Blurry vision, glare, halos, faded colors, impaired night vision","goal":"Restore vision clarity via lens removal and IOL implantation","soc":"Surgical: phacoemulsification with intraocular lens (IOL) implantation. No FDA-approved pharmacologic agent that reverses cataracts; surgery is definitive treatment."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Allergic Conjunctivitis","symptoms":"Bilateral itching, redness, tearing, chemosis, eyelid edema","goal":"Control itch and inflammation; reduce allergic mediators","soc":"Topical dual-action antihistamine/mast cell stabilizer eye drops: olopatadine (Patanol/Pataday 0.1–0.7%), ketotifen (Zaditor/Alaway OTC). Seasonal: as-needed or daily use during allergy season."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Pinguecula","symptoms":"Yellow-white conjunctival deposit, mild irritation, cosmetic concern, dryness","goal":"Relieve irritation; reduce inflammation; improve cosmesis","soc":"Artificial tears and UV protection (sunglasses) for mild symptoms. Topical mild corticosteroids (loteprednol 0.5% BID–QID) or NSAIDs for symptomatic inflammation. Surgical excision for cosmetic concern or severe discomfort."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Ocular Mucous Membrane Pemphigoid","symptoms":"Chronic conjunctival scarring, symblepharon, dry eye, progressive vision loss","goal":"Halt cicatrizing inflammation; preserve vision and conjunctival anatomy","soc":"Systemic immunosuppression: dapsone 50–150 mg/day for mild-moderate disease; cyclophosphamide or mycophenolate mofetil for severe/progressive disease. IV rituximab for refractory cases."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Pterygium","symptoms":"Fleshy conjunctival growth onto cornea, redness, irritation, astigmatism, vision blurring","goal":"Excise pterygium; prevent recurrence; reduce inflammation","soc":"Surgical excision with conjunctival autograft is gold-standard; topical mitomycin-C (0.02% intraoperative) reduces recurrence. Anti-VEGF (bevacizumab) perioperative injections showing benefit in trials."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Viral Conjunctivitis","symptoms":"Watery discharge, red eye, follicular reaction, photophobia, preauricular lymphadenopathy","goal":"Relieve symptoms; prevent spread; manage corneal involvement","soc":"Supportive care: cold compresses, preservative-free artificial tears, strict hygiene to prevent spread. No FDA-approved antiviral for most viral conjunctivitis (adenoviral). Topical corticosteroids for pseudomembranes."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Acute Bacterial Conjunctivitis","symptoms":"Red eye, purulent discharge, crusting, foreign body sensation","goal":"Eradicate bacteria; reduce symptoms; prevent spread","soc":"Topical ophthalmic antibiotics: polymyxin B/trimethoprim (Polytrim) or erythromycin ointment for mild cases; fluoroquinolone eye drops (ciprofloxacin, ofloxacin, moxifloxacin) for moderate-severe or contact lens wearers."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Scleritis","symptoms":"Severe deep eye pain, photophobia, red/violaceous sclera, decreased vision","goal":"Control scleral inflammation; prevent scleral thinning and vision loss","soc":"Oral NSAIDs (indomethacin 25–50 mg TID or ibuprofen 400–600 mg TID) for non-necrotizing scleritis. Systemic corticosteroids (prednisone 1 mg/kg/day) for NSAID-refractory or necrotizing scleritis."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Adult Inclusion Conjunctivitis","symptoms":"Chronic red eye, mucopurulent discharge, follicular conjunctivitis, lymphadenopathy","goal":"Eradicate Chlamydia trachomatis; prevent corneal scarring","soc":"Oral azithromycin 1g single dose or oral doxycycline 100 mg BID × 7 days. Topical tetracycline or erythromycin ointment adjunctive but insufficient alone."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Subconjunctival Hemorrhages","symptoms":"Painless bright red patch on sclera, typically unilateral, no vision change","goal":"Reassure patient; rule out underlying coagulopathy","soc":"None pharmacologic required. Self-resolving in 2–4 weeks. Artificial tears for irritation. Evaluate for hypertension or bleeding disorder if recurrent."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Episcleritis","symptoms":"Localized eye redness, mild pain, tearing, no vision change","goal":"Relieve pain and inflammation; prevent recurrence","soc":"Topical NSAIDs (ketorolac 0.5% QID) or topical corticosteroids (fluorometholone 0.1% QID) for symptomatic relief. Mild cases: artificial tears and observation."},{"ta":"Ophthalmology","subcategory":"Conjunctival and Scleral Disorders","indication":"Trachoma","symptoms":"Follicular conjunctivitis, eyelid scarring, trichiasis, corneal opacity, blindness","goal":"Eradicate Chlamydia trachomatis; prevent corneal blindness","soc":"Oral azithromycin 1g single dose (community mass drug administration for endemic areas) or tetracycline eye ointment 1% BID × 6 weeks as alternative."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Keratoconjunctivitis Sicca","symptoms":"Dry gritty eyes, burning, redness, blurred vision, foreign body sensation","goal":"Restore tear film; reduce ocular surface inflammation; improve symptoms","soc":"Artificial tears (preservative-free) as foundation. Topical cyclosporine 0.05%/0.09% (Restasis/Cequa) BID or lifitegrast 5% (Xiidra) BID for inflammatory dry eye disease."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Keratoconus","symptoms":"Progressive corneal thinning, irregular astigmatism, halos, distorted vision","goal":"Halt progression; improve visual acuity; avoid corneal transplant","soc":"Corneal collagen cross-linking (CXL) with riboflavin + UV-A (iLink system, FDA-approved 2016) to halt progression. Rigid gas-permeable or scleral contact lenses for visual correction."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Herpes Simplex Keratitis","symptoms":"Dendritic corneal lesion, eye pain, photophobia, tearing, decreased vision","goal":"Suppress HSV replication; prevent stromal scarring and recurrence","soc":"Topical ganciclovir 0.15% gel (Zirgan) 5× daily until healed (FDA-approved 2009) or trifluridine 1% drops for epithelial keratitis. Oral acyclovir/valacyclovir for stromal keratitis."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Herpes Zoster Ophthalmicus","symptoms":"Unilateral facial rash (V1), eye pain, red eye, corneal involvement, risk of postherpetic neuralgia","goal":"Shorten outbreak; prevent corneal and neurologic complications","soc":"Oral valacyclovir 1g TID × 7 days (preferred) or acyclovir 800 mg 5×/day × 7–10 days within 72 hours of rash onset. Topical prednisolone 1% for stromal keratitis or uveitis."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Bullous Keratopathy","symptoms":"Painful blisters on cornea, blurred vision, tearing, corneal edema","goal":"Reduce corneal edema; alleviate pain; restore vision with transplant","soc":"Topical hypertonic saline (NaCl 5% drops QID and ointment HS) to reduce corneal edema. Endothelial keratoplasty (DMEK/DSAEK) for visual rehabilitation."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Superficial Punctate Keratitis","symptoms":"Multiple tiny corneal epithelial erosions, photophobia, foreign body sensation, tearing","goal":"Identify and remove causative agent; promote corneal re-epithelialization","soc":"Remove causative agent (preservative-containing drops, UV exposure, dry eye, contact lens over-wear). Preservative-free artificial tears QID. Topical antibiotic for bacterial etiology; antiviral for herpetic SPK."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Peripheral Ulcerative Keratitis","symptoms":"Crescent-shaped peripheral corneal ulcer, pain, photophobia, vision loss","goal":"Suppress autoimmune corneal destruction; treat underlying systemic disease","soc":"Systemic immunosuppression: oral corticosteroids (prednisone 1 mg/kg/day) + methotrexate or mycophenolate. Topical preservative-free lubricants and antibiotic prophylaxis."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Corneal Ulcer","symptoms":"Severe eye pain, photophobia, redness, purulent discharge, vision loss","goal":"Eradicate infection; prevent corneal perforation; preserve vision","soc":"Topical fluoroquinolone eye drops (moxifloxacin 0.5% or ciprofloxacin 0.3%) every 1–2 hours initially for bacterial ulcers. Culture-directed therapy. Fungal: topical natamycin 5% (FDA-approved); voriconazole for refractory."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Interstitial Keratitis","symptoms":"Corneal stromal inflammation, photophobia, pain, vascularization, vision loss","goal":"Treat underlying infection; suppress corneal inflammation","soc":"Topical corticosteroids (prednisolone acetate 1% QID) for stromal inflammation plus systemic treatment of underlying cause (syphilis: IV/IM penicillin G; TB: RIPE therapy; HSV: oral acyclovir/valacyclovir)."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Cogan Syndrome","symptoms":"Interstitial keratitis, vestibuloauditory dysfunction, hearing loss, tinnitus","goal":"Suppress inflammation; preserve hearing and vision","soc":"High-dose systemic corticosteroids (prednisone 1–2 mg/kg/day) for acute attacks plus topical corticosteroids for corneal disease. Early treatment critical to preserve hearing."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Phlyctenular Keratoconjunctivitis","symptoms":"Localized nodular conjunctival/corneal lesion, tearing, photophobia, eye redness","goal":"Resolve phlycten; treat underlying hypersensitivity (TB, Staph)","soc":"Topical corticosteroids (prednisolone acetate 1% QID) as primary treatment. Treat underlying cause: anti-TB therapy (RIPE) for TB-associated; topical antibiotic for Staphylococcal blepharitis."},{"ta":"Ophthalmology","subcategory":"Corneal Disorders","indication":"Keratomalacia","symptoms":"Corneal softening/melting, night blindness, xerophthalmia, risk of perforation","goal":"Urgent vitamin A replacement; prevent corneal perforation and blindness","soc":"High-dose vitamin A: IM/oral retinol palmitate 200,000 IU on Day 1, 2, and 14 (WHO protocol). Topical lubricants and antibiotic prophylaxis."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Blepharitis","symptoms":"Eyelid margin redness, crusting, burning, foreign body sensation, morning stickiness","goal":"Control lid margin inflammation; reduce bacterial colonization and Demodex","soc":"Eyelid hygiene (warm compresses + lid scrubs) BID. Topical azithromycin 1% ophthalmic solution (AzaSite) for posterior blepharitis. Oral doxycycline 100 mg BID × 4–8 weeks for refractory meibomian gland dysfunction."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Eyelid Growths","symptoms":"Visible eyelid mass, variable pain, eyelid distortion, vision change if large","goal":"Excise or treat growth; rule out malignancy; restore eyelid function","soc":"Surgical excision with histopathologic examination is standard for most eyelid growths. Topical imiquimod 5% cream for select superficial BCC or sebaceous hyperplasia. Watchful waiting for clearly benign asymptomatic lesions."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Ectropion","symptoms":"Outward-turning lower eyelid, epiphora, conjunctival exposure, irritation","goal":"Restore eyelid position; protect cornea; relieve symptoms","soc":"Surgical repair (lateral tarsal strip or medial spindle procedure) is definitive treatment. Lubricating eye drops and ointment for symptomatic relief pending surgery."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Chalazion","symptoms":"Painless eyelid lump, lid swelling, occasional blurring from pressure on cornea","goal":"Resolve chalazion; reduce lid inflammation; prevent recurrence","soc":"Warm compresses 10–15 minutes QID for 4–6 weeks (conservative management). Intralesional triamcinolone acetonide 0.1–0.2 mL injection for persistent chalazia. Surgical incision and curettage (I&C) for large non-resolving lesions."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Hordeolum (Stye)","symptoms":"Painful red eyelid bump, localized swelling, tenderness, possible discharge","goal":"Drain abscess; eradicate bacteria; prevent recurrence","soc":"Warm compresses 10–15 min QID × 5–7 days to facilitate spontaneous drainage. Topical antibiotic ointment (bacitracin or erythromycin) for secondary infection. Incision and drainage for persistent or pointing abscess."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Blepharospasm","symptoms":"Involuntary eyelid closure, forceful blinking, functional blindness, photophobia","goal":"Reduce involuntary spasm; restore functional vision and quality of life","soc":"OnabotulinumtoxinA (Botox, 2.5–5 units per injection site) periocular injection every 3–4 months — gold standard FDA-approved treatment."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Trichiasis","symptoms":"Misdirected eyelashes abrading cornea, pain, tearing, corneal ulceration","goal":"Remove or redirect aberrant lashes; protect corneal surface","soc":"Epilation (manual lash removal) for immediate relief. Definitive: electrolysis, cryotherapy, radiofrequency ablation, or surgical correction (eyelid rotation) to permanently eliminate misdirected lashes."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Entropion","symptoms":"Inward-turning eyelid, corneal irritation from lashes, redness, pain, tearing","goal":"Correct lid margin inversion; protect cornea from lash abrasion","soc":"Temporary: Botox injection to orbicularis muscle or tape the lid outward. Definitive: surgical repair (horizontal lid shortening, Quickert sutures, Jones procedure). Lubricating drops and ointment for corneal protection."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Dacryostenosis","symptoms":"Epiphora (tearing), mucoid discharge, recurrent conjunctivitis, nasolacrimal duct obstruction","goal":"Restore lacrimal drainage patency; prevent recurrent infections","soc":"In infants: Crigler massage (digital compression of lacrimal sac) + topical antibiotic drops for secondary infection; spontaneous resolution by 12 months in ~90%. Surgical: probing and irrigation if not resolved by 12–13 months."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Dacryocystitis","symptoms":"Tender lacrimal sac swelling, epiphora, purulent discharge, periorbital redness","goal":"Eradicate infection; restore lacrimal drainage","soc":"Oral antibiotics targeting common pathogens (amoxicillin-clavulanate 875 mg BID or cephalexin 500 mg QID × 7–10 days) for acute dacryocystitis. IV antibiotics (oxacillin, ceftriaxone) for severe cases."},{"ta":"Ophthalmology","subcategory":"Eyelid and Lacrimal Disorders","indication":"Canaliculitis","symptoms":"Medial eyelid redness, discharge, tearing, tender canaliculus, epiphora","goal":"Eradicate pathogen; relieve obstruction; restore lacrimal drainage","soc":"Surgical canaliculotomy with concretion removal plus topical antibiotic (penicillin G or cefazolin drops) for Actinomyces israelii (most common cause). Topical antibiotic irrigation of canaliculus."},{"ta":"Ophthalmology","subcategory":"Glaucoma","indication":"Primary Open-Angle Glaucoma","symptoms":"Painless visual field loss (peripheral first), elevated IOP, optic disc cupping","goal":"Lower IOP; halt optic nerve damage; preserve visual field","soc":"Prostaglandin analogue eye drops: latanoprost 0.005% (Xalatan), bimatoprost 0.03% (Lumigan), travoprost 0.004% QHS — lower IOP by 25–35%. Preservative-free formulations preferred for compliance."},{"ta":"Ophthalmology","subcategory":"Glaucoma","indication":"Angle-Closure Glaucoma","symptoms":"Acute severe eye pain, halos, nausea, vomiting, markedly elevated IOP, vision loss","goal":"Rapidly lower IOP; open anterior chamber angle; prevent optic nerve damage","soc":"Acute attack: IV/oral acetazolamide + topical beta-blocker (timolol 0.5%) + topical alpha-agonist (apraclonidine 1% or brimonidine 0.2%) + topical steroid to break attack. Laser peripheral iridotomy (LPI) definitively prevents recurrence."},{"ta":"Ophthalmology","subcategory":"Optic Nerve Disorders","indication":"Ischemic Optic Neuropathy","symptoms":"Sudden painless monocular vision loss, altitudinal visual field defect, swollen optic disc","goal":"Prevent fellow eye involvement; manage underlying vascular risk factors","soc":"Giant cell arteritis-related (AAION): high-dose corticosteroids URGENTLY (IV methylprednisolone 1g/day × 3 days, then oral prednisone 1 mg/kg/day) to prevent fellow eye loss. Non-arteritic NAION: no proven pharmacologic treatment; risk factor modification."},{"ta":"Ophthalmology","subcategory":"Optic Nerve Disorders","indication":"Optic Neuritis","symptoms":"Painful monocular vision loss, color desaturation, afferent pupillary defect, often MS-related","goal":"Accelerate visual recovery; reduce risk of MS conversion; preserve optic nerve","soc":"IV methylprednisolone 1g/day × 3 days (ONTT protocol) accelerates visual recovery but does not improve final VA. Observe if mild. Treat underlying MS per neurologist."},{"ta":"Ophthalmology","subcategory":"Optic Nerve Disorders","indication":"Compressive Optic Neuropathy","symptoms":"Progressive painless vision loss, color desaturation, afferent pupillary defect","goal":"Decompress optic nerve; preserve and restore visual function","soc":"Surgical decompression (orbitotomy, craniotomy, or endoscopic endonasal) to remove compressing mass. Systemic corticosteroids (dexamethasone) for rapid vision-threatening optic nerve compression while arranging surgery."},{"ta":"Ophthalmology","subcategory":"Optic Nerve Disorders","indication":"Papilledema","symptoms":"Bilateral optic disc swelling, headache, visual obscurations, pulsatile tinnitus","goal":"Reduce ICP; prevent optic nerve damage and permanent vision loss","soc":"Acetazolamide (Diamox) 500 mg–2g/day orally (carbonic anhydrase inhibitor, reduces CSF production) for idiopathic intracranial hypertension (IIH). Weight loss is essential in obese IIH patients."},{"ta":"Ophthalmology","subcategory":"Optic Nerve Disorders","indication":"Hereditary Optic Neuropathies","symptoms":"Bilateral painless central vision loss, color vision defects, cecocentral scotoma","goal":"Preserve or restore remaining vision; address mitochondrial dysfunction","soc":"Idebenone (Raxone) 900 mg/day for Leber hereditary optic neuropathy (LHON) — approved in EU/UK, not FDA-approved in US; FDA declined approval. Avoid mitochondrial toxins (tobacco, alcohol, chloramphenicol). Genetic counseling."},{"ta":"Ophthalmology","subcategory":"Optic Nerve Disorders","indication":"Toxic and Nutritional Optic Neuropathies","symptoms":"Bilateral painless central vision loss, color desaturation, cecocentral scotoma","goal":"Remove toxic agent; supplement deficient nutrients; halt progressive vision loss","soc":"Remove causative agent (ethambutol, methanol, tobacco, alcohol). B-vitamin supplementation (B1, B2, B6, B12) for nutritional deficiency. Folate supplementation. Multivitamin and nutritional support."},{"ta":"Ophthalmology","subcategory":"Orbital Diseases","indication":"Inflammatory Orbital Disease","symptoms":"Proptosis, periorbital pain, diplopia, eyelid swelling, restricted motility","goal":"Suppress orbital inflammation; preserve vision and motility","soc":"High-dose systemic corticosteroids (oral prednisone 1–1.5 mg/kg/day or IV methylprednisolone 1g/day × 3 days) for idiopathic orbital inflammation (orbital pseudotumor). Teprotumumab for thyroid eye disease-related orbital inflammation."},{"ta":"Ophthalmology","subcategory":"Orbital Diseases","indication":"Tumors of the Orbit","symptoms":"Proptosis, diplopia, vision loss, palpable orbital mass, eyelid displacement","goal":"Achieve complete tumor removal or control; preserve vision and globe","soc":"Surgical excision for most benign orbital tumors (cavernous hemangioma, dermoid cyst, neurofibroma). For malignant tumors: surgery + RT ± chemotherapy per histology (lymphoma: R-CHOP + orbital RT; rhabdomyosarcoma: chemotherapy + RT; lacrimal gland carcinoma: surgery + RT)."},{"ta":"Ophthalmology","subcategory":"Orbital Diseases","indication":"Orbital Cellulitis","symptoms":"Proptosis, fever, restricted painful eye movement, eyelid redness and swelling","goal":"Eradicate infection; prevent intracranial spread and vision loss","soc":"IV antibiotics: ampicillin-sulbactam 3g Q6h or ceftriaxone 2g Q12h + metronidazole 500 mg Q8h. Vancomycin added if MRSA suspected. Surgical drainage of subperiosteal/orbital abscess when present."},{"ta":"Ophthalmology","subcategory":"Orbital Diseases","indication":"Preseptal Cellulitis","symptoms":"Eyelid redness, swelling anterior to orbital septum, no proptosis or motility restriction","goal":"Eradicate periorbital skin/soft tissue infection; prevent orbital spread","soc":"Oral antibiotics for mild-moderate cases: amoxicillin-clavulanate 875 mg BID or cephalexin 500 mg QID × 7–10 days. IV antibiotics (ceftriaxone ± clindamycin) for severe cases or when orbital cellulitis cannot be excluded."},{"ta":"Ophthalmology","subcategory":"Orbital Diseases","indication":"Cavernous Sinus Thrombosis","symptoms":"Severe headache, fever, proptosis, ophthalmoplegia, chemosis, visual loss","goal":"Eradicate infection; prevent thrombus propagation; reduce mortality","soc":"IV antibiotics: vancomycin 15–20 mg/kg/dose Q8-12h + piperacillin-tazobactam 4.5g Q6h or cefotaxime 2g Q4h for broad coverage including MRSA and anaerobes. IV anticoagulation (heparin) controversial but used by many centers."},{"ta":"Ophthalmology","subcategory":"Refractive Error","indication":"Refractive Error","symptoms":"Blurred vision (near or distance), headaches, eye strain, squinting","goal":"Correct refractive error; optimize visual acuity; prevent amblyopia","soc":"Corrective lenses (spectacles or contact lenses) for all forms of refractive error. Refractive surgery (LASIK, PRK, SMILE) for eligible patients. Atropine 0.01% eye drops for myopia progression control in children."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Diabetic Retinopathy","symptoms":"Visual blurring, floaters, vision loss, microaneurysms, neovascularization","goal":"Prevent progression; reduce macular edema; preserve vision in diabetes","soc":"Diabetic macular edema: intravitreal anti-VEGF (ranibizumab 0.3 mg [Lucentis], aflibercept 2 mg [Eylea], or faricimab [Vabysmo]) as first-line. Systemic: tight glycemic control (HbA1c <7%) and blood pressure control."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Age-Related Macular Degeneration (AMD or ARMD)","symptoms":"Central vision loss, metamorphopsia, scotoma, difficulty reading","goal":"Prevent wet AMD progression; stabilize or improve vision; slow geographic atrophy","soc":"Wet/neovascular AMD: intravitreal anti-VEGF injections — ranibizumab (Lucentis), aflibercept (Eylea), bevacizumab (Avastin off-label), faricimab (Vabysmo 2022, anti-VEGF/Ang-2), brolucizumab (Beovu). Dry AMD: AREDS2 supplements (vitamin C, E, zinc, copper, lutein, zeaxanthin) for intermediate AMD."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Epiretinal Membrane","symptoms":"Metamorphopsia, blurred central vision, monocular diplopia, decreased contrast sensitivity","goal":"Remove epiretinal membrane; restore retinal architecture and vision","soc":"Observation for mild or minimally symptomatic ERM. Surgical pars plana vitrectomy (PPV) with membrane peeling is the only definitive treatment for visually significant ERM."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Hypertensive Retinopathy","symptoms":"Arteriovenous nicking, cotton-wool spots, flame hemorrhages, disk edema, vision changes","goal":"Control blood pressure; prevent retinal and optic nerve damage","soc":"Antihypertensive therapy targeting BP <130/80 mmHg: ACE inhibitors, ARBs, calcium channel blockers, or thiazide diuretics per JNC/ACC/AHA guidelines. No specific ophthalmic pharmacologic treatment."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Branch Retinal Vein Occlusion","symptoms":"Sectoral vision loss, metamorphopsia, retinal hemorrhages, macular edema","goal":"Reduce macular edema; restore vision; prevent neovascular complications","soc":"Intravitreal anti-VEGF injections: ranibizumab 0.5 mg (BRAVO trial, FDA-approved) or bevacizumab (off-label) monthly × 6, then PRN. Intravitreal dexamethasone implant (Ozurdex 0.7 mg) every 3–6 months alternative."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Retinitis Pigmentosa","symptoms":"Progressive night blindness, tunnel vision, bone-spicule pigmentation, ERG attenuation","goal":"Slow rod/cone photoreceptor degeneration; preserve central vision","soc":"Vitamin A palmitate 15,000 IU/day (slows ERG decline per Berson trial); omega-3 fatty acids adjunctive. No disease-modifying FDA-approved pharmacologic treatment for most RP."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Central Retinal Vein Occlusion","symptoms":"Sudden painless vision loss, diffuse retinal hemorrhages, disc edema, macular edema","goal":"Reduce macular edema; restore vision; prevent neovascular glaucoma","soc":"Intravitreal anti-VEGF injections: ranibizumab 0.5 mg (CRUISE trial) or aflibercept 2 mg (COPERNICUS/GALILEO) monthly × 6 then PRN. Intravitreal dexamethasone implant (Ozurdex) Q3 months as alternative."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Cancers Affecting the Retina","symptoms":"Vision loss, floaters, retinal mass, leukocoria in children (retinoblastoma)","goal":"Eradicate tumor; preserve vision and eye; prevent metastasis","soc":"Retinoblastoma: intra-arterial chemotherapy (IAC) with melphalan ± topotecan ± carboplatin for intraocular Rb; IV carboplatin + etoposide + vincristine (CEV) for bilateral Rb. Choroidal melanoma: brachytherapy (plaque) or proton beam RT for most; enucleation for large tumors."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Retinal Detachment","symptoms":"Flashes, floaters, curtain-like visual field loss, shadow in peripheral vision","goal":"Reattach retina; preserve central vision; prevent proliferative vitreoretinopathy","soc":"Surgical: pneumatic retinopexy, scleral buckle, or pars plana vitrectomy (PPV) depending on break location, extent, and PVR. Surgery is the only treatment; no pharmacologic SoC."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Branch Retinal Artery Occlusion","symptoms":"Sudden painless sectoral visual field loss, whitening of retinal segment","goal":"Restore retinal perfusion; preserve visual field; address systemic embolic risk","soc":"No proven pharmacologic treatment for BRAO itself. Anterior chamber paracentesis (IOP lowering) and ocular massage historically used; systemic evaluation for cardioembolic source. Aspirin 325 mg + systemic workup (carotid duplex, cardiac echo, lipid panel)."},{"ta":"Ophthalmology","subcategory":"Retinal Disorders","indication":"Central Retinal Artery Occlusion","symptoms":"Sudden complete monocular vision loss, cherry-red spot, pale retina","goal":"Restore retinal arterial perfusion within therapeutic window; prevent permanent blindness","soc":"No FDA-approved pharmacologic treatment. IV tissue plasminogen activator (tPA) within 4.5 hours is used at some centers (EAGLE trial negative for intra-arterial; systemic being evaluated). Ocular massage, anterior chamber paracentesis, IOP-lowering. Hemodilution (pentoxifylline) off-label."},{"ta":"Ophthalmology","subcategory":"Uveitis and Related Disorders","indication":"Uveitis Caused by Systemic Rheumatic Disease","symptoms":"Recurrent eye pain, redness, photophobia, floaters, vision loss linked to systemic disease","goal":"Control intraocular inflammation; prevent structural complications; preserve vision","soc":"Topical corticosteroids (prednisolone acetate 1% Q1–2h) + cycloplegic (cyclopentolate 1%) for acute anterior uveitis. Systemic corticosteroids (prednisone 1 mg/kg/day) for intermediate/posterior uveitis. Adalimumab (Humira, FDA-approved 2016 for non-infectious uveitis) for refractory/chronic cases."},{"ta":"Ophthalmology","subcategory":"Uveitis and Related Disorders","indication":"Infectious Uveitis","symptoms":"Eye pain, photophobia, floaters, blurred vision, hypopyon, keratic precipitates","goal":"Eradicate pathogen; control intraocular inflammation; prevent vision loss","soc":"Treat specific pathogen: CMV uveitis (HIV patient): ganciclovir 5 mg/kg IV Q12h or valganciclovir 900 mg BID. Toxoplasma chorioretinitis: pyrimethamine 100 mg loading then 25 mg/day + sulfadiazine 1g QID + folinic acid. Herpetic uveitis (HSV/VZV): oral valacyclovir 1g TID."},{"ta":"Ophthalmology","subcategory":"Uveitis and Related Disorders","indication":"Endophthalmitis","symptoms":"Severe eye pain, vision loss, hypopyon, vitritis, periorbital swelling","goal":"Eradicate intraocular infection; prevent permanent vision loss or evisceration","soc":"Intravitreal antibiotics: vancomycin 1 mg/0.1 mL + ceftazidime 2.25 mg/0.1 mL (bacterial); voriconazole 100 mcg/0.1 mL or amphotericin B 10 mcg/0.1 mL for fungal. Pars plana vitrectomy for severe cases (BCVA ≤light perception per EVS trial)."},{"ta":"Ophthalmology","subcategory":"Uveitis and Related Disorders","indication":"Sympathetic Ophthalmia","symptoms":"Bilateral granulomatous uveitis after penetrating eye injury, photophobia, vision loss","goal":"Suppress bilateral uveitis; preserve vision in sympathizing eye","soc":"High-dose systemic corticosteroids (prednisone 1–2 mg/kg/day or IV methylprednisolone 1g/day × 3 days) initiated urgently. Enucleation of injured eye within 2 weeks of injury may prevent development but not recommended after sympathetic ophthalmia develops."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Otosclerosis","symptoms":"Progressive conductive hearing loss, tinnitus, preferential hearing in noisy environments","goal":"Halt bone remodeling, restore hearing","soc":"Sodium fluoride (off-label) to potentially slow progression; hearing aids for early disease; stapedectomy is definitive treatment."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Otitis Media (Serous)","symptoms":"Painless hearing loss, ear fullness, mild conductive loss in children","goal":"Restore hearing, prevent language delay","soc":"Watchful waiting × 3 months (most resolve spontaneously); intranasal corticosteroids may accelerate resolution."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Otalgia","symptoms":"Ear pain (primary or referred), tenderness","goal":"Identify and treat underlying cause, relieve pain","soc":"Analgesics (NSAIDs, acetaminophen) for symptomatic relief; antibiotics for infectious causes (AOM, OE)."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Otitis Media (Acute)","symptoms":"Ear pain, fever, hearing loss, irritability in children","goal":"Eradicate bacterial infection, relieve pain","soc":"Amoxicillin 80–90 mg/kg/day × 5–10 days (high dose for Streptococcus pneumoniae coverage); amoxicillin-clavulanate if treatment failure."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Otitis Media (Chronic Suppurative)","symptoms":"Persistent ear discharge, hearing loss, perforated eardrum","goal":"Eliminate infection, close perforation, preserve hearing","soc":"Topical ciprofloxacin otic solution (ciprofloxacin 0.3% drops) applied after aural toilet — superior to systemic antibiotics for CSOM."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Otorrhea","symptoms":"Ear discharge (watery, purulent, or bloody), ear pain, hearing loss","goal":"Identify and treat underlying cause, clear infection","soc":"Topical ciprofloxacin/hydrocortisone drops for infectious otorrhea; systemic antibiotics if systemic infection present."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Myringitis","symptoms":"Ear pain, hearing loss, discharge, blisters on eardrum","goal":"Resolve infection, relieve pain","soc":"Topical antibiotic/steroid drops (ciprofloxacin-hydrocortisone) for bullous myringitis; analgesia; oral antibiotics if bacterial otitis media coexists."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Traumatic Perforation of the Tympanic Membrane","symptoms":"Sudden ear pain, hearing loss, tinnitus after trauma or blast","goal":"Promote healing, prevent infection, restore hearing","soc":"Conservative management (keep ear dry, no water entry); topical antibiotics if contaminated. Most heal spontaneously."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Otic Barotrauma","symptoms":"Ear pain, fullness, hearing loss during pressure change","goal":"Equalize ear pressure, prevent tympanic membrane rupture","soc":"Intranasal decongestants (oxymetazoline, pseudoephedrine) before flights/diving; auto-inflation techniques. Analgesics for pain."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Middle","indication":"Mastoiditis","symptoms":"Post-auricular swelling, ear pain, fever, hearing loss","goal":"Eradicate infection, prevent intracranial complications","soc":"IV amoxicillin-clavulanate or ceftriaxone for acute mastoiditis; mastoidectomy for complicated cases."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Outer","indication":"Dermatitis of the Ear Canal (Chronic Otitis Externa)","symptoms":"Ear itching, scaling, discharge, pain, recurrent infections","goal":"Reduce inflammation, control infection, prevent recurrence","soc":"Topical corticosteroid ear drops (e.g., hydrocortisone 1%) with or without antifungal (clotrimazole) or antibiotic (ciprofloxacin-hydrocortisone otic solution)."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Outer","indication":"External Ear Obstructions","symptoms":"Hearing loss, ear fullness, pain, itching","goal":"Remove obstruction, restore hearing","soc":"Cerumenolytic ear drops (carbamide peroxide, docusate, mineral oil) for cerumen impaction; irrigation or manual removal."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Outer","indication":"External Otitis (Acute)","symptoms":"Ear canal pain, tenderness, discharge, swelling","goal":"Eradicate infection, relieve pain, restore canal","soc":"Topical ciprofloxacin-hydrocortisone otic solution (Ciprodex) or acetic acid drops; analgesics for pain."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Outer","indication":"Perichondritis of the Ear","symptoms":"Painful red swollen ear (pinna), fever, risk of cartilage destruction","goal":"Eradicate Pseudomonas infection, preserve ear cartilage","soc":"Oral ciprofloxacin (750 mg BID × 7–14 days) for mild-moderate perichondritis; IV fluoroquinolone for severe cases."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Outer","indication":"Malignant External Otitis","symptoms":"Severe ear pain, purulent discharge, cranial nerve palsy, fever (immunocompromised)","goal":"Eradicate Pseudomonas infection, prevent intracranial spread","soc":"IV ciprofloxacin or antipseudomonal beta-lactam (piperacillin-tazobactam) for 4–8 weeks; topical ciprofloxacin adjunct."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Outer","indication":"Auricular Hematoma","symptoms":"Ear swelling, pain, deformity after trauma","goal":"Drain hematoma, prevent cauliflower ear deformity","soc":"None (pharmacologic); treatment is mechanical drainage (aspiration or incision and drainage) plus pressure dressing."},{"ta":"Otolaryngology","subcategory":"Ear Disorders — Outer","indication":"Foreign Body (External Ear)","symptoms":"Ear fullness, pain, hearing loss, discharge","goal":"Safe removal of foreign body without trauma","soc":"None (pharmacologic); mechanical removal (irrigation, suction, forceps, right-angle hook) under direct visualization."},{"ta":"Otolaryngology","subcategory":"Hearing Disorders","indication":"Tinnitus","symptoms":"Persistent ringing or noise in ears, sleep disruption, anxiety","goal":"Reduce tinnitus loudness/distress, improve quality of life","soc":"No FDA-approved pharmacologic treatment; cognitive behavioral therapy (CBT) and sound therapy are first-line. Hearing aids for comorbid hearing loss."},{"ta":"Otolaryngology","subcategory":"Hearing Disorders","indication":"Hearing Loss","symptoms":"Reduced hearing acuity, speech difficulty, social withdrawal","goal":"Restore or compensate for hearing, prevent progression","soc":"Hearing aids for sensorineural hearing loss (SNHL); cochlear implants for severe-profound SNHL. No approved pharmacologic treatment for SNHL."},{"ta":"Otolaryngology","subcategory":"Hearing Disorders","indication":"Drug-Induced Ototoxicity","symptoms":"Progressive hearing loss, tinnitus, balance problems after drug exposure","goal":"Prevent or halt cisplatin/aminoglycoside-induced hearing loss","soc":"Sodium thiosulfate (STS): approved (Pedmark) for cisplatin-induced ototoxicity in pediatric patients. No approved drug for aminoglycoside ototoxicity prevention."},{"ta":"Otolaryngology","subcategory":"Hearing Disorders","indication":"Sudden Hearing Loss","symptoms":"Sudden unilateral sensorineural hearing loss over ≤72 hours","goal":"Recover hearing, prevent permanent loss","soc":"Systemic oral prednisone (1 mg/kg/day × 10–14 days, max 60 mg) as first-line; intratympanic dexamethasone as rescue/alternative."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Dizziness and Vertigo","symptoms":"Spinning sensation, imbalance, nausea, falls","goal":"Reduce attack frequency and severity, improve balance","soc":"Meclizine (antihistamine/anticholinergic) for acute vestibular episodes; betahistine for chronic vestibular disorders in some guidelines."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Meniere Disease","symptoms":"Episodic vertigo, low-frequency hearing loss, tinnitus, ear fullness","goal":"Reduce vertigo attack frequency and hearing loss progression","soc":"Low-sodium diet + diuretics (hydrochlorothiazide-triamterene) as first-line pharmacotherapy; betahistine widely used outside US."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Vestibular Neuronitis","symptoms":"Sudden prolonged vertigo, nausea/vomiting, gait instability, no hearing loss","goal":"Control acute vertigo, accelerate vestibular compensation","soc":"Methylprednisolone (oral corticosteroid) to speed recovery; vestibular suppressants (diazepam, meclizine) for acute symptom control."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Vestibular Schwannoma","symptoms":"Progressive unilateral hearing loss, tinnitus, vertigo, facial numbness","goal":"Control tumor, preserve hearing and facial nerve function","soc":"None (pharmacologic for NF2-associated schwannomas: bevacizumab anti-VEGF used off-label). Primary treatment: observation (small), stereotactic radiosurgery (Gamma Knife), or microsurgical resection."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Nystagmus","symptoms":"Involuntary eye movements, oscillopsia, visual blurring, head bobbing","goal":"Reduce nystagmus intensity, improve visual acuity","soc":"Memantine (for acquired pendular nystagmus) or gabapentin (infantile nystagmus) — limited evidence, off-label use."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Benign Paroxysmal Positional Vertigo","symptoms":"Brief spinning vertigo triggered by head position changes","goal":"Resolve vertigo with canalith repositioning","soc":"Canalith repositioning procedure (Epley maneuver) — non-pharmacologic; vestibular suppressants (meclizine) for acute symptomatic relief only."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Herpes Zoster Oticus","symptoms":"Ear pain, vesicular rash, facial palsy, hearing loss, vertigo","goal":"Accelerate healing, prevent facial nerve complications","soc":"Oral valacyclovir (1g TID × 7 days) plus prednisone (60 mg tapered over 10 days); treat within 72 hours for best outcomes."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Purulent Labyrinthitis","symptoms":"Sudden profound hearing loss, severe vertigo, nausea, fever","goal":"Eradicate infection, preserve cochlear function","soc":"IV broad-spectrum antibiotics (ceftriaxone) targeting meningitis/otogenic source; IV dexamethasone to reduce inflammation and hearing loss."},{"ta":"Otolaryngology","subcategory":"Inner Ear and Vestibular Disorders","indication":"Third Window Syndrome","symptoms":"Low-frequency conductive hearing loss, autophony, pulsatile tinnitus, hyperacusis to bone conduction","goal":"Symptom control or surgical obliteration of third window","soc":"None (pharmacologic); primary treatment is surgical (plugging of superior semicircular canal dehiscence or round window reinforcement)."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Vocal Fold Paralysis","symptoms":"Breathy/weak voice, aspiration, dysphagia, reduced cough strength","goal":"Restore vocal fold function, prevent aspiration","soc":"Voice therapy for unilateral VFP; no approved pharmacologic agent. Surgical: medialization laryngoplasty, arytenoid adduction, or vocal fold injection."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Laryngitis","symptoms":"Hoarseness, voice loss, sore throat, dry cough","goal":"Restore voice, relieve inflammation","soc":"Voice rest and humidification for acute laryngitis; PPIs for LPR-related laryngitis. Antibiotics only for documented bacterial infection."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Laryngeal Dystonia","symptoms":"Strained, strangled, or whispery voice; intermittent voice breaks","goal":"Reduce abnormal vocal cord spasm, restore normal voice","soc":"Botulinum toxin A injection (onabotulinumtoxinA, Botox) into the thyroarytenoid muscle — standard of care for adductor laryngeal dystonia."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Vocal Fold Polyps, Nodules, and Granulomas","symptoms":"Hoarseness, voice fatigue, reduced pitch range, vocal effort","goal":"Restore normal voice, resolve benign vocal lesion","soc":"Voice therapy (behavioral modification) as first-line for nodules and small polyps; PPIs for LPR-associated granulomas."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Laryngeal Contact Ulcers","symptoms":"Throat pain, hoarseness, chronic throat clearing, globus sensation","goal":"Heal ulcers, reduce reflux, correct voice misuse","soc":"Proton pump inhibitors (PPIs, e.g., omeprazole 40 mg BID) for laryngopharyngeal reflux; voice therapy."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Benign Laryngeal Tumors","symptoms":"Hoarseness, voice change, throat discomfort, dysphagia","goal":"Remove tumor, restore voice and airway patency","soc":"None (pharmacologic); primary treatment is surgical (microlaryngoscopy with excision). Voice therapy for vocal fold polyps/nodules."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Laryngotracheal Stenosis","symptoms":"Progressive breathing difficulty, stridor, exercise intolerance","goal":"Restore airway patency, avoid tracheostomy","soc":"None (pharmacologic first-line); primary treatment is surgical (dilation, endoscopic laser, laryngotracheal reconstruction). Intralesional steroid injection (triamcinolone) used perioperatively to prevent restenosis."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Epiglottitis","symptoms":"Severe sore throat, drooling, stridor, high fever, difficulty swallowing","goal":"Secure airway, eradicate infection","soc":"IV ceftriaxone (empiric broad-spectrum antibiotic) plus airway management (intubation or tracheotomy if needed); corticosteroids adjunctive."},{"ta":"Otolaryngology","subcategory":"Laryngeal Disorders","indication":"Laryngoceles","symptoms":"Neck mass, hoarseness, dysphagia, airway obstruction","goal":"Remove cyst, relieve obstruction","soc":"None (pharmacologic); primary treatment is surgical excision (external or endoscopic approach)."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Sinusitis","symptoms":"Facial pain, congestion, purulent discharge, headache","goal":"Eliminate infection, restore sinus drainage","soc":"Intranasal saline irrigation + intranasal corticosteroids for chronic/subacute sinusitis; amoxicillin-clavulanate for documented acute bacterial sinusitis."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Nasal Polyps","symptoms":"Nasal obstruction, loss of smell, chronic congestion, facial pressure","goal":"Reduce polyp size, restore smell and airway","soc":"Intranasal corticosteroids (mometasone, fluticasone) as primary medical treatment; short courses of oral corticosteroids for acute exacerbations."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Nasal Congestion and Rhinorrhea","symptoms":"Blocked nose, runny nose, sneezing, facial pressure","goal":"Relieve congestion, reduce secretions","soc":"Intranasal saline irrigation; intranasal corticosteroids (fluticasone, mometasone) for allergic or chronic rhinitis; oral/topical decongestants (oxymetazoline, pseudoephedrine) short-term."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Nonallergic Rhinitis","symptoms":"Chronic nasal congestion, rhinorrhea without allergic trigger","goal":"Reduce nasal symptoms, improve quality of life","soc":"Intranasal corticosteroids (fluticasone) for NAR with eosinophilia; ipratropium bromide 0.03% nasal spray for rhinorrhea-predominant NAR."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Epistaxis","symptoms":"Nosebleed, anterior or posterior bleeding","goal":"Stop bleeding, prevent recurrence, treat underlying cause","soc":"Direct pressure × 10–20 minutes for acute anterior epistaxis; topical tranexamic acid or oxymetazoline for vasoconstriction. Nasal cauterization or packing for persistent cases."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Bacterial Nasal Infections","symptoms":"Nasal discharge, congestion, facial pain, fever","goal":"Eradicate bacteria, resolve sinusitis symptoms","soc":"Amoxicillin-clavulanate (875/125 mg BID × 5–7 days) for acute bacterial rhinosinusitis; nasal saline irrigation adjunctive."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Septal Deviation and Perforation","symptoms":"Nasal obstruction, crusting, bleeding, whistling noise","goal":"Relieve obstruction, close perforation, prevent crusting","soc":"Nasal saline irrigation and emollients (petroleum jelly, BIPP) for perforation; surgical septoplasty for symptomatic deviation."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Foreign Body (Nose)","symptoms":"Unilateral nasal discharge, obstruction, foul smell","goal":"Remove foreign body safely, prevent aspiration","soc":"None (pharmacologic); mechanical removal (positive-pressure technique, Katz extractor, forceps)."},{"ta":"Otolaryngology","subcategory":"Nasal and Sinus Disorders","indication":"Nasal Foreign Bodies","symptoms":"Unilateral congestion, foul discharge, epistaxis in children","goal":"Safe removal without aspiration or trauma","soc":"None (pharmacologic); mechanical removal (positive-pressure, Katz extractor). Topical decongestant (oxymetazoline) may facilitate extraction."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Tonsillopharyngitis","symptoms":"Sore throat, tonsillar swelling/exudate, fever, cervical lymphadenopathy","goal":"Eradicate GAS, prevent rheumatic fever, relieve symptoms","soc":"Amoxicillin 500 mg BID × 10 days or penicillin V for GAS; azithromycin 5-day course for penicillin-allergic patients."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Neck Mass","symptoms":"Palpable neck swelling, pain, difficulty swallowing","goal":"Diagnose etiology, treat underlying cause","soc":"Antibiotics (amoxicillin-clavulanate) for reactive lymphadenopathy/lymphadenitis; otherwise diagnosis-driven (antibiotics, antifungals, chemotherapy, surgery)."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Sore Throat","symptoms":"Throat pain, dysphagia, fever, tonsillar exudate","goal":"Eradicate bacterial infection, prevent complications","soc":"Amoxicillin 500 mg TID × 10 days (or benzathine penicillin IM) for Group A Streptococcal pharyngitis (Centor/McIsaac score ≥3)."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Adenoid Disorders","symptoms":"Nasal obstruction, snoring, mouth breathing, recurrent infections","goal":"Relieve obstruction, prevent recurrent infections","soc":"Intranasal corticosteroids (e.g., fluticasone, mometasone) for mild adenoid hypertrophy; reduce inflammation and size."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Peritonsillar Abscess and Cellulitis","symptoms":"Severe unilateral sore throat, uvular deviation, trismus, hot potato voice","goal":"Drain abscess, eradicate infection, relieve airway risk","soc":"Needle aspiration or incision and drainage plus amoxicillin-clavulanate or penicillin + metronidazole."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Submandibular Space Infection","symptoms":"Bilateral floor of mouth swelling, trismus, drooling, airway threat (Ludwig's angina)","goal":"Secure airway, drain infection, prevent mediastinal spread","soc":"IV penicillin G + metronidazole (or ampicillin-sulbactam) plus surgical drainage; airway management critical."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Parapharyngeal Abscess","symptoms":"Trismus, neck swelling, fever, dysphagia, muffled voice","goal":"Drain abscess, eradicate infection, prevent spread","soc":"IV broad-spectrum antibiotics (ampicillin-sulbactam or clindamycin + metronidazole) plus surgical drainage."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Retropharyngeal Abscess","symptoms":"Neck stiffness, fever, stridor, dysphagia, drooling in children","goal":"Secure airway, drain abscess, eradicate infection","soc":"IV ampicillin-sulbactam (3g q6h) or clindamycin; surgical drainage for formed abscess."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Tornwaldt Cyst","symptoms":"Nasal obstruction, post-nasal drip, halitosis, Eustachian tube dysfunction","goal":"Relieve symptoms, drain or remove cyst","soc":"None (pharmacologic); treatment is endoscopic surgical marsupializaton for symptomatic cysts."},{"ta":"Otolaryngology","subcategory":"Pharyngeal and Tonsillar Disorders","indication":"Velopharyngeal Insufficiency","symptoms":"Hypernasal speech, nasal air escape, articulation errors","goal":"Normalize speech, close velopharyngeal gap","soc":"None (pharmacologic); primary treatment is speech therapy and surgical correction (pharyngeal flap, sphincter pharyngoplasty, posterior pharyngeal wall augmentation)."},{"ta":"Otolaryngology","subcategory":"Salivary Gland Disorders","indication":"Sialadenitis","symptoms":"Painful salivary gland swelling, fever, purulent discharge from duct","goal":"Eradicate infection, restore salivary flow","soc":"Oral amoxicillin-clavulanate (875/125 mg BID × 10 days) for acute bacterial sialadenitis; IV antibiotics for severe cases."},{"ta":"Otolaryngology","subcategory":"Salivary Gland Disorders","indication":"Salivary Stones","symptoms":"Painful salivary gland swelling during eating, dry mouth","goal":"Remove stone, restore salivary flow, prevent recurrence","soc":"None (pharmacologic for stone removal); hydration, massage, sialagogues (lemon drops, vitamin C). Antibiotics for secondary sialadenitis."},{"ta":"Otolaryngology","subcategory":"Smell and Taste Disorders","indication":"Smell and Taste Abnormalities","symptoms":"Reduced or absent smell, taste distortion, phantom odors","goal":"Restore olfactory/gustatory function","soc":"Olfactory training (structured twice-daily sniffing protocol) — primary evidence-based treatment. Intranasal steroids for inflammatory causes; zinc for taste disorders."},{"ta":"Otolaryngology","subcategory":"Smell and Taste Disorders","indication":"Anosmia","symptoms":"Complete or partial loss of smell, altered taste","goal":"Restore olfactory function, improve quality of life","soc":"Olfactory training (nasal steroids for inflammatory causes); short-course systemic corticosteroids for post-infectious or inflammatory anosmia."},{"ta":"Pediatrics","subcategory":"Behavioral Problems in Children","indication":"Eating Behavior in Children","symptoms":"Food refusal, picky eating, failure to self-feed, mealtime behavioral problems","goal":"Establish healthy eating patterns, prevent nutritional deficiencies","soc":"None (pharmacologic); behavioral therapy (positive reinforcement, exposure therapy, family meal coaching) is first-line."},{"ta":"Pediatrics","subcategory":"Behavioral Problems in Children","indication":"Violent Behavior in Children and Adolescents","symptoms":"Physical aggression, property destruction, threats, self-harm","goal":"Reduce aggressive behavior, ensure safety, treat underlying disorder","soc":"Atypical antipsychotics (risperidone 0.5–2 mg/day) for acute aggression in ASD or conduct disorder; behavior therapy is adjunctive."},{"ta":"Pediatrics","subcategory":"Behavioral Problems in Children","indication":"Sleep Problems in Children","symptoms":"Difficulty falling/staying asleep, night awakenings, bedtime resistance","goal":"Establish regular sleep, reduce nighttime awakenings","soc":"Behavioral interventions (sleep hygiene, graduated extinction) are first-line; melatonin for sleep onset disorders."},{"ta":"Pediatrics","subcategory":"Behavioral Problems in Children","indication":"School Avoidance","symptoms":"Refusal or inability to attend school, somatic complaints, anxiety, family conflict","goal":"Restore regular school attendance, reduce anxiety","soc":"Cognitive behavioral therapy (CBT) is first-line; SSRIs (fluoxetine, sertraline) for anxiety-driven school refusal."},{"ta":"Pediatrics","subcategory":"Behavioral Problems in Children","indication":"Temper Tantrums","symptoms":"Explosive behavioral outbursts, crying, screaming, aggression in toddlers","goal":"Reduce tantrum frequency/severity, support parental coping","soc":"None (pharmacologic); parental guidance, behavioral strategies (ignoring, positive reinforcement, consistent boundaries) are first-line."},{"ta":"Pediatrics","subcategory":"Behavioral Problems in Children","indication":"Breath-Holding Spells","symptoms":"Crying-triggered apnea, cyanosis or pallor, brief loss of consciousness","goal":"Reassure families, prevent iron deficiency, reduce spell frequency","soc":"Iron supplementation (ferrous sulfate 3 mg/kg/day) if iron-deficient or anemic — reduces spell frequency. Reassurance and behavioral guidance."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Idiopathic Scoliosis","symptoms":"Lateral spinal curvature, rib hump, uneven shoulders/hips, back pain","goal":"Prevent curve progression, avoid surgery","soc":"Observation for Cobb angle <20°; rigid bracing (TLSO) for 25–45° curves in growing children — non-pharmacologic. No approved pharmacologic SoC."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Osteoporosis in Children","symptoms":"Multiple fractures, vertebral compression, bone pain, decreased bone density","goal":"Increase bone density, prevent fractures","soc":"Bisphosphonates (pamidronate IV or zoledronic acid IV) for moderate-severe pediatric osteoporosis; treatment of underlying cause."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Hypophosphatasia","symptoms":"Poor bone mineralization, fractures, tooth loss, muscle weakness, respiratory failure","goal":"Restore alkaline phosphatase activity, prevent fractures and respiratory failure","soc":"Asfotase alfa (Strensiq) — enzyme replacement therapy (ERT) targeting tissue-nonspecific alkaline phosphatase; approved by FDA in 2015."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Scheuermann Disease","symptoms":"Thoracic kyphosis, back pain, wedge-shaped vertebrae in adolescents","goal":"Reduce kyphosis progression, relieve pain","soc":"Physical therapy and NSAIDs for pain; bracing (Milwaukee brace) for progressive curves in growing children — non-pharmacologic primary."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Craniotubular Hyperostoses","symptoms":"Dense bone thickening, cranial nerve palsies, facial deformity, marrow failure","goal":"Prevent marrow failure, relieve cranial nerve compression","soc":"Interferon gamma-1b (FDA-approved for osteopetrosis) to improve osteoclast function; bone marrow transplant for malignant infantile osteopetrosis."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Osgood-Schlatter Disease","symptoms":"Knee pain below kneecap during activity, tibial tubercle swelling, tenderness","goal":"Relieve pain, allow growth plate healing","soc":"Conservative: NSAIDs, activity modification, ice, physical therapy — self-limiting condition."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Osteosclerosis","symptoms":"Increased bone density, marrow space narrowing, cranial nerve compression, fracture risk","goal":"Prevent marrow failure, relieve bone compression","soc":"None (pharmacologic for most forms); treat complications (anemia, cranial nerve palsies). IFN-gamma for malignant osteopetrosis."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Legg-Calvé-Perthes Disease","symptoms":"Hip pain, limp, limited hip rotation, avascular femoral head necrosis","goal":"Preserve femoral head shape, maintain hip function, prevent arthritis","soc":"Conservative: non-weight-bearing, traction, abduction bracing (Petrie casts). NSAIDs for pain. No pharmacologic SoC for the underlying necrosis."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Craniotubular Dysplasias","symptoms":"Skeletal abnormalities, facial deformity, cranial nerve compression","goal":"Manage bone overgrowth complications, prevent nerve injury","soc":"None (pharmacologic); primarily surgical decompression for cranial nerve compromise. No approved drug therapy."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Köhler Bone Disease","symptoms":"Foot pain, limping, medial foot swelling, navicular bone abnormality","goal":"Relieve pain, allow navicular bone revascularization","soc":"Conservative: NSAIDs + short-leg walking cast × 6–8 weeks; self-limited disease (typically resolves by age 4–5 years)."},{"ta":"Pediatrics","subcategory":"Bone Disorders in Children","indication":"Slipped Capital Femoral Epiphysis (SCFE)","symptoms":"Hip/knee pain, limp, external rotation deformity, inability to walk","goal":"Prevent further slip, restore hip function, avoid avascular necrosis","soc":"None (pharmacologic); primary treatment is surgical pinning (in situ fixation with cannulated screw)."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Formula Feeding","symptoms":"Nutritional adequacy in formula-fed infants; colic, reflux, allergy","goal":"Provide complete nutrition, manage formula intolerance","soc":"Standard cow's milk formula (term infants); hydrolyzed formula for mild cow's milk allergy; amino acid-based formula for severe CMPA."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Breastfeeding","symptoms":"Lactation challenges, nipple pain, engorgement, low milk supply","goal":"Support successful breastfeeding, increase milk supply","soc":"Lactation support and education; domperidone (off-label galactagogue) or metoclopramide for insufficient milk supply in selected cases."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Sleeping Behaviors in Infants and Children","symptoms":"Night awakenings, bedtime resistance, sleep associations, co-sleeping challenges","goal":"Establish healthy sleep habits, reduce parental burden","soc":"None (pharmacologic); behavioral sleep training (graduated extinction, Ferber method) is first-line."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Care of the Normal Newborn","symptoms":"Newborn care needs: feeding, thermoregulation, infection prevention","goal":"Ensure healthy adaptation to extrauterine life","soc":"Routine prophylactics: erythromycin eye ointment (ophthalmia prophylaxis), vitamin K (phytonadione 1 mg IM) for hemorrhagic disease, hepatitis B vaccine Day 1."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Teething","symptoms":"Gum pain, irritability, drooling, biting, mild temperature elevation","goal":"Relieve teething discomfort","soc":"Topical lidocaine/benzocaine gels are NOT recommended (FDA warning). Teething rings and acetaminophen/ibuprofen for discomfort."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Initial Evaluation of the Normal Newborn","symptoms":"Routine newborn assessment: APGAR, anomaly detection, vital stability","goal":"Identify conditions requiring immediate intervention","soc":"Clinical assessment; prophylactic medications (Vitamin K, erythromycin eye drops, Hep B vaccine)."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Physical Examination of the Newborn","symptoms":"Routine newborn physical assessment for anomalies and conditions","goal":"Detect congenital anomalies and birth complications","soc":"N/A (clinical examination, not pharmacologic). Vitamin K, erythromycin, and Hep B vaccine as routine pharmacologic prophylaxis."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Screening Tests for Newborns","symptoms":"Detection of metabolic, endocrine, hemoglobin, and hearing disorders at birth","goal":"Early identification of treatable conditions before symptoms appear","soc":"N/A (diagnostic screening, not pharmacologic treatment). Early initiation of disease-specific therapy (thyroid hormone for CH, dietary management for PKU, etc.)."},{"ta":"Pediatrics","subcategory":"Care of Newborns and Infants","indication":"Solid Foods in Infancy","symptoms":"Developmental readiness for complementary feeding; feeding challenges","goal":"Introduce appropriate foods, prevent allergy and nutritional deficiency","soc":"None (pharmacologic); dietary guidance by AAP (6 months start, early allergen introduction for allergy prevention)."},{"ta":"Pediatrics","subcategory":"Caring for Sick Children and Their Families","indication":"Death and Dying in Children","symptoms":"Terminal illness, pain, distress, psychological burden in families","goal":"Provide comfort, palliative care, family support","soc":"Opioids (morphine, hydromorphone) for pain; benzodiazepines for anxiety/dyspnea; palliative sedation in refractory suffering."},{"ta":"Pediatrics","subcategory":"Caring for Sick Children and Their Families","indication":"Caring for Sick Neonates","symptoms":"Temperature instability, poor feeding, respiratory distress, jaundice in sick neonates","goal":"Stabilize vital functions, treat underlying illness","soc":"Empiric IV antibiotics (ampicillin + gentamicin) for suspected sepsis; phototherapy for jaundice; respiratory support as needed."},{"ta":"Pediatrics","subcategory":"Caring for Sick Children and Their Families","indication":"Children and Youth with Special Health Care Needs","symptoms":"Complex chronic conditions; physical, developmental, behavioral, or emotional conditions","goal":"Coordinate care, address medical and developmental needs","soc":"Individualized care coordination; condition-specific pharmacotherapy."},{"ta":"Pediatrics","subcategory":"Child Maltreatment","indication":"Female Genital Mutilation","symptoms":"Chronic pain, infection, urinary complications, obstetric complications, psychological trauma","goal":"Treat complications, provide psychosocial support","soc":"Antibiotics for infection; analgesics for pain; psychological support. Surgical deinfibulation for urinary/obstetric complications."},{"ta":"Pediatrics","subcategory":"Childhood Vaccination","indication":"Childhood Vaccination","symptoms":"Prevention of infectious diseases (routine immunization schedule)","goal":"Achieve protective immunity, prevent vaccine-preventable diseases","soc":"ACIP-recommended childhood vaccination schedule: DTaP, IPV, MMR, Varicella, Hep B, Hep A, Hib, PCV, RV, HPV, meningococcal, influenza, COVID-19."},{"ta":"Pediatrics","subcategory":"Childhood Vaccination","indication":"Vaccine Hesitancy","symptoms":"Parental delay or refusal of recommended vaccines; misinformation-driven","goal":"Increase vaccination rates, address misinformation","soc":"None (pharmacologic); motivational interviewing, education, trusted HCP communication."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Down Syndrome (Trisomy 21)","symptoms":"Intellectual disability, hypotonia, characteristic facies, congenital heart defects, increased AML/ALL risk","goal":"Improve cognitive function, manage comorbidities","soc":"No approved disease-modifying pharmacotherapy. Thyroid hormone for congenital hypothyroidism (20%); early intervention/therapy programs."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Microdeletion and Microduplication Syndromes","symptoms":"Variable: intellectual disability, autism features, cardiac defects, dysmorphic features","goal":"Manage specific organ complications, support development","soc":"No single pharmacologic SoC; condition-specific management. Early intervention; growth hormone for some (e.g., Prader-Willi)."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Fragile X Syndrome","symptoms":"Intellectual disability, autism features, hyperactivity, anxiety, macroorchidism","goal":"Reduce hyperactivity/anxiety, improve cognitive and behavioral function","soc":"No FDA-approved disease-modifying therapy; stimulants (methylphenidate) for ADHD symptoms; SSRIs for anxiety; antipsychotics for aggression."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Turner Syndrome","symptoms":"Short stature, ovarian insufficiency, infertility, cardiac (coarctation), webbed neck, lymphedema","goal":"Improve height, induce puberty, prevent cardiovascular complications","soc":"Growth hormone (recombinant human GH, FDA-approved) for short stature; estrogen replacement for pubertal induction and hormonal maintenance."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Chromosomal Deletion Syndromes","symptoms":"Variable: intellectual disability, dysmorphic features, organ anomalies, behavioral problems","goal":"Maximize developmental potential, manage specific complications","soc":"None (pharmacologic for the deletion itself); condition-specific management (growth hormone for 22q11, etc.)."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Other X Chromosome Abnormalities","symptoms":"Variable: sex development disorders, infertility, cognitive, cardiac, or endocrine issues","goal":"Manage hormone deficiencies, support development","soc":"Hormone replacement (estrogen or testosterone) based on sex assignment and karyotype; early intervention."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Klinefelter Syndrome (47,XXY)","symptoms":"Hypogonadism, tall stature, infertility, language delay, learning difficulties, gynecomastia","goal":"Normalize testosterone, support development and fertility","soc":"Testosterone replacement therapy (testosterone cypionate or enanthate IM, or transdermal) starting at puberty (~11–12 years)."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Progeria","symptoms":"Premature aging: dwarfism, lipodystrophy, cardiovascular disease, atherosclerosis, death by ~14 years","goal":"Extend lifespan, delay cardiovascular complications","soc":"Lonafarnib (Zokinvy) — farnesyltransferase inhibitor; FDA-approved 2020 for Hutchinson-Gilford Progeria Syndrome."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"47,XYY Syndrome","symptoms":"Tall stature, mild speech/language delay, learning difficulties, behavioral issues","goal":"Address developmental delays, behavioral issues","soc":"None (pharmacologic); early intervention: speech/language therapy, special education support."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Trisomy 13","symptoms":"Severe brain malformation, cardiac defects, polydactyly, cleft lip/palate; most die within first year","goal":"Comfort care; supportive for families choosing aggressive intervention","soc":"Comfort/palliative care predominates; selected families choose cardiac surgery and intensive support."},{"ta":"Pediatrics","subcategory":"Chromosome and Gene Abnormalities","indication":"Trisomy 18","symptoms":"Severe ID, cardiac defects, clenched fists, growth restriction; most die within first year","goal":"Comfort care; selective aggressive management","soc":"Palliative/comfort care; cardiac surgery or intensive care for selected families."},{"ta":"Pediatrics","subcategory":"Common Viral Infections in Infants and Children","indication":"Roseola Infantum","symptoms":"High fever × 3–5 days followed by truncal rash, HHV-6 etiology","goal":"Manage fever, prevent febrile seizures","soc":"Supportive care; antipyretics (acetaminophen, ibuprofen) for fever management."},{"ta":"Pediatrics","subcategory":"Common Viral Infections in Infants and Children","indication":"Erythema Infectiosum (Parvovirus B19 Infection)","symptoms":"Slapped-cheek rash, mild fever, joint pain, reticular rash on extremities","goal":"Supportive management; prevent hydrops in immunocompromised/pregnant","soc":"None (pharmacologic); self-limited disease. IVIG for chronic parvovirus B19 in immunocompromised patients."},{"ta":"Pediatrics","subcategory":"Common Viral Infections in Infants and Children","indication":"Subacute Sclerosing Panencephalitis (SSPE)","symptoms":"Progressive personality change, intellectual decline, myoclonus, seizures, coma (late measles complication)","goal":"Slow neurological progression; no curative treatment","soc":"None curative; oral isoprinosine (inosine pranobex) + intrathecal/intraventricular interferon alfa — may temporarily slow progression."},{"ta":"Pediatrics","subcategory":"Common Viral Infections in Infants and Children","indication":"Measles","symptoms":"High fever, cough, coryza, conjunctivitis, Koplik spots, maculopapular rash","goal":"Support recovery, prevent complications (pneumonia, encephalitis)","soc":"Vitamin A supplementation (200,000 IU × 2 days) reduces measles mortality; supportive care; MMR vaccination for prevention."},{"ta":"Pediatrics","subcategory":"Common Viral Infections in Infants and Children","indication":"Mumps","symptoms":"Parotid gland swelling, fever, headache, orchitis in males","goal":"Relieve symptoms, prevent orchitis complications","soc":"Supportive care only; analgesics/antipyretics. No antiviral treatment. MMR vaccine for prevention."},{"ta":"Pediatrics","subcategory":"Common Viral Infections in Infants and Children","indication":"Progressive Rubella Panencephalitis","symptoms":"Slowly progressive dementia, ataxia, seizures, myoclonus (years after rubella or CRS)","goal":"Slow neurological progression; no curative treatment","soc":"No effective treatment; AEDs for seizures; supportive care."},{"ta":"Pediatrics","subcategory":"Common Viral Infections in Infants and Children","indication":"Rubella","symptoms":"Mild maculopapular rash, lymphadenopathy, low-grade fever, joint pain; CRS in congenital","goal":"Prevent congenital rubella syndrome through vaccination","soc":"Supportive care for acquired rubella. Vaccination (MMR) for prevention."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Bicuspid Aortic Valve","symptoms":"Often asymptomatic; valve
