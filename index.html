 stenosis/regurgitation, aortic dilation, aortic dissection risk","goal":"Prevent aortic complications, manage valve dysfunction","soc":"Beta-blockers or ARBs (losartan) for aortic root dilation; surgical valve replacement for severe AS/AR."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Eisenmenger Syndrome","symptoms":"Severe cyanosis, exercise intolerance, hemoptysis, polycythemia, clubbing","goal":"Reduce pulmonary vascular resistance, improve exercise capacity, prevent death","soc":"Bosentan (endothelin receptor antagonist) is FDA-approved for Eisenmenger syndrome to improve exercise capacity and WHO functional class."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Atrial Septal Defect (ASD)","symptoms":"Usually asymptomatic; can cause fatigue, exercise intolerance, atrial arrhythmias, paradoxical embolism","goal":"Prevent atrial arrhythmias, stroke, and pulmonary hypertension","soc":"None (pharmacologic primary); transcatheter or surgical closure for significant shunts (Qp:Qs >1.5:1 or symptomatic). Medical: diuretics for CHF, antiarrhythmics."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Coarctation of the Aorta","symptoms":"Upper extremity hypertension, weak femoral pulses, leg claudication, headache, rib notching on CXR","goal":"Relieve aortic obstruction, normalize blood pressure long-term","soc":"Beta-blockers (atenolol) or ACE inhibitors for hypertension management; definitive treatment is balloon angioplasty/stenting or surgical repair."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Tetralogy of Fallot","symptoms":"Cyanosis (tet spells), right ventricular hypertrophy, pulmonary stenosis, VSD","goal":"Complete surgical repair, prevent hypercyanotic spells, pulmonary regurgitation","soc":"Beta-blockers (propranolol) to prevent tet spells pre-operatively; morphine/phenylephrine for acute tet spells. Definitive: complete surgical repair at 3–6 months."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Hypoplastic Left Heart Syndrome","symptoms":"Severe cyanosis at birth, shock, multi-organ failure, ductal-dependent circulation","goal":"Maintain ductal patency, staged surgical palliation (Norwood), heart transplant","soc":"Prostaglandin E1 (alprostadil IV) to maintain patent ductus arteriosus in neonates; definitive: staged Norwood palliation → Glenn → Fontan or cardiac transplant."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Ventricular Septal Defect (VSD)","symptoms":"Heart murmur, heart failure, failure to thrive, recurrent pulmonary infections","goal":"Prevent CHF and PAH, close VSD surgically if moderate-large","soc":"Diuretics (furosemide), ACE inhibitors (captopril) for CHF symptoms; definitive surgical or catheter device closure for hemodynamically significant VSD."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Transposition of the Great Arteries (TGA)","symptoms":"Severe cyanosis at birth, ductal-dependent circulation, metabolic acidosis","goal":"Emergency arterial switch repair, prevent irreversible brain/organ damage","soc":"Prostaglandin E1 (alprostadil) to maintain PDA; balloon atrial septostomy (Rashkind procedure) for mixing. Definitive: arterial switch operation within first 2 weeks."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Other Congenital Cardiac Anomalies","symptoms":"Variable: cyanosis, heart murmur, failure to thrive, arrhythmia","goal":"Individualized based on anatomy; prevent mortality and morbidity","soc":"Variable by lesion; typically diuretics, ACE inhibitors, prostaglandins for ductal-dependent lesions. Definitive surgical or catheter-based repair."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Tricuspid Atresia","symptoms":"Severe cyanosis, absent tricuspid valve, RV hypoplasia, heart failure","goal":"Staged Fontan palliation, maintain oxygenation","soc":"Prostaglandin E1 to maintain PDA in neonates; diuretics and ACE-I. Definitive: staged surgical palliation (BT shunt → Glenn → Fontan)."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Ebstein Anomaly","symptoms":"Cyanosis, arrhythmia (WPW), tricuspid regurgitation, heart failure","goal":"Control arrhythmia, manage tricuspid regurgitation, prevent sudden death","soc":"Antiarrhythmics (amiodarone, sotalol) for WPW-associated arrhythmias; diuretics for right heart failure. Surgical valve repair/replacement for severe TR."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Double Outlet Right Ventricle","symptoms":"Cyanosis, heart failure, poor feeding, failure to thrive","goal":"Surgical correction, prevent cyanosis and heart failure","soc":"Prostaglandin E1 (alprostadil) in neonates to maintain ductus arteriosus; diuretics and digoxin for CHF pre-operatively."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Persistent Truncus Arteriosus","symptoms":"Cyanosis, heart failure, pulmonary hypertension, single great vessel","goal":"Surgical repair early, prevent Eisenmenger syndrome","soc":"Prostaglandin E1 and diuretics/digoxin for CHF pre-operatively; definitive: complete surgical repair by 2–4 weeks of life."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Congenitally Corrected Transposition of the Great Arteries","symptoms":"Cyanosis, arrhythmia, heart block, heart failure, poor exercise tolerance","goal":"Manage arrhythmia, prevent ventricular failure, correct hemodynamics","soc":"ACE inhibitors and diuretics for ventricular failure; pacemaker for complete heart block. Definitive: anatomic repair (double switch operation)."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Total Anomalous Pulmonary Venous Return (TAPVR)","symptoms":"Cyanosis, pulmonary venous obstruction, respiratory distress, shock at birth","goal":"Emergency surgical repair, restore pulmonary venous drainage","soc":"Emergency: O2, prostaglandin (if ductal-dependent), mechanical ventilation. Definitive: urgent surgical repair."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Atrioventricular Septal Defect","symptoms":"Congestive heart failure, poor weight gain, pulmonary hypertension, cyanosis","goal":"Surgical correction, prevent PAH and Eisenmenger","soc":"Diuretics (furosemide 1–4 mg/kg/day) + ACE inhibitors (captopril) pre-operatively; definitive: complete surgical repair by 3–6 months."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Patent Ductus Arteriosus (PDA)","symptoms":"Continuous heart murmur, wide pulse pressure, pulmonary congestion, CHF in preterm infants","goal":"Close PDA, prevent pulmonary overcirculation and CHF","soc":"Indomethacin (IV COX inhibitor) or ibuprofen lysine (IV) for premature neonates to achieve pharmacologic PDA closure."},{"ta":"Pediatrics","subcategory":"Congenital Cardiovascular Anomalies","indication":"Aortopulmonary Window","symptoms":"Heart failure, pulmonary hypertension, recurrent respiratory infections, poor feeding","goal":"Surgical closure, prevent Eisenmenger physiology","soc":"None (pharmacologic primary); urgent surgical repair shortly after diagnosis. Diuretics (furosemide) and digoxin for heart failure pre-operatively."},{"ta":"Pediatrics","subcategory":"Congenital Craniofacial Anomalies","indication":"Microcephaly","symptoms":"Small head circumference, intellectual disability, developmental delay, seizures","goal":"Manage seizures, optimize development, treat underlying cause","soc":"Antiepileptic drugs (levetiracetam, valproate) for seizures; no pharmacologic cure for structural microcephaly. Zika-related: supportive care."},{"ta":"Pediatrics","subcategory":"Congenital Craniofacial Anomalies","indication":"Craniosynostosis","symptoms":"Premature skull suture fusion, abnormal head shape, increased intracranial pressure","goal":"Surgical correction, prevent ICP elevation and cognitive impairment","soc":"None (pharmacologic); treatment is surgical cranial vault remodeling (spring-assisted cranioplasty or open craniotomy)."},{"ta":"Pediatrics","subcategory":"Congenital Craniofacial Anomalies","indication":"Congenital Eye Anomalies","symptoms":"Visual impairment, cataracts, glaucoma, coloboma, anophthalmia, nystagmus","goal":"Maximize visual function, prevent amblyopia, manage secondary complications","soc":"Depends on anomaly: topical antiglaucoma drops (latanoprost, timolol) for glaucoma; patching/atropine penalization for amblyopia. Surgical: cataract extraction, glaucoma surgery."},{"ta":"Pediatrics","subcategory":"Congenital Craniofacial Anomalies","indication":"Macrocephaly","symptoms":"Enlarged head circumference, hydrocephalus, cognitive delay in some","goal":"Identify underlying cause, manage hydrocephalus or metabolic condition","soc":"None for benign familial macrocephaly; acetazolamide or serial LPs for communicating hydrocephalus; surgical VP shunt for obstructive hydrocephalus."},{"ta":"Pediatrics","subcategory":"Congenital Craniofacial Anomalies","indication":"Cleft Lip and Cleft Palate","symptoms":"Facial clefting, feeding difficulty, speech problems, ear infections, dental anomalies","goal":"Surgical repair, normalize feeding, speech, and hearing","soc":"None (pharmacologic); primary treatment is surgical repair (lip at 3–6 months, palate at 9–18 months). Specialized feeding techniques, speech therapy, orthodontics."},{"ta":"Pediatrics","subcategory":"Congenital Craniofacial Anomalies","indication":"Congenital Jaw Anomalies","symptoms":"Jaw malalignment, feeding/swallowing difficulties, airway obstruction, facial asymmetry","goal":"Restore jaw alignment, correct airway, enable normal feeding and speech","soc":"None (pharmacologic); treatment is surgical orthognathic surgery, distraction osteogenesis, and mandibular lengthening."},{"ta":"Pediatrics","subcategory":"Congenital Craniofacial Anomalies","indication":"Congenital Ear Anomalies","symptoms":"Absent/malformed outer ear (microtia), hearing loss, ear canal atresia","goal":"Restore hearing, reconstruct outer ear cosmetically","soc":"None (pharmacologic); treatment is surgical reconstruction (rib cartilage, Medpor) and bone-anchored hearing aids (BAHA)."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Biliary Atresia","symptoms":"Progressive neonatal jaundice, pale stools, dark urine, hepatomegaly","goal":"Restore bile flow, prevent cirrhosis and liver failure, bridge to transplant","soc":"No pharmacologic first-line; Kasai hepatoportoenterostomy is standard of care. Post-Kasai: ursodiol (ursodeoxycholic acid) to promote bile flow."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Hirschsprung Disease","symptoms":"Failure to pass meconium, abdominal distension, constipation, enterocolitis","goal":"Surgical resection of aganglionic bowel, restore bowel function","soc":"None (pharmacologic) as primary; definitive is surgical pull-through procedure. Post-op: bowel management (enemas, laxatives for dysmotility)."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Esophageal Atresia","symptoms":"Excessive secretions, coughing, choking, inability to pass NGT, cyanosis at first feeding","goal":"Surgical repair, establish esophageal continuity, prevent aspiration","soc":"None (pharmacologic); emergency surgical repair (primary anastomosis or staged repair for long-gap EA). Post-op: PPI (omeprazole) for GERD, which affects >50% of EA patients."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Diaphragmatic Hernia","symptoms":"Respiratory distress at birth, bowel sounds in chest, mediastinal shift, pulmonary hypoplasia","goal":"Surgical repair, manage pulmonary hypertension and respiratory failure","soc":"Nitric oxide (iNO, inhaled) for pulmonary hypertension; mechanical ventilation. Definitive: surgical repair after stabilization."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Anal Atresia","symptoms":"Absent anal opening, absent meconium passage, abdominal distension","goal":"Surgical reconstruction of anal opening, establish bowel function","soc":"None (pharmacologic); primary treatment is emergency surgical repair (posterior sagittal anorectoplasty)."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Gastroschisis","symptoms":"Abdominal wall defect with eviscerated bowel, intestinal atresia, peel/inflammation","goal":"Surgical closure, bowel function recovery, prevent sepsis","soc":"None (pharmacologic); emergency surgical reduction and closure. Post-op: TPN, bowel function support."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Omphalocele","symptoms":"Herniation of abdominal organs through umbilicus covered by sac, associated anomalies","goal":"Surgical reduction and closure, manage associated anomalies","soc":"None (pharmacologic); primary treatment is surgical reduction. Topical antiseptics (silver sulfadiazine) for giant omphalocele escharization."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Jejunoileal Atresia","symptoms":"Bilious vomiting, abdominal distension, absent bowel sounds, failure to pass meconium","goal":"Surgical anastomosis, restore bowel continuity","soc":"None (pharmacologic); primary treatment is surgical repair (primary anastomosis or tapering enteroplasty)."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Duodenal Obstruction","symptoms":"Bilious vomiting in neonate, double-bubble sign on X-ray, failure to pass meconium","goal":"Surgical restoration of duodenal continuity","soc":"None (pharmacologic); primary treatment is surgical repair (duodenoduodenostomy)."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Intestinal Duplication","symptoms":"Abdominal pain, intestinal obstruction, GI bleeding, palpable mass","goal":"Surgical excision to prevent obstruction and bleeding","soc":"None (pharmacologic); treatment is surgical excision of the duplication."},{"ta":"Pediatrics","subcategory":"Congenital Gastrointestinal Anomalies","indication":"Malrotation of the Bowel","symptoms":"Bilious vomiting, midgut volvulus, intestinal obstruction, abdominal pain","goal":"Emergency surgical correction (Ladd procedure), prevent midgut loss","soc":"None (pharmacologic); emergency surgical intervention (Ladd procedure) is standard."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Congenital Muscular Anomalies","symptoms":"Muscle weakness, hypotonia, limited joint movement, feeding difficulties","goal":"Maintain function, prevent contractures, support respiratory function","soc":"No universal pharmacologic SoC; physical therapy is primary. Specific disorders (e.g., nemaline myopathy): supportive care and ventilatory support."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Arthrogryposis Multiplex Congenita","symptoms":"Multiple congenital joint contractures, muscle weakness, rigid limbs","goal":"Improve joint mobility, achieve functional independence","soc":"None (pharmacologic); treatment is physical therapy, splinting, and serial casting. Surgical release for severe contractures."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Congenital Limb Anomalies","symptoms":"Absent, shortened, or malformed limbs; functional impairment; amputation variants","goal":"Maximize function with prosthetics, corrective surgery, and rehabilitation","soc":"None (pharmacologic); prosthetics, surgical reconstruction (Syme amputation, limb lengthening), occupational therapy."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Developmental Dysplasia of the Hip (DDH)","symptoms":"Hip instability, Ortolani/Barlow sign, asymmetric skin folds, abnormal gait","goal":"Restore normal hip development, prevent avascular necrosis","soc":"None (pharmacologic); Pavlik harness for infants <6 months; closed/open reduction for older children."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Genu Varum (Bowlegs) and Genu Valgum (Knock-Knees)","symptoms":"Leg bowing or knocking, gait abnormality, knee pain in severe cases","goal":"Correct alignment, prevent osteoarthritis","soc":"Observation for physiologic varus/valgus (<2 years for varus, 3–5 years for valgus); rickets: vitamin D and phosphate supplementation. Surgical: guided growth (hemiepiphysiodesis) for pathologic cases."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Congenital Neck and Back Anomalies","symptoms":"Limited neck mobility, short neck, torticollis, scoliosis, instability","goal":"Prevent neurologic compromise, correct deformity, maintain spine stability","soc":"Physical therapy for torticollis; cervical bracing for instability. Surgical fusion for Klippel-Feil with instability."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Talipes Equinovarus (Clubfoot) and Other Congenital Foot Anomalies","symptoms":"Foot turning inward and downward, rigid deformity, affecting gait","goal":"Achieve plantigrade foot, normal gait","soc":"None (pharmacologic); serial casting (Ponseti method) starting in neonatal period; percutaneous Achilles tenotomy; bracing."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Congenital Knee Dislocation","symptoms":"Hyperextended knee at birth, inability to flex knee, fixed dislocation","goal":"Serial casting, surgical reduction if needed","soc":"None (pharmacologic); serial casting (Pavlik-like) or surgical reduction for persistent dislocation."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Femoral Torsion (Twisting)","symptoms":"In-toeing or out-toeing gait, tripping, pigeon-toed appearance","goal":"Correct gait, prevent degenerative joint disease","soc":"Observation; most cases resolve spontaneously by age 8. Severe: derotational femoral osteotomy."},{"ta":"Pediatrics","subcategory":"Congenital Musculoskeletal Anomalies","indication":"Tibial Torsion","symptoms":"In-toeing gait (internal tibial torsion), tripping in young children","goal":"Allow natural correction, surgical correction for severe refractory cases","soc":"Observation; spontaneous resolution by age 6–8 in most cases. Severe persistent: derotational tibial osteotomy."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Rett Syndrome","symptoms":"Developmental regression, hand-wringing stereotypies, breathing irregularities, seizures, non-verbal","goal":"Reduce seizures, improve breathing, restore neurologic function","soc":"Antiepileptic drugs (valproate, lamotrigine); trofinetide (Daybue) is the first FDA-approved drug specifically for Rett syndrome (2023)."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Spina Bifida","symptoms":"Leg weakness/paralysis, neurogenic bladder, bowel dysfunction, hydrocephalus, Chiari malformation","goal":"Prevent neurologic deterioration, manage bladder/bowel, maximize mobility","soc":"Prenatal surgical closure (fetal MMC repair) shown to improve outcomes. Post-natal: VP shunt for hydrocephalus; clean intermittent catheterization (CIC); oxybutynin for neurogenic bladder."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Congenital Hydrocephalus","symptoms":"Enlarged head, bulging fontanelle, sundowning eyes, vomiting, seizures","goal":"Control intracranial pressure, preserve neurodevelopment","soc":"Acetazolamide (carbonic anhydrase inhibitor) for temporary ICP reduction; definitive: VP shunt placement or endoscopic third ventriculostomy (ETV)."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Malformed Cerebral Hemispheres","symptoms":"Severe intellectual disability, refractory seizures, motor deficits, cerebral malformation","goal":"Control seizures, maximize developmental potential, prevent complications","soc":"Antiepileptic drugs (levetiracetam, valproate, vigabatrin); ketogenic diet for refractory epilepsy. Hemispherectomy for catastrophic unilateral epilepsy."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Septo-Optic Dysplasia","symptoms":"Vision loss, pituitary hormone deficiencies, absent septum pellucidum, midline brain abnormalities","goal":"Replace pituitary hormones, maximize visual function and growth","soc":"Hormone replacement: growth hormone for GHD, hydrocortisone for ACTH deficiency, thyroxine for central hypothyroidism, desmopressin for DI."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Porencephaly","symptoms":"Fluid-filled brain cavities, seizures, motor deficits, cognitive impairment","goal":"Control seizures, manage spasticity, maximize function","soc":"Antiepileptic drugs (levetiracetam, oxcarbazepine) for seizures; physical therapy for motor deficits."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Encephalocele","symptoms":"Neural tissue herniation through skull defect, neurologic deficits, hydrocephalus","goal":"Surgical repair, reduce associated morbidity","soc":"None (pharmacologic); surgical repair of encephalocele. Post-op management of hydrocephalus (VP shunt, acetazolamide)."},{"ta":"Pediatrics","subcategory":"Congenital Neurologic Anomalies","indication":"Anencephaly","symptoms":"Absence of brain and skull; incompatible with life; stillbirth or death shortly after birth","goal":"Palliative comfort care; no curative treatment","soc":"None; anencephaly is lethal. Prenatal folic acid supplementation (400–800 mcg/day) is preventive."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Renal Anomalies","symptoms":"Hydronephrosis, renal cysts, horseshoe kidney, absent kidney, renal insufficiency","goal":"Preserve renal function, prevent UTI, manage hypertension","soc":"Antibiotic prophylaxis for associated VUR; antihypertensives (ACE inhibitors) for hypertension; surgical correction for UPJ obstruction."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Vesicoureteral Reflux (VUR)","symptoms":"Recurrent febrile UTIs, renal scarring, pyelonephritis, hypertension","goal":"Prevent renal scarring, achieve VUR resolution","soc":"Low-dose antibiotic prophylaxis (trimethoprim-sulfamethoxazole or nitrofurantoin) for high-grade VUR in young children."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Bladder Anomalies","symptoms":"Urinary incontinence, recurrent UTIs, bladder exstrophy, vesicoureteral reflux","goal":"Surgical reconstruction, achieve urinary continence, protect kidneys","soc":"None (pharmacologic) as primary; antibiotic prophylaxis (trimethoprim-sulfamethoxazole) for VUR; oxybutynin for neurogenic bladder components; surgical bladder reconstruction."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Ureteral Anomalies","symptoms":"Hydronephrosis, UTI, flank pain, ureteropelvic junction obstruction, duplex collecting system","goal":"Prevent renal damage, achieve normal drainage, prevent recurrent UTIs","soc":"Antibiotic prophylaxis (TMP-SMX) for UTI prevention; surgical: pyeloplasty (UPJ obstruction), ureteral reimplantation (megaureter)."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Cryptorchidism","symptoms":"Absent testicle in scrotum, increased infertility risk, increased testicular cancer risk","goal":"Achieve scrotal position, preserve fertility, reduce cancer risk","soc":"Hormonal therapy (hCG or GnRH analog) attempted before age 6 months in some protocols but success rate ~20%; standard is surgical orchiopexy before age 18 months."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Prune-Belly Syndrome (Triad Syndrome)","symptoms":"Absent abdominal muscles, undescended testes, urinary tract dilation (mega-cystis, hydronephrosis)","goal":"Prevent renal failure, achieve urinary continence, manage pulmonary complications","soc":"Prophylactic antibiotics (TMP-SMX) for UTI prevention; surgical: orchiopexy + abdominal wall reconstruction; urologic reconstruction (vesicostomy, pyeloplasty)."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Vaginal Anomalies","symptoms":"Absent vagina (Mayer-Rokitansky syndrome), vaginal septum, imperforate hymen, cyclic pelvic pain","goal":"Restore vaginal patency, enable menstrual outflow, achieve fertility if possible","soc":"None (pharmacologic); imperforate hymen: surgical hymenectomy. MRKH: vaginal dilation (first-line) or surgical (McIndoe vaginoplasty). Transverse vaginal septum: surgical excision."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Urethral Anomalies","symptoms":"Obstructed urine stream, recurrent UTIs, incontinence, renal insufficiency (posterior urethral valves)","goal":"Relieve obstruction, preserve renal function, achieve continence","soc":"None (pharmacologic) as primary; emergency: catheter drainage. Surgical: endoscopic valve ablation (posterior urethral valves), urethroplasty."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Penile Anomalies","symptoms":"Hypospadias, epispadias, chordee, micropenis, urethral displacement","goal":"Surgical correction of urethral opening, achieve normal voiding and sexual function","soc":"Topical testosterone cream pre-operatively to increase penile size and facilitate hypospadias repair; definitive surgical repair (urethroplasty)."},{"ta":"Pediatrics","subcategory":"Congenital Renal and Genitourinary Anomalies","indication":"Testicular and Scrotal Anomalies","symptoms":"Scrotal swelling, testicular torsion, hydrocele, varicocele, absent testicle","goal":"Preserve testicular viability, prevent infertility","soc":"No pharmacologic first-line; hydrocele: observation or surgical hydrocelectomy. Torsion: emergency surgical detorsion within 6 hours. Varicocele: surgical or microsurgical repair for symptomatic."},{"ta":"Pediatrics","subcategory":"Congenital Renal Transport Abnormalities","indication":"Hypophosphatemic Rickets","symptoms":"Leg bowing, growth failure, bone pain, dental abscesses, muscle weakness","goal":"Normalize phosphate, prevent skeletal deformity, achieve normal growth","soc":"Burosumab (Crysvita, anti-FGF23 monoclonal antibody) is FDA-approved first-line for X-linked hypophosphatemia (XLH) ≥6 months. Previously: oral phosphate + active vitamin D."},{"ta":"Pediatrics","subcategory":"Congenital Renal Transport Abnormalities","indication":"Cystinuria","symptoms":"Recurrent kidney stones (cystine), flank pain, hematuria, renal insufficiency","goal":"Prevent cystine stone formation, reduce recurrence","soc":"High fluid intake, urinary alkalinization (potassium citrate or sodium bicarbonate). Tiopronin (alpha-mercaptopropionylglycine, Thiola) or D-penicillamine for severe/recurrent stone formers."},{"ta":"Pediatrics","subcategory":"Congenital Renal Transport Abnormalities","indication":"Bartter Syndrome and Gitelman Syndrome","symptoms":"Hypokalemia, metabolic alkalosis, salt wasting, muscle weakness, polyuria","goal":"Correct electrolyte imbalances, maintain normal growth","soc":"Potassium and magnesium supplementation; NSAIDs (indomethacin) for Bartter syndrome to reduce prostaglandin-mediated salt wasting; spironolactone or amiloride to conserve potassium."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Osteochondrodysplasias (Osteochondrodysplastic Dwarfism)","symptoms":"Short stature, skeletal dysplasia, disproportionate limbs, spinal stenosis, joint problems","goal":"Increase height, prevent spinal stenosis, improve mobility","soc":"Vosoritide (Voxzogo, CNP analog/FGFR3 pathway inhibitor) is FDA-approved for achondroplasia ≥2 years to increase linear growth."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Chondromalacia Patellae","symptoms":"Anterior knee pain, patellar crepitus, worsening with stairs and sitting","goal":"Reduce pain, restore patellar cartilage, improve function","soc":"NSAIDs (ibuprofen) for analgesia; physical therapy (VMO strengthening, patellar bracing). Intra-articular corticosteroids for refractory cases."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Osteogenesis Imperfecta","symptoms":"Brittle bones, recurrent fractures, blue sclerae, hearing loss, short stature","goal":"Reduce fracture frequency, increase bone density, improve mobility","soc":"Bisphosphonates (pamidronate or zoledronic acid IV) increase bone mineral density and reduce fracture rate; standard of care for moderate-severe OI."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Ehlers-Danlos Syndromes","symptoms":"Joint hypermobility, skin hyperextensibility, chronic pain, joint dislocations, bruising","goal":"Manage chronic pain, prevent joint injury, maintain function","soc":"NSAIDs and acetaminophen for pain; physical therapy for joint stabilization. No FDA-approved disease-modifying therapy. Vitamin C supplementation for kyphoscoliotic type."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Infrapatellar Tendinitis","symptoms":"Anterior knee pain below kneecap, pain with jumping and squatting","goal":"Reduce inflammation, restore tendon health","soc":"NSAIDs (ibuprofen); eccentric quadriceps exercises; physical therapy. Corticosteroid injection if refractory."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Marfan Syndrome","symptoms":"Tall stature, aortic dilation, lens dislocation, long limbs and fingers, mitral valve prolapse","goal":"Prevent aortic dissection, slow aortic root growth","soc":"Beta-blockers (atenolol, propranolol) to reduce hemodynamic stress on aorta; losartan (ARB) shown to reduce aortic growth rate."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Pseudoxanthoma Elasticum","symptoms":"Yellow skin papules, cardiovascular calcification, vision loss (angioid streaks), GI bleeding","goal":"Prevent cardiovascular events, protect vision, reduce calcification","soc":"No FDA-approved disease-modifying therapy; anti-VEGF injections (bevacizumab/ranibizumab) for choroidal neovascularization to preserve vision."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Nail-Patella Syndrome","symptoms":"Absent or hypoplastic nails/patella, nephropathy, glaucoma, skeletal anomalies","goal":"Manage nephropathy, protect renal function, treat glaucoma","soc":"ACE inhibitors (enalapril) for proteinuria/nephropathy; beta-blockers or prostaglandin analogs for glaucoma."},{"ta":"Pediatrics","subcategory":"Connective Tissue Disorders in Children","indication":"Cutis Laxa","symptoms":"Loose, sagging skin, cardiovascular anomalies, hernias, emphysema, developmental delay","goal":"Manage systemic complications, reduce cardiovascular morbidity","soc":"No pharmacologic disease-modifying therapy; management of specific complications: beta-blockers for aortic dilation, dapsone has been used for elastin restoration (limited evidence)."},{"ta":"Pediatrics","subcategory":"Cystic Fibrosis (CF)","indication":"Cystic Fibrosis","symptoms":"Chronic productive cough, recurrent pulmonary infections, pancreatic insufficiency, malnutrition","goal":"Improve lung function, prevent infections, achieve near-normal life expectancy","soc":"Elexacaftor/tezacaftor/ivacaftor (Trikafta/Kaftrio) for eligible patients with at least one F508del mutation (~90% of CF patients ≥2 years); CFTR modulator triple combination therapy."},{"ta":"Pediatrics","subcategory":"Dehydration and Fluid Therapy in Children","indication":"Dehydration in Children","symptoms":"Sunken eyes, dry mouth, decreased urine output, lethargy, tachycardia","goal":"Restore fluid and electrolyte balance","soc":"Oral rehydration therapy (ORT) with WHO-recommended ORS (glucose-electrolyte solution); IV normal saline or lactated Ringer for severe dehydration."},{"ta":"Pediatrics","subcategory":"Dehydration and Fluid Therapy in Children","indication":"Oral Rehydration Therapy","symptoms":"Diarrhea with fluid loss; electrolyte imbalance management in children","goal":"Replace fluid and electrolytes lost through diarrhea","soc":"WHO oral rehydration salts (ORS): 75 mEq/L Na, 20 mEq/L K, 75 mmol/L glucose — reduces mortality from childhood diarrhea."},{"ta":"Pediatrics","subcategory":"Diabetes Mellitus in Children and Adolescents","indication":"Type 1 Diabetes Mellitus in Children and Adolescents","symptoms":"Polyuria, polydipsia, weight loss, DKA, hyperglycemia","goal":"Achieve near-normoglycemia, prevent DKA and hypoglycemia","soc":"Multiple daily insulin injections (MDI: basal + prandial insulin analogs) or continuous subcutaneous insulin infusion (CSII/insulin pump) with continuous glucose monitoring (CGM)."},{"ta":"Pediatrics","subcategory":"Diabetes Mellitus in Children and Adolescents","indication":"Complications of Diabetes in Children and Adolescents","symptoms":"DKA, hypoglycemia, chronic microvascular/macrovascular complications, nephropathy, retinopathy","goal":"Prevent DKA, achieve glycemic targets, prevent long-term complications","soc":"Insulin therapy (multiple daily injections or continuous subcutaneous insulin infusion) is essential for T1D; GLP-1 RAs and SGLT2 inhibitors emerging for T2D complications in pediatric population."},{"ta":"Pediatrics","subcategory":"Diabetes Mellitus in Children and Adolescents","indication":"Monogenic Forms of Diabetes","symptoms":"Neonatal diabetes, MODY (mild diabetes with family history), no autoimmunity, insulin secretion defect","goal":"Correct underlying defect, achieve glycemic control, avoid unnecessary insulin","soc":"Sulfonylureas (glibenclamide/glyburide) for KCNJ11/ABCC8 mutations (neonatal diabetes); gliclazide/glipizide for MODY 2 and 3; dietary management for MODY 2."},{"ta":"Pediatrics","subcategory":"Diabetes Mellitus in Children and Adolescents","indication":"Type 2 Diabetes Mellitus in Children and Adolescents","symptoms":"Obesity, acanthosis nigricans, hyperglycemia, polyuria, often asymptomatic initially","goal":"Achieve glycemic control, prevent complications, promote weight loss","soc":"Metformin + lifestyle intervention as first-line; insulin for severe hyperglycemia or DKA. Liraglutide (Victoza) FDA-approved for ≥10 years with T2D."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Precocious Puberty","symptoms":"Early breast development/pubic hair (<8 years girls, <9 years boys), advanced bone age, growth acceleration","goal":"Preserve adult height, prevent premature epiphyseal closure, address psychosocial impact","soc":"GnRH agonist (leuprolide acetate, histrelin implant) for central precocious puberty: suppresses gonadotropin axis to arrest pubertal progression."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Congenital Adrenal Hyperplasia Caused by 21-Hydroxylase Deficiency","symptoms":"Adrenal insufficiency (salt-wasting), virilization in females, precocious puberty, ambiguous genitalia","goal":"Replace cortisol/aldosterone, suppress excess androgens, normalize growth","soc":"Hydrocortisone (10–15 mg/m²/day in 3 divided doses) + fludrocortisone for salt-wasting form. Crinecerfont (Crenessity) FDA-approved 2024 as next-generation non-steroidal CRF1 receptor antagonist for adults and pediatric ≥4 years."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Growth Hormone Deficiency in Children","symptoms":"Short stature, slow growth velocity, delayed bone age, low IGF-1","goal":"Achieve normal adult height, normalize growth velocity","soc":"Recombinant human growth hormone (somatropin, daily SC injections); lonapegsomatropin (Skytrofa) weekly long-acting GH approved for pediatric GHD."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Delayed Puberty","symptoms":"Absent pubertal signs by age 13–14, short stature, poor growth velocity, low sex hormones","goal":"Induce puberty, achieve normal height and sexual maturation","soc":"Low-dose sex steroid therapy: testosterone (IM depot, patch) for boys; low-dose estrogen (oral/patch) for girls. GnRH analog stimulation testing to differentiate CDGP vs. hypogonadism."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Male Hypogonadism in Children","symptoms":"Absent or delayed puberty, small testes, low testosterone, infertility risk, gynecomastia","goal":"Induce virilization, achieve normal puberty and adult testosterone levels","soc":"Testosterone replacement therapy (depot testosterone IM, testosterone gel, testosterone patch) for hypogonadotropic or hypergonadotropic hypogonadism in adolescents."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Hyperthyroidism in Infants and Children","symptoms":"Tachycardia, tremor, weight loss, heat intolerance, goiter, exophthalmos","goal":"Normalize thyroid function, prevent thyroid storm and complications","soc":"Methimazole (thionamide) as first-line antithyroid drug in children; propylthiouracil reserved for thyroid storm or methimazole intolerance."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Hypothyroidism in Infants and Children","symptoms":"Lethargy, poor feeding, constipation, prolonged jaundice, intellectual disability (untreated congenital hypothyroidism)","goal":"Normalize TSH and T4, prevent neurologic damage","soc":"Levothyroxine (LT4, thyroxine): 10–15 mcg/kg/day in newborns; dose adjusted by age. Titratable oral formulation."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Congenital Adrenal Hyperplasia Caused by 11Beta-Hydroxylase Deficiency","symptoms":"Virilization, hypertension, hypokalemia, precocious puberty, elevated 11-deoxycortisol","goal":"Suppress androgens, control blood pressure, normalize hormones","soc":"Glucocorticoid replacement (hydrocortisone) to suppress ACTH and androgen excess; antihypertensives for associated hypertension."},{"ta":"Pediatrics","subcategory":"Endocrine Disorders in Children","indication":"Congenital Goiter","symptoms":"Enlarged thyroid at birth, hypothyroidism or hyperthyroidism, airway compression","goal":"Normalize thyroid function, reduce goiter size","soc":"Levothyroxine for hypothyroid congenital goiter; propylthiouracil or methimazole for hyperthyroid forms (Graves-related)."},{"ta":"Pediatrics","subcategory":"Eye Defects and Conditions in Children","indication":"Amblyopia","symptoms":"Reduced vision in one eye, poor depth perception, failure to fix and follow","goal":"Improve visual acuity in amblyopic eye, restore binocular vision","soc":"Patching (occlusion therapy) of the stronger eye 2–6 hours/day; atropine (1%) penalization of the fellow eye as equally effective alternative."},{"ta":"Pediatrics","subcategory":"Eye Defects and Conditions in Children","indication":"Strabismus","symptoms":"Eye misalignment (esotropia, exotropia), diplopia, suppression, head turn","goal":"Align eyes, restore binocularity, prevent amblyopia","soc":"Corrective glasses for accommodative esotropia; botulinum toxin (onabotulinumtoxinA, Botox) injection as non-surgical alignment treatment; definitive: strabismus surgery."},{"ta":"Pediatrics","subcategory":"Eye Defects and Conditions in Children","indication":"Primary Infantile Glaucoma","symptoms":"Photophobia, buphthalmos (enlarged eyes), tearing, corneal edema, elevated IOP","goal":"Lower IOP, prevent optic nerve damage, preserve vision","soc":"Surgical (angle surgery: goniotomy or trabeculotomy) is definitive first-line; topical IOP-lowering agents (timolol, dorzolamide, brimonidine) used as bridge or adjuncts."},{"ta":"Pediatrics","subcategory":"Eye Defects and Conditions in Children","indication":"Retinopathy of Prematurity","symptoms":"Abnormal retinal vessel growth in premature infants, risk of retinal detachment and blindness","goal":"Prevent retinal detachment, preserve vision","soc":"Intravitreal bevacizumab (anti-VEGF, off-label) or ranibizumab (Byooviz/Lucentis, emerging approval); laser photocoagulation for type 1 ROP."},{"ta":"Pediatrics","subcategory":"Eye Defects and Conditions in Children","indication":"Congenital Cataract","symptoms":"White/hazy lens, absent red reflex, nystagmus, strabismus, visual deprivation amblyopia","goal":"Restore clear optical axis, prevent irreversible amblyopia","soc":"Surgical cataract extraction (lens aspiration) within weeks of birth + optical rehabilitation (aphakic contact lens or IOL) + patching for amblyopia prevention."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Gastroesophageal Reflux in Infants","symptoms":"Regurgitation, arching back (Sandifer syndrome), irritability, poor weight gain","goal":"Relieve symptoms, promote normal growth","soc":"Positioning, feeding modification (thickened feeds, smaller volumes) as first-line. Famotidine (H2RA) or omeprazole (PPI) for GERD with esophagitis or failure to thrive."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Necrotizing Enterocolitis","symptoms":"Abdominal distension, bloody stools, pneumatosis intestinalis, sepsis in premature infants","goal":"Prevent intestinal necrosis and perforation, reduce mortality","soc":"IV antibiotics (ampicillin + gentamicin + metronidazole) + bowel rest + TPN; surgical: peritoneal drain or laparotomy/resection for perforation."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Neonatal Cholestasis","symptoms":"Prolonged jaundice, pale stools, dark urine, hepatomegaly, coagulopathy","goal":"Identify treatable cause, prevent cirrhosis, support nutrition","soc":"Ursodiol (ursodeoxycholic acid) for cholestasis of various etiologies; fat-soluble vitamin supplementation; treat underlying cause (Kasai for BA, thyroid/metabolic correction)."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Miscellaneous Surgical Emergencies in Neonates","symptoms":"Variable: intestinal obstruction, bowel perforation, necrotizing enterocolitis, volvulus","goal":"Emergency surgical correction, prevent sepsis and multi-organ failure","soc":"IV antibiotics (ampicillin + gentamicin) for sepsis; surgical intervention per specific diagnosis."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Hypertrophic Pyloric Stenosis","symptoms":"Projectile non-bilious vomiting, olive-shaped mass, hypochloremic metabolic alkalosis","goal":"Relieve gastric outlet obstruction, correct electrolyte imbalance","soc":"IV fluid resuscitation and electrolyte correction followed by surgical pyloromyotomy (Ramstedt procedure) — definitive treatment."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Intussusception","symptoms":"Intermittent colicky abdominal pain, currant jelly stool, palpable mass, bilious vomiting","goal":"Reduce intussusception, prevent bowel necrosis and perforation","soc":"Pneumatic or hydrostatic enema reduction (non-operative) is first-line treatment."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Meconium Ileus","symptoms":"Intestinal obstruction in newborn, failure to pass meconium, distended abdomen, cystic fibrosis association","goal":"Relieve obstruction, prevent perforation, identify and treat underlying CF","soc":"Gastrografin enema (diatrizoate meglumine) for uncomplicated meconium ileus; surgical: Bishop-Koop ileostomy or primary anastomosis for complicated cases."},{"ta":"Pediatrics","subcategory":"Gastrointestinal Disorders in Neonates and Infants","indication":"Meconium Plug Syndrome","symptoms":"Delayed passage of meconium, transient neonatal intestinal obstruction, abdominal distension","goal":"Clear meconium plug, exclude Hirschsprung disease","soc":"Gastrografin or normal saline enema for initial treatment; rectal stimulation."},{"ta":"Pediatrics","subcategory":"Growth and Development","indication":"Growth and Weight Faltering in Children","symptoms":"Weight and/or height dropping across ≥2 percentile lines; poor appetite, developmental delay, irritability","goal":"Restore adequate growth, identify and treat underlying cause","soc":"High-calorie dietary supplementation; treat underlying conditions (GERD: PPI; celiac: gluten-free diet; hypothyroidism: levothyroxine). Appetite stimulants (cyproheptadine off-label) for poor appetite."},{"ta":"Pediatrics","subcategory":"Health Care Issues in Adolescents","indication":"Obesity in Adolescents","symptoms":"BMI ≥95th percentile; metabolic complications, sleep apnea, orthopedic issues, poor self-esteem","goal":"Achieve sustained weight loss, reduce cardiometabolic risk","soc":"Intensive health behavior and lifestyle therapy (IHBLT). Pharmacotherapy: orlistat (FDA-approved ≥12 years); semaglutide 2.4 mg SC weekly (Wegovy) FDA-approved for adolescents ≥12 years with obesity (2022)."},{"ta":"Pediatrics","subcategory":"Health Care Issues in Adolescents","indication":"Mental Health in Adolescents","symptoms":"Depression, anxiety, behavioral problems; impaired functioning; suicidality risk","goal":"Achieve remission, restore functioning, prevent suicide","soc":"Psychotherapy (CBT) ± SSRIs for depression/anxiety; antipsychotics for psychosis; mood stabilizers for bipolar. See specific disorder entries."},{"ta":"Pediatrics","subcategory":"Health Care Issues in Adolescents","indication":"Substance Use in Adolescents","symptoms":"Alcohol, cannabis, opioid, stimulant, or nicotine use; impaired functioning, withdrawal, craving","goal":"Achieve abstinence or harm reduction, treat withdrawal, prevent relapse","soc":"Nicotine replacement therapy (patches, gum) for adolescent tobacco use disorder. Buprenorphine/naloxone for opioid use disorder ≥16 years. Naltrexone for alcohol use disorder (off-label in adolescents). No FDA-approved pharmacotherapy specifically for adolescent cannabis use disorder."},{"ta":"Pediatrics","subcategory":"Health Care Issues in Adolescents","indication":"Contraception and Pregnancy in Adolescents","symptoms":"Risk of unintended pregnancy; need for contraceptive counseling; adolescent-specific health risks in pregnancy","goal":"Prevent unintended pregnancy, ensure safe delivery if pregnant","soc":"Long-acting reversible contraceptives (LARCs: IUD, implant) are most effective per AAP. Oral contraceptive pills (combined estrogen-progestin or progestin-only). Emergency contraception (levonorgestrel, ulipristal acetate) for acute use."},{"ta":"Pediatrics","subcategory":"Health Care Issues in Adolescents","indication":"Sexuality and Gender in Adolescents","symptoms":"Gender dysphoria, identity exploration; distress from incongruence between gender identity and sex assigned at birth","goal":"Alleviate gender dysphoria, support wellbeing and identity","soc":"GnRH agonists (leuprolide, histrelin) as puberty blockers for gender dysphoria; gender-affirming hormone therapy (testosterone for trans males; estradiol for trans females) starting mid-puberty with appropriate consent."},{"ta":"Pediatrics","subcategory":"Health Care Issues in Adolescents","indication":"Psychosocial Development in Adolescents","symptoms":"Identity formation challenges, peer pressure, risk-taking behavior, emotional dysregulation","goal":"Support healthy development, prevent risky behaviors and mental health disorders","soc":"None (pharmacologic); primary care counseling, psychotherapy, and social support are primary. Treat emerging mental health conditions (see specific entries)."},{"ta":"Pediatrics","subcategory":"Health Supervision of the Well Child","indication":"Health Supervision of the Well Child","symptoms":"Routine health maintenance; immunizations, screening, developmental surveillance, anticipatory guidance","goal":"Prevent illness, detect early health problems, optimize healthy development","soc":"Childhood vaccination schedule (MMR, DTaP, IPV, Hib, PCV, Varicella, Hep A/B, influenza, HPV, etc.) per AAP/ACIP. Fluoride supplementation for dental caries prevention."},{"ta":"Pediatrics","subcategory":"Health Supervision of the Well Child","indication":"Screening Tests for Infants, Children, and Adolescents","symptoms":"N/A (diagnostic/preventive category); early detection of conditions before symptoms develop","goal":"Identify conditions early to enable timely intervention","soc":"None (pharmacologic); newborn screening (NBS) panel identifies metabolic/genetic diseases for early treatment. Developmental screening tools (ASQ, M-CHAT). Vision, hearing, anemia, lead, cholesterol, STI screenings per age."},{"ta":"Pediatrics","subcategory":"Health Supervision of the Well Child","indication":"Toilet Training","symptoms":"Normal developmental milestone; delays, regression, or resistance to toilet training; functional incontinence","goal":"Achieve independent toileting; manage training difficulties","soc":"None (pharmacologic); child-oriented behavioral approach (readiness cues, positive reinforcement). Treat constipation (PEG 3350) if present."},{"ta":"Pediatrics","subcategory":"Hereditary Periodic Fever Syndromes","indication":"Familial Mediterranean Fever","symptoms":"Recurrent fever attacks, peritonitis, pleuritis, joint pain, AA amyloidosis","goal":"Prevent fever attacks and amyloidosis","soc":"Colchicine (0.5–2 mg/day) is the established first-line standard of care; reduces attack frequency and prevents AA amyloidosis."},{"ta":"Pediatrics","subcategory":"Hereditary Periodic Fever Syndromes","indication":"PFAPA Syndrome","symptoms":"Periodic fevers every 3–6 weeks, aphthous stomatitis, pharyngitis, adenitis","goal":"Prevent febrile episodes, achieve remission","soc":"Single-dose corticosteroid (prednisone or prednisolone 1–2 mg/kg) aborts attacks acutely; cimetidine (off-label) for prevention in some patients."},{"ta":"Pediatrics","subcategory":"Hereditary Periodic Fever Syndromes","indication":"Hereditary Cryopyrin-Associated Periodic Syndromes (Cryopyrinopathies)","symptoms":"Recurrent urticaria-like rash, fever, joint pain, hearing loss (NOMID), amyloidosis","goal":"Suppress IL-1β-mediated inflammation, prevent organ damage","soc":"Canakinumab (Ilaris, IL-1β monoclonal antibody) SC every 8 weeks; rilonacept (Arcalyst, IL-1 trap) or anakinra alternatives; FDA-approved for CAPS."},{"ta":"Pediatrics","subcategory":"Hereditary Periodic Fever Syndromes","indication":"TNF Receptor–Associated Periodic Syndrome (TRAPS)","symptoms":"Prolonged fever attacks (1–3 weeks), periorbital edema, migratory skin rash, myalgia","goal":"Reduce attack frequency, prevent AA amyloidosis","soc":"Canakinumab (Ilaris) FDA-approved for TRAPS; etanercept (TNF inhibitor) used off-label (less effective long-term)."},{"ta":"Pediatrics","subcategory":"Hereditary Periodic Fever Syndromes","indication":"Hyper-IgD Syndrome","symptoms":"Recurrent fever, lymphadenopathy, abdominal pain, elevated serum IgD, Dutch ancestry","goal":"Reduce attack frequency and severity","soc":"No universally effective first-line pharmacologic therapy; NSAIDs for attack management. Anakinra (IL-1 receptor antagonist) shows benefit in some patients."},{"ta":"Pediatrics","subcategory":"Hereditary Periodic Fever Syndromes","indication":"PAPA Syndrome","symptoms":"Pyogenic arthritis, pyoderma gangrenosum, acne, skin ulcers, joint destruction","goal":"Suppress IL-1/TNF-mediated inflammation, prevent joint destruction","soc":"Corticosteroids (systemic) for acute flares; anakinra (IL-1 receptor antagonist) shows benefit in PAPA syndrome."},{"ta":"Pediatrics","subcategory":"Human Immunodeficiency Virus (HIV) Infection in Infants and Children","indication":"Antiretroviral Therapy in Children","symptoms":"HIV infection: immunosuppression, opportunistic infections, failure to thrive","goal":"Achieve viral suppression, restore immune function, prevent AIDS-defining illness","soc":"WHO-recommended pediatric ART: 2 NRTIs (abacavir + lamivudine or tenofovir + emtricitabine) + 1 INSTI (dolutegravir, preferred for children ≥4 weeks) or NNRTI."},{"ta":"Pediatrics","subcategory":"Human Immunodeficiency Virus (HIV) Infection in Infants and Children","indication":"Human Immunodeficiency Virus (HIV) Infection in Infants and Children","symptoms":"Failure to thrive, recurrent infections, lymphadenopathy, developmental delay, oral candidiasis","goal":"Achieve viral suppression, normalize immune function, prevent mortality","soc":"Immediate ART (dolutegravir-based 2-NRTI + INSTI regimen) for all HIV-infected infants and children, regardless of CD4 count."},{"ta":"Pediatrics","subcategory":"Hypertension in Children","indication":"Hypertension in Children","symptoms":"Elevated blood pressure, often asymptomatic, headache, blurred vision, secondary cause common","goal":"Normalize blood pressure, identify underlying cause, prevent end-organ damage","soc":"Lifestyle modification (DASH diet, weight reduction, exercise) as first-line. ACE inhibitors (lisinopril, enalapril) or ARBs for pharmacologic first-line in persistent hypertension."},{"ta":"Pediatrics","subcategory":"Hypertension in Children","indication":"Medications for Hypertension in Children","symptoms":"Pharmacologic management category — covers use of antihypertensives in pediatric patients","goal":"Establish safe, age-appropriate pharmacologic BP management","soc":"ACE inhibitors, ARBs, CCBs, and diuretics used according to etiology; pediatric dosing per AHA/AAP 2017 guidelines."},{"ta":"Pediatrics","subcategory":"Hypertension in Children","indication":"Acute Severe Hypertension in Children","symptoms":"Severely elevated BP with end-organ damage: headache, vision changes, renal failure, seizures","goal":"Reduce BP rapidly but safely, prevent encephalopathy and cardiac damage","soc":"IV labetalol or IV nicardipine for hypertensive emergency; oral clonidine or nifedipine for urgent non-emergency hypertension."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Sepsis","symptoms":"Temperature instability, apnea, poor feeding, hypotension, petechiae in neonate","goal":"Eradicate bloodstream infection, prevent septic shock and death","soc":"Early-onset: ampicillin + gentamicin IV; late-onset: vancomycin + gentamicin (or pip-tazo). Duration 7-14 days per pathogen."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Hospital-Acquired Infection","symptoms":"Fever or hypothermia, respiratory distress, apnea, poor feeding, bacteremia in NICU","goal":"Eradicate HAI pathogens, prevent sepsis and mortality","soc":"Empiric vancomycin + piperacillin-tazobactam or meropenem depending on local NICU antibiogram; de-escalate per culture results."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Pneumonia","symptoms":"Tachypnea, grunting, retractions, hypoxia, fever or hypothermia in neonate","goal":"Eradicate causative pathogen, restore oxygenation","soc":"Ampicillin + gentamicin IV for early-onset (GBS, E. coli); consider cefotaxime for meningitis co-infection; azithromycin for Chlamydia trachomatis."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Congenital and Perinatal Cytomegalovirus Infection (CMV)","symptoms":"Hearing loss, microcephaly, developmental delay, petechiae, jaundice","goal":"Prevent hearing loss progression and neurodevelopmental sequelae","soc":"Valganciclovir (16 mg/kg PO BID x 6 months) for symptomatic congenital CMV with CNS involvement; reduces hearing deterioration."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Hepatitis B Virus (HBV) Infection","symptoms":"Often asymptomatic at birth; chronic hepatitis, cirrhosis risk, hepatocellular carcinoma long-term","goal":"Prevent perinatal transmission; achieve HBsAg clearance","soc":"Hepatitis B immune globulin (HBIG) 0.5 mL IM + hepatitis B vaccine within 12 hours of birth for infants of HBsAg-positive mothers; complete 3-dose vaccine series."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Herpes Simplex Virus (HSV) Infection","symptoms":"Skin/eye/mouth lesions, encephalitis, disseminated disease, seizures","goal":"Prevent CNS dissemination, reduce mortality and neurologic sequelae","soc":"IV acyclovir 60 mg/kg/day divided q8h x 14-21 days (CNS/disseminated) or x 14 days (SEM disease); followed by oral acyclovir suppression 300 mg/m2 TID x 6 months."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Bacterial Meningitis","symptoms":"Fever, bulging fontanelle, seizures, lethargy, irritability in neonate","goal":"Eradicate infection, prevent neurologic sequelae and death","soc":"Ampicillin + cefotaxime (or gentamicin) IV x 14-21 days for early-onset; third-generation cephalosporins for late-onset GBS or gram-negative."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Congenital Toxoplasmosis","symptoms":"Intracranial calcifications, hydrocephalus, chorioretinitis, seizures, intellectual disability, hepatosplenomegaly","goal":"Eradicate Toxoplasma, prevent progressive neurologic and ocular damage","soc":"Pyrimethamine + sulfadiazine + leucovorin (folinic acid) × 12 months is the established 12-month treatment regimen for congenital toxoplasmosis."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Listeriosis","symptoms":"Sepsis, meningitis, respiratory distress, fever, granulomatosis infantiseptica","goal":"Eradicate Listeria, prevent meningitis and death","soc":"Ampicillin 200 mg/kg/day IV + gentamicin (synergy) x 14-21 days; or ampicillin alone x 3-6 weeks for meningitis."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Perinatal Tuberculosis (TB)","symptoms":"Respiratory distress, hepatosplenomegaly, fever, lymphadenopathy, failure to thrive in neonate","goal":"Eradicate Mycobacterium tuberculosis, prevent dissemination","soc":"Isoniazid + rifampin + pyrazinamide + ethambutol x 2 months; then INH + RIF x 4 months (standard 6-month RIPE regimen adapted for neonates)."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Congenital Syphilis","symptoms":"Rash, bone pain, hepatosplenomegaly, snuffles, jaundice, stillbirth risk","goal":"Eradicate Treponema pallidum, prevent long-term sequelae","soc":"Parenteral penicillin G (aqueous crystalline, 50,000 units/kg IV q12h × 10 days) is the definitive treatment for congenital syphilis."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Neonatal Conjunctivitis","symptoms":"Eye discharge, redness, swelling of eyelids in newborn","goal":"Eradicate infection, prevent corneal damage","soc":"Erythromycin 0.5% ophthalmic ointment (prophylaxis) at birth; treatment: topical/oral antibiotics per pathogen (azithromycin for chlamydia; penicillin G for gonococcal)."},{"ta":"Pediatrics","subcategory":"Infections in Neonates","indication":"Congenital Rubella","symptoms":"Deafness, cataracts, congenital heart disease, intellectual disability, blueberry muffin rash","goal":"Prevent via maternal vaccination; manage complications","soc":"No specific antiviral pharmacologic treatment; management is supportive. Prevention: MMR vaccine."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Mitochondrial Oxidative Phosphorylation Disorders","symptoms":"Multi-organ involvement: myopathy, encephalopathy, lactic acidosis, cardiomyopathy, SNHL, retinopathy","goal":"Reduce oxidative stress, support mitochondrial function, prevent organ failure","soc":"Mitochondrial 'cocktail': CoQ10, riboflavin (B2), thiamine, carnitine, antioxidants. No FDA-approved disease-modifying treatment. Idebenone for Leber's hereditary optic neuropathy (LHON)."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Gaucher Disease","symptoms":"Splenomegaly, hepatomegaly, bone pain, anemia, thrombocytopenia","goal":"Reduce glycolipid storage, prevent bone crises and organ damage","soc":"ERT: imiglucerase (Cerezyme) 60 U/kg IV q2w (or velaglucerase alfa, taliglucerase alfa). SRT: miglustat or eliglustat (oral) for Type 1 adult patients."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Glycogen Storage Diseases","symptoms":"Hypoglycemia (types I/III/VI/IX), cardiomyopathy (type II), muscle weakness/cramps, hepatomegaly","goal":"Prevent hypoglycemia, reverse cardiomyopathy, maintain metabolic stability","soc":"GSD I: cornstarch (uncooked) + fructose/galactose-free diet. GSD II (Pompe): alglucosidase alfa (Lumizyme) ERT 20 mg/kg q2w + avalglucosidase alfa (Nexviazyme) as improved ERT."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Phenylketonuria (PKU)","symptoms":"Intellectual disability if untreated; dietary non-compliance: cognitive decline, behavioral issues, seizures","goal":"Maintain Phe levels <120 µmol/L, preserve cognitive function","soc":"Sapropterin (Kuvan) 10-20 mg/kg/day orally for BH4-responsive PKU (~30% of patients). Phenylalanine-restricted diet (medical formula). Pegvaliase (Palynziq) for adults uncontrolled on diet."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Purine Salvage Disorders","symptoms":"Lesch-Nyhan: severe gout, self-mutilation, dystonia, intellectual disability, hyperuricemia","goal":"Control hyperuricemia, manage self-injurious behavior","soc":"Allopurinol 10-20 mg/kg/day to reduce uric acid levels (controls gout, nephrolithiasis, NOT neurological manifestations). Behavioral restraints for self-injury."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Galactosemia","symptoms":"Jaundice, vomiting, cataracts, liver failure, sepsis in neonate; long-term cognitive and ovarian failure","goal":"Prevent galactose toxicity via dietary restriction; manage long-term complications","soc":"Lifelong dietary galactose elimination (lactose-free diet). No approved pharmacologic therapy for classic galactosemia."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Fabry Disease","symptoms":"Neuropathic pain, angiokeratomas, kidney failure, cardiac hypertrophy, stroke","goal":"Reduce GL-3 substrate, prevent organ failure","soc":"Enzyme replacement therapy: agalsidase beta (Fabrazyme) 1 mg/kg IV q2w or agalsidase alfa (Replagal, non-US) 0.2 mg/kg q2w. Migalastat (Galafold) for amenable mutations (oral chaperone)."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Branched-Chain Amino Acid Metabolism Disorders","symptoms":"Encephalopathy, maple syrup urine odor, developmental regression, metabolic crisis","goal":"Prevent neurotoxic amino acid accumulation, maintain metabolic stability","soc":"Protein-restricted diet with synthetic BCAA-free medical formula; thiamine supplementation for thiamine-responsive MSUD; avoid catabolism."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Fructose Metabolism Disorders","symptoms":"Vomiting, hypoglycemia after fructose ingestion, liver failure (HFI); benign (fructosuria)","goal":"Prevent fructose-induced hypoglycemia and liver damage via strict dietary exclusion","soc":"Strict dietary fructose, sucrose, and sorbitol elimination (hereditary fructose intolerance - HFI). No pharmacologic treatment currently approved."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Krabbe Disease","symptoms":"Severe irritability, stiffness, developmental regression, blindness, deafness, early death","goal":"Slow demyelination; curative HSCT in presymptomatic patients","soc":"Hematopoietic stem cell transplantation (HSCT) in presymptomatic neonates detected by NBS; no approved pharmacologic disease-modifying therapy."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Niemann-Pick Disease","symptoms":"Type A/B: hepatosplenomegaly, pulmonary infiltrates, neurodegeneration. Type C: vertical supranuclear gaze palsy, ataxia, dementia, dystonia","goal":"Reduce sphingomyelin/cholesterol accumulation, slow neurodegeneration","soc":"NPC: miglustat (Zavesca) 200 mg TID for neurological stabilization (approved EU/US for NPC); arimoclomol (EU approval 2024). NPB: olipudase alfa (Xenpozyme) ERT approved US 2022 for NPB."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Peroxisomal Disorders","symptoms":"Zellweger: hypotonia, seizures, liver disease, neonatal death. ALD: adrenal insufficiency, cerebral demyelination","goal":"Prevent adrenal crisis; halt cerebral demyelination via HSCT/gene therapy","soc":"X-ALD: Lorenzo's oil (erucic acid/oleic acid - limited evidence); hematopoietic stem cell transplantation for early cerebral ALD; elivaldogene autotemcel (Skysona) gene therapy for early cerebral ALD. Adrenal insufficiency: hydrocortisone + fludrocortisone replacement."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Beta-Oxidation Cycle Disorders","symptoms":"Hypoketotic hypoglycemia, cardiomyopathy, muscle weakness, liver failure","goal":"Prevent metabolic crises, hypoglycemia, and cardiomyopathy","soc":"Dietary fat restriction (LCT) with MCT supplementation; avoid fasting; carnitine supplementation for LCAD/VLCAD defects; triheptanoin (Dojolvi) for long-chain FAO disorders."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Other Carbohydrate Metabolism Disorders","symptoms":"Varies: hypoglycemia, lactic acidosis, liver disease, neurodevelopmental delay (PGM1, PGAM2, others)","goal":"Prevent metabolic crises and end-organ damage","soc":"Dietary management (avoid fasting, cornstarch supplementation for specific defects). No FDA-approved pharmacologic therapies for most."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Pyruvate Metabolism Disorders","symptoms":"Lactic acidosis, hypotonia, encephalopathy, Leigh syndrome features (PDH deficiency); hyperammonemia (pyruvate carboxylase)","goal":"Reduce lactic acidosis, support energy metabolism, prevent neurological deterioration","soc":"Pyruvate dehydrogenase (PDH) deficiency: ketogenic diet; thiamine 100-1,000 mg/day for thiamine-responsive cases; dichloroacetate (DCA) - investigational. Pyruvate carboxylase deficiency: triheptanoin + biotin supplementation."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Urea Cycle Disorders","symptoms":"Hyperammonemia, vomiting, encephalopathy, lethargy, coma; may present as neonatal emergency","goal":"Reduce ammonia to normal, prevent neurological damage","soc":"Nitrogen scavengers: sodium benzoate (250 mg/kg/day) + sodium phenylacetate (Ammonul IV for acute; Ravicti/glycerol phenylbutyrate orally for maintenance). Protein restriction with essential amino acid supplementation."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Metachromatic Leukodystrophy","symptoms":"Progressive motor and cognitive regression, spasticity, peripheral neuropathy, behavioral changes","goal":"Halt demyelination, preserve neurological function","soc":"Atidarsagene autotemcel (Libmeldy) - gene therapy approved EU 2020 for pre-/early-symptomatic late-infantile and early-juvenile MLD. Autologous HSC gene therapy."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Methionine Metabolism Disorders","symptoms":"Homocystinuria: lens dislocation, thromboembolism, skeletal deformities, cognitive delay; CBS deficiency most common","goal":"Normalize homocysteine, prevent thromboembolic events and lens dislocation","soc":"Pyridoxine (B6) 200-1,000 mg/day for B6-responsive CBS deficiency (50% of cases). B6-non-responsive: methionine-restricted diet + betaine (Cystadane) 100-150 mg/kg/day."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Purine Catabolism Disorders","symptoms":"Hyperuricemia, gout, nephrolithiasis (xanthinuria); hemolytic anemia, neurological issues (adenosine deaminase deficiency)","goal":"Reduce uric acid/xanthine, prevent gout and renal complications","soc":"Xanthinuria: high fluid intake, dietary purine restriction; allopurinol ineffective. Adenosine deaminase deficiency (ADA-SCID): PEG-ADA (elapegademase - Revcovi) ERT weekly IM."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Cholesteryl Ester Storage Disease and Wolman Disease","symptoms":"Hepatomegaly, adrenal calcification (Wolman), hyperlipidemia, liver disease progression","goal":"Reduce lysosomal lipid storage, prevent liver failure and adrenal insufficiency","soc":"Sebelipase alfa (Kanuma) FDA-approved ERT: 1 mg/kg IV q2w for CESD; 3 mg/kg weekly (escalating to 5 mg/kg) for Wolman disease."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Tay-Sachs Disease and Sandhoff Disease","symptoms":"Cherry-red spot, progressive neurodegeneration, blindness, deafness, paralysis, death in infancy/childhood","goal":"Slow neurodegeneration; currently no curative therapy","soc":"None (no approved pharmacologic treatment). Supportive/palliative care: anticonvulsants, nutritional support, respiratory support."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Purine Nucleotide Synthesis Disorders","symptoms":"Hypotonia, developmental delay, seizures, autistic features (ADSL deficiency, AICA-ribosiduria)","goal":"Correct purine nucleotide depletion, improve neurological outcomes","soc":"Allopurinol (reduces substrate accumulation in some subtypes) + ribose supplementation (investigational). No FDA-approved pharmacologic treatment."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Tyrosine Metabolism Disorders","symptoms":"Hereditary tyrosinemia type 1: liver failure, cirrhosis, hepatocellular carcinoma, renal tubular dysfunction, porphyric crises","goal":"Prevent liver failure, HCC, and renal disease","soc":"Nitisinone (NTBC/Orfadin) 1-2 mg/kg/day orally + low-tyrosine/phenylalanine diet; dramatically reduces HCC risk and liver failure."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Glycerol Metabolism Disorders","symptoms":"Episodic vomiting, lethargy, elevated glycerol in urine; benign glyceroluria","goal":"Prevent metabolic crises; mostly benign condition requiring no treatment","soc":"None for isolated glyceroluria (benign). For glycerol kinase deficiency with associated Duchenne/AHC: treat comorbidities (corticosteroids for DMD, adrenal steroid replacement)."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Pyrimidine Metabolism Disorders","symptoms":"Megaloblastic anemia unresponsive to B12/folate (orotic aciduria); hemolytic anemia, neurological features","goal":"Correct pyrimidine deficiency, resolve anemia and developmental delay","soc":"Uridine supplementation (Xuriden - uridine triacetate, FDA-approved) for hereditary orotic aciduria 60 mg/kg/day orally. Also emergency treatment for 5-FU/capecitabine overdose."},{"ta":"Pediatrics","subcategory":"Inherited Disorders of Metabolism","indication":"Hartnup Disease","symptoms":"Pellagra-like rash, cerebellar ataxia, psychiatric symptoms, triggered by stress/poor nutrition","goal":"Prevent pellagra symptoms with nicotinamide supplementation","soc":"Nicotinamide (niacin) 50-300 mg/day orally; high-protein diet to compensate for tryptophan malabsorption."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Duchenne Muscular Dystrophy and Becker Muscular Dystrophy","symptoms":"Progressive proximal muscle weakness, Gowers sign, calf pseudohypertrophy, cardiomyopathy","goal":"Slow muscle loss, preserve ambulation, treat cardiomyopathy","soc":"Corticosteroids: deflazacort (Emflaza) 0.9 mg/kg/day or prednisone 0.75 mg/kg/day to slow disease progression (standard of care for all ambulatory boys ≥2 years). Exon-skipping: eteplirsen (EXONDYS 51), golodirsen (VYONDYS 53), casimersen (AMONDYS 45), viltolarsen (VILTEPSO) per amenable mutation."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Limb-Girdle Dystrophy","symptoms":"Proximal shoulder and hip-girdle weakness, slow progression, cardiomyopathy in some subtypes","goal":"Slow muscle degeneration, prevent cardiac and respiratory complications","soc":"None (no approved pharmacologic therapy for most subtypes). Supportive: ACE-I for cardiomyopathy; respiratory support; physical therapy."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Myotonic Dystrophy","symptoms":"Myotonia, distal muscle weakness, cataracts, cardiac arrhythmias, excessive daytime sleepiness, cognitive impairment","goal":"Reduce myotonia, prevent cardiac arrhythmias, manage hypersomnia","soc":"Mexiletine for symptomatic myotonia. Pacemaker/ICD for cardiac conduction defects. Modafinil/methylphenidate for hypersomnia. No disease-modifying therapy approved."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Facioscapulohumeral Muscular Dystrophy","symptoms":"Facial weakness, scapular winging, foot drop, progressive limb-girdle weakness, asymmetric pattern","goal":"Slow DUX4-mediated muscle degeneration, preserve function","soc":"None (no approved pharmacologic treatment). Physical therapy, scapular fixation surgery, ankle-foot orthoses."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Congenital Myopathies","symptoms":"Neonatal hypotonia, proximal weakness, respiratory failure, skeletal deformities, feeding difficulties","goal":"Improve motor function and respiratory support","soc":"None (no approved pharmacologic treatment). Supportive: respiratory support (BiPAP/ventilator), physical/occupational therapy, nutritional support."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Emery-Dreifuss Dystrophy","symptoms":"Early joint contractures (elbows, neck), slowly progressive humeroperoneal weakness, life-threatening cardiac arrhythmias/sudden death","goal":"Prevent sudden cardiac death, slow muscle wasting","soc":"Pacemaker/ICD for cardiac arrhythmias (primary SoC - device, not pharmacologic). ACE inhibitors or ARBs for cardiomyopathy prevention."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Familial Periodic Paralysis","symptoms":"Episodic flaccid weakness (minutes to days), hypo- or hyperkalemia during attacks, triggering by carbohydrates/rest/cold","goal":"Prevent paralytic attacks, normalize potassium balance","soc":"Hypokalemic PP: dichlorphenamide (Keveyis) FDA-approved for HypoPP types 1/2 and hyperPP, 50-200 mg/day. Acetazolamide also used. Avoid triggers."},{"ta":"Pediatrics","subcategory":"Inherited Muscular Disorders","indication":"Myotonia Congenita","symptoms":"Muscle stiffness after rest, warm-up phenomenon, grip myotonia, painless muscle hypertrophy","goal":"Reduce myotonia, improve functional mobility","soc":"Mexiletine (sodium channel blocker) 200 mg TID - most effective pharmacologic treatment. Carbamazepine or acetazolamide as alternatives."},{"ta":"Pediatrics","subcategory":"Learning and Developmental Disorders","indication":"Dyslexia","symptoms":"Reading difficulty, poor phonological awareness, spelling errors, slow reading speed despite normal IQ","goal":"Improve reading accuracy and fluency via structured literacy interventions","soc":"None (no pharmacologic SoC). Evidence-based structured literacy intervention (Orton-Gillingham, Wilson Reading System) is the primary treatment."},{"ta":"Pediatrics","subcategory":"Learning and Developmental Disorders","indication":"Attention-Deficit/Hyperactivity Disorder (ADHD)","symptoms":"Inattention, hyperactivity, impulsivity, functional impairment in school/home","goal":"Reduce ADHD symptoms, improve academic and social function","soc":"Stimulants: methylphenidate (Ritalin, Concerta) 0.3-1 mg/kg/day or amphetamine salts (Adderall) 5-30 mg/day. First-line in children ≥6 years combined with behavioral therapy."},{"ta":"Pediatrics","subcategory":"Learning and Developmental Disorders","indication":"Autism Spectrum Disorder","symptoms":"Social communication deficits, repetitive behaviors, restricted interests, sensory sensitivities","goal":"Reduce core symptoms and irritability, improve adaptive function","soc":"Behavioral interventions (ABA therapy) are primary SoC. Pharmacologic: risperidone (FDA-approved for irritability in ASD ≥5 years) or aripiprazole (Abilify, ≥6 years) for irritability/aggression; not core ASD symptoms."},{"ta":"Pediatrics","subcategory":"Learning and Developmental Disorders","indication":"Intellectual Disability","symptoms":"Below-average intellectual function (IQ <70), adaptive behavioral deficits, present from childhood","goal":"Improve adaptive function; treat comorbid conditions (ADHD, epilepsy, ASD)","soc":"None (no pharmacologic treatment for underlying ID). Symptom-directed: stimulants/atomoxetine for ADHD; antipsychotics for behavioral dysregulation; anticonvulsants for epilepsy."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Fetal Alcohol Syndrome","symptoms":"Facial dysmorphia, growth retardation, CNS abnormalities, cognitive and behavioral deficits","goal":"Manage behavioral/cognitive symptoms; no curative treatment","soc":"None pharmacologic for core FAS. Stimulants (methylphenidate) for co-morbid ADHD symptoms; antipsychotics for severe behavioral dysregulation."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Neonatal Hyperbilirubinemia","symptoms":"Jaundice (yellow skin/sclera), elevated total serum bilirubin in first weeks of life","goal":"Reduce bilirubin levels to prevent kernicterus","soc":"Phototherapy (bili-lights) for TSB approaching exchange transfusion thresholds per Bhutani nomogram. IV immunoglobulin (IVIG) for hemolytic disease (Rh, ABO incompatibility)."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic Disorders in Neonates","indication":"Chronic Bilirubin Encephalopathy","symptoms":"Choreoathetosis, hearing loss, upward gaze palsy, dental enamel dysplasia (sequelae of neonatal kernicterus)","goal":"Prevent kernicterus; manage established neurological sequelae","soc":"Prevention: aggressive phototherapy and exchange transfusion for hyperbilirubinemia in neonates. No pharmacologic treatment for established chronic encephalopathy."},{"ta":"Pediatrics","subcategory":"Metabolic, Electrolyte, and Toxic D
