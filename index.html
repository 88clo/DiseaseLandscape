ection identified: appropriate antibiotics (doxycycline or ciprofloxacin for prostatitis/urethritis)."},{"ta":"Women's Health","subcategory":"Abnormal Uterine Bleeding","indication":"Abnormal Uterine Bleeding","symptoms":"Irregular, heavy, or prolonged menstrual bleeding, intermenstrual bleeding","goal":"Control bleeding, correct anemia, treat underlying cause","soc":"Levonorgestrel IUS (Mirena; intrauterine progestin system) or combined oral contraceptives (COCs; estrogen-progestin) for hormonal control. Tranexamic acid (Lysteda; antifibrinolytic) for acute heavy menstrual bleeding."},{"ta":"Women's Health","subcategory":"Abnormal Uterine Bleeding","indication":"Polycystic Ovary Syndrome (PCOS)","symptoms":"Irregular periods, acne, excess hair growth, weight gain, ovarian cysts, infertility","goal":"Regulate menstrual cycles, reduce hyperandrogenism, restore fertility if desired","soc":"Combined oral contraceptives (COCs; estrogen-progestin) for menstrual regulation and androgen suppression in non-fertility-seeking women. Metformin (biguanide; insulin sensitizer) for insulin resistance component and metabolic improvement."},{"ta":"Women's Health","subcategory":"Abnormal Uterine Bleeding","indication":"Dysmenorrhea","symptoms":"Painful menstrual cramps, lower abdominal pain, back pain, nausea during menses","goal":"Relieve menstrual pain, reduce prostaglandin-driven cramping","soc":"NSAIDs: ibuprofen 400–600mg TID or naproxen sodium 550mg BID starting 1–2 days before menses (prostaglandin synthesis inhibitors; most effective first-line). Combined oral contraceptives (COCs) for ongoing hormonal suppression."},{"ta":"Women's Health","subcategory":"Abnormal Uterine Bleeding","indication":"Premenstrual Syndrome (PMS)","symptoms":"Mood swings, irritability, bloating, breast tenderness, fatigue before menses","goal":"Relieve premenstrual symptoms, improve daily functioning","soc":"Selective serotonin reuptake inhibitors (SSRIs): fluoxetine (Sarafem; FDA-approved for PMDD) 20mg daily or luteal-phase dosing. Continuous or intermittent dosing. COCs for hormonal suppression."},{"ta":"Women's Health","subcategory":"Abnormal Uterine Bleeding","indication":"Amenorrhea","symptoms":"Absent menstrual periods for 3+ months; may have hot flashes, galactorrhea","goal":"Restore normal menstruation, treat underlying cause, preserve fertility/bone health","soc":"Depends on cause: Hypothalamic amenorrhea—nutrition/weight restoration + pulsatile GnRH or clomiphene (ovulation induction). Prolactinoma—cabergoline (dopamine agonist; first-line for hyperprolactinemia). Primary ovarian insufficiency—hormone replacement therapy (HRT: estrogen + progesterone)."},{"ta":"Women's Health","subcategory":"Abnormal Uterine Bleeding","indication":"Pelvic Venous Disorders","symptoms":"Chronic pelvic pain, pelvic heaviness, dyspareunia, dilated pelvic veins","goal":"Reduce venous congestion, relieve pelvic pain","soc":"Medroxyprogesterone acetate (MPA; progestin; suppresses ovarian hormones and reduces venous engorgement) 30–50mg/day or depot MPA (Depo-Provera). Endovascular embolization for pelvic vein reflux."},{"ta":"Women's Health","subcategory":"Abnormal Uterine Bleeding","indication":"Primary Ovarian Insufficiency","symptoms":"Amenorrhea <40 years, hot flashes, infertility, low estrogen, elevated FSH","goal":"Replace hormones, preserve bone density, manage symptoms, support fertility goals","soc":"Hormone replacement therapy (HRT): Estradiol 100mcg/day transdermal or equivalent oral estrogen + cyclic progestogen (medroxyprogesterone acetate 5–10mg/day × 12 days/month)."},{"ta":"Women's Health","subcategory":"Breast Disorders","indication":"Breast Masses (Breast Lumps)","symptoms":"Palpable breast lump, firmness, skin changes, nipple discharge, axillary nodes","goal":"Diagnose benign vs. malignant; treat accordingly; reassure if benign","soc":"Malignant breast mass: Surgery (lumpectomy/mastectomy) + systemic therapy based on tumor receptor status. Benign (fibroadenoma): Observation or excision. No pharmacologic SoC for benign masses themselves."},{"ta":"Women's Health","subcategory":"Breast Disorders","indication":"Mastalgia (Breast Pain)","symptoms":"Cyclic or non-cyclic breast pain, tenderness, fullness, sensitivity","goal":"Relieve breast pain, identify any underlying pathology","soc":"Evening primrose oil (gamma-linolenic acid; well-tolerated OTC; limited evidence) or non-pharmacologic (well-fitted bra, lifestyle). Danazol (androgen; attenuates hormonal fluctuations)—most effective pharmacologic agent, but adverse effects limit use."},{"ta":"Women's Health","subcategory":"Breast Disorders","indication":"Nipple Discharge","symptoms":"Unilateral or bilateral nipple discharge, may be clear, milky, bloody, or colored","goal":"Identify cause (galactorrhea vs. ductal pathology), treat accordingly","soc":"Galactorrhea (hyperprolactinemia): Cabergoline 0.5–2mg 2×/week (dopamine agonist; reduces prolactin). Ductal pathology (pathologic discharge): Surgical duct excision (microdochectomy) is definitive."},{"ta":"Women's Health","subcategory":"Endometriosis","indication":"Endometriosis","symptoms":"Painful periods, pelvic pain, dyspareunia, infertility, painful bowel movements","goal":"Eliminate pain, preserve fertility, suppress lesion growth, improve quality of life","soc":"Combined oral contraceptives (COCs; suppress ovulation and estrogen) or progestins (dienogest, norethindrone; suppress endometrial growth). NSAIDs for pain."},{"ta":"Women's Health","subcategory":"Endometriosis","indication":"Vulvar Endometriomas","symptoms":"Painful vulvar nodule or cyst, cyclic pain, swelling with menses","goal":"Excise or treat vulvar endometriotic lesion, prevent recurrence","soc":"Surgical excision is the definitive treatment. Medical suppression (GnRH agonists, progestins) to reduce lesion size and symptoms pre- or post-operatively."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Oral Contraceptives","symptoms":"Not a disease; method for preventing pregnancy with potential side effects (nausea, mood changes, VTE)","goal":"Prevent pregnancy; may also treat acne, dysmenorrhea, PCOS, endometriosis","soc":"Combined oral contraceptives (COCs; estrogen + progestin): ethinyl estradiol 20–35mcg + various progestins (levonorgestrel, norgestimate, desogestrel, drospirenone). Progestin-only pill (POP; norethindrone 0.35mg—'minipill')."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Barrier and Other Pericoital Contraceptives","symptoms":"Not a disease; refers to contraceptive methods requiring pericoital use (condoms, diaphragm, spermicide)","goal":"Prevent unintended pregnancy with coitally-dependent method","soc":"Male condoms (most widely used barrier; also STI-protective). Female condoms, diaphragm with spermicide (nonoxynol-9), cervical cap. Phexxi (lactic acid-citric acid-potassium bitartrate gel; FDA-approved 2020) for on-demand vaginal pH modification."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Intrauterine Device (IUDs; IUD)","symptoms":"Not a disease; long-acting reversible contraceptive with potential side effects (spotting, cramping)","goal":"Provide highly effective long-term reversible contraception","soc":"Levonorgestrel-releasing IUS (Mirena 52mg/5yr; Liletta; Kyleena; Skyla)—most widely used hormonal IUD. Copper IUD (Paragard)—non-hormonal, most effective EC."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Transdermal and Vaginal Ring Hormonal Contraceptives","symptoms":"Not a disease; hormonal delivery via patch or ring; side effects include breakthrough bleeding, skin irritation, ring discomfort","goal":"Prevent pregnancy via non-oral hormonal delivery route","soc":"Transdermal patch: Xulane (norelgestromin 150mcg/day + EE 35mcg/day; weekly × 3/4 weeks). Vaginal ring: NuvaRing (etonogestrel 120mcg/day + EE 15mcg/day; monthly) or Annovera (segesterone + EE; annual; FDA-approved 2018)."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Emergency Contraception","symptoms":"Not a disease; used after unprotected intercourse or contraceptive failure","goal":"Prevent unintended pregnancy within 72–120 hours of unprotected intercourse","soc":"Levonorgestrel 1.5mg (Plan B One-Step; progestin; most effective within 72h). Ulipristal acetate 30mg (ella; selective progesterone receptor modulator; effective up to 120h, superior efficacy especially in obese women; FDA-approved 2010)."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Subdermal Contraceptive Implants","symptoms":"Not a disease; subdermal etonogestrel implant with side effects (irregular bleeding, arm discomfort)","goal":"Provide most effective long-acting reversible contraception (3+ years)","soc":"Etonogestrel implant (Nexplanon; 68mg; subdermal single rod; progestin implant)—99.9% effective × 3 years (possibly up to 5 years, per recent studies). Most effective form of reversible contraception."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Progestin Contraceptive Injections","symptoms":"Not a disease; injectable progestin contraception with side effects (irregular bleeding, weight gain, bone density loss)","goal":"Provide highly effective medium-term contraception with 3-month dosing interval","soc":"Depot medroxyprogesterone acetate (DMPA; Depo-Provera 150mg IM or Depo-SubQ Provera 104 SC) every 12–13 weeks. Efficacy ~94–99%."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Procedural and Medical Abortion","symptoms":"Not a disease; intentional termination of pregnancy up to gestational age limit","goal":"Safe and effective termination of pregnancy","soc":"Medical abortion (≤10–12 weeks): Mifepristone 200mg PO (anti-progestogen; FDA-approved) + misoprostol 800mcg buccal/vaginal 24–48h later (prostaglandin E1; uterotonic). Efficacy >95–98%."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Fertility Awareness‒Based Methods of Contraception","symptoms":"Not a disease; method of tracking fertile window to avoid unprotected intercourse","goal":"Prevent pregnancy without pharmacologic agents by identifying and avoiding fertile days","soc":"None pharmacologic. Fertility awareness methods (FAM): calendar/rhythm, cervical mucus (Billings), basal body temperature (BBT), symptothermal method. Digital apps (Clue, Natural Cycles—FDA-cleared 2018)."},{"ta":"Women's Health","subcategory":"Family Planning","indication":"Permanent Contraception","symptoms":"Not a disease; irreversible sterilization procedure","goal":"Permanent prevention of pregnancy (bilateral tubal ligation or vasectomy)","soc":"None pharmacologic. Surgical: Bilateral tubal ligation (BTL) or salpingectomy (preferred; reduces ovarian cancer risk) for women; vasectomy for men."},{"ta":"Women's Health","subcategory":"Female Reproductive Endocrinology","indication":"Female Reproductive Endocrinology","symptoms":"Not a single disease; encompasses hormonal imbalances affecting menstrual cycle, fertility, and sexual development","goal":"Correct hormonal imbalances, restore normal reproductive endocrine function","soc":"Depends on specific condition: hypothyroidism—levothyroxine; hyperprolactinemia—cabergoline; hypogonadism—estrogen + progestogen HRT; ovulatory dysfunction—see PCOS or ovulatory dysfunction entries."},{"ta":"Women's Health","subcategory":"Female Sexual Function","indication":"Female Orgasmic Disorder","symptoms":"Absent or significantly delayed orgasm despite adequate stimulation, distress","goal":"Improve orgasmic function, enhance sexual satisfaction, reduce distress","soc":"Sex therapy and cognitive behavioral therapy (CBT/directed masturbation) is first-line. No FDA-approved pharmacologic agent specifically for female orgasmic disorder."},{"ta":"Women's Health","subcategory":"Female Sexual Function","indication":"Genito-Pelvic Pain/Penetration Disorder","symptoms":"Persistent pain during intercourse, fear of penetration, vaginal muscle spasm, avoidance","goal":"Eliminate pelvic pain, enable comfortable penetration, reduce fear and avoidance","soc":"Pelvic floor physical therapy (PFPT) as first-line non-pharmacologic. Topical lidocaine 4% gel (local anesthetic) for vulvar vestibulitis-associated pain. Low-dose vaginal diazepam (muscle relaxant) for vaginismus component."},{"ta":"Women's Health","subcategory":"Female Sexual Function","indication":"Sexual Interest/Arousal Disorder","symptoms":"Absent or reduced sexual interest/arousal, lack of desire, no erotic thoughts, distress","goal":"Restore sexual interest and arousal, reduce distress, improve sexual satisfaction","soc":"Flibanserin (Addyi; 5-HT1A agonist/5-HT2A antagonist; FDA-approved 2015) 100mg nightly for premenopausal women with HSDD. Bremelanotide (Vyleesi; MC4R agonist; SC injection; FDA-approved 2019) for premenopausal HSDD."},{"ta":"Women's Health","subcategory":"Female Sexual Function","indication":"Persistent Genital Arousal Disorder","symptoms":"Spontaneous unwanted persistent genital arousal unrelated to sexual desire, unresolved by orgasm","goal":"Reduce spontaneous genital arousal, relieve distress","soc":"No FDA-approved pharmacologic treatment. Topical anesthetics (lidocaine gel) for symptom relief. SSRIs or SNRIs for associated anxiety/depression components. Tramadol (opioid; anecdotal evidence); gabapentin or pregabalin for neuropathic component."},{"ta":"Women's Health","subcategory":"Female Sexual Function","indication":"Pregnancy-Related and Postpartum Sexual Dysfunction","symptoms":"Decreased libido, painful intercourse, vaginal dryness, and reduced arousal postpartum","goal":"Restore sexual function, treat hypoestrogenia, improve libido and comfort","soc":"Topical vaginal estrogen (Vagifem, Premarin cream; low-dose estradiol) for vaginal dryness/atrophy. Vaginal moisturizers (Replens) and lubricants for dyspareunia. Pelvic floor PT for postpartum muscular changes."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Sperm Disorders","symptoms":"Abnormal semen analysis: low sperm count, motility, morphology; male infertility","goal":"Improve sperm parameters, achieve fertilization via natural or assisted means","soc":"Treat reversible causes: Clomiphene (SERM; off-label) or letrozole to increase gonadotropin stimulation of spermatogenesis. Gonadotropin therapy (FSH + hCG) for hypogonadotropic hypogonadism."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Recurrent Pregnancy Loss","symptoms":"2+ consecutive pregnancy losses; anxiety, grief, desire for fertility preservation","goal":"Identify and treat underlying cause, prevent future pregnancy loss","soc":"Progesterone supplementation (vaginal progesterone 200–400mg/day; PRISM trial 2019—modest benefit in select patients). Low-dose aspirin (81mg/day) + LMWH (enoxaparin; 40mg SC/day) for antiphospholipid antibody syndrome (APS)—highly effective for APS-related RPL."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Ovulatory Dysfunction","symptoms":"Irregular or absent ovulation, irregular periods, infertility, elevated androgens","goal":"Induce ovulation, achieve pregnancy, correct hormonal imbalance","soc":"Letrozole (Femara; aromatase inhibitor; 2.5–7.5mg/day cycle days 3–7) is first-line for ovulation induction in PCOS (PCOSMIC trial; superior to clomiphene). Clomiphene citrate (Clomid; SERM) as alternative."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Tubal Dysfunction and Pelvic Abnormalities","symptoms":"Tubal obstruction, hydrosalpinx, pelvic adhesions; infertility, pelvic pain","goal":"Restore tubal patency or bypass obstruction; achieve pregnancy","soc":"Surgery (laparoscopic salpingostomy or salpingectomy for hydrosalpinx + IVF) is first-line. Antibiotic treatment for active PID to prevent tubal damage (see PID entry)."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Unexplained Infertility","symptoms":"Inability to conceive despite normal workup; no identifiable structural or hormonal cause","goal":"Achieve pregnancy via empiric stimulation or IVF without specific correction","soc":"Empiric superovulation with IUI: Letrozole or clomiphene + timed IUI × 3–6 cycles. IVF for persistent unexplained infertility."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Diminished Ovarian Reserve","symptoms":"Low AFC, elevated FSH, low AMH, poor ovarian response to stimulation","goal":"Maximize egg retrieval with COS, preserve fertility options","soc":"High-dose gonadotropin stimulation (Gonal-f or Follistim 300–450IU/day SC)—maximal stimulation. GnRH antagonist protocol. No pharmacologic intervention restores ovarian reserve."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Assisted Reproductive Technologies","symptoms":"Not a disease; describes IVF, ICSI, embryo transfer techniques for infertile couples","goal":"Achieve successful pregnancy through assisted conception techniques","soc":"Controlled ovarian stimulation (COS): Gonadotropins (FSH [Gonal-f, Follistim]; LH; or combined hMG) + GnRH antagonist (ganirelix, cetrorelix) to prevent premature LH surge. Trigger: hCG (Pregnyl/Ovidrel) or leuprolide (GnRH agonist trigger). Luteal support: Progesterone (Endometrin, Crinone, Prometrium IM)."},{"ta":"Women's Health","subcategory":"Infertility","indication":"Abnormal Cervical Mucus","symptoms":"Cervical mucus hostile to sperm; infertility, failed sperm penetration testing","goal":"Improve cervical mucus quality or bypass cervix to enable fertilization","soc":"Intrauterine insemination (IUI; bypasses cervical mucus) is most effective. Low-dose estrogen (ethinyl estradiol 0.02–0.05mg/day) during follicular phase to improve mucus quality."},{"ta":"Women's Health","subcategory":"Menopause","indication":"Menopause","symptoms":"Hot flashes, night sweats, vaginal dryness, mood changes, sleep disturbances, bone loss","goal":"Relieve vasomotor symptoms, prevent osteoporosis, improve quality of life","soc":"Hormone replacement therapy (HRT): Systemic estrogen ± progestogen (conjugated equine estrogens/CEE, estradiol) for moderate-to-severe vasomotor symptoms. Low-dose vaginal estrogen for genitourinary syndrome of menopause (GSM)."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Uterine Adenomyosis","symptoms":"Heavy painful periods, enlarged uterus, pelvic pressure, dyspareunia","goal":"Relieve pain, reduce bleeding, preserve or sacrifice uterus based on fertility desire","soc":"LNG-IUS (Mirena; levonorgestrel 52mg; intrauterine device)—most effective non-surgical option, reduces uterine bleeding and pain. NSAIDs for pain. COCs for younger patients."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Benign Adnexal Masses","symptoms":"Pelvic fullness or pain, incidental ovarian cyst, bloating, irregular periods","goal":"Distinguish benign from malignant, manage symptoms, prevent complications","soc":"Observation (watchful waiting) with serial ultrasound for most simple cysts <5–7cm. Oral contraceptives for functional cysts (suppress ovulation, prevent new cysts). Surgical resection for complex, symptomatic, or large cysts."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Cervical Polyps","symptoms":"Postcoital bleeding, intermenstrual spotting, mucus discharge; often asymptomatic","goal":"Remove symptomatic polyp, confirm benign pathology, prevent recurrence","soc":"Office polypectomy (avulsion/twisting off) is definitive for most. No pharmacologic SoC for polyp itself."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Bartholin Gland Cyst and Bartholin Gland Abscess","symptoms":"Painless (cyst) or painful vulvar swelling at 4 or 8 o'clock position, pain with walking/intercourse","goal":"Drain abscess, relieve symptoms, prevent recurrence","soc":"Abscess: Incision and drainage (I&D) or Word catheter placement (most effective). Antibiotics (amoxicillin-clavulanate or doxycycline if STI suspected) as adjunct for cellulitis."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Cervical Stenosis","symptoms":"Amenorrhea or hematometra (blood pooling), painful periods, difficulty with procedures, infertility","goal":"Dilate cervix to restore drainage and menstruation; treat underlying cause","soc":"Cervical dilation (Hegar or Pratt dilators) under local anesthesia or sedation. Misoprostol 400mcg vaginally 12–24h before dilation (cervical ripening agent) to soften cervix."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Vulvar Inclusion and Epidermal Cysts","symptoms":"Painless vulvar lump, local pressure or discomfort, occasional discharge if infected","goal":"Excise symptomatic cyst; treat infection if present","soc":"Surgical excision for symptomatic cysts. Antibiotics (amoxicillin-clavulanate) if infected. No pharmacologic SoC."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Adnexal Torsion","symptoms":"Sudden severe unilateral pelvic pain, nausea, vomiting, adnexal mass","goal":"Urgent surgical detorsion to preserve ovarian function; prevent ischemic necrosis","soc":"Emergency laparoscopic detorsion is the definitive management. No pharmacologic first-line SoC. IV opioid analgesics (morphine, hydromorphone) for pain control pre-operatively."},{"ta":"Women's Health","subcategory":"Miscellaneous Gynecologic Disorders","indication":"Skene Gland Cyst","symptoms":"Periurethral swelling, dysuria, pain with intercourse, urinary difficulty","goal":"Drain or excise cyst to relieve symptoms","soc":"Surgical excision or marsupialization is definitive. No pharmacologic SoC."},{"ta":"Women's Health","subcategory":"POP","indication":"Anterior and Posterior Vaginal Wall Prolapse","symptoms":"Vaginal bulge, pelvic pressure, urinary leakage or retention, constipation, dyspareunia","goal":"Restore pelvic organ support, relieve prolapse symptoms, improve quality of life","soc":"Pelvic floor physical therapy (PFPT). Pessary (vaginal support device; first-line nonsurgical). Topical vaginal estrogen for tissue quality in postmenopausal women."},{"ta":"Women's Health","subcategory":"POP","indication":"Uterine and Apical Prolapse","symptoms":"Uterine descent into or through vagina, pelvic heaviness, urinary symptoms, difficulty defecating","goal":"Restore uterine/apical support, relieve symptoms, maintain sexual and bladder function","soc":"Vaginal pessary (ring, Gellhorn) + topical vaginal estrogen for tissue conditioning. Surgical repair (sacrospinous fixation, sacrohysteropexy, hysterectomy + vault suspension) for definitive treatment."},{"ta":"Women's Health","subcategory":"Uterine Fibroids","indication":"Uterine Fibroids","symptoms":"Heavy menstrual bleeding, pelvic pressure, frequent urination, dyspareunia, infertility","goal":"Control heavy bleeding, reduce fibroid bulk, preserve uterus/fertility when possible","soc":"Oral GnRH antagonist + hormonal add-back therapy: relugolix/estradiol/norethindrone acetate (Myfembree; FDA-approved May 2021) or elagolix/estradiol/norethindrone (Oriahnn; FDA-approved 2020)—first FDA-approved oral medical treatments for uterine fibroid HMB."},{"ta":"Women's Health","subcategory":"Uterine Fibroids","indication":"Cervical Leiomyomas","symptoms":"Pelvic pressure, dyspareunia, heavy bleeding, obstructed labor, urinary symptoms","goal":"Relieve obstruction, control bleeding, remove if symptomatic or obstructing labor","soc":"GnRH agonists (leuprolide acetate [Lupron Depot; 3.75mg IM monthly] + add-back HRT) to shrink fibroid before surgery. Surgical myomectomy or hysterectomy for definitive treatment."},{"ta":"Women's Health","subcategory":"Uterine Fibroids","indication":"Fibroids in Pregnancy","symptoms":"Pelvic pain, preterm contractions, placental abruption risk, obstructed labor, increased cesarean rate","goal":"Manage fibroid-related complications in pregnancy, maintain fetal well-being","soc":"Analgesics (acetaminophen; NSAIDs avoided in pregnancy ≥20 weeks) for pain from fibroid degeneration. Tocolytics (nifedipine) for preterm labor associated with fibroids."},{"ta":"Women's Health","subcategory":"Vaginitis/Cervicitis/PID","indication":"Inflammatory Vaginitis","symptoms":"Purulent vaginal discharge, burning, dyspareunia, erythema, loss of lactobacilli","goal":"Reduce inflammation, restore normal vaginal flora, relieve symptoms","soc":"Desquamative inflammatory vaginitis (DIV): Intravaginal clindamycin 2% cream (antibiotic + anti-inflammatory) QHS × 4–6 weeks—most widely used. Intravaginal hydrocortisone 25mg suppositories for inflammatory component."},{"ta":"Women's Health","subcategory":"Vaginitis/Cervicitis/PID","indication":"Candidal Vaginitis","symptoms":"Thick white 'cottage cheese' discharge, intense vaginal itching, burning, erythema","goal":"Eradicate Candida, relieve symptoms, prevent recurrence","soc":"Azole antifungals: intravaginal miconazole (Monistat; OTC) or clotrimazole 1–7 day courses. Oral fluconazole (Diflucan 150mg single dose; azole antifungal) for uncomplicated VVC."},{"ta":"Women's Health","subcategory":"Vaginitis/Cervicitis/PID","indication":"Bacterial Vaginosis (BV)","symptoms":"Thin gray-white vaginal discharge, fishy odor (especially post-coitus), mild itching, pH >4.5","goal":"Eradicate BV, relieve symptoms, prevent recurrence and complications (PID, PTB)","soc":"Metronidazole (Flagyl; nitroimidazole antibiotic) 500mg PO BID × 7 days OR metronidazole 0.75% vaginal gel 5g daily × 5 days. Clindamycin (lincosamide antibiotic) 2% vaginal cream 5g QHS × 7 days as alternative."},{"ta":"Women's Health","subcategory":"Vaginitis/Cervicitis/PID","indication":"Cervicitis","symptoms":"Mucopurulent cervical discharge, cervical friability/erythema, dyspareunia, dysuria","goal":"Eradicate STI pathogens, prevent ascending infection (PID), treat partners","soc":"Presumptive treatment per CDC 2021 STI guidelines: Ceftriaxone 500mg IM (gonorrhea coverage) + doxycycline 100mg PO BID × 7 days (chlamydia coverage)—covers both most common bacterial causes simultaneously."},{"ta":"Women's Health","subcategory":"Vaginitis/Cervicitis/PID","indication":"Pelvic Inflammatory Disease (PID)","symptoms":"Lower abdominal pain, cervical motion tenderness, adnexal tenderness, fever, vaginal discharge","goal":"Eradicate polymicrobial infection, prevent tubo-ovarian abscess, preserve fertility","soc":"Outpatient (mild-moderate): Ceftriaxone 500mg IM × 1 + doxycycline 100mg BID × 14 days + metronidazole 500mg BID × 14 days (CDC 2021 guidelines). Inpatient (severe/TOA): IV cefoxitin 2g q6h + doxycycline 100mg q12h OR IV clindamycin 900mg q8h + gentamicin."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Risk Factors for Pregnancy Complications","symptoms":"Not a disease; risk factors include prior preterm birth, hypertension, diabetes, multiple gestation","goal":"Mitigate identified risks, optimize maternal and fetal outcomes","soc":"Low-dose aspirin (81mg/day; antiplatelet) for preeclampsia prevention in high-risk patients. Folic acid 0.4–5mg/day for NTD prevention. LMWH for thrombophilia-associated risk."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Preeclampsia and Eclampsia","symptoms":"Hypertension ≥140/90, proteinuria, headache, visual changes, swelling after 20 weeks","goal":"Prevent maternal seizures, deliver safely, prevent maternal/fetal complications","soc":"Antihypertensives (labetalol IV, nifedipine oral, hydralazine IV) for severe hypertension (≥160/110). Magnesium sulfate IV (anticonvulsant; seizure prophylaxis for preeclampsia/eclampsia). Low-dose aspirin 81–162mg from 12–28 weeks for primary prevention in high-risk women."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Preterm Labor","symptoms":"Regular contractions <37 weeks with cervical change, lower abdominal tightening","goal":"Delay delivery to allow corticosteroids and fetal maturity; prevent preterm birth","soc":"Tocolysis with nifedipine (Procardia; CCB; first-line oral tocolytic per ACOG) or indomethacin (COX inhibitor; <32 weeks). Betamethasone 12mg IM × 2 doses (corticosteroid for fetal lung maturity)."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Hyperemesis Gravidarum","symptoms":"Severe nausea and vomiting in pregnancy, weight loss >5%, dehydration, electrolyte abnormalities","goal":"Control vomiting, restore hydration, maintain nutrition, prevent complications","soc":"Doxylamine-pyridoxine (Bonjesta/Diclegis; delayed-release; FDA-approved 2013/2016) as first-line pharmacologic. IV ondansetron (5-HT3 antagonist) + IV fluid resuscitation for hospitalized cases."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Maternal Mortality and Perinatal Mortality","symptoms":"Not a disease; represents outcomes. Risk factors: hemorrhage, preeclampsia, sepsis, thromboembolism.","goal":"Prevent maternal deaths; reduce perinatal mortality through optimized antenatal care","soc":"Aspirin 81–162mg/day (antiplatelet; preeclampsia prevention in high-risk women); magnesium sulfate IV for seizure prophylaxis in preeclampsia; oxytocin (uterotonic) for hemorrhage prevention at delivery."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Prelabor Rupture of Membranes (PROM)","symptoms":"Sudden gush or leaking of amniotic fluid, confirmation with pooling/Fern/PAMG-1 test","goal":"Prevent chorioamnionitis, achieve fetal maturity, time delivery appropriately","soc":"Antibiotics (ampicillin IV + erythromycin PO, then amoxicillin × 7 days; latency antibiotics per ACOG) to prolong latency and prevent infection. Corticosteroids (betamethasone) for fetal lung maturity at <34 weeks."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Hemolytic Disease of the Fetus and Neonate","symptoms":"Fetal anemia, hydrops fetalis, neonatal jaundice, hemolytic anemia in neonate","goal":"Prevent maternal sensitization, treat fetal anemia, prevent kernicterus","soc":"Prevention: Rh(D) immune globulin (RhoGAM; 300mcg IM at 28 weeks + within 72h of delivery) for Rh-negative women carrying Rh-positive fetus—prevents maternal sensitization."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Oligohydramnios","symptoms":"Reduced amniotic fluid, decreased fetal movement, small fundal height, fetal distress","goal":"Restore amniotic fluid, improve fetal outcomes, prevent cord compression","soc":"Maternal hydration (IV or oral hypotonic fluid) as temporizing measure. Amnioinfusion (transcervical infusion of saline) for intrapartum cord decompression. Delivery if at term."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Placental Abruption (Abruptio Placentae)","symptoms":"Painful vaginal bleeding, uterine rigidity, fetal distress, abdominal pain","goal":"Stabilize mother, assess fetal status, expedite delivery if severe","soc":"IV fluid resuscitation + blood transfusion for hemorrhage. Magnesium sulfate for neuroprotection if preterm (<32 weeks). Corticosteroids (betamethasone) for fetal lung maturity if <34 weeks. Emergent delivery (cesarean) for severe cases."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Cervical Insufficiency","symptoms":"Painless cervical dilation/effacement in second trimester, recurrent pregnancy loss","goal":"Prevent preterm birth, maintain pregnancy to viable gestational age","soc":"Cervical cerclage (surgical; stitch to reinforce cervix). Vaginal progesterone (progesterone 200mg vaginal suppositories daily or 8% gel) for short cervix (<25mm) on ultrasound."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Polyhydramnios","symptoms":"Excessive amniotic fluid, large-for-dates fundal height, discomfort, dyspnea","goal":"Reduce fluid to relieve symptoms, identify fetal anomaly, prevent preterm labor","soc":"Indomethacin (NSAID; reduces fetal urine output by 30–50% via cyclooxygenase inhibition) 25mg q6–8h for severe symptomatic polyhydramnios, especially <32 weeks."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Placenta Previa","symptoms":"Painless bright red vaginal bleeding in third trimester, soft non-tender uterus","goal":"Prevent hemorrhage, achieve fetal lung maturity before delivery, plan cesarean","soc":"Hospitalization, pelvic rest, and antenatal corticosteroids (betamethasone 12mg IM × 2 doses for lung maturity if <34 weeks) for preterm. Planned cesarean delivery at 36–37 weeks. Tocolytics for concurrent preterm labor."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Stillbirth","symptoms":"Fetal death ≥20 weeks gestation; absent fetal movement, loss of fetal heart tones","goal":"Identify cause, safely manage delivery, prevent recurrence in future pregnancies","soc":"Labor induction with misoprostol (prostaglandin E1 analog; cervical ripening + uterotonic) or mifepristone + misoprostol combination for cervical preparation and delivery induction."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Polymorphic Eruption of Pregnancy","symptoms":"Intensely itchy urticarial papules and plaques in striae, last trimester, primigravida","goal":"Relieve pruritus, control rash, reassure (resolves post-partum)","soc":"Topical corticosteroids (clobetasol 0.05% or triamcinolone; potent anti-inflammatory) + oral antihistamines (chlorpheniramine, loratadine) for severe itch."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Vasa Previa","symptoms":"Painless vaginal bleeding at membrane rupture; fetal heart rate decelerations, fetal distress","goal":"Diagnose prenatally, allow planned cesarean before rupture, prevent fetal death","soc":"Hospitalization at 30–32 weeks + planned cesarean at 34–35 weeks (ACOG). Antenatal corticosteroids (betamethasone) for fetal lung maturity at <34 weeks."},{"ta":"Women's Health","subcategory":"Antenatal Complications","indication":"Pemphigoid Gestationis","symptoms":"Intensely pruritic blistering urticarial rash in pregnancy, periumbilical onset","goal":"Control pruritus and blister formation, prevent maternal-fetal complications","soc":"Systemic corticosteroids: prednisolone 0.5mg/kg/day (initially 40–60mg/day) tapering slowly. Topical potent corticosteroids for mild cases."},{"ta":"Women's Health","subcategory":"Drug Safety in Pregnancy","indication":"Social and Illicit Drugs During Pregnancy","symptoms":"Fetal growth restriction, preterm birth, NAS, teratogenicity from substance exposure","goal":"Achieve sobriety, protect fetal development, prevent neonatal abstinence syndrome","soc":"Opioid use disorder in pregnancy: Methadone (opioid agonist; OBOT/OTP) or buprenorphine (partial mu-opioid agonist; Subutex—preferred in pregnancy; FDA-approved) as medication-assisted treatment (MAT)."},{"ta":"Women's Health","subcategory":"Drug Safety in Pregnancy","indication":"Drug Safety in Pregnancy","symptoms":"Not a disease; represents risk of fetal teratogenicity, toxicity from maternal drug use","goal":"Use safest effective medications; balance maternal disease control with fetal safety","soc":"No pharmacologic SoC; refers to prescribing principles. FDA Pregnancy and Lactation Labeling Rule (PLLR) guides risk-benefit discussion for each drug."},{"ta":"Women's Health","subcategory":"Early Pregnancy Disorders","indication":"Spontaneous Abortion","symptoms":"Vaginal bleeding, cramping, passage of tissue before 20 weeks, hCG decline","goal":"Complete uterine evacuation, prevent infection, support emotionally","soc":"Expectant management for incomplete/inevitable abortion. Misoprostol (prostaglandin E1 analog; 800mcg vaginally) for medical management of missed or incomplete abortion—highly effective."},{"ta":"Women's Health","subcategory":"Early Pregnancy Disorders","indication":"Ectopic Pregnancy","symptoms":"Lower abdominal pain, vaginal bleeding, missed period, shoulder tip pain if ruptured","goal":"Eliminate ectopic pregnancy, preserve fertility, prevent rupture and death","soc":"Methotrexate (MTX; folate antagonist/anti-metabolite; IM single dose 50mg/m²) for unruptured ectopic pregnancy with hCG <5,000 mIU/mL and no cardiac activity. Surgical salpingostomy or salpingectomy for ruptured or unsuitable cases."},{"ta":"Women's Health","subcategory":"Early Pregnancy Disorders","indication":"Septic Abortion","symptoms":"Fever, uterine tenderness, purulent discharge after abortion, sepsis signs","goal":"Eradicate uterine infection, prevent septic shock, remove infected tissue","soc":"Broad-spectrum IV antibiotics: gentamicin + clindamycin + ampicillin (triple regimen). Immediate uterine evacuation (suction curettage) under antibiotic cover."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Postpartum Hemorrhage","symptoms":"Blood loss >500mL (vaginal) or >1,000mL (cesarean) within 24h of delivery; hypotension, tachycardia","goal":"Achieve hemostasis, restore circulating volume, prevent maternal death","soc":"Uterotonic agents: Oxytocin (Pitocin; 10–40 units IV/IM) first-line; carboprost (Hemabate; 15-methyl-PGF2α), misoprostol 600–1000mcg, methylergonovine (Methergine). Tranexamic acid (TXA; 1g IV within 3h of birth; WHO-recommended 2017)."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Intraamniotic Infection","symptoms":"Maternal fever during labor, uterine tenderness, maternal/fetal tachycardia, foul-smelling amniotic fluid","goal":"Eradicate infection, expedite delivery, prevent neonatal sepsis","soc":"IV ampicillin 2g q6h + IV gentamicin 1.5mg/kg q8h (classic Gibbs regimen) during labor, followed by delivery. Clindamycin 900mg IV q8h added for cesarean delivery to cover anaerobes."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Fetal Presentation, Position, and Lie (Including Breech Presentation)","symptoms":"Breech or transverse fetal lie at term; increases cesarean risk","goal":"Achieve cephalic presentation for vaginal delivery; external version or plan cesarean","soc":"External cephalic version (ECV) at ≥36–37 weeks + tocolysis: terbutaline 0.25mg SC (beta-2 agonist; relaxes uterine muscle) or nifedipine (CCB) to facilitate fetal rotation."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Placenta Accreta","symptoms":"Placenta fails to separate at delivery; massive postpartum hemorrhage, uterine inversion risk","goal":"Prevent life-threatening hemorrhage; planned surgical management","soc":"Planned cesarean hysterectomy (with placenta in situ) in a tertiary center is the definitive management. Pre-operative: uterine artery embolization or balloon catheters for hemorrhage control. Uterotonic agents (oxytocin, carboprost) during surgery."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Shoulder Dystocia","symptoms":"Fetal shoulders impacted after head delivery; failure of normal delivery maneuvers","goal":"Deliver fetus safely, prevent birth asphyxia and brachial plexus injury","soc":"Obstetric maneuvers (McRoberts, suprapubic pressure) are primary management. No pharmacologic first-line SoC."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Uterine Rupture","symptoms":"Sudden severe abdominal pain, fetal heart decelerations, loss of uterine contour, maternal shock","goal":"Emergency delivery, repair uterine defect, prevent maternal and fetal death","soc":"Emergency cesarean + uterine repair or hysterectomy. Pre-operatively: IV fluids, vasopressors (norepinephrine), blood transfusion. No pharmacologic agent prevents rupture once diagnosed."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Umbilical Cord Prolapse","symptoms":"Cord visible or palpable through cervix after membrane rupture; fetal heart rate decelerations","goal":"Relieve cord compression urgently, deliver fetus within minutes","soc":"Immediate digital elevation of fetal presenting part off cord. Emergent cesarean delivery. Tocolysis with terbutaline 0.25mg SC (beta-2 agonist; relaxes uterine contractions) to reduce cord compression during preparation for surgery."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Uterine Inversion","symptoms":"Uterus prolapses through cervix at/after delivery; severe pain, hemorrhage, shock","goal":"Manually replace uterus, prevent hemorrhagic shock, prevent recurrence","soc":"IV tocolysis (terbutaline 0.25mg SC or nitroglycerin 50–100mcg IV) to relax uterine muscle for manual replacement. Oxytocin 20–40U IV after replacement to maintain uterine tone."},{"ta":"Women's Health","subcategory":"Intrapartum Complications","indication":"Amniotic Fluid Embolism","symptoms":"Sudden cardiovascular collapse, respiratory failure, DIC during labor or immediately postpartum","goal":"Restore hemodynamics, prevent maternal death, treat coagulopathy","soc":"Immediate resuscitation: IV fluids + vasopressors (norepinephrine; phenylephrine); mechanical ventilation. FFP, cryoprecipitate, platelets for DIC. Cardiopulmonary resuscitation if cardiac arrest."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Analgesia and Anesthesia for Labor and Delivery","symptoms":"Labor pain; inadequate analgesia affects maternal experience and outcomes","goal":"Provide safe and effective pain relief during labor without fetal compromise","soc":"Neuraxial analgesia (epidural; bupivacaine + fentanyl infusion) is the gold standard for labor pain. Spinal anesthesia (bupivacaine + opioid) for cesarean delivery."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Management of Spontaneous Vaginal Delivery","symptoms":"Not a disease; management of spontaneous vaginal birth and immediate postpartum","goal":"Facilitate safe delivery, prevent PPH, manage third stage, ensure neonatal wellbeing","soc":"Active management of third stage of labor (AMTSL): oxytocin 10U IM immediately after delivery of anterior shoulder (uterotonic; reduces PPH by ~60%). Controlled cord traction. Uterine massage."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Cesarean Delivery","symptoms":"Not a disease; surgical delivery by uterine incision; associated with post-op pain, infection risk","goal":"Safe delivery with optimal maternal and neonatal outcomes; minimize complications","soc":"Spinal anesthesia with hyperbaric bupivacaine + intrathecal morphine. Pre-operative antibiotics (cefazolin 2g IV; prophylaxis). Post-op: multimodal analgesia (IT morphine + NSAIDs + acetaminophen + TAP block)."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Management of Normal Labor","symptoms":"Not a disease; refers to supportive management of physiologic labor progression","goal":"Support physiologic labor, provide safe pain management, prevent complications","soc":"Neuraxial analgesia (epidural) for pain; oxytocin augmentation when labor dystocia identified (active management of labor). IV fluid (LR) maintenance."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Induction of Labor","symptoms":"Contractions initiated artificially; indications include post-dates, PROM, preeclampsia, IUGR","goal":"Safely achieve vaginal delivery by initiating effective uterine contractions","soc":"Cervical ripening: Misoprostol 25mcg intravaginally q3–6h (prostaglandin E1; most effective for ripening + induction) or dinoprostone 0.5mg intracervical (Prepidil; PGE2) or dinoprostone vaginal insert (Cervidil 10mg). Labor induction: Oxytocin IV 1–6 mIU/min titrated."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Protracted or Arrested Labor","symptoms":"Slow cervical dilation, failure to progress in active labor, prolonged pushing phase","goal":"Accelerate labor progression, prevent maternal exhaustion, avoid unnecessary cesarean","soc":"Oxytocin augmentation (IV Pitocin 2–6 mIU/min, titrating up to 40 mIU/min per protocol) is the primary pharmacologic intervention. Adequate epidural analgesia to reduce maternal distress."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Fetal Monitoring During Labor and Delivery","symptoms":"Not a disease; addresses fetal heart rate interpretation for detecting intrapartum distress","goal":"Detect fetal distress early, intervene to prevent hypoxia and birth injury","soc":"Continuous electronic fetal monitoring (EFM) is standard. Intrauterine resuscitation with IV fluid bolus + lateral decubitus positioning + oxygen. Terbutaline 0.25mg SC for Category III FHR patterns (uterine tachysystole from oxytocin)."},{"ta":"Women's Health","subcategory":"Labor and Delivery","indication":"Operative Vaginal Delivery","symptoms":"Prolonged second stage or fetal distress requiring forceps or vacuum-assisted delivery","goal":"Expedite delivery safely, prevent fetal asphyxia, avoid unnecessary cesarean","soc":"Adequate neuraxial analgesia/anesthesia (epidural or pudendal block with lidocaine). No specific pharmacologic first-line—intervention is primarily mechanical (forceps or vacuum extractor)."},{"ta":"Women's Health","subcategory":"Postpartum Care","indication":"Postpartum Care","symptoms":"Not a disease; encompasses physical and psychological recovery after delivery","goal":"Ensure maternal recovery, support breastfeeding, screen for postpartum complications","soc":"NSAIDs (ibuprofen) for perineal/uterine pain. Oxytocin or methylergonovine for uterine involution. Iron supplementation for postpartum anemia. Contraception counseling at 6 weeks."},{"ta":"Women's Health","subcategory":"Postpartum Care","indication":"Mastitis","symptoms":"Breast pain, warmth, redness, fever during breastfeeding; flu-like symptoms","goal":"Eradicate infection, preserve breastfeeding, prevent abscess formation","soc":"Dicloxacillin 500mg QID × 10–14 days (anti-staphylococcal penicillin; covers MSSA); or cephalexin 500mg QID. Continue breastfeeding. Warm compresses + massage."},{"ta":"Women's Health","subcategory":"Postpartum Care","indication":"Postpartum Depression","symptoms":"Depressed mood, anxiety, anhedonia, fatigue, difficulty bonding with infant after delivery","goal":"Achieve remission, restore maternal functioning, support infant bonding","soc":"SSRIs (sertraline [Zoloft] 50–200mg; paroxetine; escitalopram)—first-line pharmacologic for PPD. Therapy (CBT, IPT) for mild-moderate. Brexanolone (Zulresso; IV neurosteroid/GABA-A modulator; FDA-approved 2019) for severe/rapid-response need."},{"ta":"Women's Health","subcategory":"Postpartum Care","indication":"Postpartum Endometritis","symptoms":"Fever, uterine tenderness, purulent lochia, malaise within days of delivery","goal":"Eradicate polymicrobial uterine infection, prevent sepsis and complications","soc":"IV clindamycin 900mg q8h + gentamicin 5mg/kg/day (Gibbs regimen; gold standard) until afebrile × 48h. Then no oral antibiotics needed for most patients."},{"ta":"Women's Health","subcategory":"Postpartum Care","indication":"Postpartum Pyelonephritis","symptoms":"Flank pain, fever, costovertebral angle tenderness, dysuria in postpartum period","goal":"Eradicate upper urinary tract infection, prevent urosepsis","soc":"IV ceftriaxone 1–2g/day (third-generation cephalosporin) or IV ampicillin + gentamicin for culture-directed therapy. Oral step-down after 24–48h afebrile."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Asthma in Pregnancy","symptoms":"Wheezing, dyspnea, chest tightness, cough; poorly controlled asthma worsens with pregnancy","goal":"Maintain lung function, prevent hypoxia, control asthma to optimize fetal outcomes","soc":"Inhaled short-acting beta-2 agonist (SABA: albuterol MDI; safe in pregnancy) for rescue. Inhaled corticosteroid (ICS: budesonide [Pulmicort]; FDA Pregnancy Category B; preferred ICS in pregnancy) for persistent asthma."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Autoimmune Disorders in Pregnancy","symptoms":"Flare of underlying autoimmune disease during pregnancy; fetal complications vary by condition","goal":"Control autoimmune disease safely without teratogenic agents; prevent maternal and fetal complications","soc":"Depends on specific condition. SLE: Hydroxychloroquine (Plaquenil; antimalarial; safe in pregnancy—reduces SLE flares) continued throughout. RA: TNF inhibitors (certolizumab pegol [Cimzia]—no Fc region, minimal placental transfer; preferred in pregnancy) or hydroxychloroquine."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Hypertension in Pregnancy","symptoms":"Elevated BP ≥140/90 in pregnancy; may be chronic HTN, gestational HTN, or preeclampsia","goal":"Prevent stroke/organ damage, maintain fetal perfusion, prevent preeclampsia progression","soc":"Oral antihypertensives: Labetalol (alpha-beta blocker) 100–400mg TID, or nifedipine ER 30–90mg/day (CCB), or methyldopa 250mg TID (central alpha-2 agonist). For severe BP ≥160/110: IV labetalol, oral nifedipine IR, or IV hydralazine."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Heart Disease in Pregnancy","symptoms":"Dyspnea, palpitations, chest pain, reduced exercise tolerance, edema in pregnancy","goal":"Optimize cardiac function, prevent decompensation, ensure safe delivery","soc":"Depends on cardiac condition. Peripartum cardiomyopathy (PPCM): Bromocriptine (dopamine agonist; reduces prolactin-mediated cardiotoxicity; European guidelines 2022) + standard heart failure therapy (loop diuretics; beta-blockers; ACE after delivery). Congenital/valvular heart disease: disease-specific management."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Diabetes Mellitus in Pregnancy","symptoms":"Elevated blood glucose in pregnancy (GDM) or pre-existing DM; macrosomia, polyhydramnios, fetal complications","goal":"Maintain euglycemia, prevent macrosomia, reduce perinatal complications","soc":"Gestational diabetes: Medical nutrition therapy (MNT) + insulin (NPH + regular or detemir + insulin aspart; most evidence for safety). Metformin oral as alternative first-line per some guidelines."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Renal Insufficiency in Pregnancy","symptoms":"Elevated creatinine, proteinuria, edema, hypertension; increased preterm birth and fetal growth restriction","goal":"Preserve renal function, control BP, prevent preterm birth, optimize fetal outcomes","soc":"BP control: Labetalol, nifedipine ER, or methyldopa (same as pregnancy HTN). Avoid ACEi/ARBs (nephroprotective but teratogenic). Folic acid supplementation. LMWH for heavy proteinuria/nephrotic syndrome."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"COVID-19 During Pregnancy","symptoms":"Fever, cough, dyspnea, hypoxia with higher severity risk; preterm birth, fetal distress in severe cases","goal":"Treat maternal COVID-19 safely, prevent preterm birth and fetal hypoxia","soc":"Mild-moderate: No antiviral treatment needed + monitoring. Moderate-severe (hospitalized, hypoxic): Remdesivir (IV antiviral; Veklury; generally used if O2 required) + dexamethasone 6mg/day × 10 days for hypoxic hospitalized COVID-19."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Hepatic Disorders in Pregnancy","symptoms":"Pruritus, jaundice, elevated liver enzymes, nausea; varies by specific hepatic disorder","goal":"Manage liver dysfunction safely, prevent preterm delivery and fetal demise","soc":"Intrahepatic cholestasis of pregnancy (ICP): Ursodeoxycholic acid (UDCA; Actigall; bile acid; FDA Category B) 10–15mg/kg/day—reduces pruritus + improves fetal outcomes. AFLP (acute fatty liver of pregnancy): Delivery is definitive."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Thyroid Disorders in Pregnancy","symptoms":"Hypothyroidism: fatigue, constipation, weight gain; Hyperthyroidism: palpitations, weight loss, anxiety","goal":"Maintain euthyroid status; prevent adverse fetal effects from thyroid dysfunction","soc":"Hypothyroidism: Levothyroxine (L-T4; thyroid hormone replacement)—dose increased by ~25–50% in pregnancy; titrate to TSH 0.1–2.5 mIU/L. Hyperthyroidism/Graves': Propylthiouracil (PTU; thionamide; preferred in 1st trimester) then methimazole (2nd/3rd trimesters)."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Disorders Requiring Surgery During Pregnancy","symptoms":"Acute appendicitis, cholecystitis, ovarian torsion, etc. occurring during pregnancy","goal":"Safely perform surgery to treat acute condition without adverse fetal effects","soc":"Antibiotic prophylaxis (cefazolin 2g IV; safe in pregnancy). Regional or general anesthesia (propofol, sevoflurane—safe; N₂O avoided >2nd trimester). Fetal monitoring pre/post-operatively. Laparoscopy preferred over open when feasible (SAGES/ACOG)."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Cancer in Pregnancy","symptoms":"Depends on cancer type; pregnancy may delay diagnosis; treatment requires safety modifications","goal":"Treat malignancy safely to optimize maternal survival while minimizing fetal harm","soc":"Cervical cancer (most common GYN cancer in pregnancy): Surgery (radical hysterectomy or trachelectomy) in first trimester. Breast cancer: Surgery + chemotherapy (AC regimen after 1st trimester; doxorubicin + cyclophosphamide safe after 14 weeks). Avoid radiation/targeted therapies (trastuzumab) until postpartum."},{"ta":"Women's Health","subcategory":"Pregnancy Complicated by Disease","indication":"Seizure Disorders in Pregnancy","symptoms":"Seizures, altered consciousness, anticonvulsant teratogenicity risk during pregnancy","goal":"Maintain seizure control, minimize fetal exposure to teratogenic anticonvulsants","soc":"Lamotrigine (Lamictal; sodium channel blocker; safest AED in pregnancy—lowest teratogenicity) + folic acid 5mg/day supplementation. Or levetiracetam (Keppra; SV2A binding; also low teratogenic risk)."},{"ta":"Women's Health","subcategory":"Prenatal Genetic Counseling","indication":"Noninvasive Prenatal Fetal Screening Tests","symptoms":"Not a disease; cell-free DNA (cfDNA) screening for chromosomal abnormalities","goal":"Identify pregnancies at high risk for chromosomal conditions; guide invasive testing decisions","soc":"Cell-free DNA (cfDNA/NIPT): Analyzes fetal DNA fragments in maternal blood (Panorama, MaterniT21, Harmony)—99% sensitivity for T21, T18, T13. Combined first-trimester screen (NT + serum markers)."},{"ta":"Women's Health","subcategory":"Prenatal Genetic Counseling","indication":"Preconception or Prenatal Carrier Testing of Parents","symptoms":"Not a disease; genetic testing to identify carrier status for recessive/X-linked disorders","goal":"Identify at-risk couples before or during pregnancy; enable informed reproductive decisions","soc":"Expanded carrier screening (ECS): Single-gene (ACOG Tier 1: CF, SMA, fragile X) or expanded panel (Natera Horizon, Invitae—240+ conditions). No pharmacologic intervention."},{"ta":"Women's Health","subcategory":"Prenatal Genetic Counseling","indication":"Prenatal Genetic Counseling","symptoms":"Not a disease; counseling service for chromosomal/genetic risk assessment","goal":"Provide risk-based education; support informed decision-making for at-risk families","soc":"None pharmacologic. Genetics counselor/specialist consultation."},{"ta":"Women's Health","subcategory":"Prenatal Genetic Counseling","indication":"Procedures for Prenatal Genetic Diagnosis","symptoms":"Not a disease; procedures (amniocentesis, CVS) to obtain fetal genetic material","goal":"Obtain definitive fetal chromosomal/genetic diagnosis to guide pregnancy management","soc":"Amniocentesis (≥15 weeks) or chorionic villus sampling (CVS; 10–13 weeks) for karyotyping/chromosomal microarray. Rh(D) immune globulin (RhoGAM) for Rh-negative women post-procedure."},{"ta":"Women's Health","subcategory":"Symptoms During Pregnancy","indication":"Nausea and Vomiting During Early Pregnancy","symptoms":"Morning sickness, nausea, vomiting in first trimester; affects 70–80% of pregnant women","goal":"Relieve nausea and vomiting, maintain hydration and nutrition","soc":"Doxylamine + pyridoxine (Bonjesta/Diclegis; FDA Category A equivalent; first-line prescription option). Vitamin B6 (pyridoxine 10–25mg TID) alone as safest first-line. Ginger supplementation."},{"ta":"Women's Health","subcategory":"Symptoms During Pregnancy","indication":"Vaginal Bleeding During Early Pregnancy","symptoms":"Spotting or bleeding before 20 weeks; may indicate threatened abortion, ectopic, or implantation","goal":"Identify cause, support ongoing pregnancy if viable, manage complications","soc":"Vaginal progesterone (Endometrin 200mg BID or Prometrium 200mg/day) for threatened abortion with subchorionic hematoma in women with prior pregnancy loss—some evidence (PRISM trial)."},{"ta":"Women's Health","subcategory":"Symptoms During Pregnancy","indication":"Pelvic Pain During Early Pregnancy","symptoms":"Lower abdominal or pelvic pain in first trimester; requires exclusion of ectopic or miscarriage","goal":"Identify cause, reassure if benign, treat ectopic/miscarriage as needed","soc":"Acetaminophen (Category B; safest analgesic in pregnancy) for symptomatic relief. Avoid NSAIDs in 1st trimester. If ectopic: MTX or surgery (see ectopic entry). If round ligament pain: Acetaminophen + positional modification."},{"ta":"Women's Health","subcategory":"Symptoms During Pregnancy","indication":"Vaginal Bleeding During Late Pregnancy","symptoms":"Vaginal bleeding after 20 weeks; painless (previa) or painful (abruption), fetal distress","goal":"Identify cause, stabilize mother and fetus, plan safe delivery timing","soc":"IV fluid resuscitation + blood transfusion for hemorrhage. Antenatal corticosteroids (betamethasone 12mg IM × 2) for fetal lung maturity if <34 weeks. Management depends on etiology (placenta previa vs. abruption vs. vasa previa)."},{"ta":"Women's Health","subcategory":"Symptoms During Pregnancy","indication":"Lower-Extremity Edema During Late Pregnancy","symptoms":"Bilateral leg and ankle swelling, pitting edema, discomfort during third trimester","goal":"Relieve discomfort, distinguish from pathological edema (preeclampsia, DVT)","soc":"Conservative measures (leg elevation, compression stockings). No pharmacologic first-line SoC for physiological edema. Diuretics (furosemide) only if cardiac or renal pathology."}];

// ── Pre-process ────────────────────────────────────────
const taMap = {};
for(const r of DATA){
  if(!taMap[r.ta]) taMap[r.ta]={subs:{}};
  if(!taMap[r.ta].subs[r.subcategory]) taMap[r.ta].subs[r.subcategory]=[];
  taMap[r.ta].subs[r.subcategory].push(r);
}
const taList = Object.keys(taMap).sort();

// ── Home ───────────────────────────────────────────────
function renderHome(){
  const grid = document.getElementById('ta-grid');
  const stats = document.getElementById('stats-row');
  const totalSubs = new Set(DATA.map(r=>r.subcategory)).size;

  stats.innerHTML = `
    <div class="stat"><span class="stat-num">${taList.length}</span><span class="stat-label">Therapeutic Areas</span></div>
    <div class="stat"><span class="stat-num">${totalSubs}</span><span class="stat-label">Subcategories</span></div>
    <div class="stat"><span class="stat-num">${DATA.length.toLocaleString()}</span><span class="stat-label">Disease Indications</span></div>
  `;

  grid.innerHTML = taList.map(ta=>{
    const subs = Object.keys(taMap[ta].subs).length;
    const inds = Object.values(taMap[ta].subs).reduce((s,a)=>s+a.length,0);
    const icon = TA_ICONS[ta]||'💊';
    return `<div class="ta-card" role="listitem" tabindex="0"
      onclick="showTA('${escAttr(ta)}')"
      onkeydown="if(event.key==='Enter'||event.key===' ')showTA('${escAttr(ta)}')"
      aria-label="${escAttr(ta)}: ${subs} subcategories, ${inds} indications">
      <div class="ta-icon" aria-hidden="true">${icon}</div>
      <div class="ta-info">
        <div class="ta-name">${esc(ta)}</div>
        <div class="ta-meta">${subs} subcategories · ${inds} indications</div>
      </div>
    </div>`;
  }).join('');
}

// ── Global search redirect ─────────────────────────────
let searchTimer;
document.getElementById('search').addEventListener('input',function(){
  clearTimeout(searchTimer);
  const q=this.value.trim();
  if(q.length<2) return;
  searchTimer=setTimeout(()=>doGlobalSearch(q),300);
});
document.getElementById('search').addEventListener('keydown',function(e){
  if(e.key==='Escape'){this.value='';showHome()}
});

function doGlobalSearch(q){
  const ql=q.toLowerCase();
  // find first match
  for(const ta of taList){
    for(const sub of Object.keys(taMap[ta].subs)){
      for(const row of taMap[ta].subs[sub]){
        if(row.indication.toLowerCase().includes(ql)||row.symptoms.toLowerCase().includes(ql)){
          showTA(ta,q);
          return;
        }
      }
    }
  }
}

// ── Show TA ────────────────────────────────────────────
let currentTA='';
function showTA(ta, initialSearch=''){
  currentTA=ta;
  document.getElementById('home').style.display='none';
  document.getElementById('home-search-wrap').style.visibility='hidden';
  const det=document.getElementById('detail');
  det.style.display='block';
  document.getElementById('detail-title').textContent=ta;
  const subs=taMap[ta].subs;
  const subCount=Object.keys(subs).length;
  const indCount=Object.values(subs).reduce((s,a)=>s+a.length,0);
  document.getElementById('detail-meta').innerHTML=
    `<span>${subCount} subcategories</span><span>${indCount} disease indications</span>`;
  renderSubGroups(ta,'');
  const ds=document.getElementById('detail-search');
  ds.value=initialSearch;
  if(initialSearch) renderSubGroups(ta,initialSearch);
  window.scrollTo(0,0);
}

function showHome(){
  document.getElementById('home').style.display='';
  document.getElementById('home-search-wrap').style.visibility='';
  document.getElementById('detail').style.display='none';
  window.scrollTo(0,0);
}

// ── Render sub-groups ──────────────────────────────────
function renderSubGroups(ta, q){
  const subs=taMap[ta].subs;
  const ql=q.toLowerCase();
  const container=document.getElementById('sub-groups');
  let totalVisible=0;

  const html=Object.keys(subs).sort().map((sub,i)=>{
    let rows=subs[sub];
    if(ql) rows=rows.filter(r=>
      r.indication.toLowerCase().includes(ql)||
      r.symptoms.toLowerCase().includes(ql)||
      r.goal.toLowerCase().includes(ql)||
      r.soc.toLowerCase().includes(ql)
    );
    if(ql && rows.length===0) return '';
    totalVisible+=rows.length;
    const isOpen = ql || i<3; // open first 3 by default, all when searching
    return `<div class="sub-group${isOpen?' open':''}" id="sg-${i}">
      <div class="sub-header" onclick="toggleSub('sg-${i}')" tabindex="0"
        onkeydown="if(event.key==='Enter'||event.key===' ')toggleSub('sg-${i}')"
        aria-expanded="${isOpen}" role="button">
        <div class="sub-header-left">
          <span class="sub-name">${esc(sub)}</span>
          <span class="sub-badge">${rows.length}</span>
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="sub-body" role="region" aria-label="${escAttr(sub)} diseases">
        <div class="detail-table-scroll">
        <table class="disease-table" aria-label="${escAttr(sub)}">
          <thead><tr>
            <th style="min-width:180px">Indication</th>
            <th style="min-width:240px">Symptoms</th>
            <th style="min-width:200px">Treatment Goal</th>
            <th style="min-width:300px">1L Standard of Care</th>
          </tr></thead>
          <tbody>${rows.map(r=>`<tr>
            <td class="td-indication">${ql?highlight(esc(r.indication),ql):esc(r.indication)}</td>
            <td class="td-symptoms"><div class="cell-truncate">${ql?highlight(esc(r.symptoms),ql):esc(r.symptoms)}</div></td>
            <td class="td-goal"><div class="cell-truncate">${ql?highlight(esc(r.goal),ql):esc(r.goal)}</div></td>
            <td class="td-soc"><div class="cell-truncate">${ql?highlight(esc(r.soc),ql):esc(r.soc)}</div></td>
          </tr>`).join('')}</tbody>
        </table>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML=html||'<div class="no-results"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><strong>No results found</strong><span>Try different keywords</span></div>';
  document.getElementById('result-count').textContent=ql?`${totalVisible} results for "${q}"`:`${totalVisible} indications`;
}

// ── Accordion ──────────────────────────────────────────
function toggleSub(id){
  const el=document.getElementById(id);
  const isOpen=el.classList.toggle('open');
  el.querySelector('.sub-header').setAttribute('aria-expanded',isOpen);
}
function expandAll(){
  document.querySelectorAll('.sub-group').forEach(el=>{el.classList.add('open');el.querySelector('.sub-header')?.setAttribute('aria-expanded','true')});
}
function collapseAll(){
  document.querySelectorAll('.sub-group').forEach(el=>{el.classList.remove('open');el.querySelector('.sub-header')?.setAttribute('aria-expanded','false')});
}

// ── Detail search ──────────────────────────────────────
let detTimer;
document.getElementById('detail-search').addEventListener('input',function(){
  clearTimeout(detTimer);
  detTimer=setTimeout(()=>renderSubGroups(currentTA,this.value.trim()),200);
});
document.getElementById('detail-search').addEventListener('keydown',function(e){
  if(e.key==='Escape'){this.value='';renderSubGroups(currentTA,'')}
});

// ── Helpers ────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;')}
function highlight(html,q){
  if(!q) return html;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return html.replace(re,'<mark>$1</mark>');
}

// ── Init ───────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
