hemical burns to airways","goal":"Decontaminate, treat pulmonary edema, support oxygenation","soc":"Decontamination, 100% O2, bronchodilators (albuterol); systemic corticosteroids for ARDS; no specific FDA-approved antidote for phosgene/chlorine."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Poisoning","symptoms":"Variable by toxin; nausea, vomiting, altered consciousness, organ failure","goal":"Identify toxin, decontaminate, administer antidote, support vital functions","soc":"None universal — toxin-specific antidotes (naloxone for opioids, flumazenil for benzodiazepines, atropine/pralidoxime for organophosphates, NAC for acetaminophen)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Carbon Monoxide Poisoning","symptoms":"Headache, dizziness, nausea, confusion, loss of consciousness","goal":"Displace CO from hemoglobin, prevent neurologic sequelae","soc":"100% normobaric oxygen (NBO) via tight-fitting mask — accelerates COHb half-life from 4–6 hours to 40–80 minutes; first-line for all symptomatic patients."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Serotonin Syndrome","symptoms":"Agitation, tremor, hyperthermia, clonus, diarrhea, tachycardia","goal":"Discontinue causative agents, control hyperthermia and neuromuscular excitability","soc":"Cyproheptadine (serotonin antagonist) — 12 mg oral/NG, then 2 mg q2h PRN — plus benzodiazepines (lorazepam) for agitation/seizures."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Acetaminophen Poisoning","symptoms":"Nausea, vomiting, right upper quadrant pain, liver failure","goal":"Prevent hepatotoxicity, restore glutathione, support liver","soc":"N-acetylcysteine (NAC; Acetadote) — glutathione precursor/antioxidant — IV or oral regimen initiated ASAP after toxic ingestion."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Lead Poisoning","symptoms":"Fatigue, cognitive impairment, abdominal pain, peripheral neuropathy, hypertension","goal":"Reduce blood lead level, prevent organ damage, protect CNS","soc":"Succimer (DMSA; Chemet) oral — FDA-approved chelation agent — first-line for BLL ≥45 mcg/dL in children; EDTA IV for high BLL or encephalopathy."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Organophosphate Poisoning","symptoms":"SLUDGE: salivation, lacrimation, urination, defecation, GI distress, emesis; bronchospasm, seizures","goal":"Reverse cholinergic crisis, prevent respiratory failure and death","soc":"Atropine IV (2–4 mg, titrated) + pralidoxime (2-PAM) 1–2 g IV over 15–30 min — combination is standard; atropine for muscarinic symptoms, 2-PAM to reactivate AChE."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Caustic Ingestion","symptoms":"Mouth/throat burns, drooling, dysphagia, vomiting, abdominal pain","goal":"Assess injury severity, prevent stricture, support nutrition","soc":"None pharmacologic — avoid emesis/charcoal; early endoscopy for grading. Corticosteroids (dexamethasone) for high-grade esophageal burns to reduce stricture formation (controversial)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Neuroleptic Malignant Syndrome","symptoms":"Hyperthermia, muscle rigidity, altered consciousness, autonomic instability","goal":"Discontinue causative agent, lower temperature, resolve rigidity","soc":"Dantrolene (muscle relaxant) and/or bromocriptine (D2 agonist) + benzodiazepines for rigidity/agitation; discontinue offending antipsychotic."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Hydrocarbon Poisoning","symptoms":"Coughing, respiratory distress, CNS depression, cardiac arrhythmias","goal":"Prevent aspiration pneumonitis, stabilize respiration and cardiac rhythm","soc":"None pharmacologic — supportive care; avoid emesis (increases aspiration risk); O2 supplementation; bronchodilators for bronchospasm."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Iron Poisoning","symptoms":"Vomiting, abdominal pain, GI bleeding, metabolic acidosis, shock","goal":"Remove iron, treat acidosis, prevent multi-organ failure","soc":"Deferoxamine (Desferal) IV — iron chelator — standard of care for serum iron >500 mcg/dL or symptomatic systemic toxicity."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Aspirin and Other Salicylate Poisoning","symptoms":"Tinnitus, vomiting, hyperventilation, altered mental status, metabolic acidosis","goal":"Enhance elimination, correct acid-base, prevent organ damage","soc":"Sodium bicarbonate IV — alkalinizes urine to enhance salicylate renal excretion; urinary alkalinization is cornerstone of treatment."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Carbamate Poisoning","symptoms":"Excessive secretions, miosis, bradycardia, muscle weakness, seizures","goal":"Block muscarinic excess, prevent respiratory failure","soc":"Atropine IV — anticholinergic antidote — titrated to dry secretions; pralidoxime (2-PAM) is controversial in carbamate poisoning (may worsen)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Drug and Chemical Poisoning","indication":"Malignant Hyperthermia","symptoms":"Rapidly rising temperature, muscle rigidity, tachycardia after anesthesia","goal":"Halt ryanodine receptor overactivation, lower temperature, prevent death","soc":"Dantrolene sodium (Dantrium/Ryanodex) — ryanodine receptor antagonist — IV bolus 2.5 mg/kg emergently; only pharmacologic antidote."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Insect Stings","symptoms":"Pain, swelling, redness, urticaria, anaphylaxis risk","goal":"Relieve local reaction, prevent/treat anaphylaxis","soc":"Epinephrine 0.3 mg IM (EpiPen) for anaphylaxis — absolute first-line; antihistamines + corticosteroids for non-anaphylactic reactions."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Mite Bites","symptoms":"Intense itching, papular rash, burrows (scabies), secondary infection","goal":"Eradicate infestation, relieve pruritus, prevent spread","soc":"Permethrin 5% cream (topical) — applied head to toe, washed off after 8–14 hours — first-line for scabies; oral ivermectin as alternative."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Tick Bites","symptoms":"Tick attachment, local reaction, erythema migrans, potential disease transmission","goal":"Remove tick, prevent tick-borne disease transmission","soc":"Single-dose doxycycline 200 mg within 72 hours of deer tick removal for Lyme disease prophylaxis (IDSA recommendation)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Cnidaria (Coelenterates, such as Jellyfish and Sea Anemones) Stings","symptoms":"Immediate burning pain, skin wheals, urticaria, rare anaphylaxis","goal":"Deactivate nematocysts, relieve pain, manage systemic reaction","soc":"None specific pharmacologic — seawater rinse (avoid fresh water), vinegar for box jellyfish (deactivates nematocysts), hot water immersion for box jellyfish pain; antihistamines for local reactions."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Other Arthropod Bites","symptoms":"Local pain, swelling, pruritus, possible systemic reactions","goal":"Relieve local symptoms, manage allergic reactions","soc":"None specific — topical antihistamines/corticosteroids for local reactions; oral antihistamines; epinephrine for anaphylaxis."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Snakebites","symptoms":"Fang marks, local swelling, tissue necrosis, coagulopathy, neurotoxicity","goal":"Neutralize venom, prevent tissue loss, correct coagulopathy","soc":"Crotalidae polyvalent immune Fab antivenom (CroFab, BTG) — first-line for North American pit viper envenomation. Anavip (crotalidae immune F(ab')2 equine) for prolonged venom recurrence."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Spider Bites","symptoms":"Bite mark, local pain; necrosis (brown recluse); systemic toxicity, muscle cramps (black widow)","goal":"Neutralize venom, prevent necrosis, relieve pain and muscle spasm","soc":"Black widow: Merck antivenin (Latrodectus mactans antivenin) — IV/IM — plus IV opioids and benzodiazepines. Brown recluse: no antivenom available; wound care + dapsone (controversial)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Marine Bites and Stings","symptoms":"Pain, envenomation symptoms, puncture wounds, infection risk","goal":"Neutralize venom, prevent infection, manage systemic effects","soc":"Hot water immersion (45°C × 30–90 min) for fish stings (heat-labile venoms); antivenom for life-threatening envenomations (box jellyfish, stonefish, sea snake)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Scorpion Stings","symptoms":"Local pain, paresthesia, neuromuscular excitation, hypertension, pediatric respiratory failure","goal":"Neutralize venom, control neuromuscular toxicity, manage pain","soc":"Centruroides (scorpion) immune F(ab')2 antivenom (Anascorp, FDA-approved 2011) for bark scorpion (Centruroides sculpturatus) envenomation in the US."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Mollusk Stings","symptoms":"Puncture wound, severe pain, paralysis (cone snail tetrodotoxin-like toxins)","goal":"Manage pain, support ventilation for severe envenomation","soc":"None — no antivenom available for cone snail envenomation; pressure immobilization, supportive mechanical ventilation as needed."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Puss Moth Caterpillar (Asp) Stings","symptoms":"Intense burning pain, erythema, urticaria, lymphadenopathy, nausea","goal":"Remove spines, relieve pain, manage allergic reaction","soc":"None specific — remove embedded spines with tape stripping; oral antihistamines (diphenhydramine), NSAIDs; topical corticosteroids."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Sea Urchin Stings","symptoms":"Puncture wounds, local pain, spine retention, granulomatous reaction","goal":"Remove spines, relieve pain, prevent infection and granuloma","soc":"None pharmacologic — spine removal, hot water immersion (45°C) for pain; topical antiseptics; NSAIDs."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Alligator, Crocodile, Iguana, and Venomous Lizard Bites","symptoms":"Crush injury, lacerations, infection, potential toxin effects","goal":"Wound care, infection prevention, manage envenomation","soc":"None specific pharmacologic — wound irrigation, antibiotics (e.g., amoxicillin-clavulanate or ciprofloxacin for polymicrobial coverage including gram-negatives), tetanus prophylaxis."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Centipede and Millipede Bites","symptoms":"Local pain, swelling, redness, rare systemic effects","goal":"Relieve pain, prevent secondary infection, manage reaction","soc":"None specific — local wound care, analgesics (NSAIDs/acetaminophen), antihistamines for allergic reactions."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Stingray Stings","symptoms":"Intense immediate pain, laceration, local edema, systemic reactions rare","goal":"Remove barb, relieve severe pain, prevent infection","soc":"None pharmacologic — hot water immersion (45°C × 30–90 min) for pain; wound irrigation; NSAIDs."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental and Envenomation","indication":"Tick Paralysis","symptoms":"Ascending flaccid paralysis, areflexia, gait ataxia resolving after tick removal","goal":"Remove tick immediately to reverse paralysis","soc":"None pharmacologic — mechanical tick removal (definitive treatment; paralysis reverses within hours of removal)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Motion Sickness","symptoms":"Nausea, vomiting, dizziness, pallor, sweating with motion","goal":"Prevent/abort nausea and vomiting, maintain comfort","soc":"Scopolamine (Transderm Scop) transdermal patch — anticholinergic — most effective for prophylaxis; dimenhydrinate (Dramamine) or meclizine (Antivert) as OTC alternatives."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Cold Injury","symptoms":"Skin color change, numbness, pain, blistering, tissue loss","goal":"Rewarm tissue, restore perfusion, prevent tissue death","soc":"None pharmacologic — rapid rewarming in 37–39°C water bath; iloprost IV (prostacyclin analog) for severe frostbite to improve perfusion."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Hypothermia","symptoms":"Shivering, confusion, slurred speech, bradycardia, loss of consciousness","goal":"Rewarm safely, restore cardiac rhythm, prevent complications","soc":"None pharmacologic — rewarming is primary treatment (passive for mild, active internal for severe); ECMO for cardiac arrest from hypothermia."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Radiation Exposure and Contamination","symptoms":"Nausea, vomiting, lymphopenia, burns, acute radiation syndrome","goal":"Decontaminate, support hematopoiesis, prevent infection and death","soc":"Filgrastim (G-CSF; Neupogen) or pegfilgrastim (Neulasta) for hematopoietic acute radiation syndrome (H-ARS); FDA-approved under Animal Rule. Romiplostim (Nplate) FDA-approved (2021) for H-ARS-related thrombocytopenia."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Barotrauma","symptoms":"Ear pain, hearing loss, sinus pain, vertigo, nosebleed","goal":"Equalize pressure, relieve pain, prevent perforation","soc":"None pharmacologic — decongestants (pseudoephedrine, oxymetazoline nasal spray) to facilitate eustachian tube opening; primary treatment is pressure equalization maneuvers."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Heat Illness","symptoms":"Heat cramps, exhaustion, or heatstroke; fatigue, nausea, temperature elevation","goal":"Reduce core temperature, restore perfusion, prevent organ failure","soc":"None pharmacologic — cooling is primary therapy; no specific pharmacologic first-line treatment for exertional heat illness."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Drowning","symptoms":"Respiratory distress, hypoxia, altered consciousness, pulmonary edema","goal":"Restore oxygenation, prevent anoxic brain injury","soc":"None pharmacologic — CPR and rescue breathing are primary interventions; supplemental O2, intubation/mechanical ventilation as needed."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Frostbite","symptoms":"Numbness, skin color change (white/gray/black), blistering, tissue death","goal":"Restore perfusion, salvage tissue, prevent amputation","soc":"Rapid rewarming (37–39°C water bath); iloprost IV (prostacyclin analog) for deep frostbite — reduces amputation risk by ~50% in clinical data."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Heatstroke","symptoms":"Core temperature >40°C, altered mental status, hot/dry skin, multi-organ failure","goal":"Rapidly lower core temperature below 39°C, prevent organ damage","soc":"None pharmacologic — cold water immersion (exertional) or evaporative cooling is definitive; no proven pharmacologic first-line agent."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Ear and Sinus Barotrauma","symptoms":"Ear pain, hearing loss, tinnitus, sinus pressure, nasal congestion","goal":"Equalize pressure, relieve pain, prevent complications","soc":"Decongestants (oxymetazoline nasal spray, pseudoephedrine) to facilitate pressure equalization; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Nonfreezing Tissue Injuries","symptoms":"Painful swollen feet/hands, trench foot, chilblains, erythema","goal":"Rewarm, restore perfusion, prevent ulceration and tissue loss","soc":"None pharmacologic — gentle rewarming; nifedipine for chilblains; protective footwear; meticulous wound care."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Diving Injuries","symptoms":"Barotrauma, DCS, nitrogen narcosis, O2 toxicity, near-drowning","goal":"Treat barotrauma, reverse DCS, ensure oxygenation","soc":"100% O2 for all diving emergencies; HBO for DCS and arterial gas embolism; specific antidotes per complication."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Arterial Gas Embolism","symptoms":"Sudden neurologic deficits, chest pain, loss of consciousness during/after diving","goal":"Recompress gas bubbles, restore tissue perfusion, prevent death","soc":"Hyperbaric oxygen therapy (HBO) — 100% O2 at 2.8–6 ATA — definitive treatment to reduce bubble size and resolve ischemia."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Decompression Sickness","symptoms":"Joint pain, skin mottling, neurologic deficits, dyspnea after diving","goal":"Eliminate nitrogen bubbles, restore neurologic function","soc":"Hyperbaric oxygen (HBO) — US Navy Treatment Table 6 (2.8 ATA, 100% O2) — definitive treatment; supplemental O2 in transit."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Heat Cramps","symptoms":"Painful muscle spasms during or after exercise in heat","goal":"Restore electrolytes, relieve cramping, rehydrate","soc":"None pharmacologic — oral or IV fluid and electrolyte (sodium) replacement; massage; rest."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Heat Exhaustion","symptoms":"Weakness, dizziness, heavy sweating, nausea, cool/moist skin","goal":"Cool patient, restore fluids/electrolytes, prevent heatstroke","soc":"None pharmacologic — aggressive cooling (move to cool environment, cool IV fluids); IV normal saline for rehydration."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Altitude Illness","symptoms":"Headache, nausea, fatigue, breathlessness, confusion","goal":"Reduce symptoms, prevent progression to HACE/HAPE","soc":"Acetazolamide (Diamox) — carbonic anhydrase inhibitor — 125–250 mg BID for prophylaxis and treatment of acute mountain sickness (AMS)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Immersion Pulmonary Edema","symptoms":"Acute dyspnea, cough with pink frothy sputum, hypoxia during swimming/diving","goal":"Restore oxygenation, reduce pulmonary edema, prevent recurrence","soc":"None pharmacologic — surface/exit water; 100% O2; furosemide IV for fluid overload; nifedipine for pulmonary hypertension component."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Pulmonary Barotrauma","symptoms":"Chest pain, dyspnea, pneumothorax, subcutaneous emphysema during ascent","goal":"Re-expand lung, treat pneumothorax, prevent air embolism","soc":"None pharmacologic — needle decompression and chest tube for pneumothorax; hyperbaric oxygen for arterial gas embolism component."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Dental, Mask, and Eye Barotrauma","symptoms":"Tooth pain, facial pressure, eye pain/subconjunctival hemorrhage during diving/aviation","goal":"Relieve pressure, manage pain, prevent complications","soc":"None specific — dental: analgesics and dental referral; mask: supportive care; eye: topical lubricants and observation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Gas Toxicity During Diving","symptoms":"Nitrogen narcosis (confusion), O2 toxicity (seizures), CO2 retention (unconsciousness)","goal":"Remove toxic gas exposure, restore normal oxygenation","soc":"None pharmacologic — ascent to lower depth (nitrogen narcosis), switching to correct gas mix, surfacing; no specific drug antidotes."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Environmental Injuries","indication":"Gastrointestinal Barotrauma","symptoms":"Abdominal pain, bloating, cramping, belching during/after diving","goal":"Relieve gas pressure, prevent perforation, manage pain","soc":"None pharmacologic — ascent and surface; simethicone for gas relief; supportive management."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Food Poisoning","indication":"Fish Poisoning","symptoms":"Nausea, vomiting, neurologic symptoms, reversal of temperature sensation (ciguatera)","goal":"Manage symptoms, prevent dehydration, treat dysesthesias","soc":"None specific antidote — supportive care; mannitol IV investigated for ciguatera (evidence limited); antihistamines for scombroid."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Food Poisoning","indication":"Plant Poisoning","symptoms":"Nausea, vomiting, abdominal pain, cardiac arrhythmias (plant-specific)","goal":"Decontaminate, manage toxidrome, prevent organ failure","soc":"None specific — activated charcoal for acute ingestion if early; supportive care. Digoxin-specific antibody fragments (Digibind/DigiFab) for cardiac glycoside plants (foxglove, oleander)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Food Poisoning","indication":"Mushroom Poisoning","symptoms":"GI distress, liver/kidney failure (Amanita), cholinergic excess, hallucinations","goal":"Identify toxin, manage organ toxicity, support liver function","soc":"No universal antidote; silibinin (Legalon SIL) IV — hepatoprotective agent — investigational antidote for Amanita phalloides poisoning; supportive care; activated charcoal if early."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Food Poisoning","indication":"Shellfish Poisoning","symptoms":"Nausea, vomiting, diarrhea; neurological symptoms (paralytic), memory loss (amnesic)","goal":"Supportive care, decontaminate, manage respiratory failure","soc":"None specific — activated charcoal within 1–2 hours; supportive care (IV fluids, antiemetics); ventilator support for paralytic shellfish poisoning (PSP)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Burns and Thermal Injuries","indication":"Burns","symptoms":"Skin injury, pain, blistering, fluid loss, infection risk","goal":"Prevent infection, restore skin barrier, minimize scarring","soc":"Silver sulfadiazine (Silvadene) topical — antimicrobial agent for partial/full-thickness burns — or mafenide acetate; systemic antibiotics for infection."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Burns and Thermal Injuries","indication":"Smoke Inhalation","symptoms":"Cough, hoarseness, stridor, singed facial hair, carbon deposits in sputum, hypoxia","goal":"Secure airway, treat CO poisoning, prevent ARDS","soc":"100% high-flow O2 via NRB mask; hydroxocobalamin (Cyanokit) if cyanide co-exposure; intubation for airway edema."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Burns and Thermal Injuries","indication":"Electrical Injuries","symptoms":"Burns, arrhythmia, muscle necrosis, rhabdomyolysis, neurologic deficits","goal":"Manage cardiac arrhythmias, treat burns, prevent renal failure","soc":"None pharmacologic — cardiac monitoring; IV fluids for rhabdomyolysis with aggressive hydration to maintain urine output >1 mL/kg/hr; sodium bicarbonate to prevent myoglobin precipitation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Burns and Thermal Injuries","indication":"Lightning Injuries","symptoms":"Cardiac arrest, burns, neurologic deficits, tympanic membrane rupture","goal":"Restore cardiac rhythm, treat burns, support neurologic recovery","soc":"None pharmacologic — CPR for cardiac arrest (highest priority); ALS (epinephrine, amiodarone) for refractory arrhythmias; standard trauma management."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Dislocations","symptoms":"Deformity, severe pain, loss of function at joint","goal":"Restore joint alignment, prevent avascular necrosis, preserve function","soc":"None pharmacologic — closed reduction under procedural sedation (ketamine, propofol, or midazolam/fentanyl) is the primary treatment."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Patellar Dislocations","symptoms":"Knee deformity, severe pain, visible patella displaced laterally, inability to walk","goal":"Reduce patella, stabilize, prevent recurrent dislocation","soc":"None pharmacologic — closed reduction (knee extension); MPFL reconstruction for recurrent dislocation; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Shoulder Dislocations","symptoms":"Severe shoulder pain, deformity, arm held in fixed position, inability to move","goal":"Reduce dislocation, relieve pain, prevent recurrence","soc":"None pharmacologic — closed reduction (Cunningham, FARES, Stimson techniques) with procedural sedation; sling immobilization; NSAIDs."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Hip Dislocations","symptoms":"Severe hip pain, leg internally/externally rotated, inability to walk","goal":"Restore hip anatomy, prevent AVN, preserve function","soc":"None pharmacologic — emergent closed reduction under deep sedation; early reduction (<6 hours) critical to prevent AVN."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Elbow Dislocations","symptoms":"Elbow pain, deformity, inability to bend arm, swelling","goal":"Restore joint alignment, preserve stability and function","soc":"None pharmacologic — closed reduction under procedural sedation; NSAIDs post-reduction."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Knee (Tibiofemoral) Dislocations","symptoms":"Severe knee pain, gross deformity, vascular compromise, multi-ligament injury","goal":"Restore vascular perfusion, reduce dislocation, repair ligaments","soc":"None pharmacologic — emergent closed reduction; vascular surgery for popliteal artery injury (~30–40% cases); surgical multi-ligament reconstruction."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Finger Dislocations","symptoms":"Finger deformity, pain, swelling, inability to bend digit","goal":"Restore alignment, protect ligaments, preserve function","soc":"None pharmacologic — digital block anesthesia (lidocaine) + closed reduction; buddy taping; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Perilunate and Lunate Dislocations","symptoms":"Wrist pain, swelling, numbness, loss of grip, visible deformity","goal":"Restore carpal alignment, prevent avascular necrosis","soc":"None pharmacologic — emergent closed/open reduction plus surgical ligament repair (ORIF)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Dislocations","indication":"Radial Head Subluxations","symptoms":"Elbow pain in toddlers, arm held semiflexed, refused use of arm","goal":"Reduce subluxation, restore full arm use immediately","soc":"None pharmacologic — closed reduction (hyperpronation or supination-flexion technique) by clinician."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Eye Trauma","indication":"Eye Trauma","symptoms":"Pain, vision loss, hemorrhage, diplopia, foreign body sensation","goal":"Preserve vision, repair injury, prevent infection","soc":"None pharmacologic — emergent ophthalmologic evaluation; antibiotics for open globe injuries; cycloplegics for traumatic iritis."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Eye Trauma","indication":"Globe Injury","symptoms":"Severe eye pain, vision loss, hypotony, hemorrhage, visible wound","goal":"Emergent surgical repair, prevent endophthalmitis, preserve vision","soc":"None pharmacologic — emergent surgical repair; IV antibiotics (cefazolin + gentamicin or fluoroquinolone) for prophylaxis against endophthalmitis."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Eye Trauma","indication":"Ocular Burns","symptoms":"Severe eye pain, conjunctival blanching, corneal opacity, vision loss","goal":"Immediate irrigation, restore ocular surface, prevent blindness","soc":"Immediate copious eye irrigation (water/saline/Morgan lens) — most critical first step; topical steroids (dexamethasone) + antibiotics + ascorbic acid for chemical burns."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Eye Trauma","indication":"Posttraumatic Iridocyclitis","symptoms":"Eye pain, photophobia, blurred vision, red eye after trauma","goal":"Reduce intraocular inflammation, prevent synechiae, protect vision","soc":"Topical corticosteroids (prednisolone acetate 1%) and cycloplegic agents (cyclopentolate, atropine) for ciliary spasm."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Eye Trauma","indication":"Corneal Abrasions and Corneal Foreign Bodies","symptoms":"Eye pain, tearing, photophobia, foreign body sensation, blurred vision","goal":"Remove foreign body, promote healing, prevent infection","soc":"None pharmacologic — topical anesthetics for initial exam (proparacaine), antibiotic eye drops (fluoroquinolone or trimethoprim/polymyxin B) to prevent secondary infection."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Eye Trauma","indication":"Eyelid Contusions and Lacerations","symptoms":"Eyelid swelling, bruising, bleeding, ptosis, laceration","goal":"Repair integrity, restore function, prevent scarring","soc":"None pharmacologic — wound closure (sutures); antibiotics (erythromycin ointment or oral amoxicillin-clavulanate) for contaminated wounds."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Facial and ENT Trauma","indication":"Facial Trauma","symptoms":"Facial pain, swelling, deformity, altered vision, airway compromise","goal":"Maintain airway, restore facial anatomy, prevent infection","soc":"None pharmacologic — definitive management is surgical (ORIF); NSAIDs/opioids for pain; prophylactic antibiotics (amoxicillin-clavulanate) for open fractures."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Facial and ENT Trauma","indication":"Fractures of the Mandible and Midface","symptoms":"Facial pain, malocclusion, numbness, swelling, trismus","goal":"Restore occlusion, repair fractures, prevent infection","soc":"None pharmacologic — ORIF with titanium plates/screws for displaced fractures; amoxicillin-clavulanate prophylaxis for open fractures."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Facial and ENT Trauma","indication":"Fractures of the Nose","symptoms":"Nasal pain, swelling, deformity, epistaxis, nasal obstruction","goal":"Restore nasal alignment, control bleeding, prevent cosmetic deformity","soc":"None pharmacologic — closed reduction under local/sedation for displaced fractures; NSAIDs for pain; epistaxis management."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Facial and ENT Trauma","indication":"External Ear Trauma","symptoms":"Ear pain, swelling, hematoma (cauliflower ear), lacerations","goal":"Drain hematoma, repair lacerations, prevent deformity","soc":"None pharmacologic — needle aspiration or incision/drainage of auricular hematoma; antibiotics (amoxicillin-clavulanate) for infected wounds."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Facial and ENT Trauma","indication":"Temporal Bone Fractures","symptoms":"Hearing loss, hemotympanum, facial nerve palsy, Battle's sign, CSF otorrhea","goal":"Preserve hearing, treat facial nerve injury, prevent meningitis","soc":"None pharmacologic — surgical decompression for facial nerve palsy; observation for CSF leak; prophylactic antibiotics controversial."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Axial/Other","indication":"Fractures","symptoms":"Pain, swelling, deformity, inability to use affected limb","goal":"Restore anatomy, achieve union, restore function","soc":"None pharmacologic — depends on fracture type (see specific fracture entries); NSAIDs/analgesics for pain; teriparatide or bisphosphonates for osteoporotic fracture prevention."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Axial/Other","indication":"Vertebral Compression Fractures","symptoms":"Acute back pain, height loss, kyphotic deformity, limited mobility","goal":"Control pain, restore vertebral height, prevent further collapse","soc":"Analgesics (acetaminophen + NSAIDs); calcitonin (salmon calcitonin nasal spray, Miacalcin) for acute pain. Vertebroplasty/kyphoplasty for refractory cases."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Axial/Other","indication":"Rib Fracture","symptoms":"Sharp chest pain worsened by breathing, tenderness, splinting","goal":"Adequate pain control, prevent pneumonia, restore breathing","soc":"Multimodal analgesia: oral NSAIDs + acetaminophen; intercostal nerve blocks (bupivacaine); epidural analgesia for multiple rib fractures."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Axial/Other","indication":"Pelvic Fractures","symptoms":"Pelvic pain, instability, inability to bear weight, hemorrhage","goal":"Control hemorrhage, stabilize pelvis, prevent mortality","soc":"None pharmacologic — emergent pelvic binder/external fixation for hemorrhage control; angioembolization; ORIF for definitive fixation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Hip Fractures","symptoms":"Hip/groin pain, inability to walk, shortened/externally rotated leg","goal":"Surgical fixation within 24–48 hours, restore mobility, prevent death","soc":"None pharmacologic — surgical fixation (hemiarthroplasty for femoral neck; ORIF for intertrochanteric) is definitive; bisphosphonates/denosumab for secondary osteoporosis prevention."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Ankle Fractures","symptoms":"Pain, swelling, bruising, inability to bear weight","goal":"Restore alignment, achieve union, regain function","soc":"None pharmacologic — management is operative ORIF for unstable fractures or cast immobilization for stable fractures; NSAIDs/acetaminophen for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Femoral Shaft Fractures","symptoms":"Thigh pain, deformity, inability to walk, swelling, shortening","goal":"Achieve stable fixation, restore length and alignment, allow early mobilization","soc":"None pharmacologic — intramedullary nailing (IMN) is gold standard; NSAIDs/opioids for pain; DVT prophylaxis with LMWH."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Stress Fractures","symptoms":"Point tenderness, pain with weight-bearing activity, subtle on X-ray","goal":"Allow healing, prevent complete fracture, return to activity safely","soc":"Rest, activity modification, and protective weight-bearing; NSAIDs used cautiously (may impair healing)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Fractures of the 5th Metatarsal Bone","symptoms":"Foot pain at base of 5th toe, swelling, difficulty walking","goal":"Achieve bony union, restore pain-free ambulation","soc":"None pharmacologic — Zone 1 (avulsion): walking boot + NSAIDs; Zone 2 (Jones fracture): non-weight-bearing cast or ORIF; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Calcaneal Fractures","symptoms":"Heel pain, swelling, inability to bear weight, bruising","goal":"Restore heel anatomy, achieve union, return to walking","soc":"None pharmacologic — displaced intra-articular fractures: ORIF or primary arthrodesis; undisplaced: cast immobilization + NSAIDs."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Fracture-Dislocation of the Midfoot (Lisfranc Injury)","symptoms":"Midfoot pain, swelling, bruising, inability to bear weight","goal":"Restore midfoot alignment, achieve union, prevent arthritis","soc":"None pharmacologic — stable injuries: cast; unstable/displaced: ORIF or primary arthrodesis; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Lower Extremity","indication":"Toe Fractures","symptoms":"Toe pain, swelling, bruising, difficulty walking, deformity","goal":"Realign fracture, prevent deformity, restore comfortable ambulation","soc":"None pharmacologic — buddy taping and stiff-soled shoe; ORIF only for great toe displaced/intra-articular fractures."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Distal Radius Fractures","symptoms":"Wrist pain, swelling, deformity (dinner fork), limited function","goal":"Restore wrist alignment, achieve union, regain grip","soc":"None pharmacologic — stable fractures: cast immobilization; unstable/displaced: ORIF with volar locking plate; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Clavicle Fractures","symptoms":"Shoulder pain, swelling, visible deformity, limited arm movement","goal":"Achieve bony union, restore shoulder function","soc":"None pharmacologic — midshaft clavicle fractures: conservative (sling for 4–6 weeks) or surgical (ORIF/intramedullary fixation); NSAIDs/opioids for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Metacarpal Neck Fractures","symptoms":"Knuckle pain, swelling, deformity (boxer's fracture of 4th/5th MCN)","goal":"Achieve union, restore grip and finger alignment","soc":"None pharmacologic — conservative: ulnar gutter splint for 3–4 weeks (5th MCN up to 40° angulation acceptable); NSAIDs; ORIF for significant angulation or malrotation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Pediatric Physeal (Growth Plate) Fractures","symptoms":"Pain, swelling, tenderness at growth plate, limited motion","goal":"Restore alignment, protect growth plate, prevent deformity","soc":"None pharmacologic — reduction (closed or open) plus cast immobilization based on Salter-Harris classification."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Proximal Humeral Fractures","symptoms":"Shoulder pain, bruising, inability to raise arm, swelling","goal":"Restore shoulder function, prevent avascular necrosis","soc":"None pharmacologic — most managed nonoperatively (sling immobilization); ORIF or arthroplasty for displaced/complex fractures."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Radial Head Fractures","symptoms":"Elbow pain, tenderness, limited forearm rotation after fall","goal":"Restore elbow function, prevent stiffness, maintain rotation","soc":"None pharmacologic — type I: sling + early motion; type II/III: ORIF or radial head arthroplasty."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Scaphoid (Navicular) Fractures","symptoms":"Snuffbox tenderness, wrist pain with grip, delayed diagnosis common","goal":"Achieve bony union, prevent avascular necrosis, restore wrist function","soc":"None pharmacologic — nondisplaced: thumb spica cast 8–12 weeks; displaced/proximal pole: ORIF (Herbert screw)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Distal Humeral Fractures","symptoms":"Elbow pain, swelling, deformity, limited range of motion","goal":"Restore articular anatomy, preserve elbow function","soc":"None pharmacologic — ORIF for displaced fractures; NSAIDs/opioids for pain. Total elbow arthroplasty for comminuted fractures in elderly."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Isolated Olecranon Fractures","symptoms":"Elbow pain at tip, swelling, inability to extend elbow, palpable gap","goal":"Restore extensor mechanism, achieve union, regain elbow extension","soc":"None pharmacologic — non-displaced: cast immobilization; displaced: ORIF (tension band wiring or plate); NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Ulnar and Radial Shaft Fractures","symptoms":"Forearm pain, swelling, deformity, inability to rotate forearm","goal":"Restore forearm alignment, rotation, and hand function","soc":"None pharmacologic — isolated ulnar shaft (nightstick): long arm cast; both-bone fractures: ORIF with compression plate."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Fractures — Upper Extremity","indication":"Fingertip Fractures","symptoms":"Fingertip pain, swelling, subungual hematoma, nail bed injury","goal":"Protect injury, relieve hematoma pressure, prevent deformity","soc":"None pharmacologic — trephination for subungual hematoma; splinting; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"General Trauma","indication":"Wounds","symptoms":"Tissue disruption, bleeding, infection risk, variable depth and contamination","goal":"Achieve wound closure, prevent infection, promote healing","soc":"None pharmacologic — wound irrigation, debridement, primary/secondary closure; topical antiseptics; systemic antibiotics for infected wounds."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"General Trauma","indication":"Lacerations","symptoms":"Skin wound, bleeding, pain, infection risk","goal":"Achieve hemostasis, close wound, prevent infection","soc":"None pharmacologic — wound irrigation, closure (sutures/staples/glue); topical antibiotics (mupirocin or bacitracin); local anesthesia (lidocaine)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"General Trauma","indication":"Human and Mammal Bites","symptoms":"Wound, pain, infection risk (Pasteurella, Eikenella, polymicrobial)","goal":"Prevent infection, repair wound, assess for tendon/joint injury","soc":"Amoxicillin-clavulanate (Augmentin) 875/125 mg PO BID × 3–5 days — first-line prophylaxis/treatment for both human and animal bites covering polymicrobial flora."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"General Trauma","indication":"Compartment Syndrome","symptoms":"Severe limb pain, tense swelling, pain with passive stretch, paresthesias","goal":"Relieve compartment pressure, restore perfusion, prevent necrosis","soc":"None pharmacologic — emergent fasciotomy is the only definitive treatment; IV fluids and pain management as bridge."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"General Trauma","indication":"Skin Lacerations","symptoms":"Cut with bleeding, wound edges separated, pain, infection risk","goal":"Close wound, prevent infection, minimize scarring","soc":"None pharmacologic — primary closure with sutures, staples, or tissue adhesive (Dermabond); tetanus prophylaxis."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"General Trauma","indication":"Abrasions","symptoms":"Skin scraping, pain, bleeding, wound contamination","goal":"Clean wound, prevent infection, promote healing","soc":"None — treatment is mechanical cleansing, topical antiseptics (e.g., povidone-iodine), and non-adherent dressings."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"General Trauma","indication":"Explosives and Blast Injuries","symptoms":"Blast lung, TBI, burns, fragmentation wounds, barotrauma","goal":"Control hemorrhage, restore oxygenation, manage polytrauma","soc":"None pharmacologic — damage control resuscitation: 1:1:1 ratio blood product transfusion; TXA (tranexamic acid) within 3 hours of injury."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Genitourinary Trauma","indication":"Genitourinary Tract Trauma","symptoms":"Hematuria, pelvic pain, urinary difficulty, visible injury","goal":"Preserve renal/urinary function, control hemorrhage, prevent infection","soc":"None pharmacologic — most managed conservatively (catheterization, observation) or surgically; antibiotics for contaminated injuries."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Genitourinary Trauma","indication":"Renal Trauma","symptoms":"Flank pain, hematuria, bruising, hypotension in severe injury","goal":"Preserve renal function, control hemorrhage, prevent infection","soc":"None pharmacologic — grade I–III: conservative management; grade IV–V: interventional radiology (angioembolization) or surgery."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Genitourinary Trauma","indication":"Bladder Trauma","symptoms":"Pelvic pain, blood in urine, inability to urinate, lower abdominal bruising","goal":"Drain urine, repair perforation, prevent infection/peritonitis","soc":"None pharmacologic — intraperitoneal ruptures require surgical repair; extraperitoneal managed with catheter drainage ± antibiotics."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Genitourinary Trauma","indication":"Genital Trauma","symptoms":"Genital pain, swelling, bruising, urinary difficulty, bleeding","goal":"Control hemorrhage, repair injury, preserve function","soc":"None pharmacologic — surgical exploration/repair as needed; antibiotics for contaminated wounds; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Genitourinary Trauma","indication":"Urethral Trauma","symptoms":"Blood at urethral meatus, inability to void, perineal hematoma, urinary retention","goal":"Divert urine, preserve urethral continuity, prevent stricture","soc":"None pharmacologic — suprapubic catheterization for urinary diversion; primary repair or delayed urethroplasty for posterior urethral disruption."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Genitourinary Trauma","indication":"Ureteral Trauma","symptoms":"Flank pain, hematuria, urinary leak, urinoma formation","goal":"Repair ureter, prevent urinoma, preserve renal function","soc":"None pharmacologic — ureteral stenting or percutaneous nephrostomy for decompression; surgical repair (ureterorrhaphy, ureteroneocystostomy) for complete transection."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Head and CNS Trauma","indication":"Traumatic Brain Injury (TBI)","symptoms":"Headache, confusion, memory loss, seizures, coma (severe)","goal":"Reduce intracranial pressure, prevent secondary injury, preserve function","soc":"No FDA-approved neuroprotective drug; ICP management: mannitol (20% solution) or hypertonic saline (23.4%); surgical decompressive craniectomy for severe ICP elevation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Head and CNS Trauma","indication":"Spinal Trauma","symptoms":"Back/neck pain, neurological deficits, paralysis, instability","goal":"Decompress spinal cord, stabilize spine, preserve neurological function","soc":"None pharmacologic — surgical stabilization (ACDF, ORIF, laminectomy) for unstable fractures or cord compression; high-dose methylprednisolone remains controversial."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Head and CNS Trauma","indication":"Sports-Related Concussion","symptoms":"Headache, dizziness, confusion, memory problems, light sensitivity","goal":"Reduce symptoms, prevent second impact, facilitate safe return to play","soc":"None pharmacologic — cognitive and physical rest; graduated return-to-play (RTP) protocol."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Head and CNS Trauma","indication":"Spinal Cord Injury in Children","symptoms":"Paralysis, sensory loss, bladder/bowel dysfunction, respiratory failure","goal":"Preserve remaining function, prevent complications, promote recovery","soc":"High-dose methylprednisolone (controversial; NASCIS II/III regimen) within 8 hours — 30 mg/kg bolus then 5.4 mg/kg/hr × 24 h. Surgical decompression for instability."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Knee Pain","symptoms":"Pain around knee, stiffness, swelling, limited function","goal":"Reduce pain, restore function, identify treatable cause","soc":"NSAIDs (ibuprofen, naproxen) — first-line pharmacologic treatment for most non-traumatic knee pain conditions."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Meniscal Injuries","symptoms":"Knee pain, swelling, locking/clicking, joint line tenderness","goal":"Reduce pain, restore function, preserve meniscal tissue","soc":"NSAIDs — first-line pharmacologic; PT for conservative management; arthroscopic meniscectomy or repair depending on tear pattern."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Knee Sprains","symptoms":"Knee pain, instability, swelling, limited weight bearing","goal":"Protect ligament, reduce pain, restore stability","soc":"None pharmacologic — RICE + NSAIDs; surgical ACL/MCL reconstruction for complete tears in active patients."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Lateral Epicondylitis","symptoms":"Lateral elbow pain, weak grip, pain with wrist extension","goal":"Reduce pain, restore grip strength, promote tendon healing","soc":"NSAIDs (naproxen, ibuprofen) or topical diclofenac — first-line pharmacologic for pain relief; PT and activity modification equally important."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Rotator Cuff Injury","symptoms":"Shoulder pain, weakness raising arm, night pain, catching sensation","goal":"Relieve pain, restore shoulder strength and function","soc":"NSAIDs (ibuprofen, naproxen) and physical therapy; subacromial corticosteroid injection for acute pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Hamstring Strain","symptoms":"Posterior thigh pain, spasm, bruising, limited hip flexion","goal":"Reduce pain, restore strength, prevent re-injury","soc":"None pharmacologic — RICE + NSAIDs; PRP injection for Grade II–III tears (increasing use); structured PT."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Glenoid Labral Tear","symptoms":"Shoulder pain, instability, clicking, weakness, decreased ROM","goal":"Restore shoulder stability, reduce pain, prevent recurrent dislocation","soc":"None pharmacologic — PT (rotator cuff strengthening) for SLAP tears in older patients; arthroscopic labral repair (Bankart repair) for anterior tears in young athletes."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Sports Injury","symptoms":"Pain, swelling, limited movement, bruising in various anatomic regions","goal":"Reduce pain and inflammation, restore function, prevent re-injury","soc":"NSAIDs (ibuprofen, naproxen) for acute pain/inflammation; PRICE principle (protection, rest, ice, compression, elevation)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Sprains","symptoms":"Joint pain, swelling, bruising, instability after ligament stretch/tear","goal":"Reduce pain and swelling, restore stability and function","soc":"PRICE (protection, rest, ice, compression, elevation) + NSAIDs (ibuprofen, naproxen)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Medial Epicondylitis","symptoms":"Inner elbow pain, weak grip, pain with wrist flexion/forearm pronation","goal":"Reduce pain, promote tendon healing, restore function","soc":"NSAIDs (ibuprofen, naproxen) or topical diclofenac — first-line; PT for eccentric strengthening."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Achilles Tendon Tears","symptoms":"Sudden heel pain, inability to push off, palpable gap","goal":"Restore tendon continuity, regain functional strength","soc":"None pharmacologic — management is surgical repair or conservative cast/boot immobilization followed by structured rehabilitation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Ankle Sprains","symptoms":"Pain, swelling, bruising, instability, limited motion","goal":"Reduce pain/swelling, restore stability and function","soc":"None pharmacologic — RICE (rest, ice, compression, elevation); NSAIDs (ibuprofen) for pain and inflammation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Piriformis Syndrome","symptoms":"Deep buttock pain, sciatica, worsened by sitting, hip rotation","goal":"Reduce nerve compression, relieve pain, restore function","soc":"NSAIDs (ibuprofen, naproxen) plus physical therapy; muscle relaxants (cyclobenzaprine) for spasm."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Biceps Tendon Tears","symptoms":"Sudden arm weakness, pain, bulging muscle (Popeye sign)","goal":"Restore arm strength and function, repair tendon","soc":"None pharmacologic — distal biceps tears: surgical reattachment preferred for active patients. Proximal: often managed conservatively with NSAIDs and PT."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Shin Splints","symptoms":"Tibial pain during exercise, tenderness along shin, swelling","goal":"Reduce pain, allow training modification, prevent stress fracture","soc":"Rest, ice, NSAIDs (ibuprofen), activity modification, and orthotics."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Subacromial Bursitis","symptoms":"Shoulder pain, pain with overhead activities, night pain, limited ROM","goal":"Reduce bursitis inflammation, restore pain-free shoulder motion","soc":"NSAIDs (ibuprofen, naproxen) and physical therapy; subacromial corticosteroid injection (methylprednisolone or triamcinolone)."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Knee Extensor Mechanism Injuries","symptoms":"Inability to extend knee, quadriceps/patellar tendon defect, pain, swelling","goal":"Repair extensor mechanism, restore active knee extension","soc":"None pharmacologic — surgical repair of torn quadriceps or patellar tendon; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Acromioclavicular Joint Sprains","symptoms":"Shoulder pain, swelling, deformity at collarbone, limited motion","goal":"Reduce pain, restore shoulder function and stability","soc":"None pharmacologic — NSAIDs/analgesics for pain; primary treatment is rest, ice, sling immobilization, and physical therapy."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Mallet Finger","symptoms":"Drooping fingertip, inability to extend DIP joint, pain at DIP","goal":"Splint in extension, restore DIP extension, prevent swan neck","soc":"None pharmacologic — continuous DIP extension splinting for 6–8 weeks; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Flexor Digitorum Profundus (FDP) Avulsion","symptoms":"Inability to flex fingertip, pain, swelling (ring finger most common)","goal":"Reattach tendon, restore finger flexion","soc":"None pharmacologic — surgical reattachment of avulsed tendon within 7–10 days; NSAIDs for pain."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"Ulnar Collateral Ligament Sprains","symptoms":"Medial elbow pain, ulnar nerve symptoms, instability with valgus stress","goal":"Restore medial elbow stability, relieve pain, return to sport","soc":"None pharmacologic — rest, ice, NSAIDs, and PT for low-grade sprains; UCL reconstruction (Tommy John) for complete tears in overhead athletes."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Sprains and Soft Tissue Injuries","indication":"First Metatarsophalangeal (MTP) Joint Sprain","symptoms":"Big toe pain, swelling, bruising, limited push-off, 'turf toe'","goal":"Protect joint, reduce pain, restore toe function","soc":"None pharmacologic — RICE, NSAIDs, stiff-soled shoe or taping; Grade III: surgical ligament repair."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Abdominal Trauma","symptoms":"Pain, bruising, internal bleeding, organ damage","goal":"Control hemorrhage, repair organ injury, prevent sepsis","soc":"None — management is surgical (laparotomy/laparoscopy) and supportive (IV fluids, blood products). No pharmacologic first-line SoC."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Hemothorax","symptoms":"Chest pain, decreased breath sounds, shock, bloody chest drain output","goal":"Drain blood from pleural space, control bleeding, restore lung expansion","soc":"None pharmacologic — tube thoracostomy (32–36 Fr chest tube) is primary treatment; blood products for hemorrhagic shock."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Thoracic Trauma","symptoms":"Chest pain, dyspnea, hemothorax, rib fractures, pneumothorax","goal":"Control hemorrhage, restore ventilation, treat specific injuries","soc":"None pharmacologic — chest tube for pneumothorax/hemothorax; surgical management; analgesia."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Hepatic Injury","symptoms":"Right upper quadrant pain, abdominal tenderness, hemodynamic instability","goal":"Control hemorrhage, preserve liver function, prevent complications","soc":"None pharmacologic — non-operative management (NOM) for Grade I–III; angioembolization or surgery for higher grades; IV fluids and blood products for resuscitation."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Pulmonary Contusion","symptoms":"Chest pain, cough, hemoptysis, hypoxia after blunt chest trauma","goal":"Maintain oxygenation, prevent ARDS, avoid fluid overload","soc":"None pharmacologic — supportive: supplemental O2, fluid restriction, early mechanical ventilation if needed."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Flail Chest","symptoms":"Paradoxical chest wall movement, severe pain, respiratory failure","goal":"Stabilize chest wall, ensure adequate ventilation, control pain","soc":"None pharmacologic — epidural analgesia (bupivacaine) or IV/regional analgesia as cornerstone; mechanical ventilation for respiratory failure; surgical rib fixation for severe cases."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Cardiac Tamponade","symptoms":"Beck's triad: hypotension, muffled heart sounds, distended neck veins","goal":"Relieve pericardial pressure, restore cardiac output","soc":"None pharmacologic — pericardiocentesis (needle drainage) is definitive emergency treatment; IV fluids as temporizing measure."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Splenic Injury","symptoms":"Left upper quadrant pain, tenderness, hypotension, shoulder pain (Kehr's sign)","goal":"Control hemorrhage, preserve spleen, prevent mortality","soc":"None pharmacologic — grade I–III: nonoperative management with observation; grade IV–V: angioembolization or splenectomy."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Open Pneumothorax","symptoms":"Sucking chest wound, dyspnea, reduced breath sounds, tracheal deviation","goal":"Seal chest defect, restore lung expansion, prevent tension pneumothorax","soc":"None pharmacologic — chest seal dressing (vented, e.g., Hyfin or Russell) as immediate treatment; tube thoracostomy for definitive management."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Blunt Cardiac Injury","symptoms":"Chest pain, palpitations, arrhythmia, hypotension after chest trauma","goal":"Detect arrhythmia, support cardiac function, prevent sudden death","soc":"None pharmacologic — cardiac monitoring and supportive care; antiarrhythmics (e.g., amiodarone) for significant arrhythmias."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Aortic Disruption (Traumatic)","symptoms":"Severe chest/back pain, hypotension, widened mediastinum","goal":"Prevent aortic rupture, achieve hemostasis, repair defect","soc":"None pharmacologic — definitive management is endovascular aortic repair (TEVAR) or open surgical repair; permissive hypotension and heart rate control (e.g., esmolol/labetalol) to reduce aortic wall stress pre-operatively."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Tension Pneumothorax","symptoms":"Severe dyspnea, hypotension, absent breath sounds, tracheal deviation, cardiovascular collapse","goal":"Immediate decompression, restore ventilation and hemodynamics","soc":"None pharmacologic — immediate needle decompression (14g angiocath, 2nd ICS mid-clavicular line or 4th ICS anterior axillary line); followed by chest tube thoracostomy."},{"ta":"Trauma, Toxicology, and Emergency Medicine","subcategory":"Thoracic and Abdominal Trauma","indication":"Traumatic Pneumothorax","symptoms":"Chest pain, dyspnea, absent breath sounds, reduced chest movement","goal":"Re-expand lung, relieve respiratory compromise","soc":"None pharmacologic — chest tube thoracostomy (28–36F) for significant pneumothorax; needle aspiration for small occult pneumothorax."},{"ta":"Urology and Nephrology","subcategory":"Bladder Disorders","indication":"Interstitial Cystitis","symptoms":"Chronic pelvic pain, bladder pressure, urinary urgency, frequency, nocturia","goal":"Reduce bladder pain, decrease urinary frequency, improve quality of life","soc":"Pentosan polysulfate sodium (Elmiron; glycosaminoglycan layer replenisher; FDA-approved) 100mg TID. Tricyclic antidepressants (amitriptyline 25–75mg; neuromodulator) as first-line pain agents."},{"ta":"Urology and Nephrology","subcategory":"Bladder Disorders","indication":"Urinary Incontinence in Adults","symptoms":"Involuntary urine leakage on exertion or urgency, pad use, reduced QoL","goal":"Reduce leakage episodes, restore continence, improve quality of life","soc":"Stress UI (SUI): Pelvic floor exercises (PFMT); duloxetine (SNRI; off-label in US, approved in Europe as Yentreve) for pharmacologic SoC. Urgency UI (UUI): Anticholinergics (oxybutynin) or mirabegron (beta-3 agonist)."},{"ta":"Urology and Nephrology","subcategory":"Bladder Disorders","indication":"Neurogenic Bladder","symptoms":"Urinary incontinence, retention, frequency, UTIs, inability to void voluntarily","goal":"Maintain safe bladder pressures, prevent UTIs, achieve continence","soc":"Anticholinergics (oxybutynin, tolterodine; muscarinic receptor antagonists) for overactive neurogenic bladder; alpha-1 blockers (tamsulosin) for detrusor-sphincter dyssynergia; clean intermittent catheterization (CIC)."},{"ta":"Urology and Nephrology","subcategory":"Erectile and Sexual Dysfunction","indication":"Erectile Dysfunction","symptoms":"Persistent inability to achieve or maintain erection for satisfactory sex","goal":"Restore erectile function, improve sexual satisfaction and quality of life","soc":"PDE5 inhibitors: sildenafil (Viagra; 50–100mg PRN) or tadalafil (Cialis; 10–20mg PRN or 5mg daily). Most effective oral first-line agents for most etiologies of ED."},{"ta":"Urology and Nephrology","subcategory":"Kidney and Stone Disease","indication":"Urinary Calculi","symptoms":"Severe colicky flank pain, hematuria, nausea, vomiting","goal":"Relieve acute pain, facilitate stone passage, prevent recurrence","soc":"NSAIDs (ketorolac 15–30 mg IV/IM or diclofenac) are first-line analgesics for renal colic — superior to opioids for pain control. Alpha-1 blockers (tamsulosin 0.4 mg/day) as medical expulsive therapy (MET) for ureteral stones 5–10 mm."},{"ta":"Urology and Nephrology","subcategory":"Kidney and Stone Disease","indication":"Urinary Calculi (Kidney Stones)","symptoms":"Severe flank pain, hematuria, nausea, vomiting, dysuria, urinary urgency","goal":"Pass or remove stone, relieve pain, prevent recurrence","soc":"Medical expulsive therapy (MET): tamsulosin 0.4mg daily (alpha-1A blocker) to facilitate passage of ureteral stones ≤10mm. NSAIDs (ketorolac, diclofenac; superior to opioids for acute renal colic pain). Opioids for rescue analgesia."},{"ta":"Urology and Nephrology","subcategory":"Kidney and Stone Disease","indication":"Obstructive Uropathy","symptoms":"Flank pain, decreased urine output, hydronephrosis, recurrent UTIs, renal impairment","goal":"Relieve obstruction, preserve renal function, prevent infection","soc":"Depends on cause: Ureteral stones—alpha-1 blockers (tamsulosin 0.4mg; medical expulsive therapy) for stones ≤10mm. Obstruction relief (stent, nephrostomy) for upper tract obstruction. Antibiotics for concurrent infection."},{"ta":"Urology and Nephrology","subcategory":"Prostate Disorders","indication":"Benign Prostatic Hyperplasia","symptoms":"Weak urine stream, frequency, urgency, nocturia, incomplete bladder emptying","goal":"Relieve LUTS, improve urinary flow, prevent urinary retention","soc":"Alpha-1 blockers: tamsulosin (Flomax; alpha-1A adrenergic antagonist) 0.4mg daily or silodosin (Rapaflo)—relax prostate smooth muscle, fastest symptom relief. 5-alpha reductase inhibitors (5-ARIs): finasteride (Proscar) or dutasteride (Avodart) for large prostates (>30–40mL)."},{"ta":"Urology and Nephrology","subcategory":"Prostate Disorders","indication":"Prostatitis (Etiology, Classification, Symptoms and Signs, Diagnosis, Treatment)","symptoms":"Pelvic pain, dysuria, urinary frequency, perineal discomfort","goal":"Eradicate infection (bacterial); reduce chronic pelvic pain (CPPS)","soc":"Category I/II (Acute/Chronic Bacterial Prostatitis): fluoroquinolones (levofloxacin 500 mg/day × 4–6 weeks or ciprofloxacin 500 mg BID × 4–6 weeks) are first-line — excellent prostate tissue penetration. Category III (CPPS/CNBP): alpha-blockers (tamsulosin) + NSAIDs as first-line empirical therapy."},{"ta":"Urology and Nephrology","subcategory":"Prostate Disorders","indication":"Prostatitis","symptoms":"Pelvic pain, dysuria, urinary frequency, urgency, perineal discomfort","goal":"Eradicate infection (if bacterial), relieve pelvic pain, improve urinary symptoms","soc":"Acute bacterial: IV ciprofloxacin or fluoroquinolone × 2–4 weeks (culture-directed); IV broad-spectrum antibiotics for severe/hospitalized. Chronic bacterial: Oral ciprofloxacin 500mg BID × 4–6 weeks or levofloxacin 500mg × 4–6 weeks."},{"ta":"Urology and Nephrology","subcategory":"Prostate Disorders","indication":"Prostate Abscess","symptoms":"Severe pelvic pain, fever, urinary retention, perineal swelling, sepsis signs","goal":"Drain abscess, eradicate infection, prevent septicemia and recurrence","soc":"IV broad-spectrum antibiotics (3rd-generation cephalosporin + metronidazole, or fluoroquinolone-based for uncomplicated cases) plus urgent surgical drainage (transrectal ultrasound-guided aspiration or transurethral drainage)."},{"ta":"Urology and Nephrology","subcategory":"Testicular and Scrotal Disorders","indication":"Scrotal Pain","symptoms":"Scrotal or testicular pain, variable onset, may radiate to groin or abdomen","goal":"Identify emergency (torsion, abscess), relieve pain, treat underlying cause","soc":"Analgesics (NSAIDs, acetaminophen) for pain relief. Antibiotics for infectious causes (epididymitis, orchitis). Emergency surgical exploration for testicular torsion."},{"ta":"Urology and Nephrology","subcategory":"Testicular and Scrotal Disorders","indication":"Epididymitis","symptoms":"Scrotal pain, swelling, tenderness behind testicle, dysuria, fever","goal":"Eradicate causative infection, relieve pain, prevent chronic complications","soc":"<35 years (STI): Ceftriaxone 500mg IM single dose + doxycycline 100mg BID × 10 days. >35 years (enteric organisms): Ofloxacin 300mg BID × 10 days or levofloxacin 500mg × 10 days."},{"ta":"Urology and Nephrology","subcategory":"Testicular and Scrotal Disorders","indication":"Painless Scrotal Mass","symptoms":"Painless scrotal swelling or mass, hydrocele, spermatocele, varicocele, tumor","goal":"Diagnose cause (benign vs. malignant), treat if symptomatic or malignant","soc":"Workup (ultrasound, tumor markers): Testicular cancer—radical orchiectomy + cisplatin-based chemotherapy (BEP: bleomycin, etoposide, cisplatin) for malignant tumors. Benign (hydrocele, spermatocele): Observation or surgical aspiration."},{"ta":"Urology and Nephrology","subcategory":"Testicular and Scrotal Disorders","indication":"Orchitis","symptoms":"Testicular pain, swelling, redness, fever, nausea","goal":"Eradicate infection, reduce inflammation, preserve fertility","soc":"Bacterial orchitis: Antibiotics based on age/etiology—same as epididymitis (see above). Viral mumps orchitis: Supportive only (NSAIDs, scrotal support); no antiviral proven effective."},{"ta":"Urology and Nephrology","subcategory":"Testicular and Scrotal Disorders","indication":"Testicular Torsion","symptoms":"Sudden severe scrotal pain, high-riding testicle, nausea, vomiting, absent cremasteric reflex","goal":"Emergent manual or surgical detorsion within 6 hours to preserve testicle","soc":"Emergent surgical exploration and detorsion + bilateral orchiopexy (within 6 hours for >90% salvage rate). Manual detorsion (outward rotation) may serve as bridge to surgery. IV opioid analgesics for pain."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Peyronie Disease","symptoms":"Penile plaque, painful erections, penile curvature, erectile dysfunction","goal":"Reduce curvature, relieve pain, restore erectile function and sexual activity","soc":"Collagenase clostridium histolyticum (Xiaflex; intralesional collagenase; FDA-approved 2013) for men with Peyronie's disease with curvature ≥30°. Combined with manual modeling."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Urethral Stricture","symptoms":"Weak urinary stream, straining, frequency, incomplete emptying, recurrent UTIs","goal":"Restore urethral patency, improve voiding function, prevent recurrence","soc":"Endoscopic direct vision internal urethrotomy (DVIU) or urethral dilation—first-line procedural SoC. Alpha-blockers (tamsulosin) for symptomatic relief. No pharmacologic agent dissolves strictures."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Cutaneous Penile Lesions","symptoms":"Penile skin changes: plaques, papules, ulcers, pigmentation, rash","goal":"Diagnose and treat underlying cause (infection, inflammatory, premalignant)","soc":"Depends on etiology: STI lesions—pathogen-specific antibiotics/antivirals; lichen sclerosus—clobetasol 0.05% topical (potent corticosteroid); genital warts—topical imiquimod (immune modifier) or podophyllotoxin; premalignant (PeIN)—topical 5-fluorouracil or imiquimod."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Balanitis","symptoms":"Penile glans redness, swelling, discharge, itching, pain","goal":"Eradicate infection, relieve inflammation, prevent recurrence","soc":"Topical antifungals (clotrimazole 1% cream; azole antifungal) for candidal balanitis. Topical antibiotics (fusidic acid or mupirocin) or oral antibiotics (amoxicillin-clavulanate) for bacterial balanitis."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Balanitis, Posthitis, and Balanoposthitis","symptoms":"Penile glans/foreskin inflammation, pain, discharge, redness","goal":"Resolve infection/inflammation, prevent recurrence and complications","soc":"Topical antifungals (clotrimazole 1% cream) for Candida balanitis (most common cause); topical antibiotics (fusidic acid or mupirocin) or oral antibiotics for bacterial causes. Topical mild corticosteroids for inflammatory (non-infectious) balanitis."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Balanoposthitis","symptoms":"Inflammation of glans and foreskin, pain, discharge, phimosis risk","goal":"Eradicate dual glans/foreskin infection, prevent phimosis progression","soc":"Topical antifungal (clotrimazole) + topical antibiotic (fusidic acid) combination; oral antibiotics for severe bacterial cases."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Phimosis and Paraphimosis","symptoms":"Inability to retract foreskin (phimosis); painful trapped foreskin (paraphimosis emergency)","goal":"Restore foreskin mobility; emergency reduction of paraphimosis","soc":"Phimosis: topical high-potency corticosteroid (betamethasone 0.05% or clobetasol 0.05% cream BID × 4–8 weeks) combined with gentle stretching — first-line non-surgical. Paraphimosis: manual reduction ± osmotic agents (granulated sugar, ice) in ER."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Phimosis","symptoms":"Inability to retract foreskin, pain with erection, difficulty urinating, recurrent balanitis","goal":"Restore foreskin retractability, relieve symptoms, prevent complications","soc":"Topical potent corticosteroid (betamethasone 0.05% or clobetasol 0.05% cream; BID × 4–8 weeks) applied to tight prepuce with gentle stretching exercises—~75–85% success rate."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Posthitis","symptoms":"Foreskin inflammation, redness, swelling, discharge, pain","goal":"Eradicate infection, reduce inflammation, prevent recurrence","soc":"Same approach as balanoposthitis (foreskin-only inflammation): topical antifungals (clotrimazole) for candidal; topical/oral antibiotics for bacterial. Hygiene measures paramount."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Priapism","symptoms":"Prolonged painful erection (>4 hours) unrelated to sexual stimulation","goal":"Detumescence within 4–6 hours to prevent ischemic injury and ED","soc":"Intracavernosal injection of sympathomimetic: phenylephrine (100–200mcg every 3–5 min; alpha-1 agonist) is first-line pharmacologic treatment per AUA guidelines."},{"ta":"Urology and Nephrology","subcategory":"Urethral and Penile Disorders","indication":"Paraphimosis","symptoms":"Foreskin retracted and trapped behind glans, painful swelling, emergency","goal":"Reduce paraphimosis urgently, restore foreskin position, prevent ischemia","soc":"Manual reduction (osmotic compression: ice, sugar, hypertonic solution) + topical lidocaine for pain. Dorsal slit or emergency circumcision if manual reduction fails."},{"ta":"Urology and Nephrology","subcategory":"Urinary Symptoms","indication":"Urinary Frequency","symptoms":"Excessive daytime urination (>8×/day), urgency, disrupted sleep (nocturia)","goal":"Reduce voiding frequency, relieve urgency, improve quality of sleep","soc":"Anticholinergics (oxybutynin; tolterodine; muscarinic receptor antagonists) or beta-3 agonists (mirabegron [Myrbetriq]; FDA-approved) as first-line for overactive bladder-related frequency."},{"ta":"Urology and Nephrology","subcategory":"Urinary Symptoms","indication":"Dysuria","symptoms":"Painful or burning urination, urinary frequency, urgency, cloudy urine","goal":"Identify and treat underlying cause; relieve pain promptly","soc":"Uncomplicated UTI (most common cause): Nitrofurantoin (100mg BID × 5 days) or TMP-SMX DS (Bactrim; × 3 days) or fosfomycin (3g × 1 dose)—all FDA-approved first-line antibiotics for uncomplicated cystitis. Phenazopyridine (analgesic) for immediate pain relief."},{"ta":"Urology and Nephrology","subcategory":"Urinary Symptoms","indication":"Urinary Retention","symptoms":"Inability to void, suprapubic pain/distension, large post-void residual","goal":"Relieve acute retention, improve bladder emptying, identify and treat cause","soc":"Acute urinary retention: Urethral catheterization for immediate relief. Alpha-1 blockers (tamsulosin 0.4mg; BPH-related) to facilitate TWOC (trial without catheter). Bethanechol (cholinergic agonist) for underactive bladder."},{"ta":"Urology and Nephrology","subcategory":"Urinary Symptoms","indication":"Hematospermia","symptoms":"Blood in ejaculate; typically painless, often benign and self-limiting","goal":"Rule out serious pathology; treat underlying cause if identified","soc":"In most cases (<40 years, no risk factors), no pharmacologic treatment required — expectant management. If inf
